body:
  text: 萬首唐人絶句巻十八宋洪邁編七言原缺萬首唐人絶句巻十八欽定四庫全書萬首唐人絶句巻十八宋洪邁編五言中秋司空圖閒吟秋景外萬事覺悠悠此夜若無月一年虚過秋偶題水榭花繁處春情日午前鳥窺臨檻鏡馬過隔墻鞭閒歩幾處白煙斷一川紅樹時壞橋侵轍水殘照背村碑春中伏溜侵堦潤繁花隔竹香嬌鶯方曉聽無事過南塘獨望緑樹連村暗黄花出陌稀逺陂春草緑猶有水禽飛雜題孤枕聞鶯起幽懷獨悄然地融春力潤花泛曉光鮮漫題三首亂後他鄉節燒殘故國春自憐垂白首猶伴踏青人齒落傷情乆心驚健忘頻蝸廬經歳客蠶市異鄉人率怕人書謹閒宜酒韻高山林若無慮名利不難逃河上二首慘慘日將暮驅羸獨到莊沙痕傍墟落風色入牛羊新霽田園處夕陽禾黍明沙村平見水深巷有鷗聲早朝白日新年好青春上國多街平雙闕近塵起五雲和即事二首茶爽添詩句天清瑩道心只留鶴一隻此外是空林御禮徵竒䇿人心注盛時從來留振滯只待濟臨危永夜永夜疑無日危時只賴山曠懷休戚外孤跡是非間秦關形勝今雖在荒涼恨不窮虎狼秦國破狐兎漢陵空渡江秋江共僧渡鄉淚滴船回一夜吳船夣家書立馬開退居漫題七首花缺傷難綴鶯喧奈細聽惜春春已晚珍重草青青堤桞自綿綿幽人無恨牽只憂詩病發莫寄校書牋燕語曾來客花催欲别人莫愁春又過看着又新春身外都無事山中乆避喧破巢看乳燕留果待啼猿詩家通籍美工部與司勲高賈雖難敵微官偶勝君努力省前非人生上壽稀青雲無直道暗室有危機燕拙營巢苦魚貪觸網驚豈縁身外事亦似我勞形即事九首宿雨川原霽憑高景物新陂痕侵牧馬雲影帶耕人十年深隱地一雨太平心匣澁休看劒窻明復上琴明時那棄置多病自遲留踈磬和吟斷殘燈照卧幽衰鬢閒生少丹梯望覺危松須依石長鶴不傍人卑落葉頻驚鹿連峯欲映鵰此生詩病苦此病更蕭條旅思又驚夏庭前長小松逺峯生貴氣殘月歛衰容林鳥頻窺静家人亦笑慵舊居留穩枕歸卧聽秋鐘華宇知難保燒來又却修只應巢燕惜未必主人留幽鳥穿籬去隣翁採藥迴雲從潭底出花向佛前開松滋渡二首歩上短亭乆看迴官渡船江鄉宜晚霽楚老語豐年楚岫積鄉思茫茫歸路迷更堪斑竹驛初聽鷓鴣啼華清宫帝業山河固離宫宴幸頻豈知驅戰馬只是太平人牛頭寺終南最佳處禪誦出青霄羣木澄幽寂疎煙汎寂寥感時上盧相兵待皇威振人隨國歩安萬方休望幸封岳始鳴鑾亂後三首䘮亂家難保艱虞病懶醫空將憂國淚猶擬洒丹墀流芳能幾日惆悵又聞蟬行在多新貴幽棲獨長年世事嘗艱險僧居慣寂寥美香聞夜合清景見寅朝秋景景物皆難駐傷春復怨秋旋書紅葉落擬畫碧雲收避亂亂離身偶在竄跡任浮沉虎暴荒居逈螢孤黒夜深長亭梅雨和鄉淚終年共酒衣殷勤華表鶴羨爾亦曾歸村西杏花二首薄膩力偏羸看看愴别時東風狂不惜西子病難醫肌細分紅脉香濃破紫苞無因留得翫爭忍折來抛獨坐幽徑入桑麻塢西逢一家編籬薪帶蠒補屋草和花借居借住郊園乆仍逢夏景新緑苔行屐穏黄鳥傍窻頻重陽菊開猶阻雨蝶意切於人亦應知暮節不比惜殘春偶書五首衰謝當何懴惟應悔壯圖磬聲花外遠人影塔前孤色變鶯雛長竿齊笋籜垂白頭身偶在清夏景還移蜀畫輕成妙吳娃狎共纎晚粧留拜月巻上水精簾獨歩荒郊暮沉思遠墅幽平生多少事彈指一時休掩謗知迎吠欺心見强顔有名人昜困無契債難還雜題九首病來勝未病名縳便忘名今日甘爲客當時注愍征暑濕深山雨荒居破屋燈此生無懴處此去作高僧不須頻悵望且喜脫喧囂亦有終焉意陂南看稻苗樓帶猿吟迥庭容鶴舞寛㬠書因閲畫封藥偶和丹宴罷論詩乆亭高拜表頻岸香蕃舶月洲色海煙春驛歩堤縈閣軍城鼓振橋鷗和湖鴈下雪隔嶺梅飄帶雪南山道和鐘北闕明太平當共賀開化喝來聲舴艋猿偷上蜻蜓燕競飛樵香燒桂子苔濕挂莎衣溪漲漁家近煙收鳥道高松花飄可惜睡裏洒離騷古樂府一葉隨西風君行亦向東知妾飛書意無勞待早鴻有感燈影看鬚黒墻隂惜草青歳䦨悲物我同是冐霜螢休休亭且喜安能保那堪病更憂可憐藜杖者眞箇種𤓰侯漫書二首剰欲逢花折須判冐雨頻晴明開漸少莫怕濕新巾小蝶爾何競追飛不憚勞遠教羣雀見寜悟禍梯高歳盡二首明日添一歳端憂奈爾何衝寒出洞口猶校夕陽多莫話傷心事投春滿鬢霜殷勤共尊酒今歳只殘陽牡丹得地牡丹盛曉添龍麝香主人猶自惜錦幕䕶春霜亂後羽書傳棧道風火隔鄉關病眼那堪泣傷心不到閒春山可是武陵溪春芳着處迷花明催曙早雲膩惹空低樂府寳馬跋塵光雙馳照路旁喧傳報戚里明日幸長楊亂前上盧相寇黠雖多變兵驕即易乗猶須勞斥候勿遣大河冰金谷園曹松當年歌舞時不説草離離今日歌舞盡滿園秋露埀寒食日題杜䳌花一朶又一朶併開寒食時誰家不禁火總在此花枝春草不獨滿池塘夣中佳句香春風有餘力引上古城墻春日東齋三庚到秋伏偶來松檻立熱少清風多開門放山入南朝三籬蓋馳道風烈一無取時見牧牛童嗔牛喫禾黍賀顧非熊及第劉得仁愚爲童稚時已解念君詩及得高科晚須逢聖主知述懷崔櫓白首成何事無歡可替悲空餘酒中興猶似少年時望歸馬劉駕東人望歸馬歸馬蓮峯下蓮峯與地平亦不更徴兵田西邊刀劒作犂鋤耕田古城下高秋黍稷多無地放羊馬樂邊人在鄉身亦勞在邊腹亦飽父兄若一處任向邊頭老築臺詞前杵與後杵築城功不住願我築更高得見秦皇墓秦娥秦娥十四五面白於指𤓰羞人夜采桑驚起戴勝鳥牧童牧童見客拜山果懷中落晝日驅牛歸前溪風雨惡賞殘花紇于著零落多依草芳香散着人低簷一枝在猶占滿堂春遇邊使盧隱累年無的信毎夜夣邊城䄂掩千行淚書封一尺情移住别友自到西川住唯君别有情常逢對門遠又隔一重城堋口逢友人艱難别離乆中外往還深已改當時髪空餘舊日心採蓮女霍總舟中採蓮女兩兩催粧梳聞早渡江去日高來起居邊城桞劉皁一株新桞色十里斷孤城爲近東西路長懸離别情江濵梅王適忽見寒梅樹開花漢水濵不知春色早疑是弄珠人感事武瓘花開蝶滿枝花謝蝶還希唯有舊巢燕主人貧亦歸江行桞中庸繁隂乍隱洲落葉初飛浦蕭蕭楚客帆暮入寒江雨别童叟吳筠平昔同邑里經年不相思今日成遠别相對心悽其題縉雲嶺永望舘人驚此路險我愛山前深猶恐佳趣盡欲行且沉吟題山人所居故人住南郭邀我對芳樽歡暢日云暮不知城市喧萬首唐人絶句巻十八
