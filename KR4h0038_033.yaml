body:
  text: 萬首唐人絶句卷三十三宋洪邁編七言夜巖謡施肩吾夜上幽巖踏靈草松枝已踈桂枝老新詩幾度惜不吟此處一聲風月好島夷行腥臊海邊多鬼市島夷居處無鄉里黑皮年少學採珠手把生犀照鹹水帝宫詞自得君王寵愛時敢言春色上寒枝十年宫裏無人問一日承恩天下知歎花詞前日滿林紅錦遍今日繞林看不見空餘古岸泥土中零落燕脂兩三片杜䳌花詞杜䳌花時夭艷然所恨帝城人不識丁寧莫遣春風吹留與佳人比顔色曉光詞日輪浮動羲和推東方一軋天門開風神為我掃煙霧四海蕩蕩無塵埃望曉詞攬衣起兮望秋河濛濛逺霧飛輕羅蟠桃樹上日欲出白榆枝畔星無多海邊逺望扶桑枝邊紅皎皎天雞一聲四溟曉偶看仙女上青天鸞鶴無多采雲少聽南僧說偈詞師子坐中香已發西方佛偈南僧說惠風吹盡六條塵清淨水中初見月春日美新緑詞前日萌芽小於粟今朝草樹色已足天公不語能運為驅遣羲和染新緑對月憶嵩陽故人團團月光照西壁嵩陽故人千里隔不知三十六峯前定為何處峯前客贈莎地道士莎地陰森古蓮葉游龜暗老青苔甲池邊道士誇眼明夜取蟭螟摘蚊睫效古詞二首莫愁得新年十六如蛾雙眉長帶緑初學箜篌四五人莫愁獨自聲前足姊妹無多兄弟少舉家鍾念年最小有時繞樹山鵲飛貪看不待畫眉了冬日觀早朝紫煙捧日爐香動萬馬千車踏新凍繡衣年少朝欲歸美人猶在青樓夢觀吳偃畫松君有絶藝終身寶方寸巧心通萬造忽然寫出澗底松筆下看看一枝老題山僧水閣山房水閣連空翠沉沉下有蛟龍睡老僧趺坐入定時不知花落黃金地登峴亭懷孟生峴山自髙水自緑後輩詞人心眼俗鹿門才子不再生怪景幽奇無管屬吳中代蜀客吟身狎吳兒家在蜀春深屢唱思鄉曲峨眉風景無主人錦江悠悠為誰緑戲詠榆莢風吹榆錢落如雨繞林繞屋來不住知爾不堪還酒家漫教夷甫無行處寄李補闕蒼生應怪君起遲蒲輪重輾嵩陽道功成名遂來不來三十六巢仙鶴老貧客吟檻毯蔽衣無處結寸心耿耿如刀切今朝欲泣泉客珠及到盤中却成血誚山中叟老人今年八十幾口中零落殘牙齒天陰傴僂帶嗽行猶向巖前種松子憶四明山泉愛彼山中石泉水幽聲夜落虛窗裏至今憶得卧雲時猶自㳙㳙在人耳聞山中步虛聲何人步虛南峯頂鶴唳九天霜月冷仙詞偶逐東風來誤飄數聲落塵境題龍池山人主人家在龍池側水中有魚不敢食終朝采藥供仙厨却笑桃花少顔色玩新桃花幾歎紅桃開未得忽驚造化新裝飾一種同霑榮盛時偏荷清光借顔色山石榴花深色燕脂碎剪紅巧能攢合是天公莫言無物堪相比妖艷西施春驛中玩友人庭竹曾去𤣥洲看種玉那似君家滿庭竹客來不用呼清風此處挂冠涼自足秋夜山居二首幽居正想餐霞客夜久月寒珠露滴千年獨鶴兩三聲飛下巖前一枝柏去鴈聲遙人語絶誰家素機織新雪秋山野客醉醒時百尺老松銜半月秋夜山中别友人獨鶴孤雲兩難說明朝又作東西别知君少壯無十年莫愛閒吟老松月贈别王鍊師往羅浮道俗駢闐留不住羅浮山上有心期却愁仙處人難到别後音書寄與誰春日餐霞閣灑水初晴物候新餐霞閣上最冝春山花四面風吹入為我鋪牀作錦茵喜友再相逢三十年前與君别可憐容色奪花紅誰知日月相催促此度見君成老翁候仙詞西歸公子何時降南嶽先生早晚來巡厯世間猶未遍乞求鸞鶴且裴回修仙詞丹田自種留年藥𤣥谷長生續命芝世上漫忙兼漫走不知求已更求誰山中得劉秀才京書自笑家貧客到踈滿庭煙草不能鋤今朝誰料三千里忽得劉公一紙書夏日題方師院火天無處買清風悶發時來入梵宫只向方師小廊下回看門外是樊籠游春樂一年三百六十日賞心那似春中物草迷曲渚花滿園東家年少西家出仙客歸鄉詞二首六合八荒游未半子孫零落暫歸來井邊不認捎雲樹多是門人在後栽洞中日月洞中仙不算離家是幾年出郭始知人代變又須拋却古時錢雲州飲席酒腸雖滿少歡情身在雲州望帝城巡次合當誰改令先須為我打還京戲贈李主簿官罷江南客恨遙二年空被酒中消不知暗數春游處偏憶楊州第幾橋春詞沈亞之亦有黃鳥啼多春日髙紅芳開盡井邊桃美人手暖裁衣易片片輕雲落剪刀題景上人山門水有青蓮沙有金老僧於此獨觀心愁人欲寄中峯宿只恐白猿啼夜深妓人殘粧詞雲髻已收金鳯凰巧勻輕黛約殘粧不知昨夜新歌響猶在誰家繞畫梁臨水亭只怪素亭黏黛色溪煙為我染莓苔欲知源上春風起看取桃花逐水來聽范𤣥長吟聲聲扣出碧琅玕能使秋猿欲叫難詩興未窮心更逺手埀青拂向雲看觀葉生畫花心竅玲瓏貌亦奇榮枯只在手中移今朝故向霜天裏㸃破繁花四五枝洗丹沙詞千淘萬洗紫光攢夜火熒熒照玉盤恐是麻姑殘米粒不曾將與世人看長安春夜吟露盤滴時河漢微美人燈下裁春衣蟾蜍東去鵲南飛藝香省中郎不歸自述篋貯靈沙日日看欲成仙法脫身難不知誰向交州去為謝羅浮葛長官少年行醉騎白馬走空衢惡少皆稱電不如五鳯街頭新勒轡半埀衫袖揖金吾越中遇寒食去嵗清明霅溪口今朝寒食鏡湖西信知天地心不易還有子規依舊啼贈採藥叟老去唯將藥裏行無家無纍一身輕却教年少取書卷小字燈前鬬眼明清夜憶仙宫子夜靜門深紫洞煙孤行獨坐憶神仙三清宫裏月如晝十二宫樓何處眠江南怨愁見橋邊荇葉新蘭舟枕水楫生塵從來不是無蓮采十頃蓮塘賣與人送絶塵子歸舊隱二首雲水千重繞洞門獨歸何處是桃源仙方不用隨身去留與人間老子孫班藤為杖草為衣萬壑千峯獨自歸縱令相憶誰相報桂樹巖邊人信稀送裴秀才歸淮南怪來頻起詠刀頭楓葉枝邊一夕秋又向江南别才子却將風景過揚州錢塘渡口天塹茫茫連沃焦秦皇何事不安橋錢塘渡口無錢納已失西興兩信潮春日宴徐君池亭暫憑春酒換愁顔今日應須醉始還池上有門君莫掩從教野客見青山山中送友人欲折楊枝别恨生一重枝上一啼鶯亂山重疊雲相掩君向亂山何處行寄王少府采松仙子徒銷日喫菜山僧枉過生多謝藍田王少府人間詩酒最關情贈女道士鄭玉華二首𤣥髮新簪碧藕花欲添肌雪餌紅沙世間風景那堪戀長笑劉郎漫憶家明鏡湖中休采蓮却師阿母學神仙朱絲誤落青囊裏猶是箜篌第幾絃寄西臺李侍御二千餘里採瓊瓌到處傷心瓦礫堆唯有繡衣周柱史獨將珠玉挂西臺贈凌仙姥阿母從天降幾時前朝唯有漢皇知仙桃不啻三回熟飽見東方一小兒晚春送王秀才游剡川越山花去剡藤新才子風光不厭春第一莫尋溪上路可憐仙女愛迷人馮上人院擾擾凡情逐水流世間多喜復多憂一回行到馮公院便欲令人百事休金吾詞行擁朱輪錦幨兒望仙門外叱金羈染鬚偷嫩無人覺唯有平康小婦知觀舞女纒紅結紫畏風吹嫋娜初回弱栁枝買笑未知誰是主萬人心逐一人移鄠縣村居欲往村西日日慵上山無水引髙蹤誰能求得秦皇術為我先驅紫閣峯酬周秀才三展蜀箋皆郢曲我心珍重甚瓊瑶應緣水府龍神睡偷得蛟人五色綃旅次文水縣喜遇李少府為君三日廢行程一縣官人是酒朋共憶襄陽同醉處尚書坐上納銀觥夏雨後題青荷蘭若僧舍清涼竹樹新初經一雨洗諸塵微風忽起吹蓮葉青玉盤中㵼水銀途中逢少女身倚西門笑向東牡丹初折一枝紅市頭日賣千般鏡知落誰家新匣中山中玩白鹿繞洞尋花日易銷人間無路得相招呦呦白鹿毛如雪踏我桃花過石橋山居樂鸞鶴每於松下見笙歌常向坐中聞手持十節龍頭杖不指虛空即指雲襄陽曲大堤女兒郎莫尋三三五五結同心清晨對鏡理容色意欲取郎千萬金望夫詞三首看看北鴈又南飛薄幸征夫久不歸蟢子到頭無信處凡經幾度上人衣手爇寒燈向影頻回文機上暗生塵自家夫壻無消息却恨橋頭賣卜人何事經年斷書信愁聞逺客說風波西家還有望夫伴一種淚痕兒最多少婦游春詞簇錦攢花鬬勝遊萬人行處最風流無端自向春園裏笑摘青梅叫阿侯折栁枝傷見路邊楊栁春一重折盡一重新今年還折去年處不送去年離别人歸將吟百戰放歸成老翁餘生得出死人中今朝授勑三回舞兩賜青娥又拜公惜花詞千樹繁紅繞碧泉正冝尊酒對芳年明朝欲飲還來此只怕春風却在前拋纒頭詞翠娥初罷繞梁詞又見雙鬟對舞時一抱紅羅分不足參差裂破鳯凰兒望騎馬郎碧蹄新壓步初成玉色郎君弄影行賺殺唱歌樓上女伊州誤作石州聲春日錢塘雜興二首酒姥溪頭桑嫋嫋錢塘郭外栁毶毶路逢鄰婦遙相問小小如今學養蠶西鄰年少問東鄰桞岸花隄幾處新昨夜雨多春水闊隔江桃葉喚何人玩手植松却思毫末栽松處青翠才將衆草分今日散材遮不得看看氣色欲凌雲夜笛詞皎潔西樓月未斜笛聲寥亮入東家却令燈下裁衣婦誤剪同心一半花贈鄭倫吹鳯管喃喃解語鳯凰兒曾聽梨園竹裏吹誰謂五陵年少子還將此曲暗相隨蜀茗詞越碗初盛蜀茗新薄煙輕處攪來勻山僧問我將何比欲道瓊漿却畏嗔春霽煎茶水裏花千片候客亭中酒一樽獨對春光還寂寞羅浮道士忽敲門諷山雲閒雲生葉不生根常被重重蔽石門賴有風簾能掃蕩滿山晴日照乾坤日晚歸山詞虎跡新逢雨後泥無人家處洞邊溪獨行歸客晚山裏賴有鷓鴣臨路岐玩花詞今朝造化使春風開拆西施面上紅竟日眼前猶不足數株舁入寸心中萬首唐人絶句卷三十三
