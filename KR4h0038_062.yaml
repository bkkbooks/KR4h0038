body:
  text: 萬首唐人絶句巻六十二宋洪邁編七言送日本僧歸韋莊扶桑已在𣺌茫中家在扶桑東更東此去與師誰共到一船明月一帆風對酒何用巖棲隠姓名一壺春酹可忘形伯倫若有長生術應到如今醉未醒舊里滿目牆垣春草深傷時傷事更傷心車輪馬跡一時盡十二玉樓何處尋春愁自有春愁正斷魂不堪芳草思王孫落花寂寂黄昏雨深夜無人獨倚門鄜州寒食城外醉吟五首滿街楊桞緑絲烟畫出青春二月天好是隔簾花樹動女郎撩亂送鞦韆雕隂寒食足逰人金鳳羅衣濕麝薫腸斷入城芳草路淡紅香白一羣羣開元坡下日初斜拜掃歸來走鈿車可惜數枝紅艶好不知今夜落誰家馬驕風疾玉鞭長過去唯留一陣香閒客不須燒破眼好花皆屬富家郎雨絲烟桞欲清明金屋人間暖鳳笙永晝迢迢無一事隔街聞築氣毬聲揺落揺落秋天酒易醒悽悽長是别離情黄昏倚柱不歸去腸斷緑荷風雨聲令狐亭若非天上神仙宅須是人間將相家想得當時好風月管絃吹殺後庭花江上别李秀才二首千山紅樹萬山雲把酒相看日又曛一曲離歌兩行淚更知何地再逄君前年相送灞陵春今日天涯各避秦莫向樽前惜沈醉與君俱是異鄉人語松竹庭前芳草緑如袍堂上詩人欲二毛多病不禁秋寂寞雨風松竹暮騷騷姫人養蠶昔年愛笑蠶家婦今日辛勤自養蠶仍道不愁羅與綺女郎初解織桑籃東陽酒家贈别二首送君同上酒家樓酩酊飜成一笑休正是落花饒悵望醉鄉前路莫回頭天涯方歎異鄉身又向天涯别故人明日五更孤店月醉醒何處各沾巾長干塘别徐茂才亂離時節别離輕别酒應須滿滿傾纔喜相逢又相送有情争得似無情江行西望西望長安白日遥半年無事駐蘭橈欲將張翰松江雨畫作屏風寄鮑昭驚秋不向烟波狎釣舟强將文墨事儒邱長安十二槐花陌曾負秋風多少秋離筵訴酒感君情重惜分離送我殷勤酒滿巵不是不能判酩酊却憂前路醉醒時題盧拾遺莊主父西逰去不歸滿溪春雨長春薇怪來馬上詩情好㸃破青山白鷺飛白牡丹閨中莫妬新粧婦陌上須慚傅粉郎昨夜月明渾似水入門唯覺一庭香題許渾詩巻江南才子許渾詩字字清新句句竒十斛明珠量不盡惠休虛作碧雲詞贈禮佛名者何用辛勤禮佛名我從無事到真庭尋思六祖傳心印可是從來讀藏經解維又解征帆落照中暮程還過秣陵東三年辛苦烟波裏贏得風姿似釣翁雨霽池上作鹿巾藜杖葛衣輕雨歇池邉晚吹清正是今時江上好白鱗紅稻紫蓴羮古别離二首晴烟漠漠桞毿毿不那離情酒半酣更把馬鞭雲外指斷腸春色在江南一生風月俱惆悵到處烟花恨别離止竟多情何處好少年長抱長年悲江亭酒醒别筵人散酒初醒江岸黄昏雨雪零滿座綺羅皆不見覺來紅燭背銀屏棹亭驛小桃花當年此樹正花開五馬僊郎載酒來李白已亡工部死何人空伴玉山頽憫耕者何代何王不戰争盡從離亂見清平如今暴骨多於土猶㸃鄉兵作戍兵含山店夢覺作曾是流離慣别家等閒揮杖各天涯燈前一夢江南覺惆悵起來山月斜壺關道中作處處兵戈路不通却從山北去江東黄昏欲到壺關寨疋馬寒嘶野草中金陵圖二首誰為傷心畫不成畫人心逐世人情君㸔六幅南朝事老木寒雲滿故城江雨霏霏江草齊六朝如夢鳥空啼無情最是臺城桞依舊烟籠十里堤送人遊并汾風雨蕭蕭欲暮秋獨攜孤劍塞垣遊如今敵騎方南牧莫過陰闗第一州江外思歸年年春日異鄉悲社曲黄鶯可得知更被夕陽江岸上斷腸烟柳一絲絲夢入闗夢中乘傳過闗亭南望蓮峯簇簇青馬上正吟歸去好覺來江月滿前汀送人歸上國送君江上日西斜泣向江邊滿樹花若見青雲舊相識為言流落在天涯聞春鳥雨時春鳥滿江村還是長安舊日聞紅杏花前應笑我我今憔悴亦羞君獨鶴夕陽灘上立徘徊紅蓼風前雪翅開應為不知棲宿處㡬囘飛去又飛來新栽竹寂寞階前種此君遶欄吟罷却沾巾異鄉流落誰相識唯有叢篁伴主人題酒家酒綠花紅客愛詩落花春岸酒家旗尋思避世為逋客不醉長醒也是癡殘花二首和烟和雨雪離披金蘂紅鬚尚滿枝十日笙歌一宵夢苧羅烟雨失西施江頭沈醉泥斜暉却向花前慟哭歸惆悵一年春又去碧雲芳草兩依依稻田浪波春稻滿前坡極目連雲𥝧稏肥更被鷺鷥千㸃白披烟來入畫屏飛燕來去歳辭巢別近鄰今來空訝草堂新花間對語應相問不是村中舊主人倚柴扉䇿杖無言獨倚闗如癡如醉夢魂間孤吟盡日何人㑹依約前山似故山七步廊杜門無計奈殘陽更接簷前七步廊不羨東都丞相宅每行吟得好文章寄舍弟每吟富貴他人合不覺汍瀾又溼衣萬里日邊鄉樹逺何年何路得同歸僕者楊金半年辛苦葺荒居不獨單寒腹亦虛努力且為田舍客他年為爾覓金魚春陌二首滿街芳草卓香車仙子門前白日斜腸斷東風各囘首一枝春雪凍梅花嫩烟輕染柳絲黄句引花枝笑凭牆馬上王孫莫囘首好風偏逐羽林郎中酒南鄰酒熟愛相招蘸甲傾來綠滿瓢一醉不知三日事任他童稚作漁樵暴雨江村入夏多雷雨曉作狂霖晩又晴波浪不知深㡬許南湖今與北湖平晏起爾來中酒起常遲卧看南山改舊詩開户日髙春寂寂數聲啼鳥上花枝幽居春思綠映紅藏江上村一聲雞犬似仙源閉門盡日無人到翠羽春禽滿樹喧思歸引越鳥南翔雁北飛兩鄉雲路各言歸如何我是飄飄者獨向江頭戀釣磯與小女見人初解語嘔啞不肯歸眠戀小車一夜嬌啼緣底事為嫌衣少縷金華虎跡白額頻頻夜到門水邊踪跡漸成羣我今避世棲巖穴巖穴如何又見君買酒不得停樽待爾怪來遲手挈空瓶毷氉歸滿面春愁消不得更看溪鷺寂寥飛得故人書正向溪頭自采蘇青雲忽得故人書殷勤問我歸來否雙闕而今畫不如洪州送僧遊福建八月風波似鼔鼙可堪波上各東西殷勤早作歸來計莫戀猿聲住建溪聞囘戈軍上將鏖兵又去旋翠華巡幸已三年營中不用栽楊柳願戴儒冠為控弦南鄰公子南鄰公子夜歸聲數炬銀燈隔竹明醉凭馬鬃扶不起更邀紅袖出門迎贈野僧羡爾無知野性真亂搔蓬鬢笑看人閒衝暮雨騎牛去肯問中興社稷臣傷富民犯酒沒産自此改法不入財産誰氏園林一簇烟路人揺指盡長歎桑林稻澤今無主新犯香醪没入官感羣兒戲為陣已聞三世歿軍營又見兒孫學戰争見爾此言堪慟哭遣予何日望時平尋李書記不遇白雲紅樹繞琅東夕鳥羣飛古道中仙吏不知何處隠山南山北雨濛濛題貂黄嶺官亭散騎蕭蕭下太忙逺從吳㑹去陳倉斜風細雨江亭上盡日凭欄獨望鄉題櫻桃樹記得初開雪滿枝和蜂和蝶帶花移而今花落逰蜂去空作主人惆悵詩庭前菊為憶長安爛漫開我今移爾滿庭栽紅蘭莫笑青青色曾向龍山泛酒來憶小女銀娘睦州江上水門西蕩槳揚帆各解携今日天涯夜深坐斷腸偏憶阿銀犁女僕阿汪念爾辛勤嵗已深亂離相失又相尋他年待我門如市報爾千金與萬金河清縣河亭由來多感莫憑髙竟日衷腸似有刀人事任成陵與谷大河東去自滔滔鍾陵夜闌作鍾陵風雪夜將深坐對寒江獨苦吟流落天涯誰見問少卿應識子卿心宿蓬船夜來江雨宿蓬船卧聴淋泠不忍眠却憶紫㣲清調逸阻風中酒過年年和工部楊尚書重送姚鵠桂枝攀得獻庭闈何似空懷楚橘歸好控扶揺早回首人人思看大鵬飛宫詞長孫翺一道甘泉接御溝上皇行處不曾秋誰言水是無情物也到宫前咽不流題越王臺崔向越井岡頭松柏老越王臺上生秋草古墓多年無子孫牛羊踐踏成官道十二月樂詞李賀日脚澹光紅灑灑薄霜不消桂枝下依稀和氣解冬嚴已就長月辭長夜江上得芙蓉崔希舟物觸輕舟心自知風恬烟静月光㣲夜深江上添愁思拾得紅蕖香惹衣贈韋氏女鄭徳璘纎手垂鈎對水忩紅蕖秋色艶長江既能觧佩投交甫更有明珠乞一雙弔江姝二首湖面征帆且莫吹浪花初綻月光輝沈潛暗想横波淚得共鮫人相對垂洞庭風軟荻花秋新沒青娥細浪愁淚滴白蘋君不見月明江上有輕鷗譏張延賞郭圓宣父從周又過秦昔賢誰少出風塵當時亦訝張延賞不識韋臯是貴人詠王大娘戴竿劉晏樓前百戲競争新唯有長竿妙入神誰謂綺羅翻有力猶自嫌輕更著人舉子騎驢無名子今年敇下盡騎驢短冑長鞦徧九衢清瘦兒郎猶自可就中愁殺鄭昌圖題西明院房姚家新壻是房郎未解芳顔意欲狂見説正調穿羽箭莫教射破寺家墻詠李逢吉取寒素元和天子丙申年三十三人同得僊袍似爛銀文似錦相將白日上青天戲周顗浙西從事龍津掉尾十年勞聲價當時鬭月髙唯有紅粧回舞手似持雙刄向猿猱答從事周顗十載文場敢憚勞宋都回鷁為風髙今朝甘被花枝笑任道尊前愛縛猱嘲郭凝素朱澤三春桃李本無言苦被殘陽鳥雀喧借問東鄰効西子何如郭素擬王軒譏張濬閲牡丹伶人位乖燮理致傷殘四面墻垣不忍看正是花時堪下淚相公何必更追歡織錦人吟學織繚綾功末多亂拈機杼錯抛梭莫教宫錦行家見把此文章笑殺他戲狀元崔昭緯千里江山陪驥尾五更風水失龍鱗昨夜浣花溪上雨緑楊芳草為何人嘲陸暢元和内人十二層樓倚翠空鳳鸞相對並梧桐雙成走報監門衛莫使吳㱃入漢宫解嘲陸暢粉面僊郎選聖朝偶逢秦女學吹簫須教翡翠聞王母不奈烏鳶噪鵲橋題牡丹一種芳菲出後庭却輸桃李得佳名誰能為向天人説從此移根近太清萬首唐人絶句巻六十二
