body:
  text: 萬首唐人絶句卷十二宋洪邁編七言得錢舍人書問眼疾白居易春來眼暗少心情點盡黃連尚未平惟得君書勝得藥開緘未讀眼先明九日寄行簡摘得菊花攜得酒遠村騎馬思悠悠下邽田土平如掌何處登高望梓州村居田園蒼莽經春早籬落蕭條盡日風若問經過談笑者不過田舍白頭翁王昭君二首滿靣胡沙滿鬢風眉銷殘黛臉銷紅愁苦辛勤憔悴盡如今却似畫圖中漢使却回憑寄語黃金何日贖蛾眉君王若問妾顔色莫道不如宫裏時遊城南留元九李二十晚歸老遊春飲莫相違不獨花稀人亦稀更勸殘杯看日影猶應趂得鼓聲歸重見元九容貌一日減一日心情十分無九分每逢陌路猶嗟歎何況今朝是見君高相宅青苔故里懷恩地白髮新生抱病身涕泪雖多無哭處永寧門館屬他人張十八諫垣幾見遷遺補憲府頻聞轉殿監獨有詠詩張太祝十年不改舊官銜劉家花劉家墻上花還發李十門前草又春處處傷心心始悟多情不及少情人裴五莫怪相逢無笑語感今思舊戟門前張家伯仲偏相似每見清揚一惘然仇家酒年年老去歡情少處處春來感事深時到仇家非愛酒醉時心勝醒時心恆寂師舊遊分散人零落如此傷心事幾條會逐禪師坐禪去一時滅盡定中消靖安北街贈李二十榆莢拋錢桞展眉兩人並馬語行遲還似往年安福寺共君私試却回時賦得聽邉鴻驚風吹起塞鴻羣半拂平沙半入雲為問昭君月下聽何如蘇武雪中聞和元八侍御升平新居四絶句看花屋忽驚映樹新開屋却似當簷故種花可惜年年紅似火今春始得屬元家纍土山堆土漸高山意出終南移入户庭間玉峯藍水應惆悵恐見新山望舊山高亭亭脊太高君莫折東家留取當西山好看落日斜㗸處一片春嵐映半環松樹白金換得青松樹君既先栽我不栽幸有西風應憑仗夜深偷送好春來醉後却寄元九蒲池村裏匆匆别灃水橋邉兀兀回行到城門殘酒醒萬重離恨一時來重别華陽觀舊居憶昔初年三十二當時秋思已難堪若為重入華陽院病鬢愁心四十三答勸酒莫怪近來都不飲幾回因醉却沾巾誰料平生狂酒客如今變作酒悲人題王侍御池朱門深鎖春池滿岸落薔薇水浸莎畢竟林塘誰是主主人來少客來多聽水部吳員外新詩朱紱仙郎白雪歌和人雖少愛人多明朝與向詩家道水部如今不姓何雨夜憶元九天隂一日但堪愁何況連宵雨不休一種雨中君最苦偏梁閣道向通州雨中攜元九訪元八侍御微之詩卷憶同開假日多應不入臺好句無人堪共詠衝泥踏水就君來寄生衣與微之淺色縠衫輕似霧紡花紗褲薄於雲莫嫌輕薄但知著猶恐通州熱殺君白牡丹白花冷淡無人愛亦占芳名道牡丹應似東宫白贊善被人還喚作朝官夢舊别來老大苦修道鍊得離心成死灰平生憶念消磨盡昨夜因何入夢來戲題盧祕書新移薔薇風動翠條腰嫋娜露垂紅蕚淚闌干移他到此須為主不為花人莫使看曲江夜歸聞元八見訪自入臺來見靣稀班中遙得揖容輝早知相憶來相訪悔待江頭明月歸苦熱題恆寂師禪室人人避暑走如狂獨有禪師不出房可是禪房無熱到但能心靜即身涼病中答招飲者願我鏡中悲白髮盡君花下醉青春不緣眼痛兼身病可是尊前第二人燕子樓三首滿忩明月滿簾霜被冷燈殘拂卧牀燕子樓中霜月夜秋來只為一人長鈿暈羅衫色似煙幾回春暮即􅏰然自從不舞霓裳曲疊在空箱十一年今春有客洛陽回曾到尚書墓上來見説白楊堪作柱爭教紅粉不成灰初貶官過望秦嶺草草辭家憂後事遲遲去國問前途望秦嶺上回頭立無限秋風吹白鬚藍橋驛見元九詩藍橋春雪君歸日秦嶺秋風我去時每到驛亭先下馬循墻繞柱覔君詩韓公堆寄元九韓公堆北澗西頭冷雨涼風拂靣秋努力南行少惆悵江州猶似勝通州武關南見元九題山石榴花見寄往來同路不同時前後相思兩不知行過關門三四里榴花不見見君詩題商山廟卧逃秦亂起安劉舒卷如雲得自由若有精靈應笑我不成一事謫江州白鷺人生四十未全衰我為愁多白髮垂何故水邉雙白鷺無愁頭上亦垂絲江上吟元八絶句大江深處月明時一夜吟君小律詩應有水仙濳出聽翻將唱作步虛詞登郢州白雪樓白雪樓中一望鄉青山簇簇水茫茫朝來渡口逢京使説道煙塵近洛陽舟夜贈內三聲猿後垂鄉淚一葉舟中載病身莫憑水囱南北望月明月暗向愁人逢舊我留白髮添新恨君掃青娥減舊容應被傍人怪惆悵少年離别老相逢浦中夜泊暗上江隄還獨立水風霜氣夜稜稜回看深浦停舟處蘆荻花中一點鐙舟中讀元九詩把君詩卷燈前讀詩盡燈殘天未明眼痛滅燈猶暗坐送風吹浪打船聲題李山人厨無煙火室無妻籬落蕭條屋舍低每日將何療飢渴井華雲粉一刀圭歲暮道情二首壯日苦曾經歲月長年都不惜花隂為學空門平等法先齊老少死生心半故青衫半白頭雪風吹靣上江樓禪功自見無人覺合是愁時亦不愁強酒若不坐禪銷妄想即須行醉放狂歌不然秋月春風夜爭那間思往事何聽崔七妓人筝花臉雲鬟坐玉樓十三絃裏一時愁憑君向道休彈去白盡江州司馬頭望江州江回望見雙華表知是潯陽西郭門猶去孤城三四里水煙沙雨欲黃昏宿西林寺木落天晴山翠開愛山騎馬入山來心知不及柴桑令一宿西林便却回代春贈山吐晴嵐水放光辛夷花白桞梢黃但知莫作江西意風景何曾異帝鄉答春草煙低重水花明從道風光似帝京其奈山猿江上呌故鄉無此斷腸聲惜落花贈崔二十四漠漠紛紛不奈何狂風急雨兩相和晚來悵望君知否枝上稀疏池上多移山櫻桃亦知官舍非吾宅且斸山櫻滿院栽上佐近來多五考少應四度見花開見紫薇花憶微之一叢暗淡將何比淺碧籠裙襯紫巾除却微之見應愛人間少有惜花人過鄭處士聞道移居村塢間竹林多處獨開關故來不是求他事暫借南亭一望山題廬山山下湯泉一眼湯泉流向東浸泥澆草暖無功驪山溫水因何事流入金鋪玉甃中秋熱西江風候接南威暑氣常多秋氣微猶道江州最涼冷至今九月著生衣階下蓮葉展影翻當砌月花開香散入簾風不如種在天池上猶勝生於野水中廳前桂天台嶺上凌霜樹司馬廳前委地叢一種不生明月裏山中猶較勝塵中聞李十一出牧灃州崔二十二出牧果州因寄絶句平生相見即眉開靜念無如李與崔各是天涯為刺史緣何不覔九江來上香爐峯倚石攀蘿歇病身青笻竹杖白紗巾他時畫出廬山障便是香爐峯上人三月三日登庾樓寄庾三十二三日歡遊辭曲水三年愁卧在長沙每登高處長相憶何況茲樓屬庾家大林寺桃花人間四月芳菲盡山寺桃花始盛開長恨春歸無覔處不知轉入此中來箬峴東池箬峴亭東有小池早荷新荇緑參差中宵把火行人發驚起雙棲白鷺鷥建昌江建昌江水縣門前立馬教人喚渡船忽憶往年歸蔡渡草風沙雨渭河邉哭從弟傷心一尉便終身叔母年高新婦貧一片緑衫消不得腰金拖紫是何人臨水坐昔為東掖垣中客今作西方社內人手把楊枝臨水坐間思往事似前身讀僧靈徹詩東林寺裏西廊下石片鐫題四首詩言句怪來還校别看名知是老湯師聽琵琶聲似胡兒彈舌語愁如塞月恨邉雲間人暫聽猶眉斂可使和蕃公主聞間吟自從苦學空門法銷盡平生種種心唯有詩魔降未得每逢風月一間吟戲問山石榴小樹山榴近砌栽半含紅蕚帶花來爭知司馬夫人妬移到庭前便不開湖上間望藤花浪沸紫茸條菰葉風翻緑剪刀間弄水芳生楚思時時合眼詠離騷夢微之辰起臨風一惆悵通川湓水斷相聞不知憶我因何事昨夜三回夢見君題韋家泉池泉落青山出白雲縈村繞郭幾家分自從引作池中水深淺方圓一任君點額魚龍門點額意何如紅尾青鬐却返初見説在天行雨苦為龍未必勝為魚聞龜兒詠詩憐渠已解詠詩章搖膝支頥學二郎莫學二郎吟太苦才年四十鬢如霜對酒未濟卦中休卜命參同契裏莫勞心無如飲此銷愁物一餉愁銷直萬金東墻百合樹去秋為風雨所摧今年花時悵然有感碧荑紅樓今何在風雨飄將去不回惆悵去年墻下地今春唯有薺花開病起病不出門無限時今朝強出與誰期經年不上江樓醉勞動春風揚酒旗夢亡友劉太白同遊彰敬寺三千里外卧江州十五年前哭老劉昨夜夢中彰敬寺死生魂魄暫同遊與果上人殁時題此決别兼簡二林僧社本願結菩提香火社為嫌煩惱電泡身不須惆悵從師去先請西方作主人劉十九同宿紅旗破賊非吾事黃紙除書非我名唯共嵩陽劉處士圍棋賭酒到天明衰病老辭遊冶尋花伴病到荒狂舊酒徒更恐五年三歲後些些談笑亦應無答微之君寫我詩盈寺壁我題君句滿屏風與君相遇知何處兩葉浮萍大海中戲答諸少願我長年頭似雪饒君壯歲氣如雲朱顔今日雖欺我白髮他時不放君題崔使君新樓憂人何處可銷憂碧甃紅闌湓水頭從此潯陽風月夜崔公樓贊庾公樓醉吟二首空王百法學未得姹女丹砂燒即飛事事無成身也老醉鄉不去欲何歸兩鬢千莖新似雪十分一盞欲如泥酒狂又引詩魔發日午悲吟到日西湖亭與行簡宿潯陽少有風情客招宿湖亭盡却回水檻虛涼風月好夜深惟共阿憐來贈江客江桞影寒新雨地塞鴻聲急欲霜天愁君獨自沙頭宿岸繞蘆花月滿船問韋山人身名身事兩蹉跎試就先生問若何從此神仙學得否白鬚雖有未為多送蕭錬師步虛詩二首欲上瀛洲臨别時贈君十首步虛詞天仙若愛應相問向道江州司馬詩花紙瑶緘松墨字把將天上共誰開試呈王母如堪唱發遣雙成更取來贈李兵馬使身得二師餘氣概家藏都尉舊詩章江南别有樓船將燕頷虬鬚不姓楊萬首唐人絶句卷十二欽定四庫全書萬首唐人絶句卷十二宋洪邁編五言太平詞二首王涯風俗今和厚君王在穆清行看採花曲盡是太階平聖德超千古皇威靜四方蒼生今息戰無事覺時長遊春曲二首萬樹江邊杏新開一夜風滿園深淺色照在緑波中上苑何窮樹花開次第新香車與絲騎風靜亦生塵送春詞日日人空老年年春更歸相歡在尊酒不用惜花飛塞上曲二首天驕逺塞行出鞘寶刀鳴定是酬恩日今朝覺命輕塞北常為敵邊風已報秋平生多志氣箭底覓封侯從軍詞二首旍甲從軍久風雲識陳難今朝拜韓信計日斬成安燕頷多竒相狼頭敢犯邊寄言班定逺正是立功年隴上行負劒到邊州鳴笳度隴頭雲黃知塞近草白見邊秋閨人贈逺五首花眀綺陌春栁拂御溝新為報遼陽客流芳不待人逺戍功名薄幽閨年貌傷妝成對春樹不語淚千行啼鶯緑樹深語燕雕梁晚不省出門行沙場知近逺形影一朝别煙波千里分君看望君處祗是起行雲洞房今夜月如練復如霜為照離人恨亭臺到曉光宫中樂五首令狐楚楚塞金陵靖巴山玉壘空萬方無一事端拱大眀宫雪霽長楊苑冰開太液池宫中行樂日天下盛眀時栁色煙相似梨花雪不如春風真有意一一麗皇居月上宫花靜煙含苑樹深銀臺門已閉仙漏夜沈沈九重青瑣闥百尺碧雲樓眀月秋風起珠簾上玉鉤遊春詞三首曉遊臨碧殿日上望春亭芳樹羅仙仗青山展翠屏一夜好風吹新花一萬枝風前調玉管花下簇金羈閶闔春風起蓬萊雪水消相將折楊栁爭取最長條逺别離二首楊栁黃金穗梧桐碧玉枝春來消息斷早晚是歸期玳織黃金履金裝翡翠篸畏人相借問不擬到城南長相思二首君行登隴上妾夢在閨中玉筯千行落銀牀一半空幾度春眠覺紗窗曉望迷朦朧殘夢裏獨自在遼西從軍行五首荒雞隔水啼汗馬逐風嘶終日隨征斾何時罷鼓鼙孤心眠夜雪滿眼是秋沙萬里猶防塞三年不見家卻望冰河闊前登雪嶺髙征人幾多在又擬戰臨洮朔風千里驚漢月五更眀縱有還家夢猶聞出塞聲暮雪連青海隂霞覆白山可憐班定逺生入玉門關思君恩三首小苑鶯歌歇長門蝶舞多眼看春又去翠輦不曾過雞鳴天漢曉鶯語禁林春誰入巫山夢唯應洛水神紫禁香如霧青天月似霜雲韶何處奏只是在昭陽王昭君錦車天外去毳幕雲中開魏闕蒼龍逺蕭關赤鴈哀仙娥今下嫁驕子自同和劒戟歸田盡牛羊繞塞多聖眀朝三首張仲素玉帛殊方至歌鐘比屋聞華夷今一貫同賀聖朝君海浪恬丹徼邊塵靜黑山從今萬里外不復鎖蕭關九陌祥煙合千春瑞月眀宫花將苑栁先發鳳凰城宫中樂五首網戶交如綺紗窗薄似煙樂吹天上曲人是月中仙翠匣開寒鏡珠叉挂步搖妝成祗畏曉更漏促春宵紅果瑶池實金盤露井冰甘泉將避暑臺殿曉光凝月采浮鸞殿砧聲隔鳳樓笙歌臨水檻紅燭乍迎秋竒樹留寒翠神池結夕波黃山一夜雪渭水瀉聲多春遊曲三首煙栁飛輕絮風榆落小錢濛濛百花裏羅綺競鞦韆騁望登香閣爭髙下砌臺林間踏青去席上寄箋來行樂三春節林花百和香當年重意氣先占鬭雞場春閨思三首雪盡萱抽葉風輕水變苔玉關書信絶又見發焦梅裊裊城邊栁青青陌上桑提籠忘采葉昨夜夢漁陽戴勝飛晴野凌澌下濁河春風樓上望誰見淚䀶多春江曲三首搖漾越江春相將采白蘋歸時不覺夜出浦月隨人家寄征河岸征人幾嵗遊不如潮水信每日到沙頭乘曉南湖去參差疊浪橫前洲在何處霜裏鴈嚶嚶晚日湖上寄所思李華與君為近别不啻逺相思落日平湖上看山對此時寄從弟眼病身亦病浮生已半空迢迢千里月應與惠連同奉寄彭城公公子三千客人人願報恩應憐抱關者貧病老夷門詠項羽于季子北伐雖全趙東歸不王秦空歌拔山力羞作渡江人慈恩寺殘春耿湋雙林花已盡葉色占殘芳若問同遊客高年最斷腸秋夜高秋夜分後逺客鴈來時寂寂重門掩無人問所思早行匹馬曉路歸悠悠渭川道晴山向孤城秋日滿白草左掖梨花丘為冷艷全欺雪餘香乍入衣春風渾不定吹向玉階飛奉酬韋應物丘丹露滴梧葉鳴風秋桂花發中有學仙侣吹簫弄山月又酬贈久作煙霞侣暫將簮組親還同褚伯玉入館忝州人聽江笛送陸侍御離樽聞夜笛寥亮入寒城月落車馬徹悽惻主人情靜夜相思李羣玉山空天籟寂水榭延輕涼浪定一浦月藕花間自香桂州經佳人故居桂水依舊緑佳人本不還秪應隨暮雨飛入九疑山放魚早覔為龍去江湖莫漫遊須知香餌下觸口是銛鉤蓮葉根是泥中玉心承露下珠在君塘下種埋沒任春蒲客愁二首客愁看栁色日日逐春深蕩漾春風起誰知厯亂心客愁看栁色日日逐春長憑送湘流水綿綿入帝鄉洞庭乾二首借問蓬萊水誰逢清淺年傷心雲夢澤嵗嵗作桑田朱宫紫具闕一旦作沙洲八月還平在魚蝦不用愁病起别主人益愧千金少情將一飯殊恨無泉客淚盡泣感恩珠火爐前坐孤燈照不寐風雨滿西林多少關心事書灰到夜深古詞一合相思淚臨江灑素秋碧波如會意却與向西流嘲賣藥翁斸盡春山土辛勤賣藥翁莫拋破笠子留作敗天公傷小女哭爾春日短支頥長歎嗟不如半死樹猶吐一枝花青鷁獨立蒹葭雨低飛浦嶼風須知毛色下莫入鷺鷥叢池塘晚景風荷珠露傾驚起睡鵁鶄月落池塘靜金刀剪一聲投從叔可惜出羣蹄毛焦久卧泥孫陽如不顧騏驥向誰嘶惱自澄常聞天女會玉指散天花莫遣春風裏紅芳點架裟讀賈誼傳卑濕長沙地空拋出世才已齊生死理服鳥莫為災寄人寄語雙蓮子須知用意深莫嫌一點苦便擬棄蓮心寄韋秀才荆臺蘭渚客寥落共含情空館相思夜孤燈照雨聲春日寄友晴氣熏櫻蘂丰濛雪滿林請君三斗酒醉卧白羅岑題竹一頃含秋緑森風十萬竿氣吹朱夏轉聲掃碧霄寒懷初公不見休上人空傷碧雲思何處開寶書秋風海光寺龍安寺佳人阿最歌八首團團眀月面冉冉栁枝腰未入鴛鴦被心長似火燒見面知何益聞名憶轉深拳攣荷葉子未得展蓮心欲摘不得摘如看波上花若教親玉樹情碩作蒹葭門路穿茶焙房門映竹煙會須隨鹿女乞火到窗前不是求心印都緣愛緑珠何須同泰寺然後始為奴既為金界客任改淨人名願掃琉璃地燒香過一生素腕撩金索輕紅約翠紗不如欄下水終日見桃花第一龍宫女相憐是阿誰好魚輸獺盡白鷺鎮長飢送人入金華嚴維眀月雙溪水清風八詠樓少年為客處今日送君遊城隍廟賽雨二首羊士諤零雨慰斯人齋心薦緑蘋山風簫鼓響如祭敬亭神積潤通千里推誠奠一巵回飊經畫壁忽似偃雲旗初移琪樹愛此丘中物煙霜盡目看無窮白雲意更助緑窗寒萬首唐人絶句卷十二
