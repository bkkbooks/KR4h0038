body:
  text: 萬首唐人絶句卷六十八宋洪邁編七言早入中書錢珝不意雲霄能自致空驚鴛鷺忽相隨臘雪新晴柏子殿春風欲上萬年枝和王貟外雪晴早朝紫微晴雪帶恩光繞仗偏隨鴛鷺行長信月留寧避曉宜春花滿不飛香請告出春明門李羣玉本不將心挂名利亦無情意在樊籠鹿裘藜杖且歸去冨貴榮華春夢中旅游番禺獻涼公帝鄉羣侣杳難尋獨立滄州歲暮心野鶴飛栖無逺近稻粱多處是恩深張璪璧畫片石長松倚素楹翛然雲壑見髙情世人只愛凡花鳥無處不知梁廣名書院二小松一雙幽色出凡塵數粒秋煙二尺鱗從此靜窗聞細韻琴聲長伴讀書人言懷白鶴高飛不逐羣嵇康琴酒鮑昭文此身未有棲歸處天下人間一片雲勸入廬山讀書憐君少雋利如鋒氣爽神清刻骨聰片玉若磨唯轉瑩莫辭雲外入廬峯聞笛冉冉生山草何異截而吹之動天地望鄉臺上望鄉時不獨落梅兼落淚曉宴金波西傾銀漢落緑樹含煙倚朱閣曉華䏊聰聞調笙一㸃殘燈隔羅幕將遊荆州投魏中丞貧埋病壓老巑岏拂拭菱花不喜看又恐無人肯青眼事須慿仗小還丹二辛夷狂吟亂舞雙白鶴霜翎玉羽紛紛落空庭向晚春雨微却斂寒香抱瑶蕚題龍潭西齊寂寞幽齊暝煙起滿徑西風落松子逺公一去兜率宫唯有門前虎溪水鏡道中吹簫陳陶金欄白的苦篸􅓕雙鳯夜伴江南棲十洲人聽玉樓曉空向千山桃杏枝贈野老何年種芝白雲裏人傳先生老萊子消磨世上名利心淡若巖間一流水宿山祠張籍秋草宫中斜裏墓宫中誰送葬來時千千萬萬皆如此家在城邉亦不知送律師歸婺州京中開講已多時曽作壇頭證戒師歸到雙溪橋北寺鄉僧爭就學威儀張蕭逺雪夜同宿數卷新遊蜀客詩長安僻巷得相隨草堂雪夜携琴宿況似青城館裏時送李四校書僧元孚朱絲寫别鶴泠泠詩滿紅箋月滿庭莫學楚狂隳姓字知音還有子期聽送小師勝雲皎然昨日雪山知爾名吾今坐石已三生少年道性易流動莫遣秋風入别情送僧遊福州禪子自矜禪性成將心擬㸃建溪清南看閩樹花不落更取何情了妄情題三鄉驛若耶溪女子昔逐良人西入關良人身沒妾空還謝娘衛女不相待為雨為雲過别山陸洞和惆悵殘花怨暮春孤鸞舞鏡倍傷神清詞好箇干人事疑是文姫第二身王祝和女几山前嵐氣低佳人留眼此中題不知雲雨歸何處空使王孫見即迷劉谷和蘭蕙芬芳見玉姿路傍花笑景遲遲苧蘿山下無窮意併在三鄉惜别時王條和浣沙游女出關東舊跡新詞一夢中槐陌桞亭何限事年年回首泣春風李昌鄴和紅粉蕭娘手自題分眀幽怨發雲閨不應更學文君去泣向殘花歸剡溪王碩和無姓無名越水濱芳詞空怨路傍人莫教才子偏惆悵宋玉東家是舊鄰李縞和會稽王謝兩風流王子沉淪謝女愁歸思若隨文字在路傍空為感千秋張綺和洛川依舊好風光蓮帳無因見女郎雲雨散來音信斷此生遺恨寄三鄉髙衢和南北千山與萬山軒車誰不思鄉關獨留芳翰悲前跡陌上恐傷桃李顔韋水和來時歡笑去時哀家國迢迢向越臺待寫百年幽思盡故宫流水莫相催楊桞枝詞韓琮枝鬭纎腰葉鬬眉春來無處不如絲霸陵原上多離别少有長條拂地垂二月二日遊洛源舊苑新晴草似苔人還香在踏青回今朝此地成惆悵已後逄春更莫來駱谷晚望秦川如畫渭如絲去國還家一望時公子王孫莫來好嶺花多是斷腸枝暮春滻水送别緑暗紅稀出鳯城暮雲宫闕古今情行人莫聽宫前水流盡年光是此聲晦日呈諸判官韓滉晦日新晴春自嬌萬家攀折渡長橋年年老向江城寺不覺東風換桞條贈去妾崔郊公子王孫逐後塵緑珠垂淚滿羅巾侯門一入深如海從此蕭郎是路人人日遇雪應制李嶠千鍾聖酒御筵披六出祥霙亂繞枝即此神仙對瓊圃何煩轍迹向瑶池送司馬先生蓬閣桃源兩處分人間海上不相聞一朝琴裏悲黃鶴何日山頭望白雲邉詞張敬忠五原春色舊來遲二月垂楊未挂絲即今河畔氷開日正是長安花落時河陽橋送别桞中庸黃河流出有浮橋晉國歸人此路遙若傍欄干千里望北風驅馬雨蕭蕭征怨歲歲金河復玉關朝朝馬䇿與刀環三春白雪歸青冡萬里黃河繞黑山涼州曲關山萬里逺征人一望關山淚滿巾清海戍頭空有月黃沙磧裏本無春高檻連天望武威窮隂拂地戍金微九城絃管聲遙發一夜關山雪滿飛寒食孟雲卿二月江南花滿枝他鄉寒食逺堪悲貧居往往無煙火不獨眀朝為子推寒食夜李宣古人定朱門尚半開初星粲粲㸃昭回此時寒食無燈燭花桞蒼蒼月欲來寒食獻羣守伍唐圭入門堪笑復堪憐三徑苔封一釣船慙愧四鄰教斷火不知厨裏久無煙奉和祓禊韋嗣立乘風祓禊逐風光扈蹕陪鑾渭渚傍還笑當時水濵老衰年八十待文王奉和祓禊沈佺期寶馬香車清渭濵紅桃碧桞禊堂春皇情尚憶垂竿佐天祚先呈捧劔人奉和祓禊李乂上林花鳥暮春時上已陪游樂在茲此日欣逄臨渭賞昔年空道濟汾詞喜韓少府見訪胡釘珓忽聞梅福來相訪笑著荷衣出草堂兒童不慣見車馬走入蘆花深處藏觀諸妓繡樣日暮堂前花蘂嬌爭拈小筆上牀描繡成安向春園裏引得黃鶯下桞條小兒垂釣蓬頭稚子學垂綸倒坐莓苔草映身路人借問遙招手恐畏魚驚不應人葬寶雞行路士人寥有方嗟君沒世委空囊幾度勞心翰墨場半靣為君申一慟不知何處是家鄉傷春吟何光逺簷上簷前燕語新桞開花發自傷神誰能將我相思意說與隈江解珮人答龍女淡蕩春光物象饒一枝瓊艷不勝嬌若能許解相思珮何羡星天渡鵲橋催粧玉漏㳙㳙銀漢清鵲橋新架路初成催粧既要裁篇詠鳯吹鸞歌早會迎寶車輾駐綵雲開誤到蓬山頂上來瓊室既登花得折永將凡骨逐風雷贈何生眀月潭龍女坐久風吹緑綺寒九天月照水精盤不思却返沉潜去為惜春光一夜歡留别何郎負妾當時寤寐求從茲粉靣阻綢繆宫空月苦瑶雲斷寂寞巴江水自流鬻丹砂醉吟劉道昌心田但使靈芝長氣海常教法水朝功滿自然留不住更將何物馭丹霄龜市告别還丹功滿氣成胎九百年來混俗埃自此三山一歸去無因重到世間來貨丹吟鄰場道人尋仙何必三山上但使神存九竅清煉得綿綿元氣定自然不食亦長生羣仙降蜀宫后土夫人偶引羣仙到世間薰風殿裏醉華筵等閒貪賞不歸去愁殺韋郎一覺眠王母滄海成塵幾萬秋碧桃花發長春愁不來便是數千載周穆漢皇何處游麻姑世間何事不澘然人得人情命不延適向蔡家㕔上飲回頭已見一千年上元夫人思量往事一愁容阿母曾邀到漢宫城闕不存人不見茂陵荒草恨無窮弄玉采鳯飛來到禁闈便隨王母駐瑶池如今記得秦樓上偷見蕭郎惱妾時太真春夢悠揚生下界一堪成笑一堪悲馬嵬不是無情地自遇蓬萊睡覺時臨刑賦楊損聖主何曾識仲都可嗟社稷在須㬰市東便是神仙窟何必乘舟泛五湖東洛貨丹許學士三千功滿去升天一住人間數百年華表他時却歸日滄溟應恐變桑田天關回到世吟九霄雲路竒哉險曾抱沖身入太和今日東歸渾似夢望崖回首隔天波經故宫女墳有感聶通志家國久隨狂寇沒春蕪又向冡頭青如今憶得當時事為爾傷心一涕零長郊煙淡月華清因醉荒墳半夜醒失路孤吟不勝苦暗中應有鬼神聽吟送酒京昭儀寶仙爭不逄人話此身此身長夜不知春自從國破家亡後壠上惟添芳草新張夫人華國休說人間恨戀多况逄佳客此相過堂中縱有千般樂爭及陽春一曲歌景才人舜英幽谷窮花似妾身縱懷香艷吐無因多情公子能相訪應解回風暫借春留金扼臂贈别恩情未足曉光催數朵眠花未得開却羡一雙金扼臂隨君此去出泉臺琴中歌孫𤣥照相如曾作鳯兮吟昔被文君會此音今日孤鸞還獨語痛哉仙子不彈琴答孫客王仙山鴛鴦相見不相隨籠裏籠前整羽衣但得他時人放去水中長作一雙飛送青城丈人酒紫微孫處士深羡青城好洞天白龍一覺已千年鋪雲枕石長松下朝退看書盡日眠送王懿昌酒將知骨分到仙鄉酒飲金華玉液漿莫道人間只如此回頭已是一年强送太一真君酒青城丈人峩眉仙府靜沉沉玉液金華莫厭斟凡客欲知真一洞劔門西北五雲深送紫微處士酒太一真君此中何必羡青城玉樹雲樓不記名悶即乘龍游紫府北辰南斗逐君行蜀宫應制李舜絃夫人濃樹禁花開後庭飲筵中散酒醒醒濛濛雨草瑶階濕鐘曉愁吟獨倚屏釣魚不得盡日池邉釣錦鱗芰荷香裏暗銷魂依稀縱有尋香餌知是金鈎不肯吞隨駕游青城因隨八馬上仙山頓隔埃塵物象閒只恐西追王母宴却憂難得到人間摘紫芝李太𤣥偶游洞府到芝田星月茫茫欲曙天雖則似離塵世了不知何處遇真仙玉女舞霓裳舞勢隨風散復收歌聲似磬韻還幽千回赴節填詞處嬌眼如波入鬢流錦城春望卓英英和風裝㸃錦城春細雨如絲壓玉塵漫把詩情訪竒景艷花穠酒屬閒人理笙頻倚銀屏理鳯笙調中幽意起春情因思往事成惆悵不得緱山和一聲游福感寺答少年牡丹未及開時節況是秋風莫近前留待來年二三月一枝和露壓神仙答𤣥士數載幽欄種牡丹裹香包艷待神仙神仙既有丹青術携取何妨入洞天和錦城春望眉娘蠶市初開處處春九衢明艷起香塵世間縱有浮華事爭及仙山出世人和理笙但於閨閣熟吹笙太白真仙自有情他日丹霄驂白鳯何愁子晉不聞聲晝地吟太白山𤣥士學得丹青數萬年人間幾度變桑田桑田雖變丹青在誰向丹青合得仙贈葛氏小娘子潘雍曾聞仙子住天台欲結靈姻愧短才若許隨君洞中住不同劉阮却歸來和潘雍葛氏女九天天遠瑞煙濃駕鶴驂龍意已同從此三山山上月瓊花開處照春風紫霄夫人席上桃花夫人昔時訓子西河土漢使經過問妾緣自到仙山不知老凡間喚作幾千年萬首唐人絶句卷六十八
