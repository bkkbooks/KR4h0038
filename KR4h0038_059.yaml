body:
  text: 萬首唐人絶句巻五十九宋洪邁編七言穆天子傳唐彦謙王母清歌玉琯悲瑶臺應有再來期穆王不得重相見恐為無端哭盛姬楚天楚天遥望每長嚬宋玉襄王盡作塵不會瑶姬朝與暮更為雲雨待何人寄徐山人一室清羸鶴體孤體和神瑩爽氷壺呉中高士雖求死不那稽山有謝敷題宗人故帖所忠無處訪相如風笈塵編迹尚餘惟有孝標情最厚一編遺在茂陵書垂柳絆惹春風别有情世間誰敢鬭輕盈楚王江畔無端種餓損纎腰學不成登興元城觀烽火漢川城上角三呼䕶蹕防邉列萬夫褒姒塜前烽火起不知泉下破顔無鄧艾廟昭烈遺黎死尚羞揮刀斫石恨醮周如何千載留遺廟血食巴山伴武侯曲江春望杏艶桃光奪晚霞樂遊無廟有年華漢朝冠盖皆陵墓十里冝春漢苑花漢殿鳥去雲飛意不通夜壇斜月轉松風君王寂慮無消息却就閒人覔巨公賀李昌時禁苑新命振鷺翔鸞集禁闈玉堂珠樹瑩風儀不知新到靈和殿張緒何如柳一枝牡丹顔色無因饒錦綉馨香惟解掩蘭蓀那堪更被烟䝉蔽南國西施泣㫁魂羅江驛數枝髙柳帶鳴鴉一樹山橊自落花已是向來多淚眼短亭回首在天涯奏捷西蜀題沱江驛野客乘軺非所冝况将儒懦報戎機錦江不識臨卭酒且免相如渇病歸春蚤落英紛紛從此見花殘轉覺長繩繋日難樓上有愁春不淺小桃風雪凭欄干仲山千載遺踪寄薜蘿沛中鄉里漢山河長陵亦是閒丘壠異日誰知與仲多漢嗣漢嗣安危繋數君髙皇意决勢難分張良口辨周昌吃同建儲宫第一勛四老廟西漢儲宫定不傾可能園綺勝良平舉朝公将無全䇿借請閒人羽翼成南梁戯題漢髙廟數載從軍似武夫今隨戎捷氣偏粗漢王若問何為者免道髙陽舊酒徒洛神人世仙家本自殊何須相見向中途驚鴻瞥過㳺龍去漫惱陳王一事無初秋到慈州冬首換絳牧秋杪方攀玉樹枝隔年無計待春暉自嫌暫作仙城守不遂鶯來共燕飛重經馮家舊里馮家舊宅閉柴闗脩竹猶存淗水灣應繫星辰上天去不畱英骨𦵏人間克復後登安國寺閣千門萬户鞠蒿藜㫁燼遺垣一望迷惆悵建章鴛瓦盡夜來空見玉繩低題䖍僧室何縁春恨貯離憂欲入空門萬事休水月定中何所為也嚬眉黛托腮愁見煬帝寳帳漢文窮相作前王懢惜明珠不斗量翡翠絞鮹何所直千裨萬接上書囊樓上偶題塵土無因狎隱淪青山一望每傷神可能前嶺空喬木應有懷才抱器人親仁里聞猿朱雀街東半夜驚楚魂和夢兩徒清五更撩亂趨朝火滿口塵埃亦數聲聞李瀆司勲下世異鄉丹旐已飄揚一顧深知實未亡任被禇褒泉下笑重将北靣哭真長試夜題省廊桂麻衣穿穴兩京塵十見東堂緑桂春今日競飛揚葉箭魏舒休作畫籌人竹風竹映風忩數陣斜旅人愁坐思無涯夜來畱得江湖夢全為乾聲似荻花長溪秋望柳短沙長溪水流雨微烟暝立溪頭寒鴉閃閃山前去杜曲黄昏獨自愁嚴子陵嚴陵情性是真狂抵觸三公傲帝王不怕舊交稱僣越喚它侯霸作君房北齊草草招携强據鞍周師乘勝莫回看背城肯戰知虚實爭奈人前忍笑難楚世家偏信由來惑是非一言邪佞脫危機張儀重入懷王手駟馬安車却放歸驪山道中月殿真妃下綵烟漁陽追騎及湯泉君王指㸃新豐樹幾不親畱七寳鞭韋曲欲冩愁腸愧不才多情練漉已低摧窮郊二月初離别獨傍寒村嗅野梅黄子陂荷花十頃狂風撼麯塵縁堤照水露紅新世間花氣皆愁絶恰是蓮香更惱人野行蝶戀晚花終未去鷗逢春水固難飛野人心地都無著伴蝶隨鷗亦不歸與徐温話别方干去去何時却見君悠悠烟水似天津明年今夜有明月不是今年看月人寒食日百花香氣傍行人花底垂鞭日易醺野父不知寒食節穿林轉壑自燒雲出東陽道中作馬首寒山黛色濃一重重盡一重重醉醒已在他人界猶憶東陽昨夜鐘與陳長官枕上愁多百緒牽常時睡覺在溪前人間盡是交親力莫道升沉總信天商明府家學方響葛溪鐡片梨園調耳底丁東十六聲彭澤主人憐妙樂玉盃春煖許同傾别商明府許教門館久踟蹰仲叔懷恩對玉壺惟有離心欲萌客望垂雙淚不成珠贈楊長官直鈎終日竟無魚鐘鼓聲中與世踈若向湖邉訪幽拙蕭條四壁是閒居貽僧二首秋水一泓長見底澗松千尺不生枝人間學佛知多少淨盡花心只有師四十年來多少人一分零落九成塵與師猶得重相見亦是枯株勉强春題畫建溪圖六幅輕綃畫建溪刺桐花下路髙低分明記得曽行處秪欠猿聲與鳥啼蜀中遊子去遊多不歸春風酒味勝餘時閒來却伴巴兒醉荳蔲花邉唱竹枝将歸湖上畱别陜宰歸去春山逗晚晴縈逥樹石罅中行明時不是無知己自憶湖邉釣與耕題鮑處士壁水濶坐看千萬里青蕪蓋地接天津襧衡莫愛山中静逸舎山多却碍人經曠禪師舊院谷鳥散啼如有恨庭花含笑似無情更名變貌難休息去去來來第幾生江南聞新曲席上新聲花下盃一聲聲被拍心催樂工不識長安道盡是書中寄曲來越中寄孫百篇二首上才乘醉到山隂日日篇成字字金鏡水周圍千萬頃波瀾倒㵼入君心錦價轉髙花更巧能将舊手弄新梭從來一字為褒貶二十八言猶太多題飛來峰邃岩喬木夏藏寒床上雲溪枕上看臺殿漸多山更重却令飛去即應難過李羣玉故居訐直上書難遇主銜寃下世未成翁琴樽劒鶴隨将去惟鎖山齋一樹風君不來逺路東西欲問誰寒來無處寄寒衣去時初種庭前樹樹已勝巢人未歸送鄉中故人少小與君情不踈聴君細話勝家書如今若到鄉中去道我埀鈎不釣魚思江南昨日草枯今日青羈人又動故鄉情夜來有夢登歸路不到桐廬已及明别孫蜀呉越思君意易傷别君添我鬂邉霜由來淛水偏堪恨截㫁千山作兩鄉贈江上老人潭底錦鱗多識釣未投香餌即先知欲教魚目無分别須學揉藍染釣絲詠花二首狂心醉眼共徘徊一半先開笑未開此日不能偷折去蝴蜂直恐趂人來可憐妍艶正當時剛被狂風一夜吹今日流鶯來舊處百般言語殢空枝路入金州江中作棹尋椒岸縈逥去數里時逢一兩家知道從來貢金處江邉牧䜿亦披沙夜會鄭氏林亭巻簾圓月照方塘坐久樽空竹有霜白犬風驚雁飛起猶能一一旋成行清平調詞三首李白雲想衣裳花想容春風拂檻露華濃若非羣玉山頭見會向瑶臺月下逢一枝紅艶露凝香雲雨巫山枉㫁腸借問漢宫誰得似可憐飛燕在昭陽名花傾國兩相歡長得君王帶笑看解釋春風無限恨沉香亭北倚欄干戯贈杜甫飯顆山前逢杜甫頭戴笠子日卓午借問别來太瘦生總為從前作詩苦賀裴裕李摶曽隨風水化凡鱗安上門前一字新聞道蜀江風景好不知何似杏園人逰秦别妻元載年來誰不厭龍鍾雖在侯門似不容看取海山寒翠樹若遭霜霰到秦封懷舊李章武水不西歸月暫圓令人悵望古城邉蕭條明早分岐路知更相逢何嵗年戯經僧南宗尚許通方便何處心中更有經好去苾蒭雲水畔何山松栢不青青送紅綿酒冷朝陽採菱歌怨木蘭舟送客魂消百尺樓還似洛妃乘霧去碧天無際水空流題馬嵬驛狄歸昌馬嵬烟柳正依依重見鑾輿幸蜀歸泉下阿蠻應有語這回休更泥楊妃贈張神女沈警義起曽厯許多年張碩凡得㡬時憐何意今人不如昔蹔來相見更無縁離歌直值行人心不平那冝萬里阻閨情只今隴上分流水更泛從來鳴咽聲題巫山廟繁知忠州刺史令才子行到巫山必有詩為報髙唐神女道速排雲雨候清辭題鄧仙客墓天嶠逰人鶴老芝田鷄在籠上清那與俗塵同既言白日昇仙去何事人間有殯宫舟行作衡山舟子野鵲灘西一棹孤月光遥接洞庭湖堪嗟逥雁峰前過望㫁家山一字無罷歙州贈交代李擢經年理郡少歡娯為習干戈間飲徒今日臨行盡交原闕萬首唐人絶句巻五十九
