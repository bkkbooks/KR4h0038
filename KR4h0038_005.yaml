body:
  text: 萬首唐人絶句卷五宋洪邁編七言題欹器圖劉禹錫秦國功成思稅駕晉臣名遂歎危機無因上蔡牽黃犬願作丹徒一布衣揚州春夜同會水館夜艾獨醒寂寂獨看金燼落紛紛只見玉山頽自羞不是高陽侣一夜星星騎馬回王學士入翰林廄馬翩翩禁外逢星槎上漢杳難從定知欲報淮南詔促召王褒入九重闕下口號綵仗神旗獵曉風雞人一唱鼓蓬蓬銅壺漏水何時歇如此相催即老翁戲贈崔千牛學道深山虛老人留名萬代不關身勸君多買長安酒南陌東城占取春詔追江湘逐客宿都亭有懷雲雨江湘起卧龍武陵樵客躡仙蹤十年楚水楓林下今夜初聞長樂鍾詔還京師見舊畨官前者匆匆襆被行十年憔悴到京城南宫舊吏來相問何處淹流白髮生故洛城古牆粉落椒飛知幾春風吹雨灑旋成塵莫言一片危基在猶過無窮來往人自朗州至京戲贈看花諸君子紫陌紅塵拂面來無人不道看花回玄都觀裏桃千樹盡是劉郎去後栽再遊玄都觀百畒庭中半是苔桃花淨盡菜花開種桃道士歸何處前度劉郎今又來望夫石終日望夫夫不歸化為孤石苦相思望來已是幾千載只似當時初望時金陵五題石頭城山圍故國周遭在潮打空城寂寞回淮水東邊舊時月夜深還過女牆來烏衣巷朱雀橋邉野草花烏衣巷口夕陽斜舊時王謝堂前燕飛入尋常百姓家臺城臺城六代競豪華結綺臨春事最奢萬戶千門成野草只緣一曲後庭花生公講堂生公説法鬼神聽身後空堂夜不扄高坐寂寥塵漠漠一方明月可中庭江令宅南朝詞臣北朝客歸來唯見秦淮碧池臺竹樹三畒餘至今人道江家宅秋夜安國觀聞笙織女分明銀漢秋桂枝梧葉共颼飀月露滿庭人寂寂霓裳一曲在高樓臺城懷古清江悠悠王氣沉六朝遺事何處尋宫牆隱嶙圍野澤鸛鶂夜鳴秋色深謝吳大夫夜泊湘川見寄夜泊湘川逐客心月明猿苦血沾襟湘妃舊竹痕猶淺從此因君染更深與歌者米嘉榮唱得涼川意外聲舊人唯數米嘉榮近來時世輕先輩好染髭鬚事後生聽舊宫人穆氏唱歌曽隨織女度天河記得雲間第一歌休唱貞元供奉曲當時朝士已無多與歌者何戡二十餘年别帝京重聞天樂不勝情舊人唯有何戡在更與殷勤唱渭城與歌童田順郎天下能歌御史娘花前月底奉君王九重深處無人見分付新聲與順郎題燕爾館破屏風畫時應遇空亡日賣處難逢識别人唯有多情往來客強將衫袖拂埃塵牡丹庭前芍藥妖無格池上芙蓉淨少情唯有牡丹真國色花開時節動京城步虛詞二首阿母種桃雲海際花落子成二千嵗海風吹拆最繁枝跪捧瓊槃獻天帝華表千年一鶴歸凝丹為頂雪為衣星星仙語人聽盡却向五雲翻翅飛隄上行三首酒旗相望大隄頭隄下連檣隄上樓日暮行人爭渡急槳聲幽軋滿中流江南江北望煙波入夜行人相應歌桃葉傳情竹枝怨水流無限月明多長隄繚繞水裴回酒舍旗亭次第開日晚上簾招估客軻峩大艑落帆來踏歌詞四首春江月出大陽平隄上女郎連袂行唱盡新詞歡不見紅霞映樹鷓鴣鳴桃蹊栁陌好經過燈下粧成月下歌為是襄王故宫地至今猶自細腰多新詞宛轉遞相傳振袖輕鬟風露前月落烏啼雲雨散遊童陌上拾花鈿日暮江頭聞竹枝南人行樂北人悲自從雪裏唱新曲直到三春花盡時魏宫詞二首日晚長秋簾外報望陵歌舞在明朝添爐火欲熏衣麝憶得分明不忍燒日映西陵松柏枝下臺相顧一相悲朝來樂府長歌曲唱著君王自作詞秋詞二首自古逢秋悲寂寥我言秋日勝春朝橫空一鶴排雲上便引詩情到碧霄山明水淨夜來霜數樹深紅出淺黃試上高樓清入骨豈如春日嗾人狂阿嬌怨望見葳蕤舉翠華試開金屋掃庭花須臾宫女傳來信言幸平陽公主家竹枝詞十一首白帝城頭春草生白鹽山下蜀江清南人上來歌一曲北人莫上動鄉情山桃紅花滿上頭蜀江春水拍山流紅花易衰似儂意水流無限似儂愁江上朱樓新雨晴瀼西春水縠文生橋東橋西好楊栁人來人去唱歌行日出三竿春霧消江頭蜀客駐蘭橈慿寄狂夫書一紙住在成都萬里橋兩岸山花似雪開家家春酒滿銀杯昭君坊中多女伴永安宫外踏青來城西門前灎澦堆年年波浪不能摧懊惱人心不如石少時東去復西來瞿唐嘈嘈十二灘此中道路古來難長恨人心不如水等間平地起波瀾巫峽蒼蒼煙雨時清猿啼在最高枝箇裏愁人腸自斷由來不是此聲悲山上層層桃李花雲間煙火是人家銀釧金叉來負水長刀短笠去燒畬楊栁青青江水平聞郎江上唱歌聲東邉日出西邉雨道是無晴還有晴楚水巴山江雨多巴人能唱本鄉歌今朝北客思歸去回入紇那披緑羅秋扇詞莫道恩情無重來人間榮謝遞相催當時初入君懷袖豈念寒爐有死灰楊栁枝詞十一首塞北梅花羌笛吹淮南桂樹小山詞請君莫奏南朝曲聽唱新翻楊栁枝南陌東城春早時相逢何處不依依桃紅李白皆誇好須得垂楊相發揮鳯闕輕遮翡翠幃龍墀遙望麴塵絲御溝春水相輝映狂殺長安年少兒金谷園中鶯亂飛銅駝陌上好風吹城東桃李須臾盡爭似垂楊無限時花蕚樓前初種時美人樓上鬬腰支如今拋擲長街裏露葉如啼欲恨誰煬帝行宫汴水濱數株殘桞不生春晚來風起花如雪飛入宫牆不見人御陌青門拂地垂千條金縷萬條絲如今綰作同心結將贈行人知不知城外春風吹酒旗行人揮袂日西時長安陌上無窮樹唯有垂楊管别離輕盈嫋娜占年華舞榭粧樓處處遮春盡絮飛留不得隨風好去落誰家迎得春光先到來淺黃輕緑映樓臺只緣裊娜多情思便被春風長挫摧巫峽巫山楊栁多朝雲暮雨逺相和因想陽臺無限事為君回唱竹枝歌浪淘沙詞九首九曲黃河萬里沙浪淘風簸自天涯如今直上銀河去同到牽牛織女家洛水橋邊春日斜碧流輕淺見瓊沙無端陌上狂風急驚起鴛鴦出浪花汴水東流虎眼文清淮曉色鴨頭春君看渡口淘沙處渡却人間多少人鸚鵡洲頭浪颭沙青樓春望日將斜銜泥燕子爭歸舍獨自狂夫不憶家濯錦江邊兩岸花春風吹浪正淘沙女郎翦下鴛鴦錦將向中流定晚霞日照澄洲江霧開淘金女伴滿江偎美人首飾侯王印盡是沙中浪底來八月濤聲吼地來頭高數丈觸山回須臾却入海門去卷起沙堆似雪堆莫道讒言如浪深莫言遷客似沙沉千淘萬灑雖辛苦吹盡狂沙始到金流水淘沙不暫停前波未滅後波生令人忽憶瀟湘渚回唱迎神三兩聲傷愚溪三首溪水悠悠春自來草堂無主燕飛回隔簾唯見中庭草一樹山榴依舊開草聖數行留壞壁木奴千樹屬鄰家唯見里門通德榜殘陽寂寞出樵車栁門竹巷依依在野草青苔日日多縱有鄰人解吹笛山陽舊侣更誰過洛中逢韓七之吳興五首昔年意氣結羣英幾度朝回一字行海北天南零落盡兩人相見洛陽城自從雲散各東西每日歡娛却慘悽離别苦多相見少一生心事在書題今朝無意訴離杯何况清絃急管催本欲醉中輕逺别不知翻引酒悲來駱駝橋上蘋風起鸚鵡杯中箬下春水碧山青知好處開顔一笑向何人溪中士女出笆籬溪上鴛鴦避畫旗何處人間似仙境春山携妓采茶時夜晏福建盧常侍宅因送之鎮暫駐旌旗洛水隄綺筵紅燭醉蘭閨美人美酒長相逐莫怕猿聲發建溪送廖參謀東遊二首九陌逢君又别離行雲别鶴本無期望嵩樓下忽相見看過花開花落時繁花落盡君辭去緑草垂楊引征路東道諸侯皆故人留連必是多情處贈長沙讃頭陀外道邪山千萬重真言一發盡摧峰有時明月無人夜獨向昭潭制惡龍送僧赴江陵謁馬逢侍御西北秋風雕蕙蘭洞庭波上碧雲寒茂陵才子江陵住乞取新詩合掌看送僧遊天台曲江僧向松江見又道天台看石橋鶴戀故巢雲戀岫比君猶自不逍遙傷桃源薛道士壇邊僧在鶴巢空白鹿間行舊徑中手植紅桃千樹發滿山無主任春風王思道碑堂下作蒼蒼宰樹起寒煙尚有威名海內傳四府舊聞多故吏幾人垂淚拜碑前代靖安佳人怨二首寶馬嗚珂踏曉塵魚文匕首犯車茵適來行哭里門外昨夜華堂歌舞人秉燭朝天遂不回路人彈指望髙臺牆東便是傷心地夜夜秋螢飛去來碧澗寺見元九和展上人詩廊下題詩滿壁塵塔前松樹已鱗皴古來唯有王文度重見平生竺道人贈元九文石枕文章似錦氣如虹宜薦華簮緑殿中縱使良飊生旦夕猶堪拂拭愈頭風寄唐州楊八淮西既是平安地鴉路今無羽檄飛聞道唐州最清靜戰場耕盡野花稀傷循州渾尚書貴人淪落路人哀碧海連天丹旐回遙想長安此時節朱門深巷百花開同樂天登棲靈寺塔步步相携不覺難九層雲外倚欄干忽然語笑半天上無限遊人舉眼看和裴相公傍水間行為愛逍遙第一篇時時間步賞風煙看花臨水心無事功業成來二十年杏園花下二十餘年作逐臣歸來還見曲江春遊人莫笑白頭醉老醉花間有幾人春詞新粧宜面下朱樓深鎖春光一院愁行到中庭數花朵蜻蜓飛上玉搔頭憶樂天尋常相見意殷勤别後相思夢更頻每遇登臨好風景羡它天性少情人醉答樂天洛城洛城何日歸故人故人今轉稀莫嗟雪裏暫時别終擬雲間相逐飛虎丘寺見元相公題名滻水送君君不還見君題字虎丘山因知早貴兼才子不得多時在世間萬首唐人絶句卷五欽定四庫全書萬首唐人絶句卷五宋洪邁編五言江行無題一錢起傾酒向漣漪乘流東去時寸心同尺璧投此報馮夷二江曲全縈楚雲氛半自秦峴山回首望如別故關人三浦煙函夜色冷日轉秋旻自有沈碑石清光不照人四楚岸雲空合楚城人不來只今誰善舞莫恨發陽臺五行背青山郭吟當白露秋風流無屈宋空詠古荆州六晚來漁父喜罾重欲收遲恐有長江使金錢願贖龜七去指龍沙路徒懸象魏心夜涼無逺夢不為偶聞砧八霽雲疏有葉雨浪細無花穩放扁舟去江天自有涯九好日當秋半層波動旅腸已行千里外誰與共秋光十潤色非東里官曹更建章宦遊難自定來喚棹船郎十一夜江清未曉徒惜月光沈不是因行樂堪傷老大心十二翳日多喬木維舟取束薪靜聽江叟語俱是厭兵人十三箭漏日初短汀煙草木衰雨餘雖更緑不是采蘋時十四山雨夜來漲喜魚跳滿江岸沙平欲盡埀蓼入船窗十五渚邊新雁下舟上獨淒涼俱是南來客憐君綴一行十六牽路緣江狹沙崩岸不平盡知行處險誰肯載時輕十七雲密連江暗風斜著物鳴一杯真戰將笑爾作愁兵十八柳拂斜開路籬邊數户村可能還有意不掩向江門十九不識桓公渴徒吟子美詩江清唯獨看心外更誰知二十憔悴異靈均非讒作逐臣如逢漁父問未是獨醒人二十一水涵秋色靜雲帶夕陽髙詩癖非吾病何妨吮短毫二十二登舟非古岸還似阻西陵箕伯無多少回頭詎不能二十三帆翅初張處雲鵬怒翼同莫愁千里路自有到來風二十四悠雲久無雨江燕社猶飛却笑舟中客今年未得歸二十五佳節雖逢菊浮生正是萍故山何處望荒岸小長亭二十六行到楚江岸蒼茫人正迷秖如秦塞逺格摘鷓鴣啼二十七月下江流靜村荒人語稀鷺鷥雖有伴乃共影雙飛二十八斗轉月未落舟行夜已深有村知不逺風便數聲砧二十九棹驚沙鳥迅飛濺夕陽波不顧魚多處應防一目羅三十漸覺江天逺難逢故國書可能無往事空食鼎中魚三十一岸草連荒色村聲樂稔年晚晴初穫稻間却采蓮船三十二灘淺爭遊鷺江清易見魚怪來吟未足秋物欠紅渠三十三蛩響依莎草螢飛透水煙夜涼誰詠史空泊運租船三十四睡穩葉舟輕風微浪不驚任君蘆葦岸終夜動秋聲三十五自念平生意曾期一郡符豈知因謫宦斑鬢入江湖三十六煙渚復煙渚畫屏休畫屏引愁天末去數點暮山青三十七水天涼夜月不是惜清光好物隨人祕秦淮憶建康三十八古來多思客搖落恨江潭今日秋風至蕭疏獨沔南三十九映竹疑村好穿蘆覺渚幽漸安無曠土薑芋當農收四十秋風動客心寂寂不成吟飛上危檣立啼鶯報好音四十一見底髙秋水開懷萬里天旅吟還有伴沙柳數枝蟬四十二九日自佳節扁舟無一杯曹園舊尊酒戲馬憶髙臺四十三兵火有餘燼貧村才數家無人爭晚渡殘月下寒沙四十四渚禽菱芡足不向稻粱爭靜宿涼灣月應無失侣聲四十五輕雲未護霜樹杪橘初黃信是知名物微風過水香四十六渺渺望天涯清漣浸赤霞難逢星漢使烏鵲日乘查四十七土曠深耕少江平逺釣多生平皆棄本金革竟如何四十八海月非常物等間不可尋披沙應有地淺處定無金四十九風晚冷颼颼蘆花已白頭舊來無葉寺堪憶玉京秋五十風好來無陳雲間去有宗釣歌無逺近應喜罷艨艟五十一吳疆連楚甸楚俗異吳鄉漫把尊中物無人啄蟹匡五十二岸緑野煙逺江紅斜照微撑開小漁艇應到月明歸五十三雨餘江始漲漾漾見流薪曽歎河中木斯言憶古人五十四葉舟維夏口煙野獨行時不見頭陀寺空懷幼婦碑五十五晚泊武昌岸津亭疏柳風數株曾手植好事憶陶公五十六墜露晚猶濃秋花不易逢涉江雖已晚髙樹搴芙蓉五十七舟航依浦定星斗滿江寒若比陰霾日何妨夜未闌五十八近戍離金落孤岑望火門唯將知命意瀟灑向乾坤五十九叢菊生堤上此花長後時有人還采掇何必在春期六十夕景殘霞落秋寒細雨晴短纓何用濯舟在月中行六十一垠壞滿江水地坳生野塘晚荷人不折留此作秋香六十二左宦終何路攄懷亦自寬襞箋嘲白鷺無意喻梟鸞六十三樓空人不歸雲是去時衣黃鶴無心下長應笑令威六十四白帝朝驚浪尋陽暮映雲等間生險易世路祇如君六十五櫓慢開輕浪帆虛帶白雲客船雖狹小容得庾將軍六十六風雨正甘寢雲霓忽晚晴放歌雖自遣一歲又崢嶸六十七靜看秋江水風微浪漸平人間馳競處塵土自波成六十八風借帆方疾風回棹却遲較量人世事不校一毫釐六十九咫尺愁風雨匡廬不可登秖疑雲霧窟猶有六朝僧七十幽思正遲遲沙邊濯弄時自憐非博物猶未識鳬葵七十一曾有煙波客能歌西塞山落花唯待月一釣紫菱灣七十二千頃水紋細一拳嵐影孤君山寒樹緑曾過洞庭湖七十三光濶重湖水低斜逺雁行未曾無興詠多謝沈東陽七十四晚菊繞江壘忽如開古屏莫言時節過白日有餘馨七十五秋寒鷹隼健逐雀下雲空知是江湖濶無心擊塞鴻七十六日落長亭晚山門步障青可憐無酒分處處有旗亭七十七江草何多思冬青尚滿洲誰能驚鵩鳥作賦為沙鷗七十八逺岸無行樹經霜有伴紅停船搜好句題葉贈江楓七十九身世比行舟無風亦暫休敢言終破浪唯願穩乘流八十數畝蒼苔石煙濛鶴卵洲定因詞客遇名字始風流八十一興間停桂楫路好過私門不負佳山水還開酒一樽八十二幽懷念煙水長恨隔龍沙今日滕王閣分明見落霞八十三短楫休敲桂孤根自駐萍自憐非劍氣空向斗牛星八十四江流何渺渺懷古獨依依漁父非賢者蘆中但有機八十五髙浪如銀屋江風一發時筆端降太白才大語終竒八十六細竹漁家路晴陽看結繒喜來邀客坐分與折腰菱八十七幸有煙波興寧辭筆硯勞緣情無怨刺却似反離騷八十八平湖五百里江水想通波不奈扁舟去其如決計何八十九數逢雲斷處去岸映髙山身到韋江日應猶未得間九十一灣斜照水三板順風船未敢相邀釣勞生只自憐九十一江雨正霏微江村晚渡稀何曾妨釣艇更待得魚歸九十二沙上獨行時吟情到楚詞難將垂岸蓼盈把當江籬九十三新野舊樓名尋陽勝賞情照人長一色江月共淒清九十四願飲西江水那吟北渚愁莫教留滯迹逺比蔡昭侯九十五湖口分江水東流獨有情當時好風物誰伴謝宣城九十六尋陽江畔菊應似古來秋為問幽棲客吟時得酒不九十七髙峰有佳號千尺倚寒風若使爐煙在猶應為上公九十八萬木已清霜江邊村事忙故溪黃稻熟一夜夢中香九十九楚水苦縈回征帆落又開可緣非直路却有好風來一百逺謫嵗時晏暮江風雨寒仍愁繫舟處驚夢近長灘萬首唐人絶句卷五
