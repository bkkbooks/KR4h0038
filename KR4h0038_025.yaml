body:
  text: 萬首唐人絶句卷二十五宋洪邁編七言過勤政樓杜牧千秋佳節名空在承露絲囊世已無唯有紫苔偏稱意年年因雨上金鋪題魏文正蟪蛄寧與雪霜期賢哲難教俗士知可憐貞觀太平後天不且留封德彛念昔遊三首十載飄然繩檢外樽前自獻自為酬秋山春雨間吟處倚遍江南寺寺樓雲門寺外逢猛雨林黑山髙雨腳長曽奉郊宫為近侍分明㩳㩳羽林槍李白題詩水西寺古木回巖樓閣風半醒半醉遊三日紅白花開煙雨中過華清宫三首長安回望繡成堆山頂千門次第開一騎紅塵妃子笑無人知是荔枝來新豐緑樹起黃埃數騎漁陽探使回霓裳一曲千峯上舞破中原始下來萬國笙歌醉太平倚天樓殿月分明雲中亂拍祿山舞風過重巒下笑聲登樂遊原長空淡淡孤鳥沒萬古銷沉向此中看取漢家何似業五陵無樹起秋風春申君烈士思酬國士恩春申誰與快寃魂三千賓客總珠履欲使何人殺李園奉陵宫人相如死後無詞客延夀亡來絶畫工玉顔不是黃金少淚滴秋山入夀宫讀韓杜集杜詩韓筆愁來讀似倩麻姑癢處抓天外鳳凰誰得髓無人解合續弦膠送國棊王逢絶藝如君天下少間人似我世間無別後竹窗風雪夜一燈明暗覆吳圖少年行連環羈玉聲光碎緑錦蔽泥虬卷髙春風細雨走馬去珠落璀璀白罽袍沈下賢斯人清唱何人和草徑苔蕪不可尋一夕小敷山下夢水如環珮月如襟偶題甘羅昔作秦丞相子政曽為漢輦郎千載更逢王侍讀當時還道有文章朱坡三首故國池塘倚御渠江城三詔損魚書賈生辭賦恨流落祇向長沙住嵗餘煙深苔巷唱樵兒花落寒輕倦客歸藤岸竹洲相掩映滿池春雨鸊鵜飛乳肥春洞生鵝管沼避回巖勢犬牙自笑卷懷頭角縮歸盤煙磴恰如蝸出宫人二首間吹玉殿昭華管醉折梨園縹帶花十年一夢歸人世絳縷猶封繫臂紗平陽拊背穿馳道銅雀分香下璧門幾向綴珠深殿裏妬拋羞態卧黃昏杏園夜來微雨洗芳塵公子驊騮步始勻莫怪杏園憔悴去滿城多少插花人春晚題韋家亭子擁鼻侵襟花草香髙臺春去恨茫茫蔫紅半落平池晚曲渚飄成錦一張感宋拾遺題名竄逐窮荒與死期餓唯蒿藿病無醫憐君更抱重泉恨不見崇山謫去時將赴吳興登樂遊原清時有味是無能間愛孤雲靜愛僧欲把一麾江海去樂遊原上望昭陵江南懷古車書混一業無窮井邑山川今古同戊辰年向金陵過惆悵間吟憶庾公江南春千里鶯啼緑映紅水村山郭酒旗風南朝四百八十寺多少樓臺煙雨中題禪智寺故里溪頭松柏雙來時盡日倚松窗杜陵隋苑已絶國秋晚南遊更渡江齊安郡中偶題二首兩竿落日溪橋上半縷輕煙柳影中多少緑荷相倚恨一時回首背西風秋聲無不攪離心夢澤蒹葭楚雨深自滴階前大梧葉于君何事動哀吟齊安郡後池菱透浮萍緑錦池夏鶯千囀弄薔薇盡日無人看微雨鴛鴦相對浴紅衣題城樓嗚軋江樓角一聲微陽瀲瀲落寒汀不用憑欄苦回首故鄉七十五長亭池州青溪弄溪終日到黃昏照數秋來白髮根何物賴君千遍洗筆頭塵土漸無痕遊金碧洞初柳霜林下石稜潺湲聲斷滿溪冰攜茶臘月遊金碧合有文章病茂陵贈李秀才骨清年少眼如冰鳳羽參差五色層天上麒麟時一下人間不獨有徐陵題貴池亭勢比凌歊宋武臺分明百里逺帆開蜀江雪浪西江滿強半春寒去却來蘄州蘭溪蘭溪春盡碧泱泱映水蘭花雨發香楚國大夫憔悴日應尋此路去瀟湘題水口草市倚溪侵嶺多髙樹誇酒書旗有小樓驚起鴛鴦豈無恨一雙飛去却回頭初冬夜飲淮陽多病偶求歡客袖侵霜興燭盤砌下梨花一堆雪明年誰此憑欄干山石榴似火山榴映小山繁中能薄艷中間一朵佳人玉叉上秪疑燒却翠雲鬟隋隄柳夾岸垂楊三百里秖應圖畫最相宜自嫌流落西歸疾不見東風二月時柳數樹新開翠影齊倚風情態被春迷依依故國樊川恨半掩村橋半拂溪鷺鷥雪衣雪髮青玉觜羣捕魚兒溪影中驚飛逺映碧山去一樹梨花落晚風村舍燕漢宫一百四十五多下珠簾閉瑣窗何處營巢夏將半茅簷煙裏語雙雙歸燕畫堂歌舞喧喧地社去社來人不看長是江樓使君伴黃昏猶待倚欄干傷猿獨折南園一朵梅重尋幽坎已生苔無端晚吹驚髙樹似裊長枝欲下來雲盡日看雲首不回無心都大似無才可憐光彩一片玉萬里晴天何處來醉後題僧院二首離心忽忽復悽悽雨晦傾瓶取醉泥可羡髙僧共心語一如攜稚往東西􅘑船一棹百分空十嵗青春不負公今日鬢絲禪榻畔茶煙輕揚落花風見吳秀才別妓紅燭短時羌笛怨清歌咽處蜀絃髙萬里分飛兩行淚滿江寒雨正蕭騷贈朱道靈劉根丹篆三千字郭璞青囊兩卷書牛渚磯南謝山北白雲深處有巖居屏風屏風周倣畫纎腰嵗久丹青色半銷斜倚玉窗鸞髮女拂塵猶自妬嬌饒哭韓綽平明送葬上都門紼翣交橫逐去魂歸來冷笑悲身事喚婦呼兒索酒盆新定途中無端偶效張文紀下杜鄉園別五秋重過江南更千里萬山深處一孤舟商山道中水疊鳴珂樹如帳長楊春殿九門珂我來惆悵不自決欲去欲住終如何漢江溶溶漾漾白鷗飛渌淨春深好染衣南去北來人自老夕陽長送釣船歸哭亡友故人墳樹五秋風伯道無兒迹更空重到笙歌分散地隔江吹笛月明中赤壁折戟沈沙鐵未消自將磨洗認前朝東風不與周郎便銅雀春深鎖二喬雲夢澤日旗龍斾想飄揚一索功髙縛楚王真是超然五湖客未如終始郭汾陽泊秦淮煙籠寒水月籠沙夜泊秦淮近酒家商女不知亡國恨隔江猶唱後庭花秋浦途中蕭蕭山路窮秋雨淅淅溪風一岸蒲為問寒沙新到雁來時還下杜陵無題桃花夫人廟細腰宫裏露桃新脈脈無言度幾春至竟息亡緣底事可憐金谷墮樓人題烏江亭勝敗兵家事不期包羞忍恥是男兒江東子弟多才俊卷土重來未可知題橫江館孫家兄弟晉龍驤馳騁功名業帝王至竟江山誰是主苔磯空屬釣魚郎寄楊州韓綽判官青山隱隱水遙遙秋盡江南草木凋二十四橋明月夜玉人何處教吹簫送李羣玉赴舉故人別來面如雪一榻拂雲秋影中玉白花紅三百首五陵誰唱與春風甘棠館御溝一渠東注芳華苑苑鎖池塘百嵗空水殿半傾蟾口澀為誰流下蓼花中汴河懷古錦纜龍舟隋煬帝平臺復道漢梁王遊人間起前朝念折柳孤吟斷殺腸汴河阻凍千里長河初凍時玉珂瑤珮響參差浮生憐似氷底水日夜東流人不知題元處士髙亭水接西江天外聲小齋松影拂雲平何人教我吹長笛與倚春風弄月明鄭瓘協律廣文遺韻留樗散雞犬圖書共一船自説江湖不歸事阻風中酒過年年送陸汙郎中棄官歸少微星動照春雲魏闕衡門路自分倐去忽來應有意世間塵土漫疑君寄珉笛與宇文舍人調髙銀字聲還側物比柯亭韻校奇寄與玉人天上去桓將軍見不教吹途中二首鏡中絲髮悲來慣衣上塵痕拂漸難惆悵江湖釣竿手却遮西日向長安田園不事來遊宦故國誰交爾別離獨倚關亭還把酒一年春盡送春時題村舍三樹稚桑春未㓢扶床乳女午啼飢潛銷暗鑠歸何處萬指侯家自不知江楚鄉寒食橘花時野渡臨風駐綵旗草色連雲人去住水紋如縠燕差池題木蘭廟彎弓征戰作男兒夢裏曽經夢畫眉幾度思歸還把酒拂雲堆上祝明妃入商山早入商山百里雲藍溪橋下水聲分流水舊聲人舊耳此回嗚咽不堪聞題商山廟吕氏強梁嗣子柔我於天性豈恩讎南軍不袒左邊袖四老安劉是滅劉送隱者無媒徑路草蕭蕭自古雲林逺市朝公道世間唯白髮貴人頭上不曽饒送斛斯判官蒼蒼煙月滿川亭我有勞歌一為聽將取離魂隨白騎三台星裏拜文星贈別二首娉娉裊裊十三餘豆蔲梢頭二月初春風十里揚州過卷上珠簾總不如多情却似總無情唯覺樽前笑不成蠟燭有心還惜別替人垂淚到天明寄逺前山極逺碧雲合清夜一聲白雪微欲寄相思千里月溪邊殘照雨霏霏九日金英繁亂拂欄香明府辭官酒滿缸還有玉樓輕薄女笑他寒燕一雙雙寄牛相公漢水橫衝蜀浪分危樓點的拂孤雲六年仁政謳歌去柳逺春隄處處聞斑竹筒簟血染斑斑成錦紋昔年遺恨至今存分明知是湘妃泣何忍將身卧淚痕和嚴惲落花共惜流年留不得且環流水醉流杯無情紅豔年年盛不恨凋零却恨開倡樓戲贈細柳橋邊深半春纈衣簾裏動香塵無端有寄間消息背插金叉笑向人宣州開元寺松寺曽同一鶴棲夜深臺殿月髙低何人為倚東樓柱正是千山雪漲時寺南樓小樓才受一床橫終日看山酒滿傾可惜和風夜來雨醉中虛度打窗聲留贈舞鞾應任間人看笑臉還須待我開不用鏡前空有淚薔薇花謝即歸來送薛邽二首可憐走馬騎驢漢豈有風光肯占伊只有三張最惆悵下山回馬尚遲遲小捷風流已俊才便將紅粉作金臺明年未去池陽郡更乞春時却重來南陵道中南陵水面漫悠悠風緊雲輕欲變秋正是客心孤逈處誰家紅袖憑江樓別家初嵗嬌兒未識爺別爺不拜手吒義拊頭一别三千里何日迎門却到家雨連雲接塞添迢遞灑幕侵燈送寂寥一夜不眠孤客耳主人窗外有芭蕉送人鴛鴦帳裏暖芙蓉低泣關山幾萬重明鑑半邊叉一股此生何處不相逢醉贈薛道封飲酒論文四百刻水分雲隔二三年男兒事業知君有賣與明君直幾錢萬首唐人絶句卷二十五欽定四庫全書萬首唐人絶句卷二十五宋洪邁編五言原缺萬首唐人絶句卷二十五
