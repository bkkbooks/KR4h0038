body:
  text: 萬首唐人絶句巻六十一宋洪邁編七言小遊僊詩九十八首曹唐玉簫金瑟發商聲桑葉枯乾海水清淨掃蓬萊山上地畧遊王母話長生其二上元元日豁明堂五帝望空拜玉皇萬樹琪花千圃藥心知不敢輙形相其三騎龍重過玉溪頭紅葉還春碧水流省得壺中見天地壺中天地不曾秋其四真王未許乆從容立在花前别寗封手把玉簫頭不舉自愁如醉倚黄龍其五金殿無人鏁絳烟玉郎並不賞丹田白龍蹀躞難廻䟦爭下紅綃碧玉鞭其六𤣥洲草木不知黄甲子初開浩刼長無限萬年年少女手攀紅樹滿殘陽其七宫闕重重閉玉林崑崙高闢彩雲深黄龍掉尾引郎去使妾月明何處尋其八風滿塗山玉蘂稀赤龍閒臥鶴東飛紫梨爛盡無人喫何事韓君去不歸其九武帝徒勞厭暮年不曾清浄不精專上元少女絶還往滿竈丹成白玉煙其十百辟朝回閉玉除露風清宴桂花踈西歸使者騎金虎嚲鞚垂鞭唱歩虚十一南斗闌珊北斗稀茅君夜着紫霞衣朝騎白馬趂朝去鳳押笙歌逐後飛十二焚香獨自上天壇桂樹風吹玉簡寒長怕嵇康乏僊骨與將僊籍再尋看十三冰屋朱扉曉未開誰將金䇿扣瓊臺碧花紅尾小僊子閒吠五雲嗔客來十四酒釅春濃瓊草齊真公欲散醉如泥朱輪軋軋入雲去行到半天聞馬嘶十五白石山中自有天竹花藤葉隔溪煙朝來洞口圍棊了賭得青龍直幾錢十六海水西飛照柏林青雲斜倚錦雲深水風暗入古山葉吹斷歩虚清磬音十七玉詔新除沈侍郎便分茅土鎮東方不知今夕游何處侍從皆騎白鳳凰十八洞裏煙霞無歇時洞中天地足金芝月明朗朗溪頭樹白髮老人相對棊十九饑即飱霞悶即行一聲長嘯萬山青穿花渡水來相訪珍重多才阮歩兵二十東妃閒着翠霞裙自領笙歌出五雲清思密談誰第一不過邀取小茅君二十一月影悠悠秋樹明露吹犀簟象牀輕嬪妃乆立帳門外暗笑夫人推酒聲二十二九天天路入雲長燕使何由到上方玉女暗來花下立手挼裙帯問昭王二十三玉皇賜妾紫衣裳交向桃源嫁阮郎爛煑瓊花勸君喫恐君毛鬢暗成霜二十四花底休傾緑玉巵雲中含笑向安期窮陽有數不知數大是人間年少兒二十五玉色雌龍金絡頭真妃騎出縱閒遊崑崙山上桃花底一曲商歌天地秋二十六閒來洞口訪劉君緩歩輕擡玉線裙細拍桃花擲流水更無言語倚彤雲二十七西漢夫人下太虚九霞裙幅五雲輿欲將碧字相教示自解盤囊出素書二十八天上雞鳴海日紅青腰侍女掃朱宫洗花烝葉濾清酒待與夫人邀五翁二十九汗漫真遊實可竒人間天上與人知周王不信長生話空使萇𢎞碧淚垂三十青錦縫裳綠玉襠滿身新帶五雲香閒依碧海攀鸞駕笑就蘇君覔橘嘗三十一鶴不西飛龍不行露乾雲破洞簫清少年僊子說閒事遙隔彩雲聞笑聲三十二洞裏煙深木葉麤乗風使者降𤣥都隔花相見遥相賀擎出懐中赤玉符三十三芝蕙芸花爛漫春瑞香煙露濕衣巾玉童私地誇書札偷寫雲瑤暗贈人三十四天上邀來不肻來人間雙鶴又空回秦皇漢武死何處海畔紅桑花自開三十五紫羽麾幢下玉京却邀真母入三清白龍乆住渾相戀斜倚祥雲不肻行三十六鶴呌風悲竹葉踈誰來五嶺拜雲俱人間肉馬無輕歩踏破先生一巻書三十七夜降西壇宴已終花殘月榭霧朦朧誰遊八海門前過空洞一聲風雨中三十八忘却教人鎻後宫還丹失盡玉壺空姮娥若不偷靈藥爭得長生在月中三十九暘谷先生下宴時月光初冷紫瓊枝淒清金石揭天地事在世間人不知四十共愛初平住九霞焚香不出閉金華白羊成隊難収拾喫盡溪頭巨勝花四十一酒盡香殘夜欲分青童拜問紫陽君月光悄悄笙歌逺馬影龍聲歸五雲四十二海樹靈風吹彩煙丹陵朝客欲昇天無央公子停鸞轡笑泥嬌妃索玉鞭四十三八景風回五鳳車崑崙山上看桃花若教使者沽春酒須覔餘杭阿母家四十四叔卿遍覽九天春不見人間故舊人怪得蓬萊山下水半成沙土半成塵四十五欲飲尊中雲母漿月明花裏合笙簧更教小柰將龍去便向金壇取阮郎四十六海上桃花千樹開麻姑一去不知來遼東老鶴應慵墮教探桑田便不回四十七昨夜相邀宴杏壇等閒乘醉走青鸞紅雲塞路東風緊吹破芙蓉碧玉冠四十八雲鶴㝠㝠去不分落花流水恨空存不知玉女無期信道與留門却閉門四十九采女平明受事回暗交丹契錦囊開欲書密詔防人見佯喝青虬使莫來五十太一元君昨夜過碧雲高髻綰婆娑手擡玉䇿紅於火敲斷金鸞使唱歌五十一碧瓦彤軒月殿開九天花落瑞風來玉皇欲着紅龍衮親喚金妃下手裁五十二長房自貴解飛飜五色雲中獨閉門看却桑田欲成海不知還往幾人存五十三赤龍停歩彩雲飛共道真王海上歸千歲紅桃香破鼻玉盤盛出與金妃五十四碧海靈童夜到時徒勞相喚上瓊池因循天子能閑事縱與青龍不解騎五十五且欲留君飲桂漿九天無事莫推忙青龍舉歩行千里休道蓬萊歸路長五十六侍女親擎玉酒巵滿巵傾酒勸安期等閒相别三千歲長憶水邊分棗時五十七萬歲蛾眉不解愁旋彈清瑟旋閒遊忽聞下界笙簫曲斜倚紅鸞笑不休五十八去住樓臺一任風十三天洞暗相通行厨侍女炊何物滿竈無煙玉炭紅五十九風動閒天清桂隂水精簾外冷沉沉西妃少女多春思斜倚彤雲盡日吟六十王母相留不放回偶然沉醉臥瑤臺憑君與向蕭郎道教著青龍取妾來六十一絳節笙歌繞殿飛紫皇欲到五雲歸細腰侍女瑤花外争向紅房報玉妃六十二聞君新領八霞司此别相逢是幾時妾有一觥雲母酒請君終宴莫推辭六十三方士飛軒駐碧霞酒香風冷月初斜不知誰唱歸春曲落盡溪頭白玉花六十四方朔朝來到我家欲將靈樹出丹霞三千年後知誰在擬種紅桃待放花六十五水滿桑田白日沉凍雲乾霰濕重隂遼東歸客閒相過因話堯年雪更深六十六朝回相引看紅鸞不覺風吹鶴氅偏好是興來騎白鶴文妃為伴上重天六十七公子閒吟八景文花南拜别上陽君金鞭遙指玉清路龍影馬嘶歸五雲六十八一百年中是一春不教日月輙移輪金鼇頭上蓬萊殿唯有人間鍊骨人六十九笑擎雲液紫瑤觥共請雲和碧玉笙花下偶然吹一曲人間因識董雙成七十東皇長女沒多年從洗金芝到水邊無事伴他棊一局等閒輸却賣花錢七十一紅草青林日半斜閒乘小鳳出彤霞路尋故舊過西谷因得冰園一尺𤓰七十二樹下星沉月欲高前溪水影濕龍毛洞天雲冷玉花發公子盡披雙錦袍七十三紫水風吹劍樹寒水邊年少下紅鸞未知百一窮陽數畧請先生止的看七十四武皇含笑把金觥更請霓裳一兩聲䕶帳宫人最年少舞腰時挈繡裙輕七十五瓊樹扶踈壓瑞煙玉皇朝客滿花前東風小飲人皆醉短尾青龍枕水眠七十六彤閣鐘鳴碧鷺飛皇君催熨紫霞衣丹房玉女心慵甚貪看投壺不肻歸七十七崑崙山上自雞啼羽客爭昇碧玉梯因駕五龍看較藝白鸞功用不如妻七十八沙野先生閉玉虚㷊香夜寫紫微書供承童子閒無事教剉瓊花餵白驢七十九雲隴瓊花滿地香碧沙紅水遍朱堂外人欲壓長生籍拜請飛瓊報玉皇八十玉洞長春風景鮮丈人私宴就芝田笙歌暫向花間盡便是人間一萬年八十一青童傳語便須回報道麻姑玉蘂開滄海成塵老閒事且乘龍鶴看花來八十二絳樹彤雲户半開守花童子怪人來青牛臥地喫瓊草知道先生朝未回八十三石洞沙溪二十年向明杭日夜朝天白礬煙盡水銀冷不覺小龍牀下眠八十四紫微深鎻敞丹軒太帝親談不死門從此百寮俱拜後走龍鞭虎下崑崙八十五雲衫玉帶好威儀三洞真人入奏時頻看金鞭打龍角爲嗔西去上天遲八十六太子真娥相領行當天合曲玉簫清梨花新折東風軟猶在緱山樂笑聲八十七洞裏月明瓊樹風畫簾青室影朦朧香殘酒冷玉妃睡不覺七真歸海中八十八青苑紅堂壓瑞雲月明閒宴九陽君不知昨夜誰先醉書破明霞八幅裙八十九東溟兩度作塵飛一萬年來㑹面稀千樹梨花百壺酒共君論飲莫論詩九十滄海令抛即未能且縁鸞鶴立相仍蔡家新婦莫嫌少領取真珠三五升九十一溪影沉沙樹影清人家皆踏五音行可憐三十六天路星月滿空瓊草青九十二北斗西風吹白榆穆公相笑夜投壺花前玉女來相問賭得青龍許贖無九十三九天王母皺蛾眉惆悵無言倚桂枝悔不長留穆天子任將妻妾住瑤池九十四暫隨鳬伯縱閒遊飲鹿因過翠水頭宫殿寂寥人不見碧花菱角滿潭秋九十五新授金書八素章玉皇教妾主扶桑與君一别三千歲却厭僊家日月長九十六八海風涼水影高上卿教製赤霜袍蛟絲玉線難裁割須借玉妃金剪刀九十七海上風來吹杏枝崑崙山上看花時紅龍錦襜黄金勒不是元君不得騎九十八絳闕夫人下北方細環清珮響丁當攀花笑入春風裏偷折紅桃寄阮郎放猿吉師老放爾千山萬里身野泉晴樹好為鄰啼時莫近瀟湘岸明月孤舟有旅人鴛鴦江島濛濛煙靄微緑蕪深處刷毛衣渡頭驚起一雙去飛上文君舊錦機萬首唐人絶句巻六十一
