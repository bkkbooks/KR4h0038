body:
  text: 萬首唐人絶句卷四十七宋洪邁編七言禁直寄崔員外鄭畋銀臺樓北蘂珠宫敻與人間路不同在省五更春睡侣早來分夢玉堂中初秋寓直三首曉星獨挂結麟樓三殿風高藥樹秋玉笛數聲飄不住問人依約在東頭宿鳥翩翩落照微右臺樓閣鎖重扉步廊無限金羈響應是諸司扈從歸幽閣焚香萬慮凝下簾胎息過禪僧玉堂分照無人後消盡金盆一碗冰夜景又作鈴絛無響閉珠宫小閣涼添玉蘂風珍簟滿牀明月到自疑身在五雲中聞號陛兵偏近羽林營夜靜仍傳禁號聲應笑執金雙闕下近南猶隔兩重城下直早出諸司人盡馬蹄稀紫帕雲竿九釘歸偏覺右臺清貴處榜懸金字射晴暉金鑾坡上玉晨鐘韻索清虛畫戟祥煙拱帝居極眼向南無限地緑煙深處認中書杪秋夜直蘂宫裁詔與宵分雖在青雲憶白雲待報君恩了歸去山翁何急草移文酬隱圭舍人寄紅燭蜜炬殷紅晝不如且將歸去照吾廬今來併得三般事靈運詩篇逸少書馬嵬坡玄宗回馬楊妃死雲雨難忘日月新終是聖明天子事景陽宫井又何人禁直和人飲酒卉醴陀花物外香清濃標格勝椒漿我來尚有鈞天會猶得金樽半日嘗悼鶴李縠道林曾訪雪翎飛應悔庭除閉羽衣料得王恭披鶴氅倚吟猶待月中歸醉中襲美先起戲贈休文雖即逃瓊液阿騖還須掩玉閨月落金雞一聲後不知誰悔醉如泥和戲襲美醉中先起張賁何事桃源路忽迷唯留雲雨怨空閨仙郎共許多情調莫遣重歌濁水泥送人西歸孤雲獨鳥本無依江海重逢故舊稀楊柳漸疏蘆葦白可堪斜日送君歸偶約道流終乖文會答皮陸仙侣無何訪蔡經兩煩韶濩出彤庭人間若有登樓望應怪文星近客星和皮陸酒病偶作白編椰席鏤冰明應助楊青解宿酲難繼二賢金玉唱可憐空作斷猿聲悼鶴渥頂鮮毛品格馴莎庭間暇重難羣無端日暮東風起飄散春空一片雲和寒夜見訪雲孤鶴獨且相親倣效從他折角巾不用吳江歎留滯風姿俱是玉清人玩金鸂鷘翠羽紅襟鏤彩雲雙飛常笑白鷗羣誰憐化作雕金質從惜沉檀十里聞和襲美索友人酒鄭璧乘興間來小謝家便裁詩句乞榴花邴原雖不無端醉也要臨風從鹿車文燕潤卿不至已知羽駕朝金闕不用燒蘭望玉京應是易遷明月好玉皇留看舞雙成惜花嚴惲春光冉冉歸何處更向花前把一杯盡日問花花不語為誰零落為誰開鑾駕東回崔道融兩川花捧御衣香萬嵗山呼輦路長天子還從馬嵬過别無惆悵似明皇釣魚間釣江魚不釣名瓦甌斟酒暮山青醉頭倒向蘆花裏却笑無端犯客星西施苧蘿山下如花女占得姑蘇臺上春一笑不能忘敵國五湖何處有功臣馬嵬萬乘淒涼蜀路歸眼前珠翠與心違重華不是風流主湘水猶傳泣二妃羯鼓華清宫裏打撩聲供奉絲簧束手聽寂寞鑾輿斜谷裏是誰翻得雨淋鈴寄李左司王季在臺柏臺蘭省共清風鳴玉朝聯夜被同肯信人間有兄弟一生長在别離中梅溪上寒梅初滿枝夜來霜月透芳菲清光寂寞思無盡應待琴尊與解圍天台陳逸人絶粒空山秋復春欲看滄海化成塵近拋三井更深去不怕虎狼唯怕人雪竇禪師雪竇峰前一派懸雪竇五月無炎天客塵半日洗欲盡師到白頭林下禪溪上遇雨二首回塘雨腳如搔絲野禽不起沉魚飛耕簑釣立取未暇秋田有望從淋漓坐看黑雲銜猛雨噴灑前山此獨晴忽經雲雨在頭上却是山前晚照明長門怨長門花泣一枝春爭奈君恩别處新錯把黃金買詞賦相如自是薄情人秋夕自憐三十未西遊傍水尋山過却秋一夜雨聲多少事不思量盡到心頭過隆中玄德蒼黃起卧龍鼎分天下一言中可憐蜀國關張後不見商量徐庶功關下百二山河壯帝畿關門何事更開遲應從漏却田文後每度聞雞不免疑寒食客中有懷江上聞鶯禁火時百花開盡栁依依故園兄弟别來久應到清明猶望歸溪夜積雪消來溪水寬滿樓明月碎琅玕漁人拋得釣筒盡却放輕舟下急灘山居卧疾廣利大師見訪桐谷孫枝已上絃野人猶卧白雲邊九天飛錫應相誚三到行朝二十年村墅正月二月村墅間餘糧未乏人心寬南鄰雨中揭屋笑酒熟數家來相看悲李拾遺二首故友從來匪石心諫多難得主恩深行朝半夜煙塵起曉殿吁嗟一鏡沈天涯時有北來塵因話他人及故人也是先皇能罪已殿前頻得觸龍鱗題李將軍傳猿臂將軍去似飛彎弓百步敵無遺漢文自與封侯得何必傷嗟不遇時酒醒酒醒撥剔殘灰火多少淒涼在此中爐畔自斟還自醉竹窗深夜雪兼風郊居友人相訪柴門深掩古城秋背郭緣溪一徑幽不有小園新竹色君來那肯暫淹留鏡湖雪霽貽方干天外曉嵐和雪望月中歸棹帶氷行相逢半醉吟詩苦應抵寒猿裊樹聲秋霽雨霽長空蕩滌清逺山初出未知名夜來江上如鈎月時有驚魚擲浪聲謝朱常侍寄貺蜀茶剡紙二首瑟瑟香塵瑟瑟泉驚風驟雨起寒煙一甄解却山中醉便覺身輕欲上天百幅輕明雪未融薛家凡紙漫深紅不應點染間言語留紀將軍蓋世功讀杜紫微集紫微才調復知兵長覺風雷筆下生還有枉拋心力處多於五柳賦間情寓題海上乘查便合仙若無仙骨未如船人間亦有支機石虛破聲明到洞天寓吟集陶集篇篇皆有酒崔詩句句不無杯醉來已共身安約讓却詩人作酒魁溪居即事籬外誰家不繫船春風催入釣魚灣小童疑是有村客急向柴門去却關雞買得晨雞共雞語常時不用等間鳴深山月黑風雨夜欲近曉天啼一聲獻浙江栁大夫屬城甘雨幾經春聖主全分付越人俗眼不知青瑣貴江頭爭看碧油新楊栁枝詞霧撚煙搓一索春年年長似染來新應須喚作風流線繫得東西南北人楚懷王宫花一朵掌中開緩急翻為敵國媒六里青山天下笑張儀容昜去還來對早梅寄友人二首憶得前年君寄詩海邊三見早梅詞與君猶是海邊客又見早梅花發時憶得去年有遺恨花前未醉到無花清芳一夜月通白先脫寒衣送酒家歎征人高駢心堅膽壯箭頭親十載沙場受苦辛力盡路傍行不得廣張紅斾是何人湘妃廟帝舜南巡去不還二妃幽怨水雲間當時珠淚垂多少直到如今竹尚斑赴安南却寄台司曽驅萬馬上天山風去雲回傾刻間今日海門南面事莫教還似鳯林關閨怨人世悲歡不可知夫君初破黑山歸如今又獻征南策早晚休縫帶號衣馬嵬驛玉顔雖掩馬嵬塵寃氣和煙鎖渭津蟬鬢不隨鑾駕去至今空感往來人宴犒蕃軍有感蜀地恩留馬嵬哭煙雨濛濛春草緑滿眼由來是舊人那堪更奏梁州曲寓懷關山萬里恨難銷鐡馬金鞭出塞遙為問昔時青海畔幾人歸到鳯林橋步虛詞青溪道士人不識上天下地鶴一隻洞門深鎖碧窗寒滴露研朱點周易贈歌者二首酒滿金船花滿枝佳人立唱慘愁眉一聲直入青雲去多少悲歡起此時公子邀歡月滿樓雙成揭調唱伊州便從席上風沙起直待陽關水盡頭入蜀萬水千山音信希空勞魂夢到京畿漫天嶺上頻回首不見虞封淚滿衣邊城聽角席冥風起雁聲秋隴水邊沙滿目愁三會五更吹欲盡不知曽白幾人頭渭川秋望寄右軍王特進長川終日碧潺湲知道天河與地連憑寄兩行朝闕淚願隨流入御溝泉山亭夏日緑樹隂濃夏日長樓臺倒影入池塘水精簾動微風起滿架薔薇一院香蜀路感懷蜀山蒼翠隴雲愁鑾駕西巡陷幾州唯有縈回深澗水潺湲不改舊時流殘春遣興畫舸輕橈栁色新摩河池上醉青春不辭不為青春醉只恐鶯花也怪人春日招賔花枝如火酒如餳正好狂歌醉復醒對酒看花何處好延和閣下碧筠亭遇天威徑豺狼坑盡却朝天戰馬休嘶瘴嶺煙歸路嶮巇今坦蕩一條千里直如弦對花呈幕中海棠初發去春枝首唱曽題七字詩今日能來花下飲不須頻把使頭旗寄題羅浮别業不將真性染埃塵為有煙霞伴此身帶日長江好歸信博羅山下碧桃春塞上曲二首二年邊戍絶煙塵一曲河灣萬恨新從此鳯林關外事不知誰是苦心人隴上征夫隴下魂死生同恨漢將軍不知萬里沙場苦空舉平安火入雲廣陵宴次戲簡幕賔一曲狂歌酒百分蛾眉畫出月爭新將軍醉罷無餘事亂把花枝折贈人安南送曹别勑歸朝雲水蒼茫日欲收野煙深處鷓鴣愁知君萬里朝天去為説征南已五秋對雪六出飛花入户時坐看青竹變瓊枝如今好上高樓望蓋盡人間惡路岐訪隱者不遇落花流水認天台半醉間吟獨自來惆悵仙翁何處去滿庭紅杏碧桃開赴西川途經虢縣作亞夫重過栁營門路指岷峨隔暮雲紅額少年遮道拜殷勤認得舊將軍錦城寫望蜀江波影碧悠悠四望煙花匝郡樓不會人家多少錦春來盡挂樹梢頭太公廟青山長在境長新寂寞持竿一水濵及得王師身已老不知辛苦為何人邊方春興草色青青栁色濃玉壷傾酒滿金鐘笙歌嘹亮隨風去知盡關山第幾重塞上寄家兄棣萼分張信使希幾多鄉淚濕征衣笳聲未斷腸先斷萬里雲天鳥不飛寫懷二首漁竿消日酒消愁一醉忘情萬事休却恨韓彭興漢室功成不向五湖遊花滿西園月滿池笙歌搖曳畫船移如今暗與心相約不動征旗動酒旗池上送春持竿間坐思沉吟釣得江鱗出碧潯回首看花花欲盡可憐寥落送春心南征敘懷萬里驅兵過海門此生今日報君恩回期直待烽煙靜不遣征衣有淚痕風筝夜靜絃聲響碧空宫商信任往來風依稀似曲才堪聽又被移將别調中平流園席上畫舸搖煙水滿塘栁絲輕軟小桃香却緣龍節為縈絆好是狂時不得狂南詔途中楊奇鯤風裏浪花吹又白雨中嵐影洗還青江鷗聚處窗前見林狖啼時枕上聽萬首唐人絶句卷四十七
