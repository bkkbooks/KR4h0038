body:
  text: 萬首唐人絶句巻七十五宋洪邁撰七言送韋判官盧綸前峯後嶺碧濛濛草擁驚泉樹帶風人語馬嘶聽不得更堪長路在雲中途中遇雨留别二端公隂雷慢轉野雲長驄馬雙嘶愛雨涼應念龍鍾在泥客欲摧肝膽事王章送潁陽徐少府潁陽春色似河陽一望繁花一縣香今日送君君最恨可憐才子白鬚長赴虢州留别故人世故相逢各未閒百年多在别離間昨夜秋風今夜雨不知何處入空山送暢當還舊山常逢明月馬塵間是夜照君歸處山山中松桂花發盡頭白屬君如等閒送僧金縷袈裟國大師能銷壊宅火燒時復來擁膝說無住知向人天何處期將赴京留獻令公沙鶴驚鳴野雨収大河風物颯然秋力微恩重亮難報不是行人不觧愁酬靈澈上人軍人奉役本無期葉落花開總不知走馬塵中頭雪白若為將面見湯師雨中酬友人看山獨行歸竹院水遶前堦草生遍空林細雨暗無聲唯有愁心兩相見哭苗主簿原頭殯御遶新塋原下行人望哭聲更想秋山連古木唯應石上見君名王駙馬花燭詩三首一首在前巻一个女婿萬人憐一夜稠踈扺百年為報司徒好將息明珠觧轉又能圓人主人臣是親家千秋萬歲保榮華幾時曾向高天裏得見今宵月裏花比翼和鳴雙鳳凰欲棲金帳滿城香平明却入天泉裏日氣曈曨五色光慿姚校書附書逹郗推官寄書常切到常遲今日慿君君莫辭若問玉人殊易識蓮花府裏最清羸驛中望山官微多懼事多同拙性偏無主驛功山在門前登不得鬢毛衰盡落塵中贈韓山人見君何事有慚顔白髪生來未到山更歎無家又無藥往來惟在酒徒間翫春戲呈李益掖垣春色自天來紅藥當堦次第開藼草叢叢爾何物等閒穿破緑莓苔出山逢耿湋雲雪離披山萬重别來曾住最高峰暫到人間歸不得長安陌上又相逢壯公院聞琴悞以聲音祈逺公請將徽軫付秋風漾漾峽流吹不盡月華如在白波中題印禪師影堂雙屨參差錫杖斜衲衣交膝對天花瞻空悟問修持刼似指前溪無數沙伯夷廟中條山下黄礓石疊作夷齊廟裏神樹葉滿階塵滿座不知澆酒為何人華清宫二首漢家天子好經過白日青山宫殿多見說只今生草處禁泉荒石已相和天氣朦朧暖畫梁一回開殿滿山香宫娃幾許經歌舞白首翻令憶建章過僊遊寺上方下方雪中路白雲流水閒數歩峰到盡時猶未歸寂寞經聲竹隂暮題野寺寺前山遠古陂寛寺裏人移春草寒何事最堪悲色相折花將與老僧看看弄郤翁伯洛下渠頭百卉新滿筵歌笑獨傷春須臾更看郤翁伯即我此身如此人新茶詠三獻蓬萊始一嘗自調金鼎閱芳香貯之玉合纔半餅寄與阿誰題數行渡浙江前船後船未相及五兩頭平北風急飛沙巻地日色昏一半征㠶潮浪濕出軍戎昱龍繞旌竿獸滿旗翻營乍似雪山移中軍一隊三千騎盡是并州遊俠兒寂上人禪房俗塵浮垢閉禪關百歲身心幾日閒安得此生同草木無營長在四時間桂州口號畫角三聲動客愁曉霜如雪覆江樓誰道桂林風景暖到來重著皂貂裘紅槿花花是深紅葉麴塵不將桃李共爭春今日驚秋自憐客折來持贈少年人哭黔中薛大夫亞相何年鎮百蠻生涯萬事瘴雲間夜郎城外誰人哭昨日空餘旌節還感春看花淚盡知春盡魂斷看花秪恨春名位未霑身欲老詩書寧救眼前貧途中寄李二楊桞煙含灞岸春年年攀折為行人好風若借低枝便莫遣青絲掃路塵寄許鍊師掃石焚香禮碧空露華偏濕蘂珠宫如何說得天壇上萬里無雲月正中下第留辭顧侍郎綺陌彤彤花照塵王門侯邸盡朱輪城南舊有山村路欲向雲霞覔主人題雲公山房雲公蘭若深山裏月明松殿微風起試問空門清淨心蓮花不著秋潭水郢城秋望郎士元白首思歸歸不得空山聞雁雁聲哀高城落日望西北又見秋風逐水來送别穆陵關上秋雲起安陸城邉遠行子薄暮寒蟬三兩聲回望故鄉千萬里送麴司直曙雪蒼蒼兼曙雲朔風燕雁不堪聞貧交此别無他贈唯有青山逺送君留别常著歲晏蒼郊蓬轉時遊人相見說歸期宓君堂上能留客明月還家應未遲送張光歸吳看取庭蕪白露新勸君不用乆風塵秋來多見長安客觧愛鱸魚能幾人聞吹楊葉者二首妙吹楊葉動悲笳邊馬迎風起恨賖若是雁門寒月夜此時應巻盡驚沙天生一藝更無倫寥亮幽音妙入神吹向别離攀折處當應合有斷腸人夜泊湘江湘江木落洞庭波湘水連雲秋雁多寂寞舟中誰借問月明只自唱漁歌侍燕詠桃花蘇頲桃夭灼灼有光輝無語成蹊㸃更飛為見芳林含笑待遂同温樹不言歸奉和聖製韋嗣立莊樹色參差隠翠微泉流百尺向空飛傳聞此處投竿往遂使兹辰扈蹕歸戲贈趙使君羙人張謂紅粉青娥映楚雲桃花馬上石榴裙羅敷獨向東方去漫學仙家作使君安公房問灋張繼流年一日復一日世事何時是了時試向東林問禪伯遣將心地學琉璃上清詞紫陽宫女捧丹砂王母令過漢帝家春風不肯停仙馭却向蓬萊看杏花送顧況泗上覲叔父呉鄉歲貢足嘉賔後進之中見此人别業更臨洙泗上擬將書卷對殘春留别何事千年遇聖君坐令雙鬢老江雲南行更入山深淺岐路悠悠水自分樂府雜詞三首二首見前劉言史紫禁梨花飛雪毛春風絲管翠樓高城裏萬家聞不見君王試舞鄭櫻桃蟬翼紅冠粉黛輕雲和新教羽衣成月光如雪金堦上迸却頗黎義甲聲不耐簷前紅槿枝薄䊋春寢覺仍遲夢中無限風流事夫婿多情亦未知歲暮題楊録事江亭楊生蜀客垂絲蜀客涕濡衣歲盡長沙未得歸腸斷錦㠶風日好可憐桐鳥出花飛冬日峽中旅泊霜月明明雪復殘孤舟夜泊使君灘一聲鐘出逺山裏暗想雪忩僧起寒泊花石浦舊業藂臺廢苑東幾年為梗復為蓬杜䳌啼斷回家夢半在邯鄲驛樹中聞崔倚旅葬逺客那能返故廬蒼梧埋骨痛何如他時親戚空相憶席上同悲一紙書賦番子牧馬磧淨山高見極邊孤烽引上一條煙蕃落多晴塵擾擾天軍獵到鸊鵜泉牧馬泉平沙漫漫馬悠悠弓箭閒抛郊水頭䑕毛衣裏取羌笛吹向秋天眉眼愁越井臺望獨立陽臺望廣州更添覊客異鄉愁晚潮未至早潮落井邑暫依沙上頭扶病春亭強梳稀髪著綸巾捨杖空行試病身花間自欲裴佪立穉子牽衣不許人贈童尼舊時艷質如明玉今日空心是冷灰料得昭王惆悵極更無雲雨到如今讀故友于君集大底從頭總是悲就中偏愴築城詞依然想得初成日寄出秋山與我時病僧二首竺國鄉程筭不回病中衣錫徧浮埃如今漢地諸經本自過流沙逺背來空林衰病卧多時白髪從成數寸絲西行却過流沙日枕上寥寥心獨知右軍墨池永嘉人事盡歸空逸少遺居蔓草中至今池水涵餘墨猶共諸泉色不同送僧歸山楚俗飜花自送迎密人來往豈知情夜行獨自寒山寺雪逕泠泠金錫聲題源分竹亭繞屋扶踈千萬竿年年相誘獨行看日光不透煙常在先校諸家一月寒山寺看櫻桃花題僧壁楚寺春風臘盡時含桃先坼一千枝老僧不語傍邉坐花發人來總不知傷清江上人往年偏共仰師遊聞過流沙淚不休此身豈得多時住更著塵心起外愁山寺看海榴花琉璃地上紺宫前發翠凝紅幾十年夜乆月明人去盡火光霞熖遞相燃贈成煉師四首花冠蘂帔色嬋娟一曲清簫凌紫煙不知今日重來意更住人間幾百年黄昏騎得下天龍廵遍茅山數十峰採芝却到蓬萊上花裏猶殘碧玉鐘等閒何處得靈方丹臉雲鬟日月長大羅過却三千歲更向人間魅阮郎曾隨阿母漢宫齋鳳駕龍軿列御堦當時白燕無尋處今日雲鬟見玉釵上已日陪襄陽李尚書宴光風亭碧池萍嫩桞垂波綺席絲鏞舞翠娥為報㑹稽亭上客永和應不勝元和奉酬閏餘春草景沉沉褉飲風亭恣賞心紅袖青娥留永夕漢隂寧肯羡山隂病中客散復言懐華髪離披卧滿頭暗蟲衰草入鄉愁枕前人去空庭暮又見芭蕉白露秋處州月夜穆中丞席和主人羌竹繁弦銀燭紅月光初出桞城東忽見隠侯裁一詠還須書向郡樓中尋花遊春未足春將度訪紫尋紅少在家借問流鶯與飛蝶更知何處有幽花贈陳長史妓本内宫人寳鈿雲和玉禁僊深含媚靨褭朱弦春風不怕君王恨引出幽花落外邊題王況故居入巷蕭條起悲緒兒女猶居舊貧處塵滿空牀屋見天獨作驢鳴一聲去偶題遲日新䊋遊冶娘盈盈綵艇白蓮塘掬水逺濕岸邊郎紅綃縷中玉釧光慟桞論孀妻棲戸仍無嗣欲訪孤墳誰引至裴佪無處展哀情惟有衣襟知下淚夜入簡子古城逺火熒熒聚寒鬼緑燄欲銷還復起夜深風雪古城空行客衣襟汗如水桂江中題香頂臺岧岧香積凌空翠天上名花落幽地老僧相對竟無言山鳥却呼諸佛字僧簷前獨竹詠亂石田中寄孤本亭亭不住凌虛引欲以袈裟拂著來一邊碧玉無輕粉送人隨姊夫任雲安令閒逐維私向武城北風青雀片時行孤㠶瞥過荆州岸認得瞿塘急浪聲山中喜崔補闕見尋鹿袖青藜䑕耳巾潛夫豈觧拜朝臣白屋藜牀還共入山妻老大不羞人偶題三首金牓榮名俱失盡病身為庻更投魑春娥慢笑無愁色别向人家舞柘枝得罪除名謫海頭驚心無暇與身愁中使不知何處住家書莫寄向春州嘉興社日消渴天涯寄病身臨卭知我是何人今年社日分餘肉不值陳平又不均席上贈李尹傴僂山夫髮似絲松間石上坐多時飄飲不曾看酒肆世人空笑亦何為弼公院問病一頭細髮兩分絲卧見芭蕉白露滋欲令居士身無病直待衆生苦盡時惜花年少共憐含露色老人偏惜委塵紅如何遂得心中事毎要花時不厭風代番僧留别此地縁疎語未通歸時老病去無窮定知不徹南天竺死在條支隂磧中桂江逢王使君旅襯歸故人丹旐出南威少婦隨喪哭漸歸遥想北原新壠上日寒光淺小松稀萬首唐人絶句巻七十五
