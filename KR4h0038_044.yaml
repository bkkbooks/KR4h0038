body:
  text: 萬首唐人絶句巻四十四宋洪邁編七言贈少年温庭筠江海相逄客恨多秋風葉下洞庭波酒酣夜别淮隂市月照髙樓一曲歌答段柯古見啁彩翰殊翁金繚繞一千二百逃飛鳥尾薪橋下未為癡暮雨朝雲世間少彈箏人天寶年中事玉皇曾將新曲教寧王鈿蟬金鴈皆零落一曲伊州淚萬行瑶瑟怨冰簟銀牀夢不成碧天如水夜雲輕鴈聲還向瀟湘去十二樓中月自明夏中病痁作山鬼揚威正氣愁便辭珍簟襲狐裘西忩一夕悲人事團扇無情不待秋元處士池上蓼穗茭叢思蟪蛄水螢江鳥滿煙蒲愁紅一片風前落池上秋波似五湖華隂韋氏林亭自有林亭不得閒陌塵宫樹是非間終南秪在茅簷外别向人間㸔華山寄裴生乞釣鉤一隨菱棹謁王侯深愧移文負釣舟今日太湖風色好却將詩句乞魚鉤春日雨細雨濛濛入絳紗湖亭寒食孟珠家南朝漫自稱流品宫體何曾為杏花洛陽鞏樹先春雪滿枝上陽宫柳囀黄鸝桓譚未便忘西笑豈為長安有鳯池四老商於角里便成功一寸沉機萬古同但得戚姬甘定分不應真有紫芝翁蓮花緑塘揺灎接星津軋軋蘭橈入白蘋應為洛神波上襪至今蓮蘂有香塵過吳景帝陵王氣銷來水淼茫豈能才與命相妨虚開直瀆三千里青葢何曾到洛陽龍尾驛婦人圖慢笑開元有倖臣直教天子到䝉塵今來㸔畵猶如此何況親逄絶世人薛氏池垂釣池塘經雨更蒼蒼萬㸃荷珠曉氣凉朱瑀空偷御溝水錦鱗紅尾屬嚴光簡同志開濟猶來變盛衰五車纔得號鎡基留侯功業何容易一卷兵書作帝師贈鄭徴君一抛蘭棹逐燕鴻曾向江湖識謝公每到朱門還悵望故山多在畵屏中車駕西遊因而有作宣曲長楊瑞氣凝上林狐兎待秋鷹誰將詞賦陪雕輦寂寞相如卧茂陵傷温徳彛昔年敵騎犯榆關一敗龍城匹馬還侯印不聞封李廣他人丘壟似天山題端正樹路傍佳樹碧雲愁曾侍金輿幸驛樓草木榮枯似人事緑隂寂寞漢陵秋題李相公勑賜錦屏風豐沛曾為社稷臣賜書名畵墨猶新幾人同保山河誓獨自棲棲九陌塵題友人居盡日松堂㸔畵圖綺䟽岑寂似清都若教煙水無鷗鳥張翰何由到五湖蔡中郎古墳零落野花春聞說中郎有後身今日愛才非昔日枉抛心力作詞人渭上題三首吕公榮達子陵歸萬古煙波遶釣磯橋上一通名利迹至今江鳥背人飛目極雲霄思浩然風帆一片水連天輕橈便是東歸路不肯忘機作釣船煙水何曾息世機暫時相向亦依依所嗟白首磻溪叟一下漁舟更不歸經故翰林袁學士居劒逐驚波玉委塵謝安門下更何人西州城外花千樹盡是羊曇醉後春題杜邠公林亭卓氏壚前金線柳隋家堤伴錦帆風貪為兩地分霖雨不見池蓮照水紅贈張鍊師丹溪藥盡變金骨清洛月寒吹玉笙他日隐居無訪處碧桃花發水縱横河中紫極宫昔年曾伴玉真遊毎到仙宫即是秋曼倩不歸花落盡滿叢煙露月當頭夜㸔牡丹高低深淺一欄紅把火殷勤照露叢希逸近來成懶病不能容易向春風宿城南亡友别墅水流花落歎浮生又伴遊人宿杜城還似昔年殘夢裏透簾斜月獨聞鶯過分水嶺溪水無情似有情入山三日得同行嶺頭便是分頭處惜别潺湲一夜聲鄠杜郊居槿籬芳暖近樵家壠麥青青一逕斜寂寞遊人寒食後夜來風雨送梨花長安春晚二首曲江春半日遲遲正是王孫悵望時杏花落盡不歸去江上東風吹柳絲四方無事太平年萬象鮮明禁火前九重細雨惹春色輕染龍池楊柳煙三月十八日雪中作芍藥薔薇語早梅不知誰是艶陽才今朝領得東風意不復饒君雪裏開咸陽值雨咸陽橋上雨如懸萬㸃空濛隔釣船還似洞庭春水色晚雲將入岳陽天瑟瑟釵翠染冰輕透露光墮雲孫壽有餘香只應七夕回天浪添作湘妃淚兩行南歌子詞二首一尺深紅勝麴塵天生舊物不如新合歡桃核終堪恨裏許元來别有人井底㸃燈深燭伊共郎長行莫圍棊珍瓏骰子安紅豆入骨相思知不知題石泉蘭若段成式矗竹為籬松作門石楠隂底藉芳蓀方袍近日少平叔注得逍遥無處論怯酒大白東西飛正狂新蒭石凍雜梅香詩中反語常回避尤怯花前喚索郎牛尊師宅㸔牡丹洞裏仙春日更長翠叢風剪紫霞芳若為蕭史通家客情願扛壺入醉鄉觀碁閒對奕楸傾一壺黄羊枰上幾成都他時謁帝銅池曉便賭宣城太守無題僧壁有僧支頰撚眉毫起就夕陽磨剃刀到此既知閒最樂俗心何啻九牛毛哭房處士獨上黄壇幾度盟印開龍渥喜丹成豈同叔夜終無分空向人間著養生呈輪上人虎到前頭心不驚殘陽擇蝨懶逄迎東林水石未勝此要假逺公方有名題谷隐蘭若三首風惹閒雲半谷隂巖西隐者醉相㝷草衰乍覺徑增險葉盡却疑溪不深鳥啄靈鶵戀落暉村情山趣頓忘機丹成道士過門數葉盡寒猿下嶺稀風帶巢熊抝樹聲老僧相引入雲行半坡新路畬纔了一谷寒煙燒不成不赴光風亭夜飲井開屈膝見吳娃蠻蠟同心四照花姹女不愁難管領斬新鉛裏得黄牙嘲元中丞鶯裏花前選孟光東山逋客酒初狂素娥畢竟難防備燒得河車莫遣嘗寄温飛卿牋紙三十六鱗充使時數畨猶得裹相思待將袍襖重抄了盡冩襄陽播掿詞嘲飛卿七首曾見當壚一箇人入時装束好腰身少年花蔕多芳思只向詩中冩取真醉袂幾侵魚子纈飄纓長罥鳯凰釵知君欲作閒情賦應願將身作錦鞵翠蝶密偎金叉首青蟲危泊玉釵梁愁生半額不開靨只為多情團扇郎柳煙梅雪隐青樓殘日黄鸝語未休見說自能裁袙腹不知誰更著帩頭愁機嬾織同心苣悶繡先描連理枝多少風流詞句裏愁中空詠早環詩燕支山色重能輕南陽水澤鬬分明不煩射雉先張翳自有琴中威鳯聲半歳愁中鏡似荷牽環撩鬢却須磨花前不復抱瓶渇月底還應琢刺歌柔卿解籍戲呈飛卿三首長擔犢車初入門金牙新醖盈深罇良人為漬木𤓰粉遮却紅腮交午痕最宜全幅碧鮫綃自襞春羅等舞腰未有長錢求鄴錦且令裁取一團嬌出意挑鬟一尺長金為鈿鳥簇釵梁鬱金種得花茸細添入春衫領裏香戲高侍御七首百媚城中一箇人紫羅垂手見精神青琴仙子長教示自小來來號阿真七尺髪猶三角梳玳牛獨駕長檐車曾城自有三青鳥不要蓮東雙鯉魚花恨紅腰柳妒眉東鄰墻短不曾窺猶憐最小分𤓰日奈許迎春得藕時自等腰身尺六彊兩重危鬢盡釵長欲燻羅薦嫌龍腦須為㝷求石葉香别起青樓作幾層斜陽慢巻轆轤䋲厭裁魚子深紅纈泥覔蜻蜓淺碧綾詐嫌嚼貝磨衣鈍私帶男錢壓鬢低不獨邯鄲新嫁女四枝鬟上挿通犀可羡羅敷自有夫愁中漫捋白髭鬚豹錢騘子能擎舉兼著連乾許換無送僧二首形神不滅論初成愛馬乘閒入帝京四十三年虚過了方知僧裏有唐生想到頭陀最上方桂隂猶認惠宗房因行戀燒歸來晚忩下猶殘一字香猿却憶書齋值晚晴挽枝閒嘯激蟬清影沉巴峽夜巖色蹤絶石塘寒瀨聲送穆郎中赴闕應念愁中恨索居驪歌聲裏且踟蹰若逄金馬門前客為説虞卿乆著書題商山廟偶出雲泉謁禮闈篇章曾沐漢皇知無謀靜國東歸去羞過商山四老祠折楊柳七首枝枝交影鎻長門嫰色曾沾雨露恩鳯輦不來春欲盡空留鶯語到黄昏水殿年年占早芳柔條偏惹御爐香而今萬乘多廵狩輦路無隂緑草長玉樓煙薄不勝芳金屋寒輕翠帶長公子驊騮徃何處緑隂堪繫紫遊韁嫰葉初齊不耐寒風和時拂玉欄干君王去日曽攀折泣雨傷春翠黛殘微黄纔綻未成隂繡户朱簾相映深長恨早梅無賴極先將春色出前林隋家堤上已成塵漢將營邉不復春只向江南并塞北酒旗相伴惹行人陌上河邉千萬枝怕寒愁雨盡低垂黄金穟短人多折已恨東風不展眉哭李羣玉酒裏詩中三十年縱横唐突世喧喧明時不作禰衡死傲盡公卿歸九泉漢宫詞二首歌舞初承恩寵時六宫學妾畵蛾眉君王厭世妾頭白聞唱歌聲却淚垂二八能歌得進名人言選入便光榮豈知妃后多嬌妬不許君前唱一聲醉中吟只愛糟牀滴滴聲長愁聲絶又醒醒人間榮辱不常定唯有南山依舊青桃源僧舍㸔花前年帝里探春時寺寺名花我盡知今日長安已灰燼忍能南國對芳枝酬段柯古不赴夜飲元繇玉樹瓊筵映彩霞澄波虚閣似仙家只縁存想歸蘭室不向光風㸔夜花㸔牡丹金蘂霞英疊綵香初疑少女出蘭房逡巡又是一年别寄語集仙呼索郎及第後宿平康里鄭合敬春來無處不閒行楚閏相㸔别有情好是五更殘酒醒時時聞喚狀頭聲黄陵廟詞李逺黄陵廟前莎草春黄陵女兒舊裙新輕舟小楫唱歌去水逺山長愁殺人春閨怨李頻紅粉女兒忩下羞畵眉夫壻隴西頭自怨愁容長照鏡悔教征戍覔封侯春日旅舍未識東西南北路青春白日坐銷難如何一别故園後五度花開五處㸔吳門别主人早晚更㸔吳苑月小齋長憶落西忩不知明夜誰家見應照離人隔楚江自黔中歸新安朝過春關辭北闕暮㕘戎幕向南巴却將仙桂東歸去江月相隨直到家過長江傷賈島忽從一宦逺流離無罪無人子細知到得長江聞杜宇想君魂魄也相隨客洛酬劉駕浮世總應相送老共君偏更逺行多此回不似前回别聽盡離歌逐櫂歌和鄭薰三四株松匝草亭便成彭澤柳為名蓮峯隐去難辭闕滻水朝回與出城題釣臺障子君家盡是我家山嚴子前臺枕古灣却把釣竿終不可幾時入海得魚還自遣永擬東歸把釣絲將行怱起半心疑青雲道是不平地還有平人上得時寄曹鄴終南山是枕前雲禁鼓無因曉夜聞朝客秋來不朝日曲江西岸去尋君述懷望月疑無得桂縁春天又待到秋天杏花開與槐花落愁去愁來過幾年憤題吳武陵雀兒來逐颶風高下視鷹鸇意氣豪自謂能生千里翼黄昏依舊入蓬蒿萬首唐人絶句巻四十四
