body:
  text: 萬首唐人絶句卷六十六宋洪邁編七言十離詩上浙東元相公薛書記犬離主馴擾朱門四五年毛香足淨主人憐無端咬著親情客不得紅絲毯上眠筆離手越管宣毫始稱情紅箋紙上撒花瓊都緣用久鋒頭盡不得羲之手裏擎馬離廄雪耳紅毛淺碧蹄追風曾到日東西為驚玉貌郎君墜不得華軒更一嘶鸚鵡離籠隴西獨自一孤身飛去飛來上錦絪都緣出語無方便不得籠中再喚人燕離窠出入朱門未忍拋主人常愛語交交銜泥穢汚珊瑚簟不得梁間更壘巢珠離掌皎潔圓明內外通清光似眼水晶宫都緣一點瑕相穢不得終宵在掌中魚離池戲躍蓮池四五秋常搖朱尾弄輪鉤無端擺斷芙蓉朵不得清波更一遊鷹離主爪利如鋒眼似鈴平原捉兔稱髙情無端竄向青雲外不得君王手裏擎竹離亭蓊鬱新栽四五行常將徑節負秋霜為緣春筍鑽牆破不得埀陰覆玉堂鏡離臺鑄㵼黃金鏡始開初生三五月徘徊為遭無限塵蒙蔽不得華堂上玉臺人日玩雪趙彥昭始見青雲于律吕俄逢瑞雪應陽春今曰回看上林樹梅花栁絮一時新湖州貢焙看發新茶張文規鳯輦尋春半醉回仙娥進水御簾開牡丹花笑金鋪動傳奏吳興紫笋來項羽廟李山甫為霸為王盡偶然有何羞見漢江船停分天下猶嫌少可要行人贈紙錢下第出春明門曾和秋雨驅愁入却向春風領恨回深謝霸陵隄畔栁與人頭上拂塵埃遊俠兒好把雄姿渾世塵一場間事莫因循荆軻只為間言語不與燕丹了得人望思臺君父昏蒙死不回漫將平地築髙臺九層黃土是何物銷得向前寃恨來滄浪峽走轂飛蹄過此傍幾人留意問滄浪煙波莫笑題名客為愛朝宗日夜忙代崇徽公主金叉墜地鬢堆雲自别昭陽帝豈聞遣妾一身安社稷不知何處用將軍栁十首灞岸江頭臘雪消東風偷軟入纎條春來不忍登樓望萬架金絲著地嬌受盡風霜得到春一條條是逐年新尋常送别無餘事爭忍攀將過與人長恨陽和也世情把香和艷與紅英家家只是栽桃李獨自無根到處生只為遮樓又拂橋被人摧折好枝條假饒張緒如今在須把風流暗裏銷弱帶低埀可自由傍他門户傍他樓金風不解相擡舉露壓煙欺直到秋終日堂前學畫眉幾人曾道勝花枝試看三月春殘後門外清陰是阿誰也曾飛絮謝家庭從此風流别有名不是向人無用處一枝愁殺别離情從來只是愛花人楊栁何曾占得春多向客亭門外立與他迎送往來塵強扶柔態酒難醒漠漠春風别有情公子王孫且相伴與君俱得幾時榮無賴秋風斗且寒萬條煙罩一時乾遊人若要春消息直向江頭臘後看贈酒糾洛中舉子少插花枝少下籌須防女伴妬風流坐中若打占相令除却尚書莫點頭贈紅綃妓崔生誤到蓬萊頂上遊明璫玉女動星眸朱扉半掩深宫月應照瓊枝雪艷愁與徐兵曹酬獻二首桐廬神滕傳嗣浦口潮來初渺漫蓮舟搖揚采花難春心不愜空歸去會待潮平更折看忽然湖上片雲飛不覺舟中雨濕衣折得蓮花渾忘却空將荷葉蓋頭歸贈僧卓立不求名出家長懷片志在青霞今日英雄氣衝蓋誰能久坐寶蓮花贈張無頗廣利王女羞解明璫尋漢渚但憑春夢訪天涯紅樓日暮鶯飛去愁殺深宫落砌花燕語春泥墮錦筵情愁無意整花鈿寒閨欹枕不成夢香炷金爐自裊煙霅溪神歌一首山勢縈回水脈分水光山色翠連雲四時盡入詩人詠役殺吳興栁使君贈蕭郎洛浦神女玉筯凝腮憶魏宫朱絲一弄洗清風明晨追賞應愁寂沙渚煙消翠羽空織綃娘子織綃泉底少歡娛更勸蕭郎盡酒壺愁見玉琴彈别鶴又將清淚滴真珠薄太后廟七首薄后月寢花宫得奉君至今猶愧管夫人漢家舊日笙歌處煙草幾經秋復春王昭君雪裏穹廷不見春漢衣雖舊淚常新如今最恨毛延夀愛把丹青錯畫人戚夫人自别漢宫休楚舞不施妝粉恨君王無金豈得迎商叟吕氏何曾畏木強楊太真金叉墮地别君王紅淚流珠滿御牀雲雨馬嵬分散後驪宫不復舞霓裳潘妃秋月春風幾度歸江山猶是舊宫非東昏舊作蓮花地空想曾披金縷衣緑珠此日人非昔日人笛聲空怨趙王倫紅殘翠碎花樓下金谷千年更不春牛僧孺香風引到大羅天月地雲階拜洞仙共道人間惆悵事不知今夕是何年憑張立本女吟一首髙侍郎危冠廣袖楚宫裝獨步間庭逐夜涼自把玉簪敲砌竹清歌一曲月如霜答王軒苧蘿川女妾自吳宫還越國素衣千載無人識當時心比金石堅今日為君堅不得書韋氏巾洞庭君昔日江頭菱芡人蒙君數飲松醪春活君家室以為報珍重長沙鄭德璘贈馬祖峽中白衣截竹為筒作笛吹鳯凰池上鳯凰飛勞君更向黔南去即是陶鈞萬類時湘妃廟女子四首渺渺三湘萬里程淚篁幽石助芳貞孤雲日斷蒼梧野不得攀龍到玉京碧杜紅蘅縹眇香水絲彈月夢清涼峰巒一一俱相似九處堪疑百斷腸玉輦金根去不回湘川秋晚楚絃哀自從泣盡江籬血夜夜愁風怨雨來少將風月怨平湖見盡扶桑水到枯相約杏花壇上去畫欄紅子鬬樗蒱送張雲容酒蕭鳯臺臉花不綻幾含幽今夕陽春獨換秋我守孤煙無白日寒雲嶺上更添愁劉蘭翹和幽谷啼鶯整羽翰犀沈玉冷自長歎月華不忍扄泉户露滴松枝一夜寒雲容和韶光不鑒分成塵曾餌金丹忽有神不意薛生携舊律獨開幽谷一枝春薛昭和誤入宫牆漏網人月華清洗玉階塵自疑來到蓬山頂瓊艷三枝半夜春寄夫周混泉臺客人韋璜早知離别切人心悔作從來恩愛深黃泉𡨕漠雖長逝白日屏幃還重尋幽寃詩鄭瓊羅痛填心兮不能語寸腸斷兮訴何處春生萬物妾不生更恨香魂不相遇贈元載無名人城東城西舊居處城裏飛花亂如絮海燕銜泥欲下來屋裏無人却飛去襄州舉人一首流水涓涓芹努牙織烏西飛客還家荒村無人作寒食殯宫空對棠梨花巴陵古館吟老青衣爺娘送我青楓根不記青楓幾回落當時手刺衣上花今日為灰不堪著贈崔季衡王使君女五原分袂真胡越燕拆鶯離芳草竭年少煙花處處春北邙空恨清秋月答女子崔季衡莎草青青鴈欲歸玉腮珠淚灑臨岐雲鬟飄去香風盡愁見鶯啼紅樹枝五原女子一首雲鬟消盡轉蓬稀埋骨窮荒無所依牧馬不嘶沙月白孤魂空逐鴈南飛示唐燕士九華山白衣澗水潺潺聲不絶溪隴茫茫野花發自去自來人不知歸時唯對空山月甘棠叟一首春草萋萋春水緑野棠開盡飄香玉繡嶺宫前鶴髮人猶唱開元太平曲示顔濬張麗華秋草荒臺響夜蛬白楊凋盡減悲風綵箋曾襞欺江總綺閣塵銷玉樹空同賦孔貴嬪寶閣排雲稱望仙五雲髙豔擁朝天青溪猶有當時月應照瓊花綻綺筵同賦趙幼芳素魄初圎恨翠蛾繁華濃艷竟如何南朝唯有長江水依舊門前作逝波和顔濬簫管清吟怨麗華秋江寒月綺窗斜慚非後主題箋客得見臨春閣上花同龎德公望荆門鹿門少年馬紹隆千年故國嵗華奔一柱髙臺已斷魂唯有峴亭清夜月與君長嘯學蘇門憶荆南髙名宋玉遺間麗作賦蘭成絶盛才誰似遼東千嵗鶴倚天華表却歸來金陵詞故臺城妓宫中細草香紅濕宫內纎腰碧窗泣唯有虹梁春燕雛猶傍珠簾玉鉤立耿將軍守塋青衣一首獨持巾櫛掩玄關小帳無人燭影殘昔日羅衣今化盡白楊風起壠頭寒石甕寺紅裳歌一首涼風暮起驪山空長生殿鎖霜葉紅朝來試入華清宫分明憶得開元中題王紹窗上無名人何人窗下讀書聲南斗闌干北斗橫千里思家歸不得春風腸斷石頭城題崇聖寺漢州朱衣人禁煙佳節同遊此正值酴醾夾岸香緬想十年前往事強吟風景亂愁腸同前紫衣人策馬暫尋原上路落花芳草尚依然家亡國破一場夢惆悵又逢寒食天題芭蕉葉張仁寶寒食家家盡禁煙野棠風墜小花鈿如今空有孤魂夢半在嘉陵半錦川贈升道里美人謝翶陽臺後會杳無期碧樹煙深玉漏遲半夜香風滿庭月花前竟發楚王時美人答相思無路莫相思風裏花開只片時惆悵金閨却歸處曉鶯啼斷緑楊枝春陽曲長安美人長安少女踏春陽何處春陽不斷腸舞袖弓彎渾忘却羅帷空度九秋霜悼亡姫二首韋檢寶劒化龍歸碧落嫦娥隨月下黃泉一杯酒向青春晚寂寞書窗恨獨眠白浪漫漫去不回浮雲飛盡日西頽始皇陵上千年樹銀鴨金鳬也變灰亡姫和春雨濛濛不見天家家門外栁如煙如今腸斷空埀淚歡笑重追别有年贈峽山寺僧袁氏剛被恩情役此心無端變化幾湮沉不如逐伴歸山去長嘯一聲煙霧深贈姚坤夭桃鉛華久御向人間欲捨鉛華更慘顔縱有青丘今夜月無因重照舊雲鬟寄紫蓋陽居士黃陵美人落葉棲鴉掩廟扉莵絲金縷舊羅衣渡頭明月好携手獨自待郎郎不歸邢君牙宅怪三首昔日炎炎徒自知今無烽竈欲何為可憐國柄全無用曾見人人下末時鐡銚當時得意氣填心一曲君前直萬金今日不如庭下竹風來猶得學龍吟破笛頥焦鬢秃但心存力盡塵埃不復論莫笑今來同腐草曾經終日掃朱門禿帚渾家門客和且耶蠅冬朝每去依煙火春至還歸養子孫曾向符王筆端坐爾來求食渾家門寄同侣二首盧倚馬驢長安城東洛陽道車輪不息塵渺渺爭利貪前競著鞭相逢盡是塵中老日晚長川不計程離羣獨步不能鳴賴有青青河畔草春來猶得慰羈情詠雪獻曹州房敬去文狗愛此飄飄六出公輕瓊冷絮舞長空當時正逐秦丞相騰躑川原喜北風言志二首事君同樂義同憂那校糟粳滿志休不是守株空待兔終當逐鹿出林丘少年嘗負飢鷹用內顧曾無寵鶴心秋草驅除思去害平原毛血興從禽獻狄令張辨何用梯媒向外求長生只合內中修莫言大道人難得自是行心不到頭别墅偶題蕭徹新作茅齋野澗東松楸交影足悲風人間嵗月如流水何事頻行此路中萬首唐人絶句卷六十六
