body:
  text: 萬首唐人絶句卷三十八宋洪邁撰七言重陽二首趙嘏節逢重九海門外家在五湖煙水東還向秋山覔詩句伴僧吟對菊花風病酒堅辭綺席春菊花空伴水邉身由來舉止非間雅不是龍山落帽人十無詩寄桂府楊中丞琴酒曽將風月須謝公名迹滿江湖不知貴擁旌旗後猶暇憐詩愛酒無東省南宫興不孤幾因詩酒謬招呼一從開署芙蓉幕曽向風前記得無遙聞桂水繞城隅城上江山滿畫圖為問訾家洲畔月清秋擬許醉狂無日暮江邉一小儒空憐未有白髭鬚馬融已貴諸生老猶自容窺絳帳無一種吟詩號孔徒滄江有客獨踈愚初筵盡辟知名士許到風前月下無望斷南雲日已晡便應憑夢過重湖不知自古登龍者曾有因詩泥得無早遊門館一樵夫祗愛吟詩傍藥爐旌斾滿江身不見思言記得潁川無孔融襟抱稱名儒愛物憐才與世殊今日賓階忘姓字當時省記薦雄無僻愛江山俯坐隅人間不是便為圖樽前為問神仙伴肯向三清慰薦無膺門不避額逢朱絶境由來卷軸須早忝阿戎詩友契趨庭曽薦禰生無寄山僧雲裏幽僧不置房橡花藤葉蓋禪牀朝來逢著山中伴聞説新移最上方喜張濆及第九轉丹成最上仙青天暖日踏雲軒春風賀喜無言語排比花枝滿杏園贈張濆榜頭被駮落莫向花前泣酒杯謫仙依舊是仙才猶堪與世為祥瑞曾到蓬山頂上來悼亡二首一燭從風到奈何三年衾枕逐流波雖知不得公然淚時泣闌干恨更多明月蕭蕭海上風君歸泉路我飄蓬門前雖有如花貌爭奈如花心不同送張主薄顧非熊松忩久是餐霞客山縣新為主印官混俗故來分利祿不教長作異人看瓜洲送朱萬言渡頭風晚葉飛頻君去還吳我入秦雙淚别家猶未斷不堪仍送故鄉人秋夜長安病後作秋中帝里經旬雨晴後蟬聲更不聞牢落間庭新病起故鄉南去鴈成羣題王使君片玉勢似孤峯一片成坐來疑有白雲生主人莫怪殷勤看逺客長懷舊隱情代宫嬪栁公權不分前時忤主恩已甘寂寞守長門今朝却得君王顧重入椒房拭淚痕楓橋夜泊張繼月落烏啼霜滿天江楓漁火對愁眠姑蘇城外寒山寺夜半鐘聲到客船閶門即事耕夫占募逐樓船春草青青萬頃田試上吳門看郡郭清明幾處有新煙晚涼裴夷直簷前蔽日多髙樹竹下添池有小渠山客野僧歸去後晚涼移案獨臨書和周侍御洛城雪天街飛轡踏瓊英四顧全疑在玉京一種相如抽祕思兔園那比鳯凰城奉和大梁相公送人二首謝公日日傷離别又向西堂送阿連想到越中秋已盡鏡湖應羡月團圓北津楊栁迎煙緑南岸闌干映水紅君到襄陽渡江處始應回首憶羊公酬唐仁烈相别後喜隔風未發見寄離心一起淚雙流春浪無情也白頭風若有知須放去莫教重别又重愁秦中卧病思歸索索涼風滿樹頭破忩殘月五更秋病身歸處吳江上一寸心中萬里愁送王繢翠羽長將玉樹期偶然飛下肯多時翩翩一路嵐隂晚却入青蔥宿舊枝贈美人琴絃應從玉指到金徽萬態千情料可知今夜燈前湘水怨殷勤封在七條絲病中知皇子陂荷花盛發寄王繢十里蓮塘路不賖病來簾外是天涯煩君四句遙相寄應得詩中便看花嵗日先把屠蘇酒自知年幾偏應少先把屠蘇不讓春儻更數年逢此日還應惆悵羡他人上下七盤二首斗回山路掩皇州二載歡娛一望休從此萬重青嶂合無因更得重回頭商山半月雨漫漫偶值新晴下七盤山似換來天似洗可憐風日到長安八月十五日夜去年今夜在商州還為清光上驛樓宛是依依舊顔色自憐人換幾般愁南詔朱藤杖六節南藤色似朱拄行階砌勝人扶會須將入深山去倚看雲泉作老夫夜意蕭踈盡地林無影浩蕩連天月有波獨立空亭人睡後洛橋風便水聲多漫作月色莫來孤寢處春風任向别人家梁園桃李雖無數斷定今年不看花訪劉君擾擾馳蹄又走輪五更飛盡九衢塵靈芝破觀深松院還有齋時未起人楊栁枝詞已作緑絲籠曉日又成飛絮撲晴波隋家不合栽楊栁長遣行人春恨多寄杭州崔使君朝下歸來只閉關羡君髙步出人寰三年不見塵中事滿眼江濤送雪山窮冬曲江間步雪盡南坡鴈北飛草根春意勝春暉曲江永日無人到獨繞寒池又獨歸省中題新植雙松端坐髙宮起逺心雲髙水濶共幽沉更堂寓直將誰語自種雙松伴夜吟崇山郡地盡炎荒瘴海頭聖朝今又放歡兜交州已在南天外更過交州四五州臨水一見心原斷百憂益知身世兩悠悠江亭獨倚欄干處人亦無言水亦流題江上栁寄李使君桂江南度無楊栁見此令人眼暫明應學郡中賢太守依依相向許多情江上見月懷古月上江平夜不風伏波遺迹半成空今宵倍欲悲陵谷銅柱分明在水中鸚鵡勸爾莫移禽鳥性翠毛紅觜任天真如今漫學人言巧解語終須纍爾身寄婺州李給事二首心盡玉皇恩已逺迹留江郡宦應孤不知壯氣今何似猶得凌雲貫日無瘴鬼翻能念直心五年相遇不相侵目前唯有思君病無底滄溟未是深秋日六眸龜北涼應早三足烏南日正長常記京關怨搖落如今目斷滿林霜遣意梧桐墜露悲先朽松桂凌霜倚後枯不是世間長在物暫分貞脆竟何殊戲酬惟賞上人師是浮雲無著身我居塵網敢相親應從海上秋風便偶自飛來不為人寓言流水頽陽不暫停東流西落兩無情不是世間人自老古來華髮此中生憶家天海相迎無盡處夢魂來往尚應難誰言南海無霜雪試向愁人兩鬢看留客青梅欲熟笋初長嫩緑新隂繞砌涼湖館翛然無俗客白衣居士且匡牀别蘄春王判官四十年來真久故三千里外暫相逢今日一杯成逺别煙波眇眇恨重重將發循州社日於所居館宴送浪花如雪疊江風社過髙秋萬恨中明日便隨江燕去依依俱是故巢空亂後經淮隂岸朱放荒村古岸誰家在野水溪雲處處愁唯有河邉衰柳樹蟬聲相送到楊州别李季蘭古岸新花開一枝岸旁花下有分離莫將羅袖拂花落便是行人腸斷時九日期登山不得往因贈楊凝欲從携手登髙去一到門前意已無那得更將頭上髮學他年少插茱茰尋山家長孫佐輔獨訪山家歇還涉茅屋斜連隔松葉主人聞語未開門繞籬野菜飛黃蝶沼邉枯樹野火燒枝水洗根數圍枯樹半心存應是無機承雨露却將春色寄苔痕别友人愁多不忍醒時别想極還尋靜處行誰遣同衾又分手不如行路本無情祠漁山神女歌二首王睿蓪草頭花椰葉裙蒲葵樹下舞蠻雲引領望江遙滴酒白蘋風起水生文棖棖山響答琵琶酒濕青莎肉飼鴉樹葉無聲神去後紙錢灰出木綿花即事奉呈韋使君秦系久卧雲間已息機青袍忽著狎鷗飛詩興到來無一事郡中今有謝元暉宴城東莊崔思一月生人笑幾回相逢相值且銜杯眼看春色如流水今日殘花昨日開同前崔敏童一年又過一年春百嵗曾無百嵗人能向花中幾回醉十千沽酒莫辭頻長門怨二首劉皂宫殿沉沉月欲分昭陽更漏不堪聞珊瑚枕上千行淚不是思君是恨君蟬鬢慵梳倚帳門蛾眉不掃慣承恩傍人未必知心事一靣殘粧空淚痕漁陽將軍張為霜髭擁頷對窮秋著白貂裘獨上樓向北望星提劔立一生長為國家憂婕妤怨王沈長信梨花暗欲棲應門上鑰草萋萋春風吹花亂撲户班絶車聲不至啼湘中謡二首崔塗煙愁雨細雲冥冥杜蘭香老三湘清故山望斷不知處􅀈鴂隔花時一聲蒼山遙遙江潾潾路傍老盡未間人王孫不見草空緑惆悵渡頭春復春泉逺辭巖竇瀉潺潺靜拂雲根別故山可惜寒聲留不得旋添波浪向人間感花繡軛香韀夜不歸少年爭惜最紅枝東風一陳黃昏雨又到繁花夢覺時巫山旅别五千里外三年客十二峯前一望秋無限别魂招不得夕陽西下水東流雲得路直為霖濟物不然間共鶴忘機無端是向陽臺畔長送襄王暮雨歸澗松寸寸凌霜長徑條路人猶笑未干宵南園桃李誠堪羡爭奈春殘又寂寥讀漢武內傳分明三鳥下儲胥一覺鈞天夢不如爭那白頭方士到茂陵紅樹已蕭踈聲歡戚猶來恨不平此中髙下本無情韓娥絶唱唐衢哭盡是人間第一聲題海棠花圖海棠花底三年住不覺海棠花盛開却向江南看圖畫始慙虛到蜀中來上巳日未敢分明賞物華十年如見夢中花遊人過盡衡門掩獨自憑欄到日斜夷陵夜泊家依楚塞窮秋别身逐孤舟萬里行一曲巴歌半江月便應消得二毛生放鷓鴣秋入池塘風露微曉開籠檻看初飛滿身金翠畫不得無限煙波何處歸江雨望花盧中細雨滿江春水漲好風留客野梅香避秦不是無歸意一度􅑮花一斷腸初識梅花江北不如南地暖江南好斷北人腸燕脂桃頰梨花粉共作寒梅一靣粧折楊桞朝朝車馬如蓬轉處處江山待客歸若使人間少離别楊花應合過春飛七夕年年七夕渡瑶軒誰道秋期有淚痕自是人間一周嵗何妨天上只黃昏泛楚江九重城外家書逺百里洲前客棹還金印碧幢見問一生安穩是長間讀庾信集四朝十帝盡風流建業長安兩醉遊唯有一篇楊柳曲江南江北為君愁題授陽鎮路越鳥巢邉溪路斷秦人耕處洞門開小桃花發春風起千里江山一夢回初過漢江襄陽好向峴亭看人物蕭條值嵗闌為報習家多置酒夜來風雪過江寒經劉校書墓喻鳬逺冡松回曲渚風其官聞是校書終霜情月思今何在零落人間䇿子中憶友人銀地無塵金菊開紫梨紅棗墮莓苔一泓秋水一輪月今夜故人來不來蔣處士宅喜間公至絶杯夏别螺江渡單鉢春過處士齋嘗茗議空經夜半照花明月影侵階邊患張陵今日漢家探使回蟻疊蕃兵來未歇春風渭水不敢流總作六軍心上血萬首唐人絶句卷三十八
