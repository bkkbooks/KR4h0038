body:
  text: 萬首唐人絶句巻七宋洪邁編七言侍宴臨渭亭張說青郊上已艷陽年紫禁皇遊祓渭川幸得歡娛承湛露心同草樹樂春天桃花園馬上林間艷色驕天馬苑裏濃籹伴麗人願逐南風飛帝席年年含笑舞青春春和玉眞公主遊大哥山池池如明鏡月華開山學香爐雲氣來神藻飛為鶺鴒賦仙聲颺出鳯凰臺送梁六巴陵一望洞庭秋日見孤峯水上浮聞道神仙不可接心隨湖水共悠悠望歸舟山高逈逈面長川江樹重重極逺烟形影相隨高翥鳥心肝併斷北風船襄陽路逢寒食去年寒食洞庭波今年寒食襄陽路不辭着處尋山水秖畏還家落春暮汎洞庭平湖一望上連天秋景千尋下洞泉忽驚水上江華滿疑是乗舟到日邊十五夜御前踏歌二首花蕚樓前雨露新長安城裏太平人龍啣火樹千燈熖鷄上蓮花萬樹春帝宫三五戯春臺行雨流風莫妬來西域燈輪千影合東華金闕萬重開蘇摩遮四首摩遮本出海西湖琉璃寳眼紫髯鬚聞道皇恩寰宇宙來將歌舞助歡娛繡裝帊額寳花冠夷歌妓舞借人看自能激水成隂氣不慮今年寒不寒臘月凝隂積帝臺齊歌急皷送寒來油嚢取得天河水將添上壽萬年杯寒氣冝人最可憐故將寒水散庭前唯願聖君無限壽長取新年續舊年出城寄權璩楊敬之李賀草煖雲昏萬里春宫花拂面送行人自言漢劒當飛去何事還車載病身南園一十二首花枝草蔓眼中開小白長紅越女腮可憐日暮􅀈香落嫁與春風不用媒宫北田塍曉氣酣黄桑飲露窣官簾長腰健婦偷攀折將餧吳王八蠒蠶竹裏繰絲挑網車青蟬獨噪日光斜桃膠迎夏香琥珀自課越傭能種𤓰三十未有二十餘白日長飢小甲蔬橋頭長老相哀念因遺戎韜一巻書男兒何不帶吳鈎收取闗山五十州請君暫上凌烟閣若個書生萬戸侯尋章摘句老雕蟲曉月當簾掛玉弓不見年年遼海上文章何處哭秋風長卿牢落悲空舍曼倩詼諧取自容見買若耶溪水劒明朝歸去事猿翁春水初生乳燕飛黄蜂小尾撲花歸窻含逺色通書幌魚擁香鈎近石磯泉沙耎臥鴛鴦暖曲岸回篙舴艋遲瀉酒木欄椒葉盖病容扶起種菱絲邊壤今朝憶蔡邕無心裁曲度春風舍南有竹堪書字老去溪頭作釣翁長巒谷口倚嵇家白晝千峯老翠華自履藤鞋收石宻手牽苔絮長蒓花松溪黑水新龍卵桂洞生硝舊馬牙誰為虞卿裁道帔輕綃一疋染朝霞昌谷北園新筍三首籜落長竿削玉開君看母筍是龍材更容一夜抽千尺别却池園數寸埃斫取青光寫楚辭膩香春粉墨離離無情有恨何人見露染烟啼千萬枝家泉入眼兩三莖曉看隂根紫脉生今年水曲春沙上笛管新篁㧞玉青三月過行宫渠水紅繁擁御墻風嬌小葉學蛾粧垂簾幾度青春老堪鎻千年白日長酬荅二首金魚公子夾衫長宻裝腰鞓割玉方行處春風隨馬尾柳花偏打内家香雍州二月海池春御水鵁鶄煖白蘋試問酒旗歌板地今朝誰是拗花人蝴蝶飛楊花撲帳春雲熱龜甲屏風醉眼纈東家蝴蝶西家飛白騎少年今日歸臨池曲孟郊池中春蒲葉如帶紫菱成角蓮子大羅裙蟬髩倚迎風雙雙伯勞飛向東登科後昔日齷齪不足誇今朝放蕩思無涯春風得意馬蹄疾一日看遍長安花濟源寒食五首風巢嫋嫋春鵶鵶無子老人仰面嗟柳弓葦箭覷不見高紅逺緑勞相遮女嬋童子黄短短耳中聞人惜春晩遊蜂匿蝶踏花來却把黄麋一甕􅀢一日踏春一百回朝朝没脚走芳埃饑童餓馬掃花餵向晩飲溪三兩盃長安落花飛天上南風引至三殿前可憐春物亦朝謁唯我孤吟濟水邊枋口花開掣手歸嵩陽與我留紅暉可憐躑跼千萬尺拄地拄天疑欲飛洛橋晩望天津橋下氷初結洛陽陌下行人絶榆柳蕭踈樓閣閒月明直見嵩山雪傷舊遊去春㑹處今春歸花數不減人數稀朝咲片時暮成泣東風一見還西歸聞夜啼寄泣須寄黄河泉此中淚怨流澈天愁人獨有夜燈見一紙鄉書淚滴穿過融上人蘭若孟浩然山頭禪室挂僧衣窻外無人溪鳥飛黄昏半在下山路却聽泉聲戀翠㣲濟江問舟子潮落江平未有風輕舟共濟與君同時時引領望天末何處青山是越中送杜十四之江南荆吳相接水為鄉君去春江正渺茫日暮征帆泊何處天涯一望斷人腸越中送人歸秦中試登秦望望秦川遥憶青門春可憐仲月送君從此别他時須及邵平田荅送别獨孤及洞庭正及蘋葉衰豈是秦吳别逺時謝君篋中綺端贈何以報之長相思陪王員外北樓待月勸酒論心夜不疲含情有待問誰思佇看明月澄清景來照江樓酩酊時海上懐華中舊遊凉風臺上三峯月不夜城邊萬里沙離别莫言闗塞逺夢魂長在子眞家將還越留别豫章諸公客鳥倦飛思舊林徘徊猶戀衆花隂他時相憶雙航葦莫問吳江深不深送别荆南張判官輶車駟馬徃從誰夢浦蘭臺日更遲欲識桃花最深處前程問取武陵兒和韋郎中尋楊駙馬不遇金屋瓊臺蕭史家暮春三月渭川花到君仙洞不相見謂已吹簫乗早霞垂花塢醉後戱題紫蔓青條覆酒壺落花時與竹風俱歸時自負花前醉笑向鯈魚問樂無自江華之衡陽吕温孤舟遲遲悵有違沿湘數日逗清暉人生隨分為憂喜囘鴈峰南是北歸看渾中丞山桃花朝來駐馬香街裏風度遥聞語笑聲無事閉門教日晩山桃落盡不勝情酬何處士懐郡樓月清質悠悠素彩融長天逈陸向為空佳人甚近山城閉一夜相望水鏡中别江華毛令布錦精塵任土冝疲人識信每相期今朝别後無他囑雖是蒲鞭也莫施戱贈靈徹上人僧家亦有芳塵興自是禪心無滯境君看池上湛然時何時不受花枝影感貞元舊節寄竇三盧七同侍先皇立玉墀中和舊節又支離今朝各自看花處萬里遥知掩淚時初發道州荅崔連州海陽亭吏中習隱好登攀不擾疲人便自閒聞説殷勤海陽事令人轉憶舜祠山荅段秀才盡日看花君不來江城半夜為君開樓中共指南園火紅燼隨花落碧苔吐蕃别舘臥病寄朝中親故二首星漢縱横車馬喧風揺玉珮燭花繁豈知羸臥窮荒外日滿山頭猶閉門清時令節千官㑹絶域窮荒一病夫遥想滿堂歌笑處幾人縁我向西隅宗禮欲往貴州苦雨戯贈農人辛苦緑苗齊正愛梅天水滿堤知汝使車行意速但令騘馬着障泥道州寄襄陽裴相公悠悠世路自浮沉豈問仁賢待物心最憶過時留宴處艷歌催酒後亭深江陵酒中留别坐客尋常縱恣倚青春不契心期更不親今日烟波九疑去相逢盡是眼中人道州送何山人匣有青萍笥有書何門不可曳長裾應須定取眞知者遣對明君説子虚送戴處士謁楊侍郎羸馬孤童鳥道㣲三千客散獨南歸山公念舊偏知我今日因君淚滿衣遊黄溪偶尋黄溪日欲没早梅未盡山櫻發無事江城閉此身不能坐待花間月衡州夜後把火看花留客紅芳暗落碧池頭把火遥看且少留半夜忽然風更起明朝不復上南棲看花招李兵曹不至夭桃紅燭正相鮮傲吏閒齋困獨眠應是夢中飛作蝶悠揚秖在此花前鏡中嘆白髪年過潘岳纔三歲還見星星兩鬂中縱使他時能早逹定知不作黑頭公迴風有懐銀宫翠島烟霏霏珠樹玲瓏朝日輝神仙望見不知處却逐迴風何處歸題河州赤岸村左南橋上見河州遺老相依赤岸頭匝塞歌中受恩者誰憐被髪笑東流題陽人城忠驅義感即風雷誰道南方乏武才天下起兵誅董卓長沙弟子最先來晉王龍驤墓虎旗龍艦順天風坐引全吳入掌中孫皓小兒何足取便令千載笑爭功劉郎浦吳蜀成婚此水潯明珠步障屋黄金誰將一女輕天下欲換劉郎鼎峙心臨洮送袁書記歸朝時袁作僧蕃中呼為袁師憶年十五在江湄聞説平源且半疑豈料殷勤洮水上却將歸信寄袁師題石勒城二首長驅到處積人頭大斾連營壓上游建業烏棲何足問慨然歸去王中州天生傑異固難馴應變摧枯若有神夷甫自能疑倚笑忍將虛誕誤時人友人邀聽歌有感文章抛盡愛功名三十無成白髪生辜負壯心羞欲死勞君貴買斷腸聲旱甚見權門移芍藥花緑原青壠漸成塵汲水開園日日新四月帶花移芍藥不知憂國是何人冬夜即事百憂攅心起復臥夜長耿耿不可過風吹雪片似花落日照氷紋如鏡破道州郡齋臥病寄東舘諸賢東池送客醉年華聞道風流勝習家獨臥郡齋寥落處隔簾㣲雨濕棃花送歐陽子還江華郡錢起江華勝事接湘濵千里湖山興入新才子思歸催去棹江花且為駐殘春訪李少卿不遇畫㦸朱樓映晩霞高梧寒柳度飛鴉門前不見歸軒過城上愁看落日斜與趙莒茶讌竹下忘言對紫茶全勝羽客對流霞塵心洗盡興難盡一樹蟬聲片影斜長安落第花繁柳暗九門深對飲悲歌淚滿襟數日鶯花皆落羽一囘春至一傷心王右丞堂前芍藥花開悽然感懐芍藥花開出舊欄春衫掩淚再來看主人不在花長在更勝青松守歲寒秋夜送人歸襄陽斗酒忘言良夜深紅萱滴露鶴驚林欲知别後思今夕漢水東流是寸心夜泊鸚鵡洲月照溪邊一罩蓬夜閒清唱有㣲風小樓深巷敲方響水國人家在處同春郊水透氷渠漸有聲氣融烟塢晩來明東風好作陽和使逢草逢花報發生送崔山人歸山東山殘雨掛斜暉野客巢由指翠㣲别酒稍酣乗興去知君不羡白雲歸過故洛城故城門前春日斜故城門裏無人家市朝欲認不知處漠漠野田空草花隴城三軍版築脱金刀黎庶飜慚將士勞不憶新城連障起唯驚畫角入雲高暮春歸故山草堂谷口春殘黄鳥稀辛夷花盡杏花飛始憐幽竹山窻下不改清隂待我歸歸雁瀟湘何事等閒回水碧沙明兩岸苔二十五絃彈夜月不勝清怨却飛來晩過横㶚寄張藍田亂水東流落照時黄花滿逕客來遲林端忽見南山色馬上還吟陶令詩九日田舍今日吾家野興偏東籬黄菊映秋田浮雲暝鳥飛將盡始逹青山新月前萬首唐人絶句巻七欽定四庫全書萬首唐人絶句巻七宋洪邁編五言嵩山夜還宋之問家住嵩山下好采舊山薇自省遊泉石何曾不夜歸湖上别鑒上人願與道林近在意逍遙篇自有靈佳寺何用沃洲禪題鑒上人房二首落花雙樹積芳草一庭春玩之堪興異何必見幽人晚入應真理經行尚未囘房中無俗物林下有青苔途中寒食馬上逢寒食途中屬暮春可憐江浦望不見洛橋人荅田徴君出遊杳何處遲囘伊洛間歸寢忽成夢宛在嵩丘山詠史髙適尚有綈袍贈應憐范叔寒不知天下士猶作布衣看田家春望出門何所見春色滿平蕪可歎無知己髙陽一酒徒閒居柳色驚心事春風厭索居方知一杯酒猶勝百家書送兵至薊北積雪與天迴屯兵連塞愁誰知此行邁不為覓封侯封丘作州縣才難適雲山道欲窮揣摩慚黠吏棲隱謝愚公題張處士菜園耕地桑柘間地肥菜常熟為問葵藿資何如廟堂肉石宫四詠元結石宫春雪白白雪宜蒼苔拂雪踐石徑俗士誰能來石宫夏水寒寒水宜髙林逺風吹蘿蔓野客熈清陰石宫秋氣清清氣宜山谷落葉逐霜風幽人愛松竹石宫冬日暖暖日宜温泉晨光靜水霧逸者猶安眠將牛何處去二首叔閒叟甥直者長子將牛何處去耕破故城東相伴有田父相歡惟牧童將牛何處去耕破西陽城叔閒修農具直者伴我耕將船何處去二首叔靜叟甥正者次子將船何處去釣彼大囘中叔靜能鼔橈正者隨弱翁將船何處去送客小囘南有時逢惡客還家亦少酣效何水部二首韋應物玉宇含清露香籠㪚輕烟應當結沈抱難從兹夕眠夕漏起遙怨蟲響亂秋陰反覆相思字中有故人心期元侍御不至二首庭樹忽已暗故人那不來秖應厭煩暑永月坐霜臺官榮多所繫閒居亦愆期髙閣猶相望青山欲暮時澧上醉題芳園知夕燕西郊已獨還誰言不同賞俱是醉花間西郊山髙鳴過雨澗樹落殘花非闗春不待當由期自賖對月寄孔諫議思懷在雲闕泊素守中林出處雖殊跡明月兩知心贈李儋風光山郡少來看廣陵春殘花猶待客莫問意中人寄釋子良史酒秋山僧冷病聊寄五三杯應瀉山瓢裏還寄此瓢來上皇三臺不寐倦長更披衣出户行月寒秋竹冷風切夜窗聲襃子卧病念子抱沉疾霜露變滁城獨此髙牕下自然無世情寄璨師林院生夜色西廊上紗燈時憶長松下獨坐一山僧寄盧陟柳葉遍寒塘曉霜凝髙閣累日此留連别來成寂寞宿永陽寄璨師遙知郡齋夜凍雪封松竹時有山僧來懸燈獨自宿雪行浙瀝覆寒騎飄颻暗川容行子郡城曉披雲看杉松秋夜寄丘員外懷君屬秋夜散步詠涼天山空松子落幽人應未眠入西齋示僧僧齋地雖密忘子跡要賖一來非問訊自是看山花贈丘員外跡與孤雲逺心將野鶴俱那同石氏子每到府門趨贈舊識少年遊太學負氣蔑諸生蹉跎三十載今日海隅行寄淮上綦母三請去聲作音佐滿城憐傲吏終日賦新詩請報淮陰客春帆浪作期送房杭州專城未四十暫謫豈蹉跎風雨呉門夜惻愴别情多聽江笛送陸侍御逺聼江上笛臨觴一送君還愁獨宿夜更向郡齋聞答賓斜月纔鑒帷凝霜偏冷枕持情須耿耿故作單牀寢送丘員外歸山居郡閣始嘉宴青山憶舊居為君量革履且願住籃轝答崔都水深夜竹庭雪孤燈案上書不遇無為化誰復得閒居酬令狐司録善福精舍見贈野寺望山雪空齋對竹林我以養愚地生君道者心答趙氏生暫與雲林别忽陪鴛鷺翔看山不得去知爾獨相望答王卿送别去馬嘶春草歸人立夕陽元知數日別要使兩情傷懷琅邪二釋子白雲埋大壑陰崖滴夜泉應居西石室月照山蒼然話舊存亡三十載事過悉成空不惜霑衣淚併話一宵中閶門懷古獨鳥下髙樹遙知呉苑園淒涼千古事日暮倚閶門登樓兹樓日登眺流嵗暗蹉跎坐厭淮陰守秋山紅樹多善福寺閣殘霞照髙閣清山出逺林晴明一登望瀟灑此幽襟寒食後北樓作園林過新節風花亂髙閣遙聞擊鼔聲蹴踘軍中樂西樓髙閣一長望故園何日歸烟塵擁函谷秋雁過來稀夜望南樓夜已寂暗鳥動林間不見城郭事沈沈唯四山晚登郡閣悵然髙閣望已掩東城闗春風偏送桞夜景欲沈山詠玉乾坤有精物至寶無文章雕琢為世器真性一朝傷詠露珠秋行一滴露清夜墜𤣥天將來玉盤上不定始知圓詠水精映物隨顔色含情無表裏持來向明月的皪愁成水詠珊瑚絳樹無花葉非石亦非瓊世人何處得蓬萊石上生詠琉璃有色同寒冰無物隔纎塵象筵看不見堪將對玉人詠琥珀曾為老茯神本是寒松液蚊蚋落其中千年猶可覿詠曉軍中始吹角城上河初落深沈猶隱帷晃朗先分閣詠夜明從何處去暗從何處來但覺年年老半是此中催詠聲萬物自生聽大空恒寂寥還從靜中起却向靜中消野居書情世事日可見身名良蹉跎尚瞻白雲嶺聊作負薪歌郡齋卧疾香爐宿火滅蘭燈宵影㣲秋齋獨卧病誰與覆寒衣秋齋獨宿山月皎如燭風霜時動竹夜半鳥驚栖窗閒人獨宿秋夜髙閣漸凝露涼葉稍飄闈憶在南宫直夜長鐘漏稀詠春雪徘徊輕雪意似惜艷陽時不悟風花冷翻令梅柳遲對殘燈獨照碧牕乆欲隨寒燼滅幽人將遽眠解帶翻成結紫荆花雜英紛已積含芳獨暮春還如故園樹忽憶故園人翫螢火時節變衰草物色近新秋度月影纔斂繞竹光復流移海榴葉有苦寒色山中霜霰多雖此蒙陽景移根意若何題桐葉參差剪緑綺瀟灑覆瓊柯憶在灃東寺偏書此葉多池上郡中卧病久池上一來賖榆柳飄枯葉風雨倒横查西塞山勢從千里奔直入江中斷嵐横秋塞雄地束驚流滿夜聞獨鳥啼失侣度山覓投林舍北啼今將獨夜意偏知對影栖聞雁故園眇何處歸思方悠㦲淮南秋雨夜髙齋聞雁來竹裏逕司空文明幽逕行跡稀清陰苔色古蕭蕭風欲來乍似蓬山雨黄子陂岸芳春色曉水影夕陽㣲寂寂深烟裏漁舟夜不歸田鶴散下渚田中隱見菰蒲裏哀鳴自相應欲作凌風起藥園春園芳已遍綠蔓雜紅英獨有深山客時來辨藥名石井苔色遍春石桐陰入寒井幽人獨汲時先樂殘陽影板橋横遮野水石前帶荒村道來往見愁人清風柳陰好石蓮花今逢石上生本自波中有紅艷秋風裏誰憐衆芳後逺寺鐘杳杳疎鐘發月風清復引中宵獨聽之似與東林近松下雪不隨晴野盡獨向深松積落照入寒光偏能伴幽寂新柳全欺芳蕙晚似妒寒梅疾撩亂發青條春風來幾日唐昌公主院㸔花遺殿空長閉乘鸞自不囘至今荒草上寥落舊花開别張讚今日山晴後殘蟬菊發時發樓見秋色何處最相思晚思蛩餘窗下月草溼階前露晚景淒我衣秋風入何樹留盧秦卿知有前期在難分此夜中無將故人酒不及石尤風金陵懷古輦路江楓暗宫朝野草春傷心庾開府老作北朝臣哭麴山人憶昔秋風起君曾歎逐臣何言芳草日自作九泉人下第趙嘏南溪抱瓮客失意自懷羞晚路誰攜手殘春自白頭到家童稚苦相問歸來何太遲共誰爭嵗月贏得鬢邊絲春釀春釀正風流梨花莫問愁馬卿思一醉不惜鷫鸘裘寒塘曉髮梳臨水寒塘坐見秋鄉心正無限一雁度南樓萬首唐人絶句巻七
