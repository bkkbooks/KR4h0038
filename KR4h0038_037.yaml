body:
  text: 萬首唐人絶句卷三十七宋洪邁編七言宫烏栖趙嘏宫烏栖處玉樓深微月生簷夜夜心香輦不回花自落春來空佩辟寒金長信宫君恩已盡欲何歸猶有殘香在舞衣自恨身輕不如燕春來長繞御簾飛廣陵城紅映髙臺緑繞城城邊春草傍墻生隋家不向此中盡汴水應無東去聲冷日過驪山冷日微煙渭水愁翠華宫樹不勝秋霓裳一曲千門鎖白盡梨園弟子頭下第後歸永樂里自題二首無地無媒只一身歸來空拂滿牀塵尊前盡日誰相對唯有南山似故人𤣥髮侵愁忽似翁暖塵寒袖共東風公卿門户不知處立馬九衢春影中出試日獨遊曲江江莎漸映花邊緑樓日自開池上春雙鶴繞空來又去不知臨水有愁人題曹娥廟青娥埋沒此江濵江樹颼飀慘暮雲文字在碑碑已墮波濤辜負色絲文題段氏中臺看山臺下水無塵碧篠前頭曲水春獨對一樽風雨夜不知家有早朝人華州座中獻盧給事送迎皆到三峯下滿靣煙霜滿馬塵自是追攀認知己青雲不假送迎人商山道中和如春色淨如秋五月商山是勝遊當晝火雲生不得一溪縈作萬重愁贈歙州妓灔灔橫波思有餘庾樓明月墮雲初楊州寒食春風寺看遍花枝盡不如贈王明府五柳逢秋影漸微陶潜戀酒不知歸但存物外醉鄉在誰向人間問是非吕校書雨中見訪竹閣斜溪小檻明惟君來賞見山情馬嘶風雨又歸去獨聽子規千萬聲千秋嶺下知有巖前萬樹桃未逢搖落思空勞年年盛發無人見三十六溪春水髙歙州道中僕逃去跳風雨幾奔波曽共辛勤奈若何莫遣窮歸不知處秋山重疊戍旗多重陽日寄韋舍人節過重陽菊委塵江邊病起杖扶身不知此日龍山㑹誰是風流落帽人贈薛勛下第一擲雖然未得盧驚人不用繞牀呼牢之坐被青雲逼秖問君能酷似無宛陵望月寄沈學士一川如畫敬亭東待詔閒遊處處同天竺山前鏡湖畔何如今日庾樓中翡翠巖芙蓉幕裏千場醉翡翠巖前半日閒惆悵晉朝人不到謝公拋力上東山發新安後途中寄盧中丞二首樓上風流庾使君笙歌曾醉此中聞目前已是陵陽路回首叢山滿眼雲晚樹蕭蕭促織愁風簾似水滿牀秋千山不礙笙歌月誰伴羊公上夜樓留題興唐寺滿水樓臺滿寺山七年今日共躋攀月髙對菊問行客去折芳枝早晚還廣陵道鬬雞臺邊花照塵煬帝陵下水含春青雲回翅北歸鴈白首哭途何處人茅山道中溪樹重重水亂流馬嘶殘雨晚程秋門前便是仙山路目送歸雲不得遊江上與兄别楚國湘江兩渺瀰暖川晴鴈背帆飛人閒離别盡堪哭何況不知何日歸落第九陌初晴處處春不能回避看花塵由來得喪非吾事本是釣魚船上人宛陵館冬青樹碧樹如煙覆晚波清秋欲盡客重過故園亦有如煙樹鴻鴈不來風雨多贈五老韓尊師有客齊心事玉晨對山鬚鬢緑無塵住山道士年如鶴應識當時五老人經汾陽舊宅門前不改舊山河破虜曽輕馬伏波今日獨經歌舞地古槐踈冷夕陽多寄盧中丞葉覆清溪灔灔紅路橫秋色馬嘶風獨携一榼郡齊酒吟對青山憶謝公途中故園回首鴈初來馬上千愁付一杯惟有新詩似相識暮山吟處共徘徊寄裴瀾綺雲初墮亭亭月錦度惟橫灩灎波宋玉逢秋正髙卧一篇吟盡奈情何淮南丞相坐贈歌者虞姹綺筵無處避梁塵虞姹清歌日日新來值渚亭花欲盡一聲留得滿城春酬段侍御蓮花上客思閒閒數首新詩到篳關吟得楚天風雨霽一條江水兩三山尋僧二首臺殿參差日墮塵塢西歸去一庵雲寒泉何處夜深落聲隔半巖踈葉聞溪户無人谷鳥飛石橋橫木掛禪衣看雲日暮倚松立野水亂鳴僧未歸發柏梯寺一泓秋水千竿竹靜得勞生半日身猶有向西無限地别僧騎馬入紅塵西江晚泊茫茫藹藹失西東柳浦桑村處處同戍鼓一聲帆影盡水禽飛起夕陽中南池照影池邉多少愁往來重見此塘秋芙蓉苑外新經雨紅葉相隨何處流江樓舊感獨上江樓思渺然月光如水水如天同來望月人何處風景依稀似去年南園雨過郊園緑尚微落花惆悵滿塵衣芳樽有酒無人共日暮看山還獨歸南亭孤亭影在亂花中悵望無人此醉同聽盡暮鐘猶獨坐水邊襟袖起春風贈女仙水思雲情小鳯仙月涵花態語如絃不因金骨三清客誰識吳州有洞天宣州送判官來時健筆佐票姚去折槐花度野橋誰見樽前此惆悵一聲歌盡路迢迢宿僧院月滿長空樹滿霜度雲低拂近簷牀林中夜半一聲磬卧見髙僧入道場尋僧斜日橫窗起暗塵水邊門户閉閒春千竿竹裏花枝動只道無人似有人經王先生故居晚波東去海茫茫誰識蓬山不死鄉弄玉已歸蕭史去碧樓紅樹倚斜陽送從翁中丞奉使㸃戛斯六首楊雄詞賦舉天聞萬里油幢照塞雲僕射峯西幾千騎一時迎著漢將軍旌旗杳杳鴈蕭蕭春盡窮沙雪未消料得堅昆受宣後始知公主已歸朝雖言窮北海雲中屬國當時事不同九姓如今盡臣妾歸期那肯待秋風牢山望斷絶塵氛灎灎河西拂地雲誰見魯儒持漢節玉關降盡可汗軍山川險易接邊塵秦漢圖來或未真自此盡知邊塞事河湟更欲託何人秦皇無䇿建長城劉氏仍窮北路兵若遇單于舊牙帳却應傷歎漢公卿東亭柳拂水斜煙一萬條幾隨春色倚河橋不知别後誰攀折猶自風流勝舞腰僧舍二首秖言雙鬢未蹉跎獨奈牛羊送日何禪客不歸車馬去晚簷山色為誰多溪上禪關水木間水南山色與僧閒春風盡日無來客幽磬一聲髙鳥還新月玉鉤斜傍畫簷生雲匣初開一寸明何事最能悲少婦夜來依約落邊城贈皇甫坦養由弓箭已無功牢落生涯事事同相勸一杯寒食酒幾多辛苦到春風四祖寺千株松下雙峯寺一盞燈前萬里身自為心猿不調伏祖師元是世閒人聽蟬噪蟬聲亂日初曛絃管樓中永不聞獨奈愁人數莖髮故園秋隔五湖雲寄遠禁鐘聲盡見棲禽關塞迢迢故國心無限春愁莫相問落花流水洞房深池上正憐佳月夜深坐池上暖回燕鴈聲猶有漁舟繫江岸故人歸盡獨何情春日書懷暖鶯春日舌難窮枕上愁生曉聽中應裊緑窗殘夢斷杏園零落滿枝風贈别水邊秋草暮萋萋欲駐殘陽恨馬蹄曾是管絃同醉伴一聲歌盡各東西靈巖寺館娃宫伴千年寺水闊雲多客到稀聞說春來更惆悵百花深處一僧歸代人聽琴二首抱琴花夜不勝春獨奏相思淚滿巾第五指中心最恨數聲嗚咽為何人湘娥不葬九疑雲楚水連天坐憶君惟有啼烏舊名在忍教嗚咽夜長聞訪沈舍人不遇溪翁强訪紫微郎曉鼓聲中滿鬢霜知在禁闈人不見好風飄下九天香座上獻元相公寂寞堂前日又曛陽臺去作不歸雲從來聞說沙吒利今日青娥屬使君遣興二首溪花入夏漸稀踈雨氣如秋麥熟初終日苦吟人不㑹海邊兄弟久無書讀徹殘書弄水回暮天何處笛聲哀花前獨立無人㑹依舊去年雙燕來送李給事眼前軒冕是鴻毛天上人間漫自勞脫却朝衣獨歸去青雲不及白雲髙宿僧舍髙僧夜滴芙蓉漏遠客窗含楊柳風何處相逢話心地月明身在磬聲中吳門夢故山心熟家山夢不迷孤峯寒繞一條溪秋窗覺後情無限月墮館娃宫樹西别李譜尊前路映暮塵紅池上琴橫醉席風今日别君如别鶴聲容長在楚絃中和杜侍郎題禪智寺南樓樓畔花枝拂檻紅露天香動滿簾風誰知野寺遺鈿處盡在相如春思中發青山鳬鷖聲暖野塘春鞍馬嘶風驛路塵一宿青山又前去古來難得是閒人寄道者洞庭先生歸路長海雲望極春茫茫别來幾度向蓬島自傍瑤臺折靈草入藍關微煙已辨秦中樹遠夢更依江上臺看落晚花還悵望鯉魚時節入關來落第寄沈詬穿楊力盡獨無功華髮相期一夜中别到江頭舊吟處為將雙淚問春風送韋中丞二年恩意是春輝清淨胸襟似者希泣盡楚人多少淚滿船唯載酒西歸詠端正春樹一樹繁隂先著名異花竒葉儼天成馬嵬此去無多地秖合楊妃墓上生叙事獻同州侍御三首青雲席中羅襪塵白首江上吟詩人登龍不及三千士虛度膺門二十春平生望斷雲層層紫府杳是他人登却應歸訪溪邊寺說向當時同社僧尊前誰伴謝公游蓮嶽晴來翠滿樓坐見一方金變化獨吟紅藥對殘秋婺州宴上留别雙溪樓影向雲橫歌舞髙臺晚更清獨自下樓騎瘦馬搖鞭重入亂蟬聲别牛郎中門館整襟收淚别朱門自料難酬顧念恩招得片魂騎匹馬西風斜上入秋原山中寄盧簡求竹西池上有花開日日幽吟看又回心憶郡中蕭記室何時暫别醉鄉來寄梁佾兄弟桃李春多翠影重竹樓當月夜無風荀家兄弟來還去獨倚欄干花露中同州南亭陪劉侍郎送劉先輩處處雲隨晚望開洞庭秋入管絃來謝公待醉消離恨莫惜臨川酒一杯贈館驛劉巡官雲别青山馬踏塵負才難覔作閒人莫言館驛無公事詩酒能消一半春贈解頭賈嵩賈生名跡忽無倫十月長安看盡春顧我先鳴還自笑空沾一第是何人題僧壁曉傍踈林露滿巾碧山秋寺屬閒人溪頭盡日看紅葉却笑髙僧衣有塵沙溪館翠濕衣襟山滿樓竹間溪水繞牀流行人莫羡郵亭吏生向此中今白頭李侍御歸炭谷山居同宿華嚴寺家在青山近玉京白雲紅樹滿歸程相逢一宿最髙寺半夜翠微泉落聲過噴玉泉平生半為山淹留馬上欲去還回頭兩京塵路一雙鬢不見玉泉千萬秋漢隂庭樹掘溝引水澆蔬圃插竹為籬護藥苖楊柳如絲風易亂梅花似雪日難消送王拾遺謝官後歸滻水山居水邊殘雪照亭臺臺上風襟向雪開還似當時姓丁鶴羽毛成後一歸來宿長水主人白雲溪北叢巖東樹石夜與潺湲通行人一宿翠微月二十五絃聲滿風萬首唐人絶句卷三十七
