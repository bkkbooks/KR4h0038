body:
  text: 萬首唐人絶句巻二十二宋洪邁編七言原缺萬首唐人絶句巻二十二欽定四庫全書萬首唐人絶句巻二十二宋洪邁編五言狀江南十二月景十二首鮑防江南孟春天荇葉大如錢白雪裝梅樹青袍似葑田謝良輔江南仲春天細雨色如烟疎為武昌柳布作石門泉嚴維江南季春天蓴菜細如絃湖邊草作徑湖上葉如船賈弇江南孟夏天慈竹笋如編蜃氣為樓閣蛙聲作管絃樊珣江南仲夏天時雨下如川盧橘垂金彈甘蕉吐白蓮范澄江南季夏天身熱汗如泉蚊蚋成雷澤袈裟作水田鄭㮣江南孟秋天稻花白如氊素腕慚新藕殘籹妬晚烟沈仲昌江南仲秋天鱏鼻大如船雷是樟亭浪苔為界石錢劉蕃江南季秋天栗實大如拳楓葉紅霞舉蘆花白浪穿謝良輔江南孟冬天荻穗軟如綿緑絹芭蕉裂黄金橘柚懸吕渭江南仲冬天紫蔗節如鞭海將鹽作雪山用火耕田丘丹江南季冬天紅蟹大如􅀈湖水龍為鏡鑪峰氣作烟太原召侍臣守歳太宗四時運灰琯一夕變冬春送寒餘雪盡迎歳早梅新續薛令之明皇啄木觜距長鳯凰毛羽短若嫌松桂寒任逐桑榆暖潼闗口號河曲囘千里闗門限二京所嗟非恃徳設險致天平宫中題文宗輦路生春草上林花發時憑髙何限意無復侍臣知夏日聨句下句柳公權人皆苦炎熱我愛夏日長薫風自南來殿閣生微涼贈婦鄰士吹火朱脣動添薪玉腕斜遙看烟裏面大似霧中花戲膳部張敬心有意嫌兵部專心取考功誰知脚蹭蹬却落省墻東題僧院二首吕羣路行三蜀盡身及一陽生頼有殘燈火相依坐到明社後辭巢燕霜前别蔕蓬願為蝴蝶夢飛去覔闗中䜟詩李遐周燕市人皆去函闗馬不歸若逢山下鬼環上擊羅衣題潞州壁僧普滿此水連涇水雙珠血滿川青牛將赤虎還賀太平年同夫游秦元載妻王氏路掃饑寒跡天哀志氣人休零離别淚携手入西秦送韋生酒鮑生妾白露濕庭砌素月臨前軒此時去留恨含思獨無言陳嬌詞鸚鵡阿蘇兒昔請馬相如為作長門賦縱使費千金君王終不顧迎月二首水府真君日落烟水黯驪珠色豈昏寒光射萬里霜縞遍千門玉魄東方開嫦娥逐影來洗心兼滌目光景游春臺贈劉商廣陵道士無事到揚州相携上酒樓藥囊為贈别千載更何求贈郭翰二首織女河漢雖云闊三秋尚有期情人終已矣良會更何時朱閣臨清漢瓊宫結紫房佳期情在此只是㫁人膓荅二首郭翰人世將天上由來不可期誰知一囘顧更作兩相思贈枕猶香澤啼衣尚淚痕玉顔霄漢裏空有往來魂五真導意五首馬信真㡬劫澄煩思今身僅小成誓將雲外隱不向世間行徐湛真綽約離塵世從容上太清雲衣無綻日鶴駕沒遙程郭修真華岳無三尺東瀛僅一杯入雲騎彩鳯歌舞上蓬萊夏守真共作雲山侣俱辭世界塵静思前日事抛却㡬年身楊敬真人世徒紛擾其生似蕣華誰言今夕裏俛首視雲霞游兠𤣥國張佐風暖景和異異香馥林塘登髙一長望信美非吾鄉贈沈警鏡張女郎憶昔窺寳鏡相望看明月彼此俱照人莫令光影滅贈沈警金縷合歡結歌小女郎心纒萬結縷結縷㡬千囘結怨無窮極結心終不開别後篇飛牋報沈郎尋已到衡陽若存金石契風月兩相望感懐示許漢陽洞庭龍女海門連洞庭每去三千里十載一歸來辛苦瀟湘水贈楊正伯女郎君子竟迷執無由逹情素明月海上山秋風獨歸去冢上荅唐太宗慕容垂我昔勝君昔君今勝我今榮華各異代何用苦追尋夜吟巴峽人秋徑填黄葉寒崖露草根猿聲一叫㫁客淚數重痕謝人致祭河湄枯骨我本邯鄲士祗役死河濵不得家人哭勞君行路悲感巫州薺菜髙力士兩京作斤賣五溪無人採夷夏雖有殊氣味終不改贈亡妻張氏唐晅嶧陽桐半死延津劒一沈如何宿昔内空負百年心荅二首張氏不分殊幽顯那堪異古今隂陽途自隔聚散兩難心蘭堦兎月斜銀燭半含花自憐長夜客泉路以為家寄夫周混韋璜不得長相守青春夭蕣華舊遊今永已泉路却為家題虎丘山上幽獨君幽明雖異路平昔忝工文欲知濳寐處山北兩孤墳洋州舘亭吟竇裕家依楚水岸身寄洋州舘望月獨相思塵襟淚痕滿夢贈沈萇浮雲詩陸憑虚虚復空空瞬息天地中假合成此像吾亦非吾躬悲吟呈李績韓弇我有敵國讐無人可為雪每至漳河頭遊魂自鳴咽贈李章武二首王氏婦河漢已傾斜神魂欲超越願郎更囘抱終天從此訣昔辭懐後㑹今别便終天新悲與舊恨千古閉窮泉答王婦二首李章武分從幽顯隔豈謂有佳期寧辭重重别所歎去何之後期杳無約前恨已相尋别路無行信何因得寄心贈臨淄縣主獨孤穆金閨久無主羅袂坐生塵願作吹簫伴同為騎鳯人答獨孤穆縣主朱軒下長路青草啟孤墳猶勝陽臺上空看朝暮雲來家娘子歌一首平陽縣中樹久作廣陵塵不意何郎至黄泉重見春述懐示祖價三首商山孤舘書生家住驛北路百里無四鄰往來不相問寂寂山家春南岡夜蕭蕭青松與白楊家人應有夢逺客已無腸寒草白露裏亂山明月中是夕苦吟罷寒燭與君同獨遊家園萬商妻孟氏可惜春時節依前獨自遊無端兩行淚長秪對花流賦少年誰家少年兒心中暗自欺不道終不可可即恐郎知報孟氏少年神女配張碩文君遇長卿逢時兩相得聊足慰多情幽恨篇安邑坊女子卜得上峽日秋天風浪多江陵一夜雨腸㫁木蘭歌贈沈恭禮湖城女密陀僧黄帝上天時鼎湖元在兹七十二玉女化作黄金芝商舘聮句二首蕭中郎秋月圓如鏡秋風利似刀秋雲輕比絮秋草細同毛山樹髙髙影山花寂寂香山天遙歴歴山水急湯湯和鄭郊吟陳蔡間冢中人冢上兩竿竹風吹常裊裊下有百年人長眠不知曉寄兄李叔霽急作無期别沈寘恨有餘長安雖不逺無信可傳書夢中贈主崔暇妾莫以貞留妾從他理管絃容華難乆駐知得㡬多年夢寄夫蘇檢妻楚水平如鏡周回白鳥飛金陵㡬多地一去不知歸題州牧㕔昌州鬼物類易遷變我行人不見珍重任彦思相别日已逺題户牖張不疑青衣金條幽室鎻妖艶無人蘭蕙芳春風三十載不盡羅衣香謔隴城杜令二首東柯院妖雖共蒿蘭伴南朝有宗祖莫打緑袍人空中且歌舞堪憐木邊土非兒不似女瘦馬上髙山登臨何自苦為楊稹歌石瓮寺紅裳金殿不勝秋月斜石樓冷誰是相顧人褰幃弔孤影對牛虎吟甯茵曉讀雲水靜夜吟山月髙焉能履虎尾豈用學牛刀南山將軍班寅一首虎但得居林嘯焉能當路蹲渡河何所適終是怯劉琨桃林處士班特一首牛無非憐寗戚終是怯庖丁若遇龔為守蹄涔向北溟摘萱草吟魏王池畔女子彼見是亡憂此看同腐草青山與白雲方展我懐抱贈焦封蜀道夫人妾失鴛鸞伴君方萍梗遊少年懽酒後必恐苦相留送焦封鵲橋織女㑹也是不多時今日送君處羞言連理技酬夫人焦封心常名宦外終不恥狂遊悞入桃源裏仙家爭肻留留别但保同心結無勞織錦詩蘇秦求富貴自有一囘時夢中唱送北人酒二首張生妻切切夕風急露滋庭草濕良人去不囘焉知掩閨泣螢火穿白楊悲風入荒草疑是夢中遊愁迷故園道歌送張生妻長鬚人花前始相見花下又相送何必言夢中人生盡如夢贈内申屠澄一宦慚梅福三年愧孟光此情何所喻川上有鴛鴦妻答一首真符女子琴瑟情雖重山林志自深常憂時節變辜負百年心銅駞坊柳二首柳藏經寒水停圓沼秋池滿敗荷杜門窮典籍所得事全多誰謂三才貴予觀萬化同心虚嫌􅗜食年老怯狂風夢人贈詩盧獻卿上築郊原古青山唯四鄰扶䟽繞屋樹寂寞獨歸人寄非烟趙象一覩傾城貌塵心只自猜不隨蕭史去擬學阿蘭來别酒主人山中客酒盡君莫沽壺乾我當發城市多囂塵還山弄明月萬首唐人絶句巻二十二
