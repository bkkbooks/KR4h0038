body:
  text: 萬首唐人絶句卷三十宋洪邁編七言烏棲曲王建章華宫人夜上樓君王望月西山頭夜深宫殿門不鎻白露滿山山葉墮主人故池曲池高閣相連起荷葉圑圑蓋秋水主人已逺凉風生舊客不來芙蓉死長安别長安清明好時節只宜相送不宜别惡心牀上銅片明照見離人白頭髮宫人斜未央牆西青草路宫人斜裏紅䊋墓一邊載出一邊來更衣不減尋常數春詞良人朝早半夜起櫻桃如珠露如水下堂把火送郎回移枕重眠曉牕裏野池野池水滿連秋隄菱花結實蒲葉齊川口雨晴風復止蜻蜓上下魚東西秋夜曲秋燈向壁掩洞房良人此夜直明光天河悠悠漏水長南斗北斗兩相當别曲毒蛇在腸瘡滿背去年别家今别弟馬頭對哭各東西天邉栁絮無根蔕古謠二首一東一西隴頭水一聚一散天邉霞一來一去道上客一顛一倒池中花宛宛轉轉身上紗紅紅緑緑苑中花紛紛汨汨夜飛鴉寂寂寞寞離人家玉蘂花一樹籠總玉刻成飄廊㸃地色輕輕女冠夜覔香來處唯見堦前碎月明歸山莊長安寄食半年餘重向人邊乞薦書山路獨歸衝夜雪落斜騎馬避柴車寒食憶歸京中曹局無多事寒食貧兒要在家遮莫杏園勝别處亦須歸看傍村花題崔秀才里居自知名出休呈卷愛去人家逺處居時復打門無别事鋪頭來索買殘書酬栢侍御答酒茱茰酒法大家同好是盛來白椀中這度自知顔色重不消詩裏弄溪翁别藥欄芍藥丁香手裏栽臨行一日繞千回外人應怪難辭别總是山中自取來長門長門閉定不求生燒却頭花卸却筝病卧玉牕秋雨下遙聞别院喚人聲題渭亭雲開逺水傍秋天沙岸蒲帆隔野煙一片蔡州青草色日西鋪在古臺邊喜祥山館夜過深山筭驛程三回黒地聽泉聲自離軍馬身輕健得向溪邊盡足行上田尚書去婦何辭見六親手中刀尺不如人可憐池閣秋風夜愁緑嬌紅一遍新雨中寄東溪韋處士雨中溪破無乾地浸著床頭濕著書一箇月來山水隔不知茅屋若為居乞竹乞取池西三兩竿房前栽著病時看亦知自惜難判割猶勝横根引出欄人家看花年少狂疎逐君馬去來憔悴到京華恨無閒地栽仙藥長傍人家看好花未央風五更先起玉階東漸入千門萬户中總向高樓吹舞袖秋風還不及春風贈李僕射二首和雪翻營一夜行神旗凍定馬無聲遙看火號連營赤知是先鋒上得城旗旛四面著營稠手詔頻來老將愁每日臨行空挑戰不知生縛入唐州送遷客萬里潮州一逐臣悠悠青草海邊春天涯莫道無回日上嶺還逢向北人廢寺廢寺亂來為縣驛荒松老栢不生煙空廊屋漏畫僧盡梁上猶書天寳年題禪師房浮生不住葉隨風填海移山總是空長向人間愁老病誰來閒坐此房中看石楠花留得行人忘却歸雨中須是石楠枝明朝獨上銅臺路容見花開少許時長安縣後亭看畫水凍横橋雪滿池新排石笋遶巴籬縣門斜掩無人吏看畫雙飛白鷺鷥贈工部郎中二首金爐煙裏要班頭欲得歸山可自由每度報朝愁入閤在先教示小千牛多在蓬萊可在家越緋衫上有紅霞朝回不向諸餘處騎馬城西檢校花酬趙侍御年少同為鄴下遊閒尋野寺醉登樓别來衣馬從勝舊争向邊塵滿白頭鑷白總道老來無用處何須白髪在前生如今不用偷年少拔却三莖又五莖九日登叢臺平原池閣在誰家雙塔叢臺野菊花零落故宫無入路西來澗水繞城斜題蔡中郎碑蒼苔滿字土埋龜風雨消磨絶調詞不向圖經中舊見無人知是蔡邕碑江館對雨鳥聲愁雨似秋天病客思家一向眠草館門臨廣州路夜聞蠻語小江邊雨過山村雨裏雞鳴一兩家竹溪村路板橋斜婦姑相喚浴蠶去閒着中庭梔子花對雨寄杜書記竹煙江雨細相和看著閒書睡更多好是主人無事日應持小拍按新歌江陵道中菱葉參差萍葉重新蒲半拆夜來風江村水落平地出溪畔漁船青草中江陵使至汝州回看巴路在雲閒寒食離家麥熟還日暮數峯青似染商人説是汝州山送山人二首嵩山古寺離來乆回見溪橋野葉黄辛苦老師看守處為懸秋藥閉空房山客狂來跨白驢袖中遺却潁陽書人閒亦有妻兒在抛向嵩陽古觀居揚州尋張籍不見别後知君在楚城揚州寺裏覔君名西江水濶吳山逺却打船頭向北行宿長安縣後齋新向金階奏罷兵長安縣裏遶池行喜歡得伴山僧宿看雪吟詩直到明華清宫二首曉來樓閣更鮮明日出欄竿見鹿行武帝自知身不死看修玉殿號長生酒幔高樓一百家宫前楊栁寺前花内園分得温湯水三月中間已進𤓰宫前栁楊栁宫前忽地春在前驚動探春人曉來唯欠驪山雨洗却秋條緑上塵留别張廣文謝恩新入鳯凰城亂定相逢合眼明千萬求方好將息杏花寒食的同行送鄭山人歸山玉作車轅蒲作輪當初不起潁陽人一家總入嵩山去天子因何得諫臣傷墮水鳥一烏墮水百烏啼相弔相號遶故堤眼見行人車輾過不妨同伴各東西十五夜望月時㑹琴客中庭地白樹栖鴉冷露無聲濕桂花今夜月明人盡望不知秋思在誰家眼病寄同官天寒眼痛少心情隔霧看人夜裏行年少往來常不住牆西凍地馬蹄聲寄韋諫議百年看似暫時間頭白求官亦未閒獨有龍門韋諫議三徴不起戀青山尋補闕舊宅知得清名二十年登山上坂乞新篇除書近拜侍臣去空院鳥啼風竹前上魏博田侍中八首去處長將決勝籌回回身在陣前頭賊城破後先鋒入看著紅䊋不敢収熨帖朝衣抛戰袍䕫龍班裏侍中高對時先奏衙門將次第天恩與節旄踏著家鄉馬脚輕暮山秋色眼前明老人上酒齊行拜得侍中來盡再生功成誰不擁藩方富貴還須是本鄉萬里雙旌汾水上玉鞭遙指白雲莊鼔吹旗􅜖道兩邊行男走女喜闐闐舊交省得當時别指㸃如今却少年廣場破陣樂初収采纛高于百尺樓老將氣雄争起舞管絃回作大纒頭威聲萬里動寒煙草白天清塞馬閒觸處不如生處樂可憐秋月照江山將士請衣忘却貧緑牕紅燭酒樓新家家盡踏還鄉曲明月街中不絶人御獵青山直入鳯城頭滻水斜分入御溝新校内人唯射鴨長隨天子苑東遊山店登登石路何時盡決決溪泉到處聞風動葉聲山犬吠一家松火隔秋雲過綺岫宫玉樓傾側粉牆空重疊青山遶故空武帝去來羅袖盡野花黄蝶領春風初冬旅遊逺投人宿趂房遲僮僕傷寒馬亦飢為客悠悠十月盡莊頭栽竹已過時寄劉蕡問疾年少病多應為酒誰家將息過今春賖來半夏重煎盡投著山中舊主人夜看揚州市夜市千燈照碧雲高樓紅袖客紛紛如今不似時平日猶自笙歌徹曉聞觀蠻妓欲說昭君歛翠蛾清聲委曲怨於歌誰家年少春風裏抛與金錢唱好多華嶽廟二首女巫遮客買神盤争取琶琶廟裏彈聞有馬蹄生拍樹路人來去向南看自移西嶽門長鎖一箇行人一遍開上廟參天今見在夜頭風起覺神來老人歌白髮歌人垂淚行上皇生日出京城如今供奉多新意錯唱當時一半聲對酒為病比來渾斷酒縁花不免却知聞從來樂事關身少主領春風只在君秋夜對雨夜山秋雨滴空廊燈照房前樹葉光對坐讀書終卷後自鋪衣被掃僧房和元郎中八月十一至十五夜五首半秋初入中旬夜已向階前守月明從未圓時看却好一分分見傍輪生亂雲遮却臺東月不許交依次第看莫為詩家先見境被他龍與作艱難今夜月明勝昨夜新添桂樹近東枝立多地濕舁床坐看過牆西寸寸遲月似圓來漸漸凝玉盤盛水欲侵稜夜深盡放家人睡直到天明不炷燈合望月時長望月分明不得似今年仰頭五夜風中立從未團圓直到圓新晴後住處近山常足雨聞晴曬曝舊方茵立秋日後無多熱漸覺生衣不着身霓裳詞十首弟子部中留一色聽風聽水作霓裳散聲未足重來授直到牀前見上皇中管五絃初半曲遙教合上隔簾聽一聲聲向天頭落效得仙人夜唱經自直梨園得出稀更畨上曲不教歸一時跪拜霓裳徹立地階前賜紫衣旋翻曲譜聲初足除在梨園未教人宣與書家分手寫中官走馬賜功臣伴教霓裳有貴妃從初直到曲成時日長耳裏聞聲熟拍數分毫錯總知絃索摐摐隔采雲五更初發滿宫聞武皇自送西王母新換霓裳日色裙勑賜宫人澡浴回遙看美女院門開一山星月霓裳動好字先從殿裏來傳呼法部按霓裳新得承恩别作行日晚貴妃樓上看内人舁下綵羅箱朝元閣上山風起夜聽霓裳露坐寒宫女月中更替立黄金梯滑並行難知在華清年月滿山頭山底種長生去時留下霓裳曲半是離宫别館聲朝天詞寄魏博田侍中八首山川初定國圖寛未識龍顔坐不安風動白髯旌節下過時天子御樓看相感君臣總淚流恩深舞蹈不知休初從戰地來無物唯奏新添十八州奏催三殿宴沂公别與諸侯總不同隔月太常先習樂金書牌纛采雲中無人敢奪在先籌天子門邊送與毬遙索十箱新様錦内家舁到馬前頭御馬牽來親自試珠毬到處玉蹄知殿到宣勸連催上未解紅纓不敢騎四海無波乞放閒三封手跪獻龍顔他時若有邊城動不待天書自出山戎馬悠悠未盡歸玉關猶隔吐蕃旗老臣三表求高卧邊事從今遣問誰重賜弓刀内宴回看人城外滿高臺君臣不作其時别収盡邊旗當日來萬首唐人絶句卷三十
