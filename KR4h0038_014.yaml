body:
  text: 萬首唐人絶句卷十四宋洪邁編七言竹樓宿白居易小書樓下千竿竹深火爐前一盞燈此處與誰相伴宿燒丹道士坐禪僧戲醉客莫言魯國書生懦莫把杭州刺史欺醉客請君間眼望緑楊風下有紅旗紫楊花何年植向仙壇上早晚移栽到梵家雖在人間人不識與君名作紫楊花吳宫辭淡紅花帔淺檀蛾睡臉初開似剪波坐對朱籠間理曲琵琶鸚鵡語相和答微之上船後留别燭下尊前一分手舟中岸上兩回頭歸來虛白堂中夢合眼先應到越州答微之泊西陵見寄煙波盡處一點白應是西陵古驛臺知在臺邉望不見暮潮空送渡船回自感宴遊寢食漸無味杯酒管絃徒繞身賔客歡娛童僕飽始知官職為他人柳絮三月盡時頭白日與春老别更依依憑鶯為向楊花道絆惹春風莫放歸醉戲諸妓席上爭飛使君酒歌中多唱舍人詩不知明日休官後逐我東山去是誰潮早潮才落晚潮來一月周流六十回不獨光隂朝復暮杭州老去被潮催聞歌妓唱嚴郎中詩已留舊政布中和又付新詞與豔歌但是人家有遺愛就中蘇小感恩多急樂世辭正抽碧線繡紅羅忽聽黃鶯斂翠娥秋思冬愁春悵望大都不稱意時多重寄别微之憑仗江波寄一辭不須惆悵報微之猶勝往歲峽中别灔澦堆邉招手時别周軍事主人頭白官仍冷去後憐君是底人試謁會稽元相去不妨相見却殷勤看常州柘枝贈賈使君莫惜新衣舞柘枝也從塵汚汗霑垂料君即却歸朝去不見銀泥衫故時河隂夜泊憶微之憶君我正泊行舟望我君應上郡樓萬里月明同此夜黃河東面海西頭杭州回舫自别錢塘山水後不多飲酒懶吟詩欲將此意憑回棹與報西湖風月知愛詠詩辭章諷詠成千首心行歸依向一乘坐倚繩牀間自念前生應是一詩僧卧疾間官卧疾絶經過居處蕭條近洛河水北水南秋月夜管絃聲少杵聲多酬楊八君以曠懷冝靜境我因蹇步稱間官閉門足病非高士勞作雲心鶴眼看夢行簡天氣妍和水色鮮間吟獨步小橋邉池塘草緑無佳句虛卧春忩夢阿憐雲和非琴非瑟亦非筝撥柱推絃調未成欲散白頭千萬恨只消紅袖兩三聲春老欲隨年少雜遊春自覺風光不屬身歌舞屛風花障上幾時曾畫白頭人春雪過皇甫家晚來藍輿雪中回喜遇君家門正開惟要主人青眼待琴詩談笑自將來崔侍御以孩子三日示其所生詩見示因以二絶句和之洞房門上挂桑弧香火盆中浴鳯雛還似初三生日魄常娥滿月即成珠愛惜肯將同寶玉喜歡應勝得公候弄璋詩句多才思愁殺無兒老鄧攸晚春寄微之并崔湖州洛陽陌上少交親履道城邉欲暮春崔在吳興元在越出門騎馬覔何人東城桂三首子墮本從天竺寺根盤今在闔廬城當時應逐南風落落向人間取次生雪霰壓多雖不死荆榛長疾欲相埋長憂落在樵人手賣作蘇州一束柴遙知天上桂華孤試問常娥更要無月宫幸有間田地何不中央種兩株新栽梅池邉新種七株梅欲到花時點檢來莫怕長洲桃李妬今年好為使君開戲和賈常州醉中二絶句聞道毗陵詩酒興近來積漸學姑蘇罨頭新令從偷去刮骨清吟得似無越調管吹留客曲吳吟詩送暖寒杯娃宫無限風流事好遣孫心暫學來清明夜好風朧月清明夜碧砌紅軒刺史家獨繞回廊行復歇遙聽絃管暗看花三月二十八日贈周判官一春惆悵殘三日醉問周郎憶得無柳絮送人鶯勸酒去年今日到東都酬别周從事二首腰痛拜迎人客倦眼昏勾押簿書難辭官歸去緣衰病莫作陶潛范蠡看洛下田園久拋擲吳中歌酒莫留連嵩陽雲樹伊川月已校歸遲四五年見小姪龜兒詠燈詩并臘娘製衣因寄行簡已知臘子能裁服復報龜兒解詠鐙巧婦才人常薄命莫教男女苦多能寫新詩寄微之偶題卷後寫了吟看滿卷愁淺紅箋紙小銀鈎未容寄與微之去已被人傳到越州寶厯二年八月三十日夜夢後作塵纓忽解誠堪喜世網重來未可知莫忘全吳館中夢嶺南泥雨步行時與夢得同登棲靈塔半月悠悠在廣陵何樓何塔不同登共憐筋力猶堪在上到棲靈第九層夢蘇州水閣寄馮侍御揚州驛裏夢蘇州夢到花橋水閣頭覺後不知馮御史此中昨夜共誰遊答次休上人姓白使君無麗句名休座主有新文禪心不合生分别莫愛餘霞嫌碧雲祕省後廳槐花雨潤新秋地桐葉風翻欲夜天盡日後廳無一事白頭老監枕前眠登觀音臺賢城百千冢似圍碁局十二街如種菜畦遙認微微入朝火一條星宿五門西登靈應臺北望臨高始見人寰小對逺方知色界空回首却歸朝市去一條米落太倉中間出兀兀出門何處去新昌街晚樹隂斜馬蹄知意緣行熟不向楊家即庾家奉使途中戲贈張常侍早風吹土滿長衢驛騎星軺盡疾驅共笑籃輿亦稱使日馳一驛向東都種白蓮吳中白藕洛中栽莫戀江南花懶開萬里携歸爾知否紅蕉朱槿不將來和劉郎中傷鄂姬不獨君嗟我亦嗟西風北雪殺南花不知月夜魂歸處鸚鵡洲頭第幾家雪中寄令狐相公兼呈夢得兔園春雪梁王會想對金罍詠玉塵今日相如身在此不知客右坐何人和劉郎中鶴歎二首辭鄉逺隔華亭水逐我來棲緱嶺雲慙愧稻梁長不飽未曾回眼向雞羣荒草院中池水畔銜恩不去又經春見君驚喜雙回顧應為吟聲似主人宿竇使君莊水亭使君何在在江東池岸初黃杏欲紅有興即來間便宿不知誰是主人翁龍門下作龍門澗下濯塵纓擬作間人過此生筋力不將諸處用登山臨水詠詩行姚侍御見過戲贈曉起春寒慵裹頭客來池上偶同遊東臺御史多提舉莫按金章繫布裘和錢華州題少華高情雅韻三峰守主領清光管白雲自笑亦曾為刺史蘇州肥膩不如君送陜府王大夫金馬門前回劍珮鐡牛城下擁旌旗他時萬一為交代留取甘棠三兩枝代迎春花招劉郎中幸與松筠相近栽不隨桃李一時開杏園豈敢妨君去未有花時且看來玩迎春花贈楊郎中金英翠蕚帶春寒黃色花中有幾般憑君與向遊人道莫作蔓菁花眼看座上贈盧判官把酒承花花落頻花香酒味相和春莫言不是江南會虛白亭中舊主人曲江有感曲江江岸有春風萬樹花前一老翁遇酒逢花還且醉莫論惆悵事何窮杏園花下贈劉郎中怪君把酒偏惆悵曾是正元花下人自别花來多少事東風二十四回春伊州老去將何散老愁新教小玉唱伊州亦應不得多年聽未教成時已白頭酬嚴給事玉蘂花瀛女偷乘鳯去時洞中潛歇弄瓊枝不緣啼鳥春饒舌青瑣仙郎可得無京路西來為看秦山雪東去緣尋洛苑春來去騰騰兩京路間行除我更無人華州西每逢人靜慵多歇不計程行困即眠上得籃輿未能去春風敷水店門前送春銀花鑿落從君勸金屑琵琶為我彈不獨送春兼送老更嘗一酌更聽君春詞低花樹映小粧樓春入眉心兩點愁斜倚闌干臂鸚鵡思量何事不回頭花酒香醅淺酌浮如蟻雲鬢新梳薄似蟬為報洛城花酒道莫辭送老二三年楊家南亭小亭門外月斜開滿地涼風滿地苔北院好彈秋思處終須一夜抱琴來廣府胡尚書頻寄詩因答尚書清白臨南海雖飲貪泉心不回唯向詩中得珠玉時時寄到帝鄉來讀鄂公傳高卧深居不見人功名抖􅀈似灰塵唯留一部清商樂月下風前伴老身冬夜聞蟲蟲聲冬思苦於秋不解愁人聞亦愁我是老翁聽不畏少年莫聽白君頭聽田順兒歌戞玉敲冰聲未停嫌雲不遏入青冥爭得黃金滿衫袖一時拋與斷年情聽曹剛琵琶兼示重蓮撥撥絃絃意不同啼聲畨語兩玲瓏誰能截得曹剛手插向重蓮衣袖中對酒五首巧拙賢愚相是非何如一醉盡忘機君知天地中寬窄雕鶚鸞凰各自飛蝸牛角上爭何事石火光中寄此身隨冨隨貧且歡樂不開口笑是癡人丹砂見火去無迹白髮泥人來不休賴有酒仙相暖熱松喬醉即到前頭百歲無多時壯健一春能幾日晴明相逢且莫推辭醉聽唱陽關第四聲昨日低眉問疾來今朝收淚弔人回眼前流例君看取且遣琵琶送一杯僧院花欲悟色空為佛事故栽芳樹在僧家細看便是華嚴偈方便風開智慧花不出簷前新葉覆殘花席上餘杯對早茶好是老身銷日處誰能騎馬傍人家老病晝聽笙歌夜醉眠若非月下即花前如今老病須知分不負春來二十年憶晦叔遊山弄水携詩卷看月尋花把酒杯六事盡思君作伴幾時歸到洛陽來琴酒耳根得所琴初暢心地忘機酒半酣若使啓期兼解醉應言四樂不言三聽幽蘭琴中古曲是幽蘭為我殷勤更弄看欲得身心俱靜好自彈不及聽人彈送客病上籃輿相送來衰容秋思兩悠哉涼風嫋嫋吹槐子却請行人勸一杯戲答皇甫監寒宵勸酒君須飲君是孤眠七十身莫道非人身不暖十分一盞暖於人池邉即事氊帳胡琴出塞曲蘭塘越棹弄潮聲何言此處同風月薊北江南萬里情别陜州王司馬笙歌惆悵欲為别風景闌珊初過春爭得遣君詩不苦黃河岸上白頭人答尉遲少尹問所須乍到頻勞問所須所須非玉亦非珠愛君水閣冝間詠每有詩成許去無答蘇庶子月夜聞家僮奏樂見贈墻西明月水東亭一曲霓裳按小伶不敢邀君無别境絃生管澀未堪聽白蓮池泛舟白藕新花照水開紅忩小舫信風回誰教一片江南興逐我殷勤萬里來答崔十八勞將白叟比黃公今古由來事不同我有商山君未見清泉白石在胸中答蘇六但喜暑隨三伏去不知秋送二毛來更無别計相寬慰故遣陽關勸一杯秋遊下馬間行伊水頭涼風清景勝春遊何事古今詩句裏不多説著洛陽秋期宿客不至風飄雨灑簾帷故竹映松遮燈火深宿客不來嫌冷落一樽酒對一張琴問移竹問君移竹意如何切勿排行但間窠多種少栽皆有意大都少校不如多重陽席上賦白菊滿園花菊鬱金黃中有孤叢色似霜還似今朝歌酒席白頭翁入少年場萬首唐人絶句卷十四欽定四庫全書萬首唐人絶句卷十四宋洪邁編五言寒食下第武元衡桞挂九衢絲花飄萬家雪如何憔悴人對此芳菲節途中即事南征復北還擾擾百年間自笑春塵裏生涯不暫間春日偶作縱橫桃李枝淡蕩春風吹美人歌白紵萬恨在蛾眉夏夜作夜久喧暫息池臺惟月明無因駐清景日出事還生寒食日同陳六遊山院年少輕行樂東城南陌頭與君寂寞意共作草堂遊喜遇劉二十八裴度病來佳興少老去舊遊希笑語縱橫作杯觴絡繹飛送劉不歸丹掖去銅竹漫云云唯喜因過我須知未賀君再送頃來多謔浪此夕任喧紛故態猶應在行期未要聞房公舊竹亭聞琴李德裕流水音長在青霞意不傳獨悲形解後誰聽廣陵絃題羅浮石清景持芳菊涼天倚茂松名山何必去此地有羣峯無題松倚蒼崖老蘭臨碧澗衰不勞鄰舍笛吹起舊時悲題冠蓋里偶來冠蓋里愧是舊三公自喜無兵術輕裘上閟宫雪霽晨起雪覆寒溪竹風卷野田蓬四望無行迹誰憐孤老翁題竒石藴玉抱清暉間庭日蕭灑塊然天地間自是孤生者上張相公寫舊唱和詩賦感鄰人笛詩留夫子墻延年如有作應不用山王和晉公三首李紳鳯儀常欲附蚊力自知微願假樽罍末膺門自此依貂蟬公獨步鴛鷺我同羣插羽先飛酒交鋒便著文窮隂初莽蒼離思漸氛氲殘雪午橋岸斜陽伊水濱古風二首春種一粒粟秋成萬顆子四海無間田農夫猶餓死鋤禾日當午汗滴禾下土誰知盤中餐粒粒皆辛苦題玉潭獨孤及碧玉徒強名冰壺難比德唯當寂照心可並奫淪色春日歸家李嘉祐自覺勞鄉夢無人見客心空餘庭草色日日伴愁襟逺寺鐘踈鐘何處來度竹兼拂水漸逐微風斂依依猶在耳白鷺江南渌水多顧影逗輕波終日秦雲裏山高奈若何樂府陸長源芙蓉初出水菡蓞露中花風吹著枯木無奈值空槎白銅鞮徐凝騕裊錦障泥樓頭日又西留歡住不住素齒白銅鞮陽叛兒哀怨陽叛兒駘蕩郎知否香死博山爐煙生白門桞春寒亂雪從教舞回風任聽吹春寒能作底已被桞條欺廬山獨夜寒空五老雪斜月九江雲鐘聲知何處蒼蒼樹裏聞天台獨夜銀地秋月色石梁夜溪聲誰知屐齒盡為破煙苔行送寒巖歸士不挂絲纊衣歸向寒巖棲寒巖風雪夜又過巖前溪送陳司馬家寄茅洞中身遊越城下寧知許長史不憶陳司馬武夷山仙城武夷無上路毛徑不通風欲共麻姑住仙城半在空避暑二首一株金染密數畝碧鮮疏避暑臨溪坐何妨直釣魚斑多筒簟泠髮少角冠清避暑長林下寒蟬又有聲浙西李尚書奏廢淫昏廟傳聞廢淫祀萬里靜山陂欲慰靈均恨先燒靳尚祠酬相公再遊雲門寺逺羡五雲路逶迤千騎回遺簮唯一去貴賞不重來杭州祝濤頭二首不道沙堤盡猶欺石棧頑寄言飛白雪休去打青山倒打錢塘郭長驅白浪花吞吳休得也輸却五千家晚春别韓琮晚日低霞綺晴山逺畫眉青青河畔草不是望鄉時銜魚翠鳥楊巨源有意蓮葉間瞥然下高樹擘破得全魚一點翠光去和鄭相公尋宣上人不遇方尋蓮境去又值竹房空幾韻飄寒玉餘清不在風題范陽金臺驛六國唯求客千金遂築臺若令逢聖代憔悴郭生回耗磨日飲趙冬曦春來半月度俗忌一朝間不酌他鄉酒無堪對楚山長安秋望杜牧樓倚霜樹外鏡天無一毫南山與秋色氣勢兩相高獨酌窗外正風雪擁爐開酒缸何如釣船雨蓬底睡秋江醉眠秋醪雨中熟寒齋落葉中幽人本多睡更酌一尊空不飲贈酒細算人生事彭殤共一籌與愁爭底事要爾作戈矛過田家宅安邑南門外誰家板築高奉誠園裏地墻缺見蓬蒿獨桞含煙一株桞拂地搖風久佳人不忍折悵望回纎手將赴湖州題亭菊陶菊手自種楚蘭心有期遙知渡江日正是擷芳時折菊籬東菊徑深折得自孤吟雨中衣半濕擁鼻自知心哭李給事中敏陽陵郭門外坡陀丈五墳九泉如結友兹地好埋君黃州竹徑竹岡蟠小徑屈折鬭蛇來三年得歸去知繞幾千回題寺樓暮景千山雪春寒百尺樓獨登還獨下誰會我悠悠入松院小石雨滴珠璣碎苔生紫翠重故關何日到且看小三峯送人遊湖南賈傅松醪酒秋來美更香憐君片雲思一棹去潚湘籌筆驛郵亭寄人世人世寄郵亭何如自籌度鴻路有冥冥寄逺隻影隨驚雁單栖鎖畫籠向春羅袖薄誰念舞臺風送盧秀才春瀨與煙逺送君孤棹開潺湲如不改愁更釣魚來醉題金鑷洗霜鬢銀觥敵露桃醉頭扶不起三丈日還高山莊好鳥疑敲磬風蟬認軋箏修篁與嘉樹偏倚半巖生盆池鑿破蒼苔地偷他一片天白雲生鏡裏明月落階前有寄雲濶煙深樹江澄水浴秋美人何處在明月萬山頭寄逺人終日求人卜回回道好音那時離别後入夢到如今别沈處士舊事參差夢新程迤邐秋故人如見憶時到寺東樓歸家稚子牽衣問歸來何太遲共誰爭歲月贏得鬢成絲遣懷道泰身還泰時來命不來何當離城市高卧博山隈江樓獨酌芳春酒登樓已半醺誰驚一行雁衝斷過江雲驌驦坂二首瑶池罷遊宴良樂委塵沙遭遇不遭遇鹽車與鼓車荆州一萬里不如蒯易度仰首望飛鳴伊人何異趣憶鄱陽舊遊顧況悠悠南國思夜向江南泊楚客腸斷時月明楓子落夢後吟醉中還有夢身外已無心明鏡唯知老青山何處深題靈山寺覺地本隨身靈山重結因如何戰鳥佛不化捕魚人題元陽觀舊讀書房贈李範此觀千年遊此房千里宿還來舊窗下更取君書讀永嘉東甌傳舊俗風日江邊好何處樂神聲夷歌出煙島青弋江淒清回泊夜淪波激石響村邊草市橋月下罟師網聽山鷓鴣誰家無春酒何處無春鳥夜宿桃花村踏歌接天曉臨平塢雜題十三首山徑桞宛轉若遊絲淺深栽緑埯年年立春後即被啼鶯占石上藤空山無鳥迹何物如人意委曲結繩文離披草書字薜荔菴薜荔作禪庵重疊庵邊樹空山徑欲絶也有人知處芙蓉榭風擺蓮衣乾月背鳥巢寒文魚翻亂葉翠羽上危欄欹松漪湛湛碧漣漪老松欹側卧悠揚緑蘿影下拂波紋破焙茶塢新茶已上焙舊架憂生醭旋旋續新煙呼兒劈寒木彈琴谷谷中誰彈琴琴響谷冥寂因君扣商調草蟲驚暗壁白鷺汀靃靡汀草碧淋森鷺毛白夜起沙月中思量捕魚䇿千松嶺終日吟天風有時天籟止問渠何旨意恐落凡人耳黃菊灣時菊凝曉露露華滴秋灣仙人釀酒熟醉裏飛空山臨平湖采藕平湖上藕泥封藕節船影入荷香莫衝蓮柄折山春洞引燭踏仙泥時時亂乳燕不知何道士手把靈書卷石竇泉吹沙復噴石曲折仍圓旋野客潄流時杯粘落花片古仙壇逺山誰放燒疑是壇邊醮仙人錯下山拍手壇邊笑題鄱陽蕭寺不知何世界有處似南朝石路無人掃松門被火燒題山頂寺遙聞林下語知是經行所日暮香風時諸天散花雨天寶題壁五十餘年别伶俜道不行却來書處在惆悵似前生哭李别駕故人行迹滅秋草向南悲不欲頻回步孀妻正哭時春雨不聞百舌百舌春來啞愁人共待晴不關秋水事飲恨亦無聲驚雪陸暢怪得北風急前庭如月輝天人寧許巧剪水作花飛聞早蟬落日早蟬急客心聞更愁一聲來枕上夢裏故園秋别劉端公連騎出都門秋蟬噪高桞落日辭故人自醉不關酒貞女墓邵謁生持節操心死作堅貞鬼至今墳上春草木無花卉送友人江行送君若浪水疊疊愁思起夢魂若月明相送秋江裏瞽者歎我心豈不平我目自不明徒云備雙足天下何由行萬首唐人絶句卷十四
