body:
  text: 萬首唐人絶句卷六十宋洪邁編七言六朝詠史孫元晏吳黃金車分擘山河即漸開許昌基業已傾􅀈黃金車與斑斕耳早箇須知入䜟來赤壁㑹獵書來舉國驚秪應周魯不教迎曹公一戰奔波後赤壁功傳萬古名魯肅指囷破産移家事亦難佐吳從此霸江山爭教不立功勳得指出一囷如等閒甘寧斫營夜深偷入魏軍營滿寨驚忙火似星百口寶刀千匹絹也應消得與甘寧徐盛欲把江山鼎足分邢真銜册到江南當時將相誰堪重徐盛將軍最不甘魯肅斫案興言斷衆疑鼎分從此定雄雌若無子敬心相似爭得烏林破魏師武昌西塞山高截九垓䜟謡終日自相催武昌魚美應難戀厯數須歸建業來顧雍贊國經綸更有誰蔡公相歎亦相師貴為丞相封侯了歸後家人總不知吕䝉幼小家貧實可哀願征行去志難回不探虎穴求身逹爭得人間富貴來介象好道君王遇亦難變通靈異幾多般介先生有神仙術釣得鱸魚在玉盤濡須塢風揭洪濤響若雷枕波為壘險相隈莫言有箇濡須塢幾度曹公失志回周泰名與諸公又不同金瘡痕在滿身中不將御蓋宣恩澤誰信將軍别有功張紘東部張公與衆殊共施經略贊全吳陳琳漫自稱雄伯神氣應須怯大巫太史慈聖德招賢逺近知曹公心計却成欺陳韓昔日嘗投漢豈是當歸召得伊孫堅后委付張公翊聖材幾將賢德贊文臺爭教不霸江山得日月徴曾入夢來陸統將軍身殁有兒孤虎子為名教讀書更向宫中教騎馬感君恩重合何如青蓋厯數將終勢已摧不修君德更堪哀被它青蓋言相誤元是須教入晉來晉七寶鞭天命須知豈偶然亂臣徒欲用兵權聖謨廟略還應别渾不消它七寶鞭廋恱鵝炙春暖江南景氣新子鵝炙美就中珍廋家厨盛劉公困渾弗相貽也惱人謝𤣥百萬兵來逼合肥謝𤣥為將統雄師旌旗首尾千餘里渾不消它一局棊謝混尚主當初偶未成此時誰合更關情可憐謝混風華在千古翻傳禁臠名陸玩陸公高論亦由𠂻謙讓還慙未有功天下忠良人欲盡始應交我作三公王坦之晉祚安危只此行坦之何必苦憂驚謝公合定寰區在爭遣當時事得成蒲葵扇拋捨東山歲月遙幾施經略挫雄豪若非名德喧寰宇爭得蒲葵價數高王郎太尉門庭亦甚高王郎名重禮相饒自家妻父猶如此誰更逢君得折腰劉毅繞床堪壯喝盧聲似鐡容儀衆盡驚二十七人同舉義幾人全得舊功名王恭春風濯濯栁容儀鶴􅌁神心舉世推可惜教君仗旄鉞枉將心地託牢之謝公賭墅發遣將軍欲去時略無情撓只貪棊自從乞與羊曇後賭墅功成更有誰符堅投箠投箠填江語未終謝安乘此立殊功三台星爛乾坤正且與張華死不同衛玠叔寶羊車海內稀山家女壻好風姿江東士女無端甚看殺玉人渾不知郭璞脫𥜗吟坐因思郭景純每言窮逹似通神到頭分命難移改解脫青𥜗與别人廋樓江州樓上月明中從事同登眺逺空玉樹忽埋千載後有誰重此繼清風新亭容易乘虛逼帝畿滿江艛櫓與旌旗盧循若解新亭上勝負還應未可知宋大峴大峴才過喜可知指空言己副心期公孫許䇿嗟無用天與南朝作霸基放宮人納諌廷臣免犯顔自然恩可霸江山姚興侍女方承寵放出宮闈若等閒借南苑人主詞應不偶然幾人曾說笑掀天不知南苑今何在借與張公三百年謝淡雲霞友仗氣凌人豈可親只將范泰是知聞緣何喚作雲霞友却恐雲霞未似君烏衣巷古迹荒基好嘆嗟滿川吟景只煙霞烏衣巷在何人住回首令人憶謝家袁粲負才尚氣滿朝知高卧閒吟見客稀獨步何人識袁尹白楊郊外醉方歸劉伯龍位重何如不厭貧伯龍孤子只修身固知生計還須有窮鬼臨時也笑人王方平拂衣耕釣已多時江上山前樂可知著却貂裘將採藥任它人喚作漁師黃羅𥜗戚屬羣臣盡見㺓預憂身後又堪哀到頭委付何曾是虛把羅襦與彥回謝朏謝家諸子盡蘭香各震芳名滿帝鄉唯有千金更堪重只將高卧向齊王羊𤣥保運命將來各有期好官才闕即思之就中堪愛羊𤣥保偏受君王分外知齊謝朏解璽傳呼詔侍中却來高卧豈踈慵此時忠節還希有堪羡君王特地容小兒執燭謝公情量已難量忠宋心誠豈暫忘執燭小兒渾放去略無言語與君王王僧祐肯與公卿作等倫淡然名德只推君任它車騎來相訪簫鼓盈庭似不聞王僧䖍位高名重不堪疑懇讓儀同帝亦知不學常流爭進取却憂門有二台司眀帝裹蒸至尊尊貴異人間御膳天厨豈等閒惜得裹蒸無用處不如安霸取江山鬱林王强哀强慘亦從伊歸到私庭喜可知喜字漫書三十六到頭能得幾多時何氏小山顯逹何曾肯繫心築居郊外好園林賺它謝朏出山去贏得高名直至今王倫之豫章太守重詞林圖畫陳蕃與華歆更奠子將并孺子為君千載作知音潘妃曾步金蓮寵絶倫豈甘今日委埃塵玉兒還有懷恩處不肯將身嫁小臣王亮後見梁王未免哀奈何無計拯傾頺若教彼相顛扶得爭遣眀公到此來梁分宫女滌蕩齊宫法令新分張宫女二千人可憐無限如花貌重見世間桃李春馬仙琕齊朝太守不甘降忠節當時動四方義士要教天下見且留君住待袁昻勍敵博聞天子重儒才特為皇華綺宴開今日方驚遇勍敵此人元自北朝來蔡撙紫茄白莧以為珍守任清真轉更貧不飲吳興郡中水古今能有幾多人楚祠曾與蕭侯醉玉杯此時神影盡傾頺莫云千古無靈聖也向西川助敵來謝朏小輿小輿升殿掌鈞台不免無憀却憶回應恨被它何𦙍誤悔先容易出山來八關齊依憑金地甚䖍誠忍溺空王為聖明內殿設齊申禱祝豈無功德及臺城廋信苦心詞賦向誰談淪落周朝志豈甘可惜多才廋開府一生惆悵憶江南陳王僧辨彼此英雄各有名石頭高卧擬爭衡當時堪笑王僧辨待欲將心託聖眀武帝蚌盤金翠絲簧略不舒蚌盤清宴意何如豈知三閣繁華主解為君王妙破除虞居士苦諫將軍總不知幾隨煙熖作塵飛東山居士何人識唯有君王却許歸姚察曾佐徐陵向北遊剖陳疑事動名流却歸掌選清何甚一匹花練不肯收宣帝傷將卒前後兵師戰勝回百餘城壘盡歸來當時將卒應知感況得君王為舉哀臨春閣臨春高閣上侵雲風起香飄數里聞自是君王正沉醉豈知消息報隋軍結綺閣結綺高冝眺海涯上凌丹漢拂雲霞一千朱翠同居此爭奈恩多屬麗華望仙閣多少沉檀結築成望仙為號倚青冥不知孔氏何形狀醉得君王不解醒三閣三閣相通綺宴開數千朱翠繞周回只知斷送君王醉不道韓擒已到來狎客八宫妃盡賦篇章風揭歌聲錦繡香選得十人為狎客有誰能解諌君王淮水文物衣冠盡入秦六朝繁盛忽埃塵自從淮水乾枯後不見王家更有人江令宅不向南朝立諫名舊居基在事分明令人惆悵江中令只作篇章過一生後庭舞嬿婉回風態若飛麗華翹䄂玉為姿後庭一曲從教舞舞破江山君未知叙懷張蠙月裏路從何處上江邊身合幾時歸十年九陌寒風夜夢掃蘆花絮客衣題嘉陵驛嘉陵路惡石和泥行到長亭日已西獨倚欄干正惆悵海棠花裏鷓鴣啼春夜二首劉駕一别杜陵歸未期秪憑魂夢接親知近來欲睡兼難睡夜夜夜深聞子規幾歲兵戈阻路岐憶山心切與心違時難何處披衷抱日日日斜空醉歸郪中感舊頃年曾住此中來今日重遊事可哀憶得幾家歡宴處家家家業盡成灰曉登迎春閣未櫛憑欄眺錦城煙籠萬井二江明香風滿閣花滿樹樹樹樹梢啼曉鶯白髭到處逢人求至藥幾回染了又成絲素絲易染髭難染墨翟當時合泣髭獨坐吟客愁不盡夲如水草色含情更無已又覺春愁似草生何人種在情田裏奉和春日玩雪北闕同雲掩曉霞東風春雪滿山家瓊章定少千人和銀樹長開六出花和李秀才邊庭四時怨盧弼春春衣昨夜到榆關故國煙花想已殘少婦不知歸未得朝朝應上望夫山夏盧龍塞外草初肥鴈乳平蕪曉不飛鄉國近來音信斷至今猶自著寒衣秋八月霜飛栁遍黃蓬根吹斷鴈南翔隴頭流水關山月泣上龍堆望故鄉冬朔風吹雪透刀瘢飲馬長城窟更寒半夜火來知有敵一時齊保賀蘭山獨坐懷非煙緑暗紅藏起暝煙獨將幽恨小庭前沉沉良夜與誰語星落銀河月半天回緘非煙見說傷情為見春想封蟬錦緑蛾嚬叩頭與報煙卿道第一風流最損人贈非煙十洞三清雖路阻有心還得傍瑶臺瑞香風引思深夜知是蕊宫仙馭來萬首唐人絶句卷六十
