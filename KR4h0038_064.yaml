body:
  text: 萬首唐人絶句卷六十四宋洪邁編七言蟬二首子蘭獨蟬初唱古槐枝委曲悲涼斷續遲雨後忽聞誰最苦異鄉孤館憶家時衰桞蟬吟旁濁河正當殘日角聲和尋常不足少愁思此際聞時愁更多太平坊尋裴郎中故宅不語凄涼無限情荒階行盡又重行昔年此住何人在滿地槐花秋草生登樓邉邑鴻聲一例秋大波平日繞山流故人千里同明月盡夕無言空倚樓長安早秋風舞槐花落御溝終南山色入城秋門門走馬徴兵急公子笙歌醉玉樓對雪密密無聲墜碧空霏霏有韻舞微風幽人吟望搜辭處飄入窗來落硯中鸚鵡翠毛丹觜乍教時終日無憀似憶歸近來偷解人言語亂向金籠説是非晚景池荷衰颯菊芬芳策杖吟詩上草堂滿目暮雲風卷盡郡樓寒角數聲長長安傷春霜隕中春花半無狂遊恣飲盡凶徒年年賞玩公卿輩今委溝塍骨漸枯河梁晚望二首水勢滔滔不可量漁舟容昜泛滄浪連山翠靄籠沙溆白鶴翩翩下夕陽雨添一夜秋濤濶極目茫茫似接天不知龍物濳何處魚躍蛙鳴滿檻前悲長安何事天時禍未回生靈愁悴若寒灰豈知萬頃繁華地強半今為瓦礫堆千葉石榴花一朵花開千葉紅開時又不藉春風若教移在香閨畔定與佳人艷色同端午文秀節分端午自誰言萬古傳聞自屈原堪笑楚江空渺渺不能洗得直臣寃寒食至郊外雲表寒食悲看郭外春野田無處不傷神平原纍纍添新塜半是去年來哭人秋夜吟尚顔梧桐雨畔夜愁吟斗藪衣從蘚色侵枉道一生無繫著湘南山水别人尋行次漢上無本習家池沼草萋萋嵐樹光中信馬蹄漢主廟前湘水碧一聲風角夕陽低馬嵬長川幾處樹青青孤驛危樓對翠屏一自玉皇惆悵後至今來往馬蹄腥送友人之上都法震玉帛招賢楚客稀猿啼相送武陵歸湖頭望入桃花去一片春帆帶雨飛夜夜曲貫休蟪蛄切切風騷騷芙蓉噴香蟾蜍髙孤燈耿耿征婦勞更深撲落金錯刀少年行錦衣鮮華手擎鶻間行氣貌多輕忽稼穡艱難總不知五帝三王是何物春晚書山家主人屋壁柴門寂寂黍飯馨山家煙火春雨晴庭花濛濛水泠泠小兒啼索樹上鶯深山逢老僧衲衣線粗心似月自把鋤鋤岡榾柮青石溪邉踏葉行數片雲隨兩眉雪邉上作二首山無緑兮水無清風既毒兮沙亦腥健兒走馬疾飛鳥聫翩射落雲中聲陳雲忽向沙中起探得強兵過遼水堪嘆護塞征戌兒未戰已疑身是鬼將入廬山别僧二首噴嵐堆黛塞寒碧窗前古雪如白石臨岐約我來不來若來須撥紅霞覔紅豆樹間滴紅雨戀師不得依師住世情世界愁殺人錦繡谷中歸舍去宿深村行行一宿深村裏雞犬豐年閙如市黃昏見客合家喜月下取魚戽塘水别仙客巨鼇頭縮翻仙翠蟠桃爛落珊瑚地浪濺霓旌濕鵬翅略别千年太容易樵叟樵父貌飢帶風雨自言一生苦寒暑簷頭擔箇赤瓷罌斜陽獨入濛朧塢馬上作桞暗花堤夕照紅風清襟袖轡璁瓏行人莫訝頻回首家在凝嵐一點中終南僧聲利掀天竟不聞草衣木食度朝昏遙思山雪深一丈時有仙人來打門乞食老僧赤棕櫚笠眉毫垂拄楖栗杖行遲遲時人只施盂中飯心似白蓮那得知秋歸東陽臨岐上三衢杜使君六首小謝清髙大謝才聖君令泰此方來一從到後長無事鈴閣公庭滿緑苔紅錦帳中歌白雪烏皮几畔撫青英不知何物為心地賽却澄江徹底清誰報田中有黑蟲一家齋戒減仙容分憂若也皆如此天下家家有剩舂憂民心切出衝炎禾稼如雲喜氣兼林下間人亦何幸也隨旌斾到銀尖枯骨縱橫遍水湄盡收為冡碧參差分明為報精靈輩好送旌旗到鳯池捨魯依劉一片雲好風吹去逺纎塵猶期明月清風夜來作西園第八人再遊東林寺三首臺殿參差聳瑞煙桂花飄雪水潺潺莫疑逺去無消息七萬餘年始半年宣玄舊輦殘雲濕耶舍孤墳落照遲有箇山僧倚松睡恐人來取白猿兒玉像珠龕香陳橫錦霞多傍石墻生辟蛇行者今何在花裏唯聞鴆鳥聲題蘭江言上人院二首一生只著一麻衣道業還欺習彥威手把新詩説山夢石橋天柱雪霏霏只是危吟坐翠層門前岐路自崩騰青雲名士時相問茶煮西峰瀑布氷書石壁禪居赤旃檀塔六七級白菡蓞花三四枝禪客相逢勸歸去此心能有幾人知送友人遊茅山茅真舊宅基猶在藥竈苔深土尚殷君見道人憑與問大還還字若為還聼僧彈琴家近吳王古戰城海風終日打檣聲今朝鄉思渾堆積琴上聞師大蟹行風琴至竟心為造化功一枝青竹四絃風寥寥雙耳更深後如在緱山明月中庭橘蟻踏金苞四五株洞庭山上味何殊不緣松樹稱君子肻便甘人喚木奴落花蝶醉蜂癡一簇香繡葩紅蒂墮殘芳因嗟好德人難得公子王孫盡斷腸苦吟河薄星疏雪月孤松枝清氣入肌膚因知好句勝金玉心極神勞特地無偶然作蟬聲引出石中蛩寂寞門扄葉數重誰道思山心不切等間畫作兩三峰招友人宿銀地無塵金菊開紫梨紅棗墮莓苔一泓秋水一輪月今夜故人來不來古戰處鬼氣蒼黃棘葉紅昔時人血此時風可憐極目無疆地曽落將軍一陳中惜花張泌蝶散鶯啼尚數枝日斜風定更離披看多記得傷心事金谷樓前委地時寄人二首别夢依依到謝家小廊回合曲欄斜多情只有春庭月猶為離人照落花酷憐風月為多情還到春時别恨生倚柱尋思倍惆悵一場春夢不分明别李源天竺牧童三生石上舊精魂賞月吟風不要論慚愧情人逺相訪此身雖異性長存身前身後事茫茫欲話因緣恐斷腸吳越溪山尋已遍却回煙棹上瞿塘題法雲寺雙檜方壺居士謝郎雙檜緑於雲昏曉濃隂色未分若並毫宫仙鹿迹定知髙峭不如君隋堤詞嘗憶江都大業秋曾隨鑾蹕戲龍舟傷心一覺興亡夢堤桞無情織世愁題紫微觀建業卜者昨日朝天過紫微醮壇風冷杏花稀碧桃泥我傳消息何事人間更不歸贈樊夫人裴航同舟吳越猶懷思况遇天妃隔錦屏倘若玉京朝會去願隨鸞鶴入青冥答裴航樊夫人一飲瓊漿百感生玄霜杵盡見雲英藍橋便是神仙窟何必﨑嶇上玉京示毛女芙蓉老人餌柏身輕疊嶂間是非無意到人寰冠裳暫偹論人世一餉雲遊碧落間和秦宫毛女誰知古是與今非間躡青霞繞翠微簫管秦樓應寂寞彩雲空惹薜蘿衣題慈恩塔二首韋曲女仙黃子陂頭好月明忘却華筵到曉行煙收山低翠黛橫折得荷花逺恨生湖水團團夜如鏡碧樹紅花相掩映北斗闌干移曉柄有似佳期常不定題玉壺南溟夫人來從一葉舟中來去向百花橋上去若到人間扣玉壺鴛鴦自解分明語贈封陟二首上元夫人謫居蓬島别瑶池春媚煙花有所思為愛君心能潔白願操箕帚奉屏幃㺯玉有夫皆得道劉綱兼室盡登仙君能子細窺朝露須逐雲車拜洞天留别蕭郎不顧鳯樓人雲澀回車淚臉新愁殺蓬瀛歸去路難窺舊苑碧桃春題門右石上王氏女玩水登山無足時諸仙頻下聼琴詩此心不戀居人世唯見天邉雙鶴飛靜室歌戚逍遙笑看滄海欲成塵王母花前别衆真千載却歸天上去一心珍重世間人送酒歌洛苑花神皎潔玉顔勝白雪况乃當年對芳月沈吟不敢怨春風自嘆容華暗消歇絳衣披拂露盈盈淡染胭脂一朵輕自恨紅顔留不住莫怨春風道薄情間吟君山老父湘中老人讀黃老手援紫藟坐碧草春至不知湘水深日暮忘却巴陵道得仙詩楊監真天教絶粒應精誠道啓真心覺漸清雲外仙歌笙管合花間風引步虛聲飛鳥莫到人莫攀一隱十年不下山袖中短書誰為達華山道士賣藥還日落焚香坐醮壇庭花露濕漸更闌淨水仙童調玉液春宵羽客化金丹青童君神女月露飄飄星漢斜獨行窈窕浮雲車仙郎獨邀青童君結情羅帳蓮心花贈漢武帝王母珠露金風下界秋漢家陵樹冷修修當時不得仙桃力尋作浮塵飄隴頭答王母漢武帝五十餘年四海清自親丹竈得長生若言盡是仙桃力看取神仙簿上名和王子晉月照驪山露泣花似悲先帝早升霞至今猶有長生鹿時繞溫泉望翠華賦上清神女催􅀈茅盈水精帳開銀燭明風搖珠珮連雲清休勻紅粉飾花態早駕雙鸞朝玉京席上賦巢父三星在天銀漢回人間旦色東方來玉苖瓊蕊亦宜夜莫使一花衝曉開題酒樓壁伊用昌此生生在此生先何事從玄不復玄已在淮南雞犬後而今便在玉皇前醉吟許碏閬苑花前是醉鄉滔翻王母九霞觴羣仙拍手嫌輕薄謫向人間作酒狂滔以冉切題漢州西湖嚴公弼西湖創置自房公心匠縱橫造化同見説鳯池推獨步高名何事滯川中題僧壁韋蟾一竹橫簷挂淨巾竈無煙火地無塵剃頭未必知心法要且間於名利人謔李湯題名渭水秦川拂眼明希仁何事寡詩情只應學得虞姫壻書字才能記姓名贈同年子何澤崔公四十九年前及第同年唯有老夫存今日殷勤訪吾子穩將鬐鬛上龍門贈高僕射李洞征南破虜漢功臣提劍歸來萬里身間倚陵雲金柱看形容消瘦老於真席間詠琴客崔珏七條弦上五音寒此藝知音自古難唯有河南房次律始終憐得董庭蘭獻廬江牧曽生拜玉亭間送客忙此時孤恨感離鄉尋思往嵗絶纓事肯向朱門泣夜長酬朱慶餘張籍越女新妝出鏡心自知明豔更沈吟齊紈未是人間貴一曲菱歌敵萬金酒後謝陸虔崔櫓醉時顛蹶醒時羞麴蘖催人不自由叵耐一雙窮相眼不堪花卉在前頭書滄浪峽亭板鄭仁表分陜東西路正長行人名利火燃湯路傍著箇滄浪峽真是將間攪撩忙悼亡妓韋氏子惆悵金泥簇蝶裙春來猶見伴行雲不教布施剛留得渾似知逢李少君贈韋自東大白山道士三秋稽顙叩真靈龍虎交時金液成絳雪既凝身可度蓬壺頂上彩雲生萬首唐人絶句卷六十四
