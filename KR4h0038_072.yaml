body:
  text: 萬首唐人絶句卷七十二宋洪邁編七言柳顧雲閒花野草總爭新眉皺絲乾獨不勻乞與東風殘氣力莫教虛度一年春牡丹王睿牡丹妖艷亂人心一國如狂不惜金曷若東園桃與李果成無語自垂隂秋蟬噪古槐疏葉下樹銜斜日映孤城欲知潘鬢愁多少一夜新添白數莖燕海燕雙飛意若何曲梁嘔嘎語聲多茅簷不厭嫌卑陋猶勝吳宫爇竹窠貽九華上人齊巳一法傳聞繼老能九華閒卧最髙層秋鐘盡後殘陽暝門掩松邉雨夜燈紅薔薇花晴日當樓曉香歇錦帶盤空欲成結鶯聲漸老柳飛時狂風吹落猩猩血謝猿皮貴向獵師家買得攜來乞與坐禪牀不知摘月秋潭畔曾對何人啼斷腸精舍遇雨清江空門寂寂淡吾身溪雨微微洗客塵卧向白雲情未盡任他黃鳥醉芳春小雪落雪臨風不厭看更多還恐蔽林巒愁人正在書窗下一片飛來一片寒漁者貫休風惡波狂身似閒滿頭霜雪背青山相逢略問家何在回指蘆花滿舍間琴隱巒七條絲上寄深意澗水松風生十指自乃知音猶尚稀欲教更入何人耳浮橋橫壓驚波防沒溺當初元創是軍機行人到此全無滯一片江雲踏欲飛鷺鷥無則白蘋紅蓼碧江涯日暖雙雙立睡時願揭金籠放歸去却隨沙鶴鬭輕絲百舌鳥二首千愁萬恨過花時似向春風怨别離若使衆禽俱解語一生懷抱有誰知長截鄰雞呌五更數般名字百般聲饒伊搖舌先知曉也待青天明即鳴桐花鳥可鵬五色毛衣比鳳雛深花叢裏秪無如美人買得偏憐惜移向金叉重幾銖金錢花盧子發輪郭休誇四字書紅窠寫出對庭除時時買得佳人笑本色金錢却不知早行羅鄴雨灑江聲風又吹扁舟正與睡相宜無端戍鼓催前去别却青山向曉行公子行雕鞍玉勒照花明過後香風特地生半醉五侯門裏出月髙猶在禁街行鴈暮天新鴈起汀洲紅蓼花開水國愁想得故園今夜月幾人相憶在江樓鴛鴦二首紅閒碧靜霽煙開錦翅雙飛去又回一種相連名字好盡緣人恨别離來暖依牛渚紅莎媚夕宿龍池禁漏催相對若教秦女見便應攜上鳳凰臺螢一首在前徘徊無燭冷無烟秋徑莎庭入夜天休向書窗來照字近來紅燭滿歌筵雞冠花一枝濃艷對秋光露滴風搖倚砌傍曉景乍看何處似謝家新染紫羅裳詠鏡昔歲相宜别有情千回磨拭始將行如今漸老愁無限把向閒窗却怕明祖龍詞熊皎平吞六國更何求童女童男問十洲滄海不回應悵望始知徐福解風流謫居海上家臨涇水隔秦川來往關河路八千堪恨此身何處老始皇橋畔又經年詠猿周朴生在巫山更向西不知何事到巴溪中宵為憶秋雲伴遙隔朱門向月啼桃花桃花春色暖先開明媚誰人不看來可惜狂風吹落後殷紅片片㸃莓苔淺井方干夜入明河星似少曙搖澄碧扇風翻細泉細脉難來到應覺添瓶耗舊痕原闕十六聲中運手輕一聲聲似自然聲不緣精妙過流輩爭得江南别有名鸕鷀杜荀鶴一般毛色結羣飛兩岸煙汀好景時水底有魚銜得去看來却是鷺鷀飢梁王坐上賦無雲雨同是乾坤事不同雨絲飛灑日輪中若教隂朗長相似爭表梁王造化功涇溪涇溪石險人競畏終歲不聞傾覆人若是半流無石處時時聞說有沉淪醉書僧壁九華山色正堪愛留得髙僧爾許年聽我吟詩供我酒不曽穿得判齊錢寄李隱居自小棲𤣥到老閒如雲如鶴住應難溪山不必將錢買贏得來來去去看蟬李郢飲蟬驚雨落髙槐山蟻移將入石階若使秦樓美人見還應一為拔金叉螢郭震秋風凛凛月依依飛過髙梧影裏時處暗若教同衆類世間爭得有人知蛩愁殺離家未逹人一聲聲到枕邉聞苦吟莫向朱門裏滿耳笙歌不聽君雲聚散虛空去復還野人閒處倚笻看不知身外無根物蔽月遮星作萬端野井縱無汲引味清澄冷浸寒空月一輪鑿處若教當要路為君常濟往來人米囊花開花空道勝於草結實何曽濟得民却笑野田禾與黍不聞絃管過青春惜花艷拂衣襟蘂拂杯繞枝閒共蝶徘徊春風滿目還惆悵半欲離披半未開蓮花臉膩香薰似有情世間何物比輕盈湘妃雨後來池看碧玉盤中弄水晶責宜陽到荆渚李伉漢江江水水連天被責宜陽路幾千為問野人山鳥語問豫歸棹是何年冬夕岑參浩汗霜風刮天地溫泉大井無生意澤國龍蛇凍不伸南山瘦柏消殘翠桃花吳融滿樹和嬌爛漫紅萬枝丹彩灼春融何當結作千年實將示人間遊化工木筆花嫩如新竹管初齊粉膩紅輕樣可攜誰與詩人偎檻看好於箋墨併分題題袁州龍興寺易偲百尺古松松下寺寶幡朱蓋盡珊珊閒庭甘露幾回落青石緑苔猶未乾贈廣宣大師曹松惜昔同遊紫閣雲别來三十二回春白頭相見雙林下猶是清朝未退人華清宮崔櫓門封青鎖悄無人落日秋聲渭水濱紅葉下山寒寂寂濕雲如夢雨如塵又李甘中原無鹿海無波鳳輦鸞旗出幸多今日故宮歸寂寞太平功業在山河粉箋所書無名人三月江南花滿枝風輕簾幕燕爭飛游人休惜夜秉燭楊桞隂濃春欲歸煎茶成文幹嶽寺春深睡起時虎跑泉畔思遲遲蜀茶倩箇雲僧碾自拾枯松三四枝松大夫名價古今聞盤屈孤貞更出羣將謂嶺頭閒不了夕陽猶挂數枝雲新燕才離海島宿江濱應夢笙歌作近鄰減省雕梁並頭語畫堂中有未歸人㑹友不至王孫還是負佳期玉馬追遊日漸西獨上郊原人不見鷓鴣飛過落花溪惜花忘餐為戀滿枝紅錦障頻移護晚風客散酒酣歸未得欄邉獨立月明中中秋月王母䊋成鏡未收倚欄人在水精樓笙歌莫占清光盡留與溪翁一釣舟暮春日宴溪亭寒日尋芳遊不足溪亭還醉緑楊煙誰家花落臨流樹數片殘紅到檻前曉列宿回元朝北極爽神晞露滴樓臺佳人卷箔臨階砌笑指庭花昨夜開夕臺榭沉沉禁漏初麝煙紅蠟透蝦鬚雕籠鸚鵡將棲宿不許鴉鬟轉轆轤露銀河昨夜降醍醐灑遍坤維萬象蘇疑是鮫人曾泣處滿池荷葉捧金珠遊紫陽宮古殿煙霞簇畫屏直疑踪跡到蓬瀛碧桃滿地眠花鹿深院松窗搗藥聲除夜銅龍看却送春來莫惜顛狂酒百杯吟鬢就中專擬白那堪更被二更催元日戴星先捧祝堯觴鏡裏堪驚兩鬢霜好是燈前偷失笑屠蘇應不得先嘗寒夜吟洞房脉脉寒宵永燭影香消金鳳冷猧兒睡壓喚不醒漏窗撲落銀蟾影栁枝辭九首輕籠小徑近誰家玉馬追風翠影斜愛把長條惱公子惹他頭上海棠花鵝黃剪出小花鈿綴上芳枝色轉鮮飲散無人收拾得月明階下伴鞦韆東君愛惜與先春草澤無人處也新委囑露華并細雨莫教遲日惹風塵勾踐初迎西子年琉璃為帚掃溪煙至今不改當時色留與王孫繫酒船緑楊移傍小亭栽便擁穠煙撥不開誰把金刀為删掠放教明月入窗來逺接關河髙接雲雨餘洗出半天津牡丹不用相輕薄自有清隂覆得人掩映鶯花媚有餘風流才調比應無朝朝奉御臨池上不羡青松拜大夫王孫宴罷曲江池折取春光伴醉歸怪得美人爭鬭乞要他穠翠染羅衣殘照林梢裊數枝能招醉客上金堤馬驕如練纓如犬瑟瑟隂中步步嘶登甘露臺劉言史偶至無塵空翠間雨花甘露境閒閒身心未寂終為纍非想天中獨退還夜泊潤州江口秋江欲起白頭波賈客瞻風無渡河千船火絶寒宵半獨聽鐘聲覺寺多看山木瓜花二首裛露凝氛紫艷新千般婉娜不勝春年年此樹花開日出盡丹陽郭裏人柔枝濕艷亞朱欄暫作庭芳便欲殘深藏數片將歸去紅縷金針繡取看題十三弟竹園繞屋扶疏聳翠莖苔滋粉樣有幽情丹陽萬户春光靜獨自君家秋雨聲尋易尊師不見陳嶰爛漫紅霞光照衣苔封白石路微微華陽洞裏何人在落盡松花不見歸題中峰費冠卿中峰髙拄泬寥天上有茅菴與石泉晴景獵人曾望見青藍色裏一僧禪徴拜拾遺書情二首拾遺帝側知難得官緊才微恐不勝好是中朝絶親友九華山下詔來徴三千里外一微臣二十年來任運身今日忽䝉天子召自慚驚動國中人九華樓晴望張喬一夜江潭風雨後九華晴望倚天秋重來此地知何日欲别殷勤更上樓登遊齊山許堅星使南馳入楚重此山偏得駐行踪落花滿地月華冷寂寞舊山三四峰寄尉遲侍御李昭象我眠青嶂弄澄潭君戴貂蟬白玉篸應向謝公樓上望九華山色在西南招西湖道者危峰抹黛夾晴川樹簇紅英草碧煙樵客雲僧兩無事此中堪去覔靈山題汶川村居滕白種茶巖接紅霞塢灌稻泉生白石根皤腹老翁眉似雪海棠花下戲兒孫燕短羽新來别海陽真珠髙捲語雕梁佳人未必全聽爾正把金針繡鳳凰送咸安公主孫叔向鹵簿遲遲出國門漢家公主嫁烏孫玉顔使向穹廬去衛霍空承明主恩嘲螃蟹朱貞白蛇眼龜形腳似蛛未曾正面向人趨如今飣在盤筵上得似江湖亂走無題杜秀才水亭陸龜䝉曉和風露立晴煙秪恐腥魂涴洞天雲肆有龍君若買便敲初日鑄金錢桃花磯張顛隱隱飛橋隔墅煙石磯西畔問漁船桃花盡日隨流水洞在清溪何處邉山行留客山光物態弄春暉莫為輕隂便擬歸縱使晴明無雨色入雲深處亦霑衣春遊值雨欲尋軒檻倒清尊江上煙雲向晚昏須倩東風吹散雨明朝却待入華園對御書後又一絶亞棲通神筆法得𤣥門親入長安謁至尊莫怪出來多意氣草書曾悅聖明君題英禪師將知德行異尋常每見持經在道場欲識用心精潔處一瓶秋水一爐香宜春郡城聞猿崔江怨抱霜枝向月啼數聲清繞郡城低那堪日夜有雲雨便似巫山與建溪萬首唐人絶句卷七十二
