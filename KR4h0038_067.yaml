body:
  text: 萬首唐人絶句卷六十七宋洪邁編七言三日尋李九莊常建雨歇楊林東渡頭永和三日蕩輕舟故人家在桃花岸直到門前溪水流塞下曲四首玉帛朝回望帝鄉烏孫歸去不稱王天涯靜處無征戰兵氣消為日月光北海陰風動地來明君祠上御龍堆髑髏皆是長城卒日暮沙場飛作灰龍鬭雌雄勢已分山崩鬼哭恨將軍黃河直北千餘里寃氣蒼蒼成黑雲因嫁單于怨在邊蛾眉萬古葬遙天漢家去此三千里青冡常無草木煙送僧遊山熊孺登雲身自在山山去何處靈山不是歸日暮寒林投古寺雪花飛滿水田衣雪中答僧書八行銀字非常草六出天花盡是梅無所與陳童子别雪中辛苦逺山來題逍遙樓傷故韋大夫利及生人無更為落花流水舊城池逍遙樓上雕龍字便是羊公墮淚碑戲贈費冠卿但恐紅塵虛白首寧論蹇逸分先後莫占鶯花笑寂寥長安春色年年有梅花來鵠枝枝倚檻照池氷粉薄香殘恨不勝占得早芳何所利與他霜雪助威稜聞蟬緑槐陰裏一聲新霧薄風輕力未勻莫道聞時總惆悵有愁人有不愁人賣花謡紫艷紅苞價不同匝街羅列起香風無言無語呈顔色知落誰家池館中子規月落空山聞數聲此時孤館酒初醒投人語若似伊淚口畔血流應始聽兩頭纎纎雍裕之兩頭纎纎八字眉半白半黑燈影帷腷腷膊膊曉禽飛磊磊落落秋果垂了語掃却煙塵冦初勦深水髙林放魚鳥雞人唱絶殘漏曉仙樂拍終天悄悄不了語浮名世利知多少朝市喧喧塵擾擾車馬交馳往復來鐘鼓相催天又曉聽彈沉湘賈誼投文弔屈平瑶琴能寫此時情秋風一奏沉湘曲流水千年作恨聲豪家夏冰詠金錯銀盤貯賜氷清光如聳玉山稜無論塵客間停扇直到消時不見蠅宿棣華館聞鴈不堪旅宿棣華館况有離羣鴻鴈聲一點秋燈殘影下不知寒夢幾回驚農家望晴嘗聞秦地西風雨為問西風早晚回白髮老農如鶴立麥場髙處望雲開宫人斜幾多紅粉委黃泥野鳥如歌又似啼應有春魂化為燕年來飛入未央栖曲江池上殷勤春在曲江頭全藉羣仙占勝遊何必三山待鸞鶴年年此地是瀛洲和楊尚書重送姚鵠桂枝攀得獻庭闈何似空懷楚橘歸好控扶搖早回首人人思看大鵬飛送僧入蜀過夏曹松師言結夏入巴峯雲水回頭凡幾重五月峩眉須近火木皮願重秪如冬武陵開元觀黃錬師院三首王昌齡松間白髮黃尊師童子燒香禹步時欲訪桃源入溪路忽聞雞犬使人疑先賢盛説桃花源塵忝何堪武陵郡聞道秦時避地人至今不與人通問山觀空虛清淨門從官役吏擾塵喧暫因問俗到真境便欲投誠依道源黃道士房問易齊心問易太陽宫八卦真形一氣中仙老言餘鶴飛去玉清壇上雨濛濛送萬太歸長沙桂楊秋水長沙縣楚竹離聲為君變青山隱隱孤舟微白鶴雙飛忽相見送吳十九往沅陵沅江流水到辰陽溪口逢君驛路長逺謫唯知望雷雨明年春水共還鄉别皇甫五溆浦潭陽隔楚山離樽不用起愁顔明祠靈響期昭應天澤俱從此路還送崔參軍往龍溪龍溪只在龍標上秋月孤山兩相向譴謫離心是丈夫鴻恩共待春江漲送鄭判官東楚吳山驛樹微軺車銜命奉恩輝英寮携出新豐酒半道遙看驄馬歸送姚司法歸吳吳掾留觴楚郡心洞庭秋雨海門陰但令意逺扁舟送不道滄江百丈深寄陶副使聞道將兵破海門如何逺謫渡湘沅春來明主封西嶽自有還君紫綬恩至南陵答皇甫嶽與君同疾復漂淪昨夜宣城别故人明主恩波非嵗久長江還共五溪濵從軍行二首胡瓶落膊紫薄汗碎葉城西秋月圑明勑星馳封寶劒辭君一夜取樓蘭玉門山嶂幾千重山北山南揔是烽人依遠戍須看火馬踏深山不見蹤河上歌河上老人坐古槎合丹只用青蓮花至今八十如四十口道滄溟是我家汴河覽古徐凝煬帝龍舟向北行三千宫女采橈輕渡河不似如今唱為是誰家怨思聲柬白丈人昔時丈人鬢髮白千年松下鋤茯苓今來見此松樹死丈人斬新鬢髮青覽鏡詞寶鏡磨來寒水清青衣把就緑窗明潘郎懊惱新秋髮拔却一莖生兩莖寄玄陽先生不能相見見人傳􅀈岸山中岱岸邊顔貌只如三二十道年三百亦藏年白人暖風入煙花漠漠白人梳洗尋常薄泥郎為插瓏璁叉爭教一朵牙雲落奉酬元相公上元出擁樓船千萬人入為台輔九霄身如何更羡看燈夜曾見宫花拂面春奉和鸚鵡毛羽曾經剪處殘學人言語道暄寒任饒長被金籠闔也免栖飛雨雪難將至妙喜寺清風嫋嫋越水陂逺樹蒼蒼妙喜寺自有車輪與馬蹄未曾到此波心地紅蕉紅蕉曾到嶺南看校小巴蕉幾一般差是斜刀剪紅絹卷來開去葉中安見少室適我一簟孤客性問人三十六峯名青雲無忘白雲在便可嵩陽老此生語兒見新月幾處天邊見新月經過草市憶西施姢姢水宿初三夜曾伴愁娥到語兒回施先輩見新詩二首九幽仙子西山卷讀了絛繩繫又開此卷玉清宫裏少曾尋真誥讀詩來紫河車裏丹成也皂莢枝頭早晚飛料得仙宫列仙著如君進士出身稀送沈亞之赴郢掾千萬乘驄沈司户不須惆悵郢中遊幾年白雪無人唱今日唯君上雪樓髙司馬移竹馬戴叢居堂下幸君移翠掩燈窗露葉埀莫羡孤生在山者無人看著拂雲枝贈前蔚州崔使君戰回脫劒綰銅魚塞鴈迎風避隼旟欲識前時為郡政校成上下考新書入蒲關寄故人岑參秦山數點似青黛渭水一條如白練京師故人不可見寄將兩紙西飛燕五月四日送人仙馬分明引馬頭西看一點是關樓五日也應須到舍知君不肯更淹留山房春事風恬日暖蕩春光戲蝶遊蜂亂入房數枝門桞低衣桁一片山花落筆床寄陽朔友人曹鄴桂林雖産千株桂未解當天影日開我到月中收得種為君移向故園栽題佛殿前孤石劉長卿逈出奇峯當殿前雪山靈鷲慙貞堅一片夏雲長不去莓苔古色空蒼然諫垣明日轉對鄭谷吾君英睿相君賢其奈寰區未晏然明日翠華春殿下不知何語可聞天讀前集風騷如線不勝悲國步多艱即此時愛日滿階看古集秪應陶集是吾師郊墅戲題竹巷溪橋天氣涼荷開稻熟村酒香唯憂野叟相回避莫道儂家是漢郎宗人惠四藥宗人忽惠西山藥四味清新香助茶爽得心神便騎鶴何須燒得白朱砂題張衡廟逺俗只憑淫祀切多年平子固悠悠江煙日午無簫鼓直到如今詠四愁山鳥驚飛失勢粉墻髙好箇聲音好羽毛小婢不須催射彈且從枝上喫櫻桃黯然縉紳奔避復淪亡消息春來到水鄉屈指故人能幾許月明花好更悲涼借薛尚書集江天冬暖似花時上國音塵杳未知正被蠶聲喧老耳今君又借薛能詩小北廳間題冷曹孤宦本相冝山在墻南落照時洗竹澆莎足公事一來贏寫一聮詩菊日日池邊載酒行黃昏猶自繞黃英重陽過後頻來此甚覺多情勝薄情送客之鄂州韓翃江口千家帶楚雲江花亂點雪紛紛春風落日誰相見青翰舟中有鄂君問張山人疾李端先生沉病意何如蓬艾門前客轉踈不見領徒過綘帳唯聞與婢削丹書再至長安李涉十年謫宦鬼方人三遇鴻恩始到秦今日九衢騎馬望却疑渾是剎頭身贈道器法師水作形容雪作眉早知談論兩川知如今不用空求佛但把令狐宰相詩廬山得元侍御書慙君知我命龍鍾一紙書來意萬重正著白衣尋古寺忽然郵遞到雲峯寄辨光上人陸希聲筆下龍蛇似有神天池雷雨變逡巡寄言昔日不龜手應念江湖洴澼人寄李十貟外王仲舒百丈懸泉舊卧龍欲將肝膽贊時雍唯愁又入煙霞去知在廬峯第幾重題李賔客舊居李虞逢時不得致升平豈是明君忘姓名眼暗髮枯緣世事今來無淚哭先生病中和大夫玩江月許渾江上懸光海上生仙舟迢遞繞軍營髙歌一曲同筵醉却是劉楨坐到明讀戾太子傳佞臣巫蠱已相疑身沒湖邊築望思今日更歸何處是年年芳草上臺基酬對雪見寄飛度龍山下逺空拂簷縈竹晝濛濛知君吟罷意無限曾聽玉堂歌北風王可封臨終十世為儒少子孫一生長負信陵恩今朝埋骨寒山下為報慈親休倚門泗上奉送相公趙嘏語堪銘座默含春西漢公卿絶比倫今日抱轅留不得欲揮雙涕學舒人贈桐鄉丞舟觸長松岸勢回潺湲一夜繞亭臺若教靖節先生見不肯更吟歸去來哭李進士牽馬街中哭送君靈車輾雪隔城聞唯有山僧與樵客共舁孤櫬入幽墳放鶴雍陶從今一去不須低見説遼東好去栖努力莫辭仙路逺白雲飛處免羣雞早秋月夜身間伴月夜深行風觸衣裳四體輕為見近來天氣好幾篇詩興入秋成前望江麴令頌德蕭鎮政績雖殊道且同無辭買石紀前功誰論重德光青史過里猶歌卧轍風秋日出逰偶作武元衡黃花丹葉滿江城漸愛江頭風景清間步欲舒山野性貔貅不許獨行行贈别崔起居三十年前會府同紅顔銷盡兩成翁别淚共將何處灑錦江南渡足春風人日立春盧同春度春歸無限春今朝方始覺成人從今克己應猶及願與梅花俱自新訪鑒師姪維摩青石講初休緣訪親宗到普州我有軍持憑弟子嶽陽溪裏汲寒流酬朱侍御他寢此時吾不寢近秋三五日逢晴相思唯有霜臺舊望盡孤光見却生題韋雲叟草堂新起此堂開北窗當窗山隔一重江白茆苫屋重重密愛彼秋天夜雨涼方鏡背如刀截機頭錦面似升量澗底泉銅爵臺南秋日得照來照去已三年夏夜登南樓水岸間樓帶月躋夏林初見嶽陽溪一點新螢報秋信不知何樹是菩提李斯井井存上蔡南門外置此井時來相秦斷綆數尋埀古甃取將寒水是何人盆池姚合浮萍重疊水圑圓客繞千遭屐齒痕莫驚池裏尋常滿一井清泉是上源贈别胡逸記得春闈同席試逡巡何啻十年餘今日相逢又相送豫乘五馬子單車光上人乞百齡藤杖衰病近來多少力光公乞我百齡藤間來此日向何處過水緣山只訪僧萬首唐人絶句卷六十七
