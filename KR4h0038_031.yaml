body:
  text: 萬首唐人絶句卷三十一宋洪邁編七言宫中詞一王建秋殿清齋刻漏長紫微宫女夜燒香拜陵日到公卿發鹵簿分頭出太常二羅衫葉葉繡重重金鳯銀鵝各一叢每遍舞時分兩向太平萬嵗字當中三魚藻池中鎻翠蛾先皇行處不曾過如今池底休鋪錦菱角雞頭積漸多四殿前明日中和節連夜瓊林散舞衣傳報所司分蠟燭監開宫鎻放人歸五五更三㸃索金車盡放宫人出看花仗下一邊催立馬殿頭先報内園家六小殿初成粉欲乾貴妃姉妹自來看為逢好日先移入續向街西索牡丹七内人相續報花開凖擬君王便看來逢著五絃紅繡袋宜春院裏按歌回八巡吹慢遍不相和暗數看誰曲校多明日梨園花裏設先須逐得内家歌九黄金合裏盛紅雪重結香羅四出花一一傍邊書勑字中官送與大臣家十天明東上閤門開排仗聲從殿裏來阿監兩邊相對立遙聞索扇一時回十一日高殿裏有香煙萬嵗聲長動九天妃子院中新降誕内家分得洗兒錢十二宫花不與外邊同正月長先一半紅供御櫻桃看守别直無鴉鳥到園中十三殿前鋪設兩邊樓寒食宫人步打毬一半走來齊跪拜上棚先謝得頭籌十四太儀前日暖房來囑向昭陽乞藥栽勑賜一窠紅躑躅謝恩未了奏花開十五御前新賜紫羅襦不下金階上軟輿官局總來為喜樂院中新拜内尚書十六鸚鵡誰教轉舌闗内人手裏養來姦語多更覺承恩澤數對君王憶隴山十七分朋閒坐賭櫻桃休却投壺玉腕勞各把沉香雙陸子局中鬬累阿誰高十八春風院院落花堆金鎻生衣掣不開更築歌臺起粧殿明朝先進畫圖來十九行中第一爭先舞博士傍邊亦被欺忽覺管絃先破拍急翻羅袖不教知二十日冷天晴近臘時玉階金瓦雪離離浴堂門外抄名入公主家人謝面脂二十一未承恩澤一家愁乍到宫中憶外頭求守管絃聲欵逐側商調裏唱伊州二十二雨入珠簾滿殿凉避風新出石盆湯内人恐要秋衣著不住熏籠換好香二十三東風潑火雨新収舁盡春泥掃雪溝走馬犢車當御路漢陽公主進雞毬二十四風簾水閣壓芙蓉四面鈎䦨在水中避熱不歸金殿宿秋河織女夜粧紅二十五金吾除夜進儺名畫袴朱衣四隊行院院燒燈如白日沉香火底坐吹笙二十六避暑昭陽不擲盧井邊含水噴鴉雛内中數日無呼喚搨得滕王蛺蝶圖二十七内宴初休入二更殿前燈火一時明宫中傳㫖音聲散諸院門開觸處行二十八忽地金輿向月陂内人接著便相隨却回龍武軍前過當處教開卧鴨池二十九樹葉初成鳥䕶窠石榴花裏笑聲多衆中遺却金釵子拾得從饒購贖羅三十畫得天河刻作牛玉梭金鑷采橋頭每年宫女穿針夜勑賜諸親乞巧樓三十一新秋白兎大如拳紅耳霜毛趂草眠天子不教人射殺玉鞭遮到馬蹄前三十二籠煙紫氣日曈曈宣政門開玉殿風五刻閤前卿相出下簾聲在半天中三十三白玉牕中起草臣櫻桃初出賜嘗新殿頭傳語金階逺只進詞臣謝聖人三十四内人對御疊花牋繡坐移來玉案邊紅蠟燭前呈草本平明舁出閤門宣三十五千牛仗下放朝初玉案傍邊立起居每日請來金鳯紙殿頭無事不多書三十六延英引對碧衣郎江硯宣毫各别牀天子下簾親考試宫人手裏過茶湯三十七少年天子愛邊功親到凌烟畫閣中教覔勲臣寫真様長生殿裏作屏風三十八樓前立仗看宣赦萬嵗聲長拜舞齊日照采盤高百尺飛仙争上取金雞三十九新調白馬怕鞭聲供奉騎來遶殿行先報諸王侵早入隔門催進打毬名四十對御難争第一籌殿前不打背身毬内人唱好龜兹急天子捎回過玉樓四十一新衫一様殿頭黄銀帶排方韃尾長總把玉鞭騎御馬緑鬃紅額麝香香四十二城東北面望雲樓半下珠簾半上鈎騎馬行人長速過忽防天子在樓頭四十三宫人拍手笑相呼不識庭前掃地夫乞與金錢争借問外頭還似此間無四十四小隨阿姊學吹笙見好君王賜與名夜拂玉牀朝把鏡黄金殿外不教行四十五春來睡困不梳頭懶逐君王苑北遊暫向玉花階上坐簸錢贏得兩三籌四十六禁寺紅樓内裏通香山引駕夾城中裹頭蕃女簾前立手把牙梢竹彈弓四十七别敕教歌不出房一聲一遍奏君王再三博士留殘拍索向宣徽作徹章四十八私縫黄帔捨釵梳欲得金仙觀裏居近被君王知識字収來案上檢文書四十九聖人生日明朝是私地教人囑内監自寫金花紅牓子在前進上鳯凰衫五十玉蟬金掌三層挿翠髻高鬃緑鬢虚舞處春風吹落地當時别賜一頭梳五十一射生宫女宿紅粧把得新弓各自張臨上馬時齊賜酒男兒跪拜謝君王五十二十三初學擘箜篌弟子名中被㸃留昨日教坊新進入並房宫女與梳頭五十三紅蠻捍撥帖胷前移坐當頭近御筵用力獨彈金殿響鳯凰飛出四條絃五十四春風吹展曲旗竿得出深宫不怕寒誇道自家能走馬園中横過覔人看五十五粟金犀帶碧牙錐散挿紅翎玉突枝旋獵一邊還引馬歸來雞兎繞鞍垂五十六雲駮花騣各試行一般毛色一般纓殿前來往重騎過欲得君王别賜名五十七往來舊院不中修教近金鑾别起樓聞有美人新入内宫中未識大家愁五十八合暗報來門鎻了夜深應别喚笙歌房房下著珠簾睡月過金階冷露多五十九御池水色春來好處處分流白玉渠密奏君王知入月喚人相伴洗裙裾六十新晴水色暖温暾岸雪初消滻水渾今日踏青歸校晚傳聲留著望春門六十一家常愛著舊衣裳空挿紅梳不作粧忽地下階裙帶解非時應得見君王六十二舞來汗濕羅衣徹樓上人扶下玉梯歸到院中重洗面金花盆裏潑紅泥六十三青樓少婦砑裙長總被抄名入教坊春設殿前為隊舞朋頭各自請衣裳六十四艾心芹葉初生小秖鬬時新不鬬花總待大家般數盡袖中拈出鬱金芽六十五衆中愛得君王喚偷把金箱筆硯開書破紅蠻隔子上旋推當直内人來六十六紅燈睡裏喚春雲雲上三更直宿分金砌雨來行步滑兩人擡起隠花裙六十七内鷹籠脫解紅絛鬬勝争飛出手高直上青雲還却下一雙金爪掬花毛六十八競渡船頭掉采旗兩邊濺水濕羅衣池東争向池西岸先到先書上字歸六十九燈前飛出玉階蟲未卧常聞半夜鐘看著中元齋日到自盤金線繡真容七十步行送入長門裏不許來辭舊院花只恐他時身到此乞求恩赦放還家七十一一時起立吹簫管得寵人來滿殿迎整頓衣裳皆著却舞頭當拍第三聲七十二琵琶先抺緑腰頭小管丁寧側調愁半夜美人雙起唱一聲聲出鳯凰樓七十三春池日煖少風波花裏牽船水上歌遙索劒南新様錦東宫先釣得魚多七十四蜂鬚蟬翅薄鬆鬆浮動搔頭似有風一度出時抛一遍金條零落滿函中七十五教遍宫娥唱盡詞暗中頭白没人知樓中日日歌聲好不問從初學阿誰七十六每夜停燈熨御衣銀熏籠底火微微遙聽帳裏君王覺上畨聲鐘始得歸七十七樹頭樹底覔殘紅一片西飛一片東自是桃花貪結子錯教人恨五更風七十八因喫櫻桃病放歸三年著破舊羅衣内中侍從來還去結得頭花上貴妃七十九欲迎天子看花去下得金階却悔行恐見失恩人舊院回頭憶著五絃聲八十自知歌舞勝諸人邀勒君王出内頻奉勑空中修理院地衣簾額一時新八十一悶來無處可思量旋下金階旋憶牀収得山丹紅蘂粉鏡前洗却麝香黄八十二嫌羅不著索輕􅀈對面教人染退紅衫子成來一遍出明朝半片在園中八十三彈棋玉指兩參差背局臨虚鬬著危先打角頭紅子落上三金字半邊垂八十四御厨不食索時新每見花開即是春白日睡多嬌似病隔簾教喚女醫人八十五叢叢洗手繞金盆旋拭紅巾入殿門衆裏遙抛金橘子在前収得便承恩八十六兩樓新換珠簾額中尉明朝設内家一様金盤五十面紅酥㸃出牡丹花八十七盡送香毬出内家記巡傳把一枝花散時各自燒紅燭相逐行歸不上車八十八宿䊋殘粉未明天總立昭陽花樹邊寒食内人長白打庫家先散與金錢八十九後宫宫女無多少盡向園中笑一團舞蝶落花相覔看春風共語亦應難九十玉蕭改調筝移柱催換紅羅繡舞筵未戴柘枝花帽子兩行宫監在簾前九十一宛轉黄金白柄長青荷葉子畫鴛鴦把來不是呈新様欲進微風到御牀九十二供御香方加減頻水沈山麝每回新内中不許相傳出已被醫家寫與人九十三牕牕户户院相當總有珠簾玳瑁牀雖道君王不來宿帳中長下著香囊九十四蓬萊正殿壓雲鼇紅日初生碧海濤開著五門遙北望柘黄新􅀢御牀高九十五金殿當頭紫閣重仙人掌上玉芙蓉太平天子朝元日五色雲車駕六龍九十六平明開著九重關金畫黄龍五色􅜖宣至銀臺排仗合聖人三殿册西畨九十七丹鳯樓前把火開先排法駕出蓬萊棚前走馬人宣慰只拜南郊當日回九十八集賢殿裏圖書滿校勘頭邊御印同真迹進來知字數别収鎻在玉函中九十九移來女樂部頭邊新賜花檀木五絃緶得紅羅手帕子當中更畫一雙蟬一百藥童食後送雲漿高殿無風扇少涼每到日中重掠鬢衩衣騎馬遶宫廊萬首唐人絶句巻三十一
