body:
  text: 萬首唐人絶句巻三十五宋洪邁編七言呉苑思陳陶今人地藏古人骨古人花為今人發江南何處葬西施謝豹空聞采香月古意麻姑井邉一株杏花開不如古時紅西鄰蔡家十歲女年年二月真東風朝元引四首帝燭熒煌下九天蓬萊宮曉玉爐煙無央鸞鳳隨金母來賀薫風一萬年正殿雲開露冕旒下方朱翠壓鼇頭天雞唱罷南山曉春色先歸十二樓萬宇靈祥擁帝居東華元老薦屠蘇龍池遥望非煙拜五色曈曨在玉壺寶祚河宮一向清龜魚天篆益分明近臣誰獻登封草五岳齊呼萬歲聲宿天竺寺一宵何期此靈境五天山香金地冷西僧示我髙隱心月在中峯葛洪井古蓮塘闔閭宫娃能采蓮明珠作佩龍為船三千巧笑不復見江頭廢苑花年年雙桂詠青冥結根易傾倒沃洲山中雙樹好琉璃宫殿無斧聲石上蕭蕭伴僧老夏日懐竹齋睡餘柘槳清麟鳳誘我勞此生忽憶天台掩書坐澗雲起盡紅崢嶸仙人詞二首小山皆為十洲客莓苔為依雙耳白青編遺我忽隱身暮雨虹蜺一千尺赤城門開六丁直曉日已燒東海色朝天半路聞玉雞星斗離離礙龍翼臨風歎芙蓉樓中飲君酒驪駒結言春楊柳豫章花落不見歸一望東風堪白首春日行鶗鴂初鳴洲渚滿龍虵洗鱗春水暖病多欲問山寺僧湖上人傳石橋斷春歸去九十春光在何處古人今人留不住年年白眼向黔婁唯放蠐螬飛上樹蜀葵詠緑衣宛地紅倡倡薫風似舞諸女郎南鄰蕩子婦亡頼錦機春夜成文章南昌途中古道夤縁蔓黄葛桓伊冢西春水濶村翁莫倚横浦罾一半魚鰕屬鵜獺子規思春山杜鵑來幾日夜啼南家復北家野人聽此坐惆悵恐畏踏落東園花呉興秋思二首不是苕溪厭看月天涯有程雲樹凉何意汀洲剰風雨白蘋今日似瀟湘日夕鯤魚夢南國苕陽水髙迷渡頭故山秋風憶歸去白雲又被王孫留閩川夢歸千里潺湲建溪路夢魂一夕西歸去龍舼欲上巴獸灘越王金雞報天曙竹十首不厭東溪緑玉君天壇雙鳳有時聞一峰曉似朝仙處青節森森倚絳雲萬枝朝露學瀟湘杳靄孤亭白石凉誰道乖龍不得雨春雷入地馬鞭狂須題内史琅玕塢幾醉山陽瑟瑟村剰養萬莖將掃俗莫教凡鳥閙雲門一溪雲母間靈花似到封侯逸士家誰識雌雄九成律子喬丹井在深涯嘯入新篁一里行萬竿如罋鎻龍泓驚巢翡翠無尋處閒倚雲根刻姓名燕燕雛時紫米香野溪羞色過東墻諸兒莫拗成蹊筍從結髙籠養鳳凰迸玉閑抽上釣磯翠苖畨次脱霞衣山童泥乞青驄馬騎過春泉掣手飛一節呼龍萬里秋數莖垂海六鼇愁更須瀑布峯前種雲裏闌干過子猷丘壑誰堪話碧鮮静尋春譜認嬋娟㑹當小殺青瑶簡圖寫龜魚把上天𤣥圃千春閉玉叢湛陽一祖碧雲空不須騷屑愁江島今日南枝在國風鍾陵秋夜洪崖嶺上秋月明野客枕底章江清蓬壺宫闕不可夢一一入樓歸鴈聲江上逢故人十年蓬轉金陵道長哭青雲身不早故鄉逢盡白頭人清江顔色何曾老水調詞十首塞外迢迢未肯和五陵年少重横戈誰家不結空閨恨玉筯闌干妾最多羽管慵調怨别離西園新月伴愁眉容華不分隨君去獨有粧樓明鏡知憶餞良人玉塞行棃花三見換啼鶯邉場豈得勝閨閤莫逞琱弓過一生惆悵江南早鴈飛年年辛苦寄寒衣征人豈不思鄉國只是皇恩未放歸水閣蓮開燕引雛朝朝攀折望金吾聞道磧西春不到花時還憶故園無自從清野戍遼東舞袖香銷羅幌空幾度長安發梅柳節旄零落不成功長安孤眠倦錦衾秦樓霜月苦邉心征衣一倍裝綿厚猶慮交河雪凍深瀚海長征古别離華山歸馬是何時仍聞萬乘尊猶屈裝束千嬌嫁郅支沙塞依稀落日邉寒宵魂夢怯山川離居漸覺笙歌懶君逐票姚已十年萬里輪臺音信希傳聞移帳䕶金微㑹須麟閣留蹤跡不斬天驕莫議歸送謝山人歸江夏黄鶴春風二千里山人佳期碧江水攜琴一醉楊柳堤日暮龍沙白雲起閒居雜興五首虞韶九奏音猶在只是巴童自棄遺閒卧清秋憶師曠好風揺動古松枝一顧成周力有餘白雲閒釣五溪魚中原莫道無麟鳳自是皇家結網踈長愛真人王子喬五松山月伴吹簫從他浮世悲生死獨駕蒼麟入九霄越里娃童錦作𥜗艷歌聲壓郢中姝無人説向張京兆一曲江南十斛珠雲堆西望賊連營分閫何當舉義兵莫道羔裘無壯節古來成事盡書生泉州刺桐花兼呈趙使君四首猗猗小艷夾通衢晴日薫風笑越姝只是紅芳移不得刺桐屏障滿中都髣髴三株植世間風光滿地赤城閑無因秉燭看竒樹長伴劉公醉玉山赤帝嘗聞海上遊三千幢蓋擁炎洲今來樹似離宫色紅翠欹斜十二樓不勝攀折悵年華紅樹南看見海涯故國春風歸去盡何人堪寄一枝花投贈福建桂常侍二首後來台席更何人都䕶朝天拜近臣長笑當時漢卿士等閒恩澤畫麒麟匝地歌鐘鎮海隅城池鞅掌舊名都不知珠履三千外更許侯嬴寄食無隴西行四首漢主東風報太平無人金闕議邉兵縱饒奪得邊城塞磧地桑麻種不生誓掃匈奴不顧身五千貂錦䘮風塵可憐無定河邉骨猶是春閨夢裏人隴戍三看塞草青樓煩新替䕶羌兵同來死者傷離别一夜孤䰟哭舊營外寇生擒未有涯黑山營陣識龍蛇自從貴主和親後一半風流似漢家荅蓮華妓近來詩思清於水老去風情薄似雲已向升天得門户錦衾深愧卓文君下第寄友林寛詩人道僻命多竒更值干戈亂起時莫作江陵王少府一生吟苦竟誰知華清宮殿角鐘殘立宿鴉朝元歸駕望無涯香泉空浸宫前草未到春時爭發花終南山標竒聳峻壯長安影入千門萬户寒徒自倚天生氣色塵中誰為舉頭看歌風臺蒿棘空存百尺基酒酣曾唱大風詞莫言馬上得天下自古英雄盡解詩長安遣懐醉上髙樓醒後登任從浮薄笑才能青龍寺裏山門上立為南山不為僧聞鴈接影横空背雪飛聲聲寒出玉關遲上陽宫裏三千夢月冷風清聞過時贈竇牟楊憑直用天才衆却瞋應欺李杜久為塵南荒不死中華老别玉翻同西國人千葉桃花干葉桃花勝百花孤榮春晚駐年華若教避俗秦人見知向河源舊侣誇春中汎舟仙郎歸奏過湘東正值三湘二月中惆悵滿川桃杏醉醉看還與曲江同雨中怨秋辭家逺客愴秋風千里寒雲與斷蓬日暮隔山投古寺鐘聲何處雨濛濛秋日獨遊曲江信馬閒過憶所親秋山行盡路無塵主人莫惜松隂醉還有千錢沽酒人寄别晚煙洲霧共蒼蒼河鴈驚飛不作行囬斾轉舟行數里歌聲猶自逐清湘邉情新種如今屢請和玉關邉上幸無他欲知北海苦辛處看取節毛餘幾多早發湘中按節鳴笳中貴催紅旌白斾滿船開迎愁湓浦登城望西見荆門積水來海榴海榴殷色透簾籠看盛看衰意欲同若許三英隨五馬便將濃艷鬭繁紅春情暮雨朝雲幾日歸如絲如霧濕人衣三湘二月春光早莫逐狂風撩亂飛送客徃荆州巴丘過日暮登城雲水湘東一色平若愛春秋繁露學正逢元凱鎮南荆戲贈馬鍊師心嫌碧落更何從月破花冠氷雪容行雨若迷歸路處近前唯見祝融峯湘江泛舟湘川洛浦三千里地角天涯南北遥除却同傾百壺外不愁誰奈兩魂消送别江岸梅花雪不如看君驛馭向南都相聞不必因來鴈雲裏飛難落素書唐昌觀玉蘂花楊凝瑶華瓊蘂種何年蕭史秦嬴向紫煙時控綵鸞過舊邸摘花持獻玉皇前别李協江邉日暮不勝愁送客霑衣江上樓明月峽添明月照蛾眉峯似兩眉愁初次巴陵西江兩接洞庭波積水遥連天上河鄉信為憑誰寄去汀洲燕鴈漸來多上已帝京元已足繁華細管清絃七貴家此日風光誰不共紛紛皆是掖垣花春怨花滿簾櫳欲度春此時夫婿在咸秦緑窻孤寢難成寐紫燕雙飛似弄人送客歸常州行到河邉從此辭寒天日逺暮帆遲可憐芳草成衰草公子歸時過緑時送别春愁不盡别愁來舊淚猶長新淚催相思儻寄相思子君别揚州揚子回送客入蜀劒閣迢迢夢想間行人歸路遶梁山明朝騎馬揺鞭去秋雨槐花子午閒送别仙花笑盡石門中石室重重掩緑空蹔下雲峯能幾日却回煙駕馭春風殘花五馬踟蹰在路岐南來只為看花枝鶯銜蝶弄紅芳盡此日深閨那得知戲贈友人湘隂直與地隂連此日相逢憶醉年美酒非如平樂貴十升不用一千錢即事寄人楊凌中禁鳴鐘日欲髙北窻欹枕望頻搔相思寂寞青苔合唯有春風啼伯勞早春雪中新年雨雪少晴時屢失尋梅看柳期鄉信憶隨回鴈早江春寒帶故隂遲北行留别日日山川烽火頻三河重起舊煙塵一生孤負龍泉劒羞把詩書問故人秋原晚望客鴈秋來次第逢家書頻寄兩三封夕陽天外雲歸盡亂見青山無數峯春霽花蕚樓南聞宫鶯祥煙瑞氣曉來輕柳變花開共作晴黄鳥逺啼鳷鵲觀春風流出鳳凰城明妃曲漢國明妃去不還馬䭾絃管向隂山匣中雖有菱花鏡羞對單于照舊顔後魏行王轂力微皇帝謗天嗣太武凶殘人所畏一朝􅗑䍽飛上天子孫盡作河魚餌東都望幸章碣懶修珠翠上髙臺眉月連娟恨不開縱使東廵也無益君王自領美人來焚書坑竹帛煙銷帝業虚關河空鎻祖龍居坑灰未冷山東亂劉項元來不讀書萬首唐人絶句巻三十五
