body:
  text: 萬首唐人絶句巻九宋洪邁編七言和裴校書鷺鷥飛元稹鷺鷥鷺鷥何處飛鵶驚雀噪難久依清江見底草堂在一㸃白光終不歸夜池荷葉團圓莖削削緑萍面上紅衣落滿地月明思啼螿髙屋無人風張幕寒食日毛空路示姪我昔提孩從我兄我今衰白爾初成分明記取原頭路百世長須此路行别孫村老人年年漸看老人稀欲别孫翁淚滿衣未死不知何處去此身終向此原歸和樂天劉家花閒坊静曲同消日淚草傷花不為春遍問舊交零落盡十人纔有兩三人褒城驛二首容州詩句在褒城㡬度經過眼漸明今日重看滿衫淚可憐名字已前生憶昔萬株梨映竹遇逢黄令醉殘春梨枯竹盡黄令死今日載來衰病身和樂天夢亡友劉太白同遊二首君詩昨日到通州萬里知君一夢劉閒坐思量小來事祗應元是夢中遊老來東郡復西州行處生塵為喪劉縱使劉君魂魄在也應至死不同遊醉醒積善坊中前度飲謝家諸婢笑扶行今宵還似當時醉半夜覺來聞笑聲感夢行吟坐嘆知何極影絶魂消動隔年今夜商山館中夢分明同在後堂前六年春遣懐八首傷禽我是籠中鶴沉劍君來泉下龍重纊猶存孤枕在春衫無復舊裁縫檢得舊書三四紙髙低濶狹但成行自言併食尋髙事唯念山深驛路長公無渡河音響絶已隔前春復去秋今日閒忩拂塵土殘絃猶迸鈿箜篌婢僕曬君餘服用嬌癡稚女遶牀行玉梳鈿朶香醪解盡日風吹瑇瑁筝伴客消愁長日飲偶然乘興便醺醺怪來醒後傍人泣醉裏時時錯問君我隨楚澤波中梗君作咸陽泉下泥百事無心值寒食身將稚女帳前啼童稚癡狂撩亂走綵毬花仗滿堂前病身一到繐帷下還向臨堦背日眠小於潘岳頭先白學取莊周淚莫多止竟悲君須自省川流前後各風波答友封荀令香消潘簟空悼亡詩滿舊屏風扶牀小女君先識應為些些自外翁夢成之燭暗船風獨夢驚夢君頻問向南行覺來不語到明坐一夜洞庭湖水聲哭小女降真雨㸃輕漚風復驚偶來何事去何情浮生未到無生地暫到人間又一生哭女樊秋天浄緑月分明何事巴猿不賸鳴應是一聲膓㫁去不容啼到第三聲妻滿月日相唁十月辛勤一月悲今朝相見淚淋漓狂花落盡莫惆悵猶勝因花壓折枝杏園浩浩長安車馬塵狂風吹送每年春門前本是空虚界何是栽花誤世人菊花秋叢遶舍似陶家遍遶籬邉日漸斜不是花中偏愛菊此花開盡更無花尋西明寺僧不在春來日日到西林飛錫經行不可尋蓮池舊是無波水莫逐狂風起浪心與呉侍御春遊蒼龍闕下陪騘馬紫閣峰頭見白雲滿眼流光隨日度今朝花落更紛紛晩春晝静簾疎鷰語頻雙雙鬬雀動堦塵柴扉日暮隨風掩落盡閒花不見人先醉今日尊前敗飲名三杯未盡不能傾怪來花下常先醉半是春風蕩酒情獨醉一樹芳菲也當春慢隨車馬擁行塵桃花解笑鶯能語自醉自眠那藉人宿醉風引春心不自由等閒衝席飲多籌朝來始向花前覺度却醒時一夜愁懼醉聞道秋來却夜寒不辭泥水為盃盤殷勤懼醉有深意愁到醉時燈火䦨羡醉綺陌髙樓競醉眠共期憔悴不相憐也應自有尋春日虚度而今正少年憶醉自嘆旅人行意速每嫌杯酒緩歸期今朝偏遇醒時别淚落風前憶醉時病醉醉伴見儂因病酒道儂無酒不相窺那知下藥還沽底人去人來剩一巵擬醉九月閒宵初向火一罇清酒始行杯憐君城外遙相憶冐雨衝泥黒地來勸醉寳家能釀銷愁酒但是愁人便與銷顧我共君俱寂寞只應連夜復連朝任醉本怕酒醉渾不飲因君相勸覺情來殷勤滿酌從聴醉乍可欲醒還一杯同醉栢樹臺中推事人杏花壇上煉真形心源一種閒如水同醉櫻桃樹下春狂醉一自栢臺為御史二年辜負兩京春峴亭今日顛狂醉舞引紅娘亂打人伴僧行春來求事百無成因向愁中識道情花滿杏園千萬樹㡬人能伴老僧行古寺古寺春餘日半斜竹風蕭爽勝人家花時不到有花院意在尋僧不在花定僧落魄閒行不著家偏尋春寺賞年華禪僧偶向花前定滿樹狂風滿樹花觀心處滿座喧喧笑語頻獨憐方丈了無塵燈前便有觀心處要似觀心有㡬人智度師二首四十年前馬上飛功名蔵盡擁禪衣石榴園下擒生處獨自閒行獨自歸三陷思明三突圍鐵衣抛盡納禪衣天津橋上無人識閒凭欄杆望落輝西明寺牡丹花向琉璃池上生光風炫轉紫雲英自從天女盤中見直至今朝眼更明憶楊十二去時芍藥纔開贈看却殘花已度春只為情深花愴别等閒相見莫相親送復夢赴韋令幕世上如今重檢身吾徒躭酒作狂人西曹舊事多持法切莫吐他丞相茵送劉太白洛陽大抵居人少從善坊西最寂寥想到劉君獨騎馬古堤秋樹隔中橋奉誠園蕭相深誠奉至尊舊居求作奉誠園秋來古巷無人掃樹滿空牆閉㦸門與太白同之東洛至櫟陽太白染疾駐行予九月二十五日至華嶽寺雪後望山共作洛陽千里伴老劉因疾駐行軒今朝獨自山前立雪滿山峰倚寺門野狐泉栁林去日野狐泉上栁紫芽初綻拂眉低秋來寥落驚風雨葉滿空林踏作泥酬胡三慿人問牡丹竊見胡三問牡丹為言依舊滿西欄花時何處偏相憶寥落衰紅雨後看酬樂天秋興見贈末句云莫怪獨吟秋興苦比君校近二毛年勸君休作悲秋賦白髪如星也任垂畢竟百年同是夢長年何異少何為雪後宿同軌店上法䕶寺鐘樓望月滿山殘雪滿山風野寺無門院院空烟火漸稀孤店静月明深夜古樓中陪韋尚書文歸履信宅紫垣騶騎入華居公子文衣䕶錦輿眠閣書生復何事也騎羸馬從尚書永真二年正月二日上御丹鳯樓赦天下予與李公垂庾順之間行曲江不及盛觀春來饒夢慵朝起不看千官擁畫樓却著閒行是忙事數人同傍曲江頭韋居守晩嵗常言退休之志因署其居曰大隠洞命予賦詩謝公潜有東山意已向朱門啟洞門大隠猶疑戀朝市不如名作罷歸園贈李十二牡丹花片鶯澁餘聲絮墮風牡丹花盡葉成叢可憐顔色經年别収取朱欄一片紅題李十一修行里居璧雲闕朝回塵騎合杏花春盡曲江閒憐君雖在城中住不隔人家便是山靖安窮居喧静不由居逺近大都車馬就權門野人住處無名利草滿空堦樹滿園贈樂天等閒相見銷長日也有閒時更學琴不是眼前無外物不闗心事不經心駱口驛二首郵亭壁上數行字崔李題名王白詩盡日無人共言語不離牆下至行時二星徼外通蠻服五夜燈前草御文我到東川恰相半向南看月北看雲清明日當年寒食好風輕觸處相隨取次行今日清明漢江上一身騎馬縣官迎亞枝紅平陽池上亞枝紅悵望山郵是事同還向萬竿深竹裏一枝渾卧碧流中梁州夢夢君同遶曲江頭也向慈恩院院遊亭吏呼人排去馬忽驚身在古梁州江上行悶見漢江流不息悠悠漫漫竟何成江流不語意相問何事逺來江上行漢江上笛少年為寫遊梁賦最説漢江聞笛愁今夜聴時在何處月明西縣驛南樓郵亭月君多務實我多情大抵偏嗔歩月明今夜山郵與蠻瘴君應堅卧我還行嘉陵驛二首嘉陵驛上空牀客一夜嘉陵江水聲仍對牆南滿山樹野花撩亂月朧明牆外花枝壓短牆月明還照半張牀無人會得此時意一夜獨眠西畔廊百牢闗嘉陵江上萬重山何事臨江一破顔自笑只縁人敬仲等閒身度百牢闗江花落日暮嘉陵江水東梨花萬片逐江風江花何處最腸㫁半落江流半在空嘉陵江二首秦人惟識秦中水長想呉江與蜀江今日嘉川驛樓下可憐如練遶明忩千里嘉陵江水聲何年重遶此江行只應添得清宵夢時見滿江秋月明西縣驛去時樓上清明夜月照樓前撩亂花今日成隂復成子可憐春盡未還家望喜驛滿眼文書堆案邊眼昏偷得暫時眠子規驚覺燈又滅一道月光横枕前好時節身騎騘馬峩嵋下面帶霜威卓氏前虚度東川好時節酒樓元被蜀兒眠夜深行夜深猶自遶江行震地江聲似鼓聲漸見戍樓疑近驛百牢闗吏火前迎望驛臺可憐三月三旬足悵望江邊望驛臺料得孟光今日語不曽春盡不歸來封書鶴臺南望白雲闗城市猶存暫一還書出歩虚三百韵蘂珠文字在人間仁風李著作園醉後寄李十朧明春月照花枝花下鶯聲似管兒却笑西京李員外五更騎馬趂朝時燈影洛陽晝夜無車馬漫掛紅紗滿樹頭見説平時燈影裏𤣥宗潜伴太真遊書樂天紙金鑾殿裏書殘紙乞與荆州元判司不忍拈將等閒用半封京信半題詩送元頴杜君江上五年同送客與君常羡北歸人今朝又送君先去千里洛陽城裏塵酬李甫見贈十首宋玉悲秋續楚詞隂鏗官慢足閒詩親情書札相安慰多道蕭何作判司杜甫天才頗絶倫每尋詩巻似情親憐渠直道當時語不著心源傍古人千嵗荒狂任博徒援莎五木擲梟盧野詩良輔偏伶假長借金鞍迓酒胡曽經倬立侍丹墀綻蘂宫花拂面枝雉尾扇開朝日出柘黄衫對碧霄垂一自低心翰墨塲箭䪐抛盡負書囊近來兼愛休粮藥栢葉莎羅雜豆黄莫笑風塵滿病顔此生元在有無間巻舒蓮葉終難濕去住雲心一種閒無事抛棊侵虎口㡬時開眼復聨行終須殺盡縁邊敵四面通流掩太荒原憲甘貧每自開子春傷足少人哀巷南唯有陳居士時學文殊一問來每識閒人如未識與君相識便相憐經句不解來過宿忍見空牀夜夜眠開拆新詩展大璆明珠炫轉玉音浮酬君十首三更坐減却當時半夜愁和樂天招錢蔚章看山碧落招邀閒曠望黄金城外玉方壺人間還有大江海萬里烟波天上無折花枝送行櫻桃花下送君時一寸春心逐折枝别後相思最多處千株萬片遶林垂萬首唐人絶句巻九欽定四庫全書萬首唐人絶句巻九宋洪邁編五言贈李唐山人戴叔倫此意無所欲閉門風景遲柳條將白髮相對共垂絲題秦隠君麗句亭北人歸欲盡猶自住蕭山閉户不曾出詩名滿世間答孫常州見憶畫鷁春風裏超遙去若飛那能寄相憶不並子猷歸送裴明州效南朝體湘水連湘水千波萬浪中知郎未得去慚愧石尤風戲留顧明府江明雨初歇山暗雲猶溼未可動歸橈前程風浪急答崔載華文案日成堆愁睂拽不開偷歸甕間卧逢箇楚狂來將赴行營勸客同醉絲管霜天夜烟塵淮水西明朝上征去相伴醉如泥夏夜江樓㑹別不作十日別煩君此相留兩餘江上月好醉竹間樓嵗除日追赴撫州辨對留別崔法曹上國杳未到流年忽復新囘車不自識君定送何人江館㑹別離亭一㑹宿能有㡬人同莫以囘車泣前途不盡窮容州囘逢陸三別西南積水逺老病喜生歸此地故人別空餘淚滿衣古意寄呈二侍郎夜光貯懷袖待報一顧恩日向江湖老此心誰為論送李大夫渡口阻風浪息定何時龍門到恐遲輕舟不敢渡空立望旌旗過三閭廟沅湘流不盡屈宋怨何深日暮秋烟起蕭蕭楓樹林泊湘口湘山千嶺樹桂水九秋波露重猿聲絶風清月色多赴撫州對奉酬崔法曹謗議不自辨親朋那得知雨中驅馬去非是獨傷離遊道林寺佳山路不逺俗侶到常稀及此烟霞暮相看復欲歸後宫曲初入長門宫謂言君戲妾寧知秋風至吹盡庭前葉新別離手把杏花枝未曾經別離黄昏掩闗後寂寞心自知昭君詞漢宫若逺近路在寒沙上到死不得歸何人共南望勸陸三飲酒寒郊好天氣勸酒莫辭頻擾擾鍾陵市何窮不醉人關山月月出照闗山秋風人未還清光無逺近鄉淚半書間其二一雁過連營繁霜覆古城悲笳在何處半夜起邊聲寄外兄盧仝何處堪惆悵情親不得親興寧樓上月辜負酒家春守嵗老來經節臘樂事甚悠悠不及兒童日都盧不解愁新月仙宫雲箔巻露出玉簾鈎清光無所贈相憶鳳凰樓解悶人生都㡬日一半是離憂但有樽中物從他萬事休憶酒寄劉侍郎愛酒如偷蜜憎醒似見刀君為麴糵主酒醒莫辭勞新蟬泉溜潛幽咽琴鳴乍往還長風剪不斷還在樹枝間村醉村醉黄昏歸健倒三四五摩娑莓苔背嗔我驚爾不石讓竹自顧掇不轉何敢當主人竹弟有清風可以娛嘉賓竹答石竹弟謝石兄清風非所任隨分有蕭瑟實無堅重心酬徐公以新文見招昨夜霜明月果有清音生便與走相和愁聞寒玉聲夜半步次古城楊衡茫茫行復坐惟有古時城夜半無鳥雀花枝當月明邊思蘇武節旄盡李陵音信稀花當隴上發人向隴頭歸題花樹都無看花意偶到樹邊來可憐枝上色一一為愁開宿吉祥寺寄廬山隱者鳳鳴雲外鐘鶴宿千年松相思杳不見月出山重重老恨劉乂風打杉雪殘補書書不完懶學渭上翁辛苦把竹竿獨飲盡飲調大羮自古無好手所以山中人兀兀但飲酒贈姚秀才小劍一條萬古水向我手心流臨行瀉贈君勿蕩細碎讐嘲荆卿白虹千里氣頸血一劍義報恩不到頭徒作輕生事與孟東野寒衣草木皮饑食草木根不為孟夫子豈識市井門愛碣石山碣石何青青挽我雙眼睛愛爾多古峭不到山間行代牛言渇飲潁川水餓喘吳門月黄金如可種我力終不歇餓詠文王久不出賢士如土賤妻孥從餓死敢愛黄金篆和韋開州宿雲寺張籍清淨當深處虛明向逺開巻簾無俗客應只見雲來桃塢春塢桃花發多將野客遊日西殊未厭看望酒缸頭竹巖獨入千竿裏緣巖踏石層笋頭齊欲出更不許人登胡蘆沼曲沼春流滿新蒲映野鵝閒濟朝飯後拄杖遶行多隱月岫月出深峯裏清涼夏亦寒每嫌西落疾不得到明看琵琶臺臺上綠蘿春閒登不待人每當休暇日著履戴絃巾梅溪自愛新梅好行尋一徑斜不教人掃石恐掃落來花繡衣石榻山城無別味藥草兼魚果時到繡衣人同來石上坐茶嶺紫芽連白蘂初向嶺頭生自看家人摘尋常觸露行上士泉缾階上一眼泉四邊青石甃唯有䕶淨僧添缾將盥漱流杯渠淥酒白螺杯隨流去復囘似知人把處各向面前來盤石磴壘石盤空逺層層勢不危不知行㡬匝得到上頭時寄西峯僧松暗水涓涓夜涼人未眠西峯月猶在遙憶草堂前禪師獨在西峯頂年年閉石房家中無子弟人到為焚香送逺客憔悴逺歸客殷勤欲別杯九星壇下露㡬日見重來題暉禪師影堂早日欲參禪竟無相識緣道場今獨到惆悵影堂前惜花山中春已晚處處見花稀明日來無盡林間宿不歸涇州塞行到涇州塞唯聞差戍鼙道邊雙古堠猶記向安西岸花可憐岸邊樹紅蘂發青條東風吹度水衝著木蘭橈別子鵠離燈及晨輝行人起復思出門兩相顧青山路透迤野中幕幕野田草草中牛羊道古墓無子孫白楊不得老和舍弟恭惜花吕温去嵗無花看今年未看花更聞飄落盡走馬向誰家浴後贈主人新浴振輕衣滿堂寒月色主人有美酒況是曾相識吐蕃館月夜三五窮荒月還應照北堂囘身向暗卧不忍見圓光題梁宣帝陵二首即讐終自翦覆國豈為雄假號孤城裏何如在甬東祀夏功何薄尊周義不成淒涼庾信賦千載共傷情雪中送楊七愁雲重拂地飛雪亂遙程莫慮前山暗歸人眼自明衡州早春二首碧水何逶迤東風吹沙草烟波千萬曲不辨嵩河道病肺不飲酒傷心不看花唯驚望鄉處猶自隔長沙書懷寄劉連州朱邑何為者桐鄉有古祠我心常所慕二郡老人知偶作二首栖栖復汲汲忽覺年四十今朝滿衣淚不是傷春泣中夜兀然坐無言空涕洟丈夫志氣事兒女安得知聽籠中山鵲掩抑沖天意悽愴觸籠音驚曉一聞處傷春千里心秋夜夜久葉露滴秋蟲入户飛卧多骨髓冷起覆舊綿衣南澗野桂香滿溪石沙寒覆水愛此南澗頭一日潺潺裏題柏巖禪師影堂山中磚塔閉松下影堂新恨不生前識今朝禮畫身送人河亭収酒器語盡各西東囘首不相見行車秋雨中春意二首去日丁寧別情知寒食歸緣逢好天氣教熨看花衣誰是杏園主一枝臨古岐從傷早春意乞取欲開枝早發汶南橋上車馬發橋南烟樹開青山斜不斷迢遞故鄉來夜聞子規子規啼不歇到曉口應穿況是不眠夜聲聲在耳邊四望驛松當初北澗別直至此亭中何意聞鞞耳聽君枝上風江館水面細風生菱歌慢慢聲客亭臨小市燈火夜妝明題江臺驛水北金臺路年年行客稀近聞天子使多取雁門歸贈謫者何罪過長沙年年北望家重封嶺頭信一樹海邊花酬從姪借詩本眼暗沒工夫慵來剪客鬚自看花様古稱得少年無新嫁娘詞三首鄰家人不識牀上坐堆堆郎來傍門户滿口索錢財錦帳兩邊横遮掩待娘行遣郎鋪簟席相並拜親情三日入㕑裏洗手作羮湯未諳姑食性先遣小姑嘗聞瀑布冰折馬戴萬仞冰梢折寒聲投白雲光搖山月墮我向石牀聞過亡友墓憶昨送君塟今看墳樹髙尋思後期者只是益生勞白鹿原晚望滻曲雁飛下秦原人葬囘丘墳與城闕草樹共塵埃秋思二首萬木秋霖後孤山夕照餘田園無嵗計寒近憶樵漁亭樹霜霰滿野塘鳬雁多蕙蘭不可折楚老徒悲歌萬神谷紀事霹靂振秋岳折松横洞門雲龍忽變化但覺玉潭昏萬首唐人絶句巻九
