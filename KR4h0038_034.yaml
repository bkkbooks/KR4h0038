body:
  text: 萬首唐人絶句巻三十四宋洪邁編七言長安早春施肩吾報花消息是春風未見先教何處紅想得芳園十餘日萬家身在畫屏中再酬李先輩清辭再發郢人家字字新移錦上花能使龍宫買綃女低回不敢織輕霞寄隠者路絶空林無處問幽竒山水不知名松門拾得一片屐知是髙人向此行寄四明山子髙棲只在千峯裏塵世望君那得知長憶去年風雨夜向君窻下聴猿時觀美人漆㸃雙眸鬢繞蟬長留白雪占胷前愛將紅袖遮嬌笑徃徃偷開水上蓮收糚詞斜月朧朧照半牀焭焭孤妾懶收䊋燈前再覽青銅鏡枉挿金釵十二行仙女詞仙女羣中名最髙曽看王母種仙桃手題金簡非凡筆道是天邊玉兎毛仙翁詞世間無逺可為游六合朝行夕已周壇上夜深風雨静小仙乘月繫蒼虬遇李山人遊山遊水幾千重二十年中一度逢别易㑹難君且住莫交青竹化為龍同張鍊師溪行青溪道士紫霞巾洞裏仙家舊是隣每見桃花逐流水無回不憶武陵人桃源詞二首夭夭花裏千家住總為當時隠暴秦歸去不論無舊識子孫今亦是他人秦世老翁歸漢世還同白鶴返遼城縱令記得山川路莫問當時州縣名送道友遊山欲駐如今未老形萬重山上九芝清君今若問採芝路踏水踏雲攀杳㝠贈王屋劉道士小有洞中長住客大羅天上後來仙出門即是尋常處未可還它跨鶴鞭謝自然昇仙分明得道謝自然古來漫説尸解仙如花年少一女子身騎白鶴遊青天秋吟獻李舍人腸結愁根酒不消新驚白髪長愁苖主司儻許題名姓筆下看成度海橋山中喜静和子見訪絶壁深溪無四鄰每逢猿鶴即相親小奴驚出垂藤下山犬今朝吠一人春日題羅處士山舎亂疊千峯掩翠微髙人愛此自忘機春風若掃階前地便是山花帶錦飛訪松嶺徐鍊師千仞峯頭一謫仙何時種玉已成田開經猶在松隂裏讀到南華第幾篇江南織綾詞卿卿買得越人絲貪弄金梭懶畫眉女伴能來看新􅦜鴛鴦正欲上花枝宿蘭若聴鐘投宿入孤煙巖下病僧猶坐禪獨夜客心何處是秋雲影裏一燈然題禪僧院棲禪枝畔數花新飛作瑠璃地上塵谷鳥自啼猿自呌不能愁得定中人送絶粒僧碧洞青蘿不畏深免將飢渴累禪心若期野客來相訪一室無煙何處尋早春逰曲江芳處亦將枯槁同應縁造化未施功羲和若擬動鑪鞴先鑄曲江千樹紅佳人覽鏡每坐臺前見玉容今朝不與昨朝同良人一夜出門宿校却桃花一半紅遇王山人每欲尋君千萬峯豈知人世也相逢一瓢遺却在何處應挂天台最老松遇醉道士霞帔尋常帶酒眠路旁疑是酒中仙醉來不住人家宿多向逺山松月邊送人歸台州莫驅歸騎且徘徊更遣離情四五杯醉後不憂迷客路遥看瀑布識天台贈施仙姑縹緲吾家一女仙冰容雖小不知年有時頻夜看明月心在常娥几案邊山院觀花初來唯見空樹枝今朝滿院花如雪門前為報諸少年明日來遲不堪折經桃花夫人廟誰能枉駕入荒榛隨例形相土木身不及連山種桃樹花開猶得識夫人代農叟吟且將一笑悦豐年漸老那能日日眠引客特來山地上坐看秋水落紅蓮下第春逰羈情含蘖復含辛淚眼看花似隔塵天遣春風領春色不教分付與愁人送僧逰越麻衣年少雪為顔却笑孤雲未是閒此去若逢花栁月棲禪莫向苧蘿山遇越州賀仲宣君在鏡湖西畔住四明山下莫經春門前幾箇采蓮女欲泊蓮舟無主人江南積雨歎人厭為霖水毁溪牀邊生菌路成泥雨師一日三回到棟裏閒雲豈得棲雲中道上作羊馬羣中覔人道雁門關外絶人家昔時聞有雲中郡今日無雲空見沙同諸隠者夜登四明山半夜尋幽上四明手攀松桂觸雲行相呼已到無人境何處玉簫吹一聲戲鄭申甫年少鄭郎那解愁春來閒卧酒家樓胡姬若擬邀他宿挂却金鞭繫紫騮宿干越亭琵琶洲上人行絶干越亭中客思多月滿秋江山冷落不知誰問夜如何少女詞二首嬌羞不肯㸃新黄踏過金鈿出繡牀信物無端寄誰去等閒裁破錦鴛鴦同心帶裏脱金錢買取頭花翠羽連手執木蘭猶未慣今朝初上采菱船冬詞錦繡堆中卧初起芙蓉面上粉猶殘臺前也欲梳雲髻只怕盤龍手捻難昭君怨馬上徒勞别恨深總縁如玉不輸金已知賤妾無歸日空荷君王有悔心贈仙子欲令雪貌帶紅芳更取金瓶瀉玉漿鳳管鶴聲來未足懶眠秋月憶簫郎越溪懐古憶昔西施人未求浣紗曽向此溪頭一朝得侍君王側不見玉顔空水流秋夜中山贈别友人何處邀君話别情寒山木落月華清莫愁今夜無詩思已聴秋猿第一聲大堤新詠行路少年知不知襄陽全欠舊來時宜城賈客載錢出始覺大堤無女兒宿四明山黎洲老人命余宿杳然髙頂浮雲平下視不知幾千仞欲曉不曉天雞聲禁中新栁萬條金線帶春煙深染青絲不直錢又免生當離别地宫鵶啼處禁門前酬張明府潘令新詩忽寄來分明繡叚對花開此時欲醉紅樓裏正被歌人勸一杯酬施先輩孟簡襄陽才子得聲多四海皆傳古鏡歌樂府正聲三百首梨園新入教青娥商山祠堂即事竇常奪嫡心萌事可憂四賢西笑暫安劉後王不敢論珪組土偶人前枳樹秋七夕露盤花水望三星髣髴虚無為降靈斜漢没時人不寐幾條蛛網下風庭過宋氏五女舊居謝廷風韻婕妤才天縱斯文去不回一宅栁花今似雪鄉人擬築望仙臺杏山館聴子規楚塞餘春聴漸稀斷猿今夕讓霑衣雲埋老樹空山裏髣髴千聲一度飛奉酬楊侍郎竇牟翠羽雕蟲日日新翰林工部欲何神自悲由瑟無彈處今作關西門下人杏園渡衛郊多壘少人家南渡天寒日又斜君子素風悲已矣杏園無復一枝花奉誠園聞笛曽絶珠纓吐錦茵欲披荒草訪遺塵秋風忽灑西園淚滿目山陽笛裏人酬舍弟庠罷舉從辟之荆且願依劉表折桂終慙見郤詵舎弟未應絲作鬢園公不用印隨身初入諌司喜家室至竇羣一旦悲歡見孟光十年辛苦伴滄浪不知筆硯縁封事猶問傭書日幾行春雨昨日偷閒看花了今朝多雨奈人何人閒盡似逢花雨莫愛芳菲濕綺羅送内弟袁徳師南渡登舟即水仙西垣有客思悠然因君相問為官意不賣毗陵負郭田贈劉大兄院長萬年枝下昔同趨三事行中半已無路自長沙急相見共驚雙鬢别來殊晚自臺中歸白髪駸駸生有涯青襟曽愛紫河車自憐悟主難歸去馬上看山恐到家假日尋花武陵縁源不可到河陽帶縣詎堪夸枝枝如雪南關外一日休閒盡屬花經中牟魯公廟青史編名在篋中故林遺廟揖仁風還將文字如顔色暫下蒲車為魯公叚都尉别業竇庠曽識將軍叚匹磾幾塲花下醉如泥春來欲問林園主桃李無言鳥自啼靈臺鎮曉日天山雪半晴紅旗遥識漢家營近來敵騎休南牧羊馬城邊春草生贈道芬上人善畫松石雲濕煙村不可闚畫時惟有鬼神知幾回逢着天台客認得巖西最老枝金山寺一㸃青螺碧浪中全依水府與天通晴江萬里雲飛盡鼇背參差日氣紅冬夜寓懐寄翰林王補闕滿地霜蕪葉下枝幾回吟斷四愁詩漢家若欲論封禪須及相如未病時贈符載白社㑹中嘗共醉青雲路上未相逢時人莫小池中水淺處無妨有卧龍龍門看花無葉無枝不見空連天撲地逕纔通山鶯驚起酒醒處火熖燒人雪噴風陪留守廵内至上陽宫感興二首翠輦西歸七十春玉堂珠綴儼埃塵武皇弓劒埋何處泣問上陽宫裏人愁雲漠漠草離離太液鉤陳處處疑薄暮毁垣春雨裏殘花猶發萬年枝陜府覽房杜二公仁夀中題紀竇鞏仁夀元和二百年䝉籠水墨淡如煙當時憔悴題名日漢祖龍潜未上天早春送宇文十春遲不省似今年二月無花雪滿天村店閉門何處宿夜深遥喚渡江船經竇車騎故城荒陂古堞欲千年名振圖書劒在泉今日諸孫拜墳樹愧無文字續燕然贈王氏小兒竹林㑹裏偏憐小淮水清時最覺賢莫倚兒童輕歲月丈人曽共爾同年唐州東途作緑林兵起結愁雲白羽飛書未解紛天子欲開三面網莫將弓箭射官軍新羅進白鷹御馬新騎禁苑秋白鷹來自海東頭漢皇無事須游獵雪亂爭飛錦臂韝秋夕䕶霜雲映月朦朧烏鵲爭飛井上桐夜半酒醒人不覺滿池荷葉動秋風襄陽寒食寄宇文籍煙水初銷見萬家東風吹栁萬條斜大隄欲上誰相伴馬踏春泥半是花奉使薊門自從身屬富人侯蟬噪槐花已四秋今日一莖新白髪懶騎官馬到幽州送劉禹錫十年憔悴武陵溪鶴病深林玉在泥今日太行平似砥九霄初倚入雲梯送元稹西歸南州風土滯龍媒黄紙初飛勑字來二月曲江連舊宅阿婆情熟牡丹開過驪山翠輦紅旌去不回蒼蒼宫樹鎻青苔有人説得當時事曽見長生玉殿開洛中即事髙梧葉盡鳥巢空洛水潺湲夕照中寂寂天橋車馬絶寒鴉飛入上陽宫尋道者所隱不遇籬外涓涓澗水流槿花半㸃夕陽收欲題名字知相訪又恐芭蕉不奈秋寄南游兄弟書來未報幾時還知在三湘五嶺間獨立衡門秋水濶寒鴉飛去日銜山宫人斜離宫路逺北原斜生死深恩不到家雲雨今歸何處去黄鸝飛上野棠花代鄰叟年來七十罷耕桑就暖支羸强下牀滿眼兒孫身外事閒梳白髪向殘陽新營别墅寄家兄懶性如今成野人行藏由興不由身莫驚此度歸來晚買得西山正值春自京中將赴黔南風雨荆州二月天問人初雇峽中船西南一望和雲水猶道黔南有四千南遊感興傷心欲問前朝事惟見江流去不回日暮東風春草緑鷓鴣飛上越王臺題劒津風前推折千年劒巖下澄空萬古潭雙劒變成龍化去兩溪相並水歸南放魚金錢贖得免刀痕聞道禽魚亦感恩好去長江千萬里不須辛苦上龍門王仙壇林傑羽客已登雲路去丹爐草木盡燒殘不知千載歸何日空使時人掃舊壇乞巧七夕今宵看碧霄牽牛織女渡河橋家家乞巧望秋月穿盡紅絲幾萬條萬首唐人絶句巻三十四
