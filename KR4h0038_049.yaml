body:
  text: 萬首唐人絶句卷四十九宋洪邁編七言蠶婦來鵠又作來鵬曉夕采桑多苦辛好花時節不間身若教解愛繁華事凍殺黃金屋裏人題廬山雙劒峯倚天雙劒古今間三尺髙於四面山若使火雲燒得動始應農器滿人間雲千形萬象竟還空映水藏山片復重無限旱苗枯欲盡悠悠間處作竒峯金錢花也無稜郭也無神露洗還同鑄出新青帝若教花裏用牡丹應是得錢人曉雞黯黯嚴城罷鼓鼙數聲相續出寒栖不嫌驚破紗窗夢却怕為妖半夜啼山中避難作山頭烽火水邊營鬼哭人悲夜夜聲唯有碧天無一事日還西下月還明早春新歷才將半紙開小庭猶聚爆竿開偏憎楊柳難鈐轄又惹東風意緒來鷺鷥裊絲翹足傍澄瀾消盡年光佇思間若使見魚無羡意向人姿態更應間子規雨恨花愁同此寃啼時聞處正春繁千聲萬血誰哀爾爭得如花笑不言新安官舍間坐寂寞空階草亂生簟涼風動若為情不知獨坐間多少看得蜘蛛結網成除夜事關休戚已成空萬里相思一夜中愁到曉雞聲絶後又將憔悴見春風遊魚弄萍隈荇思夷猶掉尾揚鬐逐慢流應怕碧巖巖下水浮藤如線月如鈎鸚鵡色白還應及雪衣觜紅毛緑語仍竒年年鎖在金籠裏何似隴山間處飛偶題二首近來靈鵲語何踈獨憑欄干恨有殊一夜緑荷霜剪破賺他秋雨不成珠水邊箕踞靜書空欲解愁腸酒不濃可惜青天好雷雹只能驅趂懶蛟龍惜花東風漸急夕陽斜一樹夭桃數日花為惜紅芳今夜裏不知和月落誰家洞庭隱髙卧洞庭三十春芰荷香裏獨垂綸莫嫌無事間銷日有事始憐無事人古劒池秋水蓮花三四枝我來慷慨步遲遲不決浮雲斬邪佞直成龍去欲何為上興元嚴僕射歐陽詹推車閫外主恩新今日梁州草遍春玉色據鞍雙節下揚兵百萬路無塵送張中丞心誦隂符口不言風驅千騎出轅門孫吳去後無長䇿誰敵留侯直下孫覩亡友題詩處舊友親題壁上詩傷看緣迹不緣詞門前猶是長安道無復回車下筆時題秦嶺南下斯須隔帝鄊北行一步掩南方悠悠煙景兩邊意蜀客秦人各斷腸石臼嶺寄嚴僕射鳥企蛇盤地半天下窺千仭到浮煙因髙回望沾恩處認得梁州落日邊經駱谷見野果有閩中懸壺子呈洪孺卿洪亦閩人青苞朱實忽離離􅎥得盈筐淚更垂上德同之豈無意故園山路一枝枝韋晤宅聽歌服製虹霓鬢似雲蕭郎屋裏上清人等間逐酒傾杯樂飛盡虹梁一夜塵聞嘉陵越鳥聲呈林藴正是閩中越鳥聲幾回留聽暗沾纓傷心激念君深淺共有離鄉萬里情送聞上人遊嵩山二室峯峯昔願遊從雲從鶴思悠悠丹梯石路君先去為上青冥最上頭題僧房草席蒲團不掃塵松間石上似無人羣隂欲午鐘聲動自煮溪蔬養幻身山中老僧笑向來人話古時繩牀竹杖自扶持秋深頭冷不能剃白黑蒼然髮到眉贈魯山李明府外户通宵不閉關抱孫弄子萬家間若將邑號稱賢宰又是皇唐李魯山泉州赴上都留别舍弟及故人天長地闊多岐路身即飛蓬共水萍匹馬將驅豈容易弟兄親故滿離亭送張驃騎寶馬雕弓金僕姑龍驤虎視出皇都揚鞭莫怪輕邊外曽在漁陽敵萬夫題梨嶺南北風煙即異方連峯危棧倚蒼蒼哀猿咽水偏高處誰不沾衣望故鄉秋夜寄僧尚被浮名誘此身今時誰與德為鄰遙知是夜檀溪上月照千峯為一人觀送葬何事悲酸淚滿巾浮生共是北邙塵他時不見北山路死者還曽哭送人宿建溪􅀢􅀢一席眠還坐蛙噪螢飛夜未央僮僕舟人空寂寂隔簾微月入中倉題王明府郊亭日日郊亭啓竹扉論桑勸穡是常機山城要得牛羊下方與農人分背歸塞上行聞説戈兵欲利秋昨來投筆到營州驍雄已許將軍用邊塞無勞天子憂題别業千山江上背斜暉一徑中峯見所歸不信扁舟回在晚宿雲先已到柴扉廣陵登髙懷邵二簪茰泛菊俯平阡飲過三杯却惘然十嵗此辰同醉友登髙各處已三年題延平劒潭想象精靈欲見難通津一去水漫漫空餘昔日凌霜色長與澄潭生晝寒晚泊漳州回峯疊嶂繞庭隅散點煙霜勝畫圖日暮華軒卷長箔太清雲上對蓬壷贈嚴兵馬使為鴈為鴻弟與兄如雕如鶚傑連英天旋地轉煙雲黑共鼓長風六合清除夜侍酒呈諸兄示舍弟莫歎明朝又一春相看堪共貴兹身悠悠寰宇同今夜膝下傳杯有幾人春日思歸王翰楊柳青青杏發花年光誤客轉思家不知湖上菱歌語幾箇春舟在若耶涼州詞二首蒲萄美酒夜光杯欲飲琵琶馬上催醉卧沙場君莫笑古來征戰幾人回秦中花鳥已應闌塞外風沙猶自寒夜聽胡笳折楊柳教人氣盡憶長安馬嵬二百年來事逺聞從龍唯解盡如雲張均兄弟今何在却是楊妃死報君初夏戲題長養薰風拂曉吹漸開荷芰落薔薇青蟲也學莊周夢化作南園蛺蝶飛路傍草楚甸秦原萬里平誰教根向路傍生輕蹄繡轂長相踏合是榮時不得榮蝴蝶三首不並難飛繭裏蛾有花芳處即經過天風相送輕飄去却笑蜘蛛漫織羅苒苒雙雙拂畫欄佳人欲繡再三看莫欺翼短飛長近試就花間捉也難栩栩無因繫得他野園荒徑一何多不聞絲竹誰教舞應伏流鶯為唱歌李夫人二首不望金輿到錦帷人間樂極即須悲若言要識愁中貌也似君恩日日衰招得香魂爵少翁九華燈燭曉還空漢皇不及吳王樂且與西施死處同答黃校書來韻慈恩鴈塔參差榜杏苑鶯花次第遊白日有愁猶可散青山髙卧況無愁無題買骨須求騏驥骨愛毛宜採鳯凰毛駑駘燕雀堪何用仍向人前價數髙宿齊山僧舍張喬一宿經忩望白波曉隨山月出煙蘿若言不得南宗要長在禪牀事更多笛剪雨裁煙一節秋落梅楊柳曲中愁尊前暫借殷勤看明月曽聞向隴頭長安贈猿挂月棲雲向楚林取來全是為清音誰知繫在黃金鎖翻畏侯家不敢吟漁者首戴圓荷髮不梳葉舟為宅水為居沙頭聚首人如市釣得澄江一丈魚宿潺湲亭走月流煙疊樹西聽來愁甚聽猿啼幾時御水聲邊住却夢潺湲宿此溪臺城宫殿餘基長草花景陽宫樹噪村鴉雲屯雉堞依然在空繞漁樵四五家寄山僧二首大道本來無所染白雲那得有心期逺公獨刻蓮花漏猶向青山禮六時間倚蒲團向日眠不能歸老嶽雲邊舊時僧侣無人在唯有長松見少年題上元許棠所任王昌齡廳琉璃堂裏當時客久絶吟聲繼後塵百四十年庭樹老如今重得見詩人自誚每到花時恨道窮一生光景半成空只應抱璞非良玉豈得年年不至公贈河南詩友山東令族玉無塵裁剪煙花筆下春不把瑶華借風月洛陽才子更何人寄惟揚故人離别河邊綰柳條千山萬水玉人遙月明記得相尋處城鎖東風十五橋孤雲舒卷因風何所之碧天孤影勢遲遲莫言長是無心物還有隨龍作雨時詠棋子贈奕僧黑白誰能用入玄千回生死體方圓空門説得恆沙劫應笑終年為一先谷口作巴客青冥過嶺塵雪崖交映一川春晴明採藥尋源去必恐雲深見異人寄弟故里行人戰後踈青崖萍寄白雲居那堪又是傷春日把得長安落第書春日有懷髙下尋花春景遲汾陽臺榭白雲詩看山懷古翻惆悵未勝遙傳不到時宿洛都門山川馬上度邊禽一宿都門永夜吟客路不歸秋又晚西風吹落洛陽砧鷺絲障子翦得機中如雪素畫為江上帶絲禽間來相對茅堂下引出煙波萬里心促織念爾無機自有情迎寒辛苦弄梭聲椒房金屋何曽識偏向貧家壁下鳴宴邊將一曲涼州今不清邊風蕭颯動江城坐中有老沙場客橫笛休吹塞上聲閿鄉卜居吳融六載抽毫侍禁闈不堪多病決然歸五陵年少如相問阿對泉頭一布衣水調鑿河千里走黃沙浮殿西來動日華可道新聲是亡國且貪惆悵後庭花野廟古原荒廟掩莓苔何處喧喧鼓笛來日暮鳥鳴人散盡野風吹起紙錢灰小徑礙竹妨花一徑幽攀緣應對玉峯頭若教須似康莊好便有髙車駟馬憂楚事悲秋應亦抵傷春屈宋當年並楚臣何事從來好時節只將惆悵付詞人華清宫三首中原無鹿海無波鳯輦鸞旗出幸多今日故宫歸寂寞太平功業在山河四郊飛雪暗雲端唯此宫中落旋乾緑樹碧簷相掩映無人知道外邊寒漁陽烽火照函關玉輦匆匆下此山一曲羽衣聽不盡至今遺恨水潺潺上巳日本學多情劉武威尋花傍水看春輝無端遇著傷心事贏得淒涼索漠歸嘲妓崔涯布袍披襖火燒氊紙補箜篌麻接絃更著一雙皮屐子紇梯紇榻出門前嘲李湍湍黃昏不語不知行鼻似煙窗耳似鐺獨把象牙梳插鬢崑崙山上月初生重贈覔得黃騮鞁繡鞍善和坊裏取湍湍揚州近日渾成差一朵能行白牡丹雜嘲二首二年不到宋家東阿母深居僻巷中含淚向人羞不語琵琶絃斷倚屏風日暮迎來香閣中百年心事一宵同寒雞鼓翼紗窗外已覺恩情逐曉風悼妓赤板橋西小竹籬槿花還似去年時淡黃衫子渾無色腸斷丁香畫雀兒别妻隴上流泉隴下分斷腸嗚咽不堪聞姮娥一入月宫去巫峽千秋空白雲竹枝二首孫光憲門前春水白蘋花岸上無人小艇斜商女經過江欲暮散拋殘食飼神鴉亂繩千結絆人深越羅萬丈表長尋楊柳在身垂意緒藕花落盡見蓮心楊柳枝四首閶門風暖落花乾飛遍江城雪不寒獨有晚來臨水驛間人多憑赤欄干有池有榭即濛濛浸潤翻成長養功恰似有人長點檢著行排立向春風根柢雖然傍濁河無妨終日近笙歌毶毶金帶誰堪比還共黃鶯不較多萬株枯稿怨亡隋似弔吳臺各自垂好是淮隂明月裏酒樓橫笛不勝吹萬首唐人絶句卷四十九
