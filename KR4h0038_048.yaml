body:
  text: 萬首唐人絶句卷四十八宋洪邁編七言游嘉州後溪薛能山屐經過滿徑蹤隔溪遙見夕陽舂當時諸葛成何事只合終身作卧龍自諷千題萬詠過三旬忘食貪魔作瘦人行處便吟君莫笑就中詩病不任春監郡犍為將歸使府登樓寓題幾日監臨向蜀春錯拋歌酒强憂人江樓一望西歸去不負嘉州只負身過象耳山二首一色青松幾萬栽異香薰路帶花開山門欲别心潜願更到蜀中還到來到處逢山便欲登自疑身作住來僧徒行至此三千里不是有緣應不能聖燈莾莾空中稍稍燈坐看迷濁變清澄須知火盡煙無益一夜欄邊說向僧過昌利觀萬仞雲峯八石泉李君仙後更誰仙我來駐馬人何問老柏無多不種田蜀路劒閣緣雲拂斗魁疾風生樹過龍媒前程憩罷知無益但是駑蹄亦到來山下偶作零雨霑山百草香樹梢山頂盡斜陽橫流巨石皆堪住何事無僧有石房伏牛山虎蹲峯狀屈名牛落日連村好望秋不為時危耕不得一犂風雨便歸休老圃堂邵平瓜地接吾廬榖雨乾時偶自鋤昨日春風欺不在就牀吹落讀殘書春題柳莫搖搖花莫開此心因病亦成灰人生只有家園樂及取春農歸去來并州寓懷人多知遇獨難求人負知音獨愛酬常恐此心無樂處枉稱年少在并州中秋旅舍雲卷庭虛月逗空一方秋草盡鳴蟲是時兄弟正南北黃葉滿階來去風符亭二首以飛瀑結茅雖小甚勝符亭之地雅離羣萬古懸泉一旦新若念農桑也如此縣人應得似行人山如巫峽煙雲好路似嘉祥水木清大抵游人總應愛就中難說是詩情秋夜聽琴十指宫商膝上秋七條絲動雨翛翛空堂半夜孤燈冷彈著鄉心欲白頭留别關東舊遊我去君留十載中未曽相見及花紅他時住得君應老長短看花心不同贈出塞客出郊征騎逐飛埃此别未愁春未回寒葉夕陽投宿意蘆關門向逺河開秋溪獨坐黃葉分飛砧上下白雲零落馬東西人生萬意此端坐日暮水聲流出溪蒲中霽後晚望河邊霽色無人見身帶春風立岸頭濁水茫茫有何意日斜還向古蒲州宋氏林亭地濕莎青雨後天桃花紅近竹林邊行人本是農桑客記得春深欲種田雲花寺寓居贈海岸上暫寄空門未是歸上方林榭獨儒衣吾師不語應相怪頻惹街塵入寺飛關中秋夕簟濕秋庭嶽在煙露光明滑竹蒼然何人意緒還相似鶴宿松枝月半天西縣道中短亭二首風涼津濕共微微隔岸泉衝石竅飛爭得巨靈從野性舊鄉無此擘將歸一瀑三峯赤日天路人才見便翛然誰能夜向山根宿涼月初生的有仙省試夜白蓮千朵照廊明一片承平雅頌聲更報第三條燭盡文昌風景畫難成過驪山丹雘蒼蒼蔟背山路塵應滿舊簾間𤣥宗不是偏行樂只為當時四海閒曲江醉題閒身行止屬年華馬上懷中盡落花狂遍曲江還醉卧覺來人靜日西斜參軍㕔新池簾外無塵勝物外墻根有竹似山根流泉不至客來久坐見新池落舊痕太原使院晚出青門無路入清朝濫作將軍最下僚同舍盡歸身獨在晚風開印葉蕭蕭寒食日曲江曲水池邊青草岸春風林下落花杯都門此日是寒食人去看多身獨來盩厔官舍新竹心覺清涼體似吹滿風輕撼葉垂垂無端種在幽閒地衆鳥嫌寒鳯未知京中客舍聞箏十二三絃共五音每聲如截逺人心當時向秀聞鄰笛不是離家嵗月深銅雀臺魏帝當時銅雀臺黃花深映棘叢開人生富貴須回首此地豈無歌舞來壽安水館地接山林兼有石天懸星月更無雲驚鷗上樹滿池水瀺灂一聲中夜聞雨後早發永寧春霖朝罷客西東馬足泥聲路未通獨愛十峯最髙處一峯初日白雲中宿仙遊寺望月生峯公門身入洞門行出穽離籠似有情僧語夜涼雲樹黑月生峯上月初生秋題獨坐東南見曉星白雲微透泬寥清磷磷秋石堪僧坐一葉梧桐落半庭和友人寄懷從來行樂近來希蘧瑗知言與我違自是衰心不如舊非關四十九年非子夜嫖姚家宴敵吳王子夜歌聲滿畫堂此日相逢眉翠盡女真行李乞齊糧鴈肅肅雍雍義有餘九天鸞鳯莫相踈唯應靜向山窗過激發英雄夜讀書和府帥相公竹映髙墻似傍山鄒陽歸後令威還君看將相才多少兩首詩成七步間又和留山雞五色文勝百鳥王相思兼絶寄藝香由來不是池中物雞樹歸時即取將舟中酬楊中丞春早見寄錦樓春望憶丹楹更遇髙情說早鶯江上境寒吟不得濕風梅雨滿船輕寒食日題美人寒食事春風折盡青青賞盡紅夜半無燈還有睡鞦韆懸在月明中杏花活色生香第一流手中移得近青樓誰知豔性終相負亂向春風笑不休黃蜀葵嬌黃新嫩欲題詩盡日含毫有所思記得玉人初病起道家裝束厭禳時春詠春來還似去年時手把花枝唱竹枝狂瘦未曽餐有味不緣中酒却緣詩贈歡娘七嵗善吹笙一束龍吟細竹枝青娥擎在手中吹當初縱使雙成在不得如伊是小時戲瞻相失意蹉跎到舊遊見吹楊柳便遮羞瞻相趙女休相拽不及人前詐擺頭贈解詩歌人同有詩情自合親不須歌調更含嚬朝天御史非韓夀莫竊香來帶纍人贈韋氏歌人二首絃管聲凝發唱髙幾人心地暗傷刀思量更有何堪比王母新開一樹桃一曲新聲慘畫堂可能心事憶周郎朝來為客頻開口綻盡桃花幾許香加階二年中散似嵇康此日無功换寵光唯有一般酬聖主勝於東晉是文章野園野園無鼓又無旗鞍馬傳杯用柳枝嬌養翠娥無怕懼插人頭上任風吹郊亭郊亭宴罷欲回車滿郭傳呼調角初尚擁笙歌歸未得笑娥扶著醉尚書老僧清瘦形容八十餘瓠懸籬落似村居勸師莫羡人閒有幸是元無免破除僧窗不悟時機滯有餘近來為事更乖踈朱輪皂蓋蹉跎盡猶愛明窗好讀書題平等院十里城中一院僧各持巾鉢事南能還應笑我功名客未解嫌官學大乘影燈夜二首偃王燈塔古徐州二十年來樂事休此日將軍心似海四更身領萬人遊十萬軍城百萬燈酥油香暖夜如蒸紅䊋滿地煙光好只恐笙歌引上升許州旌節到作兩地旌旗擁一身半緣傷舊半榮新州人若憶將軍面寫取雕堂報國真重遊通波亭十年拋擲故園花最憶紅桃竹外斜此日郊亭心乍喜敗榆芳草似還家戲舸逺舸衝開一路萍岸傍偷上小茅亭遊人莫覔杯盤分此地才應聚德星偶題到處吟兼上馬吟總無愁恨自傷心無端夢得鈞天樂盡覺宫商不是音折楊柳十首華清髙樹出離宫南陌柔條帶暖風誰見輕隂是良夜瀑泉聲畔月明中洛橋晴影覆江船羌笛秋聲濕塞煙閒想習池公宴罷水蒲風絮夕陽天嫩緑輕懸似綴旒路人遙見隔宫樓誰能更近丹墀種解播皇風入九州暖風晴日斷浮埃廢路新條發鈞臺處處輕隂可惆悵後人攀處古人栽潭上江邊嫋嫋垂日髙風靜絮相隨青樓一樹無人見正是女郎眠覺時汴水髙懸百萬條風清兩岸一時搖隋家力盡虛栽得無限春風屬聖朝和風烟樹九重城夾路春隂十萬營唯向邊頭不堪望一株憔悴少人行忩外齊垂旭日初樓邊輕暖好風徐游人莫道栽無益桃李清隂却不如衆木猶寒獨早青御溝橋畔曲江亭陶家舊日應如此一院青條緑繞㕔帳偃纓垂細復繁令人心想䂖家園風條月影皆堪重何事侯門愛樹萱柳枝四首數首新詩帶恨成柳絲牽我我傷情柔娥幸有腰支穩試踏吹聲作唱聲髙出軍營逺映橋賊兵曽斫火曽燒風流性在終難改依舊春來萬萬條縣依陶令想嫌迂營伴將軍即大粗此日與君除萬恨數篇風調更應無狂似纎腰嫩勝綿自多情態竟誰憐遊人不折還堪恨拋向橋邊與路邊柳枝詞五首朝陽晴照緑楊煙一别通波十七年應有舊枝無處覔萬株風裏卓旌旃晴垂芳態吐牙新雨擺輕條濕面春别有出墻髙數尺不知搖動是何人暖梳簮朵事登樓因挂垂楊立地愁牽斷緑絲攀不及半空懸著玉搔頭西園髙樹後庭根處處尋芳有折痕終憶舊游桃葉舍一珠斜映竹籬門劉白蘇臺總近時當初章句是誰推纎腰舞盡春楊柳未有農家一首詩吳姬十首夜鎖重門晝亦監眼波嬌利瘦巖巖偏憐不怕傍人笑自把春羅等舞衫龍麝薰多骨亦香因經寒食好風光何人畫得天生態枕破施朱隔宿䊋滳滳春霖透荔枝筆題箋動手中垂天隂不得君王召嚬著青蛾作小詩鈿合重盛繡結深昭陽初幸賜同心君知一夜恩多少明日宣教放德音退紅香汗濕輕紗髙捲蚊厨獨卧斜嬌淚半垂珠不破恨君瞋折後庭花取次衣裳盡帶珠别添龍腦裛羅𥜗年來寄與鄉中伴殺盡春蠶稅亦無畫燭燒蘭暖復迷殿帷深密下銀泥開門欲作侵晨散已是明朝日向西樓臺重疊滿天雲殷殷鳴鼉世上聞此日楊花初似雪女兒絃管弄參軍冠剪黃綃帔紫羅薄施鉛粉畫青娥因將素手誇纎巧從此椒房寵更多身是三千第一名內家叢裏獨分明芙蓉殿上中元日水拍銀臺弄化生題于公花園含桃莊主後園深繁實初成靜掃隂若使明年花可待應須惱破事花心登城偶作閒身上古城路人遙望不相驚無端將使逡巡至又作都頭一隊行好客好客連宵在醉鄉蠟煙紅暖勝春光誰人肯信山僧語寒雨唯煎治氣湯贈普恭禪師一日迢迢每一餐我心難伏我無難南簷十月繩牀暖背卷真經向日看贈無表禪師笠戴圓隂楚地棕磬敲清響蜀山銅秋來說偈寅朝殿爽爽楊枝滿手風萬首唐人絶句卷四十八
