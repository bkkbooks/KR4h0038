body:
  text: 萬首唐人絶句卷二十一宋洪邁編七言原缺萬首唐人絶句卷二十一欽定四庫全書萬首唐人絶句卷二十一宋洪邁編五言樂府詞二十二首長命女雲送關西雨風傳渭北秋孤燈然客夢寒杵搗鄉愁一片子桞色青山映梨花雪鳥藏緑窗桃李下閒坐歎春芳甘州欲使傳消息空書意不任寄君明月鏡偏照故人心濮陽女雁來書不至月照獨眠房賤妾多愁思不堪秋夜長山鷓鴣二首玉關征戍久空閨人獨愁寒露濕青苔别來蓬鬢秋人坐青樓晚鶯語百花時愁多人自老腸斷君不知浣紗女二首南陌春風早東鄰去日斜千花開瑞錦香撲美人車長樂青門外宜春小苑東樓開萬户上人向百花中戎渾風徑角弓鳴將軍獵渭城草枯鷹眼疾雪盡馬蹄輕墻頭花蟋蟀鳴洞房梧桐落金井為君裁舞衣天寒剪刀冷楊下采桑飛絲惹緑塵軟葉對孤輪今朝入園去物色強看人胡渭川楊桞千尋色桃花一苑芳風吹入簾裏唯有惹衣香金殿樂入夜秋砧動千門起四鄰不緣樓上月應為隴頭人思歸樂晚日催絃管春風入綺羅杏花如有意偏落舞衫多穆護砂玉管朝朝弄清歌日日新折花當驛路寄與隴頭人崑崙子揚子談經去淮王載酒歌醉來啼鳥換坐久落花多涼州歌開篋淚霑襦見君前日書夜臺空寂寞猶是紫雲車祓禊曲二首昨見春條緑那知秋葉黃蟬聲猶未斷寒雁已成行何處堪愁思花開長樂宫君王不重客泣淚向春風大酺樂淚滴珠難盡容殘玉易銷倘隨明月去莫道夢魂遙長干曲逆浪故相邀菱舟不怕搖妾家楊子住便弄廣陵潮于闐采花山川雖異所草木尚同春亦如溱洧地自有采花人蜀門與林藴分路歐陽詹村步如延壽川原似福平無人相共識獨自故鄉情讀周太公傳論兵去商虐講德興周道屠沽未遇時豈異兹川老秋燈王建向壁暖悠悠對幃寒寂寂斜照碧山圓松間一片石水精映色水不别向光月還度傾在荷葉中有人看是露香印閒坐燒香印滿房松柏氣火盡轉分明青苔碑上字落葉陳緑向參差初紅已重疊中庭新掃地繞池三兩葉園果雨中梨果病每樹無數箇小兒出入看一半鳥啄破野菊晚艷出荒籬冷香著秋水憶向山中見伴蟲石壁裏荒園朝日滿園霜牛衝籬落壞掃掠黃葉中時時一窠薤晚蝶粉翅嫩如水繞砌乍依風日高霜露解飛入菊花中小松小松初數尺未有直生枝閒即傍邊立看多長却遲戲酬盧袐書藝香閣裏人採摘御園春取此和仙藥猶治老病身别自栽小樹去年今日栽臨去見花開好住守空院夜間人不來奉和元日賜羣臣柏葉趙彥昭器乏雕梁器材非造厦材但將千歲葉常奉萬年杯同前李乂徑節凌霜徑芳心待歲芳能令益人壽非止麝全香同前武平一緑葉迎春緑寒枝歷歲寒願持柏葉壽長奉萬年歡酬崔法曹遺劒戴叔倫臨風脫佩劒相勸靜烟塵自料無䈥力何由答故人敬報孫常州二首衰病苦奔走未嘗追舊遊何言問憔悴此日駐方舟逺道曵故屐餘春㑹高齊因言别離久得盡平生懷將赴東陽留上包諫議敝邑連山逺仙舟數刻同多慚屢回首前路在泥中答崔法曹後會知不逺今歡亦願留江天梅雨散況在月中樓問嚴居士易自公來問易不復待加年更有垂簾㑹遙知續草𤣥新年第二夜答處上人宿玉芝觀見寄陽春已三日㑹友聞昨夜可愛剡溪僧獨尋陶景舍赴撫州對酬崔法曹曉燈離暗室五首雨落濕孤客心驚比棲鳥空階夜滴繁相亂應到曉高會棗樹宅清言蓮社僧兩鄉同夜雨旅館又無燈離字一首見第九卷離室雨初晦客程雲斗暗方為對吏人敢望郵童探縱酒常擲盞狂歌時入室離羣怨雨聲幽抑方成疾又酬夜雨滴空階五首知疑奸叟謗閒與情人話猶是别時燈不眠同此夜寒燈揚曉熖重屋驚春雨應想逺行人路逄泥濘阻燈光照虛屋雨影懸空壁一向簷下聲逺來愁處滴楚僧話寂滅俗慮比虛空賴有殘燈喻相傳昏暗中雨聲亂燈影明滅在空階併枉五言贈知同萬里懷同賦龍沙墅回轉沙岸近欹斜林䫈重因君訪遺跡此日見真龍九月十日李白昨日登高罷今朝更舉觴菊花何太若遭得兩重陽夜集聨句顔真卿寒花護月色墜葉占風音兹夕無塵慮高雲共片心題慈恩塔荆叔漢國河山在秦陵草樹深暮雲千里色無處不傷心幽州元日張說今歲元日樂不謝去年春知向來心道誰為昨夜人三月閨怨三月時將盡空房妾獨居蛾眉愁自結鬢髮沒情梳立秋劉言史兹晨戒流火商飈早已驚雲天收夏色木葉動秋聲夏至日作權德輿璿樞無停運四序相錯行寄言赫曦景今日一隂生剪綵花雍裕之敢競桃李色自呈刀尺功蝶猶迷剪翠人豈辨裁紅三月晦日送客野酌亂無巡送君兼送春明年春色至莫作未歸人聽琴王𤣥拂塵開按匣何事獨顰眉古調俗不樂正聲君自知對雨送人崔署别愁復兼雨别淚還如霰寄心海上雲千里長相見贈李中華梁鍠莫向嵩山去神仙多誤人不如朝魏闕天子重賢臣晦日送窮三首姚合年年到此日瀝酒拜街中萬戶千門看無人不送窮送窮窮不去相泥欲何為今日官家宅淹留又幾時古人皆恨别此别恨銷魂只是空相送年年不出門醉吟三首洪崖先生張藴去歲無田種今春乏酒材從他花鳥笑佯醉卧樓臺下調無人采高心又被瞋不知時俗意教我若為人入市非求利過朝不為名有時隨俗物相伴且營營閠月七日王灣耿耿曉河微神仙此會稀今年七月閏應得兩回歸九日王勃九日重陽節開門有菊花不知來送酒若箇是陶家嘲三月十八日雪溫庭筠三月雪連夜未應傷物華只緣春欲盡留著伴梨花寒食日戲贈李侍御盧延讓十二街如市紅塵咽不開灑蹄驄馬汗沒處看花來公子家種花滿西園花發青樓道花下一禾生去之為惡草田家二首後一首李紳亦有父耕原上田子斸山下荒六月禾未秀官家已修倉鋤田當日午汗滴禾下土誰念盤中餐粒粒皆辛苦戲題莆田受杖染人壁桞逄紫緑終朝染因何不識非莆田竹木貴背負十柴歸重陽日陪元魯山登北城留别蕭頴士山縣繞古堞悠悠快登望雨餘秋天高目盡無隱狀綿連滍川逈杳眇鴉路深彭澤興不淺臨風動歸心賴兹鳴琴暇傲睨傾菊酒人和歲已登從政復何有逺山十里竝一道銜長雲青霞半落日混合疑晴曛漸聞驚栖羽坐歎清夜月中歡愴有違行子念明發僅能泯寵辱未免傷别離江湖不可忘風雨勞相思明時當盛才短伎安所設何日謝百里從君漢之澨九日進茱茰山五首徐行先家居洛城下舉目見嵩山刻作茱茰節情生造化間黃花宜泛酒青嶽好登高稽首明庭內心為天下勞菊酒携山客茱茰繫牧童路疑尋大塊人似問鴻濛九日重陽數三秋萬寶成時來謁軒后罷去坐蓬瀛晚節歡重九高山上五千醉中知偶聖夢裏見尋仙江令於長安歸揚州九日賦許敬宗心逐南雲逝形隨北鴈來故鄉籬下菊今日幾花開擬江令本逐征鴻去還隨落葉來菊花應未滿請待詩人開同前擬遊人倦蓬轉鄉思逐鴻來偏想臨潭菊芳蘂對誰開寄融上人皎然常愛西林寺池中月在時芭蕉一片葉書取寄吾師送靈徹我欲長生夢無心解傷别千里萬里心只似眼前月逺意女郎梁瓊脉脉長攄氣微微不離心叩頭從此去煩惱阿誰禁續父井梧吟薛濤庭除一古桐聳幹入雲中枝迎南北鳥葉送往來風萬首唐人絶句卷二十一
