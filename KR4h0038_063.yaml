body:
  text: 萬首唐人絶句卷六十三宋洪邁編七言東林寺寄包侍郎靈徹古殿清隂山木春池邉跂石一觀身誰能來此焚香坐共作爐峰二十人答徐廣州四問童子出家無第行隨師乞食遣稱名長沙豈敢論年幾絳老唯知甲子生答韋丹年老心間無外事麻衣草座亦終身相逢盡道休官去林下何曾見一人答胡處士皎然西山禪隱比來聞長道唯應我與君書上無名心忘却人間聚散似浮雲答張烏程莫道謫官無主人秣陵才令日相親前溪更有忘憂處荷葉田田間白蘋酬張明府愛君詩思動禪心使我休吟待鶴吟更説郡中黃霸在朝朝無事許招尋酬祁判官嵗嵗湖南隱已成如何星使忽知名沙鷗慣逐無心客今日逢君不解驚舟行懷閻士和二月湖南春草遍橫山渡口花如霰相思一日在孤舟空見歸雲兩三片寄雲門寺梵僧越山千萬雲門絶髙僧貌古還明月清朝掃石行道歸林下眠禪看松雪戲呈吳憑世人不知心是道只言道在他方妙還如瞽者望長安長安在西向東笑李中丞水亭夜集佳人且莫吹參差正憐月色生酒巵山翁取醉豈關我自愛樽前白鷺鷥夜過康録事宅會兄弟愛君門館夜來清瓊樹雙枝是弟兄月在詩家偏足思風過客位更多情酬秦系戲贈二首正論禪寂忽狂歌莫是塵心顛倒多白足行花曾不染黃囊貯酒欲如何雲林出定鳥未歸松吹時飄雨沐衣石語花悲徒自詫吾心見境盡為非題秦系麗句亭獨將詩教領諸生但愛青山不愛名滿院竹聲堪愈疾亂林花片足忘情題湖上草堂山居不買剡中山湖上千峰處處間芳草白雲留我住世人何事得相關送顧道士逰洞庭山見説洞庭無上路春遊亂踏五靈芝含桃風起花狼籍正是仙翁棊散時青陽上人院説金陵故事君説南朝全盛日秣陵才子最多人十年秋色古池館誰見齊王西邸春江上人禪居路入松聲逺更竒山光水色共參差中峰禪寂一僧在坐對梁朝老桂枝題松為愛松聲聽不足每逢松樹更忘還翛然此外更何事笑向間雲似我間送侯秀才南逰芳草隨君自有情不關山色與猿聲為看嚴子灘頭石曾憶題詩不著名送韋向之睦州謁使君才子南看多逺情間舟蕩漾任春行新安江色長如此何似新安太守清九月八日送蕭少傅歸洪州明日重陽今日歸布帆絲雨暮霏霏行過鶴渚知堪住家在龍沙意有違送皇甫曾侍御維舟若許暫從容送過重江不厭重霜簡别來今始見雪山歸去又難逢聽胡笳送人一奏胡笳客未停野僧還欲廢禪聽難將此意臨江别無限春風葭菼青江上送梁拾遺江上荻花飛雪花風吹撩亂滿袈裟如今嵗晏無芳草獨對離樽作物華送僧逰宣城楚山千里一僧行念爾初緣道未成莫向舒姑泉口泊此時嗚咽易傷情送履上人還金陵攜錫西山步緑莎禪心未了奈情何湘宫水寺清秋夜月落風悲松柏多送聰上人還廣陵莫學休公學逺公了心還與我心同隋家古桞數株在看取人間萬事空送洞庭維諒上人白雲關我不關他此物留君情最多憶著春風生橘樹歸心不怕洞庭波送太祝姪之虔吉訪兄阮咸别曲四座愁賴是春風不是秋漫漫江帆訪兄弟猿聲幾夜宿蘆洲冬夜送人平明走馬上村橋花落梅溪雪未消日短天寒愁送客楚山無限路迢迢送嚴上人初到人間栁始隂山書昨夜報春深朝朝花落幾株樹惱殺禪翁未證心送僧之揚州平明環錫向風輕正及隋堤栁色行知爾禪心還似我故宫春草肯傷情送李繹斜日悠揚在栁絲孤亭寂寂水逶迤誰堪别後行人盡唯有春風起路岐送僧之京師綿綿眇眇楚雲繁萬里西歸望國門禪子初心易悽斷秋風莫上少陵原送許丞還洛陽剡茗情來亦好斟空門一别肯沾襟悲風不動罷瑶軫忘却洛陽歸客心送别聞説情人怨别情霜天淅瀝在寒城長宵漫漫角聲發禪子無心恨亦生送裴參軍還下邳舊居北望煙霄驃騎營邊烽無火楚天清此時千里思歸客泗上春風得返耕送僧歸富陽悠悠渺渺涉寒波故寺思歸意若何長憶孤舟三二月春山偏賞富陽多送僧歸洞庭從來湖上勝人間逺愛浮雲獨自還孤月空天見心地寥寥三境水中山送商季臯比來知爾有詩名莫恨東歸學未成新豐有酒為我飲消取故園傷别情送邢台州海上名山屬使君石橋琪樹古來聞他時畫出白團扇乞取天台一片雲送柳蔡省叔東城南陌強經過怨别無心亦放歌明日阮公應問我間雲長在石門多赤松澗緑岸朦朧出見天晴沙厯厯水濺濺何處羽人長洗藥殘花無數逐流泉晚秋破山寺秋風落葉滿空山古寺殘燈石壁間昔日經行人去盡寒雲夜夜自飛還釋裴修春愁蝶舞鶯歌喜嵗芳桞絲裊裊蕙蘭香江南春色共君看何事君心獨自傷長安少年行翠樓春酒蝦蟆陵長安少年皆共矜紛紛半醉緑槐道躞蹀花驄驕不勝春夜集陸處士居欲賞芳菲不待晨無情人訪有情人西林豈是無清景祇為忘情不記春王昭君自倚嬋娟望主恩誰知美惡忽相翻黃金不買漢宫貌青冢空埋秦地魂銅雀妓強開尊酒向陵看憶得君王舊日歡不覺餘歌悲自斷非關艷曲轉聲難長門怨春風日日閉長門搖蕩春心似夢魂若遣花開只笑妾不如桃李自無言投知己若為令憶洞庭春上有間雲可隱身無限白雲山要買不知山價出何人塞下曲二首寒塞無因見落梅被人吹入笛聲哀勞勞亭上春應度夜夜城南戰未回都護今年破武威煙沙萬里鳥空飛旌竿瀚海掃雲出氊騎天山踏雪歸送蜀僧清塞萬里獨行無弟子唯賫笻竹與檀龕看經更向吳中老應是山川似劔南送僧歸南嶽二首草屨初登南客船銅瓶猶貯北山泉衡陽舊寺秋歸去門鎖寒潭幾樹蟬衡陽一别十三春行腳同來有幾人老大却思歸故里當時未漆祖師身過僧竹院一生愛竹自未有每到此房歸不能髙人留宿話禪後寂寞雨堂空曉燈宿劉員外林亭獨樹倚亭新月入城墻裏面鎖山多去年今夜還留宿坐見西風裊燕窠憶潯陽舊居兼感長孫郎中潯陽却到知何日此地今無舊使君長憶窮冬宿廬嶽瀑泉氷折共僧聞雨後欲尋天目山靈一昨夜雲生天井東春山一雨幾回風林花併逐溪流下欲上龍池通不通看金陵圖齊已六朝圖畫戰爭多最是陳宫計數訛若愛蒼生似歌舞隋皇自合恥干戈寄南嶽秦禪師江頭默想坐禪峰白石山前萬丈空山下獵人應不到雪深花鹿在菴中片雲水底分明天上雲可憐形影似吾身何妨舒作從龍勢一雨吹消萬里塵寄清溪道者萬重千疊紅霞嶂夜燭朝香白石龕常寄溪窗憑危檻看經影落古龍潭送胎髮筆寄仁公內唯胎髮外秋毫緑玉新裁管束牢老病手疼無那爾却資年少寫風騷偶作寄王祕書七絲湘水秋深夜五字河橋日暮時借問祕書郎此意靜彈髙詠有誰知謝惠紙烘焙幾工成曉雪輕明百幅疊春氷何消才子題詩外分與能書貝葉僧答文勝大師才把文章干聖主便承恩澤换禪衣應嫌六祖空傳衲只向曹溪永息機寄懷文英大師著紫袈裟名已貴吟紅菡蓞價兼髙秋風曾憶相留處門對平湖滿白濤懷道林四絶堂前萬木秋碧參差影壓湘流間思宋杜題詩板一上憑欄到夜休辭主人四首放鶴華亭又復去芝田丹頂霜毛性可憐縱與乘軒終誤主不如還放却遼天放猿堪憶春雲十二峰野桃山杏摘香紅王孫可念愁金鎖縱放斷腸明月中放鷺鷥白蘋紅蓼碧江涯日暖雙雙立睡時願揭金籠放歸去却隨沙鶴鬬輕絲放鸚鵡隴西蒼巘結巢髙本為無人識翠毛今日籠中強言語乞歸天外啄含桃城中懷山友春城來往桃李碧暖艷紅香斷消息吾徒自有山中鄰白晝冥心坐嵐壁送人往長沙荆門歸路指湖南千里風帆興可諳好聽鷓鴣啼雨處木蘭舟晚泊春潭偶題時事懶言多忌諱野吟無主苦縱橫君看三百篇章首何處分明著姓名贈琴客曾携五老峰前過幾向雙松石上彈此境此聲誰更愛掀天羯鼓滿長安勉吟僧萬途萬轍亂真源白晝勞形夜斷魂忍著袈裟把名紙學他低折五侯門夏日城中作二首三面僧鄰一面墻更無風路可吹涼他年捨此歸何處青壁紅霞裹石房竹低莎淺雨濛濛小檻幽忩暑月中有境牽懷人不會東林門外翠橫空默坐燈引飛蛾拂熖迷露淋棲鶴壓枝低𡨕心坐睡蒲團穩夢到天台過剡溪水邉行身著袈裟手杖藤水邉行止不妨僧禽棲日落猶孤立隔浪秋山千萬層翡翠水邉飛去青難辨竹裏歸來色一般磨吻鷹鸇莫相害白鷗鴻鶴滿沙灘送藏休上人二首事遂鼎湖遺劔履時來渭水擲魚竿欲知賢聖存亡道自向心機反覆看一枝霜雪未霑頭爭遣藏休肯便休學盡世間難學事始堪隨處任虛舟幽齋幽院才容箇小庭疏篁低短不堪情春來猶賴鄰僧樹時引流鶯送好聲贈念法華經僧萬境心隨一念平紅芙蓉坼愛河清治經功力能如是任駕白牛安穩行對菊無艷無妖别有香栽多不為待重陽莫嫌醒眼相看過却是真心愛淡黃送惠空北逰君向峴陽逰聖境我將何事託多才丁寧墮淚碑前過寫取斯文寄我來寄懷歸州馬判官三年為倅興何長髙卧應多事少忙又見秋風霜裛樹滿山椒熟水雲香觀荷葉露珠霏微曉露成珠顆宛轉田田未有風任器方圓性終在不妨翻覆落池中苦熱中懷玉泉寺火雲如燒接蒼梧原野煙連大澤枯漫費葛衫葵扇力爭禁泉石潤肌膚折楊桞詞四首鳳樓髙映緑隂隂凝重多含雨露深莫謂一枝柔軟力幾曾牽破别離心館娃宫畔響廊前依託吳王養翠煙劔去國亡臺榭毁却隨紅樹噪秋蟬儂低似中陶潛酒軟極如傷宋玉風多謝將軍繞營種翠中間卓戰旗紅髙僧愛此遮江寺逰子傷殘露野橋爭似著行垂上苑碧桃紅杏對搖搖答長沙丁秀才書月月便車奔帝闕年年貢士過荆臺如何三度槐花落未見故人攜卷來萬首唐人絶句卷六十三
