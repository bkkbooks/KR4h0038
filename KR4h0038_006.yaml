  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0038_WYG_006-1a, image: WYG1349/WYG1349-0081a.png}
body:
  text: 萬首唐人絶句巻六宋洪邁編七言酬海南馬大夫劉禹錫新辭將印拂朝纓臨水登山四體輕猶念天涯未歸客瘴雲深處守孤燈寄贈小樊花面了頭十三四春來綽約向人時終須買取名春草處處相將步步隨酬樂天自問親友闗心皆不見風光滿眼獨傷神洛陽城裏多池館處處花開有主人和令狐相公别牡丹平章宅裏一闌花臨到開時不在家莫道兩京非逺别春明門外即天涯贈劉景擢第湘中才子是劉郎望在長沙住桂陽昨日鴻都新上第五陵年少讓清光和令狐相公聞思帝鄉有感當初造曲者為誰説得思鄉戀闕時滄海西頭舊丞相停盃處分不須吹酬令狐見寄羣玉山頭住四年每聞笙鶴看諸仙何時得把浮丘袖白日將升第九天酬令狐春意一紙書封四句詩芳辰對酒逺相思長吟盡日西南望猶及殘春花落時城内花園值春霜一夕萎謝樓下芳園最占春年年結伴采花頻繁霜一夜相撩擾不似佳人似老人和裴晉公涼風亭睡覺驪龍睡後珠元在仙鶴行時步又輕方寸瑩然無一事水聲來侣玉琴聲答裴公雪夜訝諸公不相訪玉樹瓊樓滿眼新的知開閣待諸賔遲遲來去非無意擬作梁園座右人和人憶江西故吏歌侯家故吏歌聲發逸處能高怨處低今嵗洛中無雨雪眼前風景似江西賞牡丹偶然相遇人間世合在増城阿姥家有此傾城好顔色天教晩發賽諸花有所嗟二首庾令樓中初見時武昌城外似腰肢相逢相識盡如夢為雨為雲今不知鄂渚濛濛烟雨㣲女郎夢逐暮雲歸只應長在漢陽渡化作鴛鴦一隻飛和裴令公誚樂天寄奴買馬常奴安得似方回爭望追風絶足來若把翠娥酬騄駬始知天下有竒才酬牛相見寄官冷如漿滿病身凌寒不易遇天津少年留取多情興請待花時作主人答張侍衛又被時人寫姓名春風引路入京塵知君憶得前身事分付鶯花與後生赴連州諸公置酒相送謫在三湘最逺洲邊鴻不到水南流如今暫寄尊前笑明日辭君步步愁梁國辭梁國三郎威徳尊女巫簫皷走鄉村萬家長見空山上雨氣蒼茫生廟門酬元九無事尋花至仙境等閒栽樹比封君金門通籍真多事黄紙除書每日聞酬楊侍郎翔鸞闕底謝皇恩纓上滄浪舊水痕疎傅揮金忽相憶逺擎長句與招魂答楊敬之時亦謫居飽霜孤竹聲偏切帶火焦桐韵不悲今日知音一留聴是君心事不同時和嚴給事聞唐昌觀玉蘂花下有仙遊三首玉女來看玉蘂花異香先引七香車攀枝弄雪時回顧驚怪人間日易斜雪蘂瓊絲滿院春衣輕步步不生塵君平簾下徒相問長伴吹簫别有人酬楊八副使將赴湖南見寄知逐征南冠楚才逺勞書信到陽臺明朝若到君山上一道巴江自此來和元相公玉人紫綬相輝映却要霜鬚一兩莖其奈無成空老去每臨明鏡若為情謝惠班竹杖一莖烱烱琅玕色數節重重玳瑁文拄到高山未登處青雲路上願逢君常州楊給事新樓文昌新像盡東來油幕朱門次第開且上新樓看風月㑹乘雲雨一時回和裴令公夜晏天下蒼生望不休東山雖有但時遊後來海上仙桃樹肯逐人間風露秋酬李侍郎惠藥隠儿支頭對落暉故人書信到柴扉周南留滯商山老星像如今属少㣲寄李表臣二首對酒臨流奈别何君今已貴我蹉跎分明記取星星鬢他日相逢應更多世間人事有何窮過後思量盡是空早晩同歸洛陽陌卜隣須近祝鷄翁酬牛相公别後夢同遊已嗟池上别魂驚忽報夢中携手行此夜獨歸還乞夢老人無睡到天明酬裴尹携酒兼喜眼疾平巻盡輕雲月更明金箆不用且閒行若傾家釀招來客何必池塘春草生和滑州李尚書上已憶江南褉事白馬津頭春日遲沙洲歸雁拂旌旗栁營惟有軍中戲不似江南三月時和西川李尚書傷孔雀及薛濤玉倪已逐金鐶塟翠羽先隨秋草萎唯見芙蓉含曉露數行紅淚滴清池後梁二帝碑堂下作玉馬朝周從此辭園陵寂寞對豐碑千行宰樹荆州道暮雨蕭蕭聞子規答栁栁州三首日日臨池弄小鶵還思寫論付宫奴栁家新様元和脚且盡薑芽歛手徒栁集亦有是篇小兒弄筆不能嗔涴壁書忩且賞勤聞彼夢熊猶未兆女中誰是衛夫人昔日傭工寄姓名逺勞辛苦寫西京近來漸有臨池興為報元常欲抗衡重别栁栁州二十年來萬事同今朝歧路忽西東皇恩若許歸田去晩嵗當為田舎翁鄰易田登清輝樓潯陽江色潮添滿彭蠡秋聲夜送來南望廬山千萬仭共誇新出棟梁材遇毛仙翁武昌山下蜀江東重向仙舟見葛洪又得案前親禮拜大羅天訣玉函封寄毗陵楊給事三首揮毫起制來東省蹛目修名謁外臺好著櫜鞬莫惆悵出文入武是全才曽主魚書輕刺史今朝自請左魚來青雲直上無多地却要斜飛取勢回東城南陌昔同遊坐上無人第二流屈指如今已零落且須歡喜作鄰州陪晏杏園更將何面上春臺百事無成老又催唯有落花無俗態不嫌憔悴滿頭來曹剛大絃嘈噆小絃清噴雪含風意思生一聴曹剛彈薄媚人生不合出京城寄湖州韓中丞老郎日日憂蒼髩逺守年年厭白蘋終日相思不相見長頻相見見何人楊栁枝楊子江頭烟景迷隋家官樹拂金堤嵯峨猶有當時色半蘸波中水鳥棲韓信廟將畧兵機命世雄蒼黄鍾室嘆良弓遂令後代登壇者每一尋思怕立功美温尚書鎮定興元旌旗入境大無聲戮盡鯨鯢漢水清從此世人開耳目始知名將出書生田順郎歌清歌不是世間音玉殿常開稱主心唯有順郎全學得一聲飛出九重深夜聞商人船中筝大艑髙船一百尺清聲促柱十三弦揚州市裏商人女來占江西明月天聞道士彈思歸引仙翁一奏思歸引逐客初聞自泫然莫怪殷勤悲此曲越聲長苦已三年喜康將軍見訪謫居愁寂似幽棲百草當門茅舍低野獵將軍忽相訪鷓鴣驚起繞籬啼嘗茶生拍芳叢鷹嘴芽老郎封寄謫仙家今宵更有湘江月照出霏霏滿盌花月望洞庭湖光秋月兩相和潭面無風鏡未磨遙望洞庭山水翠白銀盤裏一青螺赴連山徳宗山陵當時並冕奉天顔委珮低簮綵仗間今日獨來張樂地萬重雲水望橋山監祠夕月西皥分司晝夜平羲和停午太隂生鏗鏘揖讓秋光裏觀者如雲出鳯城贈李司空妓髪鬢梳頭宫様籹春風一曲杜韋娘司空見慣渾閒事㫁盡蘇州刺史腸家園𤓰熟是故蕭相公所遺𤓰種悽然感舊因賦此詩劉長卿事去人亡迹自留黄花緑蔕不勝愁誰能更向青門外秋草茫茫覔故侯寄許尊師獨上雲梯入翠微濛濛烟雨映禪扉世人知在中峰裏遙禮青山恨不歸酬李穆見寄孤舟相訪至天涯萬轉雲山路更賖欲掃柴門迎逺客青苔黄葉滿貧家送王司馬秩滿西歸漢代何人訪逐臣江邊㡬度送歸人同官嵗嵗先辭滿唯有青山伴老身寄别朱拾遺天書逺召滄浪客㡬度臨岐病未能江海茫茫春欲遍行人一騎發金陵㑹赦後酬主簿所問江南江北長相憶淺水深山獨掩扉重見太平人已老桃源久住不能歸贈秦系向風長嘯戴紗巾野鶴由來不可親明日東歸變名姓五湖烟水覔何人酬靈澈公相招石澗泉聲久不聞獨臨長路雪紛紛如今漸欲生黄髪願脱頭冠與白雲贈崔九憐君一見一悲歌嵗嵗無如老去何白屋漸看秋草沒青雲莫道故人多送建州陸使君漢庭初拜建安侯天子臨軒寄所憂從此向南無限路雙旗已去水悠悠送秦侍御外甥長篆之福州謁鮑大夫秦侍御與大夫有舊萬里閩中去渺然孤舟水上入寒烟轅門拜首孺衣弊貌似牢之豈不憐聞奉迎皇太后使沈判官至長樂宫人掃落花君王正使五雲車萬方臣妾同瞻望疑在層城阿母家送劉宣之道州謁崔大夫沅水悠悠湘水春臨岐一望一沾巾信陵門下三千客君在長沙見㡬人過鄭山人所居寂寂孤鶯啼杏園寥寥一犬吠桃源落花芳草無尋處萬壑千峰獨閉門奉送賀若郎中賊退後之杭州江上初収戰馬塵鶯聲栁色待行春雙旌誰道來何暮萬井如今有㡬人𤓰州驛重送梁郎中渺渺雲山去㡬重依依獨聽廣陵鍾明朝借問南來客五馬雙旌何處逢奉使鄂渚滄洲不復戀漁竿白髪那堪戴鐡冠客路向南何處是蘆花十里雪漫漫新息道中蕭條獨向汝南行客路多逢漢騎營古木蒼蒼離亂後㡬家同住一孤城春日晏魏城湘水亭何年家住此江濱㡬度門前北渚春白髪亂生相顧老黄鶯自語豈知人重送道標上人衡陽千里故人稀遙逐孤雲入翠微春草青青新覆地深山無路若為歸送李判官之潤州行營萬里辭家事皷鼙金陵驛路楚雲西江春不肯留行客草色青青送馬蹄將赴南巴至餘干别李十二江上花催問禮人鄱陽鶯報越鄉春誰憐别此悲歡異萬里青山送逐臣時平後春日思歸一尉何曽及布衣時平却憶卧柴扉故園栁色催南客春水桃花待北歸送陶十赴杭州攝掾莫嘆江城一掾卑滄洲未是阻心期浙中山色千萬狀門外潮聲朝暮時使還七里瀬上逢薛承規赴江西貶遷客歸人醉晩寒孤舟暫泊子陵灘憐君更去三千里落日青山江上看使回赴蘇州道中作春風何是逺相催路盡天涯始却回萬里無人空楚水孤帆送客到蘇臺昭陽曲昨夜承恩宿未央羅衣猶帶御爐香芙蓉帳小雲屏暗楊栁風多水殿凉非所留繋聞長州軍笛聲白日浮雲閉不開黄沙誰問冶長猜只憐横笛闗山月知處愁人夜夜來贈微上人禪門來徃翠微間萬里千峰在剡山何時共到天台裏身與浮雲處處閒東湖送朱逸人歸山色湖光併在東扁舟歸去有樵風莫道野人無外事開田鑿井白雲中舟中送李十八釋子身心無有紛獨將衣鉢去人羣相思晩望西林寺唯有鐘聲出白雲送李穆歸淮南揚州春草新年緑未去先愁去不歸淮水問君來早晚無人偏畏過芳菲觀李溱所畫美人障子華堂翠幕春風來内閣金屏曉色開此中一見亂人眼只疑行雲到陽臺明月灣尋賀九不遇故人川上復何之明月灣南空所思故人不在明月在誰見孤舟來去時送友人東歸闗路迢迢匹馬歸垂楊寂寂數鶯飛憐君獻䇿十餘載今去猶為一布衣七里瀬送嚴維秋江渺渺水空波越客孤舟欲傍歌手折衰楊悲老大故人零落已無多重送裴郎中貶吉州五言中有送裴詩猿啼客散暮江頭人自傷心水自流同作逐臣君更逺青山萬里一孤舟尋盛禪師蘭若秋草黄花覆古阡隔林何處起人烟山僧獨在山中老唯有寒松見少年萬首唐人絶句巻六欽定四庫全書萬首唐人絶句卷六宋洪邁編五言藍溪雜詠十二首錢起望山臺望山登春臺目盡趣難極晚景下平阡花際霞峰色板橋靜宜樵隠度逺與車馬隔有時行藥來喜遇歸山客石井片霞照仙井泉底桃花紅那知幽石下不與武陵通古藤引蔓出雲樹垂輪覆巢鶴幽人對酒時苔上閒花落伺山徑㡬轉到青山數重度流水秦人入雲去知向桃源裏藥圃春畦生百藥花葉香初霽好日與光風偏來入叢蕙石上苔淨與溪色連幽宜松雨滴誰知古石上不染世人跡竹間路暗歸草堂靜半入花源去有時載酒來不與清風遇東坡永日興難忘掇芳春坡曲新晴花枝下愛此苔水綠石蓮花幽石生芙蓉百花慚美色逺笑越溪女聞芳不可識潺湲聲亂石跳素波寒聲來㡬處颼颼瞑風起散出空林去松下雪雖因朔風至不向瑤臺側唯助苦寒松偏明後凋色赴章陵酬李卿贈別一官叨下秩九棘謝知音芳草文園路春愁滿別心郎員外見尋不遇軒騎來相訪漁樵悔晚歸更憐誰露跡花裏㸃牆衣逢俠者燕趙悲歌士相逢劇孟家寸心言不盡前路日將斜過故吕侍御宅不見承明客愁聞長樂鐘馬卿何早世漢主欲登封送楊著作歸東海楊柳出闗色東行千里期酒酣暫輕別路逺始相思九日寄姪采菊偏相憶傳香寄便風今朝竹林下莫使桂尊空崔逸人山亭藥徑深紅蘚山牕滿翠㣲羨君花下醉胡蝶夢中飛宿洞口館野竹通溪冷秋泉入户鳴亂來人不到寒草上階生梨花艶淨如籠月香寒未逐風桃花徒照地終被笑妖紅感事三首元稹為國謀羊舌從來不為身此心長自保終不學張陳自笑心何劣區區辨所寃伯仁雖到死終不向人言富貴年皆長風塵舊轉稀白頭方見絶遙為一霑衣題翰林東閤前小松簷礙脩鱗亞霜侵簇翠黄唯餘入琴韻終待舜絃張西還悠悠洛陽夢鬱鬱灞陵樹落日正西歸逢君又東去與樂天同葬杓直元伯來相葬山濤誓撫孤不知他日事兼得似君無旅眠内外都無隔帷屏不復張夜眠兼客坐同在火爐牀合衣寢良夕背燈坐方成合衣寢酒醉夜未闌㡬囘顛倒枕竹簟竹簟襯成茵未忍都令巻憶昨初來日看君自施展牡丹二首簇蘂風頻壞裁紅雨更新眼看吹落地便別一年春繁綠陰全合衰紅展漸難風光一擡舉猶得暫時看象人被色空成象觀空色異真自悲人是假那復假為人嵗日一日今年始一年前事空淒涼百年事應與一年同贈熊士登平生本多思況復老逢春今日梅花下他鄉值故人夏陽亭臨望望逺音書絶臨川意緒長殷勤眼前水千里到河陽日髙睡隔世身如夢頻來不為名憐君近南住時得到山行輞川世累為身累閒忙不自由殷勤輞川水何事出山流天壇歸為結區中累因辭洞裏花還來舊城郭烟火萬人家雨後倦寢數殘更孤燈暗又明竹梢餘雨重時復拂簾驚晴日多病苦虛羸晴明强展睂讀書心緒少閒卧日長時直臺糜入神羊隊烏驚海鷺眠仍教百餘日迎送直㕔前行宫寥落古行宫宫花寂寞紅白頭宫女在閒坐説𤣥宗醉行秋風方索漠霜貌足睽攜今日騎驄馬街中醉踏泥指巡胡遣悶多慿酒公心只仰胡挺身唯直指無意獨欺愚飲新酒聞君新酒熟況值菊花秋莫怪平生志圖銷盡日愁香毬順俗唯團轉居中莫動搖愛君心不測猶訝火長燒嘉陵水爾是無心水東流有恨無我心無説處也共爾何殊漫天嶺贈僧五上兩漫天因師懴業緣漫天無盡日浮世有窮年百牢闗天上無窮路生期七十間那堪九年内五度百牢闗二月十九日酬王十八全素君念世上川嗟子老瘴天那堪十日内又長白頭年古築城曲五解年年塞下丁長作出塞兵自從冒頓强官築遮敵城築城須努力城髙遮得賊但恐賊路多有城遮不得丁口傳父口莫問城堅不平城被敵圍漢劚城墻走因兹請休和敵騎往來過半疑兼半信築城猶嵳峩築城安敢煩願聽丁一言請築鴻臚寺兼愁敵出闗逢雪宿芙蓉山劉長卿日暮蒼山逺天寒白屋貧柴門聞犬吠風雪夜歸人送客之閩中朝無寒士達家在舊山貧相送天涯裏憐君更逺人贈秦系二首羣公誰讓位五柳獨知貧惆悵青山路烟霞老此人初迷武陵路復出孟嘗門囘首江南岸青山與舊恩夜中對雪贈秦系時秦初與謝氏離婚謝氏在越月明花滿地君自憶山陰誰遣因風起紛紛亂此心湘妃帝子不可見秋風來暮思嬋娟湘江月千載空蛾眉斑竹蒼梧千載後斑竹對湘沅欲識湘妃怨枝枝滿淚痕春草宫懷古君王不可見芳草舊宫春猶帶羅裙色青青向楚人正朝覽鏡憔悴逢新嵗芳菲見舊春朝來明鏡裏不忍白頭人𤓰洲送李端公片帆何處去匹馬獨歸遲惆悵江南北青山欲暮歸送張十八歸桐廬歸人乘野艇帶月過江邨正落寒潮水相隨夜到門過白鶴觀尋岑秀才不遇不知方外客何事鎻空房應向桃源裏教他喚阮郎聽彈琴冷冷七絃上靜聽松風寒古調雖自愛今人多不彈詠牆陰下葵此地常無日青青獨在陰太陽偏不及非是未傾心入百丈澗見桃花晚開百丈深澗裏過時花欲妍應緣地勢下遂使春風偏送子婿往揚州四首渡口發梅花山中動泉脈蕪城春草生君作揚州客半邏鶯滿樹新年人獨還落花逐流水共到茱萸灣雁還空渚在人去落潮翻臨水獨揮手殘陽歸掩門狎鳥攜稚子釣魚終老身殷勤囑歸客莫話桃源人寄龍山道士悠悠白雲裏獨住青山客林下焚香桂花同寂寂送方外上人孤雲將野鶴豈向人間住莫買沃洲山時人已知處送靈澈蒼蒼竹林寺杳杳鐘聲晚荷笠帶夕陽青山獨歸逺茱萸灣荒涼野店絶迢逓人烟逺蒼蒼古木中多是隋家苑赴楚州阻淺楚城今近逺積靄寒塘暮水淺舟且遲淮潮至何處江中對月空洲夕烟斂望月秋江裏厯厯沙上人月中孤渡水平蕃曲三首吹角報蕃營囘軍欲洗兵已教青海外自築漢家城渺渺戍烟孤茫茫塞草枯隴頭那用閉萬里不防胡絶漢大軍還平沙獨戍閒空留一片石萬古在燕山尋賀九不遇楚水日夜綠傍江春草深青青遙滿目萬里傷歸心送友人對酒灞亭暮相看愁自深河邊草已綠此別難為心送蕭校書朱餘慶馬識青山路人隨白浪船別君猶有淚學道漫經年宿道士觀堂閉仙人影空壇月露初閒聽道家子盥潄讀靈書送陳標滿酌勸童僕好隨郎馬蹄春風戒行李莫上白銅鞮重陽宴百花亭閒攜九日酒共到百花亭醉裏求詩境囘看島嶼青酬李躔侍郎此去非闗興君行不當遊無因兩處馬共飲一溪流別李侍御後却寄已作亭下別未忘燈下情吟多欲就枕更漏轉分明天長路別朱大李躔驛騎難隨伴尋山半憶君蒼崖殘月路猶數過溪雲酬朱大十夜郡城宿苦吟身未閒那堪西郭別雪路問看山雨後思湖上居許渾前山風雨涼歇馬坐埀楊何處芙蓉落南渠秋水香聞歌新秋絃管清時轉遏雲聲曲盡不知處月髙風滿城思天台山赤城雲雪深山客負歸心昨夜西齋宿月明琪樹陰長安早春懷江南雲月有歸處故山清洛南如何一花發春夢徧江潭塞下夜戰桑乾北秦兵半不歸朝來有鄉信猶自寄征衣送客南歸野寺薜蘿晚官渠楊柳春歸心已無限更送洞庭人萬首唐人絶句卷六
