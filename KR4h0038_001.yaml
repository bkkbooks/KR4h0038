body:
  text: 萬首唐人絶句卷一宋洪邁編七言贈李白杜甫秋來相顧尚飄蓬未就丹砂愧葛洪痛飲狂歌空度日飛揚跋扈為誰雄三絶句楸樹馨香倚釣磯斬新花蘂未應飛不如醉裏風吹盡可忍醒時雨打稀門外鸕鷀去不來沙頭忽見眼相猜自今已後知人意一日須來一百回無數春筍滿林生柴門密掩斷人行會須上畨看成竹客至從嗔不出迎漫興九首眼見客愁愁不醒無賴春色到江亭即遣花開深造次便覺鶯語太丁寧手種桃李非無主野老牆低還是家恰似春風相欺得夜來吹折數枝花熟知茅齋絶低小江上燕子故來頻銜泥點汚琴書內更接飛蟲打著人二月已破三月來漸老逢春能幾回莫思身外無窮事且盡生前有限杯腸斷春江欲盡頭杖藜徐步立芳洲顛狂柳絮隨風去輕薄桃花逐水流懶慢無堪不出村呼兒日在掩柴門蒼苔濁酒林中靜碧水春風野外昏糝徑楊花鋪白氊點溪荷葉疊青錢笱根稚子無人見沙上鳬雛傍母眠舍西柔桑葉可拈江畔細麥復纎纎人生幾何春已夏不放香醪如蜜甜隔戶楊栁弱嫋嫋恰似十五女兒腰誰謂朝來不作意狂風挽斷最長條贈花卿錦城絲管日紛紛半入江風半入雲此曲秖應天上有人間能得幾回聞少年行馬上誰家白面郎臨階下馬坐人牀不通姓字粗豪甚指點銀瓶索酒嘗覔挑裁奉乞桃栽一百根春前為送浣花村河陽縣裏雖無數濯錦江邊未滿園覔綿竹華軒藹藹他年到綿竹亭亭出縣髙江上舍前無此物幸分蒼翠拂波濤覔榿木栽草堂塹西無樹林非子誰復見幽心飽聞榿木三年大與致溪邊十畝隂覔松樹子落落出羣非櫸柳青青不朽豈楊梅欲存老蓋千年意為覔霜根數寸栽覔果栽草堂少花今欲栽不問緑李與黃梅石笋街中却歸去果園坊裏為求來贈鄭鍊赴襄陽鄭子將行罷使臣囊無一物獻尊親江山路逺羇離日裘馬誰為感激人江畔獨步尋花七絶句江上被花惱不徹無處告訴只顛狂走覔南鄰愛酒伴經旬出飲獨空牀稠花亂蘂裹江濵行步欹危實怕春詩酒尚堪驅使在末須料理白頭人江深竹靜兩三家多事紅花映白花報答春光知有處應須美酒送生涯東望少城花滿煙百花髙樓更可憐誰能載酒開金盞喚取佳人舞繡筵黃師塔前江水東春光懶困倚微風桃花一簇開無主可愛深紅映淺紅黃四娘家花滿蹊千朵萬朵壓枝低留連戲蝶時時舞自在嬌鶯恰恰啼不是愛花即欲死只恐花盡老相催繁枝容易紛紛落嫩蘂商量細細開春水二絶二月六夜春水生門前小灘渾欲平鸕鷀鸂鶒莫漫喜吾與汝曹俱眼明一夜水髙二尺強數日不可更禁當南市津頭有船賣無錢即買繫籬傍官池春鴈二首自古稻粱多不足至今鸂鶒亂為羣且休悵望看春水更恐歸飛隔暮雲青春欲盡急還鄉紫塞寧論尚有霜翅在雲天終不逺力微繒繳絶須防中丞嚴公雨中垂寄見憶奉答二絶雨映行宮辱贈詩元戎肯赴野人期江邊老病雖無力強擬晴天理釣絲何日雨晴雲出溪白沙青石洗無泥只須伐竹開荒徑拄杖穿花聽馬嘶謝嚴中丞送青城山道士乳酒山瓶乳酒下青雲氣味濃香幸見分鳴鞭走送憐漁父洗盞開嘗對馬軍得房公池鵝房相西亭鵝一羣眠沙泛浦白於雲鳯凰池上應回首為報籠隨王右軍戲作寄上漢中王二首王新誕明珠雲裏不聞雙鴈過掌中貪見一珠新秋風嫋嫋吹江漢只在他鄉何處人謝安舟楫風還起梁苑池臺雪欲飛杳杳東山攜漢妓泠泠修竹待王歸投簡梓州幕府兼簡韋十郎官幕下郎官安穩無從來不奉一行書固知貧病人須棄能使韋郎迹也踈答楊梓州悶到房公池水頭坐逢楊子鎮東州却向青溪不相見回船應載阿戎遊惠義寺園送辛員外朱櫻此日垂朱實郭外誰家負郭田萬里相逢貪握手髙才仰望足離筵乞大邑瓷碗大邑燒瓷輕且堅扣如哀玉錦城傳君家白碗勝霜雪急送茅齋也可憐奉和嚴鄭公軍城早秋秋風嫋嫋動髙旌玉帳分弓射敵營已收滴博雲間戍更奪蓬婆雪外城絶句四首堂西長笋别開門塹北行椒却背村梅熟許同朱老喫松髙擬對阮生論欲作魚梁雲復湍因驚四月雨聲寒青溪先有蛟龍窟竹石如山不敢安兩箇黃鸝鳴翠柳一行白鷺上青天窗含西嶺千秋雪門泊東吳萬里船藥條藥甲潤青青色過棕亭入草亭苗滿空山慙取譽根居隙地怯成形李司馬橋了承髙使君自成都回向來江上手紛紛三日功成事出羣已傳童子騎青竹總擬橋東待使君漫成一絶江月去人只數尺風燈照夜欲三更沙頭宿鷺聫拳靜船尾跳魚撥剌鳴承聞河北諸道節度入朝歡喜口號絶句十二首祿山作逆降天誅更有思明亦已無洶洶人寰猶不定時時鬭戰欲何須社稷蒼生計必安將軍跋扈錯相干周宣漢武今王是孝子忠臣後代看喧喧道路多歌謡河北將軍盡入朝始是乾坤王室正却教江漢客魂銷不道諸公無表來茫然庶事遣人猜擁兵相學干戈鋭使者徒勞百萬回鳴玉鏘金盡正臣修文偃武不無人興王會靜妖氛氣聖夀冝過一萬春英雄見事若通神聖哲為心小一身燕趙休矜出佳麗宫闈不擬選才人抱病江天白首郎空山樓閣暮春光衣冠是日朝天子草奏何時入帝鄉澶漫山東一百州削成如桉抱青丘苞茅重入歸關內王祭還供盡海頭東逾遼水北滹沱星象風雲喜共和紫氣關臨天地闊黃金臺貯俊賢多漁陽突騎邯鄲兒酒酣並轡金鞭垂意氣即歸雙闕舞雄豪復遣五陵知李相將軍擁薊門白頭雖老赤心存竟能盡説諸侯入知有從來天子尊十二年來多戰埸天威已息陳堂堂神靈漢代中興主功業汾陽異姓王喜聞盜賊蕃寇總退口號五首蕭關隴水入官軍青海黃河卷塞雲北極轉愁龍虎氣西戎休縱敵仇羣贊普多教使入秦數通和好止煙塵朝廷忽用哥舒將殺伐虛悲公主親崆洞西極過崑崙駝馬由來擁國門逆氣數年吹路斷蕃人聞道漸星奔勃律天西采玉河堅昆碧碗最來多舊隨漢使千堆寶少答胡王萬匹羅今春喜氣滿乾坤南北東西拱至尊大厯三年調玉燭玄元皇帝聖雲孫存殁口號二首席謙不見近彈棊畢耀仍傳舊小詩玉局他年無限笑白楊今日幾人悲道士席謙善彈棊故曰玉局鄭公粉繪隨長夜曹霸丹青已白頭天下何曾有山水人間不解重驊騮髙士滎陽鄭虔善畫山水曹善畫馬也上卿翁請修武侯廟遺像缺落時崔卿權夔州大賢為政即多聞刺史真符不必分尚有西郊諸葛廟臥龍無首對江濆解悶十二首草閣柴扉星散居浪翻江黑雨飛初山禽引子哺紅果溪女得錢留白魚商胡離别下揚州憶上西陵故驛樓為問淮南米貴賤老夫乘興欲東流一辭故國十經秋每見秋瓜憶故丘今日南湖采薇蕨何人為覔鄭瓜州沈范早知何水部曹劉不待薛郎中獨當省署開文苑兼泛滄浪學釣翁李陵蘇武是吾師孟子論文更不疑一飯未曾留俗客數篇今見古人詩復憶襄陽孟浩然清詩句句盡堪傳即今耆舊無新語漫釣槎頭縮項鯿陶冶性靈存底物新詩改罷自長吟孰知二謝將能事頗學隂何苦用心不見髙人王右丞藍田丘壑漫寒藤最傳秀句寰區滿未絶風流相國能先帝貴妃今寂寞荔枝還復入長安炎方每續朱櫻獻玉座應悲白露團憶過瀘戎摘荔枝青楓隱映石逶迤京中舊見君顔色紅顆酸甜只自知翠瓜碧李沉玉甃赤梨蒲萄寒露成可憐先不異枝蔓此物娟娟長遠生側生野岸及江蒲不熟丹宫滿玉壺雲壑布衣鮐背死勞生重馬翠眉須夔州歌十絶句中巴之東巴東山江水開闢流其間白帝髙為三峽鎮夔州險過百牢關白帝夔州各異城蜀江楚峽混殊名英雄割據非天意霸主并吞在物情羣雄競起問前朝王者無外見今朝比訝漁陽結怨恨元聽舜日舊蕭韶赤甲白鹽俱刺天閭閻繚繞接山巔楓林橘樹丹青合復道重樓錦繡懸瀼東瀼西一萬家江北江南春冬花背飛鶴子遺瓊蘂相趂鳬雛入蔣牙東屯稻畦一百頃北有澗水通青苖晴浴狎鷗分處處雨隨神女下朝朝蜀麻吳鹽自古通萬斛之舟行若風長年三老長歌裏白晝攤錢髙浪中憶昔咸陽都市合山水之圖張賣時巫峽曾經寶屏見楚宫猶對碧峰疑武侯祠堂不可忘中有松柏參天長干戈滿地客愁破雲日如火炎天涼閬風玄圃與蓬壺中有髙堂天下無借問夔州壓何處峽門江腹擁城隅書堂飲既夜復邀李尚書下馬月下賦絶句湖水臨風相與清殘樽下馬復同傾久拚野鶴如霜鬢遮莫鄰雞下五更戲為六絶句庾信文章老更成凌雲健筆意縱橫今人嗤點流傳賦不覺前賢畏後生王楊盧駱當時體輕薄為文哂未休爾曹身與名俱滅不廢江河萬古流縱使盧王操翰墨劣於漢魏近風騷龍文虎脊皆君馭歷塊過都見爾曹才力應難跨數公凡今誰是出羣雄或看翡翠蘭苕上未掣鯨魚碧海中不薄今人愛古人清詞麗句必為鄰竊攀屈宋冝方駕恐與齊梁作後塵未及前賢更勿疑遞相祖述復先誰别裁偽體親風雅轉益多師是汝師少年行二首莫笑田家老瓦盆自從盛酒長兒孫傾銀注瓦驚人眼共醉終同卧竹根巢燕養雛渾去盡江花結子已無多黃衫年少來冝數不見堂前東逝波萬首唐人絶句卷一欽定四庫全書萬首唐人絶句卷一宋洪邁編五言寄髙彭州杜甫百年已過半秋至轉飢寒為問彭州牧何時救急難歸雁東方萬里客亂定幾年歸腸斷江城雁髙髙正北飛即事百寶裝腰帶真珠絡臂鞲笑時花近眼舞罷錦纒頭絶句十二首江邊踏青罷回首見旌旗風起春城暮髙樓鼓角悲遲日江山麗春風花草香泥融飛燕子沙暖睡鴛鴦江碧鳥逾白山青花欲燃今春看又過何日是歸年藹藹花蘂亂飛飛蜂蝶多幽棲身懶動客至欲如何日出籬東水雲生舍北泥竹髙鳴翡翠沙僻舞鵾雞鑿井交棕葉開渠斷竹根扁舟輕裊纜小徑曲通村急雨捎溪足斜暉轉樹腰隔巢黃鳥並翻藻白魚跳舍下筍穿壁庭中藤刺簷地晴絲冉冉江白草纎纎江動月移石溪虛雲傍花鳥棲知故道帆過宿誰家聞道巴山裏春船正好行都將百年興一望九江城水檻溫江口茅堂石笋西移船先主廟洗藥浣沙溪漫道春來好狂風大放顛吹花隨水去翻却釣魚船王録事許修草堂資不到聊小詰為嗔王録事不寄草堂資昨屬愁春雨能忘欲漏時答鄭十七郎雨後過畦潤花殘步屐遲把文驚小陸好客見當時復愁十二首人煙生處僻虎迹過新蹄野鶻翻窺草村船逆上溪釣艇收緡盡昏鴉接翅稀月生初學扇雲細不成衣萬國尚防寇故園今若何昔歸相識少早已戰場多身覺省郎在家須農事歸年深荒草徑老恐失柴扉金絲縷箭鏃皂尾製旗竿一自風塵起猶嗟行路難外寇何曽盛干戈不肯休閭閻聽小子談話覔封侯貞觀銅牙弩開元錦獸張花門小箭好此物棄沙場今日翔麟馬先宜駕鼓車無勞問河北諸將覺榮華任轉江淮粟休添苑圃兵由來貔虎士不滿鳳凰城江上亦秋色火雲終不移巫山猶錦樹南國且黃鸝每恨陶彭澤無錢對菊花如今九日至自覺酒須賒病減詩仍拙吟多意有餘莫看江揔老猶被賞時魚武侯廟遺廟丹青落空山草木長猶聞辭後主不復卧南陽八陳圖功蓋三分國名成八陳圖江流石不轉遺恨失吞吳相逢行李白相逢紅塵內髙揖黃金鞭萬户垂楊栁君家阿那邊塞上曲三首大漢無中策胸奴犯渭橋五原秋草緑胡馬一何驕命將征西極橫行隂山側燕支落漢家婦女無花色轉戰渡黃河休兵樂事多蕭條清萬里瀚海寂無波玉階怨玉階生白露夜久侵羅襪却下水精簾玲瓏望秋月襄陽曲四首襄陽行樂處歌舞白銅鞮江城回緑水花月使人迷山公醉酒時酩酊襄陽下頭上白接㒿倒著還騎馬峴山臨漢江水緑沙如雪上有墮淚碑青苔久磨滅且醉習家池莫看墮淚碑山公欲上馬笑殺襄陽兒洛陽陌白玉誰家郎回車渡天津看花東陌上驚動洛陽人靜夜思牀前看月光疑是地上霜舉頭望山月低頭思故鄉緑水曲緑水明秋月南湖采白蘋荷花嬌欲語愁殺蕩舟人重憶賀監欲向江東去定將誰舉杯稽山無賀老却棹酒船回題情深樹寄象公腸斷枝上猿淚添山下樽白雲見我去亦為我飛翻送姪艮攜二妓赴會稽戲有此贈攜妓東山去春光半道催遙看二桃李雙入鏡中開送殷淑痛飲龍笻下燈青月復寒醉歌驚白鷺半夜起沙灘送陸判官往琵琶峽水國秋風夜殊非逺别時長安如夢裏何日是歸期留别金陵諸公食出野田美酒臨逺水傾東流若未盡應見别離情别東林寺僧東林送客處月出白猿啼笑别廬山逺何煩過虎溪奔亡道中三首蘇武天山上田橫海島邊萬重關塞斷何日是歸年亭伯去安在李陵降未歸愁容變海色短服改朝衣談笑三軍却交遊七貴疏仍留一隻箭未射魯連書田園言懷賈誼三年謫班超萬里侯何如牽白犢飲水對清流紀南陵題五松山四首聖逹有去就潛光愚其色魚與龍同池龍去魚不測當時板築輩豈知傅説情一朝和殷人光氣為列星時命或大謬仲尼將奈何鸞鳯忽覆巢麒麟不來過龜山蔽魯國有斧且無柯歸來歸去來宵濟越洪波初出金門尋王侍御不遇詠壁上鸚鵡落羽辭金闕孤鳴託繡衣能言終見棄還向隴西飛醉題王漢陽廳我似鷓鴣鳥南遷懶北飛時尋漢陽令取醉月中歸秋浦歌十二首秋浦錦駝鳥人間天上稀山雞羞渌水不敢照毛衣秋浦多白猿超騰若飛雪牽引條上兒飲弄水中月愁作秋浦客強看秋浦花山川如剡縣風日似長沙醉上山公馬寒歌寧戚牛空吟白石爛淚滿黑貂裘秋浦千重嶺水車嶺最竒天傾欲墮石水拂寄生枝江祖一片石青天掃畫屏題詩留萬古緑字錦苔生邏人橫鳥道江祖出魚梁水急舟行疾山花拂面香水如一匹練此地即平天耐可乘明月看花上酒船爐火照天地紅星亂紫煙赧郎明月夜歌曲動寒川白髮三千丈緣愁似箇長不知明鏡裏何處得秋霜秋浦田舍翁採魚水中宿妻子張白鷳結罝映深竹桃波一步地了了語聲聞闕與山僧别低頭禮白雲九日龍山飲九日龍山飲黃花笑逐臣醉看風落帽舞愛月留人銅官山醉後絶句我愛銅官樂千年未擬還要須回舞袖拂盡五松山陪侍郎叔遊洞庭醉後三首今日竹林宴我家賢侍郎三杯容小阮醉後發清狂船上齊橈樂湖心泛月歸白鷗間不去爭拂酒筵飛剗却君山好平鋪湘水流巴陵無限酒醉殺洞庭秋對雪獻從兄虞城宰昨夜梁園雪弟寒兄不知庭前看玉樹腸斷憶連枝哭宣城善釀紀叟紀叟黃泉裏還應釀老春夜臺無曉日沽酒與何人王昭君昭君拂玉鞍上馬啼紅頰今日漢宫人明朝胡地妾杜陵南登杜陵上北望五陵間秋水明落日流光滅逺山觀放白鷹八月邊風高胡鷹白錦毛孤飛一片雪百里見秋毫白鷺鷥白鷺下秋水孤飛如墜霜心間且未去獨立沙洲傍獨坐敬亭山衆鳥高飛盡孤雲去獨間相看兩不厭只有敬亭山陪從祖濟南太守泛鶴山湖三首初謂鶴山近寧知湖水遙此行殊訪戴自可緩歸橈湖闊數千里湖光搖碧山湖西正有月獨送李膺還水入北湖去舟從南浦回遙看鵲山轉却似送人來青溪半夜聞笛羌笛梅花引吳溪隴水清寒山秋浦月腸斷玉關情夏日山中懶搖白羽扇裸袒青林中脫巾挂石壁露頂灑松風流夜郎題葵葉慚君能衛足歎我逺移根白日如分照還歸守故園巴女詞巴水急如箭巴船去若飛十月三千里郎行幾嵗歸越女詞五首長干吳兒女眉目艷星月屐上足如霜不著鴉頭襪吳兒多白晳好為蕩舟劇賣眼擲春心折花調行客耶溪採蓮女見客棹歌回笑入荷花去佯羞不出來東陽素足女會稽素舸郎相看月未墮白地斷肝腸鏡湖水如月耶溪女如雪新粧蕩新波光景兩竒絶怨情美人卷珠簾深坐嚬蛾眉但見淚痕濕不知心恨誰浣紗石上女玉靣耶溪女青蛾紅粉粧一雙金齒屐兩足白如霜見韋參軍量移東陽潮水還歸海流人却到吳相逢問愁苦淚盡日南珠萬首唐人絶句卷一
