body:
  text: 萬首唐人絶句巻二十九宋洪邁編七言同王維過崔處士林亭盧象映竹時聞轉轆轤當窗只見網蜘蛛主人非病常高卧環堵䝉籠一老儒新晴愛月陸暢野性平生惟愛月新晴半夜覩嬋娟起來自擘紗窗破恰漏清光落枕前雲安公主出降雜詠催糚二首天上瓊花不避秋今宵織女嫁牽牛萬人惟待乗鸞出乞巧齊登明月樓少糚銀粉飾金鈿端正天花貴自然聞道禁中時節異九秋香滿鏡臺前坐障白玉爲竿丁字成黄金繡帶短長輕强遮天上花顔色不隔雲中語笑聲簾眞珠文織挂簷端錦縁羅旌千萬端早把玉鉤和月巻神仙愁怕水精寒階甃玉編金次第平花紋隱起踏無聲幾重便上華堂裏得見天人吹鳳笙扇寶扇持來入禁宫本教花下動香風姮娥須逐彩雲降不可通宵在月中成都贈别席夔不值分流二江水定應猶得且同行三千里外情人别更被子規啼數聲游城東王駙馬亭城外無塵水間松秋天木落見山容共尋蕭史江亭去一望終南紫閣峯望毛女峯我種東峯千葉蓮此峯毛女始求仙今朝暗筭當時事已是人間七萬年送李山人歸山來從千山萬山裏歸向千山萬山去山中白雲千萬重却望人間不知處長安新晴九重深淺人不知金殿玉樓倚朝日一使城中新雨晴御溝流得宫花出出藍田關寄董使君萬里煙蘿錦帳閒雲迎水送度藍關七盤九折難行處盡是龔黄界外山題悟公禪堂臨壇付法十三春家本長城若下人芸閣少年應不識南山鈔主是前身宿陜府北樓奉酬崔大夫二首樓壓黄河山滿坐風清水涼誰忍卧人定軍州禁漏傳不妨秋月城頭過一别朱門三四春再來應笑尚風塵昨宵唯有樓前月識是謝公詩酒人陜州逢竇鞏同宿寄江陵韋協律共出丘門歳九霜相逢悽愴對離觴荆南為報韋從事一宿同眠御史牀夜到泗州酬崔使君徐城洪盡到淮頭月裏山河見泗州聞道泗濵清廟磬雅聲今在謝家樓送崔員外使回入京六星宫裏一星歸行到金鉤近紫微侍史别來經嵗月今宵應夢護香衣成都送别費冠卿紅椒花落桂花開萬里同游俱未回莫厭客中頻送客思鄉獨上望鄉臺題商山廟商洛秦時四老翁人傳羽化此山空若無仙眼何由見總在廟前花洞中題獨孤少府園林四面青山是四鄰烟霞成伴草成茵年年洞口桃花發不記曾經迷幾人送獨孤秀才下第歸太白山逸翮暫時成落羽將歸太白賞靈蹤須尋最近碧霄處擬倩和雲買一峯下第後病中獻玉頻年命未通窮秋成病悟眞空笑看朝市趨名者不病那知在病中送深上人歸江南留得蓮花偈付誰獨攜金䇿欲歸時江南無限蕭家寺曾與白雲何處期題自然觀劔閣門西第一峯道陵成道有高蹤行人若上升仙處須撥白雲三四重疾愈步庭花桃紅李白覺春歸强步閒庭力尚微從困不扶靈壽杖恐驚花裏早鶯飛籌筆店江亭九折巖邊下馬行江亭暫歇聽江聲白雲緑樹不關我枉與樵人樂一生贈賀若少府十日廣陵城裏住聽君花下撫金徽新聲指上懷中紙莫怪潛偷數曲歸太子劉舎人邀看花年少風流七品官朱衣白馬冶遊盤負心不報春光主幾處偷看紅牡丹薔薇花錦窠花朶燃叢醉翠葉眉稠裛露垂莫引美人來架下恐驚紅片落燕支望簡寂觀顧況青嶂青溪直復斜白雞白犬到人家仙人住在最高處向晚春泉流白花五兩歌送張夏竿頭五兩風褭褭水上雲帆逐飛鳥送君初出揚州時靄靄曈曈江溢曉臨海所居三首此是昔年征戰處曾經永日絶人行千家寂寂對流水唯有汀洲春草生此去臨溪不是遥樓中望見赤城標不知疊嶂重霞裏更有何人度石橋家在雙峯蘭若邊一聲秋磬發孤煙山連極浦鳥飛盡月上青林人未眠聽角思歸故園黄葉滿青苔夢後城頭曉角哀此夜斷腸人不見起行殘月影徘徊酬柳相公天下如今已太平相公何事喚狂生箇身恰似籠中鶴東望滄溟呌數聲題明霞臺野人本自不求名欲向山中過一生莫嫌憔悴無知已别有煙霞似弟兄哭絢法師楚客停橈欲問誰白沙江草麴塵絲生公手種殿前樹唯有花開鶗鴂悲送柳宜城葬鳴笳已逐春風咽匹馬猶依舊路嘶遥望柳家門外樹恐聞黄鳥向人啼宫詞五首禁柳煙中聞曉烏風吹玉漏盡銅壺内官先向蓬萊殿金合開香瀉御鑪玉樓天半起笙歌風送宫嬪笑語和月殿影開聞夜漏水精簾巻近銀河玉階容衛宿千官風獵青旂曉仗寒侍女先來薦瓊蘂露漿新下九霄盤九重天樂降神仙步舞分行踏錦筵嘈噆一聲鐘鼓歇萬人樓下拾金錢金吾持㦸護新簷天樂聲傳萬姓瞻樓上美人相倚看紅糚透出水精簾尋桃花嶺潘三姑臺桃花嶺上覺天低人上青山馬隔溪行到三姑學仙處還如劉阮二郎迷夜中望仙觀日暮銜花飛鳥還月明溪上見青山遥知玉女窗前樹不是仙人不得攀送李侍御往吳興世間只有情難說今夜應無不醉人若向洞庭山下過暗知澆瀝聖姑神送李秀才入京五湖秋葉滿行船八月靈槎欲上天君入長安予適越獨登秦望望秦川越中席上看弄老人不到山隂二十春鏡中相見白頭新此生不復爲年少今日從他弄老人贈朱放野客歸時無四鄰黔婁别乆桉常貧漁樵舊路不堪入何處空山猶有人聽歌子夜新聲何處傳悲翁更憶太平年只今法曲無人唱已逐霓裳飛上天贈韋清將軍身執金吾主禁兵腰閒寳劒重横行接輿亦是狂歌者更就將軍乞一聲贈僧二首家住義興東舍溪溪邊莎草雨無泥上人一向心入定春鳥年年空自啼出頭皆是新年少何處能容老病翁更把浮榮喻生滅世間無事不虚空登樓望水鳥啼花發柳含煙擲却風光憶少年更上高樓望江水故鄉何處一歸船湖中青草湖邉日色低黄茅嶂裏鷓鴣啼丈夫飄蕩今如此一曲長歌楚水西歳日作不覺老將春共至更悲攜手幾人全還丹寂寞羞明鏡手把屠蘇讓少年山中贈客山中好處無人别澗梅偽作山中雪野客相逢夜不眠山中童子燒松節王郎中妓席五詠玉作搔頭金步揺高張苦調響連宵欲知寫盡相思夢度水尋雲不用橋箜篌汗浥新裝畫不成絲催急節舞衣輕落花遶樹疑無影回雪從風暗有情舞柳拂青樓花滿衣能歌宛轉世應稀空中幾處聞清響欲遶行雲不遣飛歌秦聲楚調怨無窮隴水胡笳咽復通莫遣黄鶯花裏囀參差撩亂妬春風筝欲寫人間離别心須聽鳴鳳似龍吟江南曲盡歸何處洞水山雲知淺深笙送李山人還玉溪好鳥共鳴臨水樹幽人獨欠買山錢若爲種得千竿竹引取君家一眼泉送少微上人還鹿門少微不向吳中隱爲箇生縁在鹿門行入漢江秋月色襄陽耆舊幾人存宿昭應武帝祈靈太一壇新豐樹色繞千官豈知今夜長生殿獨閉山門月影寒題琅邪上方東晉王家在此溪南朝樹色隔窗低沈碑字滅昔人逺谷鳥猶向寒花啼安仁港口望仙人城樓臺采翠逺分明聞說仙家在此城欲上仙城無路上水邊花裏有人聲寄祕書包監一别長安路幾千遥知舊日主人憐賈生只是三年謫獨自無才已四年小孤山古廟楓林江水邊寒鴉接飯鴈横天大孤山逺小孤出月照洞庭歸客船葉道士山房水邊垂柳赤欄橋洞裏仙人碧玉簫近得麻姑書信否潯陽向上不通潮送李秀才游嵩山嵩山石壁挂飛流無限神仙在上頭采得新詩題石壁老人惆悵不同遊從剡溪至赤城靈溪宿處接靈山窈映高樓向月閒夜半鶴聲殘夢裏猶疑琴曲洞房間葉上題詩從苑中流出花落深宫鶯亦悲上陽宫女斷腸時君恩不閉東流水葉上題詩寄與誰崦裏桃花崦裏桃花逢女冠林間杏葉落仙壇老人方授上清籙夜聽步虛山月寒聽子規西霞山中子規鳥口邊血出啼不了山僧後夜初出定聞似不聞山月曉竹枝曲帝子蒼梧不復歸洞庭葉下荆雲飛巴人夜唱竹枝後腸斷曉猿聲漸稀㝷僧二首方文玲瓏花竹閒已將心印出人間家家門外長安道何處相逢是寶山彌天釋子本高情往往山中獨自行莫怪狂人游楚國蓮花只在淤泥生桃花曲魏帝宫人舞鳳樓隋家天子泛龍舟君王夜醉春眠晏不覺桃花逐水流贈逺暫出河邊思逺道却來窗下聽新鶯故人一别幾時見春草還從舊處生早春思歸有唱竹枝歌者坐中下淚𣺌𣺌春生楚水波楚人齊唱竹枝歌與君皆是思歸客拭淚看花奈老何送郭秀才故人曾任丹徒令買得青山擬獨耕不作草堂招逺客却將埀柳接啼鶯宫詞長樂宫連上苑春玉樓金殿豔歌新君門一入無由出唯有宫鶯得見人憶故園惆悵山多人復稀杜鵑啼處淚霑衣故園此去千餘里春夢猶能夜夜歸櫻桃曲百舌猶來上苑花遊人獨自憶京華遥知寢廟甞新後勑賜櫻桃向幾家佳人贈别萬里行人欲渡溪千行珠淚滴爲泥已成殘夢隨君去猶有驚烏半夜啼答顧況包幼正於越城邊楓葉落楚人書裏寄離騷寒江鸂鶒思儔侣歳歳臨流刷羽毛歳日作更勞今日春風至枯樹無枝可寄花覽鏡唯看飄亂髮臨風誰為駐浮槎别青州妓段東美薛宜僚阿母桃花方似錦王孫草色正如煙不須更向滄溟望惆悵歡情恰一年公子行孟賔于錦衣紅奪彩霞明侵曉春遊向野庭不識農夫辛苦力驕騘踏爛麥青青棲烏曲二首劉方平蛾眉曼臉傾城國鳴環動佩新相識銀漢斜臨白玉堂芙蓉行障揜燈光畫舸雙艚錦為纜芙蓉花發蓮葉暗門前月色映横塘感郎中夜波瀟湘送别華亭霽色滿今朝雲裏檣竿去轉遥莫怪山前深復淺清淮一日兩回潮夜月更深月色半人家北斗䦨干南斗斜今夜偏知春氣暖蟲聲新透緑窗紗春怨二首紗窗日落漸黄昏金屋無人見淚痕寂寞空庭春欲晩梨花滿地不開門朝日殘鸎伴妾啼開簾只見草萋萋庭前時有東風入楊柳千條盡向西萬首唐人絶句巻二十九
