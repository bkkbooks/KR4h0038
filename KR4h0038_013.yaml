body:
  text: 萬首唐人絶句巻十三宋洪邁編七言洪州逢熊孺登白居昜靖安院裏辛夷下醉笑狂吟氣㝡麤莫問别來多少苦低頭看取白髭鬚初著刺史緋荅賀客銀章蹔假為專城賀客來時懶起迎似挂緋衫衣架上朽株枮竹有何榮别草堂三絶句正聽山鳥向陽眠黄紙除書落枕前為感君恩須蹔起鑪峯不擬住多年久眠褐被為居士忽挂緋袍作使君身出草堂心不出盧山未要動移文三間茅舎向山開一帶山泉遶舎回山色泉聲莫惆悵三年官滿却歸來鍾陵餞送翠幕紅筵高在雲歌鐘一曲萬家聞路人指㸃滕王閣看送忠州白使君題峽中石上巫女廟花紅似粉昭君村柳翠於眉誠知老去風情少見此爭無一句詩贈康叟八十秦翁老不歸南賓太守乞寒衣再三憐汝非他意天寳遺民見漸稀木蓮樹三首如折芙蓉投旱地似抛芍藥挂高枝雲埋水隔無人識唯有南賓太守知紅似燕支膩如粉傷心好物不須㬰山中風起無時節明日重來得在無已愁花落荒巖底復恨根生亂石間幾度欲移移不得天教抛擲在深山聽竹枝贈李侍御巴童巫女竹枝歌懊惱何人怨咽多暫聽遺君猶悵望長聞教我復如何畫木蓮花圖寄元郎中花房膩似紅蓮朶豔色鮮如紫牡丹唯有詩人應觧愛丹青寫出與君看九日題塗溪萫草席鋪楓葉岸竹枝歌送菊花杯明年尚任南賔守或作重陽更一來和萬州楊使君四絶句競渡競渡相傳為汨羅不能止遏意無他自經放逐來顦顇能校靈均死幾多江邊草聞君澤畔傷春草憶在天門街裏時漠漠凄凄秋滿眼就中惆悵是江蘺嘉慶李東都緑李萬州栽君手分題我手開把得欲嘗先悵望與渠同别故鄉來白槿花秋蕣晚英無豔色何因栽種在人家使君只别羅敷靣爭觧回頭愛白花三月三日懷微之良時光景長虚擲壯歳風情已闇銷忽憶同為校書日毎年共醉是今朝和行簡望郡南山反照前山雲樹明從君苦道似華清試聽腸斷巴猿呌早晚驪山有此聲種荔枝紅顆真珠誠可愛白鬚太守亦何癡十年結子知誰在自向庭中種荔枝東樓醉天涯深峽無人地歳暮窮隂欲夜天不向東樓時一醉如何擬過二三年東樓招客夜飲莫辭數數醉東樓除醉無因破得愁唯有緑樽紅燭下暫時不似在忠州醉後戯題自知清冷似冬凌每被人呼作律僧今夜酒醺羅綺煖被君融盡玉壺氷竹枝詞四首瞿塘峽口水煙低白帝城頭月向西唱到竹枝聲咽處寒猿闇鳥一時啼竹枝苦怨怨何人夜静山空歇又聞蠻兒巴女齊聲唱愁殺江樓病使君巴東船舫上巴西波靣風生雨脚齊水蓼冷花紅簇簇江蘺濕葉碧萋萋江畔誰人唱竹枝前聲斷咽後聲遲怪來調苦縁詞苦多是通州司馬詩寄題楊萬州四望樓江上新樓名四望東西南北水茫茫無由得與君携手同凭闌干一望鄉荅楊使君登樓見憶中萬樓中憶故人南州煙水北州雲兩州何事偏相憶各是籠禽作使君題東樓前李使君所種櫻桃花身入青雲無見日手栽紅樹又逢春唯留花向樓前看故故抛愁與後人奉酬李相公碧油幢下捧新詩榮賤雖殊共一悲涕淚滿襟君莫怪甘泉侍從最多時戯贈蕭處士清禪師三杯嵬峩忘機客百納頭陀任運僧又有放傭巴郡守不營一事共騰騰錢虢州以三堂絶句見寄因以本韻和之同事空王歳月深相思逺寄定中唫遥知清淨中和化秪用金剛三昧心三月三日暮春風景初三日流世光隂半百年欲作閒遊無好伴半江惆悵却回船寒食夜四十九年身老日一百五夜月明天抱膝思量何事在癡兒癡女喚鞦韆代州民問龍昌寺底開山路巴子臺前種柳林官職家鄉都忘却誰人㑹得使君心荅州民宦情抖擻隨塵去鄉思銷磨逐月無唯擬騰騰作閒事遮渠不道使君愚荔枝樓對酒荔枝新熟雞冠色燒酒初開琥珀香欲􅎥一枝傾一盞西樓無客共誰嘗醉後贈人香毬趂拍回環匼花盞抛廵取次飛自入春來未同醉那能夜去獨先歸别種東坡花樹兩絶二年留滯在江城草樹禽魚盡有情何處殷勤重回首東坡桃李種新成花林好住莫顦顇春至但知依舊春樓上明年新太守不妨還是愛花人别橋上竹穿橋迸竹不依行恐礙行人被損傷我去自慙遺愛少不教君得似甘棠商山路驛桐樹昔與微之前後題名處與君前後多遷謪五度經過此路隅笑問中庭老桐樹這回歸去免來無殘春曲禁苑殘鶯三四聲景遲風慢暮春情日西無事墻隂下閒踏宫花獨自吟長安春青門柳枝軟無力東風吹作黄金色街東酒薄醉昜醒滿眼春愁消不得長樂坡行人南北分征路流水東西接御溝終日坡前恨離别漫名長樂是長愁獨眠吟夜長無睡起階前露落星河欲曉天十五年來明月夜何曾一夜不孤眠期不至紅燭清尊延久佇出門入門天欲曙星稀月落竟不來烟柳朧朧鵲飛去長洲苑春入長洲草又生鷓鴣飛起少人行年深不辨娃宫處夜夜蘓臺空月明憶江柳曾栽楊柳江南岸一别江南兩度春遥憶青青江岸上不知攀折是何人三年别悠悠一别已三年相望相思明月天腸斷青山望明月别來三十六回圓傷春詞深淺簷花千萬枝碧紗窻外轉黄鸝殘粧含淚下簾坐盡日傷春春不知後宫詞二首淚盡羅巾夢不成夜深前殿按歌聲紅顔未老恩先斷斜倚薫籠坐到明雨露由來一㸃恩爭能遍布及千門三千宫女臙脂靣幾箇春來無淚痕呉七郎中山人待制班中偶贈金馬東門隻日開漢庭待詔重僊才第三松樹非華表那得遼東鶴下來寄題忠州小樓桃花再逰巫峽知何日總是秦人説向誰長憶小樓風月夜紅闌干上兩三枝朝回和元少尹二絶朝客朝回回望好盡紆朱紫佩金銀此時獨與君為伴馬上青袍惟兩人鳳閣舍人京亞尹白頭俱未着緋衫南宫起請無消息朝散何時得入銜醉後酒後髙歌且放狂門前閒事莫思量猶嫌小户長先醒不得多時往醉鄉紫微花絲綸閣下文章静鐘鼓樓中刻漏長獨坐黄昏誰是伴紫微花對紫微郎馮閣老處見與嚴郎中唱和詩乍來江上宜清淨不用回頭望故山縱有舊遊君莫憶塵心起即墮人間立秋日登樂逰園獨行獨語曲江頭回馬遲遲上樂逰蕭颯涼風與衰鬢誰教計㑹一時秋夜筝紫袖紅絃明月中自弹自感闇低容絃凝指咽聲停處别有深情一萬重舊房遶壁秋聲蟲絡絲入簷新影月低眉床帷半故簾旌斷仍是初寒欲夜時自問黒花滿眼絲滿頭早衰因病病因愁宦途氣味已諳盡五十不休何日休和韓侍郎題楊舍人林池見寄渠水暗流春凍解風吹日炙不成凝鳳池冷煖君諳否二月因何更有氷送馮舍人閣老往襄陽紫微閣底送君回第一㕔簾下不開莫戀漢南風景好峴山花盡早歸來酬韓侍郎張博士雨後逰曲江見寄小園新種紅櫻樹開遶花行便當逰何必更隨鞍馬隊衝泥蹋雨曲江頭曲江憶李十一李君殁後共誰遊栁岸荷亭兩度秋獨遶曲江行一匝依前還立水邊愁青門栁青青一樹傷心色曾入幾人離恨中為近都門多送别長條折盡減春風梨園弟子白頭垂淚話梨園五十年前雨露恩莫問華清今日事滿山紅葉鎖宫門暮江吟一道殘陽鋪水中半江瑟瑟半江紅誰憐九月初三夜露似真珠月似弓思婦眉東風揺蕩自東來折盡櫻桃綻盡梅唯餘思婦愁眉結無限春風吹不開寒閨怨寒月沈沈洞房靜真珠簾外梧桐影秋霜欲下手先知燈底裁縫剪刀冷秋房夜雲露青天月漏光中庭立久却歸房水窻席冷未能卧挑盡殘燈秋夜長採蓮曲菱葉縈波荷颭水荷花深處小船通逢郎欲語低頭笑碧玉搔頭落水中鄰女娉婷十五勝天仙白日姮娥旱地蓮何處閒教鸚鵡語碧紗窻下繡牀前閨婦斜凭繡牀愁不動紅綃帶緩緑鬟低遼陽春盡無消息夜合花前日又西移牡丹栽金錢買得牡丹栽何處辭叢别主來紅芳堪惜還堪恨百處移將百處開聽夜箏有感江州去日聽箏夜白髮新生不願聞如今各是頭成雪彈到天明亦任君琵琶絃清撥剌語錚錚背却殘燈就月明賴是心無惆悵事不然争奈子絃聲和人琴思秋水蓮冠春草裙依稀風調似文君煩君玉指分明語知是琴心静不聞聽彈湘妃怨玉軫朱絃瑟瑟徽吳娃徵調奏湘妃分明曲裏秋雲雨似道蕭蕭郎不歸寓言題僧刼風火起燒荒宅苦海波生蕩破船力小無因救焚溺清涼山下且安禪内鄉村路作日下風髙野路涼緩驅疲馬闇思鄉渭村秋物應如此棗赤梨紅稻穂黄虚白堂虚白堂前衙退後更無一事到中心移牀就日簷間卧卧詠閒詩側枕琴題靈隠寺紅辛夷花戲酬光上人紫粉筆含尖火燄紅燕脂染小蓮花芳情香思知多少惱得山僧悔出家候山亭同諸客醉謝安山下空携妓栁渾洲邊只賦詩不及湖亭今日醉嘲花詠水贈蛾眉送李校書趁寒食歸義興山居大見騰騰詩酒客不憂生計似君稀到舍將何作寒食滿船唯載樹隂歸獨行暗誦黄庭經在口閑携青竹枝隨身晚花新筍堪為伴獨入林行不要人戲題木蘭花紫房日照燕脂拆素豔風吹膩粉開怪得獨饒脂粉態木蘭曾作女郎來湖中自照重重照影看容鬢不見朱顔見白絲失却少年無覔處泥池湖水欲何為木芙蓉花下招客飲晚凉思飲兩三杯召得江頭酒客來莫怕秋無伴醉物水蓮花盡木蓮開重詶周判官秋愛冷吟春愛醉詩家眷屬酒家仙若教早被浮名繫可得閒遊三十年代賣薪女贈諸妓亂蓬為鬢布為裙曉踏寒山自負薪一種錢塘江畔女著紅騎馬是何人遊恩徳寺雲水埋藏恩徳寺簪裾束縛使君身暫來不宿歸州去應被山呼作俗人題清頭陀頭陀獨宿寺西峰百尺禪菴半夜鐘烟月蒼蒼風瑟瑟更無雜事對山松自歎二首形羸自覺朝飡減睡少偏知夜漏長實事漸消虚事在銀魚金帶遶腰光二毛曉落梳頭懶兩眼春昏㸃藥頻唯有閒行猶得在心情未到不如人贈内漠漠闇苔新雨地微微凉露欲秋天莫對月明思往事損君顔色減君年萬首唐人絶句巻十三欽定四庫全書萬首唐人絶句巻十三宋洪邁編五言郭隗陳子昂逄時獨為貴厯代非無才隗君亦何幸遂起黄金臺入峽苦風寄親友故鄉今日友歡㑹坐應同寧知巴峽路辛苦石尤風題田洗馬桔橰望花長為客商山遂不歸誰憐北陵客未息漢隂機古意白雲蒼梧來氲氲萬里色聞君太平代栖泊靈臺側子夜四時歌郭元振春歌二首青樓含日光緑池起風色贈子同心花殷勤此何極陌頭楊栁枝已被春風吹妾心正㫁絶君懐那得知秋歌二首邀懽空佇立望美頻回顧何時復採菱江中宻相遇辟惡茱萸囊延年菊花酒與子結綢繆丹心此何有冬歌二首北極嚴氣昇南至温風謝調絲競短歌拂枕憐長夜帷横雙翡翠被巻雨鴛鴦婉態不自得宛轉君王牀王昭君聞有南河信傳言殺畫師始知君念重更肯惜娥眉春江曲江水春沈沈上有雙竹林竹葉壊水色郎亦壊人心堂堂李義府懶整鴛鴦被羞褰玳瑁牀春風别有意宻處也尋香賦美人鏤月成歌扇裁雲作舞衣自憐回雪影好取洛川歸詠烏日裏颺朝彩琴中伴夜啼上林如許樹不借一枝棲洛隄步月上官儀脉脉廣川流驅馬厯長洲鵲飛山月曉蟬噪野風秋塞下曲六首盧綸鷲翎金僕姑鷰尾繡蝥弧獨立揚新令千營共一呼林暗草驚風將軍夜引弓平明尋白羽沒在石稜中月黒鴈飛高單于夜遁逃欲將輕騎逐大雪滿弓刀野幕蔽瓊筵羌戎賀勞旋醉和金甲舞雷鼔動山川調箭又呼鷹俱聞出世能奔狐將迸雉掃盡古丘陵亭亭七葉貴蕩蕩一隅清他日題麟閣唯應獨不名天長地久詞三首玉砌紅花樹香風不敢吹春光解天意偏發殿南枝虹橋千步廊半在水中央天子方消暑宫人重暮籹辭輦復當熊傾心奉上宫君王若看鏡甘在衆妃中妾薄命妾年初二八兩度嫁狂夫薄命今猶在堅貞掃地無酬李益戚戚一西東十年今始同可憐歌酒夜相對兩衰翁長門怨空宫古廊殿寒月落斜暉卧聴未央曲滿箱歌舞衣春詞北苑羅裙帯塵衢錦繡鞋醉眠芳樹下半被落花埋山下泉皇甫曽漾漾帶山光澄澄倒林影那知石上喧却憶山中静題畫帳二首皇甫冉朝見巴山客暮見巴山客雲㠶儻暫駐中路陽臺夕湘水風日滿楚山朝夕空連峰雖已見猶念長雲中送王司直西塞雲山逺東風道路長人心勝潮水相送過尋陽有懐舊國迷江樹他鄉近海門移家南渡久童稚解方言淮口寄趙員外欲逐淮潮上暫停漁子溝相望知不見終是屢回頭初出沅江夜入湖放溜出江口回瞻松栝深不知舟中月那引湖間心渡汝水向大和山落日花攀折西南投一峰誠知秋水淺但怯無人蹤月下作霜風驚度鴈月露皎疎林處處砧聲發星河秋夜深逺山少室盡西峰鳴臯隱南面柴門縱復闗今日忩中見南澗上客各乗軒髙朋盡鳴玉寜知飲澗人自愛輕波渌山館山館長寂然閑雲朝夕來空庭復何有落日照青苔倢伃春怨花枝繞建章鳯管出昭陽借問承恩者雙蛾㡬許長秋怨長信多秋氣昭陽借月華那堪閉永巷聞道選良家贈寄權三客舍南橋春日暮楊栁帯清渠不得同携手空城意有餘望南山雪懐山寺普上人夜夜夢連宫無由見逺公朝來出門望知在雪山中病中對石竹花數㸃空階下閒凝細雨中那能久相伴嗟爾滯秋風送人還剡中舊居海岸耕殘雪溪沙釣夕陽家中何所有春草漸看長逺客行隨新樹深夢隔重山逺迢遞風日間蒼茫洲渚晚禁省梨花巧解迎人笑還能亂蝶飛春風時入户㡬片落朝衣送裴陟歸常州夜雨頻停棹秋風暗入衣見君常北望何事却南歸洪澤館壁見故禮部尚書題詩底事洪澤壁空留黄巻詞年年淮水上行客不勝悲銅雀妓二首崔道融嚴籹垂玉筯妙舞對清風無復君王顧春來起漸慵歌咽新翻曲香銷舊賜衣陵園風雨暗不見六龍歸春閨二首寒食月明雨落花香滿泥佳人持錦字無鴈寄征西欲剪冝春字春寒入剪刀遼陽在何處莫望寄征袍訪僧不遇尋僧已寂寞林下鎻山房松竹雖無語牽衣借晚凉田上雨足髙田白披蓑半夜耕人牛力俱盡東方殊未明月夕月上隨人意人閑月更清朱樓髙百尺不見到天明槿花槿花不見夕一日一回新東風吹桃李須到明年春西施灘宰嚭亡呉國西施䧟惡名浣沙春水急似有不平聲江上逢故人故里琴樽侣相逢近臘梅江村買一醉破淚却成咍牧豎牧豎逢蓑笠逢人氣傲然卧牛吹短笛耕却傍溪田過農家欲羡農家子秋新看刈禾蘇秦無負郭六印又如何江夕江心秋月白起柁信潮行蛟龍化為人半夜吹笛聲春墅蛙聲近過社農事忽已忙鄰婦餉田歸不見白花芳江村日暮片㠶落江村如有情獨對沙上月滿船人睡聲擬樂府子夜四時歌四首呉子愛桃李月色不到地明朝欲看花六宫人不睡涼軒待月生暗裏螢飛出低回不稱意蛙鳴亂清瑟月色明如晝蟲聲入户多狂夫自不歸滿地無天河銀缸照殘夢零淚霑粉臆洞房猶自寒何况闗山北寄人二首花上斷續雨江頭來去風相思春欲盡未遣酒尊空澹澹長江水悠悠逺客情落花相與恨到地一無聲江鷗白鳥波上棲見人懶飛起為有求魚心不是戀江水春晚三月寒食時日色濃於酒落盡牆頭花鶯聲隔原栁漢宫詞獨詔宫衣出天花落殿堂他人不敢妬垂淚向君王旅行少壯經勤苦衰年始浪遊誰憐不龜手他處却封候班婕妤寵極辭同輦恩深弃後宫自題秋扇後不敢怨春風有題十載元正酒相歡意轉深自量麋鹿分只合在山林古樹古樹春風入陽和力太遲莫言生意盡更引萬年枝春題二首青春未得意見花却如讎路逄白面郎醉挿花滿頭滿眼桃李花愁人如不見别有惜花人東風莫吹散長安春長安牡丹開繡轂輾晴雷若使花長在人應看不回病起二首病起春已晚曵笻傷緑苔强攀庭樹枝喚作花未開庭起繞庭除春泥粘屐齒如從萬里來骨肉滿面喜峽路清猿啼不住白水下來新八月莫為客夜長愁殺人長門怨長門春欲盡明月照花枝買得相如賦君恩不可移月夕有懐圓光照一海逺客在孤舟相憶無期見中宵獨上樓夜泊九江夜泊江門外歡聲月裏樓明朝歸去路猶隔洞庭秋寒食夜滿地梨花白風吹碎月明大家寒食夜獨貯望鄉情歸燕海燕頻來去西人獨滯留天邊又相送膓㫁故園秋長安春珠箔映髙栁美人紅袖埀忽聞半天語不見上樓時漢宫曲二首韓翃駿馬踏障泥紅塵撲四蹄歸時何太晚日照杏花西繡幙珊瑚鉤香閨翡翠樓深情不肯道驕倚鈿箜篌别離作戎昱手把杏花枝未曾輕别離黄昏掩門後寂寞心自知贈薛瑤英賈至舞怯銖衣重笑疑桃臉開方知漢成帝虚築避風臺洛中有懐于武陵潺潺伊洛河寂寞隔恩波鑾駕不東幸洛陽春草多送魏山田處士西遊隂隂亭際閑相顧慘離顏一片雲飛去嵯峨空魏山長春宫莫問古宫名古宫空古城唯應東去水不改舊時聲高樓逺天明月出照此誰家樓上有羅衣裳涼風吹不秋歡酒勸君金鏤巵滿酌不須辭花發多風雨人生足别離萬首唐人絶句巻十三
