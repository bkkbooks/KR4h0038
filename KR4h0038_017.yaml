body:
  text: 萬首唐人絶句卷十七宋洪邁編七言怨詩張汯去年離别雁初歸今嵗裁縫螢已飛狂客未來音信斷不知何處寄寒衣李倉曹宅夜飲王昌齡霜天留飲故情歡銀燭金爐夜不寒欲問吳江别來意青山明月夢中看閨怨閨中少婦不知愁春日凝粧上翠樓忽見陌頭楊桞色悔教夫壻覔封侯浣紗女錢塘江畔是誰家江上女兒金勝花吳王在時不得出今日公然來浣紗題朱錬師山房叩齒焚香出世塵齋壇鳴磬步虛人百花仙醖能留客一飯胡麻度幾春聽流人水調子孤舟微月對風林分付鳴筝與客心嶺色千重萬重雨斷絃收與淚痕深宴春源源向春城花幾重江明深翠引諸峯與君醉失松溪路山館寥寥傳暝鐘龍標野宴沅溪夏晚足涼風春酒相携就竹叢莫道絃歌愁逺謫青山明月不曽空觀獵角鷹初下秋草稀鐡驄拋鞚去如飛少年獵得平原兔馬後橫梢意氣歸梁苑梁園秋竹古時煙城外風悲欲暮天萬乘旌旗何處在平臺賔客有誰憐送薛大赴安陸津頭雲雨暗湘山遷客離愁楚地顔遙送扁舟安陸郡天邉何處穆陵關别李浦之京故園今在霸陵西江畔逢君醉不迷小弟鄰莊尚漁獵一封書寄數行啼蕭駙馬花燭青鸞飛入合歡宫紫鳯銜花出禁中可憐今夜千門裏銀漢星回一道通甘泉歌乘輿執玉已登壇細草霑衣春殿寒昨夜雲生拜初月萬年甘露水晶盤旅望白花原頭望京師黃河水流無盡時秋天曠野行人絶馬首東來知是誰芙蓉樓送辛漸二首寒雨連江夜入吳平明送客楚山孤洛陽親友如相問一片氷心在玉壺丹陽城南秋海隂丹陽城北楚雲深髙樓送客不能醉寂寂寒江明月心重别李評事莫道秋江離别難舟船明日是長安吳姬緩舞留君醉隨意青楓白露寒别陶副使歸南海南越歸人夢海樓廣陵新月海亭秋寶刀留贈長相憶當取戈船萬戶侯送狄宗亨秋在水清山暮蟬洛陽樹色明臯煙送君歸去愁不盡又惜空度涼風天送人歸江夏寒天緑水楚雲深莫道離憂遷逺心曉夕雙帆歸鄂渚愁將孤月夢中尋送李五玉碗金罍傾送君江西日入起黃雲扁舟乘月暫來去誰道滄浪吳楚分送十五舅深林秋水近日空歸棹演漾清隂中夕浦離觴意何已草根寒露悲鳴蟲留别郭八長亭佇馬未能前井邑蒼茫含莫煙醉别何須更惆悵回頭不語但垂鞭送竇七秋江月色傍林湫波上熒熒望一舟鄂渚輕帆須早發江邉明月為君留巴陵送李十二搖拽巴陵洲渚分清江傳語便風聞山長不見秋城色日暮蒹葭空水雲送别魏二醉别江樓橘柚香江風引雨入船涼憶君遙在湘山月愁聽清猿夢裏長送裴圖南黃河渡頭歸問津離家幾日茱萸新漫道閨中飛破鏡猶看陌上别行人留别司馬太守辰陽太守念王孫逺謫沅溪何可論黃鶴青雲當一舉明珠吐著報君恩盧溪别人武陵溪口駐扁舟溪水隨君向北流行到荆門上三峽莫將孤月對猿愁送程六冬夜觴離在五溪青雲雪落鱠橙虀武岡前路看斜月片片舟中雲向西送朱越逺别舟中蔣山暮君行舉首燕城路薊門秋月隱黃雲期向金陵醉江樹别辛漸别館蕭條風雨寒扁舟月色渡江看酒酣不識關西道却望春江雲尚殘采蓮曲二首荷葉羅裙一色裁芙蓉向臉兩邉開亂入池中看不見聞歌始覺有人來吳姫越艷楚王妃爭㺯蓮花水濕衣來時浦口花迎入采罷江頭月送歸送柴侍御沅水通流接武岡送君不覺有離傷青山一道同雲雨明月何曽是兩鄉寄穆侍御出幽州一從恩譴渡瀟湘塞北江南萬里長莫道薊門書信少雁飛猶得到衡陽西江寄越弟南浦逢君嶺外還沅溪更逺洞庭山堯時恩澤如春雨夢裏相逢共入關長信秋詞五首金井梧桐秋葉黃珠簾不卷夜來霜熏籠玉枕無顔色卧聼南宫清漏長髙殿秋砧響夜闌霜深猶憶御衣寒銀燈青瑣裁縫歇還向金城明主看奉帚平明秋殿開且將團扇共徘徊玊顔不及寒鴉色猶帶昭陽日影來真成薄命久尋思夢見君王覺後疑火照西宫知夜飲分明復道奉恩時長信宫中秋月明昭陽殿下搗衣聲白露堂中細草迹紅羅帳裏不勝情西宫春怨西宫夜靜百花香欲卷珠簾春恨長斜抱雲和深見月朦朧樹色隱昭陽西宫秋怨芙蓉不及美人粧水殿風來珠翠香却恨含情掩秋扇空懸明月待君王從軍行五首烽火城西百尺樓黃昏獨坐海風秋更吹羌笛關山月無那金閨萬里愁琵琶起舞换新聲總是關山離别情撩亂邉愁聼不盡高髙秋月照長城青海長雲暗雪山孤城遙望玉門關黃沙百戰穿金甲不破樓蘭終不還秦時明月漢時關萬里長征人未還但使龍城飛將在不教邊馬度隂山大漠風塵日色昏紅旗半卷出轅門前軍夜戰洮河北已報生禽吐谷渾殿前曲三首昨夜風開露井桃未央前殿月輪高平陽歌舞新承寵簾外春寒賜錦袍貴人粧梳殿前催香風吹入殿後來仗引笙歌大宛馬白蓮花發照池臺玉殿笙歌西殿頭梨園弟子和涼州新聲一段高樓月聖主千秋樂未休青樓怨香幃風動花入樓髙調鳴筝緩衣愁腸斷關山不解説依依殘月下簾鈎青樓曲二首白馬金鞍從武皇旌旗十萬宿長楊樓頭小婦鳴筝坐遙見飛塵入建章馳道楊花滿御溝紅粧謾綰上青樓金章紫綬千餘騎夫壻朝回初拜侯山中盧綸飢拾松花渴飲泉偶從山後到山前陽陂軟草厚如織因與鹿麛相伴眠與從弟同下第出關言别三首同作金門獻賦人二年悲見故園春到闕不沾新雨露還家空帶舊風塵雜花飛盡桞隂隂官路逶迤緑草深對酒已成千里客望山空寄兩鄉心出關愁暮一沾裳滿野蓬生古戰場孤村樹色昏殘雨逺寺鐘聲帶夕陽逢病軍人行多有病住無糧萬里還鄉未到鄉蓬鬢哀吟古城下不堪秋氣入金瘡村雨逢病叟雙膝過頥項在肩四鄰知姓不知年卧驅鳥雀惜禾黍猶恐諸孫無社錢崇福看花聞道山花如火紅平生登寺已經風老僧無見亦無説應與看人心不同渾贊善東齋戲贈陳歸長裾珠履颯輕塵間以琴書列上賔公子無讎可邀請侯嬴此坐是何人春日登樓有懷花正濃時人正愁逢花却欲替花羞年來笑伴皆歸去今日晴明獨上樓題玉真公主影堂夕照間窗起暗塵青松鎖殿不知春君看白髮誦經者盡是宫中歌舞人西江看花紅枝欲折紫枝殷隔水連宫不用攀會待長風吹落盡始能開眼向青山贈别李紛頭白乘驢縣市囊一回言别淚千行兒孫滿眼無歸處唯到尊前是故鄉古絶詞二首殘粧色淺髻鬟開笑映珠簾覻客來推醉唯知㺯花鈿潘郎不敢使人催自拈裙帶結同心暖處偏知香氣深愛捉狂夫問間事不知歌舞用黃金宫中樂二首臺殿雲涼秋色微君王初賜六宫衣樓船泛罷歸猶早行遣才人鬪射飛雲日呈祥禮物殊彤庭生獻五單于塞垣萬里無飛鳥可在邉城用郅都春日有懷桃李風多日欲隂伯勞飛處落花深貧居靜久難逢信知隔春山不可尋駙馬花燭萬條銀燭引天人十月長安半夜春步障三千無間斷幾多珠翠落香塵曲江春望三首菖蒲翻葉桞交枝暗上蓮舟鳥不知更到無花最深處玉樓金殿影參差翠黛紅粧畫鷁中共驚雲色帶微風簫管曲長吹未盡花南水北雨濛濛泉聲遍夜入芳洲擁沫吹花上碧流二月行人漸無路巢蜂乳燕滿髙樓早梅一樹寒梅白玉條􅒯臨村路傍溪橋應緣近水花先發疑是經春雪未消采蓮曲涔陽女兒花滿頭毿毿同泛木蘭舟秋風日暮南湖裏爭唱菱歌不肯休塞上曲朔風略地燒連山碎葉孤城未下關山頭烽子聲聲呌知是將軍夜獵還征人歸鄉三月江城桞絮飛五年遊客送人歸故將别淚和鄉淚今日闌干濕汝衣宿湘江九月湘江水漫流沙邉惟覽月華秋金風浦上吹黃葉一夜紛紛滿客舟戲贈張使君數載蹉跎罷縉紳五湖乘興轉迷津如今野客無家第醉處尋常是主人題宋玉亭宋玉亭前悲暮秋陽臺路上雨痕收應緣此處人多别松竹蕭蕭也帶愁公安賈明府葉縣門前江水深淺於羈客報恩心把君詩卷西歸去一度相思一度吟過商山雨暗商山過客稀路傍孤店閉柴扉卸鞍良久茒簷下待得巴人樵采歸早春雪中隂雲萬里晝漫漫愁坐關心事幾般為報春風休下雪桞條初放不禁寒秋月二首江干入夜杵聲秋百尺疏桐挂斗牛思苦自緣明月苦人愁不似月華愁秋宵月色勝春宵萬里天涯靜寂寥近來數夜飛霜重只畏婆娑樹葉凋雲安阻雨日長巴峽雨濛濛又説歸州路未通遊人不及西江水先得東流到渚宫霽雪風卷長空暮雪晴江煙洗盡桞條輕簷前數片無人掃又得書窗一夜明槿花自用金錢買槿栽二年方始得花開鮮紅未許佳人見蝴蝶爭知早到來湖南春日二首自憐春日客長沙江上無人轉憶家光景却添鄉思苦簷前數片落梅花三湘漂寓若流萍萬里江鄉隔洞庭羇客春來心欲碎東風莫遣桞條青移家别湖上亭好是春風湖上亭桞條藤蔓繫離情黃鶯久住渾相識欲别頻啼四五聲送零陵妓寶鈿香蛾翡翠裙裝成掩泣欲行雲殷勤好取襄王意莫向陽臺夢使君過東平軍畫角初鳴殘照微營營鞍馬往來稀相逢士卒皆垂淚八座朝天何日歸塞下曲漢將歸來邊塞空旌旗初下玉關東高蹄戰馬三千匹落日平原秋草中湘南曲虞帝南遊不復還翠娥幽怨水雲間昨夜月明湘浦宿閨中珂珮度空山旅次寄湖南張郎中寒江近户慢流聲竹影臨窗亂月明歸夢不知湖水濶夜來還到洛陽城萬首唐人絶句卷十七欽定四庫全書萬首唐人絶句卷十七宋洪邁編五言原缺萬首唐人絶句卷十七
