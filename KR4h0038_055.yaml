body:
  text: 萬首唐人絶句卷五十五宋洪邁編七言敬酬陸山人二首戴叔倫黨議連誅不可聞直臣髙士去紛紛當時漏奪無人問出宰東陽笑殺君由來海畔逐樵漁奉詔因乘使者車却掌山中子男印自看猶是舊潛夫答崔法曹賦四雪楚僧躡雪來招隱先訪髙人積雪中已别剡溪逢雪去雪山修道與師同撫州被推昭雪答陸太祝三首求理由來許便宜漢朝龔遂不為疵如今謗起翻成纍唯有新人子細知貧交相愛果無疑共向人間聽直詞從古以來何限枉慚知暗室不曽欺春風旅館長庭蕪俯首低眉一老夫已對鐡冠窮事本不知廷尉念寃蕪送獨孤􅞥還京舉家相逐還鄉去不向秋風怨别時湖水兩重山萬里定知行盡到京師臨流送顧東陽海上獨歸慚不及邑中遺愛定無雙蘭橈起唱逐流去却恨山溪通外江行營送馬侍御萬里羽書來未絶五關烽火晝仍傳故人多病盡歸去唯有劉楨不得眠送秦糸五都來往無舊業一代公卿盡故人不肯低頭受羇束逺師溪上拂纓塵送裴判官回湖南莫怕南風且盡歡湘山多雨夏中寒送君萬里不覺逺此地曽為心鐡官再巡道永留别鬢下初驚白髮時更逢離别助秋悲從今不學四方事已共家人海上期别崔法曹欲作别離西入秦芝田棗徑往來頻東湖此夕更留醉逢著廬山學道人送蕭二擬向閒田老此身寒郊怨别甚於春又聞故里朋逰盡到日知逢何處人湘川野望懷王獨與佞人謀聞道忠臣入亂流今日登髙望不見楚雲湘水各悠悠將至道州寄李使君九疑深路繞山回木落天清猿晝哀猶隔簫韶一峰在遙傳五馬向東來與虞沔州謁藏真上人故侯將我到山中更上西風見逺公共問置心何處好主人揮手指虛空題招隱寺昨日臨川謝病還求田問舍獨相關宋時有井如今在却種胡麻不買山過珥瀆單老毫末成圍海變田單家依舊住溪邊比來已向人間老今日相過却少年族兄各年八十餘見招游洞鶴髮婆娑鄉里親相邀共看往年春擬將兒女歸來住且是茅山見老人登髙回乘月尋僧插鬢茱茰來未盡共隨明月下沙堆髙緇寂寂不相問醉客無端入定來客中作杜巖書劒催人不暫閒洛陽羇旅復秦關容顔嵗嵗愁遷改鄉國時時夢裏還登韓公堆崔滌韓公堆上望秦川渺渺關山西接連孤客一身千里外未知何日是歸年送别沈宇菊黃蘆白雁初飛羌笛胡琴淚滿衣送君腸斷秋江水一去東流何日歸途中孫逖鄴城東北望陵臺珠翠繁華去不回無復新䊋豔紅粉空餘故壟滿青苔過故人宅王喬故人軒騎罷歸來舊宅園林閉不開唯餘挾瑟髙堂婦哭向平生歌舞臺九日宴張諤秋葉風吹黃颯颯晴雲日照白鱗鱗歸來得問茱茰女今日登髙醉幾人西施石樓頴西施昔日浣紗津石上青苔思殺人一去姑蘇不復返岸傍桃李為誰春落第留別主人豆盧復客裏愁多不記春聞鶯始歎栁條新年年下第東歸去羞見長安舊主人上徐中書禇朝陽中禁仙池越鳳凰池邊詞客紫薇郎既能作頌雄風起何不時吹蘭蕙香嵩山尋馮鍊師不遇崔署青溪訪道凌煙署王子仙成已飛去更值空山雷雨時雲林薄暮歸何處春旦歌沈頌嘗聞嬴女玉簫臺奏曲情深彩鳳來欲登此地消歸恨却羡雙飛去不回南中感懷樊晃南路蹉跎客未回常嗟物候暗相催四時不變江頭草十月先開嶺上梅怨歌薛維翰百尺朱樓臨狹斜新䊋能唱美人車皆言賤妾紅顔好要自狂夫不憶家催䊋徐璧傳聞燭下調紅粉明鏡臺前别作春不須滿面渾䊋却留著雙眉待畫人古意徐振擾擾都城曉又昏六街車馬五侯門箕山渭水空明月可是巢由絶子孫落第怨刺胡曽翰苑何時休嫁女文昌早晚罷生兒上林新桂年年發不許平人折一枝寄妻李令有人教我向衡陽一度思歸欲斷腸為報艷妻兼少女與吾覔取朗州場贈潭州李尚書舒元輿湘江舞罷忽成悲便脫蠻靴出綘帷誰是蔡雍琴酒客魏公懷舊嫁文姬上蔡撫州張頂拋却長竿卷却絲手攜簑笠獻新詩臨川太守清如鏡不是漁人下釣時商山四老蔡京秦末家家思逐鹿商山四老獨忘機如何鬢髮霜相似更出深山定是非蠺婦杜荀鶴粉色全無饑色加豈知人世有榮華年年道我蠺辛苦底事渾身著苧麻老僧二首草屐無塵心地閒靜隨猿鳥過寒暄眼昏齒落經看遍却向僧中總不言童子為僧今白首暗鋤心地種閒情時將舊衲添新線披坐披行過一生閩中秋思雨勻紫菊叢叢色風弄紅蕉葉葉聲北畔是山南畔海秪堪圖畫不堪行贈僧利門名路兩何憑百嵗風前短焰燈只恐為僧僧不了為僧得了盡輸僧溪興山雨溪風卷釣絲瓦甌篷底獨斟時醉來睡著無人喚流下前灘也不知過巢湖世人貪利復貪榮來向湖邊始至誠男子登舟與登陸把心何不一般行傷硤石縣病叟無子無孫一病翁將何筋力事耕農官家不管蓬蒿地須隔王租出此中溪岸秋思桑柘窮頭三四家挂罾垂釣是生涯秋風忽起溪浪白零落岸邊蘆荻花春日旅寓滿城羅綺拖春色幾處笙歌揭畫樓江上有家歸未得眼前花是眼前愁秋夕二首世間多少能詩客誰是無愁得睡人自我夜來霜月下到頭吟魄始終身壞屋不眠風雨夜故園無信水雲秋病中枕上誰相問一一蟬聲槐樹頭田翁白髮星星筋力衰種田猶自伴孫兒官苗若不平平納任是豐年也受饑秋江雨夜逢詩友故友别來三四載新詩吟得百餘篇夜來江上秋無月恨不相逢在雪天感春無況青春有恨身眼前花似夢中春浮生七十今三十已是人間半世人宿欒城驛却寄常山張書記一更更盡到三更吟破離心句不成數樹秋風滿庭月憶君時復下階行湘江秋夕三秋月色三湘水浸骨寒光似練鋪一夜塞鴻來不住故鄉書信半年無贈崔道士四海兵戈無靜處人家廢業望烽煙九華道士渾如夢猶向尊前笑揭天題道林寺身未立間終日苦身當立後幾年榮萬般不及僧無事共水將山過一生旅懷二首蒹葭月冷時聞雁楊栁風和日聼鶯水涉山行二年客就中偏怕雨船聲月華星采坐來收嶽色江聲暗結愁半夜燈前十年事一時和雨到心頭經嚴陵釣臺蒼翠雲峰開俗眼泓澄煙水浸塵心唯將道業為芳餌釣得髙名直至今關試後筵上别同人日午離筵到夕陽明朝秦地與吳鄉同年多是長安客不信行人欲斷腸新雁暮天新雁起汀洲紅蓼花疏水國秋想得故園今夜月幾人相憶在江樓自遣糲食粗衣隨分過堆金積帛欲如何百年身後一邱土貧富髙低爭幾多子規楚天空濶月成輪蜀魄聲聲似告人啼得血流無用處不如緘口過殘春贈質上人枿坐雲逰出世塵兼無瓶鉢可隨身逢人不說人間事便是人間無事人秋夜苦吟吟盡三更未著題竹風松雨共淒淒此時若有人來聽始覺巴猿不解啼秋夜聞砧荒涼客舍眠秋色砧杵家家弄月明不及巴山聽猿夜三聲中有不愁聲上東川楊尚書二首栁棠莫言名位末相儔風月何曽阻獻酬前輩不須輕後輩靖安今日在衡州答楊尚書未向燕臺逢厚禮幸因社㑹接餘歡一魚喫了終無恨鯤化成鵬也不難為松滋令贈副戎南卓翺翔曽在玉京天墮落江南路幾千從事不須輕縣宰滿身猶帶御爐煙詠和親蘇郁關月夜懸青冢鏡塞雲秋簿漢宫羅君王莫信和親䇿生得羣雛敵更多鸚鵡詞莫把金籠閉鸚鵡箇箇分明解人語忽然更向君前語三十六宫愁幾許詠燕上主司歐陽澥翩翩雙燕畫堂開送古迎今幾萬回長向春秋社前後為誰歸去為誰來獻盧梓州萬彤雲何衣拭淚幾回穿欲謁朱門抵上天不是尚書輕下客山家無物與王權戲游䕫州盧子發白帝城頭二月時忍交清醒看花枝莫言世上無袁許客子由來是相師詠蟹皮日休未游滄海早知名有骨還從肉上生莫道無心畏雷電海龍王處也橫行金錢花隂陽為炭地為爐鑄出金錢不用模莫向人前逞顔色不知還解濟貧無醉題廣州使院鄭愚數年百姓受飢荒太守貪殘似虎狼今日海隅魚米賤大須慚愧石留黃題仙娥驛李日新商山食店大悠悠陳􅀈䭔饠古䭃頭更有夀終牛肉炙當盤數臠紫光毬戲張祜朱沖和白在東都元已薨蘭臺鳳閣少人登冬瓜堰下逢張祜牛屎堆邊說我能戲題盱眙壁韋鵬翼豈肯閒尋竹徑行却嫌絲管好蛙聲自從煮鶴燒琴後背却青山卧月明戲示諸妓張保嗣緑羅裙上標三棒紅粉腮邊淚兩行抄手向前咨大使這回不敢惱兒郎上浙東孟尚書孔融有箇將軍不得名唯教健卒喝書生尚書治化清如鏡天子官街不許行翻韻贈崔漳州黎瓘慣向溪邊折楊栁因循行客到州漳無端觸忤王衙押不得今朝看飲鄉春恨三首錢珝負罪將軍在北朝秦淮芳草緑迢迢髙臺愛妾魂消盡始倚丘遲為一招久戍臨洮報未歸篋香消盡别時衣身輕願比蘭階蝶萬里還尋塞草飛永巷頻聞小苑游舊恩如淚亦難收君前願報新顔色團扇須防白露秋蜀國偶題忽憶明皇西幸時暗傷潛恨竟誰知佩蘭應語宫臣道莫向金盤進荔枝未展芭蕉冷燭無烟緑蠟乾芳心猶卷怯春寒一緘書札藏何事㑹被東風暗折看奉和韓晉公晦日顧況江南無處不聞歌晦日中軍樂更多不是風光催柳色却緣威令動陽和悲歌四首我欲升天隔霄漢我欲渡水水無橋我欲上山山路險我欲汲水水泉遙越人翠被今何寂獨立江邊沙草碧紫燕西飛欲寄書白雲何處逢來客新結青絲百尺繩心在君家轆轤上我心皎潔君不知轆轤一轉一惆悵何處風光驚曉幕江南緑水通朱閣美人二八顔如花泣向春風畏花落催粧盧儲昔年將去玉京遊第一仙人許狀頭今日幸為秦晉㑹早教鸞鳳下粧樓獻淮南帥李嶸雞樹烟含瑞氣凝鳳池波待玉山澄國人久倚東關望擬築沙堤到廣陵勸少年李錡勸君莫惜金縷衣勸君須惜少年時有花堪折直須折莫待無花空折枝萬首唐人絶句卷五十五
