body:
  text: 萬首唐人絶句卷十一宋洪邁編七言春題華陽觀白居易帝子吹簫逐鳯皇空留仙洞號華陽落花何處堪惆悵頭白宫人掃影堂秋雨中贈元九不堪紅葉青苔地又是涼風暮雨天莫怪獨吟秋思苦比君較近二毛年城東間遊寵辱憂歡不到情任他朝市自營營獨尋秋景城東去白鹿原頭信馬行華陽觀桃花時招李六拾遺飲華陽觀裏仙桃發把酒看花心自知爭忍開時不同醉明朝後日即空枝洛中春感莫悲金谷園中月莫歎天津橋上春若學多情尋往事人間何處不傷神寄陸補闕前年同登科忽憶前年科第後此時雞鶴暫同羣秋風惆悵須吹散雞在中庭鶴在雲華陽觀中八月十五日夜招友玩月人道中秋明月好欲邀同賞意如何華陽洞裏秋壇上今夜清光此處多曲江憶元九春來無伴閒遊少行樂三分減二分何況今朝杏園裏閒人逢盡不逢君過劉三十二故宅不見劉君來近遠門前兩度滿枝花朝來惆悵宣平過桞巷當頭第一家下邽莊南桃花村南無限桃花發唯我多情獨自來日暮風吹紅滿地無人解惜為誰開三月三十日題慈恩寺慈恩春色今朝盡盡日徘徊倚寺門惆悵春歸留不得紫藤花下漸黃昏看渾家牡丹花戲贈李二十香勝燒蘭紅勝霞城中最數令公家人人散後君須看歸到江南無此花戲題新栽薔薇移根易地莫憔悴野外庭前一種春少府無妻春寂寞花開將爾當夫人酬王十八李大見招遊山自憐幽會心期阻復愧嘉招書信頻王事牽身去不得滿山松雪屬他人縣南花下醉中留劉五百歲幾回同酩酊一年今日最芳菲願將花贈天台女留取劉郎到夜歸宿楊家楊氏弟兄俱醉卧披衣獨起下高齊夜深不語中庭立月照藤花影上階醉中留别楊六兄弟春初攜手春深散無日花間不醉狂别後何人堪共醉猶殘十日好風光醉中歸盩厔金光門外昆明路半醉騰騰信馬回數日非關王事繫牡丹花盡始歸來遊雲居寺贈穆三十六地主亂峯深處雲居路共踏花行獨惜春勝地本來無定主大都山屬愛山人和王十八薔薇澗花時有懷蕭侍御兼見贈霄漢風塵俱是繫薔薇花萎故山深憐君獨向澗中立一把紅芳三處心再因公事到駱口驛今年到時夏雲白去年來時秋樹紅兩度見山心有愧皆因王事到山中期李十二文略王十八質夫不至獨宿仙遊寺文略也從牽吏役質夫何故戀囂塵始知解愛山中宿千萬人中無一人酬趙秀才贈新登科諸先輩莫羡蓬萊鸞鶴侣道成羽翼自生身看君名在丹臺者盡是人間修道人過天門街雪盡終南又欲春遙憐翠色對紅塵千車萬馬九衢上回首看山無一人惜玉蘂花有懷集賢王校書起芳意將闌風又吹白雲離葉雪辭枝集賢讎校無閒日落盡瑶花君不知重到育材宅有感欲入中門淚滿巾庭花無主兩回春軒忩簾幕皆依舊只是堂前缺一人亂後過流溝寺九月徐州新戰後急風殺氣滿山河唯有流溝山下寺門前依舊白雲多歎髮落多病多愁心自知行年未老髮先衰隨梳落去何須惜不落終須變作絲留别吳七正字成名共記甲科上署吏同登藝閣間唯是塵心殊道性秋蓬常轉水長閒邯鄲至除夜思家邯鄲驛裏逢冬至抱膝燈前影伴身想得家中夜深坐還應說著逺行人感故張僕射諸妓黃金不惜買蛾眉揀得如花三四枝歌舞教成心力盡一朝身去不相隨遊仙遊山暗將心地出人間五六年來人怪閒自嫌戀著未全盡猶愛雲泉多在山見尹公亮新詩䄂裏新詩十首餘吟看句句是瓊琚如何持此將干謁不及公卿一字書長安閒居風竹松烟晝掩關意中長似在深山無人不怪長安住何獨朝朝暮暮閒祕書省中憶舊山厭從薄宦校青簡悔别故山思白雲猶喜蘭臺非傲吏歸時應免動移文江南送北客因憑寄徐州兄弟書故園望斷欲何如楚水吳山萬里餘今日因君訪兄弟數行鄉淚一封書長安正月十五日喧喧車騎帝王州羈病無心逐勝遊明月春風三五夜萬人行樂一人愁宿桐廬館同崔存度醉後作江海漂漂共旅遊一樽相勸散窮愁夜深醒後愁還在雨滴梧桐山館秋寒食月夜風香露重梨花濕草舍無燈愁未入南鄰北里歌吹時獨倚柴門月中立晚秋閒居地僻門深少送迎披衣閒坐飬幽情秋庭不掃攜藤杖閒踏梧桐黃葉行為薛台悼亡半死梧桐老病身重泉一念一傷神手攜稚子夜歸院月冷房空不見人途中寒食路旁寒食行人盡獨占春愁在路旁馬上垂鞭愁不語風吹百草野田香題流溝寺古松烟葉葱蘢蒼麈尾霜皮駮落紫龍鱗欲知松老看塵壁死却題詩幾許人代鄰叟言懷人生何事心無定宿昔如今意不同宿昔愁身不得老如今恨作白頭翁寄湘靈淚眼凌寒凍不流每經高處即回頭遙知别後西樓上應憑欄干獨自愁冬至宿楊梅館十一月中長至夜三千里外遠行人若為獨宿楊梅館冷枕單牀一病身臨江送夏瞻悲君老别我霑巾七十無家萬里身愁見舟行風又起白頭浪裏白頭人冬夜示敏巢爐火欲消燈欲盡夜長相對百憂生他時諸處重相見莫忘今宵燈下情及第後憶舊山偶獻子虛登上第却吟招隱憶中林春蘿秋桂莫惆悵縱有浮名不繫心題忩竹不用裁為鳴鳯管不須截作釣魚竿千花百草凋零後留向紛紛雪裏看花下自勸酒酒盞酌來須滿滿花枝看即落紛紛莫言三十是年少百歲三分已一分題李十一東亭相思夕上松臺立蛩思蟬聲滿耳秋惆悵東亭風月好主人今夜在鄜州重尋杏園忽憶芳時頻酩酊却尋醉處重徘徊杏花結子春深後誰解多情又獨來曲江獨行獨來獨去何人識廄馬朝衣野客心閒愛無風水邉坐楊花不動樹隂隂同李十一醉憶元九花時同醉破春愁醉折花枝作酒籌忽憶故人天際去計程今日到梁州同錢員外題絶糧僧三十年來坐對山唯將無事化人間齊時往往聞鐘笑一食何如不食閒絶句代書贈錢員外欲尋秋景閒行去君病多慵我興孤可惜今朝山最好强能騎馬出來無禁中九日對菊花酒憶元九賜酒盈杯誰共持宫花滿把獨相思相思只傍花邉立盡日吟君詠菊詩答張籍憐君馬瘦衣裘薄許到江東訪鄙夫今日正閒天又暖可能扶病暫來無曲江早春曲江桞條漸無力杏園伯勞初有聲可憐春淺遊人少好傍池邉下馬行見元九悼亡詩夜淚暗銷明月幌春腸遙斷牡丹庭人間此病治無藥唯有楞伽四卷經寒食夜無月無燈寒食夜夜深猶立暗花前忽因時節驚年幾四十如今缺一年杏園花落時招錢員外同醉花園欲去去應遲正是風吹狼籍時近西數樹猶堪醉半落春風半在枝同錢員外禁中夜直宫漏三聲知半夜好風涼月滿松筠此時閒坐寂無語藥樹影中唯兩人禁中夜作書與元九心緒萬端書兩紙欲封重讀意遲遲五聲宫漏初明後一㸃忩燈欲滅時寄陳式五兄年來白髮兩三莖憶别君時髭未生惆悵料君應滿鬢當初是我十年兄送元八歸鳯翔莫道岐州三日程其如風雪一身行與君況是經年别暫到城來又出城雨雪放朝因懷微之歸騎紛紛滿九衢放朝三日為泥塗不知雨雪江陵府今日排衙得免無詠懷歲去年來塵土中眼看變作白頭翁如何辦得歸山計兩頃村田一畝宫酬錢員外雪中見寄松雪無塵小院寒閉門不似住長安煩君想我看心坐報道心空無可看獨酌憶微之獨酌花前醉憶君與君春别又逢春惆悵銀杯來處重不曾盛酒勸閒人微之宅殘牡丹殘紅零落無人賞雨打風摧花不全諸處見時猶悵望況當元九小亭前酬王十八見寄秋思太白峯頭雪晴憶仙遊洞口雲未報皇恩歸未得慙君為寄北山文和錢員外青龍寺上方望舊山舊峯松雪舊溪雲悵望今朝遙屬君共道使臣非俗吏南山莫動北山文惜牡丹花二首惆悵階前紅牡丹晚來唯有兩枝殘明朝風起應吹盡夜惜衰紅把火看寂寞萎紅低向雨離披破豔散隨風晴明落地猶惆悵何況飄零泥土中答元奉禮同宿見贈相逢俱歎不閒身直日常多齊日頻曉鼓一聲分散去明朝風景屬何人和元九駱口驛舊題詩拙詩在壁無人愛鳥汚苔侵文字殘唯有多情元侍御繡衣不惜拂塵看山枇杷花二首萬重青嶂蜀門口一樹紅花山頂頭春盡憶家歸未得低紅如解替君愁葉如裙色碧綃淺花似芙蓉紅粉輕若使此花兼解語推囚御史定違程亞枝花山郵花木似平陽愁殺多情驄馬郎還似升平池畔坐低頭向水自看粧江上笛江上何人夜吹笛聲聲似憶故園春此時聞者堪頭白況是多愁少睡人嘉陵夜有懷二首露濕牆花春意深西廊月上半牀隂憐君獨卧無言語惟我知君此夜心不明不暗朧朧月非暖非寒慢慢風獨卧空牀好天氣平明閒事到心中夜深行百牢關外夜行客三殿角頭宵直人莫道近臣勝遠使其如同是不閒人望驛臺靖安宅裏當忩桞望驛臺前撲地花兩處春光同日盡居人思客客思家江岸梨花梨花有思緣和葉一樹江頭惱殺君最似孀閨年少婦白粧素袖碧紗裙寄上大兄秋鴻過盡無書信病戴紗巾强出門獨上荒臺東北望日西愁立到黃昏寄內桑條初緑即為别柿葉半紅猶未歸不如村婦知時節解為田夫秋搗衣歎元九不入城門來五載同時班列盡官高何人牢落猶依舊唯有江陵元士曹得袁相書穀苖深處一農夫靣黑頭斑手把鋤何意使人猶識我就田來送相公書遊悟真寺山下别張殷衡世緣未了住不得孤負青山心共知愁君又入都門去即是紅塵滿眼時病中得樊大書荒村破屋經年卧寂絶無人問病身唯有東鄰樊著作至今書信尚殷勤開元九詩書卷紅箋白紙兩三束半是君詩半是書經年不展緣身病今日開看生蠧魚夜坐庭前盡日立到夜燈下有時坐徹明此情不語何人㑹時復長吁三兩聲暮立黃昏獨立佛堂前滿地槐花滿樹蟬大抵四時心總苦就中腸斷是秋天村夜霜草蒼蒼蟲切切村南村北行人絶獨出前門望野田月明蕎麥花如雪聞蟲聞蟲唧唧夜綿綿況是秋隂欲雨天猶恐愁人暫得睡聲聲移近卧牀前寒食夜有懷寒食非長非短夜春風不熱不寒天可憐時節堪相憶何況無燈各早眠萬首唐人絶句卷十一欽定四庫全書萬首唐人絶句卷十一宋洪邁編五言春首陳叔達雪花聨玉樹冰彩散瑤池翔禽遙出沒積翠逺參差初年和風起天露嚴氣銷冰井索索枝未柔厭厭漏猶永南行別弟韋承慶萬里人南去三春雁北飛不知何嵗月得共爾同歸曉發賀知章故鄉杳無際江臯聞曉鐘始見沙上鳥猶埋雲外峯偶遊主人園主人不相識偶坐為林泉莫漫愁酤酒囊中自有錢王昭君三首東方虬漢道方全盛朝廷足武臣何須薄命妾辛苦事和親掩涕辭丹鳳銜悲向白龍單于浪驚喜非復舊時容邊地無花草春來不自春自然衣帶緩非是為腰身題灞池王昌齡腰鐮欲何之東園刈秋韭世事不復論悲歌和樵叟擊磬老人雙峯褐衣久一磬白睂長誰識野人意徒看春草芳題僧房棕櫚花滿院苔蘚入閒房彼此名言絶空中聞異香送郭司倉映門淮水緑留騎主人心明月隨良掾春潮夜夜深送李十五怨別秦楚深江中秋雲起天長杳無隔月影在寒水送胡大荆門不堪別況乃瀟湘秋何處遙望君江邊明月樓送張四楓林已愁暮楚水復堪悲別後冷山月清猿無斷時留別武陵田太守按劍行千里微軀感一言曾為大梁客不負信陵恩武陵田太守席送司馬盧溪諸侯分楚郡飲餞五溪春山水清暉逺俱憐一逐臣從軍行大將軍出戰白日暗榆關三面黃金甲單于破膽還朝來曲日昃鳴珂動花連繡户春盤龍玉臺鏡唯待畫睂人送談八之桂林客心仍在楚江館復臨湘別意猿鳥外天寒桂水長惜春李益畏老身今老逢春解惜春今年看花伴已少去年人聽歌赤白桃李花赤白桃李花先皇在時曲欲向西宫唱西宫宫樹緑江南曲嫁得瞿塘賈朝朝誤妾期早知潮有信嫁與弄潮兒贈盧綸世故中年別餘生此㑹同却將悲與病獨對朗陵翁贈邢校書俱從四方事共㑹九秋中斷蓬與落葉相值各因風照鏡衰鬢臨照鏡將看却自疑慚君明似月照我白如絲路傍柳送人赴延州使府路傍一枝柳此路向延州延州在何處此路起邊愁書院無厯日問路侍御六月大小野性迷堯厯松窗有道經故人為柱史為我數階蓂見亡人題壁今日憶君處憶君君豈知空餘暗塵字讀罷淚仍垂軍次陽城烽舍北流泉何地可澘然陽城烽樹邊今朝望鄉客不飲北流泉天津橋南山中各題一句野坐分苔石山行繞菊叢雲衣惹不破秋色望來空答竇二曹長留酒還榼榼小非由榼星郎是酒星解酲元有數不用嚇劉伶聞雞膠膠司晨鳴報爾東方旭無事戀君軒今君重鳬鵠石樓山見月紫塞連年戍黃沙磧路窮故山今夜宿見月石樓中答宣供奉問蘭陵居居北有朝路居南無住人勞師問家第山色是南鄰觀射騎邊頭射雕將走馬出中軍逺見平原上翻身向暮雲幽州征戍在桑乾年年薊水寒殷勤驛西路此去向長安聽箏李端鳴箏金粟柱素手玉房前欲得周郎顧時時誤拂絃塞上曲雁塞日初晴胡關雪復平危竿懸廣漠古竇傍長城贈何兆文章似楊馬風骨又清羸江漢君猶在英靈信未衰送人下第獻䇿未得意馳車東出秦暮年千里客落日萬家春妾薄命自從君棄妾憔悴不羞人唯餘壞粉淚未免映衫勻送僧遊春獨將支遁去欲往戴顒家晴野人臨水春山未發花晦日遊曲江晦日同攜手臨流一望春可憐楊柳陌愁殺故鄉人溪行逢雨與柳中庸日落衆山昏蕭蕭暮雨繁那堪兩處宿共聽一聲猿和張尹憶東籬菊傳書報劉尹何事憶陶家若為籬邊菊山中有此花秋日反照入閭巷愁來與誰語古道無人行秋風動禾黍幽居作山舍千年樹江亭萬里雲回潮迎伍相驟雨送湘君題雲際寺故僧院白髮匆匆色青山草草心逺公仍下世從此別東林觀鄰老栽松雖過老人宅不解老人心何事殘陽裏栽松欲待陰贈胡居士孔融過五十海內故人稀相府恩猶在知君未拂衣薦福寺送元偉送客攀花後尋僧坐竹時明朝莫回望青草馬行遲哭苗垂舊友無由見孤墳草欲長月斜鄰笛盡車馬出山陽客行贈人旅行雖別路日暮各思歸欲下今朝淚知君亦溼衣蕪城風吹城上樹草沒城邊路城裏月明時精靈自來去贈山老人白首獨一身青山為四鄰雖行故鄉陌不見故鄉人拜新月開簾見新月便即下階拜細語人不聞北風吹裙帶劍客賈島十年磨一劍霜刃未嘗試今日把示君誰為不平事宿懸泉驛曉行瀝水樓暮到懸泉驛林月值雲遮山燈照愁寂絶句二首海底有明月圓於天上輪得之一寸光可買千里春中夜忽自起汲此百尺泉林木含白露星斗在青天詠韓氏二子千巖一尺壑八月十五夕清露墮桂花白鳥舞虛碧送別丈夫未得意行行且低睂素琴彈復彈㑹有知音知送客遊江湖莫歎迢遞分何如咫尺別江樓到夜登還見南臺月對月九日不出門十日見黃菊灼灼尚繁英美人無消息寄令狐相公䇿杖馳山驛逢人問梓州長江那可到行客替生愁投李益四十歸燕字千年外始吟已將書北嶽不用比南金雨中懷友人對雨思君子嘗茶近竹幽儒家鄰古寺不到又逢秋寄逺家住錦水上身征遼海邊十書九不到一到忽經年昆明池泛舟一枝青竹榜泛泛緑萍裏不見釣魚人漸入秋塘水續古陳陶曾夢諸侯笑康囚議脫枷千根池裏藕一朵火中花續古二十六首大堯登寶位麟鳳煥宸居海曲霑恩澤還生比目魚生值揖遜厯長歌東南春釣鼇年三十未見天子巡軒轅承化日羣鳳戲池臺大朴衰喪後仲尼生不來大道歸孟門蕭蘭日爭長想得巢居時碧江應無浪矻矻蓬舍下慕君麒麟閣笑殺王子喬寥天乘白鶴杳杳巫峽雲悠悠漢江水愁殺幾少年春風相憶地吳洲采芳客桂棹木蘭船日晚欲有寄徘徊春鳳前仙家風景晏浮世年華速邂逅漢武時蟠桃海東熟南國珊瑚樹好裁天馬鞭魚龍不解語海曲空嬋娟周穆恣遊幸橫天驅八龍寧知泰山下日日望登封秦國饒羅網中原絶麟鳳萬乘巡海回鮑魚空相送秦家無廟略備敵續長城萬姓隴頭死中原荆棘生秦作東海橋中州鬼辛苦縱得跨蓬萊羣仙亦飛去隋煬棄中國龍舟巡海涯春風廣陵死不見秦宫花范子相勾踐滅吳成大勳雖然五湖去終愧磻溪雲麟鳳識翔蟄聖賢明卷舒哀哉嵇叔夜智不及鶢鶋戰地三尺骨將軍一身貴自古若弔寃落花少於淚楚國千里旱土龍日已多九穀竟枯死好雲閒嵯峨漢家三殿色恩澤若飄風今日黃金屋明朝長信宫秦王卷衣貴本是倡家子金殿一承恩貂蟬滿鄉里魏宫薛家女秀色傾三殿武帝鼎湖歸一身似秋扇嬋娟越機裏織得雙棲鳳慰此殊世花金梭忽停弄學古三十載猶依白雲居每覽班超傳令人慵讀書雄劍久濩落夜吟秋風起不是懶為龍此非延平水朝為楊柳色暮作芙蓉好春風若有情江山相逐老景龍臨太極五鳳當庭舞誰信壁間梭升天作雲雨永嘉贈別芳草溫陽客歸心浙水西臨風清桂楫幾日白蘋溪萬首唐人絶句卷十一
