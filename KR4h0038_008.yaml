body:
  text: 萬首唐人絶句卷八宋洪邁編七言贈商亮戴叔倫日日河邊見水流傷春未已復悲秋山中舊宅無人住來往風塵共白頭夜發袁江寄李頴川劉侍御半夜回舟入楚鄉月明山水共蒼蒼孤猿更呌秋風裏不是愁人亦斷腸對酒三重江水萬重山山裏春風度日間且向白雲求一醉莫教愁夢到鄉關對月答袁明府山下孤城月上遲相留一醉本無期明年此夕遊何處縱有清光知對誰送上饒嚴明府攝玉山家在故林吳楚間氷為溪水玉為山更將舊政化鄰邑遙見逋人相逐還聽歌回秋風裏許杏花開杏樹傍邊醉客來共待客深聽一曲醒人騎馬斷腸回酬駱侍御答詩風傳畫閣空知曉雨濕江城不見春堆案繞牀君莫怪已經愁思古時人送孫直遊郴州孤舟上水過湘沅桂嶺南枝花正繁行客自知心有托不聞驚浪與啼猿麓山寺會送尹秀才湖上逢君亦不間暫將離别到深山飄蓬驚鳥那自定強欲相留雲樹間送董頲霜鴈羣飛下楚田羈人掩淚望秦天君行江海無定所别後相思何處邊别張員外木葉紛紛湘水濵此中何事往頻頻臨風自笑歸時晚更送浮雲逐故人送張評事城郭喧喧爭送逺危梁裊􅒁渡東津楊花展轉引征騎莫怪山中多看人送吕少府共醉流芳獨歸去故園高士日相親深山古路無楊栁折取桐花寄遠人送人遊嶺南少别華陽萬里遊近南風景不曾秋紅芳緑筍是行路縱有啼猿聽却幽妻亡後别妻弟楊栁青青滿路垂贈行惟折古松枝停舟一對湘江哭哭罷無言君自知和崔法曹建溪聞猿曽向巫山峽裏行羈猿一呌一回驚聞道建溪腸欲斷的知斷著第三聲湘南即事盧橘花開楓葉衰出門何處望京師沅湘日夜東流去不為愁人住少時代書寄京洛舊遊今年十月溫風起湘水悠悠生白蘋欲寄逺書還不敢却愁驚動故鄉人蘄州行營作蘄水城西向北看桃花落盡栁花殘朱旗半捲山川小白馬連嘶草樹寒題武當逸禪師蘭若我身本似逺行客况是亂時多病身經山涉水向何處羞見竹林禪定人穀城逢楊評事逺自五陵獨竄身築陽山中歸路新橫流夜長不得渡駐馬荒亭逢故人聽韓使君美人歌仙人此夜忽凌波更唱瑶臺一遍歌嫁與將軍天上住人間可得再相過雪中聽筝楊巨源玉柱泠泠對寒雪清商怨徴聲何切誰憐楚客向隅時一片愁心與絃絶盧龍塞行送韋掌記二首雨雪紛紛黑水外行人共指盧龍塞萬里飛沙壓鼓鼙三軍殺氣凝旌斾陳琳書記本翩翩料敵能兵奪酒泉聖主好文兼好武封矦莫比漢皇年題五老峯下費君書院解向花間栽碧松門前不負老人峯已將心事隨身隱認得溪雲第幾重僧院聽琴禪心何妨在玉琴真僧不見聽時心離聲怨調秋堂夕雲向蒼梧湘水深和武相公春曉聞鶯語恨飛遲天欲明殷勤似訴有餘情仁風已及芳菲節猶向花溪鳴幾聲唐昌觀玉蘂花晴空素艷照霞新香灑天風不到塵持贈昔聞將白雪蘂珠宫上玉花春山中主人十里青山有一家翠屏深處更添霞若為説得溪中事錦石和煙四面花和練秀才楊柳水邊楊柳麴煙絲立馬煩君折一枝唯有春風最相惜殷勤肯向手中吹太原贈李屬侍御路入桑乾塞鴈飛棗郎年少有光輝春風走馬三千里不廢看花君繡衣崔娘詩清潤潘郎玉不如中庭蕙草雪消初風流才子多春思腸斷蕭娘一紙書灞岸柳楊柳含煙灞岸春年年攀折為行人好風儻借低枝便莫遣青絲掃路塵題雲師山房雲公蘭若深山裏月明松殿微風起試問空門清淨心蓮花不著秋潭水城東早春詩家清景在新春緑柳才黃半未勻若待上林花似錦出門俱是看花人秋日登亭贈薛侍御潦倒從軍何取益東西走馬暫同遊梁王舊客皆能賦今日因何獨怨秋石水詞銀罌深鎖貯清光無限來人不得嘗知共金丹爭氣力一杯全勝五雲漿答振武李逢吉判官近來時輩都無興把酒皆言肺病同唯有單于李評事不將華髮負春風宫燕詞毛衣似錦語如絃日暖爭髙綺陌天幾處野花留不得雙雙飛向御爐前贈崔駙馬百尺梧桐畫閣齊簫聲落處翠雲低平陽不惜黃金埒細雨花驄踏作泥聽李慿彈箜篌二首聽奏繁絃玉殿清風傳曲度禁林明君王聽樂梨園暖翻到雲間第幾聲花咽嬌鶯玉漱泉名高半在御筵前漢王欲助人間樂從遣新聲墜九天臥水看花一樹紅花映緑波晴明騎馬好經過今朝幾許風吹落聞道蕭郎最惜多觀妓人入道二首荀令歌鐘北里亭翠娥紅粉敞雲屏舞衣施盡餘香在今日花前學誦經碧玉芳年事冠軍清歌空得隔花聞春來削髮芙蓉寺蟬鬢臨風隨緑雲白纓桃王母階前種幾株水晶簾內看如無只應漢武金盤上寫得珊珊白露珠白櫻樹記得花開雪滿枝和風和蝶帶花移只今花落遊蜂去空作主人惆悵詩聞友人看花朱慶餘尋花不問春深淺縱是殘紅也入詩每箇樹邊行一匝誰家園裏最多時陪韓中丞宴不飲酒老大無成仍足病縱聽絲竹亦無歡高情太守容間坐借與青山盡日看嶺南路越嶺向南風景路人人傳説到京城經時來往不踏雪盡在刺桐花上行種花憶昔兩京官道上可憐桃李盡成蹊不知誰作尋花使空記玄宗遣種時題仙遊寺石抱龍堂蘚石乾山遮白日寺門寒長松瀑布饒竒狀曾有仙人駐鶴看廬江途中遇雪蘆葦聲多葉滿陂濕雲連野見山稀遙知將吏相逢處半是春城賀雪歸公子行間蹤結客冶遊時忘却江樓薄暮期醉上黃金隄上去馬鞭捎斷緑楊絲登望雲亭招友日日恐無雲可望不辭逐靜望來頻共知亭下眠雲逺解到上頭能幾人寄劉少府唯愛圖書兼古器在官猶似未離貧更聞縣去青山逺稱與詩人作主人閨意上張水部洞房昨夜停紅燭待曉堂前拜舅姑籹罷低聲問夫壻畫眉深淺入時無採蓮隔煙花草逺濛濛恨箇來時路不同正是停橈相遇處鴛鴦飛出急流中都門晚望緑槐花墮御溝邊步出都門雨後天日暮野人耕種罷烽樓原上一條煙尋山僧吟背春城出草遲天晴紫閣赴僧期山邊樹下行人少一𣲖清泉日午時西亭晚宴蟲聲已盡菊花乾五老松隂向晚寒對酒看山俱惜去不知殘日下闌干與一二禪師題玢寺主院杖屨相隨在處便不唯空寄上方眠歸時亦取湖邊去晚映楓林共上船舜井碧甃磷磷不記年青蘿鎖在小山顛向來下視千山水疑是蒼梧萬里天宫中詞寂寂花時閉院門美人相並立瓊軒含情欲説宫中事鸚鵡前頭不敢言古觀古觀曾過知不逺花藏石室杳難尋泉邊白鹿聞人語看過天壇恨入深夏口送舍人赴杭州豈知鸚鵡洲邊路得見鳯凰池上人從此不同諸客禮故鄉南與郡城鄰商州王中丞留喫枳殼方物就中名最逺只應愈疾味偏佳若教盡喫人人與采盡商山枳殼花寄招胡明府語低清貌似休糧稱著朱衣入草堂消暑近來無别物桂隂當午滿繩牀登玄都閣野色晴冝上閣看樹隂遙映御溝寒豪家舊宅無人住空見朱門鎖牡丹贈鳯翔柳司録杏園北寺題名日數到如今四十年點檢生涯與官職一莖野竹在身邊榜曲荷花明滅水煙空惆悵來時徑不同欲到前州堪入處鴛鴦飛出碧流中逢山人星月相逢現此身自然無迹又無塵秋來若向金天會便是青蓮葉上人過耶溪春溪繚繞出無窮兩岸桃花正好風恰是扁舟堪入處鴛鴦飛起碧流中九日送别王之渙薊庭蕭瑟故人稀何處登高且送歸今日暫同芳菊酒明朝應作斷蓬飛涼州詞二首黃河逺上白雲間一片孤城萬仞山羌笛何須怨楊柳春光不度玉門關單于北望拂雲堆殺馬登壇祭幾回漢家天子今神武不肯和親歸去來宴詞長堤春水緑悠悠畎入漳河一道流莫聽聲聲歸去棹桃溪殘處不勝舟惆悵詞十二首八蠶薄絮鴛衾綺半夜佳期並枕眠鐘動紅娘喚歸去對人勻淚拾金鈿李夫人病已經秋漢武看來不舉頭得所穠華消歇盡楚魂湘血一生休謝家池館花籠月蕭寺房廊竹颭風半夜酒醒慿檻立所思多在别離中隋師戰艦欲亡陳國破應難保此身訣别徐郎淚如雨鑑鸞分後屬何人七夕瓊筵隨事陳兼花連蒂共傷神蜀王殿裏三更月不見驪山私語人夜寒春病不勝懷玉瘦花啼萬事乖薄幸檀郎斷芳信驚嗟猶夢合歡鞋嗚咽離聲管吹秋妾身今日為君休齊奴不説平生事忍看花枝謝玉樓青絲一路墮雲鬟金剪刀鳴不忍看持謝君王寄幽怨可能從此住人間陳宫興廢事難期三閣空餘緑草基狎客淪亡麗華死他年江令獨來時晨肇重來路已迷碧桃花謝武陵溪仙山目斷無尋處流水潺湲日漸西少卿降北子卿還朔野離觴慘别顔却到茂陵惟一慟節毛零落鬢毛斑夢裡分明入漢宫覺來燈背錦屏空紫臺月落關山曉腸斷君恩信畫工送僧二首馬戴親在平陽憶久歸洪河雨漲出關遲獨過舊寺人稀識一一松杉老别時龕中古樹自持行樹下禪牀坐一生來往白雲知歲久滿山猿鳥會經聲贈友人邊遊有客新從絶塞回自言曾上李陵臺尊前話盡北風起秋色蕭條胡鴈來山中作屐齒無泥竹䇿輕莓苔梯滑夜難行獨開石室松門裏月照前山空水聲出塞詞金帶連環束戰袍馬頭充雪度臨洮卷旗夜劫單于帳亂斫胡兒缺寶刀寄雲臺觀田秀才雪壓松枝拂石忩幽人獨坐鶴成雙晚來潄齒敲氷渚間讀仙書倚翠幢邊上送侍御鞠獄回獄成寃雪晚雲開豸角威清塞鴈回飛將送迎遙避馬離亭不敢勸金杯射雕騎蕃靣將軍著鼠裘酣歌衝雪在邊州獵過黑山猶走馬寒雕射落不回頭聞玉蘂院真人降二首嚴休復終日齋心禱玉宸魂消眼冷未逢真不如滿樹瓊瑶蘂笑殺藏花洞裏人羽車潛下玉龜山塵世何由覩蕣顔唯有無情枝上雪好風吹綴緑雲鬟萬首唐人絶句卷八欽定四庫全書萬首唐人絶句卷八宋洪邁編五言夜還東溪王績石苔應可踐叢枝幸易攀青溪歸路直乘月夜歌還山中別李處士為向東溪道人來路漸賒山中春酒熟何處得停家初春春來日漸長醉客喜年光稍覺池亭好偏聞酒甕香醉後阮籍醒時少陶潛醉日多百年何足度乘興且長歌題酒店壁昨夜瓶始盡今朝甕即開夢中占夢罷還向酒家來戲題卜鋪壁旦逐劉伶去宵隨畢卓眠不應長賣卜須得杖頭錢嘗春酒野觴浮鄭酌山酒漉陶巾但令千日醉何惜兩三春獨酌在生知幾日無狀逐空名不如多釀酒時向竹林傾秋夜喜遇王處士北場藝霍罷東臯刈黍歸相逢秋月滿更值夜螢飛山夜調琴促軫乘明月抽絃對白雲從來山水韻不使俗人聞看釀酒六月調神麴正朝汲美泉從來作春酒未省不經年入長安詠秋蓬示辛學士遇坎聊知止逢風或未歸孤根何處斷輕葉強能飛辛答託根雖異所飄葉早相依因風若有便更共入雲飛題酒店壁五首洛陽無大宅長安乏主人黃金消未盡秖為酒家貧竹葉連槽翠蒲桃帶麴紅相逢不令盡別後為誰空對酒但知飲逢人莫強牽倚壚便得睡橫甕足堪眠此日長昏飲非關養性靈眼看人盡醉何忍獨為醒有客須交飲無錢可別酤來時長道貰慚愧酒家壺他鄉敘興王勃綴葉歸煙晚乘花落照春邊城琴酒處俱是越鄉人夜興野煙含夕渚山月照秋林還將中散興來偶步兵琴臨江二首泛泛東流水飛飛北上塵歸驂將別棹俱是倦遊人去驂嘶別路歸棹隱孤舟江臯木葉下應想故城秋江亭夜月送別二首江送巴南水山橫塞北雲津亭秋月夜誰見泣離羣亂煙籠碧砌飛月向南端寂寂離亭掩江山此夜寒別人四首久客逢餘閏他鄉別故人自然堪下淚誰忍望征塵江上風煙積山幽雲霧多送君南浦外還望將如何桂條雖不駐蘭筵幸未開林塘風月賞應待故人來霜華淨天末霧色籠江際客子常畏人何為久留滯贈李十四四首野客思茅宇山人愛竹林琴樽唯待處風月自相尋小徑偏宜草空庭不厭花平生誰與酒自得會仙家亂竹開三徑飛花滿四鄰從來楊子宅別有尚玄人風筵調桂軫月徑引藤杯直當花院裏書齋望曉開早春野望江曠春潮白山長曉岫青他鄉臨睨極花柳映邊亭山中長江悲已滯萬里念將歸況復髙風晚山山黃葉飛冬郊行望桂密巖花白梨疏林葉紅江臯寒望盡歸念斷征蓬寒夜思友三首久別侵懷抱他鄉變容色月夜調鳴琴相思此何極雲間征思斷月下歸愁切鴻雁西南飛如何故人別朝朝翠山下夜夜蒼江曲復此遙相思清樽湛芳淥始平曉息觀闕長安近江山蜀路賒客行朝復夕無處是鄉家扶風晝屆離京浸逺帝里金莖去扶風石柱來山川殊未已行路方悠哉普安建陰題壁江漢深無極梁岷不可攀山川雲霧裏遊子何時還曲江池盧照鄰浮香繞曲岸圓影覆華池常恐秋風早飄零君不知臨階竹封霜連錦砌防露拂瑤階聊將儀鳳質暫與俗人諧含風蟬髙情臨爽月急響送秋風獨有危冠意還將衰鬢同浴浪鳥獨舞依磐石羣飛動輕浪奮迅碧沙前長懷白雲上葭川獨泛倚棹春江上橫舟石岸前山瞑行人斷迢迢獨泛仙送元兄入蜀關山客子路花柳帝王城此中一分手相顧憐無聲宿玄武方池開曉色圓月下秋陰已乘千里興還撫一絃琴二庭搖北風柳院繞南飛禽纍宿恩方重窮秋歎不深九隴津集落落樹陰紫澄澄水華碧復有翻飛禽徘徊疑曳舄登玉清絶頂橫臨日孤峯半倚天徘徊拜真老萬里見風煙遊昌化山精舍寶地乘峰出香臺接漢髙稍覺真途近方知人事勞詠照駱賓王寫月無芳桂照月有花菱不持光謝水翻將影學冰在軍登城樓城下風威冷江中水氣寒戎衣何日定歌舞入長安易水送人此地別燕丹壯士髮衝冠昔時人已沒今日水猶寒挑燈杖稟質非貪熱焦心豈憚熬終知不自潤何處用脂膏詠塵凌波起羅襪含風染素衣別有知音調聞歌應自飛玩初月忌滿光恆缺乘昏影漸流自能明似鏡何用曲如鈎和聖製函谷關張九齡函谷雖云險黃河復已清聖心無所隔空此置關城又渡潼關隱嶙故城壘荒涼空戍樓在德不在險方知王道休答靳博士上苑春先入中園花盡開唯餘幽徑草尚待日光催照鏡見白髮宿昔青雲志蹉跎白髮年誰知明鏡裏形影自相憐自君之出矣自君之出矣不復理殘機思君如滿月夜夜減清輝貴公子夜闌曲李賀裊裊沈水煙烏啼夜闌景曲沼芙蓉波腰圍白玉冷馬詩十六首龍脊貼連錢銀蹄白踏煙無人識錦韂誰為鑄金鞭忽憶周天子驅車上玉山鳴騶辭鳳苑赤驥最承恩大漠沙如雪燕山月似鈎何當金絡腦惱走踏青秋西母酒將闌東王飯已乾君王若燕去誰為拽車轅赤兔無人用當須吕布騎吾聞果下馬羈策任蠻兒飂叔死匆匆如今不豢龍夜來霜壓棧駿骨析西風內馬賜宫人銀韀刺騏驎年時鹽坂上蹭蹬溘風塵批竹初攢耳桃花未上身他時須攪陳牽去借將軍寶玦誰家子長聞俠骨香堆金買駿骨將送楚襄王香襆赭羅新盤龍蹙鐙鱗回看南陌上誰道不逢春不從桓公獵何能伏虎威一朝溝隴出看取拂雲飛白鐵銼青禾砧間落細莎世人憐小頸金埒畏長牙伯樂向前看旋毛生腹間祇今掊白草何日驀青山蕭寺馱經馬元從竺國來空知有善相不解走章臺汗血到王家隨鑾撼玉珂少君騎海上人見是青騾武帝愛神仙燒金得紫煙廄中皆肉馬不解上青天昌谷讀書示巴童蟲響燈光薄宵寒藥氣濃君憐垂翅客辛苦尚相從巴童答巨鼻宜山褐龎睂入苦吟非君唱樂府誰識怨秋深代崔家送客行蓋柳煙下馬蹄白翩翩恐送行處盡何忍重揚鞭莫種樹園中莫種樹種樹四時愁獨睡南牀月今秋似去秋將發東牀卷席罷濩落將行去秋白遙遙空日滿門前路塘上行藕花涼露溼花缺藕根澀飛下雌鴛鴦塘水聲溘溘京城驅馬出門意牢落長安心兩事誰向道自作秋風吟玉真公主山居儲光羲山北天泉苑山西鳳女家不言沁園好獨隱武陵花遊湖竹吹留歌扇蓮香入舞衣前溪多曲溆乘興莫先歸長安道二首西行一千里暝色生寒樹暗聞歌吹聲知是長安路鳴鞭過酒肆袨服遊倡門百萬一時盡含情無片言洛陽道五首洛水春冰開洛城春樹緑朝看大道上落花亂馬足大道直如髮春日佳氣多五陵貴公子雙雙鳴玉珂春風二月時道旁柳堪把上枝覆宫閣下枝拂車馬劇孟不知名千金買寶劍出入平津邸自言嬌且艷洛水照千門千門碧空裏少年不得志走馬遊新市江南曲四首緑江深見底髙浪直翻空慣是湖邊住舟輕不畏風逐流牽荇葉沿岸摘蘆苗為惜鴛鴦鳥輕輕動畫橈日暮長江裏相邀歸渡頭落花如有意來去逐船流隔江看樹色沿月聽歌聲不是長干住那從此路行萬首唐人絶句卷八
