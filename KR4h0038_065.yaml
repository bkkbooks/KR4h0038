body:
  text: 萬首唐人絶句巻六十五宋洪邁編七言酬人寄簟魚𤣥機珍簟新鋪翡翠樓泓澄玉水記方流惟應雲宿情相似同向銀床恨早秋和新及第悼亡一枝月桂和烟秀萬樹江桃帯雨紅且醉尊前休悵望古來悲樂與今同秋思自嘆多情是足愁况當風月滿庭秋洞房偏與更聲近夜夜燈前欲白頭江行二首大江横抱武昌斜鸚鵡洲前户萬家畫舸春眠朝未足夢為蝴蝶也㝷花烟花已入鸕鷀港畫舸猶題鸚鵡洲醉卧醒吟都不覺今朝驚在漢江頭聞李端公埀釣囘無限荷香染暑衣阮郎何處㺯船歸自慙不及鴛鴦佀猶得䨇䨇遶釣磯隠霧亭春花秋月入詩篇白日清宵是散仙空捲朱簾不曽下長移一榻對山眠重陽阻雨滿庭黄菊離邉折兩朶芙蓉鏡裏開落帽臺前風雨阻不知何處醉金盃江陵愁望有寄楓葉千枝復萬枝江橋掩映暮㠶遲憶君心似西江水日夜東流無歇時送别二首層城㡬夜愜心期不料仙鄉有别離睡覺不嫌雲去處殘燈一盞野蛾飛水柔逐器知難定雲出無心肯再歸惆悵春風楚江暮鴛鴦一隻失羣飛迎李員外薛濤今日喜時聞鵲喜昨宵燈下拜燈花焚香出入迎潘岳不羡牽牛織女家送盧員外玉壘山前風雪夜錦官城北别離魂信陵公子如相問長向夷門感舊恩聼僧吹蘆管曉蟬嗚咽暮鶯愁言語殷勤十指頭罷閱梵書勞一㺯散隨清磬泥清秋酬郭簡州寄柑子霜䂓不讓黄金色圓質仍含御史香何處同聲情最異臨川太守謝家郎上州主武相國二首落日重城夕霧収玳筵雕俎薦諸侯因令朗月當庭燎不使珠簾下玉鈎東閣移尊綺席陳貂簪龍節更宜春軍城畫角三聲歇雲幕初埀紅燭新憶荔枝傳聞象郡隔南荒絳實豐肌不可忘近有青衣連楚水素漿還得類瓊漿斛石山曉望寄吕侍御曦輪初轉照仙扄旋擘烟嵐上窅㝠不得𤣥暉同指㸃天涯蒼翠漫青青斛石山書王家山水裏圖中意思都盧粉墨容今日忽登虛境望步揺冠翠一千峰寄辭菌閣芝樓窅靄中霞開深見玉皇宫紫陽天上神仙客稱在人間立世功送姚員外萬條江桞早秋枝裊地翻風色未衰欲折爾來將贈别莫教烟月兩鄉悲酬祝十三秀才浩思藍山玉彩寒氷囊敲碎楚金盤詩家利器馳聲久何用春闈榜下㸔别李郎中花落梧桐鳯别凰想登秦嶺更凄凉安仁縱有詩將賦一半音詞雜悼亡送扶錬師錦浦歸舟巫峽雲綠波迢遞雨紛紛山隂妙術人傳久也説將鵝與右軍摩訶池贈蕭中丞昔以多能佐碧油今朝同泛舊仙舟凄凉逝水頽波逺唯有碑泉咽不流和李書記席上見贈翩翩射策東堂秀豈復相逢豁寸心可惜風光為誰麗萬條絲桞翠烟深棠梨花和李太尉吳均蕙圃移嘉木正及東谿春雨時日晚鶯啼何所為淺深紅膩壓繁枝酬文使君延英曉拜漢恩新五馬騰驤九陌塵今日謝庭飛白雪巴歌不復舊陽春酬吳隨君支公别墅接花扄買得前山總未經入户剡溪雲水滿髙齋咫尺躡青冥酬李校書才遊愛外身雖逺學茂區中事易聞自顧漳濵多病後空瞻遺翮舞青雲賦凌雲寺二首聞説凌雲寺裏苔風髙日近絶纖埃横雲照染芙蓉壁是待詩人寳月來聞説凌雲寺裏花飛空遶磴逐江斜有時鎻得嫦娥鏡縷出霞臺五色霞九日遇雨二首萬里驚颷朔氣深江城蕭索晝隂隂誰怜不得登山去可惜寒芳色似金茱萸秋節佳期阻金菊寒花滿院香神女欲來知有意先令雲雨暗池塘酬雍才貽巴峽圖千疊雲峯萬頃湖白波分去繞荆吳感君識我枕流意重示瞿塘峽口圖酬韋校書芸香誤比荆山玉那似登科甲乙年淡地鮮風將綺思飄花散蕋媚青天上王尚書碧玉雙幢白玉郎初辭天帝下扶桑手持雲篆題新榜十萬人家春日長和劉賓客玉蕣瓊枝的皪露珊珊欲折如披霞彩寒閑拂朱房何所似縁山偏映日輪殘江邉西風忽報燕䨇䨇人世心形兩自降不為魚腸有真訣誰能夜夜立清江贈蘇三十中丞洛陽陌上烟輪氣欲逐秋空繫隼飛今日芝泥檢徴詔别須臺上振霜威和郭員外題萬里橋萬里橋頭獨越吟知憑文字寫愁心納侯風韻兼前事不止為舟也為霖送鄭資州雨暗眉山江水流離人掩袂立髙樓雙旌千騎駢東陌獨有羅敷望上頭江亭宴餞緑沼紅泥物象幽范汪兼倅李并州離亭急管四更後不見車公心獨愁海棠溪春教風景駐仙霞水面魚身總帯花人世不思靈卉異競將紅纈染輕紗採蓮舟風前一葉厭荷蕖觧報新秋又得魚兎走烏馳人語静滿溪紅袂棹歌初菱荇沼水荇斜牽緑藻浮桞絲和葉卧清流何時得向溪頭賞旋摘菱花旋泛舟金燈花欄邉不見蘘蘘葉砌下唯飜艶艶叢細視欲將何物比曉霞初疊赤城宫春郊遊眺寄孫處士二首低頭久立白薔薇愛似零陵香惹衣何事碧鷄孫處士百勞東去燕西飛今朝縱目説芳菲夾纈籠裙繡地衣滿䄂滿頭兼手把教人識是㸔花歸酬楊供奉法師見招逺水長流潔復清雪牕髙卧與雲平不嫌袁室無烟火惟笑商山有姓名試新服裁製初成三首紫陽宫裏賜光綃仙霧䑃朧隔海遥霜兎毳寒氷蠒净嫦娥笑指織星橋九氣分為九色霞五靈仙馭五雲車春風因過東君舍偷様人間染百花長裾本是上清儀曾逐羣仙把玉芝毎到宫中歌舞㑹折腰齊唱步虚詞寄張元夫前溪獨立後溪行鷺識朱牕自不驚借問人間愁寂意伯牙絃絶已無聲酬辛員外折花見遺青鳥東飛正落梅銜花滿口下瑶臺一枝為授殷勤意把向風前旋旋開贈逺二首芙蓉新落蜀山秋錦字開緘到是愁閨閤不知戎馬事月髙還上望夫樓擾弱青蒲緑又齊春深花落塞前溪知君未轉秦闗騎日照千門掩䄂啼送友人水國蒹葮夜有霜月寒山色共蒼蒼誰言千里似今夕離夢杳如關路長秋泉冷色初澄一帯烟幽聲遥㵼十絲絃長來枕上牽情思不使愁人半夜眠題竹郎廟竹郎廟前多古木夕陽沉沉山更緑何處江村有笛聲聲聲盡是迎郎曲桞絮二月桞花輕復微春風搖蕩惹人衣他家本是無情物一向南飛又北飛贈楊藴中死後作玉漏深長烟耿耿東墻西墻時見影月明牕外子規啼忍使孤魂愁夜永邉將二首裴羽仙夫征匈奴不歸風巻平沙日欲曛狼烟遥認敵人羣李陵一戰無歸日望斷遥天哭塞塵良人平昔逐蕃渾力戰輕行出塞門從此不歸成萬古空留賤妾怨黄昏闔閭城懐古裴瑶五湖春水接遥天國破君亡不記年唯有妖娥曾舞處古臺寂寞起愁烟獨夜詞崔公逺晴天霜聚寒風急錦帳羅幃羞更入秦筝不復續斷絃囘身掩淚挑燈立寄故人張窈窕澹澹春風花落時不堪愁坐更相思無金可買長門賦有恨空吟團扇詩贈有思與君咫尺長離别遣妾容華為誰説夕望層城眼欲穿曉臨明鏡腸堪絶寄征人廉氏凄凄北風吹鴛被娟娟西月生蛾眉誰知獨夜相思處淚滴寒塘蕙草時春閨怨程長文綺陌香飄桞如線時光瞬息如流電良人何處事功名十載相思不相見怨詩二首姚月華春水悠悠春草緑對此思君淚相續羞將離恨向東風理盡春筝不成曲與君形影分胡越玉枕終年對離别登臺北望烟雨深囘身泣向寥天月長門怨二首劉媛雨滴梧桐秋夜長愁心和雨到昭陽淚痕不學君恩斷拭却千行更萬行學畫蛾眉獨出羣當時人道便承恩經年不見君王靣花落黄昏空掩門贈張雲容舞楊貴妃羅袖動香香不已紅蕖裊裊秋烟裏輕雲嶺上乍搖風嫩桞池邉初拂水謝人送酒孟昌期妻謝將清酒寄愁人澄澈香甘氣味真好是緑牕風月夜一杯揺動滿懷春夫下第杜羔妻劉氏良人的的有竒才何事年年被放囘如今妾靣羞君靣君到來時近夜來絶張生崔鶯鶯自從消瘦减容光萬轉千囘懶下牀不為傍人羞不起為郎憔悴却羞郎夫入相寄姨妹元載妻王氏相國已隨麟閣貴家風第一右丞詩笄年解笑鳴機婦耻見蘇秦富貴時喻元載阻客楚水燕歌動畫梁春蘭重換舞衣裳公孫開閤招嘉客知道浮榮不久長燕子樓感事三首張建封妾眄眄樓上殘燈伴曉霜獨眠人起合歡牀相思一夜情多少地角天涯不是長北邙松栢鎻愁烟燕子樓頭思悄然自埋劍履歌塵散紅袖香消已十年適㸔鴻雁岳陽囘又覩𤣥禽逼社來瑶琴玉瑟無意緒任教蛛網任從灰和白舍人自守空樓歛恨眉形同春後牡丹枝舍人不㑹人深意訝道泉臺不去隨獻陳陶處士豫章蓮花妓蓮花為號玉為腮珍重尚書遣妾來處士不生巫峽夢虚勞神女下陽臺題興元明珠亭京兆女子寂寥滿地落花紅獨有離人萬眼中囘首池塘更無語手彈珠淚與東風續韋蟾句武昌妓悲莫悲兮生别離登山臨水送將歸武昌無限新栽桞不見楊花撲靣飛寄歐陽詹太原妓自從别後减容光半是思郎半恨郎欲識舊來雲髻様為奴開取縷金箱酬趙象武氏妾非烟緑惨䨇蛾不自持只縁幽恨在新詩郎心應似琴心怨脉脉春情更泥誰答趙象獨坐無力嚴裝倚繡櫳暗題蟬錦思難窮近來贏得傷春病桞弱花欹怯曉風寄懷畫簷春燕須同宿蘭浦雙鴛肯獨飛長恨桃源諸女伴等閒花裡送郎歸答趙象相思只怕不相識相見還愁却别君願得化為松上鶴一䨇飛去入行雲歌送酒鮑生妾風颭荷珠難暫圓多情信有短因縁西樓今夜三更月還照離人泣斷絃憶崔生紅綃妓深洞鶯啼恨阮郎偷來花下醉珠璫碧雲飄斷音書絶空倚玉簫愁鳯凰贈段何客户里女子樂廣清羸經㡬年姹娘相託不論錢輕盈妙質歸何處惆悵碧樓紅玉鈿贈沈警張女娘仲妹洞簫響兮風生流清夜闌兮絃管遒長相思兮衡山曲心斷絶兮秦隴頭隴上雲車不復居湘川斑竹淚沾餘誰論衡山烟霧裏空㸔雁足不傳書萬首唐人絶句巻六十五
