  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0038_WYG_004-1a, image: WYG1349/WYG1349-0049c.png}
body:
  text: 萬首唐人絶句卷四宋洪邁編七言秋江送别二首王勃早是它鄉值早秋江亭明月帶江流已覺逝川傷别念復看津樹隱離舟歸舟歸騎儼成行江南江北互相望誰謂波瀾裁一水已覺山川是兩鄉寒夜懷友雜體二首北山烟霧始茫茫南津霜月正蒼蒼秋深客思紛無已復值征鴻中夜起復閣重樓向浦開秋風明月度江來故人故情懷故晏相望相思不相見登封大酺歌四首盧照鄰明君封禪日重光天子垂衣厯數長九州四海常無事萬嵗千秋樂未央日觀仙雲隨鳯輦天門瑞雪照龍衣繁絃綺席方終夜妙舞清歌歡未歸翠鳯逶迤登介丘仙鶴徘徊天上遊借問乾封何所樂人皆夀命得千秋千年聖主應昌期萬國淳風王化基請比上古無為代何如今日太平時九月九日旅眺九月九日眺山川歸心歸望積風烟他鄉共酌金花酒萬里同悲鴻雁天贈蘇管記杜審言知君書寄本翩翩為許從戎赴朔邊紅粉樓中應計日燕支山下莫經年發湘江他日林亭非舊遊今春花鳥作邊愁自憐京國人南竄不似湘江水北流緑珠怨三首喬知之石家金谷重新聲明珠十斛買娉婷昔日可憐君自許此時歌舞得人情君家閨閣不曽難好將歌舞借人看富貴雄豪非分理驕奢勢力橫相干别君去君終不忍徒勞掩袂傷紅粉百年離别在髙樓一代紅顏為君盡苑中逢雪應制宋之問紫禁仙輿詰旦來青旗遙傍望春臺不知庭雪今朝落疑是林花昨夜開下嵩山歌下嵩丘兮多所思携佳人兮步遲遲松間明月長如此君再逰時復何時和宋之問嵩山歌王無競日云暮兮下嵩丘路連綿兮松石間出谷口兮見明月心徘徊兮不能還奉和人日玩雪劉憲勝日登臨雲葉起芳風搖動雪花飛呈輝幸得承金鏡揚影還持奉玉衣夜燕安樂公主新宅屏軒洞户旦新披度曲飛觴夜不疲綺綴玲瓏河色繞珠簾隱映月華窺錢塘永昌始見郎官拜洛陽旋聞近侍發雕章緒言已朂期年政綺字先生滿路光奉和游苑遇雪龍驂曉入望春宫正逢春雪舞香風花光併灑天文上寒氣行銷御酒中少年行四首王維新豐美酒斗十千咸陽遊俠皆少年相逢氣味為君飲繫馬髙樓垂栁邊出身仕漢羽林郎初隨票騎戰漁陽熟知不向邊庭苦縱死猶聞俠骨香一身能擘兩雕弧敵騎千重只似無偏坐金鞍調白羽弦弦射殺五單于漢家君臣歡晏終高議雲臺論戰功天子臨軒賜侯印將軍佩出明光宫寄段十六與君相見即相親聞道君家在孟津為見行舟試借問客中時有洛陽人贈裴旻將軍腰間寶劍七星文臂上雕弓百戰勳見說雲中擒黠寇始知天上有將軍九月九日憶山東兄弟獨在異鄉為異客每逢嘉節倍思親遙知兄弟登髙處遍插茱萸少一人戲題磐石可憐磐石臨泉水復有垂楊拂酒杯若道春風不解意何因吹送落花來戲題輞川別業栁條拂地不須折松樹披雲從更長藤花欲暗藏猱子柏葉初齊養麝香過崔處士林亭緑樹重隂蓋四鄰青苔日厚自無塵科頭箕踞長松下白眼看他世上人送王尊師歸蜀中大羅天上神仙客濯錦江頭花栁春不為碧雞稱使者唯令白鶴報鄉人送元二使安西渭城朝雨裛輕塵客舍青青栁色春勸君更盡一杯酒西出陽關無故人靈雲池送從弟金杯緩酌清歌轉畫舸輕移艷舞回自歎鶺鴒臨水别不同鴻雁向池來寒食汜上作廣武城邊逢暮春汶陽歸客淚沾巾落花寂寂啼山鳥楊栁青青渡水人嘲史寰清風細雨濕梅花驟馬先過碧玉家正值楚王宫裏至門前初下七香車菩提寺禁聞逆賊凝碧池上作樂萬户傷心生野烟百官何日更朝天秋槐葉落空宫裏凝碧池頭奏管絃齊州送祖三送君南浦淚如絲君向東州使我悲為報故人憔悴盡如今不似洛陽時送韋平事欲逐將軍取右賢沙場走馬向居延遙知漢使蕭關外愁見孤城落日邊送沈子福楊栁渡頭行客稀罟師蕩槳向臨沂唯有相思似春色江南江北送君歸涼州賽神涼州城外少行人百尺烽頭望敵塵健兒擊鼓吹羌笛共賽城東越騎神别本維又有遊春詞等詩十五篇并五言十五篇皆王涯所作今以入涯詩中明妃詞四首儲光羲采騎雙雙引寶車羌笛兩兩奏胡笳苦為别得橫橋路不憶宫中玉樹花西行隴上泣胡天南向雲中指渭川毳幕夜來時宛轉何由得似漢王邊胡王知妾不勝悲樂府皆傳漢國詞朝來馬上箜篌引稍似宫中閒夜時日暮驚沙亂雪飛傍人相勸易羅衣强來前帳看歌舞共待單于夜獵歸題茅山華陽洞華陽洞口片雲飛細雨濛濛欲濕衣玉簫遍滿仙壇上應是茅家兄弟歸同武平一遊湖五首朝來仙閣聽絃歌瞑入花亭見綺羅池邊命酒憐風月浦口回船惜芰荷朦朧竹影蔽巖扉淡蕩荷風飄舞衣舟尋緑水宵將半月隱青林人未歸紅荷碧篠夜相鮮皂蓋蘭橈浮翠筵舟中對舞邯鄲曲月下雙彈盧女絃青林碧嶼暗相期緩楫揮觥欲賦詩借問嬌歌凡幾轉河低月落五更時花潭竹嶼傍幽溪畫楫浮空入夜溪菱荷覆水船難進歌舞留人月易低寄孫山人新林二月孤舟還水滿清江花滿山借問故園隱君子時時來去在人間除夜高適旅館寒燈獨不眠客心何事轉悽然故鄉今夜思千里秋鬢明朝又一年塞上聽吹笛雪淨胡天牧馬還月明羌笛戍樓間借問梅花何處落風吹一夜滿關山别董大二首六翮飄颻私自憐一離京洛十餘年丈夫貧賤應未是今日相逢無酒錢十里黃雲白日曛北風吹雁雪紛紛莫愁前路無知己天下誰人不識君初至封丘可憐薄暮宦遊子獨卧書齊思無已去家百里不得歸到官數月秋風起送桂陽孝亷桂陽年少西入秦數經甲科猶白身即今江海一歸客他日雲山萬里人玉真公主歌二首常言龍德本天仙誰謂仙人每學仙更道𤣥元指李日多於王母種桃年仙宫仙府有真仙天寶天仙祕莫傳為問軒皇三百嵗何如大道一千年營州歌營州少年厭原野皮裘䝉茸獵城下塞酒千杯不醉人胡兒十嵗能騎馬九曲詞三首鐡騎橫行鐡嶺頭西看邏逤取封侯青海只今將飲馬黃河不用更防秋許國從來徹廟堂連年不為在壇場將軍天上封侯印御史臺中異姓王萬騎爭歌楊栁春千場對舞繡麒麟到處盡逢歡洽事相看總是太平人送客舍李少府相逢旅館意多違暮雪初晴復雁飛主人酒盡君未醉薄暮塗遙歸不歸與村老對飲韋應物鬢眉雪色猶嗜酒言辭淳朴古人風鄉村年少生離亂見話先朝如夢中贈令狐曹士同使藍田先半日不相待秋簷滴滴對床寢山路迢迢聨騎行到家俱及東籬菊何事先歸半日程閒居贈僧滿郭春風嵐已昏雅棲吏散掩重門雖居世網常清淨夜對髙僧無一言將往滁城戀新竹停車欲去繞叢竹偏愛新筠十數竿莫遣兒童觸瓊粉留待幽人回日看雪夜下朝望省中南望青山滿禁闈曉陪鴛鷺正差池共愛朝來何處雪蓬萊宫裏拂松枝閒居寄人山明野寺曉鍾微雪滿幽林人跡希閒居寥落生髙興無事風塵獨不歸寄諸弟秋草生庭白露時故園諸弟益相思盡日髙齊無一事芭蕉葉上獨題詩登樓寄王卿踏閣攀林恨不同楚雲滄海思無窮數家砧杵秋山下一郡荆榛寒雨中寄諸弟二首嵗暮兵戈亂京國帛書間道訪存亡還信忽從天上落唯知彼此淚千行雨中禁火空齊冷江上流鶯獨坐聽把酒看花想諸弟杜陵寒食草青青簡二甥忽羡後生連榻話獨依寒燭一齊空時流歡笑事從别把酒吟詩待爾同寄黃尊師結茅種杏在雲端掃雪焚香宿石壇靈祗不許世人到忽作雷風登嶺難寄棕衣居士兀兀山行無處歸山中猛虎識棕衣俗客欲尋應不遇雲溪道士見猶稀送從叔獨樹沙邊人跡稀欲行愁逺暮鍾時野泉幾處侵應盡不遇山僧知問誰送王校書同坐髙齊換時節共看移石復栽杉送君江浦已惆悵更上西樓望逺帆送倉部蕭員外襆被蹉跎老江國情人邂逅此相逢不隨鴛鷺朝天去遙想蓬萊臺閣重送王卿别酌春林啼鳥稀雙旌背日晚風吹却憶回來花已盡東郊立馬望城池送秦系赴潤州近作新婚鑷白髮長懷舊卷映藍衫更欲携君虎丘寺不知方伯望征帆酬栁郎中春日歸揚州廣陵三月花正開花裏逢君醉一回南北相過殊未逺暮潮從去早潮來答東林道士紫閣西邊第幾峰茅齊夜雪虎行蹤遙看黛色知何處欲出山門尋暮鍾答端弟坐憶故園人已老寧知逺郡雁還來長瞻西北是歸路獨上城樓日幾回寄劉尊師世間荏苒縈此身長望碧山到無因白鶴徘徊看不去遙知下有清都人答秦十四校書知掩山扉三十秋魚須翠碧棄牀頭莫道謝公方在郡五言今日為君休故人重九日求橘憐君卧病思新橘試摘猶酸亦未黃書後欲題三百顆洞庭須待滿林霜休日訪人不遇九日驅馳一日閒尋君不遇又空還怪來詩思清人骨門對寒流雪滿山因省風俗訪道士姪不見去年澗水今亦流去年杏花今又拆山人歸來問是誰還是去年行春客春思野花如雪繞江城坐見年芳憶帝京閶闔曉開凝碧樹曽陪鴛鷺聽流鶯登寶意上方翠嶺香臺出半天萬家烟樹滿晴川諸僧近住不相識坐聽鳴鍾記往年琅邪山石門有雪無行跡松壑凝烟滿衆香餘食施庭寒鳥下破衣挂樹老僧亡尋簡寂觀瀑布躡石欹危過急澗攀崖迢遞弄懸泉猶將虎竹為身纍欲付歸人絶世緣野次聽橫吹立馬蓮塘吹橫笛微風動栁生水波北人聽罷淚將落南朝曲中怨更多聽琴竹林髙宇霜露清朱絲玉徽多故情暗識啼鳥與白鶴秪緣中有斷腸聲九日今朝把酒復惆悵憶在杜陵田舍時明年九日知何處世難還家未有期滁州西澗獨憐幽草澗邊生上有黃鸝深樹鳴春潮帶雨晚來急野渡無人舟自橫子規啼髙林滴露夏夜清南山子規啼一聲鄰家孀婦抱兒泣我獨展轉何為情萬首唐人絶句卷四欽定四庫全書萬首唐人絶句卷四宋洪邁編五言題李道士所居岑參五粒松花酒雙溪道士家唯求縮腳地鄉路莫教賒見渭水思秦川渭水東流去何時到雍州慿添兩行淚寄向故園流憶長安曲東望望長安正值日初出長安不可見喜見長安日滅敵曲都護新滅敵士馬氣亦粗蕭條邊塞淨突兀天山孤題汾橋邊柳曾居此郡十八年此地曾居住今來宛似歸可憐汾上柳相見也依依題三㑹寺倉頡造字臺野寺荒臺晚寒天古木悲空階有鳥跡猶似造書時九日思長安故園强欲登髙去無人送酒來遙憐故園菊應傍戰場開歎白髮白髮生偏速教人不奈何今朝兩鬢上又較數莖多經隴頭分水隴水何年有潺潺逼路旁東西流不歇曾斷幾人腸醉裏送人赴西鎮醉後未能別待醉方送君看君走馬去直入火山雲題城中髙居居住最髙處千家常眼前題詩飲酒後只對衆峰眠戲題關門來亦一布衣去亦一布衣羞見關城吏還從舊路歸答裴迪憶終南山王維渺渺寒流廣蒼蒼秋雨晦君問終南山心知白雲外聞裴迪吟詩戲贈猿吟一何苦愁朝復悲夕莫作巫峽聲腸斷秋江客贈韋穆與君青眼客共有白雲心不向東山去自令春草深雲溪雜題五首鳥鳴澗人閒桂花落夜靜春山空月出驚山鳥時鳴春澗中蓮花塢日日采蓮去洲長多暮歸弄篙莫濺水畏溼紅蓮衣鸕鷀堰乍向紅蓮沒復出青蒲揚獨立何䙰䙕銜魚古查上上平田朝耕上平田暮耕上平田借問問津者寧知沮溺賢萍池春池深且廣㑹待輕舟回靡靡緑萍合垂楊掃復開輞川二十首孟城坳新家孟城口古木餘衰柳來者復為誰空悲昔人有華子岡飛鳥去不窮連山復秋色上下華子岡惆悵情何極文杏館文杏裁為梁香茅結為宇不知棟裏雲去作人間雨斤竹嶺檀樂映空曲青翠漾漣漪暗入商山路樵人不可知鹿柴空山不見人但聞人語響反景入深林復照青苔上木蘭柴秋山斂餘照飛鳥逐前侣彩翠時分明夕嵐無處所茱萸沜結實紅且緑復如花更開山中倘留客置此茱萸杯宫槐陌仄徑蔭宫槐幽陰多緑苔譍門但迎掃畏有山僧來臨湖亭輕舸迎仙客悠悠湖上來當軒對尊酒四面芙蓉開南垞輕舟南垞去北垞渺難即隔浦望人家遙遙不相識欹湖吹簫凌極浦日暮送夫君湖上一回首青山卷白雲柳浪分行接綺樹倒影入清漪不學御溝上春風傷別離欒家瀨颯颯秋雨中淺淺石溜瀉跳波自相濺白鷺驚復下金屑泉日飲金屑泉少當千餘嵗翠鳳翔文螭羽節朝玉帝白石灘清淺白石灘緑蒲向堪把家住水東西浣沙明月下北垞北垞湖水北雜樹映朱欄逶迤南川水明滅青林端竹里館獨坐幽篁裏彈琴復長嘯深林人不知明月來相照辛夷塢木末芙蓉花山中發紅蕚澗户寂無人紛紛開且落漆園古人非傲吏自闕經世務偶寄一微官婆娑數株樹椒園桂樽迎帝子杜若贈佳人椒漿奠瑤席欲下雲中君送黎拾遺相送臨髙臺川原杳何極日暮飛鳥還行人去不息山中送別山中相送罷日暮掩柴扉春草明年緑王孫歸不歸別輞川別業依遲動車馬惆悵出松蘿忍別青山去其如緑水何山中寄弟妹山中多法侣禪誦自為羣城郭遙相望唯應見白雲別崔九弟城隅一分手幾日還相見山中有桂花莫待花如霰留別崔興宗駐馬欲分襟清寒御溝上前山景氣佳獨往還惆悵息夫人莫以今時寵難忘舊日恩看花滿眼淚不共楚王言班婕妤三首玉窗螢影度金殿人聲絶秋夜守羅帷孤燈耿不滅宫殿生秋草君王恩幸疏那堪聞鳳吹門外度金輿怪來粧閣閉朝下不相迎總向春園裏花間語笑聲紅牡丹緑艷閒且靜紅衣淺復深花心愁欲斷春色豈知心左掖梨花詠閒灑階邊草輕隨箔外風黃鶯弄不足銜入未央宫相思紅杏生南國秋來發故枝勸君休采擷此物最相思山茱萸朱實山下開清香寒更發幸與叢桂花窗前向秋月菩提寺禁示裴迪安得捨塵網拂衣辭世喧悠悠策藜杖歸去桃花源雜咏三首家住孟津河門對孟津口常有江南船寄書家中否君自故鄉來應知故鄉事來日綺窗前寒梅著花未已見寒梅發復聞啼鳥聲愁心視春草畏向玉階生崔興宗寫真咏畫君年少時如今君已老今時新識人知君舊時好哭孟襄陽故人不可見漢水日東流借問襄陽老江山空蔡州輞川遇雨憶終南山裴迪積雨晦空曲平沙滅浮采輞水去悠悠南山復何在賦輞川孟城坳結廬古城下時登古城上古城非疇昔今人自來往華子岡落日松風起還家草露晞雲光侵履跡山翠拂人衣文杏館迢迢文杏館躋攀日已屢南嶺與北湖前看復回顧斤竹嶺明流紆且直緑篠密復深一徑通山路行歌望舊岑鹿柴日夕見寒山便為獨往客不知深林事但有麏麚迹木蘭柴蒼蒼落日時鳥聲亂溪水緣溪路轉深幽興何時已茱萸沜飄香亂椒桂布葉間欒檀雲日雖回照森沈猶自寒宫陌亭門前宫槐陌是向欹湖道秋來山雨多落葉無人掃臨湖亭當軒瀰滉漾孤月正徘徊谷口猿聲發風傳入户來南垞孤舟信風泊南垞湖水岸落日下崦嵫清波殊渺漫欹湖空濶湖水廣青熒天色同􅋈舟一長嘯四面來清風柳浪映池同一色逐吹散如絲結陰既得地何謝陶家時欒家瀨潄聲喧極浦沿涉向南津泛泛鳬鷗度時時欲近人金屑泉縈渟淡不流金碧如可拾迎晨含素華獨往事朝汲白石灘跂石復臨水弄波情未極日下川上寒浮雲淡無色北垞南山北垞下結宇臨欹湖每欲採樵去扁舟出菰蒲竹里館來過竹里館日與道相親出入唯山鳥幽深無世人辛夷塢緣堤春草合王孫自留玩况有辛夷花色與芙蓉亂漆園好閒早成性果此皆宿諾今日漆園游還同莊叟樂椒園丹刺與人衣芳香留過客幸堪調鼎用願君垂採摘送崔九歸然深淺去須盡丘壑美莫學武陵人暫游桃源裏楊子津孟浩然北固臨京口夷山近海濱江風白浪起愁殺渡頭人北澗浮舟北澗流常滿浮舟觸處通沿洄自有趣何必五湖中春曉春眠不覺曉處處聞啼鳥夜來風雨聲花落知多少問舟子向夕問舟子前程復幾多灣頭正堪泊淮裏足風波檀溪尋故人花半成龍竹池分躍馬溪田園人不見疑向洞中棲贈王九日暮田家逺山中勿久淹歸人須早去稚子望陶潛洛中訪袁拾遺不遇洛陽訪才子江嶺作流人聞訪梅花早何如北地春尋菊花潭主人行至菊花潭村西日已斜主人登髙去雞犬空在家薊門看燈異俗非鄉俗新年改故年薊門看火樹疑是燭龍然宿建德江移舟泊烟渚日暮客愁新野曠天低樹江清月近人戲主人客醉眠未起主人呼解酲已言雞黍熟復說瓮頭清洛陽道中珠彈繁華子金羈游俠人酒酣白日暮走馬入紅塵送朱大入秦遊人五陵去寶劍直千金分手脫相贈平生一片心送友人之京君登青雲去豫望青山歸雲山從此別淚溼薜蘿衣秋雁虞世南日暮霜風急羽翮轉難任為有傳書意聨翩入上林初晴應教初日明燕館新溜滿梁池歸雲半入嶺殘滴尚懸枝春夜春花月徘徊竹堂侵夜開驚鳥排林度風花入水來風李嶠解落三秋葉能開二月花過江千尺浪入竹萬竿斜萬首唐人絶句卷四
