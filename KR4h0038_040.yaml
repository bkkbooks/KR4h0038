body:
  text: 萬首唐人絶句巻四十宋洪邁編七言霜月李商隱初聞征鴈已無蟬百尺樓南水接天青女素娥俱耐冷月中霜裏鬭嬋娟人欲人欲天從竟不疑莫言圓蓋便無私秦中已乆烏頭白却是君王未備知華山題王母祠蓮華峯下鎻彫梁此去瑤池地共長好為麻姑到東海勸栽黄竹莫栽桑華清宫二首華清恩幸古無倫猶恐蛾眉不勝人未免被他襃女笑只教天子暫䝉塵朝元閣迥羽衣新首按昭陽第一人當日不求高處舞可能天下有邊塵北齊二首一笑相傾國便亡何勞荆棘始堪傷小憐玉體横陳夜已報周師入晋陽巧笑知堪敵萬機傾城最在著戎衣晋陽已䧟休回顧更請君王獵一圍復京敵騎縱横一戰摧萬靈回首賀軒臺天敎李令心如日可要昭陵石馬來渾河中九廟無塵八馬回奉天城壘長春苔咸陽原上英雄骨半向君家養馬來咸陽咸陽宫闕蔚嵯峨六國樓臺艶綺羅自是當時天帝醉不關秦地有山河同崔八詣藥山訪融禪師共受征南不次恩報恩唯是有忘言巖花澗草西林路未見髙僧且見猿夜雨寄北君問歸期未有期巴山夜雨漲秋池何當共翦西忩燭却話巴山夜雨時石榴榴枝婀娜榴實繁榴膜輕明榴子鮮可羡瑤池碧桃樹碧桃紅頰一千年初起想像咸池日欲光五更鐘後更回腸三年苦霧巴江水不為離人照屋梁柳柳映江潭底有情望中頻遣客心驚巴雷隠隠千山外更作章臺走馬聲宿駱氏亭寄懷崔雍竹塢無塵水檻清同心迢遞隔重城秋隂不散霜飛晩留得枯荷聼雨聲夢澤夢澤悲風動白茅楚王葬盡滿城嬌未知歌舞能多少虛減宫厨為細腰贈歌妓二首水精如意玉連環下蔡城危莫破顔紅綻櫻桃含白雪斷腸聲裏唱陽關白日相思不奈何嚴城清夜斷經過只知觧道春來痩不道春來獨自多寄令狐郎中嵩雲秦樹乆離居雙鯉迢迢一紙書休問梁園舊賔客茂陵秋雨病相如漫成不妨何范盡詩家未觧當年重物華逺把龍山千里雪將來擬並洛陽花無題百道縈回入暮霞斑騅嘶斷七香車春風自共何人笑枉破陽城十萬家杜司勲髙樓風雨感斯文短翼差池不及羣刻意傷春復傷别人間惟有杜司勲岳陽樓二首欲為平生一散愁洞庭湖上岳陽樓可憐萬里堪乗興枉是蛟龍解覆舟漢水方城帶百蠻四隣誰道亂周班如何一夢髙唐雨自此無心入武關寄成都二從事家近紅渠曲水濵全家羅襪起秋塵莫將越客千絲網網得西施别贈人屏風六曲連環接翠帷髙樓半夜酒醒時掩燈遮霧宻如此雨落月明俱不知春日欲入盧家白玉堂新春催破舞衣裳蝶銜花蘂蜂銜粉共助青樓一日忙贈白道者十二樓前再拜辭靈風正滿碧桃枝壺中若是有天地又向壺中傷别離無題聞道閶門蕚緑華昔年相望抵天涯豈知一夜秦樓客偷㸔吳王苑内花漢宫詞青雀西飛竟未回君王長在集靈臺侍臣最有相如渇不賜金莖露一盃蝶二首長眉畵了繡簾開碧玉行収白玉臺為問翠釵釵上鳯不知香頸為誰回壽陽公主嫁時籹八字宫眉捧額黄見我佯羞頻照影不知身屬冶遊郎隋宫乘興南遊不戒嚴九重誰省諫書函春風舉國裁宫錦半作障泥半作帆代應溝水分流西復東九秋霜月五更風離鸞别鳯今何在十二玉樓空復空席上作澹雲輕雨拂髙唐玉殿秋來夜正長料得也應憐宋玉一生唯事楚襄王訪隠者不遇成二絶秋水悠悠浸墅扉夢中來數覺來希𤣥蟬聲盡葉黄落一樹冬青人未歸城郭休過識者希哀猿啼處有柴扉滄江白日樵漁路日暮歸來雨滿衣破鏡玉匣清光不復持菱花散亂月輪虧秦臺一照山雞後便是孤鸞罷舞時無題紫府仙人號寶燈雲漿未飲結成冰如何雪月交光夜更在瑶臺十二層贈庾十二朱版時庾在翰林朱書版也固漆投膠不可開贈君珍重抵瓊瑰君王曉坐金鑾殿只待相如草詔來柳曾逐東風拂舞筵樂游春苑斷腸天如何肯到清秋日已帶斜陽又帶蟬三月十日流盃亭身屬中軍少得歸木蘭花盡失春期偷隨柳絮到城外行過水西聞子規過招國李家南園二首潘岳無妻客為愁新人來坐舊䊋樓春風猶自疑聨句雪絮相和飛不休長亭歲盡雪如波此去秦關路幾多唯有夢中相近分卧來無睡欲如何留贈畏之二首待得郎來月已低寒暄不道醉如泥五更又欲向何處騎馬出門烏夜啼户外重隂黯不開含羞迎夜復臨臺瀟湘浪上有煙景安得好風吹汝來為有為有雲屏無限嬌鳯城寒盡怕春宵無端嫁得金龜壻辜負香衾事早朝公子外戚封侯自有恩平明通籍九華門金唐公主年應小二十君王未許婚雞稻粱猶足活諸鶵妬敵專場好自娛可要五更驚穏夢不辭風雪為陽烏壬申閏秋題贈烏鵲繞樹無依月正高鄴城新淚濺雲袍幾年始得逄秋閏兩度填河莫告勞端居逺書歸夢兩悠悠只有空牀敵素秋堦下青苔與紅樹雨中寥落月中愁夜半三更三㸃萬家眠露欲為霜月墮烟鬭䑕上牀蝙蝠出玉琴時動倚忩絃飲席代官妓贈兩從事新人橋上著春衫舊主江邉側㡌簷願得化為紅綬帶許教雙鳯一時銜代魏宫私贈來時西館阻佳期去後漳河隔夢思知有宓妃無限意春松秋菊可同時代元城吳令暗為答背闕歸藩路欲分水邉風日半西曛荆王枕上元無夢莫枉陽臺一片雲詠史北湖南埭水漫漫一片降旗百尺竿三百年間同曉夢鍾山何處有龍盤日射日射紗忩風撼扉香羅掩手春事違回廊四合掩寂寞碧鸚鵡對紅薔薇題鵝眠沙卧水自成羣曲岸殘陽極浦雲那解將心憐孔翠羇雌長共故雄分梓潼梓潼不見馬相如更欲南行問酒壚行到巴西覔譙秀巴西唯是有寒蕪青陵臺青陵臺畔日光斜萬古貞魂倚暮霞莫許韓憑為蛺蝶等閒飛上别枝花東還自有仙才自不知十年長夢采華芝秋風動地黄雲暮歸去嵩陽尋舊師漢宫通靈夜醮達清晨承露盤晞甲帳春王母西歸方朔去更須重見李夫人江東驚魚潑剌燕翩翾獨自江東上釣船今日春光太漂蕩謝家輕絮沈郎錢灞岸山東今嵗㸃行頻幾處寃魂哭塞塵灞水橋邉倚華表平時二月有東廵送臻師二首昔去靈山非拂席今來滄海欲求珠楞伽頂上清涼地善眼仙人憶我無苦海迷途去未因東方過此幾微塵何當百億蓮花上一一蓮花見佛身七夕鸞扇斜分鳯幄開星橋横過鵲飛回爭將世上無期别換得年年一度來馬嵬冀馬燕犀動地來自埋紅粉自成灰君王若道能傾國玉輦何由過馬嵬望喜驛别嘉陵江水二絶嘉陵江水此東流望喜樓中憶閬州若到閬州還赴海閬州應更有髙樓千里嘉陵江水色含煙帶月碧於藍今朝相送東流後由此驅車更向南贈宇文中丞欲造中天正急材自縁煙水戀平臺人間只有嵇延祖最望山公啟事來閨情紅露花房白蜜脾黄蜂紫蝶兩參差春忩一覺風流夢却是同袍不得知月夕草下隂蟲葉上霜朱闌迢遞壓湖光兎寒蟾冷桂花白此夜姮娥應斷腸代應本來銀漢是紅墻隔得盧家白玉堂誰與王昌報消息盡知三十六鴛鴦折楊柳二首暫憑尊酒送無憀莫損愁眉與細腰人世死前唯有别春風爭擬惜長條含煙惹霧悔依依萬緒千條拂落暉為報行人休盡折半留相送半迎歸寄道士共上雲山獨下遲陽臺白道細如絲君今併倚三珠樹不記人間落葉時荆山壓河連華勢孱顔鳥没雲歸一望間楊僕移關三百里可能全是為荆山次陜州離思覉愁日欲晡東周西雍此分塗回鑾佛寺高多少望盡黄河一曲無過鄭廣文舊居宋玉平生恨有餘逺循三楚弔三閭可憐留著臨江宅異代應教庾信居東下三旬苦於風土路遶函關東復東身騎征馬逐驚蓬天池遼闊誰相待日日虚乘九萬風莫愁雪中梅下與誰期梅雪相兼一萬枝若是石城無艇子莫愁還自有愁時夢令狐學士山驛荒涼白竹扉殘燈向曉夢清暉右銀臺路雪三尺鳯詔裁成當直歸渉洛川通谷陽林不見人我來遺恨古時春宓妃漫結無窮恨不為君王殺灌均有感中路因循我所長古來才命兩相妨勸君莫强安蛇足一盞芳醪不得甞宫妓珠箔輕明拂玉墀披香新殿鬭腰支不須㸔盡魚龍戲終遣君王怒偃師宫詞君恩如水向東流得寵憂移失寵愁莫向尊前奏花落涼風只在殿西頭代贈二首樓上黄昏欲望休玉梯横絶月中鉤芭蕉不展丁香結同向春風各自愁東南日出照髙樓樓上離人唱石州總把春山掃眉黛不知供得幾多愁楚吟山上離宫宫上樓樓前宫畔暮江流楚天長短黄昏雨宋玉無愁亦自愁瑶池瑶池阿母綺忩開黄竹歌聲動地哀八駿日行三萬里穆王何事不重來柳為有橋邉拂靣香何曾自敢占流光後庭玉樹承恩澤不信年華有斷腸寄在朝四同年昔歲陪遊舊跡多風光今日兩蹉跎不因醉本蘭亭在兼忘當年舊永和南朝地險悠悠天險長金陵王氣應瑶光休誇此地分天下只得徐妃半靣䊋題漢祖廟乘運應須宅八荒男兒安在戀池隍君王自起新豐後項羽何曾在故鄉韓冬郎二首十歲裁詩走馬成冷灰殘燭動離情桐花萬里丹山路鶵鳯清於老鳯聲劍棧風檣各苦辛别時冰雪到時春為憑何遜休聨句痩盡東陽姓沈人答寄餳粥粥香餳白杏花天省對流鶯坐綺筵今日寄來春已老鳯樓迢遞憶秋千東阿王國事分明屬灌均西陵魂斷斷來人君王不得為天子半為當時賦洛神萬首唐人絶句巻四十
