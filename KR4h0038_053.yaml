body:
  text: 萬首唐人絶句巻五十三宋洪邁編七言詠史詩胡曽烏江爭帝圖王勢已傾八千兵散楚歌聲烏江不是無船渡恥向東呉再起兵章華臺茫茫衰草没章華因笑靈王昔好奢臺土未乾簫管絶可憐身死野人家細腰宫楚王辛苦戰無功國破城荒霸業空唯有青春花上露至今猶泣細腰宫沙苑馮翊南邊宿霧開行人一步一徘徊誰知此地凋殘栁盡是髙歡敗後栽石城古郢雲開白雪樓漢江還遶石城流何人知道寥天月曽向朱門送莫愁荆山抱玉巖前桂葉稠碧谿寒水至今流空山落日猨聲呌疑是荆人哭未休陽臺楚國城池颯已空陽臺雲雨過無蹤何人更有襄王夢寂寂巫山十二重居延漠漠平沙際碧天問人云此是居延停驂一顧猶魂斷蘇武爭禁十九年沛宫漢髙辛苦事干戈帝業興隆俊傑多猶恨四方無壯士還鄉悲唱大風歌金谷園一自佳人墜玉樓繁華東逐洛河流唯餘金谷園中樹殘日蟬聲送客愁湘川虞舜南捐萬乘君靈妃揮涕竹成紋不知精魄遊何處落日瀟湘空白雲夷門六龍冉冉驟朝昏魏國賢才杳不存唯有侯嬴在時月夜來空自照夷門黄金臺北乘羸馬到燕然此地何人復禮賢欲問昭王無處所黄金臺上草連天夷陵夷陵城闕倚朝雲戰敗秦師縱火焚何事三千珠履客不能西禦武安君漢江漢江一帶碧流長兩岸春風起緑楊借問膠船何處没欲停蘭棹祀昭王蒼梧有虞龍駕不西還空委簫韶洞壑間無計得知陵寢處愁雲長滿九疑山陳宫陳國機權未可涯如何後主恣嬌奢不知即入宫中井猶自聽吹玉樹花南陽世亂英雄百戰餘孔明方此樂耕鋤蜀王不自垂三顧爭得先生出舊廬即墨即墨門開縱火牛燕師營裏血波流圗存不得田單術齊國尋成一土丘渭濵岸草青青渭水流子牙曽此獨垂鈎當時未入非熊兆幾向斜陽歎白頭五湖東上髙山望五湘雪濤煙浪起天隅不知范蠡乘舟後更有功名繼踵無易水一旦秦王馬角生燕丹歸北送荆卿行人欲識無窮恨聽取東流易水聲長平長平瓦震武安初趙卒俄成戲鼎魚四十萬人俱下世元戎何用讀兵書西園月滿西園夜未央金風不動鄴天涼髙情公子多秋興更領詩人入醉鄉長沙江上南風起白蘋長沙城郭異咸秦故鄉猶自嫌卑濕何况當時賦鵩人圮橋廟筭張良獨有餘少年逃難下邳初逡廵不進泥中履爭得先生一巻書銅雀臺魏武龍輿逐逝波髙臺空接望陵歌遏雲聲絶悲風起翻向罇前泣翠娥東晉石頭城下浪崔嵬風起聲疑出地雷何事符堅太相小欲投鞭䇿過江來呉江子胥今日委東流呉國明朝亦古丘大笑夫差諸將相更無人解守蘇州函谷關寂寂函關鎻未開田文車馬出秦來朱門不養三千客誰為雞鳴得放回武關戰國相持竟不休武關纔掩楚王憂出門若取靈均語豈作咸陽一死囚垓下㧞山力盡霸圖隳倚劒空歌不逝騅明月滿營天似水那堪回首别虞姫郴縣義帝南遷路入郴國亡身死亂山深不知埋恨窮泉後幾度西陵片月沉東海東廵玉輦委泉臺徐福樓船尚未回自是祖龍先下世不關無路到蓬萊故宜城武安南伐勒秦兵踈鑿功將夏禹并誰謂長渠千載後水流猶入故宜城成都杜宇曽為蜀帝王化禽飛去舊城荒年年來呌桃花月似向春風訴國亡檀溪三月襄陽緑草齊王孫相引到檀溪的盧何處埋龍骨流水依前遶大堤青塜玉貌元期漢帝招誰知西嫁怨天驕至今青塜愁雲起疑是佳人恨未銷李陵臺北入單于萬里疆五千兵敗滯窮荒英雄不伏蠻夷死更築髙臺望故鄉河梁漢家英傑出皇都攜手河梁話路隅不是子卿全大節也應低首拜單于軹道漢祖西來秉白旄子嬰宗廟委波濤誰憐君有翻身術解向秦宫殺趙髙漢宫明妃逺嫁泣西風玉筯雙垂出漢宫何事將軍封萬户却令紅粉為和戎豫讓橋豫讓酬恩歲已深髙名不朽到如今年年橋上行人過誰有當時國士心華亭陸機西没洛陽城呉國春風草又青惆悵月中千歲鶴夜來猶為唳華亭東山五馬南浮一化龍謝安入相此山空不知攜妓重來日幾樹鶯啼谷口風殺子谷舉國賢良盡淚垂扶蘇屈死樹邊時至今谷口泉嗚咽猶似秦人恨李斯馬陵墜葉蕭蕭九月天驅兵獨過馬陵前路傍古木蟲書處記得將軍破敵年玉門關西戎不敢過天山定逺功成白馬閒半夜帳中停燭坐唯思生入玉門關滹沱河光武經營業未興王郎兵革正憑陵須知後漢功臣力不及滹沱一片冰黄河博望沉埋不復旋黄河依舊水茫然㳂流欲共牛郎語只得靈槎送上天鳳凰臺秦娥一别鳳凰臺東入青㝠更不回空有玉簫千載後遺聲時到世間來五丈原蜀相西驅十萬來秋風原下久徘徊長星不為英雄住半夜流光落九垓平城漢帝西征䧟塞塵一朝圍解議和親當時已有吹毛劒何事無人殺奉春汴水千里長河一旦開亡隋波浪九天來錦帆未落干戈起惆悵龍舟更不回蘭臺宫遲遲春日滿長空亡國離宫蔓草中宋玉不憂人事變從遊那賦大王風金牛驛山嶺千重擁蜀門成都别是一乾坤五丁不鑿金牛路秦惠何由得併吞望思臺太子銜寃去不回臨臯從築望思臺至今漢武銷魂處猶有悲風木上來邯鄲曉入邯鄲十里春東風吹下玉樓塵青娥莫怪頻含笑記得當年失步人箕山寂寂箕山春復秋更無人到此溪頭棄瓢巖畔中宵月千古空聞屬許由㑹稽山越王兵敗已山棲豈望全生出㑹稽何事夫差無逺慮更開羅網放鯨鯢不周山共工爭帝力窮秋因此捐生觸不周遂使世間多感客至今哀怨水東流虞坂悠悠虞坂路欹斜遲日和風簇野花未省孫陽身没後幾多騏驥困鹽車秦庭楚國君臣草莾間呉王戈甲未東還包胥不動咸陽哭爭得秦兵出武關延平津延平津路水溶溶峭壁巍岑一萬重昨夜七星潭底見分明神劒化為龍瑶池阿母瑶池宴穆王九天仙樂送瓊漿漫矜八駿行如電歸到人間國已亡銅柱一柱髙標險塞垣南蠻不敢犯中原功臣自合分茅土何事翻銜薏苡寃關西楊震幽魂下北邙關西蹤跡遂荒涼四知美譽留人世應與乾坤共久長髙陽池古人未遇即銜杯所貴愁腸得酒開何事山公持玉節等閒深入醉鄉來瀘水五月驅兵入不毛月明瀘水瘴煙髙誓將雄畧酬三顧豈憚征蠻七縱勞細栁營文帝鑾輿勞北征條侯此地整嚴兵轅門不峻將軍令今日爭知細栁營葉縣葉公丘墓已塵埃雲矗崇墉亦半摧借問徃年龍見日幾多風雨送將來杜郵自古功成禍亦侵武安寃向杜郵深五湖煙月無窮水何事遷延到陸沈柯亭一宿柯亭月滿天笛亡人沒事空傳中郎在世無甄别爭得名垂爾許年葛陂長房回到葛陂中人已登真竹化龍莫道神仙難頓學嵇生自是不遭逢博浪沙嬴政鯨吞六合秋削平天下虜諸侯山東不是無公子何事張良獨報讐隴西乘春來到隴山西隗氏城荒碧草齊好笑王元不量力函關那受一丸泥白帝城蜀江一帶向東傾江上巍峩白帝城自古山河歸聖主子陽虚共漢家爭牛渚温嶠南歸輟棹晨燃犀牛渚照通津誰知萬丈洪流下更有朱衣躍馬人朝歌長嗟墨翟少風流急管繁絃似冦讐若解聞韶知肉味朝歌欲到肯回頭谷口一旦天真逐水流虎爭龍戰為諸侯子真獨有煙霞趣谷口耕鋤到白頭武陵溪一溪春水徹雲根流出桃花片片新若道長生是虚語洞中爭得有秦人大澤白蛇初斷路人通漢祖龍泉血刃紅不是咸陽將瓦解素靈那哭月明中澠池日照荒城芳草新相如曽此挫强秦能令百二山河主便作罇前擊缶人峴山曉日登臨感晉臣古碑零落峴山春松間殘露頻頻滴酷似當時墮淚人滎陽漢祖東征屈未伸滎陽失律紀生焚當時天下方龍戰誰為將軍作誄文長城祖舜宗堯自太平秦皇何事苦蒼生不知禍起蕭墻内虚築防邊萬里城赤壁烈火西焚魏帝旗周郎開國虎爭時交兵不假揮長劒已挫英雄百萬師田横墓古墓崔嵬約路岐歌傳薤露到今時也知不去朝黄屋秪為曽烹酈食其青門漢皇提劒滅咸秦亡國諸侯盡是臣唯有東陵守髙節青門甘作種𤓰人姑蘇臺呉王恃霸棄雄才貪向姑蘇醉醁醅不覺錢塘江上月一宵西送越兵來息城息亡身入楚王家回首春風一靣花感舊不言長掩淚秪應翻恨有容華上蔡上蔡東門狡兎肥李斯何事忘南歸功成不解謀生退直待雲陽血染衣武昌王濬戈鋋發上流武昌鴻業土崩秋思量鐡鎻真兒戲誰為呉王畫此籌鴻溝虎倦龍疲白刃秋兩分天下指鴻溝項王不覺英雄挫欲向彭門醉玉樓褒城恃寵嬌多得自由驪山舉火戲諸侯秪知一笑傾人國不覺邊塵滿玉樓金陵侯景長驅十萬人可憐梁武坐䝉塵生前不得空王力徒向金田自捨身洛陽石勒童年有戰機洛陽長嘯倚門時晉朝不是王夷甫大智何由得預知畨禺重岡復嶺勢崔嵬一卒當關萬卒回不是大夫多辨説尉他爭肯築朝臺汨羅襄王不用直臣籌放逐南來澤國秋自向波間葬魚腹楚人徒倚濟川舟彭澤英傑那堪屈下僚便栽門栁事蕭條鳳凰不共雞爭食莫怪先生懶折腰萬首唐人絶句巻五十三
