body:
  text: 萬首唐人絶句巻七十三宋洪邁編七言戲題諸判官㕔壁包㓜正六十老翁無所取二三君子不相遺願留今日交歡意直到隳官謝病時朝拜元陵宫前石馬對中峰雲裏金鋪鬭幾重不見露盤迎曉日唯聞木斧扣寒松觀壁畵九想圖一世榮枯無異同百年哀樂又歸空夜闌烏鵲相爭處林下真僧在定中秋朝木芙蓉趙彦昭水面芙蓉秋已衰繁條偏是著花遲平明露滴垂紅臉似有朝愁暮落時登祝融寺闌若盧肇祝融絶頂萬餘層䇿杖攀蘿歩歩登行到月宫霞外寺白雲相伴兩三僧楊栁枝詞青鳥泉邉草木春黄雲塞上是征人歸來若得長條贈不憚風霜與苦辛新植紅茶花偶出被人移去以詩索之嚴恨柴門一樹花便隨香逺逐香車花如解語還應道欺我郎君不在家被責連州黄絹外孫翻得罪華顛故老莫相嗤連川萬里無親戚舊識唯應有荔支謫後再書一絶崆峒道士悞燒丹赤䑕黄牙幾許難墜墮閻浮南斗下不知何事犯星官題清逺峽觀音院二首清潭洞澈深千丈危岫攀蘿上幾層秋盡更無黄葉樹夜闌唯對白頭僧風入古松添急雨月臨虚檻背殘燈老猿嘯狖還欺客來撼牕前百尺藤喜楊舎人入翰林御筆親批翰長銜夜開金殿送瑶緘平明玉案臨宣室已見龍光出傅巖謫連州書春牛榜子陽和未觧逐民憂雪滿羣山對白頭不得職田飢欲死兒儂何事打春牛送弟去日家無擔石儲汝須勤苦事樵漁古人盡向塵中逺白日耕田夜讀書牧童誰人得似牧童心牛上横眠秋聽深時復徃來吹一曲何愁南北不知音嘲小兒貪生只愛眼前珍不覺風光度嵗頻昨日見來騎竹馬今朝早是有年人成名後作桂在蟾宮不可攀功成業熟也何難今朝折得東歸去共與鄉閭年少看韋使君宅海榴詠皇甫曾淮陽卧理有清風臘月榴花帶雪紅閉閤寂寥常對此江湖心在數枝中巖嶺四望漢家仙仗在咸陽洛水東流出建章野老至今猶望幸離宮秋樹獨蒼蒼奉和九兄渤見寄絶句李渉忽啓新緘吟近詩詩中韻出碧雲詞且喜陟岡愁已散登舟只恨渡江遲贈友人孩子驪龍頷下亦生珠便與人間衆寶殊他時若要追風日須得君家萬里駒奉宣慰使魚十四郎年纔二十衆知名孤鶴儀容徹骨清口傳天語來人世却逐祥雲上玉京題善光寺雲門天竺舊姻縁臨老移家住玉泉早到可中溳南寺免得翻經住幾年題宣化寺道元上人居二十年前不繫身草堂曾與雪為隣常思和尚當時語衣鉢留將與此人折楊栁王貞白枝枝交影鏁長門嫩色曾沾雨露恩鳳輦不來春欲盡空留鶯語到黄昏和崔使君臨發不得觀積雪朱景𤣥貧居稍與池塘近旬日軒車不到來一樹瓊花空有待曉風看落滿青苔逺聞本郡行春到舊山一身從宦留京邑五馬遥聞到舊山已領煙霞光野徑深慙老㓜候柴關清風借響松筠外畵隼停輝水石間定掩溪名在圖傳共知軒蓋此登攀宿新安村歩淅淅寒流漲淺沙月明空渚徧蘆花離人偶宿孤村下永夜聞砧一兩家立春後作王初東君珂珮響珊珊青馭多時下九關方信玉霄千萬里春風猶未到人間梅花二首應為陽春信未傳固將青艷屬殘年東君欲待尋佳約剰寄衣香與粉綿迎春雪艷飄零極度夕蟾華掩映多欲托清香傳逺信一枝無計奈愁何春日詠梅花靚籹纔罷粉痕新迢曉風回散玉塵若遣有情應悵望已兼殘雪又兼春青帝來時值逺芳殘花殘雪尚交光隔年擬待春消息得見春風已斷腸即夕榆葉飄零碧漢流玉蟾珠露兩清秋仙家若有單棲根莫向銀臺半夜遊送陳校勘入宿日落風回巻碧霓方蓬一夜拆龍泥銀臺級級連清漢桂子香濃月杵低即夕風幌涼生白祫衣星榆纔亂絳河低月明休近相思樹恐有韓馮一處棲早春詠雪句芒宮樹已先開珠蘂瓊花鬭剪裁散作上林今夜雪送教春色一時來望雪銀花珠樹曉來看宿醉初醒一倍寒已似王恭披鶴氅凭欄仍是玉欄干雪霽星榆葉葉晝離披雲粉千重凝不飛崑玉樓臺珠樹密夜來誰向月中歸舟次汴堤曲岸蘭叢鴈飛起野客維舟碧煙裏竿頭五兩轉天風白日楊花滿流水省試日上崔侍郎四首劉得仁衣上年年淚血痕只將懐抱訴乾坤如今主聖臣賢日豈致人間一物寃如病如痴一十秋求名難得又難休回看骨肉須堪恥一着麻衣便白頭戚里稱儒愧小才禮闈公道此時開他人何事虚相指明主無私不是媒方寸終朝似火燃為求白日上青天自嗟辜負平生眼不識春光二十年秋夜作秋氣滿堂孤燭冷清宵無寐憶山歸牕前月過三更後細竹吟風似雨微長門怨爭得一人聞此怨長門深夜有妍姝早知雨露翻相悞只揷荆釵嫁匹夫村中閒歩閒共野人臨野水新秋髙樹掛清輝不知塵裏無窮事白鳥雙飛入翠微賈婦怨嫁與商人頭欲白未曾一日得雙行任君逐利輕江海莫把風濤似妾輕寄友人風颯沉思眼忽開塵埃汚得是庸才那堪更見巢松鶴飛入青雲不下來晏起日過辰時猶在夢客來應笑也求名浮生自得長髙枕不向人間與命爭别山居萬壑千巖景象開登臨未足又須回憑師莫斷松間路秋月圓時弟子來馬上别單于劉評事時太和公主還京評事罷舉起職廟謀宏逺人難測公主生還帝感深天下底平須共喜一時閒事莫驚心贈從弟谷此世榮枯豈足驚相逢唯要眼長青從來不愛三閭死今日憑君莫獨醒贈道人長在城中無定業賣丹磨鏡兩途貧三山來徃尋常事不省曾驚市井人對月寄同志霜滿庭中月在林寒鴻頻過又更深支頥不語相思坐料得君心似我心上清辭五首李九齡八海浮生汗漫秋紫皇髙宴五雲樓霓裳曲罷天風起吹散仙香滿十洲樓鏁彤霞地絶塵碧桃花發九天春東皇近日慵遊宴閒煞瑶池五色麟上清仙路有丹梯影響行人到即迷不㑹無端箇漁父阿誰敎入武陵溪本來方朔是真仙偶别丹臺未得還何事玉皇消息晚忍敎憔悴向人間新拜天官上玉都紫皇親授五靈符羣仙箇箇來相問人世風光似此無讀三國志有國由來在得賢莫言興廢是循環武侯星落周瑜死平蜀降呉似等閒山舎南溪小桃花一樹繁英奪眼紅開時先合占東風可憐地僻無人賞抛擲深山亂木中春行遇雨夾路輕風撼栁條雨侵春態動無憀採香陌上誰家女濕損釵頭翡翠翹登樓寄逺滿城春色花如雪極目煙光月似鉤總是動人鄉思處更堪容易上髙樓望思臺漢武年髙慢帝圖任人曾不問賢愚直饒四老依前出消得江充寵佞無山舎偶題門掩松蘿一逕深偶携藜杖出前林誰知盡日看山坐萬古興亡總在心荆溪夜泊㸃㸃漁燈照浪清水煙疎碧月朧明小灘驚起鴛鴦處一隻採蓮船過聲旅舎卧病家隔西秦無逺信身隨東洛度流年病來旅館誰相問牢落閒庭一樹蟬登昭福寺樓旅懐秋興正無涯獨倚危樓四望賒谷變陵遷何處問滿川空有舊煙霞代邉將雪凍隂河半夜風戰回狂寇血漂紅據鞍遥指長安路須刻麟臺第一功夜與張舒話别愁聽南樓角又吹曉雞啼後更分離如何銷得淒涼思更勸燈前酒一巵寒梅詞霜梅先拆嶺頭枝萬卉千花凍不知留得和羹滋味在任他風雪苦相欺題靈泉寺入谷先生一陣香異花奇木簇禪堂可憐門外髙低路萬轂千蹄日日忙宿張正字别業茅屋蕭寥煙暗後松牕寂歴月明初此時誰念孤吟客唯有黄公一帙書鶴天上瑶池覆五雲玉麟金鳳好為羣不須更飲人間水直是清流也汙君過相思谷悠悠信馬春山曲芳草和煙鋪嫩緑正被離愁着莫人那堪更過相思谷寫莊子聖澤安排當散地賢侯優貸借新居閒中亦有閒生計寫得南華一部書山中寄友人亂雲堆裏結茅廬已共紅塵跡漸踈莫問野人生計事牕前流水枕前書重門曲周濆憔悴容華怯對春寂寥宫殿鏁閒門此身却羡宫中樹不失芳時雨露恩山下水背雲衝石出深山淺碧泠泠一帶寒不獨有聲流此地㑹歸滄海助波瀾逢隣女日髙隣女笑相逢慢束羅裙半露胷莫向秋池照緑水參差羞殺白芙蓉廢宅牢落畵堂空鏁塵荒凉庭樹暗消春豪家莫笑此中事曾見此中人笑人津頭望白水周繇晴江暗漲岸吹沙山畔船衝樹杪斜城郭半淹橋市閙鷺鷥繚繞入人家公子行青衫薄薄漏春風日暮鳴鞭栁影中回望玉樓人不見酒旗深處勒花驄寄鑒上人左偃一從攜手阻戈鋋屈指如今已十年長記二林同宿夜竹齋聽雨共忘眠江上晚泊寒雲淡淡天無際片帆落處沙鷗起水濶風髙日復斜扁舟獨宿蘆花裏送人一莖兩莖華髪生千枝萬枝棃花白春色江南獨未歸今朝又送還鄉客鍾陵鐡柱盧士衡千年埋没竟何為變化宜將萬物齊安得風胡借方便鑄成神劒斬鯨鯢僧房聽雨古寺松軒雨聲别寒牕聽久詩魔發記得年前在赤城石樓夢覺三更雪題牡丹萬葉紅綃翦盡春丹青任寫不知真風光九十無多日難惜樽前折贈人長安春暮潘咸客在關西春暮夜還同江外已清明三更獨立看花月唯欠子規啼一聲舟行平沙極浦無人度猶繫孤舟寒草西半夜起看潮上月萬山中有一猿啼送僧闕下僧歸山頂寺却看朝日下方明莫道野人尋不見半天雲裏有鐘聲弔邉人沈彬殺聲沉後野風悲漢月髙時望不歸白骨已枯沙上草佳人猶自寄寒衣都門送别岸栁蕭疎野草秋都門行客莫回頭一條㶚水清如劒不為離人割斷愁萬首唐人絶句巻七十三
