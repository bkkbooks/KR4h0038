body:
  text: 萬首唐人絶句卷五十二宋洪邁編七言比紅兒詩羅虬其一姓氏看侵尺五天芳名占斷百花鮮馬嵬好笑當時事虛賺明皇幸蜀川其二金谷園中花正繁墜樓從道感深恩齊奴恰是來東市不為紅兒死更寃其三陷却平陽為小憐周師百萬戰長川更教乞與紅兒貌舉國山河不直錢其四一曲都緣張麗華六宫齊唱後庭花若教比並紅兒貌枉破當時國與家其五樂營門外栁如隂中有家人畫閣深若是五陵公子見買時應不啻千金其六青絲髙綰石榴裙腸斷當筵酒半醺置向漢宫圖畫裏和戎應不數昭君其七斜憑欄干醉態新斂眸微盻不勝春當時若遇東昏主金葉蓮花是此人其八匼匝千山與萬山碧桃花下景長閒神仙得似紅兒貌應免劉郎憶世間其九越山重疊越溪斜西子休憐解浣紗得似紅兒今日貌肯教將去與夫差其十詔下人間選好花月眉雲髻盡名家紅兒若向當時見繫臂先封第一紗十一鋒鏑縱橫不敢看淚垂玉筯正汍瀾應緣近似紅兒貌始得深宮奉五官十二金縷濃熏百和香臉紅眉黛入時䊋當時若向喬家見未敢將心在窈娘十三通宵甲帳散香塵漢帝精誠禮百神若見紅兒醉中態也應休憶李夫人十四拔得芙蓉出水新魏家公子信才人若教瞥見紅兒貌不肯留情賦洛神十五芳姿不合並常人雲在遙天玉在塵因事愛思荀奉倩一生閒坐枉傷神十六筆底如風思涌泉賦中休漫說嬋娟紅兒若在東家住不得登墻爾許年十七一抹濃紅傍臉斜䊋成不語獨攀花當時若是逢韓夀未必埋蹤在賈家十八樹裊西風日半沉地無人跡轉傷心阿嬌得似紅兒貌不費長門買賦金十九五雲髙捧紫金堂花下投壺侍玉皇從道世人都不識也應知有杜蘭香二十戲水源頭指舊蹤當時一笑也難逢紅兒若為回桃臉豈比連催舉五峰二十一虢國夫人照夜璣若為求得與紅兒醉和香態濃春裏一樹繁花偃繡幃二十二知有持盈玉葉冠剪雲裁月照人寒若使紅兒風貌戴直似瑶池㑹上看二十三明媚何曽讓玉環破瓜年幾百花顔若教貌向南朝見定却梅䊋似等閒二十四世事悠悠未足稱懶將閒事更爭能自從命向紅兒斷不欲留心在裂繒二十五自隱新從夢裏來嶺雲微步下雲臺含情一向春風笑羞殺凡花盡不開二十六捨却青蛾換玉鞍古來公子苦無端莫言一匹追風馬天驥牽來也不看二十七檻外花低瑞露濃夢魂驚覺暈春容憑君細看紅兒貌最稱嚴䊋待曉鐘二十八薄羅輕剪越溪紋鴉翅低從兩鬢分料得相如偷見面不應琴裏挑文君二十九南國東鄰各一時後來唯有杜紅兒若教楚國宮人見羞把腰身並栁枝三十照耀金叉簇膩鬟見時直向畫屛間黃姑阿母能判剖十斛明珠也是閒三十一輕小休誇似燕身生來占斷紫宫春漢皇若遇紅兒貌掌上無因著别人三十二鸚鵡娥如裛露紅鏡前眉樣自深宫稍教得似紅兒貌不嫁南朝沈侍中三十三擬將心地學安禪爭奈紅兒笑靨圓何物把來看比並野塘初綻一枝蓮三十四浸草漂花繞檻香最憐穿度樂營牆殷勤留滯緣何事曽照紅兒一面䊋三十五雕隂舊俗逞嬋娟有箇紅兒賽洛川常笑世人多誑誕今朝自見火中蓮三十六渡口諸儂樂未休竟陵西望路悠悠石城有箇紅兒貌兩槳無因迎莫愁三十七誰向深山識大仙勸人山下引春泉定知不及紅兒貌枉却工夫溉玉田三十八傾國傾城總絶倫紅兒花下認真身十年東北看燕趙眼冷何曽見一人三十九今時自謂不諳知前代由來事見為一笑陽城人便惑何堪教見杜紅兒四十京口喧喧百萬人競傳河鼓謝星津奈花似雪爭簪髻今日夭容是後身四十一青史書來未是真可知纎智却狂秦再三為謝齊王后要解連環别與人四十二繡帳鴛鴦對刺紋博山微暖麝微薰詩人若有紅兒貌悔道當時月墜雲四十三薄粉輕朱取次施大都端正亦相宜只如花下紅兒態不藉城中半額眉四十四䊋成渾欲認前朝金鳯雙叉逐步搖未必慕容宫裏伴舞風歌月勝纎腰四十五琥珀叉成恩正深玉兒妖惑蕩吾心莫教回首勻䊋靣始覺曽虛擲萬金四十六自有閒花一面春臉檀眉黛一時新殷勤為報梁家婦休把啼䊋賺後人四十七輕梳小髻號慵來巧中君心不用媒可得紅兒拋醉眼漢皇恩澤一時回四十八千里長江旦暮潮吳都風俗尚纎腰周郎若見紅兒貌料得無心念小喬四十九月落潛奔暗解攜本心誰道欲單棲還緣交甫非良偶不肯終身作羿妻五十漢皇曽識許飛瓊寫向人間作畫屏昨日紅兒簾下見大都相似更娉婷五十一魏帝休誇薛夜來霧綃紅縠稱身裁紅兒秀發君知否倚檻繁花帶露開五十二曉日雕梁燕語頻見花難可比他人年年媚景歸何處長作紅兒靣上春五十三逗玉濺盆浴殿開邀恩先賜夜明苔紅兒若是三千數多少芳心似死灰五十四畫簾垂地紫金牀暗引羊車駐七香若是紅兒此中住不勞烟篠灑宫廊五十五蘇小輕勻一靣䊋便留名字著錢塘藏鴉門外諸年少不識紅兒未是狂五十六一首長歌萬恨來惹愁漂泊水難回崔徽有底多頭靣費得微之爾許才五十七昔年黃閣識竒章愛說真珠似窈娘若是紅兒夜深態便應休說繡衣裳五十八鳳拆鶯離恨轉深此生難負百年心紅兒若向隋朝見破鏡無因更重尋五十九行綰穠雲立駐軒我來猶愛不成寃當時若見紅兒貌未必相形有此言六十總是紅兒媚態新莫論千度笑爭春任伊孫武心如鐡不辦軍前殺此人六十一暖塘爭赴蕩舟期行唱菱歌著艷詞為問東山謝丞相可能諸妓勝紅兒六十二吳興皇后欲辭家澤國宫臺展絳霞今日紅兒貌傾國恐須真宰别開花六十三陌上行人歌黍離三千門客欲何之若教粗及紅兒貌爭肯樓前斬愛姫六十四休話如臯一笑時金􅐴中臆錦離披陋容枉把雕弓射射盡春禽未展眉六十五長恨西風送早秋低眉深念嫁牽牛若同人世長相對爭作夫妻得到頭六十六謝娘休漫逞風姿未必娉婷勝栁枝聞道只應嘲落絮何曽得似杜紅兒六十七總傳桃葉渡江時只為王家一首詩今日紅兒自堪賦不須重唱舊來詞六十八巫山洛浦本無情總為佳人便得名今日雕隂有神艷後來公子莫相輕六十九幾拋雲髻恨金墉淚洗花顔百戰中應有紅兒些子貌却言皇后長深宫七十倚檻還應有所思半開香閣見嬌姿可中得似紅兒貌若遇韓朋好殺伊七十一曉向紗窗與畫眉鏡中長欲助嬌姿若教得似紅兒貌走馬章臺任道遲七十二錬得霜華助翠鈿相期朝謁玉皇前依稀有似紅兒貌方得吹簫引上天七十三重門深掩幾枝花未勝紅兒莫太誇玉柄不能探物理可能虛上短轅車七十四前代休憐事可竒後來還出有光輝爭知晝卧紗窗裏不有神人覆玉衣七十五羽化嘗聞赴九天只疑塵世是虛傳自從一見紅兒貌始信人間有謫仙七十六從道長陵小市東巧將花貌占春風紅兒若是同時見未必伊先入紫宫七十七人間難免是深情命斷紅兒向此生何似前時李丞相枉拋身力為鶯鶯七十八鳳舞香飄繡幕風暖穿馳道百花中還緣有似紅兒貌始得迎將入漢宫七十九休道將軍出世才盡驅諸妓下歌臺都緣沒箇紅兒貌致使輕教後閣開八十馮媛須知住漢宫將身只是解當熊不聞有貌傾人國爭得今朝更比紅八十一能將一貌使人迷花艷何須上大堤踈屬便同巫峽路洛川真是武陵溪八十二辭輦當時意可知寵深還恐寵先衰若教得似紅兒貌占却君恩自不疑八十三三吳時俗重風光未見紅兒一靣䊋好寫妖嬈與教看便應休更話真娘八十四波平楚澤浸星辰臺上君王宴早春畢竟章華㑹中客冠纓虛絶為何人八十五紅兒不向漢宫生便使雙成漫得名疑是麻姑惱塵世暫教微步下層城八十六天碧輕紗只六銖宛風含露透肌膚便教漢曲爭明媚應沒心情更弄珠八十七共嗟含恨向衡陽方寸花箋寄沈郎不似紅兒些子貌當時爭得少年狂八十八淺色桃花亞短牆不因風起也聞香凝情盡日君知否還似紅兒淡薄䊋八十九火色櫻桃摘得初仙宫只有世間無凝情盡日君知否真似紅兒口上朱九十宿雨初晴春日長入簾花氣靜難忘凝情盡日君知否真似紅兒舞袖香九十一初月纎纎映碧池池波不動獨看時凝情盡日君知否真似紅兒罷舞眉九十二濃艷濃香雪壓枝裊煙和露曉風吹紅兒被掩䊋成後含笑無人獨立時九十三樓上嬌歌裊夜霜近來休數踏歌娘紅兒慢唱伊州遍認取輕敲玉韻長九十四金粟䊋成扼臂環舞腰輕轉瑞雲間紅兒生在開元末羞殺新豐謝阿蠻九十五君看紅兒學醉䊋袴裁官纈砑裙長誰能更把閒心力比並當時武媚娘九十六梔子同心裛露垂折來深恐沒人知花前醉客頻相問不贈紅兒贈阿誰九十七雲開翡翠一雙飛水上鴛鴦不暫離寫向人間百般態與君題作比紅詩九十八舊恨長懷不語中幾回偷淚向春風還緣不及紅兒貌却得生教入楚宫九十九一舸春深指鄂君好風從度水成紋越人若見紅兒貌繡被應羞徹夜薰一百花落塵中玉墮泥香魂應上窈娘堤欲知此恨無窮處長倩城烏夜夜啼萬首唐人絶句卷五十二
