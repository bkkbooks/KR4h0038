body:
  text: 萬首唐人絶句卷五十宋洪邁編七言詠燈韓偓高在酒樓明錦幕逺隨漁艇泊煙江古來幽怨皆銷骨休向長門背雨窗逺廊濃煙隔簾玉漏泄斜燈照燭光參差繞廊倚檻更惆悵微雨輕寒花落時屐子六寸膚圓光緻緻白羅繡屜紅托裏南朝天子事風流却重金蓮輕緑齒想得兩重門裏玉堂前寒食花枝月午天想得那人垂手立嬌羞不肯上鞦韆聞雨香侵蔽膝夜寒輕聞雨傷春夢不成羅帳四垂紅燭背玉叉敲著枕函聲聮綴體院宇明秋日日長社前一鴈别遼陽隴頭針線年年事不喜寒砧搗斷腸夜深清江碧草兩悠悠各自風流一種愁正是落花寒食雨夜深無伴倚空樓哭花曾愁香結破顔遲今見妖紅委地時若是有情爭不哭夜來風雨葬西施蜻蜓碧玉眼睛雲母翅輕於粉蝶瘦於蜂坐來併拂波光舞可是殷勤戀蓼叢觀鬬雞何曾解報稻梁恩金距花冠氣遏雲白日梟鴟無意問唯將芥羽害同羣船頭兩岸緑蕪齊似剪掩映靈山相向晚船頭獨立望長空日灔波光逼人眼寄禪師從無入有雲峯聚已有還無電火銷銷聚本來皆是幻世間間口漫囂囂已涼二首碧闌干外繡簾垂猩色屏風畫折枝八尺龍鬚方錦褥已涼天氣未寒時秋多却訝天涼早思倦翻嫌夜漏遲何處山川孤館裏向燈彎盡一雙眉重遊曲江鞭鞘亂拂暗傷情蹤迹難尋露草青猶有玉輪曾碾處一泓秋水漲浮萍遙見悲歌淚濕淡燕脂間立風吹金縷衣白玉堂東遙見後令人評泊畫楊妃新秋一夜清風動扇愁背時容色入新秋桃花臉裏汪汪淚忍到更深枕上流宫詞繡屏斜立正銷魂侍女移燈掩殿門燕子不歸花著雨春風應自怨黃昏踏青踏青會散欲歸時金車久立頻催上收裙整髻故遲留兩點深心各惆悵寒食夜惻惻輕寒剪剪風杏花飄雪小桃紅夜深斜搭秋千索樓閣朦朧細雨中鬆髻髻根總慢玉叉垂指點庭花又過時坐久暗生惆悵事映人勻却淚燕脂夏日庭樹新隂葉未成玉階人靜下簾聲相風不動烏龍睡時有幽禽自喚名江樓二首夢啼嗚咽覺無語杳杳微微望煙浦樓空客散燕交飛江靜帆稀日亭午鯷魚苦笋香味新楊花酒旗三月春風光百計牽人老爭那多情足病身新上頭學梳蟬鬢試新裙消息佳期在此春為愛好多心轉惑遍將冝稱問傍人録舊詩有感緝綴小詩抄卷裏尋思間事到心頭自吟自泣無人會腸斷蓬山第一流中庭夜短睡遲慵早起日髙方始出紗窗中庭自摘青梅子先向叉頭帶一雙蹤迹東烏西兔似車輪却笑桑田不復論唯有風光與蹤迹思量長似暗銷魂日高朦朧猶認管絃聲噤痄餘寒酒半醒春暮日高簾半捲落花和雨滿中庭夕陽花前酒淚臨寒食醉裏回頭問夕陽不管相思人老盡朝朝容易下西墻過建溪長貪山水羡漁樵自笑揚鞭趂早朝今日建溪驚恐後李將軍畫也須燒秋雨內宴一帶清風入畫堂撼真珠箔碎玎璫更看檻外霏霏雨似勸須交醉玉觴僧影山色依然僧已亡竹間踈磬隔殘陽智燈已滅餘香燼猶自光明照十方舊館前歡往恨分明在酒興詩情大半亡還是墻西紫荆樹殘花摘索映高塘中春憶贈年年長是阻佳期萬種恩情只自知春色轉添惆悵望似君花發兩三枝半睡眉山暗淡向殘燈一半雲鬟墜枕稜四體著人嬌欲泣自家揉損砑繚綾春恨殘夢依依酒力餘城頭畫角半啼烏平明未捲西樓幕院靜時聞放鹿盧寄恨秦叉枉斷長條玉蜀紙空留小字紅死恨物情無會處蓮花不肯嫁春風閨怨時光潛去暗淒涼懶對菱花暈曉粧初拆鞦韆人寂寞後園青草任他長深院鵝兒唼喋梔黃觜鳯子輕盈膩粉腰深院下簾人晝寢紅薔薇架映芭蕉痛憶信知尤物必牽情一顧難酬覺命輕曾把禪機銷此病破除才盡又重生忍笑宫樣梳頭淺畫眉晚來裝飾更相冝水精鸚鵡叉頭顫斂袂佯羞忍笑時氣疾初愈疾愈身輕覺數通山無嵐瘴海無風隂陽欲出隂精落天地包含紫氣中偶見二首霧為襟袖玉為冠半似羞人半忍寒别易會難長自歎轉身應取淚珠彈桃花臉薄難藏淚桂葉眉長易覺愁形迹未成當面笑幾回擡眼又低頭密意呵花貼鬢粘寒髮凝酥光透猩猩血經過洛水幾多人唯有陳王見羅襪偶見秋千打困解羅裙指點醍醐酒一尊見客入來和笑走手搓梅子映中門寒食夜有寄風流大底是張張一度相思一斷腸雲薄月昏寒食夜隔簾微雨杏花香歎白菊正憐香雪披千片忽訝殘霞覆一􅓜還似妖姬長年後酒酣雙臉却微紅侍宴蜂黃蝶粉兩依依狎宴臨春日正遲密旨不教江令醉麗華微笑認皇慈秋霖夜憶家垂老何時見弟兄背燈愁泣到天明不知短髮能多少一滴秋霖白一莖曛黑古木侵天日已沉露華涼冷潤衣襟江城曛黑人行絶唯有啼烏伴夜砧柳二首裊雨拖風不自持遍身無力向人垂玉纎折得遙相贈便似觀音手裏時一籠金線拂彎橋幾被兒童損細腰無奈靈和標格在春來依舊裊長條曉日天際霞光入水中水中天際一時紅直須日觀三更後首送金烏上碧空醉著萬里清江萬里天一村桑柘一村煙漁翁醉著無人喚過午醒來雪滿船家書後批家在登州四序風光總是愁鬢毛衰颯涕橫流此書未到心先到想見孤城海岸頭偶題俟時輕進固相妨實行丹心仗彼蒼蕭艾轉肥蘭蕙瘦可能天亦妬馨香淨興寺杜鵑一園紅艷醉坡陀自地連梢蔟蒨羅蜀魄未歸長滴血秪應偏滴此􅓜多翠碧鳥天長水逺網羅希保得重重翠羽衣挾彈小兒多害物勸君莫近五陵飛贈孫尊師齒如冰雪髮如黳幾百年來醉似泥不共世人爭得失臥床前有上天梯寓汀州聞鄭左丞赴洛鬢惹新霜耳舊聾眼昏腰曲四支風交親若要知形候嵐瘴煙中折臂翁荔枝三首遐方不許貢珍奇密詔唯教進荔枝漢武碧桃爭比得枉令方朔號偷兒封開玉籠雞冠澀葉襯金盤鶴頂鮮想得佳人微啓齒翠叉先取一雙懸巧裁霞片裹神漿崖蜜天然有異香應是仙人金掌露結成冰入蒨羅囊尤溪道中水自潺湲日自斜盡無雞犬有鳴鴉千村萬落如寒食不見人煙空見花騰騰八年流落醉騰騰點檢行藏喜不勝烏帽素餐兼施藥前生多恐是醫僧贈友人莫嫌談笑與經過却恐間多病亦多若遣心中無一事不知爭奈日長何中秋永夕奉寄楊學士鱗差甲子漸衰遲依舊年年困亂離八月夜長鄉思切鬢邊添得幾莖絲清興隂沉天氣連翩醉摘索花枝撩峭寒擁鼻繞廊吟看雨不知遺却竹皮冠雷公間人倚柱笑雷公又向深山霹怪松必若有蘇天下意何如驚起武侯龍野塘侵曉乘涼偶獨來不因魚躍見萍開卷荷忽被微風觸瀉下清香露一杯訪隱者遇醉曉入江村覔釣翁釣翁沉醉酒缸空夜來風起間花落狼籍柴門鳥徑中即目書墻暗記移花日洗甕先知醖酒期須信間人有忙事且來衝雨覔漁師寄鄰莊道侣聞説經旬不啓關藥窗誰伴醉開顔夜來雪壓村前竹剩見溪南幾尺山初赴期集輕寒著背雨淒淒九陌無塵未有泥還是平時舊滋味漫垂鞭袖過街西晚岸揭起青蓬上岸頭野花和雨冷修修春江一夜無波浪校得行人分外愁仙山一炷心香洞府開偃松皴澀半莓苔水清無底山如削始有仙人騎鶴來過茂陵不悲霜露但傷春孝理何因感兆民景帝龍髯消息斷異香空見李夫人曲江秋日斜煙縷縷鷺鷥棲藕葉枯香折野泥有箇高僧似圖畫把經吟立水塘西流年三月傷心仍晦日一春多病更隂天雄豪亦有流年恨況是離魂易黯然寄上兄長兩地支離路八千襟懷悽愴鬢蒼然亂來未必長團會其奈而今更長年兩賢賣卜嚴將賣餅孫兩賢髙趣恐難倫而今若有逃名者應被品流呼差人寶劒困極還應有日通難將糞土掩神蹤但教出得豐城後不是延津亦化龍訪盧秀才藥訣棊經思致論桞腰蓮臉本忘情頻頻強入風流坐酒肆應疑阮步兵商山道中雲橫峭壁水平鋪渡口人家日欲晡却憶往年看粉本始知名畫有功夫招隱立意忘機機已生可能朝市汙高情時人未會嚴陵志不釣鱸魚只釣名雨村鴈行斜拂雨村樓簾下三更幕一鉤倚柱不知身半濕黃昏獨自未回頭使風茶香睡覺心無事一卷黃庭在手中欹枕卷簾江萬里舟人不語滿帆風阻風平生情趣羡漁師此日煙江愜所思肥鱖香粳小艛艓斷腸滋味阻風時并州戌旗青草接榆開雨裏并州四月寒誰會憑欄潛忍淚不勝天際似江干夏夜猛風飄電黑雲生霎霎高林簇雨聲夜久雨休風又定斷雲流月却斜明欄干掃花雖恨夜來雨把酒却憐晴後寒吳質漫言愁得病當時猶不憑欄干驛樓流雲溶溶水悠悠故鄉千里空回頭三更獨憑欄干月淚滿關山孤驛樓以海棠梨花一枝寄李員外二月春風淡蕩時旅人虛對海棠梨不如寄與星即去想得朝回正畫眉遊春引三首張碧句芒愛弄春風權開萌發翠無黨偏句芒小女精神巧機羅杼綺滿平川五陵年少輕薄客蠻錦花多春袖窄酌桂鳴金玩物華星蹄繡轂填香陌千條碧緑輕拖水金毛泣怕春江死萬彚俱含造化恩見我春公無私理農父運鋤耕斸侵星起隴畝豐盈滿家喜到頭禾黍屬他人不知何處拋妻子古意鑾輿不碾香塵滅更殘三十六宫月手持紈扇獨含情秋風吹落橫波血萬首唐人絶句卷五十
