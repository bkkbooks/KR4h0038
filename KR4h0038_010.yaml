body:
  text: 萬首唐人絶句卷十宋洪邁編七言寄劉頗二首元稹平生嗜酒顛狂甚不許諸公占丈夫唯愛劉君一片膽近來還敢似人無前年碣石烟塵起共看官軍過洛城無限公卿因戰得與君依舊緑衫行晨起送使病不能行因過王十一館居二首自笑今朝誤夙興逢他御史瘧相仍過君未起房門掩深映寒忩一盞燈密宇深房小火爐飯香魚熟近中厨野人愛靜仍耽寢自問黃昏肯去無送孫勝桐花暗淡栁惺愡池帶輕波栁帶風今日與君臨水别可憐春盡宋亭中逺望滿眼傷心冬景和一山紅樹寺邊多仲宣無限思鄉淚漳水東流碧玉波陪張湖南晏望嶽樓􅍬為監察御史張中丞知權事觀象樓前奉末班絳峰只似殿亭間今日髙樓重陪晏雨籠衡嶽是南山嶽陽樓嶽陽樓上日銜忩影到深潭赤玉幢悵望殘春萬般意滿櫺湖水入西江寄庾敬休小來同在曲江頭不省春時不共遊今日江風好暄暖可憐春盡古湘州買花栽二首買得山花一兩栽離鄉别土易摧隤欲知北客留南意看取南花北地來南花北地種應難且向船中盡日看縱使將來眼前死猶勝拋擲在空欄宿石機石磯江水夜潺湲半夜江風引杜鵑燈暗酒醒顛倒枕五更斜月入空船桐花去日桐花半桐葉别來桐樹老桐孫城中過盡無窮事白髮滿頭歸故園西歸十二首雙堠頻頻減去程漸知身得近京城春來愛有歸鄉夢一半猶疑夢裏行五年江上損容顔今日春風到武關兩紙京書臨水讀小桃花樹滿商山獨歸諌院韋丞相共貶河南亞大夫今日還鄉獨憔悴幾人憐見白髭鬚只去長安六日期多應及得杏花時春明門外誰相待不夢閒人夢酒巵白頭歸舍意如何賀處無窮弔亦多左降去時裴相宅舊來車馬幾人過還鄉何用淚沾襟一半雲霄一半沉世事慚多饒悵望舊曽行處便傷心閒遊寺觀從容到遍問親知次第尋腸斷裴家光德宅無人掃地㦸門深一世營營死是休生前無事定無由不知山下東流水何事長須日夜流今朝西渡丹河水心寄丹河無限愁若到莊前竹園下殷勤為繞故山流寒忩風雪擁深爐彼此相傷指白鬚一夜思量十年事幾人强健幾人無雲覆藍橋雪滿溪須臾便與碧峰齊風回麵市連天合凍壓花枝著水低寒花帶雪滿山腰著栁氷珠滿碧條天色漸明回一望玉塵隨馬渡藍橋小碎小碎詩篇取次書等閒題柱意何如諸郎到處相應問留取三行代鯉魚和樂天髙相宅莫愁已去無窮事漫苦如今有恨身二百年來城裏宅一家知換幾多人和樂天仇家酒病嗟酒户年年減老覺塵機漸漸深飲罷醒餘更惆悵不如閒事不經心和樂天贈雲寂僧欲離煩惱三千界不在禪門八萬條心火自生還自滅雲師無路與君銷灃西别樂天傳載樊宗憲李景信兩秀才姪谷三月三十日相餞送今朝相送自同遊酒語詩情替别愁忽到灃西總回去一身騎馬向通州寄曇嵩寂三上人長學對治思苦處偏將死苦教人間今因為說無生死無可對治心更閒題漫天嶺智藏師蘭若僧云住此二十八年僧臨大道閲浮生來往憧憧利與名二十八年何限客不曽閒見一人行蒼溪縣寄揚州兄弟蒼溪縣下嘉陵水入峽穿江到海流慿仗鯉魚將逺信雁回時節到揚州長灘夢李紳孤吟獨寢意千般合眼逢君一夜歡慚愧夢魂無逺近不辭風雨到長灘見樂天詩通州到日日平西江館無人虎印泥忽向破簷殘漏處見君詩在柱心題聞樂天受江州司馬殘燈無熖影幢幢此夕聞君謫九江垂死病中仍悵望暗風吹雨入寒忩歲日贈去非君思曲水嗟身老我望通州感道窮同入新年兩行淚白頭翁坐說城中雨聲風吹竹葉休還動雨㸃荷心暗復鳴曽向西江船上宿慣聞寒夜滴蓬聲奉和滎陽公離筵作南郡生徒辭絳帳東山妓樂擁紅旌鈞天排比簫韶待猶顧人間有别情嘉陵水古時應是山頭水自古流來江路深若使江流會人意也應知我逺來心閬州開元寺壁題樂天詩憶君無計寫君詩寫盡千行說向誰題在閬州東寺壁幾時知是見君時憑李忠州寄書樂天萬里寄書將出峽却憑巫峽寄江州傷心最是江頭月莫把書將上庾樓得樂天書逺信入門先有淚妻驚女哭問何如尋常不省曽如此應是江州司馬書寄白樂天無身尚擬魂相就身在那無夢往還直到他身亦相覔不能空寄樹中環酬知退終須修到無修處聞盡聲聞始不聞莫著妄心銷彼我我心無我亦無君通州平生欲得山中住天與通州繞郡山睡到日西無一事月儲三萬買教閒喜李十一景信到何事相逢翻有淚念君緣我到通州留君剩住君須住我不自由君自由與李十一夜飲寒夜燈前賴酒壺與君相對興猶孤忠州刺史應閒卧江水猿聲睡得無贈李十一淮水連年起戰塵油旌三換一何頻共君前後俱從事羞見功名與别人寒食日今年寒食好風流此日一家同出遊碧水青山無限思莫將心道是涪州别李十一五絶巴南分與親情别不料與君牀並頭為我逺來休悵望折君災難是通州京城每與閒人别猶自傷心與白頭今日别君心更苦别君緣是在通州萬里尚能來逺道一程那忍便分頭鳥籠猿檻君應會十步向前非我州來時見我江南岸今日送君江上頭别後料添新夢寐虎驚蛇伏是通州聞君欲去潜銷骨一夜暗添新白頭明朝别後應腸斷獨棹破船歸到州酬樂天醉别前回一去五年别此别又知何日回好住樂天休悵望匹如元不到京來酬樂天雨後見憶雨滑危梁性命愁差池一步一生休黃泉便是通州郡漸入深泥漸到州和樂天題王家亭子風吹筍籜飄紅砌雨打桐花蓋緑莎都大資人無暇日泛池全少買池多酬樂天頻夢微之山水萬重書斷絶念君憐我夢相聞我今因病魂顛倒唯夢閒人不夢君琵琶學語胡兒撼玉鈴甘州破裏最星星使君自恨常多事不得工夫夜夜聽春詞山翠湖光似欲流蜂聲鳥思却堪愁西施顔色今何在但看春風百草頭酬樂天舟泊夜讀微之詩知君暗泊西江岸讀我閒詩欲到明今夜通州還不睡滿山風雨杜鵑聲酬樂天武關南見微之題山石榴花詩比因酬贈為花時不為君行不復知又更幾年還共到滿牆塵土兩篇詩酬樂天寄生衣秋茅處處流痎瘧夜鳥聲聲哭瘴雲羸骨不勝纎細物欲將文服却還君酬樂天三月三日見寄常年此日花前醉今日花前病裏銷獨倚破簾閒悵望可憐虛度好春朝瘴塞瘴塞巴山哭鳥悲紅粧少婦斂啼眉殷勤奉藥來相勸云是前年欲病時紅荆庭中栽得紅荆樹十月花開不待春直到孩提盡驚怪一家同是北來人黃草峽聽柔之琴二首胡笳夜奏塞聲寒是我鄉音聽漸難料得小來辛苦學又應知向峽中彈别鶴凄清覺露寒離聲漸咽命雛難憐君伴我涪州宿猶有心情徹夜彈書劒渝江劒刃皆歐冶巴吏書蹤盡子雲唯我心知有來處泊船黃草夜思君别毅郎二首爾爺只為一杯酒此别那知死與生兒有何辜才七嵗亦教兒作瘴江行愛惜爾爺唯有我我今憔悴望何人傷心自比籠中鶴剪盡羽翎愁到身自責犀帶金魚束紫袍不能將命報分毫他時得見牛常侍為爾君前捧佩刀送公度之福建棠隂猶在建康磯此去那論是與非若見白頭須盡敬恐曽江岸識胡威喜五兄自泗州至眼中三十年來淚一望雲南一度垂慚愧臨淮李常侍逹教形影暫相隨杏花常年出入古銀臺每怪春風例早回慚愧杏園行在景同州園裏也先開第三嵗日詠春風憑楊員外寄長安栁三日春風已有情拂人頭面稍憐輕殷勤為報長安栁莫惜枝條動軟聲聽妻彈别鶴操别鶴聲聲怨夜弦聞君此奏欲潸然商瞿五十知無子便付琴書與仲宣贈樂天莫言鄰境易經過彼此分符欲奈何垂老相逢暫離别白頭期限各無多重贈休遣玲瓏唱我詩我詩多是别君詞明朝又向江頭别月落潮平是去時别後西陵晚眺晚日未拋詩筆硯夕陽空望郡樓臺與君後會知何日不似潮頭暮却回酬樂天重寄别却報君侯聽苦詞老頭拋我欲何之武牢關外雖分手不似如今衰白時寄浙西李大夫四首栁眼梅心漸欲春白頭西望憶何人金陵太守曽相伴共踏銀臺一路塵蘂珠深處少人知網索西臨太液池浴殿曉開天語後步廊騎馬笑相隨禁林同直話交情無夜無曽不到明最憶西樓人靜後玉宸鍾磬兩三聲由來鵬化便圖南浙右誰雄我未甘早渡西江好歸去莫拋舟楫滯春潭為樂天自勘詩集春野醉吟十里程齊宫潜詠萬人驚今宵不寐到明讀風雨曉聞開鎖聲題長慶四年厯日尾殘厯半張餘十四灰心雪鬢兩凄然定知新嵗御樓後從此不知長慶年夜晏南陵留别李嘉祐雪滿前庭月色閒主人留客未能還預愁明日相思處匹馬千山與萬山題前溪館兩年謫宦在江西舉目雲山要自迷今日始知風土異潯陽南去鷓鴣啼過烏江公山寄錢起雨過青山猿呌時愁人淚㸃石榴枝無端王事還相繫腸斷蒹葭君不知王舍人竹樓傲吏身閒笑五侯西江取竹起髙樓南風不用蒲葵扇紗帽閒眠對水鷗韋潤州後亭海榴江上年年小雪遲年光獨報海榴知寂寂山城風日暖謝公含笑向南枝送崔十一弟歸北京潘郎美貌謝公詩銀印花驄年少時楚地江臯一為别晉山沙水獨相思訪韓司空不遇圖畫風流似伯康文詞體格效陳王蓬萊對去歸常晚叢雀閒飛滿夕陽䖍上人竹房詩思禪心共竹閒任他流水向人間手持如意髙忩裏斜日沿江千萬山木芙蓉水面芙蓉秋已衰繁條到是著花時平明露滴垂紅臉似有朝愁暮落悲袁江口憶王郎中京華不啻三千里客淚如今一萬雙若個最為相憶處青風黃竹入袁江栁韓琮折栁歌中得翠條逺移金殿種青霄上陽宫女含聲送不忍先歸舞細腰楊栁枝梁苑隋堤事已空萬條猶帶舊春風那堪更想千年後誰見楊花入漢宫萬首唐人絶句卷十欽定四庫全書萬首唐人絶句卷十宋洪邁編五言應制奉和潼關張說天德平無外關門東復西不將千里隔何用一丸泥奉裴中書酒西掖恩華降南宮命席闌詎知雞樹後更接鳳池歡被使在蜀即今三伏盡尚自客臨邛歸途千里外秋月定相逢正朝摘梅蜀地寒猶暖正朝發早梅偏驚萬里客已復半年來蜀道後期客心爭日月來往預期程秋風不相待先至洛陽城廣州江中作去國嵗方晏愁心轉不堪離人與江水終日向西南江中遇客危石江中起孤雲嶺上還相逢皆得意何處是鄉關守嵗三首故嵗今宵盡新年明旦來愁心隨斗柄東北望春回夜風吹醉舞庭户對酣歌愁逐前年少歡迎今嵗多桃枝堪辟惡竹爆好驚眠歌舞留今夜猶言惜舊年嶽州看黃葉白首看黃葉徂顔復幾何空慚棠樹下未有政成歌耗磨日飲上月今朝減流傳耗磨辰還將不事事同醉俗中人九日遊茱萸山三首家居洛陽下舉目見嵩山刻作茱萸節情生造化間菊酒㩦山客萸囊繫牧童路疑隨大塊心似問鴻濛晚節歡重九髙山上五千醉中知偶聖夢裏見尋仙傷妓人董氏四首董氏嬌饒性多為窈窕名人隨秋月落韻入搗衣聲粉蘂粘妝簏金花喝翠條夜臺無戲伴魂影向誰嬌舊亭紅粉閣宿處白雲關春日雙飛去秋風獨不還舞席沾殘粉歌梁委舊塵獨傷窗裏月不見帳中人惜花施肩吾落盡萬株紅無人解繫風今朝芳徑裏惆悵錦機空衝夜行夜行無月時古路多荒榛山鬼遙把火自照不照人夜愁曲歌者歌未絶愁人愁轉增空把琅玕枝强挑無心燈雜古詞五首可憐江北女慣唱江南曲搖蕩木蘭舟雙鳬不成浴郎為匕上香妾作籠下灰歸時即暖熱去罷生塵埃夜裁鴛鴦綺朝織蒲桃綾欲試一寸心待逢三尺冰憐時魚得水怨罷商與參不如山梔子却能結同心紅顔感暮花白日同流水思君若孤燈一夜一心死幼女詞幼女才六嵗未知巧與拙向夜在堂前學人拜新月買地詞買地不惜錢為多芳桂叢所期在清涼坐起聞香風弋陽訪古行逢葛溪水不見葛仙人空拋青竹杖呪作葛陂神幽居樂萬籟不在耳寂寥心境清無妨數莖竹時有蕭蕭聲湘川懷古湘水終日流湘妃昔時哭美色已成塵淚痕猶在竹秋山吟夜吟秋山上嫋嫋秋風歸月色清且冷桂香落人衣寒衣三復招隱吟不知寒夜深看看西來月移到青天心湘竹詞萬古湘江竹無窮奈怨何年年長春筍只是淚痕多觀花後遊慈恩寺世事知難了應須問苦空羞將看花眼來入梵王宫乞巧詞乞巧望星河雙雙並綺羅不嫌針眼小只道月明多不見來詞烏鵲語千回黃昏不見來漫教脂粉匣閉了又重開夜起來香銷連理帶塵覆合歡杯懶卧相思枕愁吟夜起來笑卿卿詞笑向卿卿道耽書夜夜多出來看玉兔又欲過銀河感遇詞一種貌如仙人情要自偏羅敷有底好最得使君憐及第後夜訪月仙子自喜尋幽夜新當及第年還將天上桂來訪月中仙定情樂敢嗟君不憐自是命不諧著破三條裙却還雙股叉其二感郎雙條脫新破八幅綃不惜榆莢錢買人金步搖宿南一上人山房窗牖月色多坐卧禪心靜青鬼來試人夜深弄燈影蘭渚泊家在洞水西身作蘭渚客天晝無纎雲獨坐空江碧經吳真君舊宅古仙煉丹處不測何嵗年至今空宅基時有五色烟古相思十訪九不見甚於菖蒲花可憐雲中月今夜墮我家瀑布豁開青冥顛寫出萬丈泉如裁一條素白日懸秋天秋洞宿夜深秋洞裏風雨報龍歸何事觸人睡不教蝴蝶飛醉後權德輿美祿與賢人相逢自可親願將花柳月盡賞醉鄉春和邵端公莫羡簷前柳春風獨蚤歸陽和次第發桃李更芳菲李韶州書論釋氏州有能公遺跡詩以問之常日區中暇時聞象外言曹溪有宗㫖一為勘心源嶺上逢久別者又別十年曾一別征路此相逢馬首向何處夕陽千萬峯敷水驛空見水名敷秦樓昔事無臨風駐征驛聊復捋髭鬚次滕老莊征途無旅館當晝喜逢君羸病仍留客朝朝掃白雲江行四首曉曉風搖五兩殘月映石壁稍稍曙光開片帆在空碧晝孤舟漾曖景獨鶴下秋空安流正日晝淨緑天無風晚古樹夕陽盡空江暮靄秋寂寞扣舷坐獨生千里愁夜猿聲到枕上愁夢紛難理寂寂深夜寒清霜落秋水感南陽墓枯荄沒古墓駮蘚蔽豐碑向晚微風起如聞坐嘯時春日雪酬潘侍郎酒杯春醉好飛雪晚庭閒久憶同前賞中秋對逺山相思樹家逺江東道身對江南春空見相思樹不見相思人九日重九共歡娛秋光景氣殊他時頭似雪還對插茱萸中書送敕賜齊饌戲酬常日每齊眉今朝共解頤遙知大官膳應與衆雛嬉敕賜長壽酒恩霑長夀酒歸遺同心人滿酌共君醉一杯千萬春玉臺體十首隱映羅衫薄輕盈玉腕圓相逢不肯語微笑畫屏前知向遼東去由來幾許愁破顔君莫怪嬌小不禁羞樓上吹簫罷閨中刺繡闌佳期不可見盡日淚潺潺晝足珊瑚枕魂消玳瑁牀羅衣不忍著羞見繡鴛鴦君去期花時花時君不至簷前雙燕飛落妾相思淚空閨滅燭夜羅幌獨眠時淚盡腸欲斷心知人不知秋風一夜至吹盡後庭花莫作經時別西鄰是宋家獨自披衣坐更深月露寒隔簾腸欲斷爭敢下階看昨夜裙帶解今朝蟢子飛鉛華不可棄莫是槀砧歸萬里行人至深閨夜未眠雙眉燈下掃不待鏡臺前江村夜歸項斯月落江村黑前村人語稀幾家深樹裏㸃火夜漁歸送越僧靜中無伴住今亦獨隨緣昨夜離空室焚香淨去船金井怨曹鄴西風吹急景美人照金井不見面上花却恨井中影庭草庭草根自淺造化無遺功低回一寸心不敢怨春風怨詩二首美人如新花許嫁還獨守豈無青銅鏡終日自疑醜庭花已結子巖花猶弄色誰令生處逺用盡春風力自退寒女面如花空寂常對影況我不嫁容甘為瓶墮井早起月墮滄浪西門開樹無影此時歸夢闌獨立梧桐井思不見但見出門踪不見出門跡却笑山頭女無端化為石讀李斯傳欺暗常不然欺明當自戮難將一人手掩得天下目古莫買妾行千扇不當路未似開一門若遣緑珠醜石家應尚存雜誡帶香入鮑肆香氣同鮑魚未入猶可悟已入當何如樂府體蓮子房房嫩菖蒲葉葉齊共結池中根不厭池中泥愁詩二首逺夢如水急白髮如草新歸期待春至春至還送人澗草短短青山月朗朗明此夜目不掩屋頭鳥啼聲情詩三首東西是長江南北是官道牛羊不戀山只戀山中草阿嬌生漢宫西施住南國專房莫相妬各自有顔色蛺蝶空中飛夭桃庭中春見他夫婦好有女初嫁人築城三首郎有蘼蕪心妾有芙蓉質不辭嫁與郎築城無休日嗚嗚啄人鴉軋軋上城車力盡土不盡得歸亦無家築人非築城圍泰豈圍我不知城上土化作宫中火甲第遊人未入門花影出門前將軍來此住十里無荒田望不來見花憶郎面常願花色新為郎容貌好難好相似人入關衡門亦無路何況入西秦灸病不得穴徒為采艾人萬首唐人絶句卷十
