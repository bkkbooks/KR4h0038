body:
  text: 萬首唐人絶句卷四十二宋洪邁編七言送劉寰北歸劉商南巢登望縣城孤半是青山半是湖知爾素多山水興此回歸去更來無送王閈歸蘇州深山窮谷沒人來邂逅相逢眼漸開雲鶴洞宫君未到夕陽帆影幾時回送人往虔州莫歎乘軺道路賖髙樓日日望還家人到南康皆下淚唯君笑向此中花送僧往湖南間出東林日影斜稻苗深淺映袈裟船到南湖風浪靜可憐秋水照蓮花送元使君自楚移越露冕行春向若耶野人懷惠欲移家東風二月淮陰郡唯見棠梨一樹花移居深山不食黃精不采薇葛苗為帶草為衣孤雲更入深山去人絶音書雁自飛送王永二首君去春山誰共遊鳥啼花落水空流如今送别臨溪水他日相思來水頭棉衣似熱夾衣寒時景雖和春已闌誠知暫别那惆悵明日藤花獨自看送别灞岸青門有敝廬昨來聞道半丘墟陌頭空送長安使舊里無人可寄書送王貞清陽玉潤復多才邂逅佳期過早梅槿花亦可浮杯上莫待東籬黃菊開送薛六暫遊楊州志在乘軒鳴玉珂心期未快隱青蘿廣陵行路風塵合城郭新秋砧杵多送楊行元赴舉晚渡𨝍溝惜别離漸看烽火馬行遲千鈞何處穿楊葉二月長安折桂枝行營送人鞞鼓喧喧對古城獨尋歸鳥馬蹄輕回來看覔鶯飛處即是將軍細桞營滑州送人先歸河水氷消雁北飛寒衣未足又春衣自憐漂蕩經年客送别千回獨未歸送濬上人木落前山霜路多手持寒錫送頭陀眼看庭樹梅花發不見詩人獨詠歌髙郵送弟遇北遊門臨楚國舟船路易見行人易别離今日送君心最恨孤帆水下又風吹送豆盧郎赴海陵煙波極目已沾襟路出東塘水更深看取海頭秋草色一如江上别離心送女子青娥宛宛聚為裳烏鵲橋成别恨長惆悵梧桐非舊影不悲鴻鴈暫隨陽酬道芬寄畫松聞道鉛華學沈寧寒枝淅瀝葉青青一株將比囊中樹若箇年多有茯苓山翁持酒相訪以畫松酬之白社風霜驚暮年銅瓶桑落慰秋天憐君意厚留新畫不著松枝當酒錢題潘師房渡水傍山尋絶壁白雲飛處洞門開仙人來往行無迹石徑春風長緑苔謝自然却還舊居仙侣招邀自有期九天升降五雲隨不知辭罷虛皇日更向人間住幾時寄李俌挂却衣冠披薜荔世人應是笑狂愚年來漸覺髭鬚黑欲寄松花君用無贈頭陀師少壯從戎馬上飛雪山童子未緇衣秋山年長頭陀處説我軍前射虎歸贈嚴四草屨輕微管蒯將何用容足偷安事頗同日入信陵賓館靜贈君間步月明中題劉偃莊何事退耕滄海畔間看富貴白雲飛門前種稻三回熱縣裏官人四考歸題黃陂夫人祠蒼山雲雨逐明神唯有香名萬歲春東風三月黃陂水只見桃花不見人題道濟上人房何處營求出世間心中無事即身間門外水流風葉落唯將定性對前山梨樹隂福庭人靜少攀援雨露偏滋影易繁磊落紫香香亞樹清隂滿地晝當軒秋蟬聲蕭條旅舍客心驚斷續僧房靜又清借問蟬聲何所為人家古寺兩般聲歸山留别子侄二首車馬驅馳人在世東西南北鶴隨雲莫言貧病無留别百代簪纓將付君不逐浮雲不羡魚杏花茅屋向陽居鶴鳴華表應傳語鴈度霜天懶寄書與湛上人院畫松水墨乍成巖下樹摧殘半隱洞中雲猷公曾住天台寺陰雨猿聲何處聞白沙宿竇常宅觀妓楊子澄江映晚霞栁條垂岸一千家主人留客江邊宿十月繁霜見杏花上已日縣寮會集不遂馳赴踏青看竹共佳期春水晴山祓禊詞獨坐郵亭心欲醉櫻桃落盡暮愁時懷張璪苔石蒼蒼臨澗水陰風裊裊動松枝世間唯有張通會流向衡陽那得知與于中丞萬頃荒林不敢看買山容足擬求安田園失計全蕪沒何處春風種蕙蘭袁十五逺訪山門僻居謀道不謀身避病桃源不避秦逺入青山何所見寒花滿徑白頭人行營病中心許征南破敵歸可言羸病卧戎衣遲遲不見憐弓箭惆悵秋鴻敢近飛合溪水漲寄敬山人共愛碧溪臨水住相思來往踐莓苔而今却欲嫌溪水雨漲春流隔往來不羡花惆悵朝陽午又斜剩栽桃李學仙家花開花落人如舊誰道容顔不及花醉後春草秋風老此身一瓢長醉任家貧醒來還愛浮萍草漂寄官河不屬人題水洞二首桃花流出武陵洞夢想仙家雲樹春今看水入洞中去却是桃花源裏人長看巖穴泉流出忽聽懸泉入洞聲莫摘山花拋水上花浮出洞世人驚代人村中悼亡二首花落茅簷轉寂寥魂隨暮雨此中銷邇來庭桞無人折長得垂枝一萬條虛室無人乳燕飛蒼苔滿地履痕稀庭前唯有薔薇在花似殘妝葉似衣觀獵三首夢非熊虎數年間驅盡豺狼宇宙間傳道單于聞校獵相期不敢過陰山日隱寒山獵未歸鳴弦落羽雪霏霏梁園射盡南飛鴈淮楚人驚陽鳥啼松月東軒許獨遊深恩未報復淹留梁園日暮從公獵每過青山不舉頭畫石蒼蘚千年粉繪傳堅貞一片色猶全那知忽遇非常用不把分銖補上天詠雙開蓮花菡蓞新花曉並開濃妝美笑面相隈西方采畫嘉陵鳥早晚雙飛池上來夜聞鄰管何事霜天月滿空鸝雛百囀向春風鄰家思婦更長短楊桞如絲在管中山中寄元二侍御二首心期汗漫卧雲扄家計漂零水上萍桃李向秋雕落盡一枝松色獨青青拖紫鏘金濟世才知君倚玉望三台深山窮谷無人到唯有狂愚獨自來上崔十五老丈天漢乘槎可問津寂寥深景到無因看花獨往尋詩客不為經時謁丈人袁德師求畫松柏偃松佹勢自分森梢古意出浮雲如今眼暗畫不得舊有三株持贈君早夏月夜問王開清風首夏夜猶寒嫩笋侵階竹數竿君向蘇臺長見月不知何似此中看裴十六廳即事主人能政訟庭間帆影雲峯户牖間每到夕陽嵐翠近只言籬障倚前山春日行營即事風引雙旌馬首齊曹南戰勝日平西為儒不解從戎事花落春深聞鼓鼙畫樹後呈濬師翔鳯邊風十月寒蒼山古木更摧殘為君壁上畫松柏徑雪嚴霜君試看弔從甥日晚河邊訪惸獨衰桞寒蕪繞茅屋兒童驚走報人來孀婦開門一聲哭商山曹松垂白商於原下住兒孫共死一身忙木弓未得長離手猶與官家射麝香題院僧松空山澗畔枯松樹老對禪堂鱗甲身傳是昔朝僧種著下頭應有茯苓神已亥歲二首澤國江山入戰圖生民何計樂樵漁憑君莫話封侯事一將功成萬骨枯波間一戰百神愁兩岸強兵過未休誰道滄江總無事近來長共血爭流亂後入洪州西山寂寂陰溪水潄苔塵中將得苦吟來東峰道士如相問縣尉而今不姓梅送僧入廬山若到江州二林寺遍逰應未出雲霞廬山瀑布三千仞畫破青霄始落斜江西逢僧閩地髙僧楚地逢伴逰蠻錫挂垂松白雲逸性都無定才出雙峰愛五峰鍾陵寒食日郊外間逰可憐時節足風情杏子粥香如冷餳無奈春風輸舊火遍教人喚作山櫻中秋對月無雲世界秋三五共看蟾盤上海涯直到天頭天盡處不曾私照一人家題李太尉平泉莊汪遵水泉花木好髙眠嵩少縱橫滿目前惆悵人間不平事今朝身在海南邊戰城南風沙刮地塞雲愁平旦交鋒晚未休白骨又霑新戰血青天猶列舊旄頭延平津三尺晶熒射斗牛豈隨凡手報寃讐延平一旦為龍處看取風雲布九州項亭不修仁德合文明天道如何擬力爭隔岸故鄉歸不得十年空負拔山名烏江兵散弓殘挫虎威單鎗匹馬突重圍英雄去盡羞容在看却江東不得歸緑珠大扺花顔最怕秋南家歌歇北家愁從來幾許如君貌不肯如君墜玉樓升遷橋漢朝卿相盡風雲司馬題橋衆又聞何事不如楊德意解搜賢哲薦明君隋桞夾浪分堤萬樹餘為迎龍舸到江都君看靖節髙眠處只向衡門種五株楊桞亞夫營畔桞濛濛隋主堤邊四路通攀折贈君還有意翠眉輕嫩怕春風桐江光武重興四海寧漢臣無不受浮榮嚴陵何事輕軒冕獨向桐江釣月明招隱罷聽泉聲看鹿羣丈夫才策合匡君早携書劔離巖谷莫待蒲輪輾白雲陳宫椒宫荒宴竟無疑倐忽山河盡入隋留得後庭亡國曲至今猶與酒家吹樊將軍廟玉輦曾經隔楚營漢皇心怯擬休兵當時不得將軍力日月須分一半明東海漾舟雪浪映花顔徐福携將竟不還同作危時避秦客此行何似武陵灘昭君漢家天子鎮寰瀛塞北羌人未罷兵猛將謀臣徒自貴蛾眉一笑塞塵清五湖已立平吳霸越功片帆髙揚五湖風不知戰國官榮者誰似陶朱得始終澠池西秦北趙各稱髙池上張筵列我曹何事君王親擊缶相如有劔可吹毛函谷關脫禍東奔壯氣摧馬如飛電轂如雷當時若不聽彈鋏那得關門半夜開詠酒二首九醖松醪一曲歌本圖間放飬天和後人不識前賢意破國亡家事甚多萬事銷沉向一杯竹門啞軋為風開秋宵睡足芭蕉雨又是江湖入夢來蒼頡臺觀迹成文代結繩皇風儒教浩然興幾人從此休耕釣吟對長安雪夜燈聽盛小叢歌贈崔侍御李納繡衣奔命去情多南國佳人斂翠娥曾向教坊聽國樂為君重唱盛叢歌奉和楊知言燕趙能歌有幾人為花回雪似含嚬聲隨御史西歸去誰伴文翁怨九春奉和封彥沖蓮府才為緑水賓忽乘驄馬入咸秦為君唱作西河調日暮偏傷去住人奉和盧鄴何郎戴豸别賢侯更吐歌珠宴庾樓莫道江南不同醉即陪舟楫上京逰奉和髙湘謝安春渚餞袁宏千里仁風一扇清歌黛慘時方酩酊不知公子重飛觥奉和盧溵烏臺上客紫髯公共捧天書靜鏡中桃葉不須歌白苧耶溪暮雨起樵風奉和崔元範羊公留宴峴山亭洛浦髙歌五夜情獨向柏臺為老吏可憐林木響餘聲思歸寄靈徹韋丹王事紛紛無暇日浮生冉冉只如雲已為平子歸休計五老巖前必共聞答徹公空山泉落松窗靜間地草生春日遲白髮漸多身未退依依常在永禪師萬首唐人絶句卷四十二
