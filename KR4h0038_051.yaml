body:
  text: 萬首唐人絶句巻五十一宋洪邁編七言看花羅鄴花開只恐看來遲及到愁如未看時家在楚鄉身在蜀一年春色負歸期桞絮處處東風撲晚陽輕輕醉粉落無香就中堪恨隋堤上曾惹龍舟舞鳯凰雲紛紛靄靄遍江湖得路為霖豈合無莫使悠颺只如此帝鄉還更援蒼梧芳草曲江岸上天街裏兩地縱生車馬多不是萋萋南浦見晚來烟雨半相和出都門青門春色一花開長到花時把酒杯自覺無家似潮水不知歸處去還來水簾萬㸃飛泉下白雲似簾懸處望疑真若將此水為霖雨更勝長垂隔路塵賞春芳草和烟暖更青閒門要路一時生年年㸃檢人間事唯有春風不世情歎平泉春生前幾到此亭臺尋歎投荒去不回若使春風㑹人意花枝盡合向南開長安春雨兼風颯颯灑皇州能滯輕寒與勝遊半夜五侯池舘裏美人驚起為花愁駕蜀回上皇西幸却歸秦花木依然滿禁春唯有貴妃歌舞地月明空殿鎻香塵河湟河湟何計絶烽烟免使征人更戍邉盡放農桑無一事遣教知有太平年聞子規蜀魄千年尚怨誰聲聲啼血向花枝滿山明月東風夜正是愁人不寐時江帆别離不獨恨蹄輪渡口風帆發更頻何處青樓方凭檻半斜紅日認歸人望仙千金壘土望三山雲鶴無蹤羽衛還若說神仙求便得茂陵何事在人間放鷓鴣好倚青山與碧谿刺桐毛竹待䨇棲花時遷客傷離别莫向相思樹上啼宫中二首芳草長含玉輦塵君王遊幸此中頻今朝别有承恩處鸚鵡飛來說似人雖然自小屬梨園不識先皇玉殿門還是當時歌舞曲今來何處最承恩驪山風搖巖桂露聞香白鹿驚時出繞墻不向驪山鎻宫殿可知仙去是明皇梅花繁如瑞雪壓枝開越嶺吳溪免用栽却是五侯家未識春風不放過江來鴈早背嚴霜過戍樓又隨寒日下河洲江南江北多離别忍報年年兩地愁汴河煬帝開河鬼亦悲生民不獨力空疲至今嗚咽東流水似向清平怨昔時渡江有感岸落殘紅錦雉飛渡江船上夕陽微一枝猶負平生意歸去何曾勝不歸題終南山僧堂九衢終日見南山名利何人肯掩闗唯有吾師達眞理坐看雙樹老雲間冬夕江上書事一帶長谿渌浸門數聲幽鳥啄雲根松亭盡日唯空坐難得儒翁共討論大散嶺過徃長逄日色稀雪花如掌撲行衣嶺頭却望人來處特地身疑是鳥飛嘉陵江嘉陵南岸雨初收江似秋嵐不煞流此地終朝有行客無人一為棹扁舟螢水殿清風玉户開飛光千㸃去還來無風無月長門夜偏到堦前㸃緑苔吳王古宫井二首古宫荒井曾平後見說耕人又鑿開拾得玉釵鎸勑字當時恩澤賜誰來含青薜荔隨金甃碧砌磷磷生緑苔莫言數尺無波水曾與如花並照來黄河曉渡大河平野正竆秋羸馬羸僮古渡頭昨夜蓮花峰下月隔簾相伴到明愁温泉一條春水漱莓苔幾繞𤣥宗浴殿回此水貴妃曾照影不堪流入舊宫來秋怨夢斷南窻啼曉烏新霜昨夜下庭梧不知簾外如珪月還照邊城到曉無春過白遥嶺鳥道穿雲望峽遙羸蹄經病在岧嶤到來山下春將半上得林端雪未銷歎别北來南去幾時休人在光隂似箭流直待江山盡無路始應抛得别離愁送春欲别東風思黯然亦知春去有明年世間爭那人先老更對殘花一醉眠蠟燭暖香紅㷔一時燃緹幕初垂月落天堪恨蘭堂别離夜如珠似淚滴樽前子規羅隱銅梁路逺草青青此恨那堪枕上聽一種有寃猶可報不如銜石疊滄溟焚書坑千載遺蹤一窖塵路傍耕者亦傷神祖龍筭事渾乖角將為詩書活得人始皇陵荒堆無草樹無枝懶向行人問昔時六國英雄漫多事到頭徐福是男兒浮雲溶溶曵曵自舒張不向蒼梧即帝鄉莫道無心便無事也曾愁殺楚襄王早發北去南來無定居此生生計竟何如酷憐一覺平明睡長被雞聲惡破除香沉水良材食柏珍博山罏暖玉樓春憐君亦是無端物貪作馨香忘却身銅雀臺二首強歌強舞竟難勝花落花開淚滿纓只合當年伴君死免教憔悴望西陵臺上年年掩翠娥臺前高樹夾漳河英雄亦到分香處能共常人校幾多自遣得則高歌失却休多愁多恨亦悠悠今朝有酒今朝醉明日愁來明日愁鸚鵡莫恨雕籠翠羽殘江南地暖隴西寒勸君不用分明語語得分明出轉難竹下殘雪墻下濃隂對此君小山尖險玉為羣夜來解凍風雖急不向寒城減一分西施二首家國興亡自有時吳人何苦怨西施西施若解傾吳國越國亡來又是誰讓高㤗伯開基日賢見延陵復命時未㑹子孫因底事解崇臺榭為西施金錢花占得佳名繞樹芳依依相伴向秋光若教此物堪收貯應被豪門盡斸將梅天賜臙脂一抺腮盤中磊落笛中哀雖然未得和羮便曾與將軍止渴來煬帝陵入郭登橋出郭船紅樓日日柳年年君王忍把平陳業只换雷塘數畝田馬嵬陂佛屋前頭野草春貴妃輕骨此為塵從來絶色知難得不破中原未是人隋堤柳夾岸依依千里遙路人回首認隋朝春風未借宣華意猶費工夫長柳條孟先生墓數歩荒榛接舊蹊寒江漠漠草萋萋鹿門黄土無多少恰到書生冢便低秦紀長策東邊極海隅黿鼉奔走鬼神趨憐君未到沙丘日肯信人間有死無柳二首灞岸晴來送别頻相偎相倚不勝春自家飛絮猶無定爭解垂絲絆路人一簇青烟鎻玉樓半埀欄畔半埀溝明年更有新條在繞亂春風卒未休王濬墓男兒未必盡英雄俱到時來命即通若使吳都由王氣將軍何處立殊功京中晚望心如野鹿跡如萍漫向人間性一靈徃事不知多少夢夜來和酒一時醒偶興逐隊隨行二十春曲江池畔避車塵如今贏得將衰老閒看人問得意人題僧院日夜潮聲送是非一回登眺一忘機憐師好事無人見不把蘭牙染褐衣圉城偶作東望陳留日欲曛每因刀筆想夫君自從郭㤗碑銘後只見黄金不見文宿紀南驛䇿蹇南游憶楚朝隂風淅淅樹蕭蕭不知無忌姦邪骨又作何山野葛苖偶題鍾陵醉别十餘春重見雲隂掌上身我未成名君未嫁可能俱是不如人故都江南江北兩風流一作迷津一拜侯至竟不如隋煬帝破家猶得到揚州寄竇處士二首蘭亭醉客獨知聞欲問平安隔海雲不是金陵錢太守世間誰肻更容身鼇背樓臺拂白榆此中槎客亦踟蹰牢山道士無仙骨却向人間作酒徒蜂不論平地與山尖無恨春光盡被占採得百花成蜜後不知辛苦為誰甜七夕月帳星房次第開兩情唯恐曉光催時人不用穿針待没得心情送巧來羅敷水雉聲角角野田春試駐征車問水濱數樹枯桑雖不語思量應合識秦人嚴陵灘中都九鼎動英髦漁釣牛簑且遁逃世祖升遐夫子死原陵不及釣臺高華清宫樓殿層層佳氣多開元時節好笙歌也知道德勝堯舜爭奈楊妃解笑何簾二首疊影重紋映畫堂玉鈎銀燭共熒煌㑹應得見神仙在休下真珠十二行翡翠佳名世共稀玉堂高下巧相宜殷勤為囑纎纎手捲上銀鈎莫放埀韋公子擊箸狂歌慘别顔百年人事夢魂間李將軍自嘉聲在不得封侯亦是閒中秋不見月隂雲薄暮上空虚此夕清光已破除只恐異時開霽後玉輪依舊養蟾蜍望思臺芳草臺邉魂不歸野烟喬木弄殘暉可憐高祖清平業留與閒人作是非鷺鷥斜陽澹澹柳隂隂風裊寒絲映水深不要向人誇潔白也知常有羡魚心書淮隂侯傳寒燈挑盡見遺塵試瀝椒漿合有神莫恨高皇不終始滅秦謀項是何人竹籬外清隂接藥欄晚風交戞碧琅玕子猷没後知音少粉節霜筠漫歲寒中秋夜戲酬顧道士孫蜀不那此身偏愛月等閒看月即更深仙翁每被嫦娥使一度逄圓一夜吟贈薛瑤英楊炎雪面澹娥天上女鳯簫鸞翅欲飛去玉釵翹碧歩無塵楚腰如柳不勝春題北方天王祠劉山甫壊墻風雨幾經春草色盈庭一座塵自是神明無感應盛衰何得却由人贈項斯楊敬之幾度見詩詩緫好及觀標格過於詩平生不解藏人善到處相逄說項斯過崔處士林亭裴迪喬柯門裏自成隂散髪窻中曾不簪逍遙且喜從吾事榮寵從來非我心酬王摩詰過林亭崔興宗窮巷空林常閉關悠悠獨臥對前山今朝忽枉嵇生駕倒屣開門遙解顔朝退望終南山李拯紫宸朝罷綴鴛鸞丹鳯樓前駐馬看唯有終南山色在晴明依舊滿長安長門怨劉駕御泉長繞鳯凰樓只是恩波别處流閒揲舞衣歸未得夜來砧杵六宫秋題畫山水楊汝士太華峰前是故鄉路人遥指讀書堂如今老大騎官馬羞向關西道姓楊元夕前有二首崔液今年春色勝常年此夜風光最可憐鳷鵲樓前新月望鳯凰臺上寳燈燃金勒銀鞍控紫騮玉輪朱幰駕青牛驂驔始似東城曲倐忽還來南陌頭公子王孫意氣驕不論相識也相邀最憐長袖風前弱更賞新絃暗裏調星移漢轉月將微露灑烟飄燈漸稀猶惜燈傍歌舞處踟蹰相顧不能歸詠南嶽徑松狄煥一陣雨聲歸嶽嶠兩條寒色下瀟湘客吟晚景停孤棹僧踏清隂徹上方題鄜州相思鋪令狐挺誰把相思號此河塞垣車馬徃來多只應自古征人淚灑向空川作逝波婢僕詩二首李昌符春娘愛上酒家樓不怕歸遲總不憂推道那家娘子臥且留教住要梳頭不論秋菊與春花箇箇能噇空腹茶無事莫教頻入庫一名閒物要些些謁華州李相不遇平曾老夫三日門前立珠箔銀屏晝不開詩巻却抛書袋裏匹如閒看華山來江西謁所知不遇劉魯風萬巻書生劉魯風烟波千里謁文翁無錢乞與韓知客名紙毛生不為通萬首唐人絶句巻五十一
