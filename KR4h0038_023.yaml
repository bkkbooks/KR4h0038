body:
  text: 萬首唐人絶句巻二十三宋洪邁編七言送蜀客張籍蜀客南行祭碧雞木綿花發錦江西山橋日晚行人少時見猩猩樹上啼蠻中銅柱南邊毒草春行人㡬日到金麟玉鐶穿耳誰家女自抱琵琶迎海神贈道士茆山近别剡溪逢玉節青毛十二重自説年年上天去羅浮最近海邊峯望平驛茫茫菰草平如地渺渺長堤曲似城日暮未知投宿處逢人更問向前程宿天竺寺寄靈隠僧夜向靈溪息此身風泉竹露浄衣塵月明石上堪同宿那作山南山北人送元紹春日同遊漳水邊如今重説恨綿綿天涯相見還離别客路秋風又㡬年美人宫棊紅燭臺前出翠娥海沙鋪局巧相和趂行移手巡收盡數數看誰得最多蠻州瘴水蠻中入洞流人家多住竹棚頭青山海上無城郭唯見松牌出象州送元宗簡貂帽垂肩窄皂裘雪深騎馬向西州暫時相見還相送却閉閒門依舊愁寄徐晦鄠陂魚美酒偏濃不出琴齋見雪峰應勝昨来趨府日簿書牀上亂重重寄白學士自掌天書見客稀縱因休沐鎖雙扉㡬回扶病欲相訪知向禁中歸未歸喜王六同宿十八年来恨別離唯同一宿詠新詩更相借問詩中語共説如今勝舊時題玉像堂玉毫不著世間塵輝相分明十八身入夜無烟燈更好堂中唯有轉經人與賈島閒遊水北原南草色新雪消風暖不生塵城中車馬應無數能解閒行有㡬人哭丘長史丘公已没故人稀欲過街西更訪誰每到子城東路上憶君相逐入朝時哭孟寂曲江院裏題名處十九人中最少年今日春光君不見杏花零落寺門前患眼三年患眼今年校免與風光便隔生咋日韓家後園裏看花猶似未分明荅劉兢劉君久被時抛擲老向城中作選人昨日街西相近住每來存問老夫身贈華嚴寺僧一身依止荒閒院燭耀窻中有宿煙徧禮華嚴經裏字不曽行到寺門前逢故人山東二十餘年別今日相逢在上都説盡向来無限事相看摩捋白髭鬚送蕭逺弟街裏槐花傍馬垂病身相送出門遲與君别後秋風夜作得新詩説向誰送辛少府才多不肯限容身老大詩章轉更新選得天台山下住一家全作學仙人贈任道士長安多病無生計藥鋪醫人亂索錢欲得定知身上事憑君為筭小行年招周居士閉門秋雨濕牆莎俗客來稀野思多已掃書堂安藥竈山人作意早經過送許處士髙情自與俗人疎獨向藍溪選僻居㑹到白雲長取醉不能窻下讀閒書題楊秘書新居愛閒不向争名地宅在街西最静坊巻裏詩過一千首白頭新受祕書郎送晊師九星壇下煎茶别五老峯頭覓寺居作得新詩旋相寄人來請莫達空書送僧往金山聞道溪隂山水好師行一一徧經過事須覔取堪居處若箇溪頭藥最多尋徐道士尋師逺到暉天觀竹院森森閉藥房聞入静来經七日仙童簷下獨焚香荅韋開州寄車前子開州午日車前子作藥人皆道有神慚愧使君憐病眼三千餘里寄閒人憶故州累石為山作野夫自收雲藥讀仙書如今身是他州客每見青山憶舊居送客㳺蜀行盡青山到益州錦城樓下二江流杜家曽向此中住為到浣花溪水頭送陸暢共踏長安街裏塵吳州獨作未歸身貴門舊宅今誰住君過西塘與問人感春逺客悠悠任病身誰家池上又逢春明年各自東西去此地看花是別人贈李司議漢庭誰問投荒客十嵗天南著白衣秋草茫茫惡溪路嶺頭遙送北人歸别客青山歴歴水悠悠今日相逢明月秋繫馬城邊楊栁樹為君沽酒暫淹留登樓寄胡家兄弟獨上西樓盡日閒林煙演漾鳥蠻蠻謝家兄弟重城裏不得同看雨後山荅劉明府身病多時又客居滿城親舊盡相疎可憐絳縣劉明府猶解頻頻寄逺書酬藤杖病裏出門行步遲喜君相贈古藤枝倚来自覺身生力每向傍人説得時法雄寺東樓汾河舊宅今為寺猶有當時歌舞樓四十年來車馬客古槐深巷暮蟬愁寄故人静曲閒房病客居蟬聲滿樹槿花疎故人祗在藍田縣强半年来不得書鄰婦哭征夫雙鬟初合便分離萬里征夫不得隨今日軍回身獨没去時鞍馬别人騎和崔駙馬聞蟬鳳凰樓下多歡樂不覺秋風暮雨天應為昨来身暫病蟬聲得到耳傍邊看櫻桃花昨日南園新雨後櫻桃花發舊枝柯天明不待人同看遶樹重重履跡多和郭明府縣中㑹飲一樽清酒兩人同好在街西水縣中自恨病身相去逺此時閒坐對秋風唐興觀看花新紅舊紫不相宜看覺從前兩月遲更向同来詩客道明年到此莫過時九華觀看花街西無數閒遊處不似九華仙觀中花裏可憐池上景㡬回牆壁貯春風贈姚合丹鳳門前向曉開千官相次入朝来唯君獨走衝塵土下馬橋邊報直回尋時道士觀裏初晴竹樹涼閒行共到最髙房昨来官罷無生計欲就師求斷穀方同韓侍郎南溪夜賞喜作閒人得出城南溪兩月逐君行忽聞新命須歸去一夜船中語到明使行望悟真採玉峯連佛寺幽髙髙斜對驛門樓無端来去騎官馬寸步教身不得遊重陽日至峡道無限青山行已盡回看忽覺逺離家逢髙欲飲重陽酒山菊今朝未見花贈座客劉郎中憶昔君登南省日老夫猶是褐衣身誰知二十餘年後来作學曹相替人唐興觀玉蘂仙二首千枝花裏玉塵飛阿母宫中見亦稀應共諸仙鬭百草獨来偷折一枝歸九色雲中紫鳳車尋仙来到洞仙家飛輪回處無蹤跡唯有班班滿地花秋思洛陽城裏見秋風欲作歸書意萬重復恐怱怱説不盡行人臨發又開封憶逺行人猶未有歸期萬里初程日暮時唯愛門前雙柳樹枝枝葉葉不相離玉山館長溪新雨色如泥野水隂雲盡向西楚客天南行漸逺山山樹裏鷓鴣啼寄府吏野水尋花共作期今朝出郭不相隨待君公事有閒日此地春風應過時涼州詞三首邊城暮雨雁飛低蘆笋初生漸欲齊無數鈴聲遙過磧應䭾白練到安西古鎮城門白磧開蕃兵往往傍沙堆巡邊使客行應早每待平安火到来鳳林闗裏水東流白草黄榆六十秋邊將皆承主恩澤無人解道取涼州宫詞二首新鷹初放兔猶肥白日君王在内稀薄暮千門臨欲鎖紅粧飛騎向前歸黄金捍撥紫檀槽絃索初張調更髙盡理昨来新上曲内官簾外送櫻桃華清宫温泉流入漢離宫宫樹行行浴殿空武帝時人今欲盡青山空閉御牆中崔駙馬養鶴身閒無事稱髙情已有人間章句名求得鶴来教翦翅望仙臺下亦將行閒遊二首老身不計人間事野寺秋晴每獨過病眼校来猶斷酒却嫌行處菊花多終日不離塵土間若為能見此身閒今朝暫共遊僧語更恨趨時别舊山劉兵曹贈酒一瓶顔色似甘泉開向新栽小竹前欲罷身中更無事移床獨就夕陽眠送王梧州楚江亭上秋風起看發蒼梧太守船千里同行從此别相逢又隔㡬多年春日早朝曉陌春寒朝騎来瑞雲深處見樓臺夜来新雨沙墀濕東上閤門應未開寄二山人為箇朝章束此身眼看東洛去無因歷陽舊客今應少轉憶鄰家二老人寄李渤五度溪頭躑躅紅嵩陽寺裏講時鐘春山處處行應好一月看花到㡬峰尋仙溪頭一徑入青崖處處仙居隔杏花更見峯西幽客説雲中猶有兩三家寄王奉卿愛君紫閣峯前好新作書堂藥竈成見欲移居相近住有田多與種黄精題渭北寺上方昔祭郊壇今謁陵寺中髙處最來登十餘年後人多别喜見當時轉讀僧杏園贈劉郎中一去瀟湘頭欲白今朝始見杏花春從来遷客應無數重到花前有㡬人荅鄱陽客藥名詩江臯嵗暮相逢地黄葉霜前半夏枝子夜吟詩向松桂心中萬事喜君知寄宋景詔發官兵取亂臣將軍弓箭不離身君今獨在征東府莫遣功名屬別人倡女詞輕鬢叢梳闊掃眉為嫌風日下樓稀畫羅金縷難相稱故著尋常淡薄衣荅元八遺紗帽黒紗方帽君邊得稱到山前坐竹床唯恐被人偷様翦不曽閒戴出書堂題僧院聞師行講青龍疏本寺往来多少年静掃空房唯獨坐千莖秋竹在簷前送元八百神齋祭相隨徧尋竹看山亦共行明日城西送君去舊遊重到獨題名吳楚歌詞庭前春鳥啄林聲紅夾羅襦縫未成今朝社日停針線起向朱櫻樹下行月臺觀一身清浄無童子獨坐空堂得㡬年每夜焚香通月觀可憐光得最團圓華山廟金天廟下西京道巫女紛紛走似煙手把紙錢迎過客遣求恩福到神前病中東風漸暖滿城春獨自幽居養病身莫説櫻桃花已發今年不作看花人寺宿齋晚到今光門外寺寺中新竹隔簾多齊官禁與僧相見院院開門不得過贈施肩吾世間漸覺無多事雖得空名未著身合取藥成相待喫不須先作上天人贈王建于君去後交游少東野無來篋笥貧賴有白頭王建在眼前猶見詠詩人逢賈島僧房逢著欵冬花出寺吟行日已斜十二街中春雪滿馬蹄今去入誰家離宫怨髙堂別館連湘渚長向春江開萬户荆王去去不復来宫中美人自歌舞春別曲長江春水緑堪染蓮葉出水大如錢江頭橘樹君自種那不長繫木蘭船成都曲錦江近西煙水緑新雨山頭茘枝熟萬里橋邊多酒家遊人愛向誰家宿烏栖曲西山作宫潮滿池宫鳥曉鳴茱茰枝吳姬採蓮自唱曲君王昨夜舟中宿楚妃怨梧桐葉下黄金井横架轆轤牽素綆美人初起天未明手拂銀瓶秋水冷寒塘曲寒塘沈沈柳葉疎水暗人語驚栖鳬舟中少年醉不起持燭照水射游魚春堤曲野塘鵁鶄飛樹頭緑蒲紫菱蓋碧流狂客誰家愛雲水日日獨來城下遊山禽山禽毛如白練帶栖我庭前栗樹枝獼猴半夜來取栗一雙中林向月飛秋山秋山無雲復可風溪頭看月出深松草堂不閉石床静葉間墜露聲重重萬首唐人絶句巻二十三欽定四庫全書萬首唐人絶句巻二十三宋洪邁編五言原缺萬首唐人絶句巻二十三
