body:
  text: 萬首唐人絶句卷四十一宋洪邁編七言過景陵李商隱武皇精魄久仙升帳殿淒涼煙霧凝俱是蒼生留不得鼎湖何異魏西陵板橋曉别回望髙城落曉河長亭忩户壓微波水仙欲上鯉魚去一夜芙蓉紅淚多關門柳永定河邉一行柳依依長發故年春東來西去人情薄不為清隂減路塵楚宫十二峯前落照微髙唐宫暗坐迷歸朝雲暮雨長相接猶自君王恨見稀夕陽樓花明柳暗繞天愁上盡重城更上樓欲問孤鴻向何處不知身世自悠悠鴛鴦雌去雄飛萬里天雲羅滿眼淚澘然不須長結風波願鎖向金籠始兩全妓席送獨孤雲之武昌疊嶂千重叫恨猿長江萬里洗離魂武昌若有山頭石為拂蒼苔檢淚痕武夷山只得流霞酒一杯空中簫鼓當時回武夷洞裏生毛竹老盡曾孫更不來一片一片瓊英價動天連城十二昔虛傳良工巧費真為纍楮葉成來不直錢寄成都二從事紅蓮幕下紫梨新命斷湘南病渴人今日問君能寄否二江風水接天津西南行却寄相送者百里隂雲覆雪泥行人只在雪雲西明朝驚破還鄉夢定是陳倉碧野雞四老廟二首羽翼殊勳棄若遺皇天有運我無時廟前便接山門路不長青松長紫芝本為留侯慕赤松漢庭方識紫芝翁蕭何只解追韓信豈得虛當第一功平公門下梁山兖水約從公兩地差池一旦空謝墅庾村相弔後自今岐路更西東謝書微意何曾有一毫空擕筆硯奉龍韜自蒙半夜傳衣後不羡王祥得佩刀齊宫詞永夀兵來夜不扄金蓮無復印中庭梁臺歌管三更罷猶自風搖九子鈴夜吟樹繞池寬月影多村砧島笛隔風蘿西亭翠被餘香薄一夜將愁向敗荷讀任彥升碑任昉當年有美名可憐才調最縱橫梁臺初建應惆悵不得蕭公作騎兵江上憶嚴五征南幕下帶長刀夢筆深藏五色毫逄著滄江不敢詠鎮西留與謝功曹華州周大夫宴席郡齋何用酒如泉飲德先時已醉眠若共門人推禮分戴崇爭得及彭宣相思相思樹下合歡枝紫鳯青鸞並羽儀腸斷秦臺吹管客日西春盡到來遲送鄭大南覲黎辟灘聲五月寒南風無處附平安君懷一匹胡威絹爭拭酬恩淚得乾舊頓東人望幸久咨嗟四海于今是一家猶鎖平時舊行殿盡無宫户有宫鴉代董秀才却扇莫將畫扇出帷來遮掩春山滯上才若道團圓是明月此中須放桂花開有感非關宋玉有微辭却是襄王夢覺遲一自高唐賦成後楚天雲雨盡堪疑驪山有感驪岫飛泉泛暖香九龍呵護玉蓮房平明每幸長生殿不從金輿唯壽王别智玄法師雲鬢無端怨别離十年移易住山期東西南北皆垂淚却是楊朱真本師贈孫綺新及第長樂遙聼上苑鐘綵衣稱慶桂香濃陸機始擬誇文賦不覺雲間有士龍憶洪文館諸校書清切曹司近玉除比來秋興復何如崇文館裏丹霜後無限紅梨憶校書亂石虎踞龍蹲縱復橫星光漸減水䀶生不須併礙東西路笑殺厨頭阮步兵春光日日春光鬬日光山城斜路杏花香幾時心緒渾無事得及遊絲百尺長過楚宫巫峽迢迢舊楚宫至今雲雨暗丹楓微生盡戀人間樂只有襄王憶夢中龍池龍池賜酒敞雲屏羯鼓聲高衆樂停夜半宴歸宫漏永薛王沉醉壽王醒即日小鼎煎茶面曲池白鬚道士竹間棋何人書破蒲葵扇記得南塘移樹時吳宫龍檻沉沉水殿清禁門深掩斷人聲吳王宴罷滿宫醉日暮水漂花出城嫦娥雲母屏風燭影深長河漸落曉星沉嫦娥應悔偷靈藥碧海青天夜夜心殘花殘花啼露莫留春尖髻誰非怨别人若但掩關勞獨夢珤叉何日不生塵天津西望戎馬崩騰忽一狂翠華無日到東方天津西望腸真斷滿眼秋波出苑墻西亭此夜西亭月正圓踈簾相伴宿風煙梧桐莫更翻清露孤鶴從來不得眠憶住一師無事經年别逺公帝城鐘曉憶西峯煙爐銷盡寒燈晦童子開門雪滿松昨夜不辭􅀈鴂妬年芳但惜流塵暗燭房昨夜西池涼露滿桂華吹斷月中香海客海客乘槎上紫氛星娥罷織一相聞只應不憚牽牛妬聊用支磯石贈君初食笋嫩籜香笣初出林於陵論價重如金皇都陸海應無數忍翦凌雲一寸心寄蜀客君到臨卭問酒壚近來還有長卿無金徽却是無情物不許文君憶故夫海上石橋東望海蓮天徐福空來不得仙直遣麻姑與搔背可能留命待桑田白雲夫舊居平生誤識白雲夫再到仙簷憶酒壚墻外萬株人迹絶夕陽唯照欲棲烏同學彭道士參寥莫羡仙家有上真仙家暫謫亦千春月中桂樹高多少試問西河斫樹人到秋扇風浙瀝簟流漓萬里南雲滯所思守道清秋還寂寞葉丹苔碧閉門時華師孤鶴不睡雲無心衲衣笻杖來西林院門晝鎖回廊靜秋日當階柿葉隂華嶽下題西王母廟神仙有分豈關情八馬虛追落日行莫恨名姬中夜沒君王猶自不長生過華清內廄門華清别館閉黃昏碧草悠悠內廄門自是明時不巡幸至今青海有龍孫樂遊原萬樹鳴蟬隔斷虹樂遊原上有西風羲和自趂虞泉宿不放斜陽更向東丹丘青女丁寧結夜霜羲和辛苦送朝陽丹丘萬里無消息幾對梧桐憶鳯凰鳯萬里峯巒歸路迷未判容彩借山雞新春定有將雛樂阿閣華池兩處棲遊曲江十頃平波溢岸清病來唯夢此中行相如未是真消渴猶放沱江過錦城櫻桃花下流鶯舞蝶兩相欺不取花芳正結時他日未開今日謝嘉辰長短是參差故驛迎弔故桂府常侍飢烏翻樹晚雞啼泣過秋原沒馬泥二紀征南恩與舊此時丹旐玉山西槿花風露淒涼秋景繁可憐榮落在朝昏未央宫裏三千女但保紅顔莫保恩暮秋獨遊曲江荷葉生時春恨生荷葉枯時秋恨成深知身在情長在悵望江頭江水聲任洪農尉獻刺史黃昏封印點刑徒愧負荆山入座隅却羡卞和雙刖足一生無復沒階趨贈勾芒神佳期不定春期賖春物夭閼興咨嗟願得勾芒索青女不教容易損年華月夜重寄宋華陽姊妹偷桃竊藥事難兼十二城中鎖彩蟾應共三英同夜賞玉樓仍是水精簾訪人不遇卿卿不惜瑣忩春去作長楸走馬身間倚繡簾吹柳絮日髙深院斷無人雨中送客不及碧雲東去雨雲西苑路髙髙驛路低秋水緑蕪終盡分夫君太騁錦障泥池邉玉琯葭灰細細吹流鶯上下燕參差日西遍繞池邉樹憶把枯條撼雪時賈生宣室求賢訪逐臣賈生才調更無倫可憐夜半虛前席不問蒼生問鬼神送王十三校書分司多少分曹掌祕文洛陽花雪夢隨君定知何遜緣聨句每到城東憶范雲寄惱韓同年二首簾外辛夷定已開開時莫放艷陽回年華若到經風雨便是西僧話劫灰龍山晴雪鳯樓霞洞裏迷人有幾家我為傷春心自醉不勞君勸石榴花謁山從來繫日乏長繩水去雲回恨不勝欲就麻姑買滄海一杯春露泠如冰鈞天上帝鈞天會衆靈昔人因夢到青冥伶倫吹裂孤生竹却為知音不得聼失猿祝融南去萬重雲清嘯無因更一聞莫遣碧江通箭道不教腸斷憶同羣戲題友人壁花徑逶迤柳巷深小欄亭午轉春禽相如解作長門賦却用文君取酒金寄逺姮娥搗藥無時已王女投壺未肯休何日桑田俱變了不教伊水更東流王昭君毛延壽畫欲通神忍為黃金不為人馬上琵琶行萬里漢宫長有隔生春舊將軍雲臺高議正紛紛誰定當時蕩寇勳日暮灞陵原上獵李將軍是舊將軍曼倩辭十八年來墮世間瑶池歸夢碧桃間如何漢殿穿針夜又向忩中覷阿環李衛公絳紗弟子音塵絶鸞鏡佳人舊會稀今日致身歌舞地木綿花暖鷓鴣飛韋蟾謝家離别正淒涼少傅臨岐賭佩囊却憶短亭回首處夜來煙雨滿池塘漫成五章沈宋裁辭矜變律王楊落筆得良朋當時自謂宗師妙今日唯觀對屬能李杜操持事略齊三才萬象共端倪集仙殿與金鑾殿可是蒼蠅惑曉雞生兒古有孫征虜嫁女今無王右軍借問琴書終一世何如旗蓋仰三分代北偏師銜使節關東禆將建行臺不妨常日饒輕薄且喜臨戎用草萊郭令素心非黷武韓公本意在和戎兩都耆舊偏垂淚臨老中原見朔風戲題贈驛吏絳臺驛吏老風塵耽酒成仙幾十春過客不勞詢甲子唯書亥字與時人寄池州李使君七月十三夜桂含爽氣三秋首蓂吐中旬三葉新正是澄江如練處玄暉應喜見詩人花下醉尋芳不覺醉流霞倚樹沉眠日已斜客散酒醒深夜後更持紅燭賞殘花五月十五日夜聞京有燈月色燈光滿帝都香車寶輦向通衢身間不覩中興盛羞逐鄉人賽紫姑偶題二首小亭間眠微醉消山榴海柏枝相交水紋簟上珊瑚枕旁有墮叉雙翠翹清月依微香露輕曲房小院多逄迎春叢定是饒棲夜飲罷莫持紅燭行月過水穿樓觸處明藏人帶樹逺含清初生欲闕虛惆悵未必圓時即有情城外露寒風定不無情臨水當山又隔城未必明時勝蚌蛤一生長共月虧盈景陽井景陽宫井剩堪悲不盡龍鸞誓死期腸斷吳王宫外水濁泥猶得葬西施送阿龜歸華陽草堂歸意背煙霞黃綬垂腰不奈何因汝華陽求藥物碧松根下茯苓多席上贈人淡雲微雨恣髙唐一曲清聲繞畫梁料得也應憐宋玉只因無奈夢襄王東南東南一望日中烏欲逐羲和去得無且向秦樓棠樹下每朝先覔照羅敷假日素琴絃斷酒瓶空倚坐欹眠日已中誰向劉伶天幕雨更當陶令北忩風縣中惱飲席晚醉題詩贈物華罷吟還醉忘歸家若無江氏五色筆爭奈河陽一縣花縣宰禱雨井膏滴滴是精誠晝夜如絲一夕盈秪怪閭閻喧鼓吹邑人同報束長生寄趙行軍蓮幕遙臨黑水津櫜鞬無事但尋春梁王司馬非孫武且免宫中斬美人萬首唐人絶句卷四十一
