body:
  text: 萬首唐人絶句巻三十六宋洪邁編七言逢鄭三游山盧仝相逢之處花茸茸石壁攅峯千萬重他日期君何處好寒流石上一株松楊子津風巻魚龍暗楚關白波沉却海門山鵬騰鼇倒且快性地拆天開總是閒悲新年新年何事最堪悲病客遙聽百舌兒太歳只遊桃李徑春風肯管歳寒枝客淮南病揚州烝毒似燂湯客病清枯鬢欲霜且喜閉門無俗物四支安穩一張牀風中琴五音六律十三徽龍吟鶴響思庖羲二彈流水一彈月氷月風生松樹枝逢病軍人行多有病住無糧萬里還鄉未到鄉蓬鬢哀吟古城下不堪秋氣入金瘡送蕭二十三淮上客情殊冷落蠻方春早客何如相思莫道無來使回鴈峯前好寄書庭竹負霜停雪舊根枝龍笙鳯管君莫截春風一畨琴上來瑤碎金樽碧天月山中飢拾松花渇飲泉偶從山後到山前陽城軟草厚如織困與鹿麛相伴眠别舊山于鵠舊伴同游盡却回雲中獨宿守花開自是去人身漸老暮山流水任東來寄周惲家在荒陂長似秋蓼花芹葉水蟲幽去年相伴尋山客明月今宵何處遊江南意悶向江頭採白蘋還隨女伴賽江神衆中羞不分明語暗擲金錢卜遠人自小看花情不足江邉尋得一株紅黄昏人散春風起吹落誰家明月中夜夜曲北斗星移銀漢低班姬愁思鳯城西青槐陌上人行絶明月樓前烏夜啼塞上曲一墜風來一墜沙有人行處没人家黄河九曲冰先合紫塞三春不見花塞下曲石國蕃兒向磧東愛吹横笛引秋風夜來雲雨皆飛盡月照平沙萬里空鳳歸雲二首滕潜金井欄邉見羽儀梧桐枝上宿寒枝五陵公子憐文綵畵與佳人刺繡衣飲啄蓬山最上頭和煙飛下禁城秋曾將弄玉歸雲去金翿斜開十二樓忠州郡宅白行簡臨江一嶂白雲間紅緑層層錦繡班不作巴南天外意何殊昭應望驪山臺中寓直覽壁畫山水羊士諤蟲思庭莎白露天微風吹竹曉淒然今來始悟朝回客暗寫歸心向石泉望女几山女几山頭春雪消路傍仙杏發柔條心期欲去知何日惆悵回車上野橋宫人斜翡翠無窮掩夜泉猶疑一半作神仙秋來還照長門月珠露寒花是野田王學士獨游青龍寺翫紅葉因贈十畆蒼苔繞畵廊幾株紅樹過清霜高情還似看花去閒對南山歩夕陽登樓槐桞蕭踈繞郡城夜添山雨作江聲秋風南陌無車馬獨上高樓故國情憶江南舊遊二首山隂道上桂花初王謝風流滿晉書㑹作江南部從事秋來還復憶鱸魚曲水三春弄采毫樟亭八月又觀濤金罍幾醉烏程酒鶴放閒吟把蟹螯郡中即事二首紅衣落盡暗香殘葉上秋光白露寒越女含情已無限莫教長袖倚欄干登臨何處見瓊枝白露寒花自繞籬唯有樓中好山色稻畦殘水入秋池游西山蘭若路傍垂桞古今情春草春泉咽又生借問山僧好風景看花擕酒幾人行寄江陵韓少尹别來𤣥髪共成霜雲起無心出帝鄉蜀國魚牋數行字憶君秋夢過南塘資州宴行營回將几劒盈庭酒滿巵戍人歸日及瓜時元戎静鎮無邉事遣向營中偃畵旗看花一到花間一忘歸玉杯瑤瑟減光輝歌筵更覆青油幕忽似朝雲瑞雪飛詠渠州常諫議使君才子長沙暫左遷能將意氣慰當年至今猶有東山妓長史歌詩被管絃赴資陽經嶓冡山寧辭舊路駕朱轓重使疲人感漢恩今日鳴騶到嶓峽還勝博士至河源野望二首萋萋麥隴杏花風好是行春野望中日暮不辭停五馬鴛鴦飛去緑江空忘懐不使海鷗疑水映桃花酒滿巵亭上一聲歌白紵野人歸棹亦行遲蕭彭州出妓夜宴見送玉顔紅燭忽驚春微歩凌波拂暗塵自是當歌歛眉黛不應惆悵為行人題松江館津桞江風白浪平棹移高館古今情扁舟一去鴟夷子應笑分符計日程齋中詠懷無心唯有白雲知閒卧高齋夢蝶時不覺東風過寒食雨來萱草出巴籬永寧里小園寄沈校書故里心期奈别何手移芳樹憶庭柯東臯黍熟君應醉犂葉初紅白露多登郡前山洛陽歸客滯巴東處處山櫻雪滿叢峴首當時為風景豈將官舍作池籠春望莫問華簮髪已斑歸心滿目是青山獨上層城倚危檻桞營春盡馬嘶閒汎舟入後溪二首東風朝日破輕嵐仙棹初移酒未酣玉笛閒吟折楊桞春風無事傍魚潭雨餘芳草浄沙塵水緑灘平一帶春唯有啼䳌似留客桃花深處更無人山閣聞笛臨風玉管吹參差山塢春深日又遲李白桃紅滿城郭馬融閒卧望京師夜聽琵琶三首掩抑危絃咽又通朔雲邉月想䑃朧當時誰佩將軍印長使蛾眉怨不窮一曲徘徊星漢稀夜闌幽思重依依忽似摐金來馬上南枝棲鳥盡驚飛破撥聲繁恨已長低鬟歛黛更摧藏潺湲隴水聽難盡併覺風沙繞畵梁㶚上鳴鞭晚日禁城東渭水晴煙㶚岸風都傍桞隂回首望春天樓閣五雲中古仙詞珠幡絳節曉霞中漢武清齋待少翁不向人間戀春色桃花自滿紫陽宫感春詞未得鳴珂謁漢宫江頭寂寞向春風悲歌一曲心應醉萬葉千花淚眼中雨霽登北原稻黄撲撲黍油油野樹連山澗北流憶得年時馮翊郡謝郎相引上樓頭長安親故楚蘭不佩佩吳鉤帶酒城頭别舊遊年事已多筋力在試將弓箭到并州悲秋秋空鴈度青天遠踈樹蟬嘶白露寒階下敗蘭猶有氣手中團扇漸無端晚蟬深藏高桞背斜暉能軫孤愁感昔圍猶畏旅人頭不白再三移樹帶聲飛惟揚郡西亭贈友人萍䬃風池香滿船楊花漠漠暮春天玉人此日心中事何似乗羊入市年贈强山人郎士元或棹輕舟或杖藜尋常適意釣前溪草堂竹徑在何處落日孤煙寒渚西栢林寺南望谿上遙聞精舍鐘泊舟微徑度深松青山霽後雲猶在畵出西南四五峯聽鄰家吹笙鳯吹聲如隔采霞不知墻外是誰家重門深鎻無尋處疑有碧桃千樹花從軍馬逢漢馬千蹄合一羣單于鼓角隔山聞沙塠風起紅樓下飛上長天作陣雲宫詞二首金吾持㦸䕶軒簷天樂傳教萬姓瞻樓上美人相倚看紅䊋透出水精簾玉樓天半起笙歌風送宫人笑語和月影殿開聞曉漏水精簾捲近秋河寓言李洞三千宫女露蛾眉笑煮黄金日日遲麟鳯隔雲攀不及空山惆悵夕陽時客亭對月游子離魂隴上花風飄浪巻遶天涯一年十二度圓月十一回圓不在家宿鄠郊贈羅處士川静星高栗已枯南山落石水聲麤白雲釣客窻中宿卧數嵩峯聽五湖贈功臣征蠻破虜漢功臣擕劒歸來萬里身閒倚凌煙金柱看形容消瘦老於真有贈愛酒耽棋田處士彈琴詠史賈先生御溝臨岸有雲白不見鶴來何處行送三藏歸西天十萬里程多少難沙中彈舌受降龍五天到日應頭白月落長安半夜鐘金陵懷古古來無此戰爭功日日戈船漾海風一度靈龜開睡眼六朝灰盡九江空長安縣㕔主人寂寞客屯邅愁列終南滿眼前乞取中庭藤五丈為君高斸望前天題晣上人賈島詩巻賈生詩巻惠休裝百葉蓮花萬里香供得半年吟不足長須字字頂司倉和茅山高拾遺山泉儲嗣宗香味清機仙府回縈紆亂石便流杯春風莫逐桃花去恐引漁人入洞來巢鶴千歳雲間丁令威殷勤仙骨莫仙飛若逢茅氏傳消息貞白先生不乆歸胡山犬入五雲音信絶鳯棲凝碧悄無聲焚香古洞歩虛夜露濕松花空月明小樓松杉風外亂山青曲几焚香對石屏空憶去年春雨後燕泥時汚太𤣥經山鄰石橋春澗已歸遲夢入仙山山不知柱史從來非俗吏青牛道士莫相疑隨邉使過五原偶逐星車犯敵塵故鄉常恐到無因五原西去陽關廢日没平沙不見人春懷寄秣陵知友廬江城外桞堪攀萬里行人尚未還借問景陽臺下客謝家誰更作東山月夜鴈池衰草露沾衣河水東流萬事微寂寞青陵臺上月秋風滿樹鵲南飛山行李郢小田微雨稻苖香田畔清溪潏潏凉自憶東吳榜舟日蓼花溝水半篙强上元日寄湖杭二從事戀别山燈憶水燈山光水熖百千層謝公留賞山公喚知入笙歌阿那朋寒食夜望舊墳新隴哭多時流世都堪幾度悲烏鳥亂啼人未遠野風吹散白棠梨清明日題一公禪室山頭蘭若石楠春山下清明煙火新此日何窮禮禪客歸心誰是戀禪人七夕寄張氏兄弟新秋牛女㑹佳期紅粉筵開玉饌時好與檀郎寄花朶莫教清曉羡蛛絲春晩與諸同舍出城迎座主侍郎三十驊騮一閧塵來時不鎻杏園春東風桞絮輕如雪應有偷游曲水人張郎中宅戲贈二首薄雪燕翁紫燕釵釵垂簏簌抱香懷一聲歌罷劉郎醉脫取明金壓繡鞋謝家青妓邃重關誰省春風見玉顔聞道綵鸞三十六一雙雙對碧池蓮醉送江梅冷艶酒清光急拍繁絃醉畵堂無限桞條多少雪一將春恨付劉郎曉井桐隂覆井月斜明百尺寒泉古甃清越女擕缾下金索曉天初放轆轤聲南池小男供餌婦搓絲溢榼香醪倒接䍦日出兩竿魚正食一家歡笑在南池偶作一杯正發吟哦興兩盞還生去住愁何以全家上船去酒旗多處即淹留畫鼓常聞畫鼓動歡情及送離人恨鼓聲兩杖一揮行䌫解暮天空使别䰟驚燕蓊花十二街中何限草燕蓊盡欲占殘春黄花撲地無窮極愁殺江南去住人邵博士溪亭野茶無限春風葉溪水千重返照波只去長橋三十里誰人一解枉帆過小石上見亡友題處笋石清琤入紫煙陸雲題處是前年苔侵雨打依稀在惆悵涼風樹樹蟬洞靈觀流泉石上苔蕪水上煙潺湲聲在觀門前千巖萬壑分流去更引飛花入洞天送李判官津市停橈送别難熒熒蠟炬照更闌東風萬疊吹江月誰伴袁襃宿夜灘送梁補闕賦得荻花朱長文桞家汀洲孟冬月雲寒水清荻花發一枝持贈朝天人願比蓬萊殿前雪越溪怨後朝光越王宫裏如花人越水溪頭采白蘋白蘋未盡人先盡誰見江南春復春毁天樞李休烈天門街上倒天樞火急先須缷火珠計令一條麻線挽何勞兩縣索人夫萬首唐人絶句巻三十六
