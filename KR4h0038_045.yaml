body:
  text: 萬首唐人絶句卷四十五宋洪邁編七言移石盆陸龜蒙移得龍泓瀲灔寒月輪初下白雲端無人盡日澄心坐倒影新篁一兩竿自遣詩二十二首五年重别舊山村樹有交柯犢有孫更感卞峯顔色好晚雲才散便當門雪下孤村淅淅鳴病魂無睡灑來清心搖秪待東忩曉長愧寒雞第一聲甫里先生未白頭酒旗猶可戰髙樓長鯨好鱠無因得乞取艅艎作釣舟花瀨濛濛紫氣昏水邉山曲更容村終須揀取幽棲地老桂成雙便作門長歎人間髮易華暗將心事許煙霞病來前約分明在藥鼎書囊便是家醖得秋泉似玉容比於雲液更應濃思量北海徐劉輩枉向人間號酒龍偶然擕稚看微波臨水春寒一倍多便使筆精如逸少懶能書字換羣鵝數尺遊絲墮碧空年年長是惹東風爭知天上無人住亦有春愁鶴髮翁往古天高事渺茫爭知靈媛不淒涼月娥如有相思淚秪待方諸寄兩行本來雲外寄間身遂與溪雲作主人一夜逆風愁四散曉來零落傍衣巾淵明不待公田熟乘興先秋解印歸我為餘糧春未去到頭誰是復誰非雲擁根株抱石危斫來文似瘦蛟螭幽人帶病愁朝起秪向春山盡日欹月淡花間夜已深宋家微詠若遺音重思萬古無人賞露濕清香獨滿襟南岸春田手自農往來橫絶半江風有時不耐輕橈興暫欲蓬山訪洛公賢達垂竿小隱中我來真作捕魚翁前溪一夜春流急已學嚴灘下釣筒水國君王又姓蕭風情由是冠前朝靈和殿下巴江柳十二樓前等翠條強梳蓬鬢整斜冠片燭光微夜思闌天意最饒惆悵事單樓分付與春寒無多藥圃近南榮合有春苗次第生稚子不知名品上恐隨春草鬬輸嬴一𣲖溪隨若下流春來無處不汀洲漪瀾未碧蒲猶短不見鴛鴦正自由山下花明水上曛一橈青翰破霞文越人但愛風流客繡被何須屬鄂君妍華須是占時生凖擬差肩不近情佳麗幾時腰不細荆王辛苦致宫名羊侃多應自古豪解盤金矟置纎腰縱然此事教雙得不博溪田二頃苗石竹花曾看南朝畫國娃古羅衣上碎明霞而今莫共金錢鬬買却春風是此花間吟間吟料得三更盡始把孤燈背竹忩一夜西風髙浪起不教歸夢過寒江北渡江客柴門枕浪花鳴機寒櫓任嘔啞輕舟過去真堪畫驚起鸕鷀一陳斜夜泊詠棲鴻可憐霜月暫相依莫向衡陽起遂飛同是江天寒夜客羽毛單薄稻粱微早行冰寒孤棹觸天文直是乘槎去問津縱使碧虛無限好客星名字也愁人景陽宫井古堞煙埋宫井樹陳主吳姬墮泉處舜沒蒼梧萬里雲却不聞將二妃去江南二首便風船尾香粳熟細雨罾頭赤鯉跳待得江餐間望足日斜方動木蘭橈村邉紫豆花垂次岸上紅梨葉戰初莫怪煙中重回首酒家青紵一行書溪思雨中雨映前山萬句絲櫓聲衝碎似鳴機無端織得愁成段堪作騷人酒病衣江城夜泊漏移寒箭丁丁急月挂虛弓藹藹明此夜離魂堪射斷更煩江笛兩三聲宫人斜草著愁煙似不春晚鶯哀怨問行人須知一種埋香骨猶勝昭君作塞塵送棊客滿目山川似勢棊况當秋鴈正斜飛金門若召羊玄保賭取江東太守歸漢宫詞招靈閣上霓旌絶梁柏臺中珠翠稠一身三十六宫夜露滴玉盤青桂秋上清玉林風露寂寥清仙妃對月間吹笙新篁冷澀曲未盡細拂雲枝棲鳯驚秋荷蒲茸承露有佳色茭葉束煙如效嚬盈盈一水不得渡冷翠遺香愁向人有别二首且將絲筰繫蘭舟醉下煙汀減去愁江上有樓君莫上落花流水正東流池上已看鶯舌默雲間應即鴈翰開唯愁别後當風立萬樹將秋入恨來病中曉思月墮霜西竹井寒轆轤絲凍下瓶難幽人病久渾成渴愁見龍書一鼎乾送友人之湖上故人溪上有漁舟竿倚風蘋夜不收欲寄一函聊問訊洪喬寧作置書郵寒日逄僧瘦脛高褰梵屧輕野塘風徑鍚環鳴如何不向深山裏坐擁間雲過一生冬柳柳汀斜對野人忩零落衰條傍曉江正是霜風飄斷處寒鷗驚起一雙雙寄友人敬亭寒夜溪聲裏同聼先生講太玄上得雲梯不回首釣竿猶在五湖邉島樹波濤潄苦盤根淺風雨飄多著葉遲迥出孤煙殘照裏鷺鷥相對立髙枝頭陀僧萬峯圍繞一峯深向此長修苦行心自掃雪中歸鹿迹天明恐被獵人尋晚渡半波飛雨半波晴漁曲飄秋野調清各樣蓮船逗村去笠簷蓑袂有殘聲贈老僧二首枯貌自同霜裏木餘生唯指佛前燈少時寫得坐禪影今見問人何處僧自有家山供衲線不離溪曲取菴茆舊曾聞説林中鳥定後長來頂上巢憶山泉一夜寒聲來夢裏平明著屐到聲邉心期盛夏重過此脫却荷衣石上眠白芙蓉淡然相對却成勞月染風裁箇箇高似説玉皇親謫墮至今猶著水精袍嚴光釣臺片帆竿外揖清風石立雲孤萬古中不是狂奴為故態仲華爭得黑頭公讀陳拾遺集蓬顆何時與恨平蜀江衣帶蜀山輕尋聞騎士梟黃祖自是無人祭禰衡吳宫懷古香徑長洲盡棘叢奢雲艷雨秪悲風吳王事事須亡國末必西施勝六宫方響擊霜寒玉亂丁丁花底秋風拂坐生王母間看漢天子滿猗蘭殿珮環聲閨怨白褡行人又逺遊日斜空上映花樓愁絲墮絮相逄著絆惹春風卒未休丁香江上悠悠人不問十年雲外醉中身殷勤解却丁香結從放繁枝散誕春種蒲杜若溪邉手自移旋抽煙劒碧參差何時織得孤帆去懸向秋風訪所思范蠡平吳專越禍胎深豈是功成有去心勾踐不知嫌鳥喙歸來猶自鑄良金山僧二首山蘚幾重生草履澗泉長自滿銅瓶時將如意敲眠虎遣向林間坐聼經一夏不離蒼島上秋來頻話石城南思歸瀑布聲前坐却把松枝拂舊菴上雲樂青絲作笮桂為船白兔搗藥蝦蟇丸便浮天漢泊星渚回首笑君承露盤新秋雜題六首眠一簟臨忩薤葉秋小簾風蕩半離鈎魂清雨急夢難到身在五湖波上頭行尋人直到月塢北覔鶴便過雲峯西只今猶有踈野調但繞莓苔風雨畦倚橘下凝情香染巾竹邉留思露搖身背煙垂手盡日立憶得山中無事人吟憶山搖膝石上晚懷古掉頭溪畔涼有時得句一聲發驚起鷺鷥和夕陽食日午空齋帶睡痕水蔬山藥薦盤餐林烏信我無機事長到而今下石盆坐偶避蟬聲來隙地忽隨鴻影入遼天間僧不會寂寥意道學西方人坐禪新沙渤澥聲中漲小堤官家知後海鷗知蓬萊有路教人到應亦年年稅紫芝鄴宫詞二首魏武平生不好香楓膠蕙炷潔宫房可知遺令非前事却有餘薰在繡囊花飛蝶駭不愁人水殿雲廊别置春曉日靚裝千騎女白櫻桃下紫綸巾古别仙人左手把長箭欲射日烏烏不棲何事離情畏明發一心唯恨汝南雞髙道士峨眉道士風骨峻手把玉皇書一通東遊借得琴髙鯉騎入蓬萊清淺中蔬食孔融不要留殘膾庾悅無端吝子鵝香稻熟來秋菜嫩伴僧餐了聼云何寄逺縹梨花謝鶯口喫黃犢少年人未歸畫扇紅弦相掩映獨看斜月下簾衣山中僧手開一室翠微裏日暮白雲棲半間白雲朝出天際去若比老僧雲未間洞宫秋夕濃霜打葉落地聲南溪石泉細泠泠洞宫寂寞人不寐坐見月生雲母屏連昌宫詞二首金鋪零落獸環空斜掩雙扉細草中日暮鳥歸宫樹緑不聞鴉軋閉春風宫門草沒苔封疊翠斜墜紅千葉擁殘霞年年直為秋霖苦滴陷青珉隱起花階懷宛陵舊遊陵陽佳地昔年遊謝朓青山李白樓唯有日斜溪上思酒旗風影落春流松石曉景圖霜骨雲根慘淡愁宿煙封著未全收將歸與説文通後寫得松江岸上秋釣車小輪輕線妙無雙曽伴幽人酒一缸洛客見時如有問輾煙衝雨過桐江漉酒巾靜節高風不可攀此巾猶墜凍醪間偏宜雪夜山中戴認取時情與醉顔華陽巾蓮花峯下得佳名雲褐相兼上鶴翎須是古壇秋霽後靜焚香炷禮寒星送琴客之建康蕙風杉露共泠泠三峽寒泉漱玉清君到南朝訪遺事柳家雙鎖舊知名白鷺雪然飛下立蒼苔應伴江鷗拒我來見欲扁舟搖蕩去倩君先作水雲媒溪行晚天寒雨上灘時他已揚舲我尚遲自是檣低帆幅少溪風終不兩般吹太湖叟細漿輕船買石歸酒痕狼藉遍苔衣攻車戰艦繁如織不肯回頭問是非答友人荆卿雄骨化為塵燕市應無共飲人能脫鷫鸘來换酒五湖賖與一年春偶作酒信巧為繅病緒花音長作嫁愁媒也知愁病堪回避爭奈流鶯喚起來春思二首竹外麥煙愁漠漠短翅啼禽飛魄魄此時憶著千里人獨坐支頥看花落江南酒熟清明天髙髙緑斾當風懸誰家無事少年子滿面落花猶醉眠訪僧不遇棹倚東林欲問禪逺公飛鍚未應還蒙莊子弟相看笑何事空門亦有關謝山泉決決春泉出洞霞石壜封寄野人家草堂盡日留僧坐自向前溪摘茗芽洞宫夕月午山空桂花落華陽道士雲衣薄石壇香散步虛聲杉露清泠滴棲鶴峽客行萬仭峯排千劒束孤舟夜繫峯頭宿蠻溪雪壞蜀江傾灔澦朝來大如屋江邉江邉日晚潮煙上樹裏鴉鴉桔橰響無因得似灌園翁十畞春蔬一藜杖春夕櫻桃園宴佳人芳樹雜春蹊花外煙濛月漸低幾度艷歌清欲轉流鶯驚起不成棲松江早春柳下江餐待好風暫時還得狎漁翁一生無事煙波足唯有沙邉水勃公萬首唐人絶句卷四十五
