body:
  text: 萬首唐人絶句卷三十九宋洪邁編七言漢宫曲徐凝水色簾前流玉霜趙家飛燕侍昭陽掌中舞罷簫聲絶三十六宫秋夜長和嵩陽客月夜憶上清人獨夜嵩陽憶上仙月明三十六峯前瑶池月勝嵩陽月人在玉清眠不眠八月望夕雨今年八月十五夜寒雨蕭蕭不可聞如練如霜在何處吳山越水萬重雲觀浙江濤浙江悠悠海西緑驚濤日夜雨翻覆錢塘郭裏看潮人直至白頭看不足廬山瀑布虛空落泉千仞直雷奔入江不暫息今古長如白練飛一條解破青山色嘉興寒食嘉興郭裏逢寒食落日家家拜掃回唯有縣前蘇小小無人送與紙錢來憶揚州蕭娘臉下難勝淚桃葉眉頭易得愁天下三分明月夜二分無賴是揚州八月燈夕寄遊越施秀才四天淨色寒如水八月清輝冷似霜想得越人今夜見孟家珠在鏡中央八月十五夜皎皎秋空八月圓常娥端正桂枝鮮一年無似如今夜十二峯前看不眠題伍員廟千載空祠雲海頭夫差亡國已千秋浙波只有靈濤在拜奠青山人不休貟嶠先生貟嶠先生無白髮海煙深處採青芝逢人借問陶唐主欲進氷蠶五色絲莫愁曲玳瑁牀頭刺戰袍碧紗窗外葉騷騷若為教作遼西夢月冷如丁風似刀寄白司馬三條九陌花時節萬户千車看牡丹爭遣江州白司馬五年風景憶長安相思林逰客逺逰新過嶺每逢芳樹問芳名長林遍是相思樹爭遣愁人獨自行寄海嶠丈人萬丈只愁滄海淺一身誰測嵗年遙自言來此雲邊住曽看秦王樹石橋寄潘先生至人知姓不知名聞道黃金骨節輕世上仙方無覔處欲來西嶽事先生宫中曲二首披香侍宴插山花厭著龍綃著越紗恃賴傾城人不及檀粧唯約數條霞身輕入寵盡恩私腰細偏能舞柘枝一日新粧拋舊樣六宫爭畫黑煙眉七夕一道鵲橋橫渺渺千聲玉佩過玲玲别離還有經年客悵望不如河鼓星八月九月望夕雨八月繁雲連九月兩回三五晦漫漫一年悵望秋將盡不得常娥正面看喜雪長愛謝家能詠雪今朝見雪亦狂歌楊花道即偷人句不那楊花似雪何春飲烏家若下蟻還浮白玉尊前倒即休不是春來偏愛酒應須得酒遣春愁二月望日長短一年相似夜中秋未必勝中春不寒不暖看明月況是從來少睡人讀逺書兩轉三回讀逺書畫簷愁見燕歸初百花時節教人懶雲髻朝來不欲梳古樹古樹欹斜臨古道枝不生花腹生草行人不見樹少時樹見行人幾畨老獨住僧百補袈裟一比丘數莖長睫覆青眸多應獨住山林慣唯照寒泉自剃頭傷畫松道芬上人百法驅馳百年夀五勞消瘦五株松昨來聞道嚴陵死畫到青山第幾重觀釣臺畫圖一水寂寥青靄合兩崖摧崒白雲殘畫人心到啼猿破欲作三聲出樹難荆巫夢思楚水白波風嫋嫋荆門暮色雨蕭蕭相思合眼夢何處十二峯髙巴字遙浙東故孟尚書種柳孟家種柳東城去臨水逶迤思故人不似當時大司馬重來得見漢南春長洲覽古吳王上國長洲奢翠黛寒江一道斜傷見摧殘舊宫樹美人曽插九枝花却歸舊山望月有寄年年明月總相似大抵人情自不同今夜故山依舊見班家扇樣碧峯東再歸松溪舊居宿西林五粒松深溪水清衆山搖落月偏明西林靜夜重來宿暗記人家犬吠聲玩花五首一樹梨花春向暮雪枝殘處怨風來明朝漸校無多去看到黃昏不欲回麴塵溪上素紅枝影在溪流半落時人自惜花腸欲斷春風却是等間吹朱霞焰焰山枝動緑野聲聲杜宇來誰為蜀王身作鳥自啼還自有花開誰家躑躅青林裏半見殷花焰焰枝憶得倡樓人送客深紅衫子影門時花到薔薇明艷絶燕支顆破麥風秋一畨弄色一畨退小婦輕粧大婦愁長慶春山頭水色薄籠煙久客新愁長慶年身上五勞仍病酒夭桃窗下背花眠山鷓鴣詞南越嶺頭山鷓鴣傳是當時守貞女化為飛鳥怨何人猶有啼聲帶蠻語鄭女出參丈人詞鳯叉翠翹雙宛轉出見丈人梳洗晚掣曵羅綃跪拜時柳條無力花枝軟春雨花時悶見聮綿雨雲入人家水毁堤昨日春風源上路可憐紅錦枉拋泥和白使君木蘭花枝枝轉勢雕弓動片片搖光玉劒斜見説木蘭征戍女不知那作酒邊花正月十五夜呈幕中諸公宵遊二萬七千人獨坐重城圈一身步月遊山俱不得可憐辜負白頭春樂府新詩一聲盧女十三絃早嫁城西好少年不羡越溪歌者苦采蓮歸去緑窗眠春陪相公看花宴會二首丞相邀歡事事同玉簫金管咽東風百分春酒莫辭醉明日的無今日紅木蘭花謝可憐條逺道音書轉寂寥春去一年春又盡幾回空上望江橋牡丹何人不愛牡丹花占斷城中好物華疑是洛川神女作千嬌萬態破朝霞過馬當風波隱隱石蒼蒼送客靈鴉拂去檣三月盡頭雲葉秀小姑新著好衣裳金谷覽古金谷園中數尺土問人知是緑珠臺緑珠歌舞天下絶唯與石家生禍胎上陽紅葉洛下三分紅葉秋二分翻作上陽愁千聲萬片御溝上一片出宫何處流洛城秋砧三川水上秋砧發五鳳樓前明月新誰為秋砧明月夜洛陽城裏更愁人和川守侍郎緱山題仙廟王子緱山石殿明白家詩句詠吹笙安知散席人間曲不是寥天鶴上聲和夜題玉泉寺嵗嵗雲山玉泉寺年年車馬洛陽塵風清月冷水邊宿詩好官髙能幾人和秋遊洛陽洛陽自古多才子唯愛春風爛漫遊今到白家詩句出無人不詠洛陽秋和嘲春風源上拂桃燒水發江邊吹杏暗園開可憐半死龍門樹懊惱春風作底來侍郎宅泛池蓮子花邊回竹岸雞頭葉上蕩蘭舟誰知洛北朱門裏便到江南緑水遊和侍郎邀宿不至蟾蜍有色門應鎖街鼓無聲夜自深料得白家詩思苦一篇詩了一彈琴自鄂渚至河南將歸江外留辭侍郎一生所遇唯元白天下無人重布衣欲别朱門淚先盡白頭遊子白身歸蠻入西川後守隘一夫何處在長橋萬里只堪傷紛紛塞外烏蠻賊驅盡江頭濯錦娘憶紫溪長憶紫溪春欲盡千巖交映水回斜巖空水滿溪自紫水態更籠南燭花誇紅槿誰道槿花生感促可憐相計半年紅何如桃李無多少併打千枝一夜風塞下江為萬里黃雲凍不飛磧煙烽火夜深微敵人移帳寒笳絶雪路時聞探馬歸悲老宫人劉得仁白髮宫娃不解悲滿頭猶自插花枝曽緣玉貌君王寵凖擬人看似舊時題真娘墓談銖武丘山下冡纍纍松柏蕭條盡可悲何事世人偏重色真娘墓上獨題詩宫怨司馬札柳色參差掩畫樓曉鶯啼送滿宫愁年年花落無人見空逐春泉出御溝觀郊禮鐘鼓旌旗引六飛玉皇初著畫龍衣泰壇煙盡星河曉萬國心隨綵仗歸秋日懷儲嗣宗故人北遊久不回霜雁南度聲何哀相思聞雁更惆悵却向單于臺下來夜聽李山人彈琴瑶琴夜久絃秋清楚客一奏湘煙生曲終聲盡意不盡月照竹軒紅葉明客路吳仁璧人寰急景如波委客路浮雲似蓋輕回首故山天外碧十年無計却歸耕錢塘鶴人間路靄青天半鼇岫雲生碧海涯雖抱雕籠密扃鑰可能長在叔倫家南徐題友人郊居門前樵徑連江寺岸下漁磯繫海槎待到秋深好時節與君長醉隱侯家讀度人經寄鄭仁表身雖一旦塵中老名擬三清會裏題二午九齋餘日在請君相伴醉如泥衰柳金風漸利露珠團廣陌長堤黛色殘水殿狂遊隋煬帝一千餘里可堪看賈誼扶持一疏滿遺編漢陛前頭正少年誰道恃才輕絳灌却將惆悵弔湘川鳳仙花香紅嫩緑共開時冷蝶飢蜂兩不知此際最冝何處看朝陽初上碧梧枝春雪雪霽凝光入坐寒天明猶自卧袁安貂裘穿後鶴氅弊自此風流不足看金錢淺絳濃香幾朵勻日鎔金鑄萬家新堪疑劉寵遺芳在不許山隂父老貧秋日聽僧彈琴金徽玉軫韻泠然言下浮生指下泉恰稱秋風西北起一時吹入碧湘煙題都城南莊崔護去年今日此門中人面桃花相映紅人面不知何處去桃花依舊笑春風銅雀妓吳燭秋色西陵滿緑蕪繁絃急管強歡娛長舒羅袖不成舞却向風前承淚珠長門怨裴交泰自閉長門經幾秋羅衣濕盡淚還流一種娥眉明月夜南宫歌管北宫愁惆悵詩九首顧甄逺魂黯黯兮情脈脈簾風清兮窗月白夢驚枕上爐燼銷不見蘂珠宫裏客禁漏聲稀蟾魄冷紗厨筠簟波光靜獨坐愁吟暗斷魂滿窗風動芭蕉影别恨離腸空惻惻風動虛軒池水白莫言靈圃步難尋有心終效偷桃客愁遇人間好風景焦桐韻滿華堂靜鑑鸞叉燕恨何窮忍向銀牀空抱影緑槐影裏傍青樓陌上行人漫舉頭煙水露花無處問搖鞭凝睇不勝愁役盡心神銷盡骨恩情未斷忽分離平生此恨無言處只有衣襟淚得知濃醪艷唱愁難破骨瘦魂消病已成若為多羅年少死始甘人道有風情淚滿羅衣酒滿巵一聲歌斷怨傷離如今兩地心中事直是瞿曇也不知橫泥杯觴醉復醒愁牽時有小詩成早知惹得千般恨悔不天生解薄情楊柳枝五首孫魴靈和風暖太昌春舞線搖絲向昔人何似曉來江雨後一行如畫隔遙津彭澤初栽五樹時只應間看一枝枝不知天意風流處要與佳人學畫眉暖傍離亭靜拂橋入流穿檻緑搖搖不知落日誰相送魂斷千條與萬條春來緑樹遍天涯未見垂楊未可誇晴日萬株煙一陳間坊兼是莫愁家十首當年有舊詞唱青歌翠幾無遺未曽得向行人道不為離情莫折伊春夜劉兼薄薄春雲籠素月杏花滿地堆香雪醉垂羅袂依朱欄小數玉仙歌未闋西齋西齋新竹兩三莖也有風敲碎玉聲莫恨移來欄檻逺譬如元本此間生春遊柳成金穗草如茵載酒尋花共賞春先入醉鄉君莫問十年風景在三秦中夏晝卧寂寂無聊九夏中倚簷依壁待清風壯圖竒策無人問不及南陽一卧龍萬首唐人絶句卷三十九
