body:
  text: 萬首唐人絶句卷四十六宋洪邁編七言開元雜題七首陸龜蒙玉龍子何代竒工碾玉英細髯纎角盡雕成煙乾霧悄君心苦風雨長隨一擲聲照夜白雪蚪輕􅀈步如飛一練騰光透月旗應笑穆王拋萬乘踏風鞭露向遙池湯泉暖殿流湯數十間玉渠香細浪回環上皇初解雲衣浴珠棹時敲瑟瑟山舞馬月窟龍孫四百蹄驕驤輕步應金鞞曲終似要君王寵回望紅樓不敢嘶雜伎拜象馴犀角抵豪星丸霜劒出花高六官爭近乘與望珠翠三千擁赭袍雪衣女嫩紅鈎曲雪花攢月殿棲時片影殘自説夜來春夢惡學持金偈玉欄杆繡嶺宫繡嶺花殘翠倚空碧窗瑤砌舊行宫間乘小駟濃隂下時舉金鞭半袖風女墳湖吳王葬女之所水平波淡繞回塘鶴殉人沉萬古傷應是離魂雙不得至今沙上少鴛鴦秦伯廟故國城荒德未荒年年椒奠濕中堂邇來父子爭天下不信人問有讓王間居雜題五首鳴蜩早間來倚杖柴門口烏下深枝啄晚蟲周步一池銷半日十年聽此鬢如蓬野態真君如有意耽田里豫亦無機向藝能心迹所便唯是直人間聞道最先憎松間斟子山園靜憐幽木公幹詞清詠蓽門月上風微蕭灑甚斗醪何惜置盈樽飲巖泉已甘茅洞三君食欠買桐江一朵山嚴子瀨高秋浪白水禽飛盡釣舟還當軒鶴自笑與人乖好尚田家山客共柴車干時未似棲廬雀鳥道間㩦相爾書宿木蘭院苦吟清漏迢迢極月過花西尚未眠猶憶故山歌警枕夜來嗚咽似流泉胥門間泛細槳輕樺下白蘋故城花謝緑隂新豈知今日逃名士試問南塘著屧人薔薇穠華自古不得久况是倚春春已空更被夜來風雨惡滿階狼藉沒多紅春夕酒醒幾年無事傍江湖醉倒黃公舊酒壚覺夜不知新月上滿身花影倩人扶重臺蓮花水國煙鄉足芰荷就中芳瑞比難過風情為與吳王近紅蕚常教一倍多浮萍曉來風約半池明重疊侵沙緑罽成不用臨池重相笑最無根葉是浮名白蓮素花多蒙别艷欺此花真合在瑶池還應有恨無人覺月曉風清欲墮時後池曉煙清露暗相和浴堆浮鷗意緒多却是陳王詞賦錯枉將心事託微波初植松桂軒隂冉冉移斜日寒韻泠泠入晚風煙格月姿曽不改至今猶似在山中館娃宫懷古五首三千雖衣水犀珠半夜夫差國暗屠猶有八人皆二八獨教西子占亡吳一宫花渚漾漣漪俀墮鴉鬟出繭眉可料坐中歌舞袖便將殘節拂降旗幾多雲榭倚青𡨕越焰燒來一片平此地最應沾恨血至今春草不勻生江色分明練繞臺戰帆遙隔綺疏開波神自厭荒淫主勾踐樓船穩貼來寶襪香綦碎曉塵亂兵誰惜似花人伯勞應是精靈使猶向殘陽泣暮春和寄韋校書萬古風煙滿故都清才搜括妙無餘可中寄與藝香客便是江南地里書初冬偶作桐下空階疊緑錢貂裘初綻擁高眠小爐低幌還遮掩酒滴灰香似去年虎丘寺西小溪間泛三首樹號相思枝拂地鳥語提壺聲滿溪雲涯一里千萬曲直是漁翁行也迷荒栁卧波渾似困宿雲遮塢未全癡雲情栁意蕭蕭會若問諸餘總不知每逢孤嶼一倚楫便欲狂歌同采薇任是煙蘿中待月不妨歌枕扣船歸釣侣二首一艇輕撶看晚濤接㒿拋下漉春醪相逄便倚蒹葭泊更唱菱歌擘蟹螯雨後沙虛古岸崩魚梁移入亂雲層歸時月墮汀洲暗認得妻兒結網燈酬醉中寄酒二首酒痕衣上雜莓苔猶憶紅螺一兩杯正被繞籬荒菊笑日斜還有白衣來階下飢禽啄嫩苔野人方倒病中杯寒蔬賣却還沽喫可有金貂換得來臯橋橫絶春流架斷虹憑欄猶思五噫風今來未必非梁孟却是無人繼伯通答遺青䭀飯舊聞香積金仙食今見青精玉斧餐自笑鏡中無骨録可能飛上紫雲端酒病栁疏桐下晚窗明秪有微風為析酲唯欠白綃籠解散王儉髻名洛生間詠兩三聲寒夜訪襲美醉韻飄飄不可親棹頭吟側華陽巾如能跂腳東窗下便是羲皇世上人玩金鸂鷘曽向溪邉泊暮雲至今猶憶浪花羣不知鏤羽凝㕿霧堪與鴛鴦覺後聞寒夜文燕張潤卿不至細雨輕觴玉漏終上清詞句落吟中松齋一夜懷貞白霜外空聞五粒風齊梁怨别寥寥缺月看將落簷外霜華染羅幕不知蘭棹到何山應倚相思樹邉泊藥名離合夏日即事乘屐著來幽砌滑石罌煎得逺泉甘草堂秪待新秋景天色微涼酒半酣懷錫山藥名離合二首鶴伴前溪裁白杏人來隂洞寫枯松蘿深境靜日欲落石上未眠聞逺鐘佳句成來誰不伏神丹偷去亦須防風前莫怪攜詩稿本是吳吟蕩漿郎和懷鹿門縣名離合二首雲容覆枕無非白水色侵磯直是藍田種紫芝餐可壽春來何事戀江南竹溪深處猿同宿松閣秋來客共登封徑古苔侵石鹿城中誰解訪山僧天台國清寺峯帶樓臺天外立明河色近罘罳濕松間石上定僧寒半夜楢溪水聲急簾枕映疏容晚尚欹秋煙脈脈雨微微逆風鄣燕尋常事不學人前尚妓衣翠碧紅襟翠翰兩參差徑拂煙華上細枝春水漸生魚易得莫辭風雨坐多時女墳湖皮日休萬貴千奢已寂寥可憐幽憤為誰嬌須知韓重相思骨直在芙蓉向下消宿木蘭院木蘭院裏雙棲鶴長被金鉦聒不眠今夜宿來還似爾到明無計夢雲泉薔薇濃似猩猩初染素輕於燕燕欲凌空可憐細麗難勝日照得深紅作淺紅春夕酒醒四絃才罷醉蠻奴酃醁餘香在翠爐夜半醒來紅蠟短一枝寒淚作珊瑚胥門間泛青翰虛徐夏思清愁煙漠漠杏花平醉來欲把田田葉盡裹當時醒酒鯖重臺蓮花歌紅婑媠力難任每葉頭邉半米金可得教他水妃見兩重元是一重心浮萍嫩似金脂揚似煙多情渾欲擁紅蓮明朝擬附南風信寄與湘妃作翠鈿白蓮但恐醍醐難並潔秪應簷􅀢可齊香半埀金粉知何似靜婉臨溪照額黃後池細雨闌珊眠鷺覺鈿波悠漾並鴛嬌邇來會得荆王意秪為蓮莖重細腰虎丘寺西小溪間泛二首絶壑秪憐白羽傲窮溪唯覺錦鱗癡更深尚有通樵處或是秦人未可知高下不驚紅翡翠淺深還礙白薔薇船頭繫箇松根上欲待逄仙不擬歸寒夜客見訪世外為交不是親醉吟俱岸白綸巾風清月白更三點未放華陽鶴上人答魯望秦吳風俗昔難同唯有清才事事通剛戀水雲歸不得前身應是太湖公館娃宫懷古五首綺閣飄香下太湖亂兵侵曉上姑蘇越王大冇堪羞處秪把西施賺得吳鄭姐無言下玉墀夜來飛箭滿罘罳越王定指高臺笑却見當時金鏤楣半夜娃宫作戰場血腥猶雜宴時香西施不及燒殘蠟猶為君王泣數行素襪雖遮未掩羞越兵猶怕伍員頭吳王恨魄今如在秪合西施瀨上遊響屧廊中金玉步采蘭山上綺羅身不知水葬今何處溪月彎彎欲效嚬春夕陪櫻桃園宴萬樹香飄水麝風蠟薰花雪盡成紅夜深歡態狀不得醉客圗開明月中松江早春松陵清淨雪消初見底新安恐未如穩憑船舷無一事分明數得鱠殘魚天竺寺桂子玉顆珊珊下月輪殿前拾得露華新至今不會夭中事應是姮娥擲與人初冬偶作豹皮茵下百餘錢劉墮間沽盡醉眠酒病校來無一事鶴亡松老似經年醉中寄魯望一壺門巷寥寥空紫苔先生應渴解酲杯醉中不得親相問故遣青州從事來軍事院霜菊盛開上諫議金華千點曉霜凝獨對壺觴又不能已過重陽三十日至今猶自待王𢎞悼鶴莫怪朝來淚滿衣墮毛猶傍水花飛遼東舊事今千古却向人間葬令威寄韋校書二年疏放飽江潭水物山容盡足耽唯有故人憐未替欲封乾鱠寄終南釣侣二首趰眠無事避風濤一斗霜鱗換濁醪驚怪兒童呼不得盡衝煙雨漉車螯嚴陵灘勢似雲崩釣具歸來放石層煙浪濺蓬寒不睡更將枯蚌點漁燈醉中先起麝煙苒苒生銀兔蠟淚漣漣滴繡閨舞袖莫欺先醉去醒來還解驗金泥文燕招潤卿飈御已應歸杳眇博山猶自對氛氲不知入夜能來否紅蠟先教刻五分酒病偶作鬱林步障晝遮明一注濃香養病酲何事晚來還欲飲隔牆聞賣蛤蜊聲玩金鸂鷘鏤羽雕毛迥出羣溫黁飄出麝臍薰夜來曽吐紅茵畔猶自溪邉睡不聞友人許惠酒以詩索之野客蕭然訪我家霜殘白菊兩三花子山病起無餘事只望蒲臺酒一車寒夜文燕潤卿有期不至草堂虛灑待高真不意清齋避世塵料得焚香無别事存心應待月夫人齊梁怨别芙蓉泣恨紅鉛落一朵别時煙似幕鴛鴦剛解惱離心夜夜飛來棹邉泊晚秋吟東臯煙雨歸耕日免去玄冠手刈禾火滿酒爐詩在口今日無計奈儂何好詩景青盤香露傾荷女子墨風流更不言寺寺雲蘿堪度日京塵到死撲侯門醒聞檜解洗餘酲晨半酒星星仙吹起雲門耳根莫厭聽佳木會盡山中寂靜源寺鐘暝百緣斗藪無塵土寸地章煌欲布金重擊蒲牢唅山日冥冥煙樹覩棲禽砌思步襹襹古薜繃危石切切隂螿應晚田心事萬端何處上少姨峯下舊雲泉懷錫山藥名離合二首暗竇養泉容決決明園護桂放亭亭厯山居處當天半夏裏松風盡足聽曉景半和山氣白微香清淨雜纎雲實頭事是眠平石腦側空林看鹿羣天台國清寺十里松門國清路飯猿臺上菩提樹怪來煙雨落暗天元是海風吹瀑布夏日即事藥名離合三首季春人病拋芳杜仲夏溪波繞壞垣衣典濁醪身倚桂心中無事到雲昏數曲急溪衝細竹葉舟來往盡能通草香石冷無辭逺志在天台一遇中桂葉似茸含露紫葛花如綬蘸溪黃連雲更入幽深地骨録間攜相獵郎懷鹿門縣名離合山瘦更培秋後桂溪澄間數晚來魚臺前過堆盈千百泉石無情不寄書十里松蘿隂亂石門前幽事雨來新野霜濃處憐殘菊潭上花間不見人萬首唐人絶句卷四十六
