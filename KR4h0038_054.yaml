body:
  text: 萬首唐人絶句卷五十四宋洪邁編七言曲江春草鄭谷花落江隄簇暖煙雨餘江色逺相連香輪莫輾青青破留與愁人一醉眠雪中偶題亂飄僧舍茶煙濕密灑歌樓酒力微江上晚來堪畫處漁人披得一簑歸題慈恩寺默公院雖近曲江居古寺舊山終憶九華峯春來老病厭迎送翦却牡丹栽野松卷末偶題三首一卷疏蕪一百篇名成未敢暫忘筌何如海月生殘夜一句能令萬古傳七歲侍行湖外去嶽陽樓上敢題詩如今衰晚無功業何以勝任國士知一第由來是出身垂名須為國風陳此生若不知騷雅孤宦如何作近臣江上阻風水天春暗暮寒濃船閉蓬窗細雨中聞道漁家酒初熟夜來翻喜打頭風十月菊節去蜂愁蝶不知曉庭還繞折殘枝自緣今日人心别未必秋香一夜衰鷺鷥閒立春塘煙淡淡靜眠寒葦雨颼颼漁翁歸後沙汀晚飛上灘頭更自由柳半煙半雨江橋畔映杏映桃山路中㑹得離人無限意千絲萬絮惹春風越鳥背霜南鴈不到處倚棹北人初聽時梅雨滿江春草歇一聲聲在荔枝枝忍公小軒二首松溪水色緑於松每到松溪到暮鐘閒得心源秖如此問禪何必向雙峰舊遊前事半埃塵多向中林結淨因一念一爐香火裏後身唯願似師身淮上漁者白頭波上白頭翁家逐船移浦浦風一尺鱸魚新釣得兒孫吹火荻花中興州江館向蜀還秦計未成寒蛩一夜繞牀鳴愁眠不穩孤燈盡坐聽嘉陵江水聲投所知砌下芝蘭新滿徑門前桃李舊垂隂却應回念江邊草放出春煙一寸心淮上與友人别揚子江頭楊柳春揚花愁殺渡江人數聲風笛離亭晚君向瀟湘我向秦七祖院小山小巧功成雨蘚斑軒車日日扣松關峩眉咫尺無人去却向僧窗看假山傳經院壁畫松危根瘦蓋聳孤峰珍重江僧好筆蹤得向游人多處畫却勝澗底作真松貧女吟塵壓鴛鴦廢錦機滿頭空插麗春枝東鄰舞妓多金翠笑剪燈花學畫眉送張逸人人間疏散更無人浪兀孤舟酒兀身蘆笋鱸魚拋不得五陵珍重五湖春為人題淚濕孤鸞曉鏡昏近來方解惜青春杏花楊柳年年好不忍回看舊寫真無本上人小齊二首寒寺唯應我訪師人稀境靜雪消遲竹西落照侵窗好堪惜歸時落照時松上江雲石上苔自嫌歸去夕陽催山門握手無他語只約今冬看雪來贈日東鑒禪師故國無心渡海潮老禪方丈倚中條夜深雨絶松堂靜一㸃山螢照寂寥蜀中賞海棠濃淡芳春滿蜀鄉半隨風雨斷鶯腸浣花溪上堪惆悵子美無情為發揚再經南陽平蕪漠漠失樓臺昔日游人亂後來寥落墻垣春欲暮燒殘宫樹有花開讀李白集何事文星與酒星一時分付李先生高吟大醉三千首留著人間伴月明席上貽歌者花月樓臺近九衢清歌一曲倒金壺坐中亦有江南客莫向春風唱鷓鴣酬高蟾先輩張生故國三千里知者唯應杜紫微君有君恩秋後葉可能更羡謝𤣥暉蓮葉移舟水濺差差緑倚檻風搖柄柄香多謝浣溪人未折雨中留得蓋鴛鴦早入諫院二首玉階春冷未催班暫拂塵衣枕笏眠孤立小心還自笑夢魂潛繞御罏煙紫雲重疊抱春城廊下人稀唱漏聲偷得微吟斜倚柱滿衣花露聽宫鶯東蜀春晚如此浮生更别離可堪長慟送春歸潼江水上楊花雪剛逐孤舟繚繞飛野步翠嵐迎步興何長笑領漁翁入醉鄉日暮渚田微雨後鷺鷥閒暇稻花凉下第退居二首年來還未上丹梯正著漁簑謝故溪落盡梨花春又了破籬殘雨晚鶯啼未嘗青杏出長安豪士應疑怕牡丹只有退耕耕不得默然春落水吹殘欹枕欹枕高歌日午春酒酣睡足最關身明明㑹得窮通理未必輸他馬上人經賈島墓水繞荒墳縣路斜耕人訝我久咨嗟重來兼恐無尋處日落風吹鼓子花贈下第舉公見君失意我惆悵記得當年落第情出去無憀歸又悶花南漫打講鐘聲悶題莫厭九衢塵土間秋晴滿眼是南山僧家未必全無事道著訪僧心且閒初還京師秋光不見舊池臺四顧荒涼瓦礫堆火力不能燒地力亂前黃菊眼前開春隂携琴當酒度春隂不解謀生只解吟舞蠂歌鶯莫相說老郎心是老僧心浯溪湛湛清江疊疊山白雲白鳥在其間漁翁醉睡又醒睡誰道皇天最惜閒失鷺鷥野格由來倦小池驚飛却下碧江涯月昏風急宿何處秋岸蕭蕭黃葦枝文昌寓直何遜空階夜雨平朝來交直雨新晴落花亂下花磚上不忍和苔踏紫英街西晚歸御溝春水繞閒坊信馬歸來傍短牆幽榭名園臨紫陌晚風時帶牡丹香偶書承時偷喜負明神務實那能得庇身不㑹蒼蒼主何事忍饑多是力耕人閒題舉世何人肯自知須逢精鑑定妍蚩若教嫫母臨明鏡也道不勞紅粉施下峽憶子啼猿繞樹哀雨隨孤棹過陽臺波頭未白人頭白瞥見春風灔澦堆江宿聞蘆管寒曲凄凉楚水濵聲聲吹出落梅春須知風月千墻下亦有胡蘆河畔人和知己秋日傷懷流水歌聲共不回去年天氣舊亭臺梁塵寂寞燕歸去黃蜀葵花一朵開重訪黃神谷䇿禪者初塵藝閣來禪閣却訪支郎是老郎我趣轉卑師趣靜數峯秋雪一爐香定水寺行香聽松看畫繞虛廊風拂金罏待賜香丞相未來春雪密暫偷閒卧老僧牀黃鶯春雲薄薄日輝輝宫樹煙深隔水飛應為能歌繫仙籍麻姑乞與女真衣槐花毶毶金蘂撲晴空舉子魂驚落照中今日老郎猶有恨昔年相戲十秋風永日有寄能消永日是樗蒲坑塹由來似宦途兩擲未離犍撅內坐中可惜為呼盧小桃和烟和雨遮敷水映竹映村連霸陵撩弄春風耐寒冷到頭贏得杏花憎苔錢春紅秋紫繞池臺箇箇圓如濟世財雨後無端滿窮巷買花不得買愁來靜吟騷雅荒凉我自安月和餘雪夜吟寒相門相客應相笑得句勝於得好官菊王孫莫把比荆蒿九日枝枝近鬢毛露濕秋香滿池岸由來不羡五松高壬戌西幸後武德門前皓氣新雪融鴛瓦土膏春夜來夢到宣麻處草沒龍墀不見人多虞多虞難住人稀處近耗渾無戰罷碁向闕歸山俱未得且沽春酒且吟詩短褐閒披短褐杖山藤頭不是僧心是僧坐睡覺來清夜半芭蕉影動道場燈曲江紅杏遮莫江頭柳色遮日濃鶯睡一枝斜女郎折得殷勤看道是春風及第花折得梅寒步江村折得梅孤香不肯待春催滿枝盡是愁人淚莫殢朝來露濕來牡丹畫堂簾卷張清宴含香帶霧情無限春風愛惜未放開柘枝鼓振紅英綻寂寞江郡人稀便是村踏青天氣欲黃昏春愁不破還成醉衣上淚痕和酒痕亂後灞上柳絲牽水杏房紅煙岸人稀草色中日暮一行高鳥處依稀合是望春宫長門怨二首閒把羅衣泣鳯凰先朝曾教舞霓裳春來却羡桃花落得逐晴風出禁墻流水君恩共不回杏花爭忍掃成堆殘春未必多煙雨淚滴閒階長緑苔三月三日舟中奉和張說暮春三月日重三春水桃花滿禊潭廣樂逶迤天上下仙舟搖衍鏡中酣上巳日貢院贈內權德輿三日韶光處處新九華仙洞七香輪老夫留滯何由去珉玉相和正繞身禊飲尋春興有餘深情婉婉見雙魚同心齊體如身到臨水煩君便祓除曲江上巳趙璜長堤十里轉香車兩岸煙花錦不如欲問神仙在何處紫雲樓閣向空虛題七夕圖帝子吹簫上翠微秋風一曲鳯凰歸明年七月重相見依舊高懸織女機三月晦日㑹李員外令狐楚三月唯殘一日春玉山傾倒白鷗馴不辭便學山人醉交下無人作主人中元日贈張尊師偶來人世值中元不獻𤣥都永日閒寂寂焚香在仙觀知師遙禮玉京山和張燕公泛洞庭尹􅐂風光淅瀝草中飄日采熒熒水上搖幸奉瀟湘雲壑意山傍容與動仙橈蜀中九日王勃九月九日望鄉臺他席他鄉送客杯人今已厭南中苦鴻鴈那從北地來賀子及第贈營妓紅綾楊汝士郎君得意及青春蜀國將軍又不貧一曲高歌紅一匹兩頭娘子謝夫人及第後宿平康里裴思謙銀缸斜背解明璫小語低聲賀玉郎從此不知蘭麝貴夜來新惹桂枝香送司馬道士遊天台宋之問羽客笙歌此地違離筵數處白雲飛蓬萊闕下長相憶桐柏山頭去不歸登逍遙樓逍遙樓上望鄉關緑水泓澄雲霧間北去衡陽二千里無因鴈足繫書還答泉州使君重陽贈酒李嘉祐欲強登高無力去籬邊黃菊為誰開共知不是潯陽郡那得王宏送酒來仲月賞花韋同則梅花似雪柳含烟南地風光臘月前把酒且須判却醉風流何必待歌筵九月十日即事陳羽漢江天外東流去巴塞連山萬里秋節過重陽人病起一枝殘菊不勝愁題雲夢亭崔櫓薄煙如夢雨如塵霜景晴來却勝春好住池西紅葉樹明年今日伴何人九日登高懷友鄭絪簪茱泛菊俯平阡飲過三杯却惘然十歲此辰同醉友登高各處已三年樊川寒食二首盧延讓寒食權豪盡出行一川如畫雨初晴誰家金絡遊春盛擔入花間軋軋聲鞍馬和花總是塵歌聲處處有佳人五陵年少粗於事栲栳量金買斷春楊枝枝詞滕邁三條陌上拂金羈萬里橋邊映酒旗此日令人腸欲斷不堪將入笛中吹代妻答幽州士子蓬鬢荆叉世所稀布裙猶是嫁時衣胡麻好種無人種合是歸時底不歸不第失意賦盧汪惆悵興亡繫綺羅世人猶自選青娥越王解破夫差國一箇西施已太多徐州使院作王智興平生弓劍自相隨剛被郎官遣作詩江南花柳從君詠塞北煙塵我自知折楊柳喬知之可憐濯濯春楊柳攀折將來就纎手妾容同此共盛衰何必君恩獨能久九月九日旅望邵大震九月九日望遙空秋水秋天生夕風寒鴈一向南飛逺游人幾度菊花叢獻主文劉虛白三十年前此夜中一般燈火一般風不知歲月能多少猶著麻衣待至公槐花翁承贊雨中裝㸃望中黃勾引蟬聲送夕陽憶昔當年隨計吏馬蹄終日為君忙上巳寄孟中丞鮑防世間禊事風流處鏡裏雲山若畫屛今日會稽王內史好將賔客醉蘭亭萬首唐人絶句卷五十四
