  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0038_WYG_003-1a, image: WYG1349/WYG1349-0034a.png}
body:
  text: 萬首唐人絶句巻三宋洪邁編七言龍移韓愈天昬地黒蛟龍移雷驚電激雌雄隨清泉百丈化為土魚鼈枯死吁可悲題楚昭王廟丘園滿目衣冠盡城闕連雲草樹荒猶有國人懷舊徳一間茅屋祭昭王湘中酬張十一功曹休垂絶徼千行淚共泛清湘一葉舟今日嶺猿兼越鳥可憐同聽不知愁郴口又贈二首山作劍攅江冩鏡扁舟斗轉疾於飛回頭笑向張公子終日思歸此日歸雲颭霜翻看不分雷驚電激語難聞沿崖宛轉到深處何限青天無片雲題木居士二首火透波穿不計春根如頭面榦如身偶然題作木居士便有無窮求福人為神詎比溝中斷遇賞還同㸑下餘朽蠧不勝刀鋸力匠人雖巧欲何如湘中猿愁魚踊水翻波自古流傳是汨羅蘋藻滿盤無處奠空聞漁父叩舷歌别盈上人山僧愛山出無期俗士牽俗來何時祝融峰下一回首即是此生長别離聞梨花發贈劉師命桃蹊惆悵不能過紅艷紛紛落地多聞道郭西千樹雪欲將君去醉如何梨花下贈劉師命洛陽城外清明節百花寥落梨花發今日相逢瘴海頭共驚爛漫開正月和歸工部送僧約早知皆是自拘囚不學因循到白頭汝既出家還擾擾何人更得死前休入闗詠馬嵗老豈能充上駟力微當自謹前程不知何故翻驤首牽過關門妄一鳴榴花五月榴花照眼明枝間時見子初成可憐此地無車馬顛倒青苔落絳英井賈誼宅中今始見葛洪山下昔曾窺寒泉百尺空看影正是行人暍死時蒲萄新莖未徧半猶枯髙架支離倒復扶若欲滿盤堆馬乳莫辭添竹引龍鬚峽石西泉居然鱗介不能容石眼環環水一鍾聞說旱時求得雨秖疑科斗是蛟龍酬王二十舎人雪中見寄三日柴門擁不開堦庭平滿白皚皚今朝蹋作瓊瑤跡為有詩仙鳯沼來送侯喜已作龍鍾後時者懶於街裏蹋塵埃如今便别長官去直到新年衙日來題百葉桃花百葉雙桃晚更紅臨窻映竹見玲瓏應知侍史歸天上故伴仙郎宿禁中春雪新年都未有芳華二月初驚見草芽白雪却嫌春色晚故穿庭樹作飛花盆池五首老翁真箇似童兒汲井埋盆作小池一夜青蛙鳴到曉恰如方口釣魚時莫道盆池作不成藕梢初種已齊生從今有雨君須記來聽蕭蕭打葉聲瓦沼晨朝水自清小蟲無數不知名忽然分散無蹤影唯有魚兒作隊行泥盆淺小詎成池夜半青蛙聖得知一聽暗來將伴侣不煩鳴喚鬬雄雌池光天影共青青拍岸纔添水數缾且待夜深明月去試看涵泳幾多星芍藥浩態狂香昔未逢紅燈爍爍緑盤龍覺來獨對忽驚恐身在仙宫第幾重賽神白布長衫紫領巾差科未動是閒人麥苖含穟桑生葚共向田頭樂社神題于賔客莊榆莢車前葢地皮薔薇蘸水筍穿籬馬蹄無入朱門跡縱使春歸可得知晚春草樹知春不乆歸百般紅紫鬬芳菲楊花榆莢無才思惟解漫天作雪飛落花已分將身著地飛那羞踐蹋損光暉無端又被春風誤吹落西家不得歸楸樹三首幾嵗生成為大樹一朝纒繞困長藤誰人與脱青羅帔看吐髙花萬萬層幸自枝條能樹立何煩蘿蔓作交加傍人不解尋根本却道新花勝舊花青幢紫葢立童童細雨浮煙作綵籠不得畫師來貌取定知難見一生中風折花枝浮艷侵天難就看清香撲地可遥聞春風也是多情思故捒繁枝折贈君贈張十八助教喜君眸子重清朗攜手城南歴舊遊忽見孟生題竹處相看淚落不能収晚雨廉纎晚雨不能晴池岸草間蚯蚓鳴投竿跨馬蹋歸路纔到城門打鼓聲出城暫出城門蹋青草遠於林下見春山應須韋杜家家到秖有今朝一日閒遣興斷送一生惟有酒尋思百計不如閒莫憂世事兼身事須著人間比夢間和武相公早春聞鶯早晚飛來入錦城誰人教解百般鳴春風紅樹驚眠處似妬歌童作艷聲大安池公主當年欲占春故將臺榭壓城闉欲知前面花多處直到南山不屬人晚春誰収春色歸將去慢緑夭紅半不存榆莢秖能隨柳絮等閒撩亂走空園過鴻溝龍疲虎困割川原億萬蒼生性命存誰勸君王回馬首真成一擲賭乾坤送張侍郎司徒東鎮馳書謁丞相西來走馬迎兩府元臣今轉宻一方逋冦不難平贈刑部馬侍郎紅旗照海壓南荒徴入臺中作侍郎暫從相公平小冦便歸天闕致時康和裴相公東征塗經女几山下作旗穿曉日雲霞雜山倚秋空劍㦸明敢請相公平賊後暫攜諸吏上峥嶸郾城晚飲贈副使馬侍郎及馮宿李宗閔二員外城上赤雲呈勝氣眉間黄色見歸期幕中無事惟須飲即是連鑣向闕時别留後侍郎為文無出相如右謀帥難居郤縠先歸去雪消溱洧動西來旌斾拂晴天同李二十八員外從裴相公野宿西界四面星辰著地明散燒煙火宿天兵不關破賊須歸奏自趂新年賀太平過襄城郾城辭罷過襄城潁水嵩山刮眼明已去蔡州三百里家人不用遠來迎宿神龜招李二十八馮十七荒山野水照斜暉啄雪寒鵶趂影飛夜宿驛亭愁不睡幸來相就葢征衣和李二十八司勲連昌宫夾道疎槐出老根髙甍巨桷壓山原宫前遺老來相問今是開元幾葉孫次潼闗先寄張十二閣老使君荆山已去華山來日出潼關四扇開刺史莫辭迎候遠相公親破蔡州回次潼關上都綂相公暫辭堂印執兵權盡管諸軍破賊年冠蓋相望催入相待將功徳格皇天桃林夜賀晉公西來騎火照山紅夜宿桃林臘月中手把命珪兼相印一時重疊賞元功元日酬蔡州馬十二尚書去年蔡州元日見寄之什元日新詩已去年蔡州遥寄荷相憐今朝縱有誰人領自是三冬不敢眠荅道士寄樹雞軟濕青黄狀可猜欲烹還喚木盤回煩君自入華陽洞直割乖龍左耳來武關西逢配流吐蕃嗟爾戎人莫慘然湖南近地保生全我今罪重無歸望直去長安路八千題臨瀧寺不覺離家已五千仍將衰病入瀧船潮陽未到人先説海氣昬昬水拍天晚次宣溪韶州張使君惠書叙别酬以二章韶州南去接宣溪雲水蒼茫日向西客淚數行元自落鷓鴣休傍耳邊啼兼金安足比清文白首相隨愧使君俱是嶺南巡管内莫欺荒僻斷知聞題秀禪師房橋夾水松行百步竹牀莞席到僧家暫拳一手支頭卧還把漁竿下釣沙將至韶州先寄張使君借圖經曲江山水聞來乆恐不知名訪倍難願借圖經將入界毎逢佳處便開看過始興江口感懷憶作兒童隨伯氏南來今秖一身存目前百口還相逐舊事無人可共論題西林寺故蕭二郎中舊堂公有女為尼在汝州中郎有女能傳業伯道無兒可保家偶到廬山曾住處幾行衰淚落煙霞題廣昌館白水龍飛已幾春偶尋遺跡問耕人丘墳發掘當官道何處南陽有近親寄周隨州員外陸孟丘楊乆作塵同時存者更誰人金丹别復知傳得乞取刀圭救病身早春與張博士籍遊楊尚書林亭寄第三閣老兼呈白馮二閣老牆下春渠入禁溝渠冰初破滿渠浮鳯池近日長先暖流到池時更不流夀陽驛風光欲動别長安春半邊城特地寒不見園花兼巷柳馬頭惟有月團團鎮州初歸别來楊柳街頭樹擺撼春風秖欲飛還有小園桃李在留花不發待郎歸同張水部籍遊曲江寄白二十二舎人漠漠輕隂晚自開青春白日映樓臺曲江水滿花千樹有底忙時不肯來早春呈水部張十八員外二首天街小雨潤如酥草色遥看近却無最是一年春好處絶勝煙柳滿皇都莫道官忙身老大即無年少逐春心馮君先到江頭看柳色如今深未深奉使鎮州行次承天行營奉酬裴司空相公竄逐三年海上歸逢公復此著征衣旋吟佳句還鞭馬恨不身先去鳥飛鎮州路上謹酬裴司空相公重見寄銜命山東撫亂師日馳三百自嫌遲風霜滿面無人識何處如今更有詩和李相公題蕭家林亭山公自是林園主歎惜前賢造作時巖洞幽深門盡鎻不因丞相幾人知荅嚴大夫賈至今夕秦天一鴈來梧桐墜葉擣衣催思君獨步華庭月舊館秋隂生緑苔贈陜掾梁宏梁子工文四十年詩顛名過草書顛白頭仍作功曹掾禄薄誰供沽酒錢西亭春望日長風暖柳青青北鴈歸飛入窅㝠岳陽城上聞吹笛能使春心滿洞庭送南給事貶崖州疇昔丹墀與鳯池即今相見兩相悲朱崖雲夢三千里欲别俱為慟哭時重别南給事謫宦三年尚未回故人今日又重來聞道崖州一萬里今朝須盡數千盃别裴九弟西江萬里向東流今夜江邊駐客舟月色更添春色好蘆風似勝竹風幽送王道士還京一片仙雲入帝鄉數聲秋鴈至衡陽借問清都舊花月豈知遷客泣瀟湘巴陵夜别王八員外柳絮飛時别洛陽梅花發後在三湘世情已逐浮雲散離恨空隨江水長岳陽樓重宴别王八員外貶長沙江路東連千里潮青雲北望紫微遥莫道巴陵湖水闊長沙南畔更蕭條江南送李卿雙鶴南飛度楚山楚南相見憶秦關願值回風吹羽翼早隨陽鴈及春還洞庭送李十二赴零陵今日相逢落葉前洞庭秋水遠連天共說京華舊遊處回看北斗欲潸然送李侍郎赴常州雪晴雲散北風寒楚水吳山道路難今日送君須盡醉明朝相憶路漫漫出塞曲萬里平沙一聚塵南飛羽檄北來人傳道五原烽火急單于昨夜扣新秦春思二首草色青青柳色黄桃花歴亂李花香東風不為吹愁去春日偏能惹恨長紅粉當壚弱柳垂金花臘酒解酴醿笙歌日莫能留客醉殺長安輕薄兒勤政樓觀樂銀河帝女下三清紫禁笙歌出九城為報延州來聽樂須知天下欲昇平初至巴陵與李十二裴九同泛洞庭三首上江相逢皆舊遊湘山永望不堪愁明月秋風洞庭水孤鴻落葉一扁舟江畔楓葉初帶霜渚邊菊花亦已黄輕舟落日興不盡三湘五湖意何長楓岸紛紛落葉多洞庭秋水晚來波乘興輕舟無近遠白雲明月弔湘娥欵乃曲元結獨存名跡在人間順俗與時未安閒來謁大官兼問政扁舟却入九疑山湘江二月春水平滿月和風宜夜行唱橈欲過平陽戍守吏相呼問姓名千里楓林煙雨深無朝無暮有猿吟停橈静聽曲中意好是雲山韶濩音零陵郡北湘水東浯溪形勝滿湘中溪口石顛堪自逸誰能相伴作漁翁下瀧船似入深淵上瀧船似欲昇天瀧南始到九疑郡應絶髙人乘興船萬首唐人絶句巻三欽定四庫全書萬首唐人絶句巻三宋洪邁編五言禁中白居易門嚴九重静忩幽一室閒好是修心處何必在深山村雪夜坐南忩背燈坐風霰暗紛紛寂寞深村夜殘鴈雪中聞友人夜訪簷間清風簟松下明月杯幽意正如此況乃故人來北亭獨宿悄悄壁下牀紗籠耿殘燭夜半獨眠覺疑在僧房宿晚望江城寒角動沙洲夕鳥還獨在高亭上西南望逺山招東鄰小榼二升酒新簟六尺牀能來夜話否池畔欲秋涼山下宿獨到山下宿静向月中行何處水邊碓夜舂雲母聲池畔二首結構池西廊䟽理池東樹此意人不知欲為待月處持刀閒宻竹竹少風來多此意人不㑹欲令池有波禁中秋宿風翻來裏幙雨冷通中枕耿耿背斜燈秋牀一人寢出關路山川函谷路塵土游子顔蕭條去國意秋風生故關照鏡皎皎青銅鏡斑斑白絲鬢豈復更藏年實年君不信夜雨早蛩啼復歇殘燈滅又明隔忩知夜雨芭蕉先有聲秋夕葉聲落如雨月色白似霜夜深方獨卧誰為拂塵牀㣲雨夜行漠漠秋雲起稍稍夜寒生自覺衣裳濕無㸃亦無聲江樓聞砧江人授衣晚十月始聞砧一夕髙樓月萬里故園心宿東林寺經忩燈熖短僧爐火氣深索落廬山夜風雪宿東林夜雪已訝衾枕冷復見忩戸明夜深知雪重時聞折竹聲忠州郡中鄉路音信斷山城日月遲欲知州近逺階前摘荔枝盩厔縣北樓望山一為趨走吏塵土不開顔辜負平生眼今朝始見山别韋蘇州百年愁裏過萬感醉中來惆悵城西别愁眉兩不開長安送桞大東歸白社羈遊伴青門逺别離浮名相引住歸路不同歸除夜宿洺州家寄關西住身為河北遊蕭條嵗除夜旅泊在洺州冬至夜懐湘靈豔質無由見寒衾不可親何堪最長夜俱作獨眠人涼夜有懐清風吹枕席白露濕衣裳好是相親夜漏遲天氣涼病中作乆為勞生事不學攝生道少年已病多此身豈堪老問淮水自嗟名利客擾擾在人間何事長淮水東流亦不閒宿樟亭驛夜半樟亭驛愁人起望鄉月明何所見潮水白茫茫翰林中送獨孤起居出院碧落留雲住青𡨕放鶴還銀臺向南路從此到人間感髪落昔人愁頭白誰知未白衰眼前應落盡無可變成絲禁中聞蛬悄悄禁門閉夜深無月明西忩獨闇坐滿耳新蛬聲秋蟲切切闇忩下喓喓深草裏秋天思婦心雨夜愁人耳憶元九𦕈𦕈江陵道相思逺不知近來文巻裏半是憶君詩晝卧抱枕無言語空房獨悄然誰知盡日卧非病亦非眠有感絶絃與斷絲猶有却續時唯有衷腸斷無應續得期荅友問似玉童顔盡如霜病鬢新莫驚身頓老心更老於身村居門閉仍逢雪厨寒未起煙貧家重寥落半為日高眠早春雪散因和氣冰開得暖光春銷不得處唯有鬢邊霜重寄元九蕭散弓驚鴈分飛劔化龍悠悠天地内不死會相逢紅藤杖交親過滻别車馬到江回唯有紅藤杖相隨萬里來雨中題衰桞濕屈青條折寒飄黄葉多不知秋雨意更遣欲如何庾樓新嵗嵗時銷旅貎風景觸鄉愁牢落江湖意新年上庾樓遺愛寺弄石臨溪坐尋花遶寺行時時聞鳥語處處是泉聲自悲火宅煎熬地霜松摧折身因知羣動内易死不過人問劉十九緑螘新醅酒紅泥小火爐晚來天欲雪能飲一杯無醉中對紅葉臨風杪秋樹對酒長年人醉貎如霜葉雖紅不是春山中戲問韋侍御我抱棲雲志君懐濟世才常吟反招隠那得入山來龍昌寺荷池泠碧新秋水殘紅半破蓮從來寥落意不似此池邊商山路有感萬里路長在六年身始歸所經多舊館大半主人非太平樂詞二首嵗豐仍節儉時泰更銷兵聖念長如此何憂不太平湛露浮堯酒薫風起舜歌願同堯舜意所樂在人和小曲新詞二首霽色鮮宫殿秋聲脆管絃聖明千載樂嵗嵗似今年紅裾明月夜碧簟早秋時好向昭陽宿天涼玉漏遲閨怨詞三首朝憎鶯百囀夜妬燕雙棲不慣經春别唯知到曉啼珠箔籠寒月紗忩背曉燈夜來巾上淚一半是春冰關山征戍逺閨閤别離難苦戰應憔悴寒衣不要寛南浦别南浦淒淒别西風嫋嫋秋一看腸一斷好去莫回頭吟元郎中白鬢詩兼飲雪水茶冷詠霜毛句閒嘗雪水茶城中展眉處只是有元家寄王秘書霜菊花萎日風梧葉碎時怪來秋思苦縁詠秘書詩勤政樓西老桞半朽臨風樹多情立馬人開元一株桞長慶二年春桞條詞送别南陌傷心别東風滿把春莫欺楊桞弱勸酒勝於人怨詞奪寵心那慣尋思倚殿門不知移舊愛何處作新恩不睡熖短寒釭盡聲長曉漏遲年衰自不睡不是守三尸宿陽城驛對月親故尋回駕妻孥未出關鳯凰池上月送我過商山山泉煎茶坐酌泠泠水看煎瑟瑟塵無由持一盌寄與愛茶人吉祥寺見錢侍郎題名雲雨三年别風波萬里行秋心正蕭索況見故人名城上城上鼕鼕鼓朝衙復晚衙為君慵不出落盡遶城花湖上夜飲郭外迎人月湖邊醒酒風誰留使君飲紅燭在舟中見李蘇州示男阿武詩自感成詠遥羡青雲裏祥鸞正引雛自憐滄海畔老蚌不生珠題故元少尹集後黄壤詎知我白頭徒憶君唯將老年淚一灑故人文九日代羅樊二妓招舒著作羅敷歛雙袂樊姬獻一杯不見舒員外秋菊為誰開逺師東宫白庻子南寺逺禪師何處遥相見心無一事時問逺師葷羶停夜食吟詠散秋懐笑問東林老詩應不破齋池西亭朱欄映晚樹金魄落秋池還似錢塘夜西樓月出時訪皇甫七上馬行數里逢花傾一杯更無停泊處還是覔君來塗山寺獨遊野徑行無伴僧房宿有期塗山來去熟唯是馬蹄知逢舊久别偶相逢俱疑是夢中即今歡樂事放盞又成空恨詞翠黛眉低歛紅珠淚暗銷從來恨人意不省似今朝池忩池晚蓮芳謝忩秋竹意深更無人作伴唯對一張琴題周家歌者清𦂳如敲玉深圓似轉簧一聲腸一斷能有幾多腸蕭庻子相過半日停車馬何人在白家殷勤蕭庻子愛酒不嫌茶酬裴相公見寄二絶習静心方泰勞生事漸希可憐安穏地捨此欲何歸一雙埀翅鶴數首觧嘲文緫是迂閒物争堪伴相君恨去年老去猶耽酒春來不著家去年來校晚不見洛陽花歎槿花朝榮殊可惜暮落實堪嗟若向花中比猶應勝眼花七年元日對酒五首慶弔經過懶逢迎拜跪遲不因時節日豈覺此身衰衆老憂添嵗余衰喜入春年開第七秩屈指幾多人三杯藍尾酒一楪膠牙餳除却崔常侍無人共我争今朝吳與洛相憶一欣然夢得知君否俱過本命年同嵗崔何在同年杜又無應無藏避處只有且歡娛微之敦詩晦叔相次長逝巋然自傷因成二絶併失鵷鸞侣空留麋鹿身只應嵩洛下長作獨遊人長夜君先去殘年我幾何秋風滿衫淚泉下故人多嘗新酒憶晦叔二首樽裏看無色杯中動有光自君抛我去此物共誰嘗世上強欺弱人間醉勝醒自君抛我去此語更誰聽寄李相公漸老只謀歡雖貧不要官唯求造化力試為駐春看池上二絶山僧對棋坐局上竹隂清映竹無人見時聞下子聲小娃撑小艇偷采白蓮回不觧藏蹤跡浮萍一道開慿李睦州訪徐凝山人郡守輕詩客鄉人薄釣翁觧憐徐處士唯有李郎中贈結之歡愛今何在悲啼亦是空同為一夜夣共過十年中琴置琴曲机上慵坐但含情何煩故揮弄風絃自有聲萬首唐人絶句巻三
