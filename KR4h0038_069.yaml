body:
  text: 萬首唐人絶句卷六十九宋洪邁編七言過大哥山池明皇澄潭皎鏡石崔嵬萬壑千巖暗緑苔林亭自有幽真趣況復秋深爽氣來傀儡吟刻木牽絲作老翁雞皮鶴髮與真同須臾弄罷寂無事還似人生一夢中題梅妃畫真憶昔嬌妃在紫宸鉛華不御得天真霜綃雖似當時態爭奈嬌波不顧人上元日二首文宗上元高㑹集羣仙心齊何事欲祈年丹誠儻徹玉帝座且共吾人慶大田蓂生三五葉初齊上元羽客出桃蹊不愛仙家登真訣願䝉四海福黔黎題涇縣水西寺宣宗大殿連雲接賞溪鐘聲還與鼓聲齊長安若問江南事說道風光在水西謝賜珍珠梅妃桂葉雙眉久不描殘粧和淚汚紅綃長門盡日無梳洗何必真珠慰寂寥大言聨句顏真卿高歌閬風步􅌡洲燂鵬㵸鯤餐未休四方上下無外頭一啜頓涸滄溟流樂語苦河既濟真僧喜新知滿坐笑相視戍客歸來見妻子學生放假偷向市饞語拈䭔䑛指不知休欲炙侍立涎交流過屠大嚼肯知羞食店門外強淹留醉語逢糟遇麯便酩酊覆車墜馬皆不醒倒著接籬髮垂領狂心亂語無人並酬令狐舍人楊巨源曉禁蒼蒼換直還暫低鸞翼向人間亦知受業公門事數仞高墻不見山和令狐郎中題詩一代占清機秉筆三年直紫微自禀道情齠齓異不同蘧玉學知非方城驛逢孟侍御走馬溫湯直隼飛相逢矍鑠理征衣軍中得力兒男事入驛從容見落暉題清涼寺憑檻霏微松樹煙陶濳曾用道林錢一聲寒磬空心曉花雨知從第幾天石水詞山叟和雲斸翠屏煎時分日檢仙經天人持此扶衰病勝得瑶池水一瓶宿杭州虛白堂李郢秋月斜明虛白堂寒蛩唧唧樹蒼蒼江風徹曉不得睡二十五聲秋㸃長海鷗詠顧況萬里飛來為客鳥曾䝉丹鳯借枝柯一朝鳯去梧桐死滿目鴟鳶奈爾何玉蘂院真人降元稹弄玉濳過玉樹時不教青鳥出花枝的應未有諸人覺只是嚴郎不得知建節後偶作楊汝士拋却弓刀上砌臺上方臺榭與雲開山僧見我衣裳窄知道新從戰地來題貢院魏扶梧桐葉落滿庭隂鎖閉朱門試院深曾是昔年辛苦地不將今日負初心楊桞枝詞二首皇甫松爛漫春還水國時吳王宫殿桞絲垂緑鶯長呌香閨畔西子無因更得知春入行宫暖翠旗𤣥宗侍女舞煙絲如今桞向空城緑玉笛何人更把吹悼楊氏妓琴絃韋莊魂歸寥廓魄歸煙只住人間十八年昨日施僧裙帶上斷腸猶繫琵琶絃西山靜中吟施肩吾重重道氣結成神玉闕金堂逐日新若數西山得道者連豫便是十三人對趙頴歌朱子真人間幾日變桑田誰識神仙洞裏天短促雖知有殊異且須歡醉在生前題搔口張仲謀嘗聞燒尾便拏空只過天門更一重大禹未生門未鑿可能天下總無龍春雪焦郁春雪空濛簾外斜霏微半入野人家長天逺樹山山白不辨梅花與桞花夢中答妻蘇檢還吳東下過澄城樓上清風酒半醒想得到家春欲暮海棠千樹已凋零登慈恩寺塔楊玢紫雲樓下曲江平鴉噪殘陽麥隴青莫上慈恩最高處不堪看又不堪聽遣歌妓垂老無端用意乖誰知道侣厭清齊如今又采蘼蕪去辜負張君繡靸鞋長安舊居四鄰侵我我從伊畢竟須思未有時試上含元殿基望秋風秋草正離離題東都安國觀盧尚書夕照紗忩起暗塵青松繞殿不知春君看白首誦經者半是宫中歌舞人客舍寄桞博士薛業去年燕巢主人屋今年花發路傍枝年年為客不歸去舊國存亡那得知題楊收相公宅尹璞禍福從來路不遙偶然平地上煙霄煙霄未穩還平地門對孤峯占寂寥偶題鄭雲叟帆力衝開滄海浪馬啼踏破亂山青浮名浮利濃於酒醉得人心死不醒題病僧寮佛前香印廢晨燒金錫當門照寂寥童子不知師病困報風吹折好芭蕉啄木鳥朱慶餘丁丁向晚急還稀啄盡庭槐未肯歸終日為君除蠧害莫嗔無事不平飛題故翠微宫驪山遊者翠微寺本翠微宫樓閣亭臺幾十重天子不來僧又去樵夫時倒一株松題濠州高塘館閻敬愛借問襄王安在哉山川此地勝陽臺今宵寓宿高塘館神女何曾入夢來戲題前詩後李和風高唐不是這高塘淮畔荆南各異方若向此中求薦枕參差笑殺楚襄王贈杜荀鶴王希羽金榜曉懸生世日玉書漸記上升時九華山色高千尺未必高於第八枝西上辭母墳陳去病高蓋山頭日影微黃昏獨立宿禽稀林間滴酒空垂淚不見丁寧囑早歸讀孝經方愚星彩滿天朝北極源流是處赴東溟為臣為子不忠孝辜負宣尼一卷經大言詩郯峭線大長江扇大天屐鞋拋在海東邉世間多少閒蟲豸盡在郯生柱杖前山居陳寡言醉卧茅堂不閉關覺來開眼見前山松花落處宿猿在麋鹿羣羣林際還間吟徐靈符學道全真在此生迷徒待死更求生今生不了無生理縱得生之何處生侯臺秀才一首大道全真在此生愚人待死更求生此生不在今生度縱有生從何處生遺臨平監吏朱沖和三千里外布干戈果得鯨鯢入網羅今日寶刀無殺氣只緣君處受恩多秋望夜吟和長安二鬼六街鼓絶行人歇九衢茫茫空有月九衢生人何勞勞長安土盡槐根高贈穆郎桂林青蘿帳女子圑圓今夕色光暉結了同心翠帶垂此後莫教塵㸃染他年長照歲寒姿褰帳揉藍緑色麴塵開靜見三星入坐來桂影已圖攀折後子孫長作棟梁材題碧花箋珠露素中書繾綣青蘿帳裏寄鴛鴦自憐孤影清秋夕灑淚徘徊滴冷光贈朱朴廬山女子知君久積池塘夢遣我方思變動來操執若同顔淑子今宵寧免淚盈腮擊盤歌送歐陽訓酒新林驛女子飛燕身輕未是輕枉將弱質在巖扃今來不獨同鴛枕相伴神魂入杳冥題二妃廟尤啓中目斷魂銷正惘然九疑山際路漫漫何人知得心中恨空有湘江竹萬竿湘妃席上常說仙家事不同偶陪花月此宵中錦屏銀燭皆堪恨惆悵紗忩向曉風題二妃廟崔渥萬里同心别九重定知涉歷此相逢誰人翻向羣峯路不得蒼梧徇玉容湘妃席上春鳥交交引思濃豈期塵跡拜仙宫鸞歌鳯舞飄珠翠疑是陽臺一夢中席間賦湘妃鸞輿昔日出蒲關一去蒼梧更不還若是不留千古恨湘江何事竹猶斑愁聞黃鳥夜關關媯汭春來有夢還遺美代移刋勒絶唯聞留得淚痕斑同賦西施方承恩寵醉金杯豈謂干戈驟到來亡國破家皆有恨捧心無語淚蘇臺同賦桃源仙子桃花流水兩堪傷洞口煙波月漸長莫道仙家無别恨至今垂淚憶劉郎同賦洞庭龍女涇陽平野草初春遙望家鄉淚滴頻當此不知多少恨至今空憶在靈姻别主人素娥妾閉閒房君路岐妾心君恨兩依依魂神儻遇巫陽伴必逐朝雲暮雨歸答素娥韋洵美别恨離羣自古聞此心難捨意難論承恩必若頒時服莫使沾濡有淚痕假僧塌悶吟四壁紛紛蟋蟀聲背燈欹枕夢難成人間有此不平事何處人能報不平題明月堂二首劉氏婦蟬鬢驚秋華髮新可憐紅隙盡埃塵西山一夢何年覺明月堂前不見人玉鉤風急響丁東回首西山似夢中明月堂前人不見庭梧一夜老松風題秦隴間郵亭乾符童謡八月無霜塞草青將軍騎馬出空城漢家天子西巡狩猶向江東更索兵别本秦隴無人塞草腥將軍一去泣空營漢家天子東巡狩行到江南又起兵守庚申程紫霄不守庚申亦不疑此心常與道相依玉皇已自知行止任汝三彭說是非題沙苑門誰氏女昔逐良人去上京良人身沒妾東征同來不得同歸去永負朝雲暮雨情别本昔逐良人去上京良人登第却東征同來却得同歸去免負朝雲暮雨情題桐樹詠度支雜事典駱浚幹聳一條青玉直葉鋪千疊緑雲低爭如燕雀偏巢此却是鴛鴦不得棲彭門偶題薛能淮王西舍固非夫桞惲偏州未是都直到春秋諸列國擁旄才子也應無惜花三首張碧千枝萬枝占春開彤霞著地紅成堆一窖閒愁驅不去殷勤對爾酌金杯老鴉拍翼盤空疾凖擬浮生如瞬息阿母蟠桃香未齊漢皇骨葬秋山碧朝開暮落煎人老無人為報東君道留取穠紅伴醉吟莫教少女來吹掃僧院影堂許渾香銷雲凝舊僧家僧剎殘燈壁半斜日暮松煙空漠漠秋風吹破妙蓮華上歸州刺史代通狀二首僧懷濬家在閩山東復東其中歲歲有花紅如今不在花紅處花在舊時紅處紅家在閩川西復西其中歲歲有鶯啼如今不在鶯啼處鶯在舊時啼處啼題縉雲山鼎池徐凝黃帝旌旗去不回空餘片石碧崔嵬有時風卷鼎湖浪散作晴天雨㸃來題顔氏亭宇孟賓于園林蕭灑聞來久欲訪因循二十秋今日開襟吟不盡碧山重疊水長流題情盡橋雍陶從來只有情難盡何事名為情盡橋自此改名為折桞任他離恨一條條弔孟昭圖裴徹一章何罪死何名投水惟君與屈平從此蜀江煙雨夜杜䳌聲作兩般聲孟才人張祜偶因清唱奏歌頻選入宫中十二春絶後一聲河滿子九原須弔孟才人江上旅泊呈杜員外牛渚南來沙岸長逺吟佳句望池陽野人未必非毛遂太守還須是孟嘗水殿拋毬曲二首李謹言侍宴黃昏曉未休玉階夜色月如流朝來自覺承恩最笑倩傍人認繡毬堪恨隋家幾帝王舞䄄揉盡繡鴛鴦如今重到拋毬處不是金爐舊日香與夫訣嚴灌出妻真氏當時心事已相關雨散雲收一餉間便是孤帆從此去不堪重過望夫山題僧院壁二首鍾離權得道高僧不易逢幾時歸去願相從自言住處連蓬島别是蓬萊第一峯莫厭追陪笑語頻尋思離亂可傷神閒來屈指從頭數得見清平有幾人送人徐月英惆悵人間萬事違兩人同去一人歸生憎平望亭前水忍照鴛鴦相背飛叙懷為失三從泣淚頻此身何用處人倫雖然日逐笙歌樂常羡荆叉與布裙裴給事宅白牡丹開元名公長安豪貴惜春殘爭賞新開紫牡丹别有玉盤承露冷無人起就月中看元白席上李升生在儒家偶太平𤣥纁重滯布衣輕誰能世路趨名利臣事玉皇歸上清端正樹奉天文士昔日偏沾雨露榮德皇西幸賜佳名馬嵬去此無多地合向楊妃冢上生詠張諲山水李頎小山破體閒支策落日梨花照空壁詩堪記室始風流畫與將軍作勍敵聽王敬遨彈琴李山甫幽蘭緑水耿清音歎息先生枉用心世上幾時曾好古人前何必獨沾襟萬首唐人絶句卷六十九
