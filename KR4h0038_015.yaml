  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0038_WYG_015-1a, image: WYG1349/WYG1349-0221c.png}
body:
  text: 萬首唐人絶句卷十五宋洪邁編七言寄兩銀榼與裴侍郎兩絶白居易貧無好物堪為信雙榼雖輕意不輕願奉謝公池上酌丹心緑酒一時傾慣和麴糵堪盛否重用鹽梅試洗看小器不知容幾許襄陽米賤酒升寬小橋桞細水涓涓似淚流日西惆悵小橋頭衰楊葉盡空枝在猶被霜風吹不休哭微之二首八月涼風吹白幕寢門廊下哭微之妻孥朋友來相弔唯道皇天無所知文章卓犖生無敵風骨英靈沒有神哭送咸陽北原上可能隨例作灰塵任老不愁陌上春光盡亦任庭前日影斜面黑眼昏頭雪白老應無可更增加勸歡火急歡娛切勿遲眼看老病悔難追樽前花下歌筵裏會有求來不得時晚歸府晚從履道來歸府街路雖長尹不嫌馬上涼於床上坐緑槐風透紫蕉衫宿龍潭寺夜上九潭誰是伴雲隨飛蓋月隨杯明年尚作三川守此地兼將歌舞來過溫尚書舊莊白石清泉拋濟口碧幢紅斾照河陽村人都不知時事猶是呼為處士莊贈神照上人心如定水隨形應口似懸河逐病治曾向衆中先禮拜西方去日莫相遺自逺禪師自出家來長自在緣身一衲一繩床令人見即心無事每一相逢是道場宗上人榮華恩愛棄成唾戒定真如和作香今古雖殊同一法瞿雲拋却轉輪王清間上人梓潼眷屬何年别長夀壇場近日開應是蜀人皆度了法輪移向洛中來彈秋思信意間彈秋思時調清聲直韻疏遲近來漸喜無人聽琴格髙低心自知春風春風先發苑中梅櫻杏桃梨次第開薺花榆莢深村裏亦道春風為我來洛陽春洛陽陌上春長在昔别今來二十年唯覔少年心不得其餘萬事盡依然早出晚歸早起或因㩦酒出晚歸多是看花回若拋風景長間坐自問東京作底來魏王堤花寒懶發鳥慵啼信馬間行到日西何處未春先有思栁條無力魏王堤勸行樂少年信美何曽久春日雖遲不再中歡笑勝愁歌勝哭請君莫道等頭空老慵豈是交親向我疏老慵自愛閉門居近來漸喜知聞斷免惱嵇康索報書夜調琴憶崔少卿今夜調琴忽有情欲彈惆悵憶崔卿何人解愛中徽上秋思頭邉八九聲王子晉廟子晉廟前山月明人聞往往夜吹笙鸞吟鳳唱聽無拍多似霓裳散序聲晚出尋人不遇籃輿不乘乘晚涼相尋不遇亦無妨輕衣穩馬槐隂下自要間行一兩坊舟中夜坐潭邉霽後多清景橋下涼來足好風秋鶴一雙船一隻夜深相伴月明中題西亭多見朱門富貴人林園未畢即無身我今幸作西亭主已見池塘五度春觀遊魚繞池間步看魚遊正值兒童弄釣舟一種愛魚心各異我來施食爾垂鈎看採蓮小桃間上小蓮船半採紅蓮半白蓮不似江南惡風浪芙蓉池在卧牀前看採菱菱池如鏡淨無波白點花稀青角多時唱一聲新水調謾人道是採菱歌夭老早世身如風裏燭暮年髮似鏡中絲誰人斷得人間事少夭堪傷老又悲秋池洗浪清風透水霜水邉間坐一繩床眼塵心垢見皆盡不是秋池是道場新雪二首不思北省煙霄地不憶南宫風月天唯憶靜恭楊閣老小園新雪暖爐前不思朱雀街東鼓不憶青龍寺後鐘唯憶夜深新雪後新昌臺上七株松和微之在校書郎日過三鄉三鄉過日君年幾今日君年五十餘不獨年催身亦變校書郎變作尚書和微之十七與君别及朧月花枝之詠别時十七今頭白惱亂君心三十年垂老休吟花月句恐君更結後身緣疑夢二首莫驚寵辱虛憂喜莫計恩讐浪苦辛黃帝孔丘無處問安知不是夢中身鹿疑鄭相終難辨蝶化莊生詎可知假使如今不是夢能長於夢幾多時除夜病眼少眠非守嵗老心多感又臨春火銷燈盡天明後便是平頭六十人府西池栁無氣力枝先動池有波文氷盡開今日不知誰計會春風春水一時來府酒五絶變法自慚到府來周嵗惠愛威稜一事無唯是改張官酒法漸從濁水作醍醐招客日午微風且暮寒春風冷峭雪乾殘碧氊帳下紅爐畔試為來嘗一盞看辨味甘露太甜非正味醴泉雖潔不芳馨杯中此味何人别柔旨之中有典刑自勸憶昔羈貧應舉年脫衣典酒出江邉十千一斗猶賖飲何況官供不著錢諭妓燭淚夜粘桃葉袖酒痕香汚石榴裙莫辭辛苦供歡宴老後思量悔煞君履道居三首莫嫌地窄林亭小莫厭貧家活計微大有髙門鎖寬宅主人到老不曽歸東里素帷猶未徹南鄰丹旐又新懸衡門蝸舍自慚愧收得身來已五年世事平分衆所知何嘗苦樂不相隨唯餘耽酒狂歌客只有樂時無苦時戲招諸客黃醅緑醑迎冬熟絳帳紅爐逐夜開誰道洛中多逸客不將書喚不曾來將歸欲去公門返野扉預思泉竹已依依更憐家醖迎春熟一甕醍醐待我歸睡覺官初罷後歸來夜天欲明前睡覺時起坐思量更無事身心安樂復誰知感舊詩卷夜深吟罷一長吁老淚燈前濕白鬚二十年前舊詩卷十人酬和九人無涼風歎昨夜涼風又颯然螢飄葉墜卧床前逢秋莫歎須知分已過潘安三十年送考功崔郎中赴闕稱意新官又少年秋涼身健好朝天青雲上了無多路却要徐驅穩著鞭聞歌者唱微之詩新詩絶筆聲名歇舊卷生塵篋笥深時向歌中聞一句未容傾耳已傷心衰荷白露凋花花不殘涼風吹葉葉初乾無人解愛蕭條境更繞衰藂一匝看池上送考功崔郎中兼别房竇二妓文昌列宿徴還日洛浦行雲放散時鵷鷺上天花逐水無由再會白家池自問依仁臺廢悲風晚履信池荒宿草春自問老身騎馬出洛陽城裏竟何人秋夜聽髙調涼州樓上金風聲漸緊月中銀字韻初調促張絃柱吹髙管一曲涼州入泬寥香山寺二絶空門寂靜老夫間伴鳥隨雲往復還家醖滿瓶書滿架半移生計入香山愛風巖上攀松蓋戀月潭邉住日稜且共雲泉結緣境他生當作此山僧負春病來道士教調氣老去山僧勸坐禪辜負春風楊栁曲去年斷酒到今年春池上戲贈李郎中滿池春水何人愛唯我回看指似君直似挼藍新汁色與君南宅染羅裙木蘭花膩如玉指塗朱粉光似金刀剪紫霞從此時時春夢裏應添一樹女郎花楊栁枝詞八首六么水調家家唱白雪梅花處處吹古歌舊曲君休聽聽取新翻楊栁枝陶令門前四五樹亞夫營裏百千條何似東都正二月黃金枝映洛陽橋依依嫋嫋復青青勾引清風無限情白雪花繁空撲地緑絲條弱不勝鶯紅板江橋青酒旗館娃宫暖日斜時可憐雨歇東風定萬樹千條各自垂蘇州楊栁任君誇更有錢塘勝館娃若解多情尋小小緑楊深處是蘇家蘇家小女舊知名楊栁風前别有情剝條盤作銀環樣卷葉吹為玉笛聲葉含濃露如啼眼枝嫋輕風似舞腰小樹不禁攀折苦乞君留取兩叄條人言桞葉似愁眉更有愁腸似栁絲柳絲挽斷腸牽斷彼此應無續得期浪淘沙詞六首一泊沙來一泊去一重沙滅一重生相攪相淘無歇日會教山海一時平白浪茫茫與海連平沙浩浩四無邉暮去朝來淘不住遂令東海變桑田青草湖中萬里程黃梅雨裏一人行愁見灘頭夜泊處風翻暗浪打船聲借問江潮與海水何似君情與妾心相恨不如潮有信相思始覺海非深海底飛塵終有日山頭化石豈無時誰道小郎拋小婦船頭一去沒回期隨波逐浪到天涯遷客生還有幾家却到帝鄉重富貴請君莫忘浪淘沙問鶴烏鳶爭食雀爭窠獨立池邉風雪多盡日踏氷翹一足不鳴不動意如何代鶴答鷹爪攫雞雞肋折鶻拳蹴鴈鴈頭垂何如斂翅水邉立飛上雲松棲穩枝少年問少年怪我問如何何事朝朝醉復歌號作樂天應不錯憂愁時少樂時多問少年千首詩堆青玉案十分酒㵼白金盂回頭却問諸年少作箇狂夫得了無代林園戲贈裴侍中新修集賢宅成池館甚盛數往遊宴醉歸自戲耳豈獨西坊來往頻偷間處處作遊人衡門雖是棲遲地不可終朝鎖老身重戲答小水低亭自可親大池髙館不關身林園莫妬裴家好憎故憐新豈是人早秋登天宫寺閣贈諸客天宫閣上醉蕭辰絲管間聽酒慢巡為向涼風清景道今朝屬我兩三人醉遊平泉狂歌箕踞酒樽前眼不看人面向天洛客最間唯有我一年四度到平泉集賢池答侍中問主人晚入皇城宿問客徘徊何所須池月幸間無用處今宵能借客遊無和同州楊侍郎誇柘枝見寄細吟馮翊使君詩憶作餘杭太守時君有一般輸我事柘枝堪校十年遲冬日平泉路晚歸山路難行日易斜煙村霜樹欲棲鴉夜歸不到應間事熱飲三杯即是家利仁北街作草色班班春雨晴利仁坊北面西行踟蹰立馬緣何事認得張家歌吹聲洛陽堰間行洛陽堰上新晴日長夏門前欲暮春遇酒即沽逢樹歇七年北地作間人過永寧村杏野桃繁似雪行人不醉為誰開賴逢山縣盧明府引我花前勸一杯羅敷水野店東頭花落處一條流水號羅敷芳魂艷骨知何在春草茫茫墓亦無龍門送别皇甫澤州赴任韋山人南逰隼旟歸洛知何日鶴駕還嵩莫過春惆悵香山雲水冷明朝便是獨逰人寄楊六侍郎西户最榮君好去左馮雖穩我慵來秋風一筯鱸魚鱠張翰搖頭喚不回即事重裘暖帽寬氊履小閣低忩深地爐身穩心安眠未起西京朝士得知無家園三絶滄浪峽水子陵灘路逺江深欲去難何似家池通小院卧房階下插魚竿籬下先生時得醉甕間吏部暫偷眠何如家醖雙魚榼雪夜花時長在前鴛鴦怕捉竟難親鸚鵡雖籠不著人何似家禽雙白鶴間行一步亦隨身萬首唐人絶句卷十五欽定四庫全書萬首唐人絶句卷十五宋洪邁編五言散關遇雪李商隱劒外從軍逺無家與寄衣散關三尺雪回夢夢鴛機樂遊向晚意不適驅車登古原夕陽無限好只是近黃昏巴江栁巴江可惜栁栁色緑侵江好向金鑾殿移隂入綺忩聽鼓城頭疊鼓聲城下暮江清欲問漁陽摻時無禰正平憶梅定定住天涯依依向物華寒梅最堪恨長作去年花漫成二首沈約憐何遜延年毁謝莊清新俱有得名譽底相傷霧夕詠芙蕖何郎得意初此時誰最賞沈范兩尚書栁下暗記無奈巴南栁千條傍吹臺更將黃映白擬作杏花媒妓席樂府聞桃葉人前道得無勸君書小字切莫喚官奴風撩叉盤孔雀惱帶拂鴛鴦羅薦誰教近齋時鎖洞房代應昨夜雙鈎敗今朝百草輸關西狂小吏唯喝繞牀盧張亞子廟下馬捧椒漿迎神白玉堂如何鐡如意獨自與姚萇百果嘲櫻桃珠實雖先熟瓊莩縱早開流鶯猶故向爭得諱含來答衆果莫相誚天生名品高何因古樂府唯有鄭櫻桃襪嘗聞宓妃襪渡水欲生塵好借常娥著清秋踏月輪追代盧家人嘲堂內道却橫波字人前莫漫羞只應同楚水長短入淮流天涯春日在天涯天涯日又斜鶯啼如有淚為濕最高花早起風露淡清晨簾間獨起人鶯花啼又笑畢竟是誰春細雨帷飄白玉堂簟卷碧牙牀楚女當時意蕭蕭髮彩涼歌舞遏雲歌響清回雪舞腰輕只要君流盻君傾國自傾房君珊瑚散不見姮娥影清秋守月輪月中間杵臼桂子搗成塵嘲櫻桃朱實鳥含盡青樓人未歸南園無限樹獨自葉如幃自況陶令棄官後仰眠書屋中誰將五斗米擬換北窗風蝶孤蝶小徘徊翩翾粉翅開併應傷皎潔頻近雪中來夜意簾垂幕半卷枕冷被仍香如何為相憶魂夢過瀟湘李夫人二首一帶不結心兩股方安髻慙愧白茅人月沒教星替剩結茱萸枝多擘秋蓮的獨自有波光綵囊盛不得滯雨滯雨長安夜殘燈獨客愁故鄉雲水地歸夢不宜秋微雨初隨林靄動稍共夜涼分忩逼侵燈冷庭虛近水聞高花花將人共笑籬外露繁枝宋玉臨江宅墻低不擬窺嘲桃無賴妖桃面平明露井東春風為開了却擬笑春風餞席重送從叔之梓州莫歎萬重山君還我未還武關猶悵望何況百牢關栁枝五首花房與蜜脾蜂雄蛺蝶雌同時不同類那復更相思木是丁香樹春條結始生玉作彈棊局中心亦不平嘉瓜引蔓長碧玉冰寒漿東陵雖五色不忍值牙香栁枝井上蟠蓮葉浦中乾錦鱗與繡羽水陸有傷殘畫屏繡步障物物自成雙如何湖上望只見是鴛鴦戲贈張郎盧象少婦石榴裙新粧白玉面能迷張公子不許時相見送别王之渙楊栁東門樹青青夾御河近來攀折苦應為别離多登鸛雀樓白日依山盡黃河徹海流欲窮千里目更上一層樓長相思張繼遼陽望河縣白首無由見海上珊瑚枝年年寄春燕感懷調與時人背心將靜者論終年帝城裏不識五侯門挽歌于鵠陰風吹黃蒿挽歌渡秋水車馬却歸城孤墳月眀裏青樓曲干濆青樓臨大道一上一回老所思終不來極目傷春草古歌二首薛維翰美人怨何深含情倚金閣不嚬復不語紅淚雙雙落美人閉紅燭獨坐裁新錦頻放剪刀聲夜寒知未寢送從弟赴上都劉商車騎秦城逺囊裝楚客貧月眀思逺道詩罷訴何人登相國寺閣晴日登臨好春風各望家垂楊夾城路客思逐楊花酬濬上人采藥見寄玉英期共采雲嶺獨先過應得靈芝也詩情一倍多曲水寺枳實枳實繞僧房攀枝置藥囊洞庭山上橘霜落也應黃酬問師虛空無處所髣佛似琉璃詩境何人到禪心又過詩殷秀才求詩傾蓋見芳􅐾晴天瓊樹枝連城猶隱石唯有卞和知行營即事萬姓厭干戈三邊尚未和將軍誇寶劒功在殺人多緑珠怨從來上臺榭不敢倚闌干零落知成血高樓直下看古意達曉寢衣泠開帷霜露凝風吹昨夜淚一片枕前冰哭蕭掄何處哭故人青門水如箭當時水頭别從此不相見水亭裴夷直歲律行將變君恩竟未回門前即潮水朝去暮常來揚州寄諸子千里隔煙波孤舟宿何處遙思耿不眠淮南夜風雨酬盧郎中遊寺見招不遇偶出送山客不知遊梵宫秋光古松下誰伴一仙翁寓言秋樹却逢暖未凋能幾時何須尚松桂搖動暫青枝唁人喪侍兒夜情何耿耿春恨草綿綿唯有常娥月從今照墓田席上夜别張主簿紅燭剪還明緑尊添又滿不愁前路長只畏今宵短方丈泉循涯不知淺見底似非深永日無波浪澄澄照我心晚望日下夕隂長前山凝積翠白鳥一行飛聯聯粉書字前山只謂一蒼翠不知猶數重晚來雲映處更見兩三峯發交州日留題解錬師房久喜房廊接今成道路賖明朝回首處此地是天涯令和州買松好覔凌霜質仍須帶雨栽須知剖竹日便是看松來題斷金集後一覽斷金集再悲埋玉人牙絃千古絶珠淚萬行新長安道鞠信陵朱門映緑楊雙闕抵通莊玉珮聲逾逺紅塵猶自香春懷舊遊雍陶吟想舊經過花時奈逺何别來長自見春夢入關多離京城宿商山作山月吟聲苦春風引思長無由及塵土猶帶杏花香秋館雨夜夜雨空館靜幽人起徘徊長安醉眠客豈知新鴈來聞子規百鳥有啼時子規聲不歇春寒四鄰靜獨叫三更月懷無可上人山寺秋時後僧家夏滿時清涼多古迹幾處有新詩長安客感客淚如危葉長懸零落心況是悲愁日臨風制不禁送客遙望别逺心更苦遙將目送君光華不可見孤鶴沒秋雲傷靡草靡草似客心年年亦先死無由伴花落暫得因風起木槿劉庭琦物情良可見人事不勝悲莫恃朝榮好君看暮落時别輞川王縉山月曉仍在林風涼不絶殷勤如有情惆悵令人别嶺外守歲李福業冬去更籌盡春隨斗柄回寒暄一夜隔客鬢兩年催碧玉歌李暇碧玉上宫妓出入千花林珠被玳瑁牀感郎情意深怨詩三首羅敷初總髻蕙芳正嬌小月落始歸船春眠恆著曉何處期郎遊小苑花臺間相憶不可見且復乘月還别前花照路别後露垂葉歌舞須及時如何坐悲妾訪法通師不遇姚合訪師師不遇禮佛佛無言依舊將煩惱黃昏入宅門石碑荒田一片石文字滿青苔不是逢間客何人肯讀來老馬卧多扶不起唯向主人嘶惆悵東郊道秋來雨不泥鶴雛白毛生未足嶛峭醜於雞每夜穿籠出搗衣砧上栖新菊黃金色未足摘取且新嘗若待重陽日何時異衆香春日遊慈恩寺年長歸何處青山未有家賞春無酒飲多看寺中花白鼻騧為底胡姬酒長來白鼻騧摘蓮拋水上郎意在浮花送薛郎中往婺州我住浙江西君去浙江東日日心來往不畏浙江風和李舍人冬至日獻夀人皆慶南山復北堂從今千萬日此日又初長酬張郎中白髮年來盡滄江歸去遲何當得携手松下靜吟詩别杭州醉與江濤别江濤惜我遊他年昏嫁了終路此江頭秋中夜坐疏散永無事不眠常夜分月中松露滴風引鶴同聞長干曲四首崔皓君家何處住妾住在橫塘停船暫借問或恐是同鄉家臨九江水來去九江側同是長干人生小不相識下渚多風浪蓮舟漸覺稀那能不相待獨自逆潮歸三江潮水急五湖風浪涌由來花性輕莫畏蓮舟重萬首唐人絶句卷十五
