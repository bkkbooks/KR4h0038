body:
  text: 萬首唐人絶句巻二十八宋洪邁編七言覽鏡見白鬚權徳輿秋來皎絜白鬚光試脱朝簪學舞狂一曲酣歌還自樂兒孫嬉笑挽衣裳酬李韶州詔下忽臨山水郡不妨從事恣攀登莫言向北千行鴈别有圖南六月鵬答韋秀才中峯雲暗雨霏霏水漲花塘未得歸心憶瓊枝望不見幾回虚濕薜蘿衣貢院對雪寄崔閣老寓宿春闈歳欲除嚴風密雪絶雙魚思君獨步西垣裏日日含香草詔書寄李衡州片石叢花畫不如芘身三徑豈吾廬主人十騎東方逺唯望衡陽鴈足書戯贈張鍊師月帔飄颻摘杏花相邀洞口勸流霞半酣乍奏雲和曲疑是龜山阿母家贈天竺靈隱二寺主石路泉流兩寺分尋常鐘磬隔山聞山僧半在中峯住共占清猿與白雲贈老將白草黄雲塞上秋曽隨驃騎出并州鹿盧劔折虬鬚白轉戰功多獨不侯酬趙尚書看花見寄二首春光深處曲江西入坐風流信馬蹄鶴髪杏花相映好羨君終日醉如泥杜城韋曲徧尋春處處繁花滿目新日暮歸鞍不相待與君同是醉鄉人戲贈表兄崔秀才何事年年戀隱淪成名須遣及青春明時早獻甘泉去若待公車却設人戲贈蘇九蘇好讀元魯山文或勸入闗者白首書窗成鉅儒不知簪組遍屠沽勸君莫問長安路且讀魯山于蒍無人日送房侍御歸越驛騎歸時騘馬蹄蓮花府映若邪溪帝城人日風光早不惜離堂醉似泥送十九兄歸江東命駕相思不為名春風歸騎出關程離堂莫起臨岐歎文舉終當薦禰衡獻歲送李十兄赴黔中一尊歳酒且留歡三峽黔江去路難志士感恩無逺近異時應戴惠文冠送從弟廣夏雲如火鑠晨輝欵段羸車整素衣知爾業成還出谷今朝莫愴斷行飛埇橋夜宴叙别滿樹鐵冠瓊樹枝尊前燭下心相知明朝又與白雲遠自古河梁多别離送袁太祝衢婺巡覆校緡税畆不妨閒清興自隨魚鳥間知君此去足佳句路出桐溪千萬山揚州與丁山人别將軍易道令威仙華髮清談得此賢惆悵今朝廣陵别遼東後㑹復何年得撫州報喜戴員外無事二首鶴髮州民擁使車人人自説受恩初如今天下無寃氣乞為邦君雪謗書衆人餔啜喜君醒渭水由來不雜涇遮莫雪霜撩亂下松枝竹葉自青青答張工部書來逺自薄寒山繚繞洮河出古關今日難裁秣陵報薤歌寥落栁車還冬至宿齋時郡君南内朝謁因寄清齋獨向丘園拜盛服想君興慶朝明日一陽生百福不辭相望阻寒宵發硤石路上却寄莎栅東行五谷深千峯萬壑雨沈沈細君幾日路經此應見悲翁相望心餘干别張侍御蕪城陌上春風别于越亭邊歳暮逢驅車又愴南北路反照寒江千萬峯别表兄韋卿新讀兵書事護羌腰間寶劔映金章少年百戰應輕别莫笑儒生淚數行和王祭酒太社宿齋不得赴李尚書宅㑹戲元禮門前勞引望句龍壇下阻歡娛此時對局空相憶博進何人更樂輸八月十五日夜瑶臺寺對月嬴女乘鸞已上天仁祠空在鼎湖邉凉風遥夜清秋半一望金波照粉田臘日龍沙㑹簾外寒江千里色林中尊酒七人期寕知臘日龍沙㑹却勝重陽落帽時月夜過靈澈房此身㑹逐白雲去未洗塵纓還自傷今夜幸逢清淨境滿庭秋月對支郎贈廣通上人身隨猿鳥在深山早有詩名到世間客至上方留盥潄龍泓洞水晝潺潺宫人斜一路斜分古驛前隂風切切晦秋煙鉛華新舊共冥寞日暮愁鴟飛野田朝元閣繚垣複道上層霄十月離宫萬國朝邊馬忽來清蹕去空餘臺殿照山椒石甕寺石甕寒泉勝寳井汲人囘挂青絲綆厨煙半逐白雲飛當晝老僧來灌頂舟行夜泊蕭蕭落葉送殘秋寂寞寒波急暝流今夜不知何處泊斷猿晴月引孤舟宿嚴陵身羇從事驅征傳江入新安泛暮濤今夜子陵灘下泊自慙相去九牛毛和陳閣老當直從東省過史館看花寒食假晝漏沈沈倦鎖闈西垣東觀閲芳菲繁花滿樹似留客應為主人休澣歸棲霞寺雲居室一徑縈紆至此窮山僧盥潄白雲中閒吟定後更何事石上松枝常有風題崔山人草堂竹徑茅堂接洞天閒持麈尾潄春泉世人車馬不知處時有歸雲到枕前題桞郎中故居下馬荒堦日欲曛潺潺石溜静中聞鳥啼花落人聲絶寂寞山窗掩白雲藥名詩七澤蘭芳千里春瀟瀟花落石磷磷有時浪白㣲風起坐釣藤隂不見人春日戲題二首簷前曉色驚雙燕戸外春風舞百花粉署可憐閒對此唯令碧玉泛流霞雨歇風輕一院香紅芳緑翠接東墻春衣試出當軒立定被鄰家暗斷腸贈友人知向巫山逢日暮輕袿玉佩暫淹留曉隨雲雨歸何處還是襄王夢覺愁舟行見月月入孤舟夜半晴寥寥雙鴈兩三聲洞房燭影在何處欲寄相思夢不成石楠石楠紅葉透簾春憶得糚成下錦裀試折一枝含萬恨分明説向夢中人斗子灘斗子灘頭夜已深月華偏向此時心春江風水連天闊歸夢悠揚何處尋雜興五首叢鬢愁眉時勢新初笄絶代北方人一顰一笑千金重肯似成都夜失身乍聽絲聲似竹聲又疑丹穴九雛驚金波露洗淨於書寂寞不堪深夜情琥珀尊開月映簾調絃理曲指􅊏纎含羞斂態勸君住更奏新聲刮骨鹽乳燕雙飛鶯亂啼百花如繡照深閨新糚對景如無比微笑時時出瓠犀巫山雲雨洛川神珠襻香腰穩稱身惆悵糚成君不見含情起立問傍人黄蘖館驅車振楫越山川候曉通宵冒煙雨青楓浦上䰟已銷黄蘖館前心自苦清明日次弋陽自歎清明在逺鄉桐花覆水葛溪長家人定是持新火㸃作孤燈照洞房七夕今日雲駢渡鵲橋應非脈脈與迢迢家人競喜開糚鏡月下穿針拜九霄太常寺宿齋有寄轉枕挑燈候曉雞想君應歎太常妻長年多病偏相憶不遣歸時醉似泥朝囘閲樂寄絶句子城風暖百花初樓上龜兹引導車曲罷卿卿理騶馭細君相望意何如中書宿齋有寄銅壺滳漏斗闌干泛灔金波照露盤遥想洞房眠正熟不堪深夜鳳池寒玉臺體嬋娟二八正嬌羞日暮相逢南陌頭試問佳期不肯道落花深處指青樓雲褚載盡日看雲首不囘無心都大似無才可憐光采一片玉萬里晴天何處來鶴欲洗霜翎下澗邊却嫌菱刺汚香泉沙鷗浦鴈應驚訝一舉扶揺直上天長城秦築長城比鐵牢蕃戎不敢過臨洮焉知萬里連雲色不及堯堦三尺髙鷺鷥杜牧亦有霜衣雪髪青玉觜羣捕魚兒溪影中驚飛低映碧山去一樹梨花落晚風弔秦叟市西樓店金千秤渭北田園粟萬鍾兒被殺傷妻被虜一身隨駕到三峯定鼎門郟鄏城髙門倚天九重蹤跡尚依然須知道徳無關鎖一閉乾坤一萬年陳倉驛錦翼花冠安在哉雄飛雌伏盡塵埃一雙童子應惆悵不見眞人更獵來宫怨二首柯宗塵滿金爐不在香黄昏獨自立重廊笙歌何處承恩寵一一隨風入上陽長門槐柳半蕭疎玉輦沈思恨有餘紅淚漸消傾國態黄金誰為達相如長門怨劉言史獨坐爐邊結夜愁暫時恩去亦難留手持金筯埀紅淚亂撥寒灰不舉頭樂府二首花頷紅騣一向偏緑槐香陌欲朝天仍嫌衆裏嬌行疾傍鐙深藏白玉鞭珠噴團香小桂條玉鞭兼賜霍嫖姚弄影便從天禁出碧蹄聲碎五門橋過春秋峽峭壁蒼蒼苔色新無風晴景自勝春不知何樹幽崖裏臘月花開似北人竹裏梅竹與梅花相並枝梅花正發竹枝垂風吹總向竹枝上直似王家雪下時古寺花司空文明共愛芳菲此樹中千跗萬蘂裛枝紅遲遲欲去猶回望覆地無人滿寺風發渝州却寄韋判官紅燭津亭夜見君繁絃急管兩紛紛平明分手空江轉唯有猿聲滿水雲送盧徹之太原榆落鵰飛關塞秋黄雲畫角見并州翩翩羽騎雙旌後上客親隨郭細侯病中嫁女妓萬事傷心在目前一身垂淚對花筵黄金用盡教歌舞留與他人樂少年江村即事罷釣歸來不繫船江村月落正堪眠縱然一夜風吹去只在蘆花淺水邊峽口送友人峽口花飛欲盡春天涯去住淚沾巾來時萬里同為客今日飜成送故人登峴亭峴山回首望秦關南向荆州幾日還今日登臨唯有淚不知風景在何山贈歌人郭婉商堯藩石家金谷舊歌人起唱花筵淚滿巾紅粉少年諸弟子一時怊悵望梁塵漢宫詞三首成帝夫人淚滿懷璧宫相趁落空堦可憐玉貌花前死唯有君恩白燕釵霍家有女字成君年小教人著繡裙枉殺宫中許皇后椒房恩澤是浮雲駿馬金鞍白玉鞭宫中來取李延年承恩直入鴛鴦殿一曲清歌在九天吹笙歌伶兒竹聲愁繞空秦女淚濕燕支紅玉桃花片落不住三十六簧能喚風新昌井轆轤千轉勞筋力待得甘泉渇殺人且共山麋同飲澗玉沙鋪底淺磷磷潭州席上贈舞柘枝妓姑蘇太守青娥女流落長沙舞柘枝滿坐繡衣皆不識可憐紅臉淚雙垂田家效陶曹鄴黒黍春來釀酒飲青禾刈了驅牛載大姑小叔常在眼却笑長安在天外徒相逢江邊野花不須采梁頭野燕不用親西施本是越溪女承恩不薦越溪人寄劉駕一川草色青裊裊遶屋水聲如在家悵望美人不攜手牆東又發數枝花題女郎廟數㸃煙香出廟門女娥飛去影中存年年嶺上春無限露泣花愁斷客魂北郭閒思山前山後是青草盡日出門還掩門每思骨肉在天畔來看野翁憐子孫偶題白玉先生多在市青牛道士不居山但能共得丹田語正是忙時身亦閒出關山上黄犢走避人山下女郎歌滿野我獨南征恨此身更有無成出關者官倉䑕官倉老䑕大如斗見人開倉亦不走健兒無糧百姓饑誰遣朝朝入君口聽劉尊師彈琴曾遊清海獨聞蟬入向空山夜聽泉不似齋堂人靜後秋聲長在七條絃題山居掃葉煎茶摘葉書心閒無夢夜窗虚只應光武恩波晩豈是嚴君戀釣魚送人下第馬嘶殘日没殘霞二月東風便到家莫羨長安占春者明年始見故園花早秋宿田舍澗草踈踈螢火光山月朗朗楓樹長南村犢子夜聲急應是欄邊新有霜題舒鄉功名若及鴟夷子必擬將舟泛洞庭栁色湖光好相待我心非醉亦非醒萬首唐人絶句巻二十八
