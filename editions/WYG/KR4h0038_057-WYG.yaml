  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0038_WYG_057-1a, image: WYG1349/WYG1349-0630c.png}
body:
  text: 萬首唐人絶句巻五十七宋洪邁編七言狂題一十八首司空圖莫恨艱危日日多時情其奈倖門何貔貅睡穏蛟龍渇猶把殘燒朽鐵磨别鶴淒涼指法存戴逵能恥近王門世間第一風流事借得王公玉枕㾗交疎自古戒言深肝膽徒傾致鑠金不是史遷書與説誰知孤負李陵心南華落筆似荒唐若肻經綸亦不狂偶作客星侵帝座却應虚薄是嚴光不勞世路更相猜忍到須休惜得材幾度懶乘風水便抝船折舵恐難回由來相愛只詩僧怪石長松自得朋却怕他生還識字依前月下作孤燈老禪剰仗莫過身逺岫孤雲見亦頻應是佛邊猶怕閙信縁須作且閒人止竟閒人不愛閒只偷無事閉柴闗轟霆攪破蛟龍窟也被狂風巻出山地下修文著作郎生前饑處倒空牆何如神爽騎星去猶自研幾助玉皇雨洗芭蕉葉上詩獨來凭檻晚晴時故園雖恨風荷膩新句閒題亦滿池初時拄杖向鄰村漸到清明亦杜門三十年來辭病表今朝卧病感皇恩來時雖恨失青氊自見芭蕉幾十篇應是阿劉還宿債剰􅂸才思折供錢芭蕉叢畔碧嬋娟免更悠悠擾蜀川應到去時題不盡不勞分寄校書牋自傷衰病漸難平永夜單牀雨滴聲聞道虎瘡仍帶鏃吼來和痛亦横行昨日流鶯今日蟬起來又是夕陽天六龍飛轡長相窘更忍乗危自着鞭有是有非還有慮無心無跡亦無猜不平便激風波險莫向安時稔禍胎十年三署讓官頻認得無才又索身莫道太行同一路大都安穏屬閒人曾聞刼火到蓬壺縮盡鼇頭海亦枯今日家山同此恨人歸未得鶴歸無遊仙二首蛾眉新畵覺嬋娟鬬走將花阿母邉仙曲教成慵不理玉階相簇打金錢劉郎相約事難諧雨㪚雲飛自此乖月姊殷勤留不住碧空遺下水精釵漫書五首長擬求閒未得閒又勞行役出秦闗逢人漸覺鄉音異却恨鶯聲似故山溪邊随事有桑麻盡日山程十數家莫怪行人頻悵望杜鶻不是故鄉花海山昔聞麋愛鶴山中今見鹿憎龜愛憎止竟須闗分莫把㣲才望所知世路快心無好事恩門嘉話合書紳神藏鬼伏能千變亦勝忘機避要津四翁識勢保安閒須為生靈暫出山一種老人能筭度磻溪心跡愧商顔偶詩五首閒韻雖髙不􅃷才偶抛猿鳥乍歸來夕陽照箇新紅葉似要題詩落硯臺芙蓉騷客空留怨芍藥詩家只寄情誰似天才李山甫牡丹屬思亦縱横賢豪出處盡沉吟白日髙懸只照心一掬信陵墳上土便如碣石累千金聲貌由來固絶倫今朝共許占殘春當歌莫怪頻垂淚得地飜慚早失身中宵茶鼎沸時驚正是寒窻竹雪明甘得寂寥能到老一生心地亦應平雜題二首先知左袒始同行須待龍樓羽翼成若使只慿三傑力猶應漢鼎一毫輕魚在枯池鳥在林四時無奈雪霜侵若教激勸田真宰亦奨青松徑寸心光化踏青有感引得車回莫認恩却成寂寞與誰論到頭不是君王意羞挿垂楊更傍門丑年冬醉日昔聞都下酒何如今喜折新茶不堪病渇仍多慮好向㴩湖便出家白菊三首人間萬恨已難平栽得垂楊更繫情猶喜閏前霜未下菊邊依舊舞身輕莫惜西風又起來猶能婀娜傍池臺不辭暫被霜寒挫舞袖招香即却回為報繁霜且莫催窮秋須到自低垂横拖長袖招人别只待春風却舞來扇珍重逢秋莫棄捐依依只仰故人憐有時池上遮殘日承得霜林幾箇蟬修史亭三首山前鄰臾去紛紛獨强衰羸愛杜門漸覺一家㸔冷落地爐生火自温存甘心七十且酣歌自筭平生幸已多不似香山白居士晚將心地着禪魔烏紗巾上是青天檢束酬知四十年誰料平生擘鷹手挑燈自送佛前錢力疾山下吳村㸔杏花十九首春來漸覺一川明馬上繁花作陣迎掉臂只將詩酒敵不勞金鼓助横行閶闔曾排捧御爐猶㸔曉月認金鋪羸形不畵凌煙閣只為㣲才激壯圖鏡留雪鬢暖消無春到梨花日又晡移取扶桑堦下種年年㸔長礙金烏折來未盡不須休年少争來莫與留更願狂風知我意一時吹向海西頭才情百巧鬬風光却笑雕花刻葉忙熨帖新巾來與褁猶㸔騰踏少年塲浮世榮枯總不知且憂花陣被風欺儂家自有麒麟閣第一功名只賞詩白衫裁袖本教寛朱紫由來亦一般王老小兒吹笛㸔我儂試舞爾儂㸔單牀薄被又覉棲待到花開亦甚迷若道折多還有罪只應鸎囀是金雞近來桃李半燒枯歸卧鄉園只老夫莫筭明年人在否不知花得更開無漢王何事損精神花滿深宫不見春穠艶三千臨粉鏡獨悲掩面李夫人能艶能芳自一家勝鸞勝鳳勝煙霞客來須共醒醒㸔碾盡明昌幾角茶造化無端欲自神裁紅剪翠為新春不如分減閒心力更助英豪濟活人裴佪自勸莫沾纓分付年年谷口鶯却頼無情容易别有情早箇不勝情閒歩偏宜舞袖迎春光何事獨無情垂楊合是詩家物只向敷溪道北生亦知王大是昌齡杜二其如律韻情還有酸寒堪笑處擬誇朱紱更崢嶸潘郎愛説是詩家枉占河陽一縣花千載幾人搜警句補方金字愛情霞行樂溪邊步轉遲出山漸減探花期去今四度今三度恐到慿人折去時此身衰病轉堪嗟長忍春寒獨惜花更恨新詩無紙寫蜀牋堆積是誰家昨日黄昏始㸔回夢中相約又啣杯起來聞道風飄却猶擬教人掃取來少儀昨日登班綴柏臺更慚起草屬㣲才錦窠不是尋常錦兼向丘遲奪得來重陽四首簷前減燕菊添芳燕盡庭前菊又荒老大比他年少少每逢佳節更悲涼雨寒莫待菊花催須怕晴空暖併開開却一枝開却盡且随幽蝶更裴佪青娥懶唱無衣換黄菊新開乞酒難長有長亭惆悵事隔河更得對慿欄白髪怕寒梳更懶黄花晴日照初開籬頭應是蝶相報已被鄰家擕酒來長命縷他鄉處處堪悲事殘照依依惜别天此去知名長命縷殷勤為我唱花前柏東𡨕得機心豈在僧柏東閒歩愛騰騰免教世路人相忌逢着村醪亦不憎歌者十二首追逐飜嫌傍管弦金釵擊節自當筵風霜一夜燕鴻斷唱作江南袚褉天玉樹花飄鳳失棲一聲初壓管弦低清回煩暑成瀟灑艶逐寒雲變慘悽十斛明珠亦易拚欲兼人藝古來難五雲合是新聲染鎔作瓊漿灑露盤不似新聲唱亦新旋調玉管旋生春愁腸隔㫁珠簾外只為今宵共聴人十年逃難别雲林暫輟狂歌却聴琴轉覺淡交言有味此聲知是古人心五栁先生自識㣲無絃共笑手空揮胷中免被風波撓肎為螗螂動殺機風霜寒水旅人心幾處笙歌繡户深分泊一塲雲散後未勝初夜便聴琴自憐眼暗難求藥莫恨花繁便有風桃李更開須强㸔明年兼恐聴歌聾白雲深處寄生涯嵗暮生情頼此花蜂蝶繞來忙繞袖似知教折送隣家重九仍重嵗漸闌强開病眼更登攀年年認得酣歌處猶恐招魂塟故山繞壁依稀認寫真更須粉繪飾羸身淒涼不道身無夀九日還無舊㑹人鶴􅌁花香撘槿籬枕前蛩迸酒醒時夕陽似照陶家菊黄蝶無窮壓故枝題裴晉公華嶽廟題名岳前大隊赴淮西從此中原息皷鼙石闕莫教苔蘚上分明認取晉公題楊栁枝夀盃詞十八首樂府飜來占太平風光無處不含情千門萬户喧歌吹富貴人間只此聲撼晚梳空不自持與君同折上樓時春風還有常情處繫得人心免别離灞亭東去徹隋堤贈别何須醉似泥萬里徃來無一事便帆輕拂亂鶯啼臺城細仗曉初移詔賜千官褉飲時緑帳逺籠清珮響更曛晴日上龍旗桃源仙子不須誇聞道惟栽一片花何似浣紗溪畔住緑隂相間兩三家偶然樓上捲珠簾徃徃長條拂枕函恰值小娥初學舞擬偷金縷押春衫池邊影動散鴛鴦更引㣲風亂繡牀直待玉窻塵不起始應金鴈得成行稻畦分影向江村憔悴經霜只半存昨日流鶯今不見亂螢飛出照黄昏客淚休沾漢水濱舞腰羞殺漢宫人狂風更與回煙箒掃盡繁花獨占春遊人莫歎易凋衰長樂榮枯自有期㸔取明年春意動更於何處最先知昔年行樂及芳時一上丹梯桂一枝笑問江頭醉公子饒君滿把麹塵絲渡頭殘照一行新獨自依依向北人莫恨故鄉千里逺眼中從此故鄉春絮惹輕枝雪未飄小溪煙束帶危橋鄰家女伴頻攀折不覺回身罥翠翹處處榮空百萬枝一枝枝好更題詩隔城逺岫招行客便與朱樓當酒旗錦城分得映金溝兩岸年年引勝遊若似松篁須帶雪人間何處認風流日暖津頭絮已飛㸔㸔還是送春歸莫言萬緒牽愁思緝取長繩繫落暉大堤時節近清明霞襯煙籠遶郡城好是梨花相映處更勝松雪日初晴聖主千年樂未央御溝金翠滿垂楊年年織作昇平字髙映南山獻夀觴山鵲多驚本為好毛衣只頼人憐始却歸衆鳥自知顔色減妬他偏向眼前飛李居士髙居只在五峰前應是精靈降作賢萬里無雲惟一鶴鄉中同㸔却昇天靈一作星萬首唐人絶句巻五十七
