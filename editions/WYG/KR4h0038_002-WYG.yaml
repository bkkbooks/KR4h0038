body:
  text: 萬首唐人絶句巻二宋洪邁編七言結襪子李白燕南壯士吳門豪筑中置鉛魚隠刀感君恩重許君命太山一擲輕鴻毛巴陵贈賈舍人賈生西望憶京華湘浦南遷莫怨嗟聖主恩深漢文帝憐君不遣到長沙送賀賔客歸越鏡湖流水漾清波狂客歸舟逸興多山隂道士如相見應冩黄庭換白鵝送韓侍御之廣徳令昔日繡衣何足榮今宵貰酒與君傾暫就東山賖月色酣歌一夜送泉明送外甥鄭灌從軍三首六博争雄好彩來金盤一擲萬人開丈夫賭命報天子當斬仇讎衣錦回丈八蛇矛出隴西彎弧拂箭白猿啼運籌必用龍韜䇿積甲應將熊耳齊月蝕西方破敵時及𤓰歸日未應遲麾旄血變黄河水梟首當懸白鵲旗長門怨桂殿長愁不記春黄金四屋起秋塵夜懸明鏡青天上獨照長門宫裏人酬崔侍御嚴陵不從萬乘遊歸卧空山釣碧流自是客星辭帝坐元非太白醉揚州崔詩云天外常求太白老金陵捉得酒仙人送孟君之廣陵故人西辭黄鶴樓煙花三月下揚州孤帆逺影碧山盡唯見長江天際流春夜洛城聞笛誰家玉笛暗飛聲散入春風滿洛城此夜曲中聞折栁何人不起故園情峨眉山月歌峨眉山月半輪秋影入平羌江水流夜發青溪向三峽思君不見下渝州永王東巡歌十一首永王正月東出師天子遥分龍虎旗樓船一舉風波静江漢翻為鴈鶩池三川北寇亂如麻四海南奔似永嘉但用東山謝安石為君談笑静胡沙雷鼓嘈嘈喧武昌雲旗獵獵過潯陽秋毫不犯三吳恱春日遥看五色光龍盤虎踞帝王州帝子金陵訪古丘春風試暖昭陽殿明月還過鳷鵲樓二帝巡遊俱未回五陵松栢使人哀諸侯不救河南地更喜賢王逺道來丹陽北固是吳關畫出樓臺雲水間千巖烽火連滄海南望旌旗繞碧山王出三江按五湖樓船跨海次揚都戰艦森森羅虎士征帆一一引龍駒長風挂席勢難回海動山傾古月摧君看帝子浮江日何似龍驤出峽來祖龍浮海不成橋漢武潯陽空射蛟我王樓艦輕秦漢却似文皇欲渡遼帝寵賢王入楚關掃清江漢始應還初從雲夢開朱邸更取金陵作小山試借君王玉馬鞭指麾戎寇坐瓊筵南風一掃邊塵静西入長安到日邉横江詞五首海潮南去過潯陽牛渚由來險馬當横江欲渡風波惡一水牽愁萬里長横江西望阻西秦漢水東連揚子津白浪如山那可渡狂風愁殺峭帆人海神東過惡風回浪打天門石壁開浙江八月何如此濤似連山噴雪來横江館前津吏迎向余東指海雲生郎今欲渡縁何事如此風波不可行月暈天風霧不開海鯨東蹙百川回驚波一起三山動公無渡河歸去來上皇西巡南京歌十首邊塵輕拂建章臺聖主西巡蜀道來劍壁門髙五千尺石為樓閣九天開九天開出一成都萬戸千門入畫圖草樹雲山如錦繡秦川得及此間無徳陽春樹似新豐行入新都若舊宫栁色未饒秦地緑花光不減上林紅誰道君王行路難六龍西幸萬人歡地轉錦江成渭水天回玉壘作長安萬國同風共一時錦江何謝曲江池石鏡更明天上月後宫親得照蛾眉濯錦清江萬里流雲帆龍舸下揚州北地雖誇上林苑南京還有散花樓錦水東流繞錦城星橋北挂象天星四海此中朝聖主峨眉山上列仙庭秦開蜀道置金牛漢水元通星漢流天子一行遺聖跡錦城長作帝王州水渌天青不起塵風光和暖勝三秦萬國煙花隨玉輦西來添作錦江春劍閣重關蜀北門上皇歸馬若雲屯少帝長安開紫極雙懸日月照乾坤與史郎中飲聽黄鶴樓上吹笛一為遷客去長沙西望長安不見家黄鶴樓中吹玉笛江城五月落梅花望廬山瀑布水日照香爐生紫煙遥看瀑布挂長川飛流直下三千尺疑是銀河落九天白帝下江陵朝辭白帝彩雲間千里江陵一日還兩岸猿聲啼不盡須㬰過却萬重山巫山枕障巫山枕障盡髙丘白帝城邊樹色秋朝雲夜入無行處巴水横天更不流吳王舞人半醉風動荷花水殿香姑蘇臺上宴吳王西施醉舞嬌無力笑倚東窻白玉牀望廬山五老峰廬山東南五老峰青天削出金芙蓉九江秀色可攬結吾將此地巢雲松宣城見杜鵑花蜀國曾聞子規鳥宣城還見杜鵑花一叫一回腸一斷三春三月憶三巴哭晁卿日本晁卿辭帝都征帆一片遶蓬壺明月不歸沈碧海白雲愁色滿蒼梧秋下荆門霜落荆門秋樹空布帆無恙挂秋風此行不為鱸魚鱠自愛名山入剡中魯東門泛舟二首日落沙門天倒開波揺石動水縈回輕舟泛月尋溪轉疑是山隂雪後來水作青龍盤石堤桃花夾岸魯門西若教月下乗舟去何啻風流到剡溪廬江主人婦孔雀東飛何處栖廬江小吏仲卿妻為客裁縫君自見城烏獨宿夜空啼陪族叔刑部侍郎曄及中書賈舍人至遊洞庭五首洞庭西望楚江分水盡南天不見雲日落長沙秋色逺不知何處弔湘君南湖秋水夜無煙耐可乗流直上天且就洞庭賖月色將船買酒白雲邊洛陽才子謫湘川元禮同舟月下仙記得長安還欲笑不知何處是西天洞庭湖西秋月輝瀟湘江北早鴻飛醉客滿船歌白紵不知霜露入秋衣帝子瀟湘去不還空餘秋草洞庭間淡掃明湖開玉鏡丹青畫出是君山望天門山天門中斷楚江開碧水東流直北回兩岸青山相對出孤帆一片日邉來與謝良輔遊涇川陵巖寺乗君素舸泛涇西宛似雲門對若溪且從康樂尋山水何必東流入㑹稽山中問荅問余何意棲碧山笑而不荅心自閒桃花流水窅然去别有天地非人間魯國見狄博通去年别我向何處有人傳道遊江東謂言挂席渡滄海却來應是無長風山中與幽人對酌兩人對酌山花開一盃一盃復一盃我醉欲眠卿且去明朝有意抱琴來長門怨天回北斗挂西樓金屋無人螢火流月光欲到長門殿别作深宫一段愁春怨情白馬金羈遼海東羅帷繡被卧春風落月低軒窺燭盡飛花入戸笑牀空南流夜郎寄内夜郎天外怨離居明月樓中音信踈北鴈春歸看欲盡南來不得豫章書陌上贈美人駿馬驕行踏落花垂鞭直拂五雲車美人一笑褰珠箔遥指紅樓是妾家别内三首王命三徴去未還明朝離别出呉關白玉髙樓看不見相思須上望夫山出門妻子强牽衣問我西行幾日歸來時儻佩黄金印莫見蘇秦不下機翡翠為樓金作梯誰人獨宿倚門啼夜坐寒燈連曉月行行淚盡楚關西雨中贈仙人山賈山人栁宗元寒江夜雨聲潺潺曉雲遮盡仙人山遥知𤣥豹在深處下笑羈絆泥塗間夏晝偶作南州溽暑醉如酒隱几熟眠開北牖日午獨覺無餘聲山童隔竹敲茶臼雨晴後至江渡江雨初晴思遠步日西獨向愚溪渡渡頭水落村逕成撩亂浮槎在髙樹與初上人海畔尖山似劒鋩秋來處處割愁腸若為化得身千億散上峰頭望故鄉詔追赴都每憶纎鱗遊尺澤翻愁弱羽上丹霄岸旁古堠應無數次第行看别路遥過衡山故國名園乆别離今朝楚樹發南枝晴天歸路好相逐正是峰前回鴈時汨羅南來不作楚臣悲重入修門自有期為報春風汨羅道莫將波浪枉明時離觴不醉至驛却寄相送諸公無限居人送獨醒可憐寂寞到長亭荆州不遇髙陽侣一夜春寒滿下㕔清水驛簷下踈篁十二莖襄陽從事寄幽情秖應更使伶倫見冩盡雌雄雙鳯鳴詔追赴都十一年前南渡客四千里外北歸人詔書許逐陽和至驛路開花處處新李西川逺師騶忌鼓鳴琴去和南風愜舜心從此他山千古重殷勤曾是奉徽音奉酬楊侍郎貞一來時送綵牋一行歸鴈慰驚弦翰林寂寞誰為主鳴鳯應須早上天栁州二月宦情羈思共悽悽春半如秋意轉迷山城過雨百花盡榕葉滿庭鸎亂啼初上人珠樹玲瓏隔翠微病來方外事多違仙山不屬分符客一任凌空錫杖飛殷賢戲批書後寄劉連州并示孟崙二童書成欲寄庾安西紙背應勞手自題聞道近來諸子弟臨池尋已猒家雞銅魚使行盡關山萬里餘到時閭井是荒墟附庸唯有銅魚使此後無因寄逺書韓漳州書報徹上人亡二絶早嵗經華聽越吟聞君江海分逾深他時若冩蘭亭㑹莫畫髙僧支遁林頻把瓊書出䄂中獨吟遺句立秋風桂江日夜流千里揮淚何時到甬東酬夢得日日臨池弄小鶵還思冩論付官奴栁家新様元和脚且盡薑芽歛手徒重贈二首聞說將雛向墨池劉家還有異同詞如今試遣隈牆問已道世人那得知世上悠悠不識真薑芽盡是捧心人若道栁家無子弟徃年何事乞西賔疊前小學新翻墨沼波羡君瓊樹散枝柯在家弄玉唯嬌女空覺庭前鳥跡多疊後事業無成恥藝成南宫起草舊連名勸君火急添功用趂取當時二妙聲聞徹上人亡寄楊侍郎東越髙僧還姓湯幾時瓊珮觸鳴璫空花一散不知處誰采金英與侍郎段九秀才處見吕衡州書迹交侣平生意最親衡陽往事似分身䄂中忽見三行字拭淚相看是故人重别二十年來萬事同今朝歧路忽西東皇㤙若許歸田去晚嵗當為鄰舍翁荅夢得弱冠同懐長者憂臨歧回想盡悠悠耦耕若便遺身世黄髪相看萬事休種木槲花上苑年年占物華飄零今日在天涯只應長作龍城守剰種庭前木槲花摘櫻桃海上朱櫻贈所思樓居況是望仙時蓬萊羽客如相訪不是偷桃一小兒酬曹侍御破額山前碧玉流騷人遥駐木蘭舟春風無限瀟湘意欲採蘋花不自由始見白髪題所種石榴幾年封植愛芳叢韶艷朱顔競不同從此休論上春事看成古木對衰翁聞籍田天田不日降皇輿留滯長沙嵗又除宣室無由問釐事周南何處託成書栁州寄京中親故林邑山聫瘴海秋䍧牱水向郡前流勞君逺問龍城地正北三千到錦州萬首唐人絶句巻二欽定四庫全書萬首唐人絶句巻二宋洪邁編五言莎柵聨句韓愈冰溪時咽絶風櫪方軒舉此處不斷腸定知無斷處和虢州劉給事使君三堂二十一詠新亭湖上新亭好公來日出初水文浮枕簟瓦影䕃龜魚流水汨汨幾時休從春復到秋秪言池未滿池滿強交流竹洞竹洞何年有公初斫竹開洞門無鎻鑰俗客不曾來月臺南館城隂闊東湖水氣多直須臺上看始奈月明何渚亭自有人知處那無歩往蹤莫教安四壁面面看芙蓉竹溪藹藹溪流漫梢梢岸篠長穿沙碧簳浄落水紫苞香北湖聞說遊湖棹尋常到此回應留醒心處凖擬醉時來花島蜂蝶去紛紛香風隔岸聞欲知花島處水上覔紅雲栁溪桞樹誰人種行行夾岸高莫將條繫䌫著處有蟬號西山新月迎宵掛晴雲到晚留為遮西望眼終是懶迴頭竹逕無塵從不掃有鳥莫令彈若要添風月應除數百竿荷池風雨秋池上高荷葢水繁未諳鳴摵摵那似巻翻翻稻畦卦布畦堪數枝分水莫尋魚肥知己秀鶴沒覺初深栁巷桞巷還飛絮春餘㡬許時吏人休報事公作送春詩花源源上花初發公應日日來丁寧紅與紫切勿一時開北樓郡樓乘曉上盡日不能回晚色將秋至長風送月來鏡潭非鑄復非鎔泓澄忽此逢魚鰕不用避秪是照蛟龍孤嶼朝遊孤嶼南暮戱孤嶼北所以孤嶼鳥與公盡相識方橋非閣復非船可居兼可過君欲問方橋方橋如此作梯橋乍似上青㝠初疑躡菡蓞自無飛仙骨欲度何由敢月池寒池月下明新月池邊曲若不妬清妍却成相映燭把酒擾擾馳名者誰能一日閒我來無伴侣把酒對南山嘲少年直把春償酒都將命乞花秪知閒信馬不覺誤隨車酬馬侍郎寄酒一壺情所寄四句意能多秋到無詩酒其如月色何次峽石數日方離雪今朝又出山試慿高處望隐約見潼關入黄溪聞猿栁宗元溪路千里曲哀猿何處鳴孤臣淚已盡虛作斷腸聲江雪千山鳥飛絶萬徑人蹤滅孤舟簑笠翁獨釣寒江雪春懐故園九鳸鳴已晚楚鄉農事春悠悠故池水空待灌園人再上湘江好在湘江水今朝又上來不知從此去更遣幾年回長沙驛海鶴一為别存亡三十秋今來數行淚獨上驛南樓桂州北望幽徑為誰開羙人城北來王程倘餘暇一上子陵臺登桞州峨山荒山秋日午獨上意悠悠如何望鄉處西北是融州三贈劉員外信書成自誤經事漸知非今日臨岐别何年待汝歸荅年方伯玉早恨比四愁多㑹待休車騎相隨出罻羅零陵早春問春從此去幾日到秦原慿寄還鄉夢殷勤入故園寓興二首劉禹錫常談即至理安事非常情寄語何平叔無為輕老生世途多禮數鵬鷃各逍遥何事陶彭澤抛官為折腰古調軒后初冠冕前旒為蔽明安知從複道然後見人情經檀道濟故壘萬里長城壊荒營野草秋秣陵多士女猶唱白符鳩君山懐古屬車八十一此地阻長風千載威靈盡赭山寒水中敬酬㣲公見寄二首淒涼沃洲僧顦顇柴桑宰别來二十年唯餘兩心在越江千里鏡越嶺四時雪中有逍遥人夜深觀水月戲和吕八郡内書懐文苑振金聲循良冠百城不知今史氏何處列君名詠史二首驃騎非無勢少卿終不去世道劇頽波我心如砥柱賈生明王道衛綰工車戱同遇漢文時何人居貴位庭竹露滌鉛粉節風揺青玉枝依依似君子無地不相宜甘棠館二首公館似仙家池清竹徑斜山禽忽驚起衝落半嵓花門前洛陽道門裏桃源路塵土與煙霞其間十餘歩飲酒看牡丹今日花前飲甘心醉數杯但愁花有語不為老人開紀南歌風煙紀南城塵土荆南路天寒多獵騎走上樊姬墓荆州歌二首渚宫楊桞暗麥城朝雉飛可憐踏青伴乘暖著輕衣今日好南風商旅相催發沙頭檣竿上始見春江闊視刀環歌常恨言語淺不如人意深今朝兩相視脉脉萬重心三閣詞四首貴人三閣上日晏未梳頭不應有恨事嬌甚却成愁珠箔曲瓊鉤子細見揚州北兵那得度浪語判悠悠沉香帖閣柱金縷畫門楣囘首䧏幡下已見黍離離三人出眢井一身登檻車朱門漫臨水不可見鱸魚淮隂行五首簇簇淮隂市竹樓縁岸上好日起檣竿烏飛驚五兩今日轉舩頭金烏指西北煙波與春草千里同一色舩頭大銅鐶摩挲光陳陳早早使風來沙頭一眼認何物令儂羡羡郎船尾燕衘泥趂檣竿宿食長相見隔浦望行船頭昻尾幰幰無奈晚菜時清淮春浪軟渾侍中宅牡丹徑尺千餘朶人間有此花今朝見顔色更不向諸家秋風引何處秋風至蕭蕭送鴈羣朝來入庭樹孤客最先聞桞花詞三首開從緑條上散逐香風逺故取花落時悠揚占春晚輕飛不假風輕落不委地撩亂舞晴空發人無限思晴天黯黯雪來送青春暮無意似多情千家萬家去路傍曲南山宿雨晴春入鳯凰城處處聞絃管無非送酒聲紇那曲詞二首楊栁欝青青竹枝無限情周即一回顧聽唱紇那聲踏曲興無窮調同詞不同願郎千萬壽長作主人翁傷段右丞江海多豪氣朝廷有直聲何言馬蹄下一旦是佳城傷獨孤舎人昔别一年少今悲䘮國華逺來同社燕不見早梅花傷龎京兆京兆歸何處章臺空暮塵可憐鸞鏡下哭殺畫眉人鄂渚留别李表臣高檣起行色促柱動離聲欲問江深淺應如逺别情荅表臣贈别二首昔為瑤池侣飛舞集蓬萊今作江漢别風雪一裵回嘶馬立未還行舟路將轉江頭暝色深揮袖依稀見始發鄂渚寄表臣二首祖帳管絃絶客帆西風生回車已不見猶聽馬嘶聲曉發栁林戍遥城聞五鼓憶與故人眠此時猶晤語出鄂州界懐表臣二首離席一揮桮别愁今尚醉遲遲有情處却恨江帆駛夢覺疑連榻舟行忽千里不見黄鶴樓寒沙雪相似和游房公舊竹亭聞琴尚有竹間路永無綦下塵一聞流水曲重憶餐霞人和西川李尚書知與元武昌有舊逺示二篇來詩云元公令陳從事求蜀琴將以為寄而訃聞因陳生㑹葬如何贈琴日已是絶絃時無復雙金報空餘掛劔悲寳匣從此閉朱絃誰復調秪應隨玉樹同向土中銷别蘇州二首三載為吳郡臨岐祖帳開雖非謝桀黠且為一裵回流水閶門外秋風吹桞條從來送客去今日自魂銷罷和州游建康秋水清無力寒山暮多思官閒不計程徧上南朝寺九日登高世路山河險君門煙霧深年年上高處未省不傷心歸信吟孟郊淚墨灑為書將寄萬里親書去魂亦去兀然空一身古怨試妾與君淚兩處滴池水看取芙蓉花今年為誰死閨怨妾恨比斑竹下盤煩寃根有笋未出土中已含淚痕古意河邊織女星河畔牽牛郎未得渡清淺相對遥相望樂府蓮子不可得荷花生水中猶勝道傍桞無事蕩春風再下第一夕九起嗟夢短不到家兩度長安陌空將淚見花渭上思歸獨訪千里信逈臨千里河家在吳楚鄉淚寄東南波朔方邀花伴邊地春不足十里見一花及時須遨遊日暮饒風沙看花獨遊終難醉挈榼徒經過閒花不觧語勸得酒無多過彭澤揚帆過彭澤舟人訝歎息不見種桞人霜風空寂歴旅行楚水結冰薄楚雲為雪㣲野梅參差發旅榜逍遥歸送柳淳青山臨黄河下有長安道世上名利人相逢不知老萬首唐人絶句巻二
