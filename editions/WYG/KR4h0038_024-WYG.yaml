body:
  text: 萬首唐人絶句巻二十四宋洪邁編七言寄桐江隠者許渾潮去潮来洲渚春山花如繡草如茵嚴陵臺下桐江水解釣鱸魚有㡬人送曽主簿歸楚州省覲予亦明日歸姑熟帆轉清淮極鳥飛落帆應換老萊衣河亭未醉先惆悵明日還從此路歸重別淚沿紅粉濕羅巾重繫蘭舟勸酒頻留却一枝河畔柳明朝猶有逺行人湖上髣髴欲當三五夕萬蟬清雜亂泉紋釣魚船上一樽酒月出渡頭零落雲夜泊永樂驛蓮渚愁紅蕩碧波吳娃齊唱採蓮歌横塘一別已千里蘆葦蕭蕭風雨多宿水閣野客從來不解愁等閒乘月海西頭未知南陌誰家子夜半吹笙入水樓謝亭送別勞歌一曲解行舟紅葉青山水急流日暮酒醒人已逺滿天風雨下西樓酬李當知有瑤華手自開巴人虚唱懶封回山隂一夜滿溪雪借問扁舟来不來蟬噪柳鳴槐晚未休不知何事愛悲秋朱門大有長吟處剛被愁人又送愁夜過松江寄友清露白雲明月天與君齊棹木蘭船南湖風雨一相失夜泊横塘心渺然守風淮隂遙見江隂夜漁客因思京口釣魚時一潭明月萬株柳自去自来人不知亡題商嶺採芝尋四老紫陽收术訪三茅欲求不死長生訣骨裏無仙不肯教送楊發東歸紅花半落燕于飛同客長安今獨歸一紙鄉書報兄弟還家羞著別時衣寄宋邧朱檻煙霜夜坐勞美人南國舊同袍山長水逺無消息瑤瑟一彈秋月髙題四老廟二首峩峩商嶺采芝人雪頂霜髯虎豹茵山酒一巵歌一曲漢家天子忌功臣避秦安漢出藍闗松桂花隂滿舊山自是無人有歸意白雲常在水潺潺夏日寄江上親友雨過前山日未斜清蟬嘒嘒落槐花車輪南北已無限江上故人纔到家下第懐友人獨掩衡門花盛時一封書信緩歸期南宗更有瀟湘客夜夜月明聞竹枝客有卜居不遂薄遊汧隴者海燕西飛白日斜天門遙望五侯家樓臺深鎖無人到落盡春風第一花陳宫怨二首風暖江城白日遲昔人遺事後人悲草生宫闕國無主玉樹後庭花為誰地雄山險水悠悠不信隋兵到石頭玉樹後庭花一曲與君同上景陽樓題段太尉廟静想追兵緩翠華古碑荒廟閉松花紀生不向榮陽死争有山河屬漢家經秦皇墓龍盤虎踞樹層層勢入浮雲亦是崩一種青山秋草裏路人唯拜漢文陵游楞伽寺碧煙秋寺泛潮来水浸城根古堞摧盡日傷心人不見石榴花滿舊琴臺緱山廟王子求仙月滿臺玉簫清轉鶴徘徊曲終飛去不知處山下碧桃春自開送薛先輩入闗一巵春酒送離歌花落敬亭芳草多欲問歸期已深醉只應孤夢繞闗河過鴻溝相持未定各為君秦政山河此地分力盡烏江千載後古溝芳草起寒雲韓信廟朝言雲夢暮南巡已為功名少退身盡握兵權猶不得更將心計托何人過湘妃廟古木蒼山掩翠娥月明南浦起微波九疑望斷幾千載斑竹淚痕今更多寄敬上人萬山秋雨水縈回紅葉多從紫閣來雲冷竹齋禪衲薄已應飛錫過天台秋思琪樹西風枕簟秋楚雲湘水憶同遊髙歌一曲掩明鏡昨日少年今白頭送宋處士歸山賣藥修琴歸去遲山風吹盡桂花枝世間甲子須㬰事逢著仙人莫看棋聴琵琶欲寫明妃萬里情紫槽紅撥夜丁丁邊沙望盡漢宫逺月落天山聞一聲秦樓曲秦女夢餘仙路遙月窻風簟夜迢迢潘郎翠鳳雙飛去三十六宫聞玉簫題旌儒廟寒栢隂風萬古悲儒冠相枕死秦時廟前亦有商山路不學老翁歌紫芝覽故人題僧院詩髙閣清吟寄逺公四時雲月一篇中今来借問獨何處日暮槿花零落風楚宫怨二首十二山晴花盡開楚宫雙闕對陽臺細腰爭舞君沈醉白日秦兵天上來獵騎秋來在内稀渚宫雲雨濕龍衣騰騰戰鼔動城闕江畔射麋猶未歸聽唱山鷓鴣金谷歌傳第一流鷓鴣清怨碧煙愁夜來省得曽聞處萬里月明湘水秋晨起西樓留情深處駐横波歛翠凝紅一曲歌明月下樓人未散共愁三徑是天河酬盧端公藍口阻風又攜刀筆泛膺舟藍口風髙桂檝留還似郢中歌一曲夜來春雪照西樓贈何處士東別茅峰北去秦梅仙書裏説真人白頭主印青山下雖遇唐生不敢親鷺鷥西風澹澹水悠悠雪㸃絲飄帶雨愁何限歸心倚前閣緑蒲紅蓼練塘秋學仙二首漢武迎仙紫禁秋玉笙瑤瑟似崑丘年年望斷無消息空閉重城十二樓心期仙訣意無窮采畫雲車起夀宫聞有三山未知處茂陵松栢滿西風酬韋侍御桂楫美人歌木蘭西風嫋嫋露漙漙夜長曲盡意不盡月在清湘洲渚寒紫藤緑蔓穠隂紫袖低客來留坐小堂西醉中掩瑟無人㑹家近江南罨畫溪宿咸宜觀羽袖飄飄香夜風翠幢歸殿玉壇空步虚聲盡天未曉雲壓桃花月滿空金谷園三惑沈身是此園古藤荒草野禽喧二十四友一朝盡愛妾墜樓何足言送崔珦入朝書劒功遲白髮新强登蕭寺送歸秦月斜松桂倚髙閣明夜江南江北人遇劉五李頎洛陽一別梨花新黄鳥飛飛逢故人攜手當年共為樂無驚蕙草惜殘春白花原白花原頭望京師黄河流水無已時秋天曠野人行絶馬首西来知是誰失題紫極殿前朝伏奏龍花㑹裏日相望别離嵗嵗如流水誰辨他鄉與故鄉寄韓鵬為政心閒物自閒朝看飛鳥暮飛還寄書河上神明宰羨爾城頭姑射山送崔嬰赴漢陽中外相連弟與兄新加小縣子男名年纔三十佩銅印知爾弦歌漢水清野老曝背百嵗老翁不種田惟知曝背樂殘年有時捫虱獨搔首目送歸鴻籬下眠上元夜崔液玉漏銅壺且莫催鐵闗金鎖徹明開誰家見月能閒坐何處聞燈不看來其二神燈佛火百輪張刻像圖形七寳裝影裏如開金石説空中似散玉毫光使院小池賈島小池誰見鑿時初走水南來十里餘樓上日斜吹暮角院中人出鎖游魚夜坐蟋蟀漸多秋不淺蟾蜍已没夜應深三更兩鬢㡬枝雪一念雙峰四祖心送别門外便伸千里別無車不得到河梁髙樓直上百餘尺今日為君南望長聞蟬感懐新蟬忽發最髙枝不覺立聴無限時正遇友人來告別一聲分作兩般悲夏雨宿寺詩成一夜月中題便卧松風到曉雞帶月時聞山鳥語郡城知近武陵溪送于總持歸京出家初𨽻何方寺上國西明御水東却見舊房階下樹別來二十一春風池上鶴月中時呌葉紛紛不異洞庭霜夜聞翎羽從今如罷翦猶能飛起向孤雲友人婚催粧不知今夕是何夕催促陽臺近鏡臺誰道芙蓉水中種青銅鏡裏一枝開和韓吏部泛南溪溪裏晚從池岸出石泉秋急夜深聞木蘭船共山人上月映渡頭零落雲酬姚合黍穗豆苗侵古道晴原午後早秋時故人相憶僧來説楊柳無風蟬滿枝送僧三首遍參尊宿遊方久名岳奇峰問此公五月半間看瀑布青城山裏白雲中池上時時松雪落焚香烟起見孤燈静夜憶誰來對坐曲江南岸寺中僧歸蜀擬從巫峡過何時得入舊禪房寺中來後誰身化起塔栽松向野田渡桑乾客舍并州已十霜歸心日夜憶咸陽無端更渡桑乾水却望并州是故鄉夜期客不至逸人期宿石床中遣我開扉對晚空不知何處嘯秋月閒著松門一夜風夜集烏行中所居環爐促席復持杯松院雙扉向月開坐上同聲半先達名山獨入此心來贈李文通營當萬勝岡頭下誓立千年不朽功天子手擎新鉞斧諫官請贈李文通三月晦日贈劉評事三月正當三十日風光別我苦吟身共君今夜不須睡未到曉鐘猶是春送道者二首新嵗抱琴何處去洛陽三十六峯西生來未識山人面不得一聴烏夜啼常言喫藥全勝飯華岳松邊采茯神不遣髭鬚一莖白擬為白日上昇人宿村家亭子床頭枕是溪中石井底泉通竹下池宿客未眠過半夜獨聞山雨到來時題興化園亭破却千家作一池不栽桃李種薔薇薔薇花落秋風起荆棘滿庭君始知竹籬外清隂接藥欄曉風交戛碧琅玕子猷没後知音少粉節霜筠漫嵗寒田中丞髙亭髙亭林表逈嵯峨獨坐秋宵不寢多玉兔玉人歌裏出白雲雖白莫相和贈人斑竹拄杖揀得林中最細枝結根石上長身遲莫嫌滴瀝紅斑少恰是湘妃淚盡時尋石甕寺上方野寺入時春雪後崎嶇得到此房前老僧不出迎朝客已住上方三十年題青龍寺碣石山人一軸詩終南山北數人知擬看青龍寺裏月待無一㸃夜雲時阮籍嘯臺如聞長嘯春風裏荆棘叢邊訪舊蹤地接蘇門山近逺荒臺突兀抵髙峰楊秘書新居城角新居隣静寺時從新閣上南樓南山泉入宫中去先向詩人門外流哭孟東野蘭無香氣鶴無聲哭盡秋天月不明自從東野先生死側近雲山得散行過京索光生墓京索先生三尺墳秋風漠漠吐寒雲從來有恨君多哭今日何人更哭君客思促織聲尖尖似針更深刺著旅人心獨言獨語月明裏驚覺眠童與宿禽觀鹿條峯五老勢相連此鹿來從若箇邊别有野麋人不見一生長飲白雲泉聴樂山人彈易水朱絲絃底燕泉急燕將雲孫白日彈嬴氏歸山陵已掘聲聲猶帶髮衝冠經蘇秦墓沙埋古篆折碑文六國興亡事繫君今日凄凉無處説亂山秋盡有寒雲題戴勝星㸃花冠道士衣紫陽宫女化身飛能傳上界春消息若到蓬山莫放歸題隠者居二首雖有柴門長不闗片雲孤木伴身閒猶嫌住久人知處見擬移家更上山老子堂前花萬樹先生曽見幾回春夜煎白石平明喫不擬教人哭此身春詞沈亞之黄鳥啼時春日髙紅芳發盡井邊桃美人手暖裁衣易片片輕花落剪刀題候仙亭新剏山亭覆石壇雕梁峻宇入雲端嶺北嘯猿髙枕聴湖南山色巻簾看送龐子肅三年遊宦也迷津馬困長安九陌塵都作無成不歸去古來妻嫂笑蘇秦夢遊秦宫君王多感放東歸從此秦宫不復期春景似傷秦喪主落花如雨淚燕脂萬首唐人絶句卷二十四欽定四庫全書萬首唐人絶句巻二十四宋洪邁編五言原缺萬首唐人絶句巻二十四
