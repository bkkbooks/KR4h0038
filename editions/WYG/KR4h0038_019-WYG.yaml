body:
  text: 萬首唐人絶句巻十九宋洪邁編七言原缺萬首唐人絶句巻十九欽定四庫全書萬首唐人絶句巻十九宋洪邁編五言春情張起畫閤餘寒在新年舊燕歸梅花猶帶雪未得試春衣題嘉祥驛孟遲樹頂煙微緑山根菊暗香何人獨鞭馬落日上嘉祥徐波渡曉月千重樹春煙十里溪過來還過去此路不堪迷壯士吟壯士何曽悲悲即無回期如何易水上未歌淚先垂懷鄭洎風蘭舞幽香雨葉墮空滴美人來不來前山看向夕飲散呈主人夣覺笙歌散空堂寂寞秋更聞城角弄煙雨不勝愁即事亂世時偏促隂天日易昏無言搔白首憔悴倚東門勉兒子養爾逢多難常憂學已遲辟疆爲上相何必待從師春早聞鶯纔覺曉開户已知晴一帶窻間日斜穿枕上明贈姫人莫恨紅裙破休嫌白屋低請看京與洛誰在舊香閨尋人偶題邵眞日昃不復午落花難歸樹人生能幾何莫猒相逢遇登嶺望許鼎淼淼三江水悠悠五嶺間鴈來猶不度人去若爲還對月張喬盈缺青𡨕外東風萬古吹何人種丹桂不長出輪枝題殿前桂葉盧僎桂樹生南海芳香隔逺山今朝天上見疑是月中攀南樓望去國三巴逺登樓萬里春傷心江上客不是故鄉人臨川送别秋郊日半隱野樹煙初映風水正蕭條那堪動離詠途中抱玉三朝楚懷書十上秦年年洛陽陌花鳥弄歸人小院唐彦謙小院無人夜煙斜月轉明清宵易惆悵不必有離情春雪初霽杏花正芳月夜閒吟霽景明如練繁英杏正芳姮娥應有語悔共雪爭光文惠宫人認得前家令宫人淚滿裾不知梁佐命全是沈尚書贈竇尊師我愛竇高士棄官仍在家爲嫌勾漏令兼不要丹砂南海神詞高駢滄溟八千里今古畏波濤此日征南將安然渡萬艘送春水淺魚爭躍花深鳥競啼春光看欲盡判却醉如泥海翻幾經人事變又見海濤翻徒起如山浪何曾洗至寃笻竹杖寄僧堅輕笻竹杖一枝有九節寄與沃州人閒歩青山月遣興把盞非憐酒持竿不爲魚唯應嵇叔夜似我性慵踈登蕪城儲嗣宗昔人登此地丘壠已前悲今日又非昔春風能幾時滄浪峽滄浪臨古道道上石成塵自有滄浪峽誰爲無事人垓城百戰未言非孤軍驚夜圍山河意氣盡淚濺美人衣村月月午離南道前村半隱林田翁獨歸處喬麥露花深早春野樹花初發空山獨見時踟蹰歷陽道鄉思滿南枝送春無語共春别細腰枝上紅來年又相見還恐是愁中自君之出矣雍裕之自君之出矣寳鏡爲誰明思君如隴水長聞嗚咽聲錦薛瑩軋軋弄寒機功多力漸微惟憂機上錦不稱舞人衣羨僧處世曾無着生前事盡非一缾兼一衲南北去如歸秋日湖上落日五湖遊煙波處處愁沉浮千古事誰與問東流寄舊山隱侣舊山諸隱淪身在若無身莫鎻白雲路白雲多悮人訪武陵道者不遇花發鳥仍啼行行路欲迷二眞無問處虚度武陵溪江山閒望渺渺無窮盡風濤幾日平年光與人事東去一聲聲滿公房綦毋潜世界蓮華藏行人香火縁燈王照不盡中夜寂相傳効崔國輔體四首韓偓淡月照中庭海棠花自落獨立俯閒階風動秋千索酒力惹睡眸鹵莽聞街鼓欲明花更寒東風打窻雨羅幕生春寒繡窻愁未眠南湖夜半雨應濕采蓮船雨後碧苔院霜來紅葉樓閒堦上斜日鸚鵡伴人愁半睡擡鏡仍嫌重更衣又怕寒宵分未歸帳半睡待郎看早歸去是黄昏後歸當朦朧時􅙳衣吟宿醉風露動相思兩處樓上淡山横樓前溝水清憐山又憐水兩處總牽情春閨二首願結交加夣因傾㶑灧尊醒來情緒惡簾外正黄昏氲氲帳裏香薄睡睡時䊋長吁解羅帶怯見上空牀花時與錢尊師同醉在醴陵橋下淺深水竹間紅白花酒仙同避世何用厭長沙從獵三首獵犬諳斜路宫嬪識畫旗馬前雙兎走宣示羽林兒小鐙狹鞦鞘鞍輕妓細腰有時齊走馬也學唱交交蹀躞巴驛駿陪鰓碧野雞忽聞仙樂動賜酒玉偏提與僧江海扁舟客雲山一食僧相逢兩相語若箇是南能野釣細雨桃花水輕漚逆浪飛風頭歸阻棹坐睡倚簑衣迎内子題庭花芍藥斬新栽當庭數朶開東風與拘束留待細君來題奉國寺新秋夜何爽露下風轉凄一磬竹窻外千燈花塔西題龍門寺窻燈林靄裏門磬水聲中更與龍花㑹罏烟滿席風寄早梅陸開折梅逢驛使寄與隴頭人江南無所有聊贈一枝春子夜冬歌薛耀朔風扣羣木嚴霜凋百草借問月中人安得長不老感事高蟾濁河從北下清洛向東流清濁皆如此何人不白頭楚思疊浪與雲急翠蘭和意香風流化爲雨日暮下巫陽雪中金閣倚雲開朱軒犯雪來三冬辛苦様天意似難裁道中有感一醉六十日一裘三十年年華經幾日日日棹征鞭宋汴道中平野有千里居人無一家甲兵年正少日久戍天涯秋思天地太蕭索山川何渺茫不堪星斗柄猶把歳寒量即事三年離水石一旦隠樵漁為問青雲上何人識巻舒漁家野水千年在閒花一夕空近來浮世狹何似釣船中閒中風雨去愁晚關河歸思涼西遊無直氣一夕九回膓歸思紫府歸期斷芳洲别思迢黄金作人世只被歳寒消送王郎中惜别逺相送却成惆帳多獨歸回首處爭奈暮山何感興禾黍不暘艷競栽桃李春翻令力耕者多作賣花人望湖亭湘水似伊水湘人非故人登臨獨無語風桞自搖春采桑曉陌携籠去桑林路隔淮何如闘百草賭取鳳凰釵悶題落第春相困無心惜落花荆山歸不得歸得亦無家牡丹亂前看不足亂後眼偏明却得蓬蒿力遮藏見太平玉蘃花唐昌樹已荒天意眷文昌晚入微風起春時雪滿墻嘉陵細雨濕淒淒人稀江日西春膓已愁斷不待子規啼山中即事郎士元入谷多春興乗舟棹碧潯山雲昨夜雨溪水曉來深正朝上左丞楊重𤣥歳去愁終在春還命不來長吁問丞相東閣幾時開雪羅隱盡道豐年瑞豐年事若何長安有貧者爲瑞不宜多寄陸魯望龍樓李丞相昔歳仰高文黄閣今無主青山竟不焚登郭隗臺皇甫松燕相謀在兹積金黄巍巍上者欲何顔使我千載悲塞上周朴受降城必破回落隴頭移蕃道北海北謀生今始知感寓杜荀鶴大海波濤淺小人方寸深海枯終見㡳人心不知心春閨怨朝喜花艷春暮悲花委塵不悲花落早悲妾似花身釣叟茅屋深灣裏釣船横竹門經營衣食外猶得弄兒孫馬上作五里復五里住時無住時日將家漸逺猶恨馬行遲幽情李牧幽人惜春暮潭上折芳草佳期何時還欲寄千里道感事王鐐擊石易得火扣人難動心今日朱門者曾恨朱門深羅嗊曲六首劉采春不喜秦淮水生憎江上船載兒夫壻去經歳又經年借問東園桞枯來得幾年自無枝葉分莫怨太陽偏莫作商人婦金釵當卜錢朝朝江口望錯忍幾人船郍年離别日只道住桐廬桐廬人不見今得廣州書昨日勝今日今年老去年黄河清有日白髪黒無縁昨日北風寒牽船浦裏安潮來打䌫斷揺櫓始知難南歌子詞三首裵諴不知厨中丳爭如炙裏心井邊銀釧落展轉恨還深不信長相憶擡頭取問天風吹荷葉動無夜不揺蓮簳蠟爲紅燭知情不自由細絲斜結網爭柰眼相鈎萬首唐人絶句巻十九
