body:
  text: 萬首唐人絶句巻二十七宋洪邁編七言寄友二首李羣玉野水晴山雪後時獨行村路更相思無因一向溪橋醉處處寒梅映酒旗花落輕寒酒熟遲醉眠不及落花期愁人想憶春山暮煙樹蒼蒼撥榖時澧陵路中别酒離亭十里强半醒半醉引愁長無人寂寂春山路雪打溪梅狼籍香大庾嶺别友人篔簹無子鵷雛飢毛彩凋摧不得歸誰念火雲千嶂裏低身猶傍鷓鴣飛石門戍到此空思吳隱之潮痕草蔓上幽碑人來皆望珠璣去誰詠貪泉四句詩聞湘南從叔朝覲長沙地窄却回時舟楫駸駸向鳳池為報湘川神女道莫教雲雨濕旌旗漢陽太白樓江上晴樓翠靄間滿簾春水滿窻山青楓緑草將愁去逺入吳雲暝不還送客沅水羅文海燕回柳條牽恨到荆臺定知行路春愁裏故郢城邊見落梅南荘春晚二首連雲草暎一條陂鸂䳵雙雙帶水飛南村小路桃花落細雨斜風獨自歸草暖沙長望去舟微茫煙浪向巴丘沅湘寂寂春歸盡水緑蘋香人自愁移松竹龍髯鳳尾亂颼颼帶霧停風一畝秋待取滿庭蒼翠合酒尊書案閉門休引水行一條寒玉走秋泉引出深蘿洞口煙十里暗流聲不斷行人頭上過潺湲黄陵廟黄陵廟前莎草春黄陵女兒茜裙新輕舟小檝唱歌去水逺山長愁殺人北亭斜雨飛絲織晚空疎簾半捲野亭風荷花開盡秋光晚零落殘紅緑沼中送客徃涔陽春與春愁逐日長逺人天畔逺思鄉蘋生水緑不歸去孤負東溪七里莊桃源我到瞿真上昇處山川四望使人愁紫雲白鶴去不返唯有桃源溪水流題王侍御宅門向滄江碧岫開地多鷗鷺少塵埃緑陰十里灘聲裏閒去王家看竹來文殊院避暑赤日黄埃滿世間松聲入耳即心閒願尋五百仙人去一世清涼住雪山寄友人鹿胎冠子散㸃疎星紫錦班仙家新様剪三山冝與謝公松下戴淨簮雲髪翠微間江南鱗鱗别浦起微波泛泛輕舟桃葉歌斜雪北風何處宿江南一路酒旗多答友寄新茗滿火芳香碾􅀈塵吳甌湘水緑花新媿君千里分滋味寄與春風酒渴人峽山寺上方滿院泉聲山殿涼殿簾微雨野松香東峰下視南溟月笑踏金波看海光秋登涔陽城二首萬户砧聲水國秋涼風吹起故鄉愁行人望逺偏傷思白浪青楓滿北樓穿針樓上閉秋煙織女佳期又隔年斜漢夜深吹不落一條銀浪挂秋天釣魚七尺青竿一丈絲菰蔣葉裏逐風吹幾回舉手抛芳餌驚起沙灘水鴨兒酬魏三十七靜裛寒香觸思初開緘忽見二瓊琚一吟麗句風流極沒得洪文李校書贈琵琶我見鴛鴦飛水上君還望月苦相思一雙裙帶同心結早寄黄鸝孤鴈兒落帆後賦得二絶平湖茫茫春日落危檣獨映沙洲泊上岸閒尋細草行古查飛起黄金鶚水浮秋煙沙曉雪皎㓗無風影澄澈海客雲帆未掛時相與縁江拾明月贈妓人誰家少女字千金省向人間觸處尋今日分明花裏見一雙紅臉動春心贈人曽留宋玉舊衣裳惹得巫山夢裏香雲雨無情難管領任他别嫁楚襄王山榴洞中春氣蒙籠喧尚有紅英千樹繁可憐夾水錦歩障羞殺石家金谷園鸂䳵錦羽相呼慕沙曲波上雙聲戞哀玉霞明川靜極望中一時飛滅青山緑沅江漁者倚棹汀洲沙日晚江鮮野菜桃花飯長歌一曲煙靄深歸去滄浪緑波逺題金山寺石堂白波四面照樓臺日夜潮聲遶寺回千葉紅蓮髙㑹處幾曽龍女獻珠來戱贈魏四十蘭浦秋來煙雨深幾多情思在琴心知君調得東家子早晚和鳴入錦衾和人贈别嚬黛低紅别怨多深停芳恨滿横波聲中唱出纒綿意淚落燈前一曲歌宿巫山廟二首寂寞髙堂别楚君玉人天上逐行雲停舟十二峯巒下幽佩仙香半夜聞廟閉春山曉月光波聲回合樹蒼蒼自從一别襄王夢雲雨空飛巫峽陽傷柘枝曽見雙鸞舞鏡中聨飛接影對春風今來獨在花筵上月滿秋天一半空題櫻桃春初携酒此花間幾度臨風倒玉山今日葉深黄滿樹再來惆悵不能攀惱從兄芳草萋萋新燕飛芷河南望鴈書稀武陵洞裏尋春客已被桃花迷不歸紫極宫齋後紫府空歌碧落寒曉星寥亮月光殘一羣白鶴髙飛散唯有松風吹石壇春晚思鄉之客空凝嚬天邊欲盡未盡春獨攀江樹深不語芳草落花愁殺人喜渾吉見訪公子春衫桂水香逺衝霏雪過書堂貧家冷落難消日唯有松筠滿院涼索曲送酒簾外春風正落梅須求狂藥解愁回煩君玉指輕攏撚慢撥鴛鴦送一杯山驛梅花生在幽崖獨無主溪蘿澗鳥為儔侣行人陌上不留情愁香空謝深山雨重陽日上渚宫楊尚書落帽臺邊菊半黄行人惆悵對重陽荆州一見桓宣武為趂悲秋入帝鄉校書叔遺暑服翠芸箱裏疊㥎㥎楚葛湘紗淨似空便着清江明月夜輕涼與掛一身風贈魏三十七名珪字玉淨無瑕美譽芳聲有數車莫放熖光髙二丈來年燒殺杏園花酬崔表臣昨日朱門一見君忽驚野鶴在雞羣不應長啄黄汙水早晚歸飛碧落雲歎靈鷲寺山榴水蝶巖蜂俱不知露紅凝豔數千枝山深春晚無人賞即是杜鵑催落時中秋寄南海侍御海靜天髙景氣殊鯨睛失彩蚌潜珠不知今夜越臺上望見瀛洲方丈無戲贈姬人骰子廵抛裹手拈無因得見玉纎纎但知謔道金釵落圖向人前露指尖丹陽送韋叅軍嚴維丹陽郭裏送行舟一别心知兩地秋日晚江南望江北寒鴉飛盡水悠悠相里使君宅聴惠澄上人吹小管秦僧吹竹閉秋城早在棃園稱主情今夕襄陽山太守坐中流涙聴商聲荅劉長卿新安非欲枉帆過海内如君有幾何醉裏别時秋水色老人南望一狂歌發桐廬寄劉員外處處雲山無盡時桐廬南望轉參差舟人莫道新安近欲上潺湲行自遲嵗初喜皇甫侍御至湖上新正逢故人情深應不笑家貧明朝别後門還掩脩竹千竿一老身舊鏡鮑溶團團銅鏡似潭水心愛玉顔私自親一經離别少年改難與清光相見頻期盡魚鎻生衣門不開玉筐金月共塵埃青山石婦千年望雷雨曽來知不來寄天台凖公赤城橋東見月夜佛壠寺邊行月僧閒踏莓苔繞琪樹海光清淨對心燈送蕭秀才心交别我西京去愁滿春魂不易醒從此無人訪貧病馬蹤車轍草青青隋宫二首柳塘煙起日西斜竹浦風回鴈弄沙煬帝春游古城在壊宫芳草滿人家玉鉤闌畔寒泉水金轆轤邊照影人此水今為九泉路一枝花照數堆塵塞上行西風應時筋角堅承露牧馬水草冷可憐黄河九曲盡氊館牢落樹無影吳中夜别楚客秋思着黄葉吳姫夜歌停碧雲聲盡燈前各流淚水天涼冷鴈離羣送裴婺州婺女星邊氣不收金華山水似瀛洲含香太守心清淨去與神仙日日逰荅客竹間深路馬驚嘶獨入蓬門半似迷勞問圃人終嵗事桔橰聲裏雨春畦贈楊錬師二首紫煙衣上繡春雲清隱山書小篆文明月在天將鳳管夜深吹向玉晨君道士夜誦蘂珠經白鶴下繞香煙聴夜移經盡人上鶴仙風吹入秋冥冥寄薛膺昆季楚山清路兩無期夢裏春風玉樹枝何況芙蓉樓上客海門江月亦相思楊真人籙中像畫中留得清瓊質世上難逢白鶴身應見茅盈哀老弟為持金籙救生人懐王秀才鄉無竹圃為三徑貧寄鄰家已二年唯有素風身未墜世間開口不言錢題真公影堂舊房西壁畫支公昨暮今辰色不同逺客問心無處取獨添香火望虚空秋夜懐紫閣寺僧滿山雨色應難見隔澗經聲又不聞紫閣夜深多入定石苔誰為掃秋雲宿水亭雕楹采檻壓通陂魚鱗碧幕銜曲玉夜深星月伴芙蓉如在廣寒宫裏宿寄海陵韓長宫吏散重門印不開玉琴招鶴舞徘徊野人為此多東望雲雨仍從海上來得儲道士書嬋娟春盡暮心收鄰里同年半白頭為問蓬萊近消息海波平静好東遊感路侍御訪别西臺御史重難言落木疎籬繞病魂一望青雲感騘馬欵行黄葉出柴門上已日上浙東孟中丞世間禊事風流處鏡裏雲山若畫屏今日會稽王内史好將賔客醉蘭亭送僧遊天台二首身非居士常多病心愛空王稍覺閒師問寄禪何處取浙南青翠沃洲山金嶺雪晴僧獨歸水文霞采納禪衣可憐石室燒香夜江月對心無是非望金山寺一朶蓬萊在世間梵宫宫闕翠雲閒近南秋水更清淺聞道遊人未忍還奉酬范傳真二首昨日新花紅滿眼今朝美酒緑留人更冝明月含芳露憑仗蕭郎夜賞春白雪翦花朱蠟蔕折花傳笑惜春人請君白日留明月一醉風光莫厭頻襄陽懐古襄陽太守沉碑意身後身前幾年事湘江千嵗未為陵水底魚龍應識字湖上望月湖上清涼月更好天邊旅人猶未歸幾見金波滿還破草蟲聲畔露霑衣望姑山幽人徃徃憶麻姑浮世悠悠仙境殊自從青鳥不堪使更得蓬萊消息無暮秋見菊花菊花低色過重陽似憶王孫白玉觴今日王孫好收采髙天已下兩回霜東鄰女雙飛鷓鴣春影斜美人盤金衣上花身為父母幾時客一生知向何人家寄李都護去年河上送行人萬里弓旗一武臣聞道玉闗烽火死犬戎知有外家親長安旅舍懐舊山昨夜清涼夢本山眠雲喚鶴有慙顔青蓮道士長堪羨身外無名至老閒漢宫詞二首栢梁宸居清窈窕東方先生夜待詔夜乆月當承露盤内人吹笙舞鳳鸞月映東牕似玉輪未央前殿絶聲塵宫槐花落西風起鸚鵡驚寒夜喚人懐仙閬峯綺閣幾千丈瑤水西流十二城曽見周靈王太子碧桃花下自吹笙九日崔國輔江邊楓落菊花黄少長登髙一望鄉九日陶家雖載酒三年楚客已霑裳白紵辭二首洛陽梨花落如霰河陽桃葉生復齊坐恐玉樓春欲盡紅綿粉絮裛妝啼董賢女弟在椒風窈窕繁華貴後宫壁帶金缸皆翡翠一朝零落變成空王昭君一回望月一回悲望月月移人不移何時得見漢朝使為妾傳書斬畫師萬首唐人絶句巻二十七
