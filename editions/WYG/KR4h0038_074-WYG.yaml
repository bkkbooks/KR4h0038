body:
  text: 萬首唐人絶句巻七十四宋洪邁編七言善巻先生壇蔡崑幾到壇邊登閣望因思遺跡詠今朝當時為有重華出不是先生傲帝堯南塘二首鮑溶南塘旅客秋淺清夜深緑蘋風不生蓮花受露重如睡斜月起動鴛鴦聲塘東白日駐紅霧早魚飜光樂碧潯畫舟蘭棹欲破浪恐畏驚動蓮東心題嚴君觀寒雲古木罩星臺凢骨仙蹤信可哀二十年前曾此到一千年内未歸來山中有所思零零夜雨漬愁根觸物傷離好斷魂莫怪杜䳌飛去盡紫微花裏有啼猿燕一巢功績破春光絮落花殘兩翅狂月樹風枝不棲去强來言語泥雕梁貧女難把菱花照素顔試臨春水揷花看木蘭船上遊春子笑指荆釵下逺灘杪春寄友人何處相逄萬事忙卓家樓上百淘香明朝漸近山僧寺更為殘花醉一塲回舊山庾家樓上謝家池處處風煙少舊知明日落花誰共醉野溪猨鳥恨歸遲故白巖禪師院王夢周能師還世名還在空閉禪堂滿院苔花樹不隨人寂寞數枝猶自出牆來題商山修路僧院蔣吉此地修行山幾枯草堂生計只瓶盂支郎既觧除難險試㸔人心平得無次青雲驛馬轉櫟林山鳥飛商溪流水背殘暉行人既在青雲路底事風塵猶滿衣題長安僧院出門争走九衢塵總是浮生不了身唯有水田衣下客大家忙處作閒人大庾驛有懐一囊書重百餘斤郵吏寕知去計貧莫訝偏吟望鄉句明朝便見嶺南人樵翁獨入深山信脚行慣當豺虎不曾驚路傍花發無心㸔唯見枯枝刮眼明聞歌竹枝尋堤聽唱竹枝詞正是月高風静時獨向東南人不㑹弟兄俱在楚江湄昭君冢曾為漢帝眼中人今作邊蕃陌上塵身死不知多少載冢花猶帯洛陽春四老廟無端捨釣學干名不得溪山飬性情自省此身非逹者今朝羞拜四先生旅泊霜月正高鸚鵡洲美人清唱發紅樓鄉心暗逐秋江水直到吳山脚下流出塞瘦馬嬴童行背秦暮鴉撩亂入殘雲北風吹起寒營角直至榆闗人盡聞次商於感舊寄盧中丞昔年簪組隘邱門今日旌幢一院存何事商於淚如雨小儒偏受陸家恩庭竹唐求月籠翠葉秋承露風亞繁梢暝掃煙知道雲霜終不變冰留寒色在庭前題常樂寺桂冷松香十里間殿臺渾不似人寰日斜回首江頭望一片閒雲落後山送劉鍊師歸山風急雲輕鶴背寒洞天誰道却歸難千山萬水瀛洲路何處煙飛是醮壇酬舒公見寄無客不言雲外見為文長遣世間知一聲松逕寒吟後直是前山雪下時巫山下細腰宫盡舊城摧神女歸山更不來唯有楚江斜日裏至今猶自繞陽臺三月盡日李昌符江頭從此管絃稀散盡遊人獨未歸落日已將春色去殘花應逐夜風吹緑珠詠洛陽佳麗與芳華金谷園中見百花誰遣當年墜樓死無人巧笑破孫家贈别又將書劍出孤舟盡日停橈結逺愁莫到江頭話離别江波一去不回流悶書病來難處早秋天一徑無人樹有蟬歸計未成書半巻中宵多夢晝多眠經范蠡舊居張蠙一變姓名離百越越城猶在范家無他人不識扁舟意却笑輕生泛五湖抒懐幾出東堂謝不才便甘閒望故山回飜思未是離家乆更有人從外國來弔萬人冢兵罷淮邉客路通亂鵶來去噪寒空可憐白骨攢孤冢盡為將軍覔戰功别鄭仁表春雷醉别鏡湖邉官顯才狂正少年紅燭滿汀歌舞散美人迎上木蘭船贈段逸人長笻自擔藥兼琴話著名山即擬尋從聽世人忙似火不能移得卧雲心上所知初向衆中留姓字敢期言下致時名而今馬亦知人意毎到門前不肯行青冢傾國可能勝効國無勞㝠寞更思回太真雖是承恩死祇作飛塵向馬嵬傷賈島生為明代苦吟身死作長江一逐臣可是當時少知已不知知已是何人長安寓懐九衢秋雨掩閒扉不似干名似息機貧病却慚牆上土年來猶自換新衣古戰塲荒骨潛消壘已平漢家曾說此交兵如何萬古寃魂在風雨時聞有戰聲再遊西山贈許尊師别後已聞師得道不期猶在此山頭昔時霜鬢今如漆疑是年光却倒流宫詞日透珠簾見冕旒六宫爭逐百花毬回㸔不覺君王去已聽笙歌在逺樓自諷鹿鳴筵上强稱賢一送離家十四年同隠海山燒藥伴不求仙桂却登仙十五夜與友人對月每到月圓思共醉不宜同醉不成歡一千二百如輪夜浮世誰能盡得㸔夢仙謡三首王轂前程漸覺風光好琪花片片粘瑶草有人遺我五色丹一粒吞之後天老青童遞酒金觴疾列坐紅霞神氣逸笑說留連數日間已是人間一千日瑶臺絳節遊皆遍異果竒花香撲面松窻夢覺却神清殘月林前三兩片偶書劉义日出扶桑一丈高人間萬事細如毛野夫怒見不平事磨損胷中萬古刀觀八駿圖穆王八駿走不歇海行去尋長日月五雲望斷阿母宫歸來落得新白髪天津橋洛陽宫闕照天地四靣山川無毒氣誰令漢祖都秦闗今遂姦雄轉相熾野哭棘針生猛義路閒野泉相弔聲潺潺哀哉異教溺頑俗淳源一去何時還酬幽居閒上人喜及第後贈陳羽九霄心在勞相問四十年間豈足驚風動自然雲出岫高僧不用笑浮生洛下贈徹公天竺沙門洛下逄請為同社笑相容支頥忽望碧雲裏心愛嵩山第幾重觀朱舍人歸塟吳中翩翩絳旐寒流上行逺東歸萬里魂幾處州人臨水哭共㸔遺草有王言襄陽過孟子舊居㐮陽城郭春風裏漢水東流去不還孟子死來江樹老煙霞猶在鹿門山歩虚詞樓殿層層阿母家崑崙山頂住紅霞笙歌出見穆天子相引笑看琪樹花送友人遊嵩山嵩山歸路逺天壇雲影松聲滿谷寒君見九龍壇上月莫辭清夜水中㸔題清鏡寺留别路入千山愁自知雪花撩亂壓松枝世人並道離别苦誰信山僧輕别離從軍行海畔風吹凍泥裂枯桐葉落枝梢折横笛聞聲不見人紅旗直上天山雪宿淮隂作秋燈㸃㸃淮隂市楚客聨檣宿淮水夜深風起魚鱉腥韓信祠堂明月裏春日南山行處處㸔山不可行野花相向笑無成長嫌為客過州縣漸被時人識姓名覽古三十九首本一百首有前巻已見并刪去者汪遵彭澤鶴愛孤松雲愛山宦情微禄免相闗栽成五桞吟歸去漉酒巾邊伴菊閒杜郵舘殺盡降兵熱血流一心猶自逞戈矛功成若觧求身退豈得將軍死杜郵細腰宫鼓聲連日燭連宵貪向春風舞細腰爭奈君王正沉醉秦兵江上促征橈瑶臺仙夢香魂不乆留滿川雲雨滿宫愁直湏待得荆王死始向瑶臺一處遊吳坂踡跼鹽車萬里蹄忽逄良鍳始能嘶不縁伯樂稱竒骨幾與駑駘價一齊箕山薄世臨流洗耳塵便歸雲洞任天真一瓢風入猶嫌閙何况人間萬種人息國家國興亡身獨存玉容還受楚王恩衘寃只合甘先死何待花間不肯言梁寺立國從來為戰功一朝何事却談空臺城兵匝無人敵閒卧高僧滿梵宫南陽陸困泥蟠未適從豈妨耕稼隠高蹤若非先主垂三顧誰識茅廬一卧龍把梁墓一呌長城萬仞摧把梁遺骨逐妻回南鄰北里皆孀婦誰觧堅心繼此來夷門晉鄙兵回為重難秦師収斾亦西還今來不是無朱亥誰降軒車問抱闗汴河隋皇帝欲泛龍舟千里崑崙水别流還待春風錦颿暖桞隂相送到迷樓燕臺禮士招賢萬古名高臺依舊對燕城如今寂寞無人上春去秋來草自生聊城刃血攻聊已越年竟慿儒術罷戈鋋田單漫逞燒牛計一箭終輸魯仲連西河花貎年年溺水濵俗傳河伯娶生人自從明宰投巫後直至如今鬼不神密縣百里能將濟猛寛飛蝗不到邑人安至今閭里逢災沴猶祝當時卓長官昇僊橋題橋貴欲露先誠此日人皆笑率情應訝臨卭沽酒客逢時還作漢公卿破陳獵獵朱旗映綵霞紛紛白刃入陳家㸔㸔打破東平苑猶舞庭前玉樹花白頭吟失却青絲素髪生合歡罷帶意全輕古今人事皆如此不獨文君與馬卿短歌吟箭飛烏兎競東西貴賤賢愚不夢齊匣裏有琴樽有酒人間便是武陵溪晉河風引征帆管吹高晉君張晏俟雄豪舟人笑指千餘客誰是煙霄六翮毛干將墓囊籥冰霜萬古聞拍灰松地見餘墳應縁神劍飛揚乆水水山山盡是雲金谷晉臣榮盛更誰過常向堦前舞翠娥香散艷消如一夢但留風月伴煙蘿三閭廟為嫌朝野盡陶陶不覺官高怨亦高憔悴莫酬漁父笑浪交千載詠離騷易水匕首空磨事不成誤留龍袂待琴聲斯湏却作秦中鬼青史徒標烈士名嚴陵臺一釣淒涼在杳㝠故人飛詔入山扄終將寵辱輕軒冕高卧五雲為客星淮隂秦季賢愚混不分只應漂母識王孫歸榮便累千金贈為報當時一飯恩雞鳴曲金距花冠傍舍棲清晨相呌一聲齊開闗自有馮生計不必天明待汝啼採桑婦為報躊躇陌上郎蠶飢日晚妾心忙本來若愛黄金好不肯携籠更採桑漁父棹月眠流處處通綠簑葦帯混元風靈均說盡孤高事全與逍遙意不同越女玉貎何曾為浣沙只圖句踐獻夫差蘇臺日夜唯歌舞不覺干戈犯翠華望思臺不憂家國任姦臣骨肉翻為驀路人巫蠱事行寃莫雪九層徒築見無因比干墓國亂時危道不行忠賢諫死勝謀生一沉寃骨千年後壠水雖平恨未平郢中莫言白雪少人聽高調都難稱俗情不是楚詞詢宋玉巴歌猶掩繞梁聲北海漢臣曾此作縲囚茹血衣毛十九秋鶴髪半垂龍節在不聞青史説封侯招屈亭三閭溺處殺懷王感得荆人盡縞裳招屈亭邉兩重恨遠天秋色暮蒼蒼屈祠不肯迂回入醉鄉乍吞忠梗没滄浪至今祠畔猿啼月了了猶疑恨楚王銅雀臺銅雀臺成玉座空短歌長袖盡悲風不知僊駕歸何處徒遣顰眉望漢宫斑竹祠九處煙霞九處昏一回延首一銷魂因慿直節流紅淚圖得千秋見血痕萬首唐人絶句巻七十四
