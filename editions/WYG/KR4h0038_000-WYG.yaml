body:
  text: 萬首唐人絶句總集類提要臣等謹案萬首唐人絶句一百巻宋洪邁編邁有容齋隨筆已著録邁於淳熙間録唐五七言絶句五千四百首進御後復補輯得滿萬首為百巻紹熙三年上之是時降勅褒嘉有選擇甚精備見博洽之諭陳振孫書録解題謂其中多採宋人詩如李九齡郭震滕白王嵒王初之屬其尤不深考者為梁何遜劉克莊後村詩話亦謂其但取唐人文集雜説抄類成書非必有所去取盖當時瑣屑摭拾以足萬首之數其不能精審勢所必然無怪後人之排詆至程珌洺水集責邁不應以此書進御則與張栻詆吕祖謙不應編文鑑同一偏見論雖正而實迂矣是書原本一百巻每巻以百首為率今考書中有一巻而百餘首者有一巻而不及百首者又七言原缺第十八十九二十二十一二十二五言原缺第十七二十三二十四二十五共九巻無可校補今亦仍之焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀萬首唐人絶句詩序淳熈庚子秋邁解建安郡印歸時年五十八矣身入老境眼意倦罷不復觀書惟時時教穉兒誦唐人絶句則取諸家遺集一切整彚凡五七言五千四百篇手書為六帙起家守婺齎以自隨踰年再還朝侍壽皇帝清燕偶及宫中書扇事聖語云比使人集録唐詩得數百首邁因以昔所編具奏天㫖驚其多且令以元本進入䝉寘諸復古殿書院又四年來守㑹稽間公事餘分又討理向所未盡者唐去今四百歲考藝文志所載以集著録者幾五百家今堇及半而或失真如王涯在翰林同學士令狐楚張仲素所賦宫詞諸章乃誤入於王維集金華所刋杜牧之續别集皆許渾詩也李益返照入閭巷愁來與誰語一篇又以為耿湋崔魯白首成何事無歡可替愁一篇又以為張蠙以薛能邵平𤓰地入吾廬一篇為曹鄴以狄歸昌馬嵬坡下栁依依一篇為羅隠如是者不可勝計今之所編固亦不能自免然不暇正又取郭茂倩樂府與稗官小說所載仙鬼諸詩撮其可讀者合為百巻刻板蓬萊閣中而識其本末於首紹熈元年十一月戊午煥章閣學士宣奉大夫知紹興軍府事兩浙東路安撫使魏郡公洪邁序越府所刻七言至二十六巻五言至二十巻而奉祠歸鄱陽惟書不可以不成乃雇婺匠續之于容齋旬月而畢二年十一月戊辰邁題重華宮投進劄子臣以么麽餘生獲安故里竊恃隆遇冒昧有陳臣頃歲備數禁廷得侍清閒之燕因及手冩唐人絶句詩即䝉聖㫖許令進入是時纔有五十四巻去年守越嘗于公庫鏤板未及了畢奉祠西歸家居無事又復搜討文集傍及傳記小說遂得滿萬首分為百巻輙以私錢雇工接續雕刻今已成書謹裝禠一部遣人恭詣通進司伺候投進凡目録一冊七言十五冊五言五冊共二十一册用匣盛貯伏望聖慈特賜宣取干犯宸嚴臣無任惶懼隕越昩死之至取進止南内於清閒之燕上添入至尊壽皇聖帝六字貼黄上件詩集七言二十六巻以前五言二十巻以前係紹興府所刻臣臨行時倉卒印造紙劄多不精續後㸃檢得有錯誤處只用雌黄塗改今來無由别行修換以之進御實為不謹臣不勝戰懼俟罪之至仰乞聖察紹熈三年三月進䝉壽皇聖帝支賜下奏人錢三十貫文重華宫宣賜白劄子得壽皇聖帝聖㫖宣諭閣學比觀向所進唐詩絶句選擇甚精備見博洽今賜茶一百夸清馥香一十貼薰香二十貼金器一百兩二月日安仁禮回汝弼恭承左武大夫利州觀察使提舉佑神觀重華宫同提㸃盧安仁親衛大夫保信軍承宣使重華宫提㸃關禮中亮大夫安慶軍承宣使重華宫提㸃吳回正侍大夫昭慶軍承宣使重華宫提㸃霍汝弼謝表臣邁言伏䝉聖恩遣秉義郎重華宫祇應耿柟以三月一日到饒州齎提舉官霍汝弼等白劄子得聖㫖宣諭臣比觀向所進唐詩絶句選擇甚精備見博洽今賜茶一百夸清馥香一十貼薫香二十貼金器一百兩臣即時出城迎拜還家望闕謝恩祇受訖膚使馳軺蕃錫耀綸章之渥精鏐製器寳薌兼貢茗之珍光塞門闌驩傾里社臣邁中謝伏念臣愚無所用老自宜休與佛有縁曾是靈山之下走事君盡禮積承温室之隆知頃因心好於唐文輙爾手編於詩律嘗䝉宣索每恨疎蕪比歳旁搜遂及萬篇之富成書上奏幸塵乙夜之觀敢覬華褒更加異寵得黄金百初微季布之名復白圭三不慮南容之玷允謂非常之賜真為不朽之榮兹葢恭遇至尊壽皇聖帝陛下味道希夷儲神昭曠為天子父既超大有之尊以聖人才尚録小成之技坐令嵬鎖沐此恩輝臣拜舞以還怔營自失如雲如日應無就望之期若子若孫唯誓縻捐之報别奏劄子臣逖逺威顔忽焉六載念以么麽之質被䝉眷知度越輩流可為希世之遇鈞天夢斷無復可尋罷越還家杜門屏迹自去春投進唐詩一伸奏牘之後不敢妄以孤逺姓名復塵淵几誠不自意恩從天來顓降使車朌之珍賜玉音褒諭金寳爛然榮光非常道路駭矚葢自鄱陽有郡以來所未之見陛下脫屣北宫遺物離人而立於獨予以馭幸寥寥弗聞臣獨何人邈在千里之外乃拜殊渥焚香望闕盡室歡呼捧玩之餘感極以泣已具表稱謝外復此手劄少攄螻螘之誠臣竊不自揆再有昧死之請向者䝉賜野處二大字既已摹勒作碑揭于小園往來觀瞻無不稽首今祇戴恩華巍巍卓異思欲有以夸示無極輙摭聖諭中博洽兩字建為一堂妄意長夏之始殿閣餘涼游戱翰墨之間敢乞憐臣區區之愚賁以博洽堂三字受言藏之使子子孫孫朝暮瞻仰臣年過七十無復他榮癡庸有求罪當萬死伏惟聖慈曲垂寛貸引望黼扆無翼以翔不勝感恩戀徳隕越激切之至奏耿柟不受書送劄子臣兹勤使者逺至榮耀非常在于故事當有薄禮欲以銀百兩充書送楮幣百千犒從人而耿柟再三退却以為聖㫖不許収接無以展區區下悃臣不勝惶懼感戴之極須至奏聞者謝南内奏狀右臣伏䝉至尊壽皇聖帝聖恩特降專使秉義郎重華宫祇應耿柟以三月一日至饒州齎霍汝弼等白劄子傳聖㫖宣諭以臣向所進唐詩絶句賜臣茶一百夸清馥香一十貼薫香二十貼金器一百兩臣已即時出州城迎拜還家望闕祇受訖上件異數出自聖恩臣無任感天荷聖激切屏營之至謹録奏謝以聞謹奏紹熈四年三月日煥章閣學士宣奉大夫提舉隆興府玉隆萬壽宫魏郡開國公食邑二千五百户食實封二百户臣洪邁状奏
