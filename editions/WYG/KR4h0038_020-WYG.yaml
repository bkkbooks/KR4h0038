body:
  text: 萬首唐人絶句巻二十宋洪邁編七言原缺萬首唐人絶句巻二十欽定四庫全書萬首唐人絶句巻二十宋洪邁編五言端午侍宴張說甘露垂天酒芝盤捧御書含丹希蝘蜓灰骨慕蟾蜍陽春曲芣苡生前徑含桃落小園春心自揺蕩百舌更多言估客樂海客乗天風將船逺行役譬如雲中鳥一去無蹤跡舍利佛金繩界寳地珍木䕃瑤池雲間妙音奏天際法蠡吹摩多樓子從戎向邊北逺行辭宻親借問隂山候還知塞上人樂府二首孟郊緑萍與荷葉同此一水中風吹荷葉在緑萍西復東蓮花未開時苦心終日巻春水徒蕩漾荷花未開展征婦怨三首良人昨日去明月又不圓别時各有淚零落青樓前生在絲蘿下不識漁陽道良人自戍來夜夜夣中到漁陽千里道近如中門限中門踰有時漁陽長在眼金吾子李益繡帳博山鑪銀鞍馮子都黄昏莫攀折驚起欲栖烏鷓鴣詞湘江斑竹枝錦翅鷓鴣飛處處湘雲合郎從何處歸立秋前一日覽鏡萬事銷身外生涯在鏡中惟將滿鬂雪明月對秋風代人乞花繡戸朝眠起開簾滿地花春風解人意吹落妾西家上洛橋金谷園中桞春來似舞腰何堪好風景獨上洛陽橋揚州懷古故國歌鐘地長橋車馬塵彭城閣邊桞偏似不勝春水宿聞雁早雁忽爲雙驚秋風水窻夜長人自起星月滿空江揚州早雁江上三千雁年年過故宫可憐江上月偏照斷根蓬下漏樓話舊今應逺逄春喜又悲看花行拭淚倍覺下樓遲過友人莊王維故人具雞黍邀我至田家緑樹村邊合青山郭外斜過張女郎廟作含嬌曲二首沈警命嘯無人嘯含嬌何處嬌徘徊花上月空度可憐宵靡靡春風至微微春露輕可惜關山月還成無用明嘲趙郎中賀遂渉員外由來美郎中望不優寧知粉署裏飜作土山頭荅錦帳隨情設金鑪任意薫唯愁員外置不應列星文贈桞先生僧皎然一見嵩山老吾生恨太遲問君年幾許曾見上皇時酬李紓補闕不住東山寺雲泉處處行近臣那得識禪客本無名湖南蘭若未到無爲岸空憐不繫舟東山白雲意歳晚尚悠悠荅李蘭天女來相試將花欲染衣禪心竟不起還捧舊花歸法華寺望高峰贈如獻上人峰色秋天見松聲靜夜聞影孤長不在行道入深雲贈陸羽只將陶與謝終日可忘情不欲多相識逄人嬾道名留别閻士和不慣人間别多應忘别時逄山又逄水只却恐來遲浣紗女清淺白沙灘緑蒲尚堪把家住水東西浣紗明月下界石守風望天竺靈隱山頂東西寺江中旦暮潮歸心不可到松路在青霄九日與陸處士飲茶九日山僧院東籬菊也黄俗人多泛酒誰解助茶香望逺邨林杪不可分水歩遙難辯一片山翠邊依稀見邨逺惜暮景疎隂花不動片景松梢度夏日舊來長佳遊何易暮待山月夜夜憶故人長教山月待今宵故人至山月知何在雜興二首人生分已定富貴豈妄來不見海底泥飛上成塵埃吾道本無我未曾嫌世人如今到城市彌覺此心眞前溪作春歌已寂寂古水自涓涓徒誤時人輩傷心作逝川偶作樂禪心自蕩吾道不相妨獨晤歌還笑誰言老更狂春陵登望西底空流水東垣但聚雲最傷梅嶺望花雪正紛紛寄朱兵曹獨自聽寒更寒更發還住一夜千萬聲幾聲到君處少年行二首貫休自拳五色毬迸入他人宅却捉蒼頭奴玉鞭打一百靣白如削玉猖狂曲江曲馬上黄金鞍適來新賭得春野作大牛若耕田乳犢望似泣萬事皆天意緑草頭􅀢􅀢寒江上望荒岸燒未死白雲癡不動極目無人行浪打取魚籠懷故園脩睦故園歸未得此日意何傷獨坐水邊草水流春日長題天姥天台衆峯外歳晚當寒空有時半不見崔嵬在雲中逺公墓古墓石稜稜寒雲晚景凝空悲虎溪月不見雁門僧城上吟子蘭古塜宻於草新墳侵古道城外無閒地城中人又老放鷺鷥齊已潔白雖堪愛腥膻不奈何到頭從所欲還汝舊滄波送僧遊香山寺君到香山寺探幽莫損神且尋風雅主細看樂天眞撲滿子秪愛滿我腹爭知滿害身到頭須撲破却散與他人風薛濤獵蕙微風逺飄絃唳一聲林梢明淅瀝松徑夜淒清宣上見示與諸公唱和許厠高齊唱涓泉定不知可憐譙記室流水滿禪居蟬露滌音清逺風吹故葉齊聲聲似相接各在一枝棲月魄依鈎様小扇逐漢機團細影將圓質人閒幾處看池上雙鳬雙棲緑池上朝去暮飛還更憶將雛日同心蓮葉間春望詞四首花開不同賞花落不同悲欲問相思處花開花落時檻草結同心將以遺知音春愁正斷絶春鳥復哀吟風花日將老佳期猶渺渺不結同心人空結同心草郍堪花滿枝翻作兩相思玉簮乗朝鏡春風知不知陳情上韋令公聞道邊城苦今來到始知羞將門下唱唱與壠頭兒採桑郎大家宋氏春天南雁歸日去西蠶逺妾思紛何極客遊殊未返映水曲范靜妻沈氏輕鬢學浮雲雙蛾擬初月水澄正落釵萍開理垂髮昭君歎二首早信丹青巧重貨洛陽師千金買蟬鬢百萬寫蛾眉今朝猶漢地明旦入邊關情寄南雲反思逐北風還登樓曲慿高川陸近望逺阡陌多相思隔重嶺相憶恨長河越城曲别怨悽歌響離啼濕舞衣願假烏棲曲飜從南向飛當壚曲逶迤飛塵唱宛轉繞牀聲調絃可以進蛾眉畫未成題洛苑梧葉上明皇宫人一入深空裏年年不見春聊題一片葉寄與有情人别本舊事悲秋扇新恩寄早春聊題一片葉將寄接流人同前宣宗宫人流水何太急深宫盡日閒殷勤謝紅葉好去到人間途中覽鏡徐九臯四海遊長倦百年行半侵賴窺明鏡裏時見丈夫心湘中怨諷鄭僕射青鷁苦幽獨隔江相對稀夜寒蘆葉雨空作一聲歸更著宴詞沈詢莫打南來雁從他向北飛打時雙打取莫遣兩分離芭蕉路徳延一種靈苗異天然體性虚葉如斜界紙心似倒抽書明月三五更崔氏鶯鶯待月西廂下迎風戸半開拂墻花影動疑是玉人來絶張生棄置今何道當時且自親還將舊來意憐取眼前人伊川歌五首蓋嘉運聞道黄花戍頻年不解兵可憐閨裏月偏照漢家營千里東歸客無心憶舊遊挂帆遊白水高枕到青州桂殿江烏對雕屏海燕重祗應多釀酒醉把樂高鍾行樂三陽早芳菲二月春閨中紅粉態陌上看花人君住孤山下煙深夜徑長轅門度緑水㳺苑遶垂楊陸州歌七首分野中峯變隂晴衆壑殊欲投人處宿隔浦問樵夫共得煙霞逕東歸山水遊蕭蕭望林夜寂寂坐中秋香氣傳空滿籹花映薄紅歌聲天仗外舞態御樓中樹發花如錦鶯啼桞若絲更逄歡宴地愁見别離時明月照秋葉西風響夜砧彊言徒自亂徃事不堪尋坐對銀缸曉停留玉筯痕君門常不見無處謝前恩曉月當窻滿征人出塞迢畫樓終日閉清管爲誰調水調歌二首雙帶仍分影同心巧結香不應頻換彩意欲媚紅籹閨燭無人影羅屛有夣魂近來音耗絶終日望君門凱樂歌三首破陣樂受律辭元首相將討叛臣咸歌破陣樂共賞太平人賀聖歡四海皇風被千年徳水清戎衣更不着今日告功成君臣同慶樂主上開昌厯臣忠奉大猷君看偃革後便是太平秋題玉泉溪湘驛女子紅樹醉秋色碧溪彈夜弦佳期不可冄風雨杳如年詠兎蘓頲兎子死蘭彈持來挂竹竿試將明鏡照何異月中看西鄙哥舒歌一首北斗七星高哥舒夜帶刀至今窺牧馬不敢過臨洮萬首唐人絶句巻二十
