  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0038_WYG_043-1a, image: WYG1349/WYG1349-0497a.png}
body:
  text: 萬首唐人絶句巻四十三宋洪邁編七言題弋陽舘張祜一葉飄然下弋陽殘霞昏日樹蒼蒼呉谿漫汗干將劍却是猿聲斷客腸題秀師影堂隂隂古寺山松下記得長明一熖燈盡日看山人不見影堂中是别來僧贈李修源岳陽新尉曉衙叅却是傍人意未甘昨夜與君思賈誼長沙猶在洞庭南𤓰州聞曉角寒耿稀星照碧霄月樓吹角夜江遥五更人起烟霜静一曲殘聲遍落潮元日仗文武千官嵗仗兵萬方同軌奏昇平上皇一御含元殿丹鳳門開白日明連昌宮龍鳳旌旗雨露飄玉樓吹斷碧山遥𤣥宗上馬太真去紅樹滿園香自銷正月十五夜燈千門開鎻萬燈明正月中旬動帝京三百内人連袖舞一時天上著詞聲上已樂猩猩血綵繫頭標天上齊聲舉畫橈却是内人爭意切六官紅袖一時招千秋樂八月平時花蕚樓萬方同樂是千秋傾城人看長竿出一技初成趙解愁春鶯囀興慶池南柳未開太真先把一枝梅内人已唱春鶯囀花下傞傞軟舞來大酺樂二首車駕東來值太平大酺三日洛陽城小兒一伎竿頭絶天下呼傳萬嵗聲紫陌酺歸日欲斜紅塵開路薛王家雙鬟笑說樓前鼓兩仗爭輪好落花邠王小管虢國濳行韓國隨宜春深院映花枝金輿逺幸無人見偷把邠王小管吹李謨笛平時東幸洛陽城天樂宫中夜徹明無奈李謨偷曲譜酒樓吹笛是新聲寜哥來日映宫城霧半開太真簾下畏人猜黄翻綽指向西樹不信寜哥回馬來孟才人歎偶因歌態詠嬌嚬傳唱宫中十二春却為一聲河滿子下泉須弔舊才人鄴中懷古鄴中城下漳河水日夜東流莫記春腸斷宫中望陵處不堪臺上也無人讀杜員外秋娘詩年少多情杜牧之風流仍作杜秋詩可知不是長門閉也得相如第一詞杭州開元寺牡丹濃艶初開小藥欄人人惆悵出長安風流却是錢塘寺不踏紅塵見牡丹招畫松石咫尺雲山便出塵我生長日自因循慿君畫取江南勝留向東齋伴老身平隂夏日作西來漸覺細塵紅擾擾舟車路向東可惜夏天明月夜土山前面障南風贈處士小徑上山山甚小每憐僧院笑僧襌人間莫道無難事二十年來已是𤣥邠娘羯鼔新教邠娘羯鼔成大酺初日最先呈冬兒指向貞貞說一曲乾鳴兩杖輕退宫人二首開元皇帝掌中憐流落人間二十年長說承天門上宴百官樓下拾金錢歌喉漸退出宫闈泣話伶官上許歸猶說入時歡聖壽内人初着五方衣耍娘歌宜春花夜雪千枝妃子偷行上密隨便喚耍娘歌一曲六宫生老是蛾眉悖拏兒舞春風南内百花時道唱梁州急遍吹揭手便拈金椀舞上皇驚笑悖拏兒題靈徹上人舊房寂寞空門支道林滿堂詩板舊知音秋風吹葉古廊下一半繩牀燈影深晚秋潼關西門作日落寒郊烟物清古槐隂黑少人行關門西去華山色秦地東來河水聲贈内人禁門宫樹月痕過媚眼誰看宿燕窠斜拔玉釵燈影畔剔開紅熖救飛蛾洛中作元和天子昔平戎惆悵金輿尚未通盡日洛橋閒處看秋風時節上陽宫折楊柳枝二首莫折官前楊柳枝𤣥宗曾向笛中吹傷心日暮烟霞起無限春愁生翠眉凝碧池邊歛翠眉景陽樓下綰青絲那勝妃子朝元閣玉手和烟弄一枝華清宫四首風樹離離月稍明九天龍氣在華清宫門深鎻無人覺半夜雲中羯鼔聲天闕沉沉夜未央碧雲仙曲舞霓裳一聲玉笛向空盡月滿驪山宫漏長紅樹蕭蕭閣半開上皇曾幸此宫來至今風俗驪山下村笛猶吹阿濫堆水遶宫墻處處聲殘紅長緑露華清武皇一夕夢不覺十二玉樓空月明贈竇家小兒深緑衣裳小小人每來聴裏解相親天生合去雲霄上一尺松栽已出塵聴崔侍御葉家歌宛羅重縠起歌筵活鳳生花動碧烟一聲吹斷無人和觸破秋雲直上天長門怨日映宫墻柳色寒笙歌遥指碧雲端珠鈆滴盡無心語强把花枝冷笑看讀老莊等閒緝綴閒言語誇向時人喚作詩昨日偶拈莊老讀萬尋山上一毫釐偶題古來名下豈虛為李白顛狂自稱時唯恨世間無賀老謫仙長在没人知丁已仲冬江上作南來驅馬渡江濆消息前年此月聞唯是賈生先慟哭不堪天意重隂雲别玉華仙侣遶舎烟霞為四鄰寒泉白石日相親塵機不盡住不得珍重玉山山上人汴上送客河流西下鴈南飛楚客相逄淚濕衣張翰思歸何太切扁舟不住又東歸郵亭殘花雲暗山横日欲斜郵亭下馬對殘花自從身逐征西府每到花時不在家秋時送鄭侍御離鴻聲怨碧雲淨楚瑟調髙清曉天盡日相看俱不語西風揺落數枝蓮宿武牢關行人候曉久徘徊不待雞鳴未得開堪羡寒溪自無事潺潺一夜宿關來宿湓浦逄崔昇江流不動月西沉南北行人萬里心况是相逄鴈天夕星河寥落水雲深京城寓懐三十年持一釣竿偶隨書薦入長安由來不是求名者唯待春風看牡丹集靈臺二首日光斜照集靈臺紅樹花迎曉露開昨夜上皇新授籙太真含笑入簾來虢國夫人承主恩平明騎馬入金門却嫌脂粉汚顔色淡掃蛾眉朝至尊感歸行却江南路幾千歸來不把一文錢鄉人笑我窮寒鬼還似襄陽孟浩然偶作徧識青霄路上人相逄秪是語逡巡可勝飲盡江南酒嵗月猶殘李白身勸飲酒燒得硫黄漫學仙未勝長付酒家錢竇常不喫齊推藥却在人間八十年阿䳰湯月照宫城紅樹芳緑窻燈影在雕梁金輿未到長生殿妃子偷尋阿䳰湯馬嵬坡旌旗不整奈君何南去人稀北去多塵土已殘香粉艶荔枝猶到馬嵬坡太真香囊子蹙金妃子小花囊銷耗胷前結舊香誰為君王重解得一生遺恨繫心腸雨霖鈴雨霖鈴夜却歸秦猶見張徽一曲新長說上皇和淚教月明南内更無人聴歌二首兒郎漫說轉喉輕須待情來意自生只是眼前絲竹和大家聲裏唱新聲十二年前邊塞行坐中無語歎歌情不堪昨夜先垂淚西去陽關第一聲聴箏十指纎纎玉筍紅鴈行輕遏翠絃中分明似說長城苦水咽雲寒一夜風王家琵琶金屑檀槽玉腕明子絃輕撚為多情只愁拍盡凉州破畫出風雷是撥聲李家柘枝紅鉛拂臉細腰人金繡羅衫軟着身長恐舞時殘拍盡却思雲雨更無因楚州韋中丞箜篌千重鉤鎻撼金鈴萬顆真珠瀉玉瓶恰值滿堂人欲醉甲光纔觸一時醒邊上逢歌者垂老秋歌出塞庭遏雲相付舊秦青少年翻擲新聲盡却向人前側耳聴聴李簡上人吹蘆管二首細蘆僧管夜沉沉越鳥巴猿寄恨吟吹到耳邊聲盡處一條絲斷碧雲心月落江城樹繞鴉一聲蘆管是天涯分明西國人來說赤佛堂西是漢家塞上聞笛一夜梅花笛裏飛冷沙晴檻月光輝北風吹盡向何處髙入塞雲燕鴈稀經舊遊去年來送行人處依舊蟲聲古岸南斜日照谿雲影斷水葓花穗倒空潭東山寺寒色蒼蒼老柏風石苔清滑露光融半夜四山鐘磬盡水精宫殿月玲瓏峰頂寺月明如水山頭寺仰面看天石上行夜半深廊人語定一枝松動鶴來聲潤州鶴林寺古寺名僧多異時道情虛遣俗情悲千年鶴在市朝變來去舊山人不知勝上人山房清晝房廊山半開一瓶新汲灑莓苔古松百尺始生葉颯颯風聲天上來李夫人詞延年不語望三星莫說夫人上涕零爭奈世間惆悵在甘泉宫夜看圖形金陵渡金陵津渡小山樓一宿行人自可愁潮落夜江斜月裏兩三星火是𤓰洲過隂陵壯士悽惶到山下行人惆悵上山頭生前此路已迷失寂寞孤魂何處遊縱遊淮南十里長街市井連月明橋上看神仙人生只合揚州死襌智山光好墓田登樂遊原幾年詩酒滯江干水積雲重思萬端今日南方惆悵盡樂遊原上見長安過石頭城纍纍墟墓葬西原六代同歸蔓草根唯是嵗華流盡處石頭城下水千痕黄蜀葵名花八月嫩黄金色照書窻透竹林無奈羙人閒把嗅直疑檀口印中心楊花散亂隨風處處匀庭前幾日雪花新無端惹着潘郎鬢驚殺緑窻紅粉人薔薇花曉風抹盡燕支顆夜雨催成蜀錦機當晝開時正明媚故鄉疑是買臣歸戲顔郎中獵忽聞射獵出軍城人着戎衣馬帶纓倒把角弓呈一箭滿川狐兎當頭行失鷺鷥李歸唐惜養從來歳月深開籠不見意沉吟也知祗在秋江上明月蘆花何處尋伍相廟常雅蒼蒼古廟映林巒羃羃烟霞覆石壇精魄不知何處在威風猶入浙江寒贈玉簫韋臯黃雀銜來已數春别時畱醉贈佳人長江不見魚書至為遣相思夢入秦題黃花驛薛逢孤戍迢迢蜀路長鳥鳴山館客思鄉更看絶頂烟霞外數樹􅑐花照夕陽凉州詞昨夜蕃軍報國讐沙州都䕶破凉州黄河九曲今歸漢塞外縱横戰血流觀獵馬縮寒毛鷹落臕角弓初暖箭新調平原􅂿盡無禽出竟日飜身望碧霄狼烟三道狼烟過磧來受降城上探旗開傳聲却報邊無事自是官軍入抄回俠少年緑眼鶬鷹踏錦韝五花騘馬白貂裘往來三市無人識倒把金鞭上酒樓感塞滿塞旌旗鎮上游各分天子一方憂無因得見哥舒翰可惜西山十八州聴曹剛彈琵琶禁曲新飜下玉都四絃掁觸五音殊不知天上彈多少金鳳銜花尾半無定山寺十里松蘿映碧苔一川晴色鏡中開遙聞上界飜經處片片香雲出院來夢入瓊臺許瀍曉入瑶臺露氣清天風飛下歩虛聲塵心未盡俗縁在十里下山空月明題襌窟寺陳季卿霜鐘鳴時夕風急亂鴉又望寒林集此時輟棹悲且吟獨對蓮華一峰立詠篙水濺妓衣裴䖍餘滿額蛾黃金縷衣翠翹浮動玉釵垂從教水濺羅裙濕知道巫山行雨歸浪淘沙二首皇甫松灘頭細草接踈林浪惡罾船半欲沉宿鷺眠洲非舊浦去年沙觜是江心蠻歌荳䓻北人愁松雨蒲風野艇秋浪起鵁鶄眠不得寒沙細細入江流萬首唐人絶句巻四十三
