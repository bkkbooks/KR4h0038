body:
  text: 萬首唐人絶句巻七十一宋洪邁編七言獄中聞駕幸長安二首沈佺期傳聞聖㫖向神京誰念覊囚滯洛城扈從由來是方朔為申寃氣在長平無事今朝來下獄誰期十月見横河君看鷹隼俱罷擊為報蜘蛛收網羅奉和幸韋嗣立莊東山朝日翠屏開北闕晴空綵仗來喜遇天文七曜動少微今夜入三台夜宴安樂公主宅濯龍門外主家親鳴鳯樓中天上人自有金杯迎甲夜還將綺席代陽春餞唐永昌洛陽舊有神明宰輦轂由來天地中餘邑政成何足貴因君取則四方同駕幸新豐温泉三首上官昭容三冬季月景龍年萬乘觀風出㶚川遥看電躍金為馬逈矚霜原玉作田鸞旗掣曵拂空回羽騎驂驔躡景來隠隠驪山雲外聳迢迢御帳日邊開翠幕朱帷敞月營金罍玉斚泛蘭英歳歳年年常扈蹕長長乆乆樂承平和聖製幸韋嗣立莊劉憲非吏非隱晉尚書一丘一壑降乘輿天藻縁情兩曜合山巵獻壽萬年餘賦袚褉桃花欲落梅條長沙頭水上足風光此時御蹕來游處願奉年年袚褉觴和聖製幸韋嗣立莊趙彦昭廊廟心存巖壑中鑾輿曯在㶚城東逍遥自有䝉莊子漢主徒言河上公從宴桃花園紅蕚競燃春苑曙粉茸新吐御筵開長年願奉西王宴近侍慚無東朔才奉和幸韋嗣立宅武平一鳴鑾奕奕下重樓羽蓋逍遥向一丘漢日唯聞白衣寵唐年更覩赤松游公主宅夜宴王孫帝女下仙臺金牓珠簾入夜開遽惜瓊筵懽正洽唯愁銀箭曉相催餞唐永昌聞君墨綬出丹墀雙舄飛來佇有期寄謝銅街攀桞日無忘粉署握蘭時從宴桃花園李嶠歲去無言忽憔悴時來含笑吐氛氲不能擁路迷仙客故欲開蹊待聖君奉和幸韋嗣立莊萬騎千官擁帝車八龍三馬訪仙家鳯凰原上窺青璧鸚鵡杯中弄紫霞奉和遊苑遇雪㪚漫祥雲逐聖回飄颻瑞雪遶天來不能落後爭飛絮故欲迎前定早梅長寧公主宅流杯三首景龍文館學士沁水田園先自多齊城樓觀更無過倩語張騫莫辛苦人今從此識天河參差碧岫聳蓮花潺湲緑水瑩金沙何須逺訪三山路而今已到九仙家慿高瞰逈足怡心菌閣桃源不暇尋餘雪依林成玉樹殘霙㸃岫即瑶岑奉和幸韋嗣立莊崔湜竹逕桃源本出塵松軒茅棟别驚新御蹕何須林下駐山公不是俗中人幸韋嗣立莊李乂曲榭回廊繞澗幽飛泉濆水溢池流秪應感發明王夢遂得邀迎聖主遊侍宴桃花園綺蕚成蹊遍籞芳紅英撲地滿庭香莫將秋宴傳王母來比春華奉聖皇宴公主宅牽牛南度象昭回學鳯樓成帝女來平旦鵷鸞歌舞席方宵鸚鵡獻酬杯餞唐永昌田郎才貎出咸京潘子文華向洛城願以深心留善政當令強項謝高名公主宅夜宴岑羲金牓重樓開夜扉瓊筵愛客未言歸銜歡不覺銀河曉盡醉那知玉漏晞公主宅夜宴盧藏用侯家主第一時新上席花年不惜春珠缸綴月那知夜玉斚流霞底畏晨餞唐永昌徐彦伯金谿碧水玉潭砂鳬舄翩翩弄日華鬬雞香陌行春倦為摘東園桃李花公主宅夜宴李逈秀金牓岧嶤雲裏開玉簫參差天際回莫驚側弁還歸路只為平陽歌舞催公主宅夜宴崔日用銀燭金屏坐碧堂只言河漢動神光主家盛時歡不極才子能歌夜未央餞唐永昌洛陽桴鼓今不鳴朝野咸推重少平冬至氷霜俱怨别春來花鳥共為情公主宅夜宴蘇頲車如流水馬如龍仙史高臺十二重天上初移衡漢匹可憐歌舞夜相從公主宅夜宴馬懐素鳯樓䆗窱凌三襲翠幌玲瓏瞰九衢複道中宵留宴衎彌令上客想踟蹰餞唐永昌聞君出宰洛陽隅賓友稱觴餞路衢别後相思在何處秪應闕下望仙鳬公主宅夜宴韋元旦主第新成銀作牓賓筵廣宴玉為樓壺觴既卜仙人夜歌舞疑停織女秋公主宅夜宴李適銀河半倚鳯凰臺玉酒相傳鸚鵡杯若見君平須借問仙槎一去幾時來餞唐永昌聞道飛鳬向洛陽翩翩矯翮度文昌因聲寄意三花樹少室巖前幾過香公主宅夜宴薛稷秦樓夜宴月徘徊妓筵銀燭滿庭開坐中香氣排花出扇後歌聲逐酒來餞唐永昌河洛風煙壯市朝送君飛鳬去漸遥更思明年桃李月花紅水緑宴浮橋公主宅夜宴閻朝隱鳯凰鳴舞樂昌年蠟燭花開夜管絃半醉徐擊珊瑚樹已聞鐘漏曉聲傳餞唐永昌洛陽難理若棼絲椎破連環定不疑鸚鵡休言秦地樂回頭一顧一相思餞唐永昌徐堅郎官出宰赴伊瀍征傳駸駸㶚水前此時悵望新豐道握手相看共黯然代書問費徴君九華事蕭建見説九華峰上寺日宫猶在下方開其中幽境客難到請為詩中圖畵來晴望九華山楊鴻九華閒望簇青虛氣象羣峰盡不如怊悵南朝挂冠吏無人解向此山居海棠二首呉融太尉園林兩樹春年年奔走探花人今來獨傍荆山看回首長安落戰塵雪綻霞舖錦水頭占春顔色最風流若教更近天街種馬上多逢醉五侯上鮑大夫崔子尚行盡江南塞北時無人不誦鮑家詩東堂桂樹何年拆直至如今少一枝寄前黄州竇使君趙嘏池上笙歌寂不聞樓中愁殺碧虛雲玉壺凝盡重重淚寄與風流舊使君木蘭花李商隠洞庭波冷曉侵雲日日征帆送逺人㡬度木蘭舟上望不知原是此花身明神明神司過豈令寃暗室由來有禍門莫為無人欺一物他時湏慮石能言五松驛獨下長亭念過秦五松不見見輿薪只應既斬斯髙後尋被樵人用斧斤嘉興社日消渴天涯寄病身臨卭知我是何人今年社日分餘肉不值陳平又不匀漁父引二首李夢符村寺鐘聲渡逺灘半輪殘月落前山徐徐撥棹却歸去浪疊朝霞碎錦翻漁弟漁兄喜到來婆官賽却坐江隈椰榆杓子瘤杯酒爛煑鱸魚滿案堆夢仙謡沈彬玉殿大開從客入金桃爛熟沒人偷鳯驚寳扇頻翻翅龍懼金鞭不轉頭西山吟許大自從明府歸仙後出入塵寰直至今不是藏名混時俗賣柴沽酒要安心栁李紳千條垂栁拂金絲日暖牽風葉學眉愁見花飛狂不定還同輕薄五陵兒牡丹唐彦謙青帝於君事分偏穠堆浮艷倚朱門雖然占得笙歌地將甚酬他雨露恩贈别宣州崔羣相公杜牧哀散相逢洛水邊却思同在紫微天盡將舟楫板橋去早晚歸來更濟川陪吕使君樓上夜看花段𢎞古城上芳園花滿枝城頭太守夜看時為報林中高舉燭感人情思欲題詩示小弟吕温憶吾未冠賞年華二十年間在咄嗟今來羡汝看花歳似汝追思昨日花讀勾踐傳丈夫可殺不可羞如何送我海西頭更生更聚終須報二十年間死即休華山遊人毛女正美曾拆松枝為寶櫛又編栗葉代羅襦有時問却秦宫事笑撚仙花望太虛濟源寒食五首在前孟郊莓苔井上空相憶轆轤索斷無消息酒人皆倚春髪緑病叟獨藏秋髪白蜜蠭為主各磨牙咬盡村中萬木花君家甕甕今應滿五色冬籠甚可誇哭李丹生死方知交態存忍將齚齖報幽魂十年同在平原客更遣何人哭寢門贈賈島韓愈孟郊死葬北邙山從此風雲得暫閒世上不教才子絶更生賈島着人間贈譯經僧萬里休言道路賖有誰教汝渡流沙只今中國方多事不用無端更亂華襄陽為盧竇紀事二首元稹帝下眞符召玉眞偶逢游子暫相親素書三巻留為贈從向人間説向人花枝臨水復臨堤閒照江流亦照泥千萬春風好擡舉夜來曾有鳯凰棲漢上偶題李涉謫仙唐世游兹郡花下聽歌醉眼迷今日漢江煙樹盡更無人唱白銅鞮題杭州樟亭驛章孝標樟亭驛上題詩客一半尋為山下塵世事日隨流水去紅花還似白頭人添聲楊柳枝詞裴諴思量大是惡姻縁只得相看不得憐願作琵琶槽那畔美人長抱在胷前收襄陽城二首戎昱悲風慘慘雨脩脩峴北山低草木愁暗發前軍連夜戰平明旌斾入襄州五雲飛將擁霜戈百里僵屍滿濜河日暮歸來看劒血將軍却恨殺人多戲張道人不飲酒顔蕘言自雲山訪我來毎聞竒祕覺叨陪吾師不飲人間酒應待流霞即舉杯白菊三首司空圖不疑陶令是狂生作賦其如有定情猶勝江南隱居士詩魔終嫋負孤名自古詩人少顯榮逃名何用更題名詩中有慮猶須戒莫向詩中著不平登高可美少年塲白菊堆邊髩似霜不筭更希沾上藥今朝第七十重陽漫書樂退安貧知是分成家報國亦何慚到還僧院心期在瑟瑟澄鮮百丈潭雜題二首棊局長携上釣船殺中棊殺勝絲牽洪罏任鑄千鈞鼎只在磻溪一縷懸曉鏡高窻氣象深自憐清格笑塵心世間不為蛾眉悞海上方應鶴背吟杏花詩家偏為此傷情品韻由來莫與爭解笑亦應兼解語只應慵語倩鶯聲楊柳枝二首陶家五柳簇衡門還闕高情愛此君何處更添詩境好新蟬欹枕每先聞數枝珍重蘸滄浪無限塵心暫免忙煩暑若和煙露裛便同佛手灑清涼修史亭二首少年已慣擲年光時節催驅獨不忙今日無疑亦無病前程無事擾醫王籬落輕寒整頓新雪晴屣步㑹諸鄰自從南至歌風頂始見人煙外有人正月七日立春羅隱一二三四五六七萬物生芽是今日逺天歸鴈拂雲飛近水遊魚迸冰出春風也知有意吹噓切爭奈人間善惡分但是粃糠微細物等閒擡舉到青雲杏花暖氣濳催次第春梅花已謝杏花新半開半落閒園裏何異榮枯世上人中秋不見月風簾淅淅漏燈㾗一半秋光此夕分天為素娥孀怨苦併教西北起浮雲感弄猴人賜朱紱十二三年就試期五湖煙月奈相違何如買取猢孫弄一笑君王便着緋鎮海軍所貢筵前飛雪扇前塵千里移添上苑春他日丁寜柿林院莫宣恩澤與閒人席上歌水調餘聲宛宛拂庭梅通濟渠邊去又回若使煬皇魂魄在為君應合過江來宿金山寺根盤蛟蜃路藤蘿四靣無塵輟棹過得似吾師始惆悵眼前終日有風波龜山寺晚望張蠙四靣湖光絶路岐鸊鵜飛處暮鐘時魚舟不用懸㠶席歸去乘風挿柳枝華山孤松石罅引根非土力冐寒猶助嶽蓮光緑槐生在膏腴地可得無心拒雪霜宿天竺寺嚴維方外主人名道林怕將水月淨身心居然對我説無我寂歷山深將夜深萬首唐人絶句巻七十一
