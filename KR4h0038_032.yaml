body:
  text: 萬首唐人絶句巻三十二宋洪邁編七言涼風亭睡覺裴度飽食緩行新睡覺一甌新茗侍兒煎脱巾斜倚繩牀坐風送水聲來耳邊雪中訝諸公不相訪憶昨雨多泥又深猶能携妓逺過尋滿空亂雪花相似何事居然無賞心春興武元衡楊栁陰陰細雨晴殘花落盡見流鶯春風一夜吹鄉夢夢逐春風到洛城酬裴起居西亭留贈艶歌能起闗山恨紅燭偏凝寒塞情況是池塘風雨夜不堪絲管盡離聲送張司録赴京江南煙雨塞鴻飛西府文章謝掾歸相送汀洲蘭杜晚菱歌一曲淚沾衣宿青陽驛空山揺落三秋暮螢過踈簾月露圑寂寞孤燈愁不寐蕭蕭風竹夜窻寒送盧起居相如擁傳有光輝何事闌干淚濕衣舊府東山餘妓在重將歌舞送君歸送張諫議漢庭從事五人來白首疆場獨未囘今日送君䰟斷處寒江寥落數枝梅題嘉陵驛悠悠風斾繞山川山驛空䝉雨似煙路半嘉陵頭已白蜀門西更上青天送栁郎中望鄉臺下秦人去學射山中杜魄哀落日河橋千騎别春風寂寞斾旌囘春日偶題山川百戰古刀州龍節來分聖主憂靜守化條無一事春風獨上望京樓聽歌月上重樓絲管秋佳人夜唱古梁州滿堂誰是知音者不惜千金與莫愁唐昌玉蘂花琪樹年年玉蘂新洞宫長閉綵霞春日暮落英鋪地雪獻花無復九天人送李侍御之鳯翔栁暗花明池上山髙樓歌酒換離顔他時欲寄相思字何處黄雲是隴闗贈佳人二首步揺金翠玉搔頭傾國傾城勝莫愁若逞仙姿游洛浦定知神女謝風流林鶯一哢四時春蟬翼羅衣白玉人曾逐使君歌舞地清聲長咽翠眉顰送魏正則擢第歸江陵商山路接玉山深古木蒼然晝合陰㑹府登筵君最少江城秋至肯驚心登闔閭古城登髙逺望自傷情栁發花開映古城全盛已隨流水去黄鸝空囀舊春聲山居身依泉壑將時背路入煙蘿得地深終嵗不知城廓事手栽松竹盡成陰夜雨憶郭通微桃源未去阻風塵世事悠悠又遇春雨滴閒階清夜久焚香偏憶白雲人送嚴秀才灞滻别離腸已斷江山迢遞信仍稀送君偏下臨岐淚家在南州身未歸春亭雪夜寄西鄰二舍人廣庭飛雪對愁人寒谷由來不惜春却笑山陰乗興夜何如今日戴家鄰酬韋冑曹相逢異縣蹉跎意無復少年容易歡桃李美人攀折盡何如松栢四時寒同幕府夜宴惜花二首芳草落花明月榭朝雲暮雨錦城春莫愁紅艶風前散自有青娥鏡裏人五侯門館百花繁紅燭揺風白雪翻不似鳯凰池畔見飄揚今隔上林園詶韋冑曹登天長寺見寄青門幾度沾襟淚併在東林雪外峯今日重煩相憶處春光知遶鳯池濃陌上暮春青青南陌栁如絲栁色鶯聲晚日遲何處最傷游客思春風三月落花時春日偶作飛花寂寞燕雙雙南客衡門對楚江惆悵管絃何處發春風吹到讀書窻春暮寄杜嘉興兄弟栁色千家與萬家輕風細雨落殘花數枝瓊玉無由見空掩柴扉度嵗華渡淮暮濤凝雪長淮水細雨飛梅五月天行子不須愁夜泊緑揚多處有人煙訪裴校書不遇梨花落盡栁花時庭樹流鶯日過遲幾度相思不相見春風何處有佳期秋原寓目木落風髙天宇曠秋原一望思悠哉邊城今足射鵰騎連鴈嗷嗷何處來立秋華原南館别二客風入泥陽池館秋片雲孤鶴兩難留明朝獨向青山郭唯有蟬聲催白頭代佳人贈張郎中洛陽佳麗本神仙冰雪顔容桃李年心愛阮郎留不住獨將珠淚濕紅鈆送嚴侍御赴黔中武陵源在朗江東流水飛花仙洞中莫問阮郎千古事緑楊歸處翠霞空使次盤豆驛望永樂縣山川不記何年别城郭應非昔所經欲駐征車終日望大河雲雨晦冥冥餞裴行軍赴朝命三首三年同看錦城花銀燭連宵照綺霞報國從來先意氣臨岐不用重咨嗟珠履三千醉不歡玉人猶若飲冰寒送君空有無言淚足下闗山行路難來時聖主假光輝心恃朝恩計日歸誰料忽成雲雨别獨將邊淚灑戎衣緱山道中秋山寂寞秋水清寒郊木葉飛無聲王子白雲仙去久洛濵行客夜吹笙嵗暮送舍人使京邊城嵗盡望鄉闗身逐戎旌未得還欲别臨岐無限淚故園花發寄君攀寓興二月楊花飛滿空飄颻十里雪如風不知何處香醪熟願醉潘園芳樹中塞上春懐東風河外五城喧南客征袍滿淚痕愁至獨登髙處望藹然雲樹重傷䰟塞外月夜寄荆南熊侍御南依劉表北劉琨征戰年年簫鼓喧雲雨一乖千萬里長城秋月洞庭猿秋日經潼闗感寓昔年曾逐漢征東三授兵符百戰中力保山河嗟下世秋風牢落故營空贈歌人仙歌靜轉玉簫催疑是流鶯禁苑來它日相思夢巫峽莫教雲雨晦陽臺鄂渚送人雲帆渺渺巴陵渡煙樹蒼蒼故郢城江上梅花無數發送君南浦不勝情和韋常侍孤雲永日自徘徊巖館蒼蒼遍緑苔望苑忽驚新詔下彩鸞歸處玉籠開送崔舍人二首赤墀同拜紫泥封四牡連徴待九重唯有白鬚張司馬不言名利尚相從芳郊欲别闌干淚故國難期聚散雲分手更逢江館暮馬嘶猿呌不堪聞單于罷戰却歸題善陽館單于南過善陽闗身逐歸雲到處閒曽是五年蓮府客每聞戰士哭陰山學仙難玉殿笙歌漢帝愁鸞龍儼駕望瀛洲黄金化盡方士死青天欲上無縁由春晚聞鶯寂寂蘭臺曉夢驚緑林殘月思孤鶯猶疑蜀魄千年恨化作寃禽萬囀聲聞嚴秘書與諸客夜㑹衡門寥落嵗陰窮露濕莓苔葉厭風聞道今宵阮家㑹竹林明月七人同聞王仲周所居牡丹花發戱贈聞説亭花秀暮春長安才子看須頻花開花落無人見借問何人是主人酬王三八見招王昌家直在城東落盡林花昨夜風多興不辭千日醉隨君走馬向新豐贈送麻衣如雪一枝梅笑掩微䊋入夢來若到越溪逢越女紅蓮池裏白蓮開見郭侍郎題壁萬里楓江偶問程青苔壁上故人名悠悠身世恨南北一别十年空復情郊舍寓目晨趨禁掖暮郊園九陌蒼蒼煙露繁明月上時羣動息雪峯髙處正當門單于曉角蕃兒吹角漢城頭月皎霜寒大漠秋三奏未終天便曉何人不起望鄉愁汴州聞角何處金笳月裏悲悠悠邊客夢先知單于城上闗山曲今日中原總解吹送白將軍紅燭芳筵惜夜分歌樓管咽思難聞早知怨别人閒在不下青山老白雲題李將軍林亭落英飄蘂雪紛紛啼鳥如悲霍冠軍逝水不囘絃管絶玉樓迢遞鎻浮雲送崔總赴池州春風絲管怨津樓三奏行人醉不留别後相思江一岸落花飛處杜䳌愁贈圎明上人李徳裕逺公説易長松下龍樹雙經海藏中今日導師聞佛慧始知前路化成空贈奉律上人知君學地厭多聞廣度羣生出世氛飯色不應殊寳器樹香皆遣入禪薫長安秋夜内官傳詔問戎機載筆金鑾夜始歸萬户千門皆寂寂月中清露㸃朝衣懐京國海上東風犯雪來臘前先拆鏡湖梅遥思禁苑青春夜坐待宫人畫詔囘登崖州城作獨上髙樓望帝京鳥飛猶是半年程青山似欲留人住百匝千遭遶郡城伊川晚望桑葉初黄梨葉紅伊川落日盡無風漢儲何假終南客甪里先生在谷中寄茅山孫鍊師二首石上溪蓀發紫茸碧山幽靄水溶溶菖花定是無人見春日惟應羽客逢獨尋蘭渚翫遲暉閒倚松窻望翠微遙想春山明月曉玉壇清磬步虛歸上巳日憶江南禊事黄河西繞郡城流上巳應無祓禊遊為憶渌江春水色更隨宵夢向吳洲重到惠山二首李紳碧峯依舊松筠老重得經過已白頭俱是海天黄葉信兩逢霜節菊花秋望中白鶴憐歸翼行處青苔恨昔遊還向竹窻名姓下數行添記别離愁答章孝標假金方用真金鍍若是真金不鍍金十載長安得一第何須空腹用髙心來詩有金湯鍍了之句朱槿花瘴煙長暖無霜雪槿艶繁花滿樹紅每歎芳菲四時厭不知開落有春風至潭州聞猿昔陪天上三清客今作端州萬里人湘浦更聞猿夜嘯斷腸無淚可沾巾江亭瘴江昏霧連天合欲作家書更斷腸今日病身悲狀候豈能埋骨向炎荒紅蕉花紅蕉花様炎方識瘴水溪邊色最深葉滿叢深殷似火不唯燒眼更燒身憶漢月花開花落無時節春去春來有底憑燕子不藏雷不蟄燭煙昏霧暗騰騰端州江亭得家書二首雨中鵲語喧江樹風處蛛絲颺水潯開拆逺書何事喜數行家信抵千金長安别日春風早嶺外今來白露秋莫道淮南悲木葉不聞揺落更堪愁聞猿見説三聲巴峽深此時行者盡沾襟端州江口連雲處始信哀猿傷客心贈韋金吾自報金吾主禁兵腰間寳劒重横行接輿也是狂歌客更就將軍乞一聲長門怨劉皁亦有宫殿沉沉曉欲分昭陽更漏不堪聞珊瑚枕上千行淚不是思君是恨君宿昭應此是顧況詩武帝祈靈太一壇新豐樹色繞千官那知今夜長生殿獨閉空山月影寒龜山寺魚池汲水添池活白蓮十年鬐鬣盡生天凡庸不識慈悲意自葬江魚入九泉却望無錫芙蓉湖五首水寛山逺煙嵐迥栁岸縈囘在碧流清晝不風鳬鴈少却疑初夢鏡湖秋丹橘村邊燭火微碧波明處鴈初飛蕭條落日埀楊岸隔水寥寥聞搗衣逐波雲采參差逺背日嵐光隱見深猶似望中連海樹月生湖上是山陰舊山認得煙嵐近湖水平鋪碧岫間喜見雲泉還悵望自慙山叟不歸山翠崖幽谷分明處倦鳥歸雲在眼前惆悵白頭為四老逺隨塵土去伊川栁陶令門前罥接籬亞夫營裏拂朱旗人事推移無舊物年年春至緑埀絲題惠照寺二首王播三十年前此院游木蘭花發院新修如今再到經行處樹老無花僧白頭上堂已了各西東慙愧闍梨飯後鐘三十年來塵撲面如今始得碧紗籠題李處士山居楊嗣復卧龍決起為時君寂寞康廬唯白雲今日仲容修故業草堂焉敢更移文謝寄新茶石上生牙二月中䝉山顧渚莫爭雄封題寄與楊司馬應為前銜是相公詠架上鷹崔鉉天邊心膽架頭身欲擬飛騰未有因萬里碧霄終一去不知誰是解絛人待漏院吟劉鄴玉堂簾外獨遲遲明月初沉勘契時閒聼景陽鐘盡後兩鶯飛上萬年枝萬首唐人絶句巻三十二
