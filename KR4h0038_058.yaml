body:
  text: 萬首唐人絶句巻五十八宋洪邁編七言暮春對柳二首司空圖縈愁惹恨奈楊花閉户垂簾亦滿家惱得閒人作酒病剛湏又撲越溪茶洞中猶説看桃花輕絮狂飛自俗家正是階前開逺信小娥旋拂碾新茶戊午三月晦二首隨風逐浪劇蓬萍圓首何曾觧最靈筆硯近來多自棄不闗妖氣暗文星牛誇棊品無勍敵謝占詩家作上流豈似小敷春水漲年年鸞鶴待仙舟偶書五首情知了得未如僧客處高樓莫强登鶯也觧啼花也發不闗心事最堪憎自有池荷作扇揺不闗風動愛芭蕉只憐直上抽紅蘂似我丹心向本朝曾看輕舟渡逺津無風着岸不經旬只縁命蹇湏知命却是人爭阻得人上谷何曾觧有情有情人自惜君行證因池上今生願的的他生作化生新店南原後夜程黄河風浪信難平渡頭楊柳知人意為惹官船莫放行喜山鵲初歸三首翠衿紅嘴便知機乆避重羅穏處飛只為從來偏䕶惜忩前今賀主人歸山中只是惜珍禽語不分明識爾心若使觧言天下事燕臺今築幾千金阻他羅網到柴扉不奈偷倉雀轉肥賴爾林塘添景趣剰留山果引教歸虞鄉北原澤北村貧煙火獰稚田冬旱倩牛耕老人惆悵逢人訴開盡黄花麥未金洛中三首秋風團扇未驚心笑看䊋臺落葉侵繡鳯不教金縷暗青樓何處有寒砧不用頻嗟世路難浮生各自繫悲懽風霜一夜添覉思羅綺誰家待早寒燕巢空後誰相伴鴛被縫來不忍薫薄命敢辭長滴淚倡家未必肯留君寓筆年年鑷鬢到花飄依舊花繁鬢易凋撩亂一塲人更恨春風誰道勝輕飈戲題試衫朝班盡説人宜紫洞府應無鶴着緋從此玉皇湏破例染霞裁賜地仙衣汴柳半枯因悲柳中隠行人莫歎前朝樹已占河堤幾百春惆悵題詩柳中隠柳衰猶在自無身上方花落更同悲木落鶯聲相續即蟬聲榮枯了得無多事只是閒人漫繫情寄王贊學黄巻不闗兼濟美青山自保老閒身一行萬里纎塵静可要張儀更入秦新節轉悲新歲重於山不似輕鷗肯復還朱紱縱教金印換青雲未勝白頭閒自河西歸山二首一水悠悠一葉危徃來長恨阻歸期鄉闗不是無華表自為多驚獨上遲水濶風驚去路危孤舟欲上更遲遲鶴羣長繞三珠樹不借閒人一隻騎王官二首風荷似醉和花舞沙鳥無情伴客閒總是此中皆有恨更堪微雨半遮山荷塘煙罩小齋虚景物皆宜入畫圖盡日無人只高卧一雙白鳥隔紗㡡賀翰林侍郎二首太白東歸鶴背吟鏡湖空在酒船沉今朝忽見銀臺事早晚重徴入翰林玉版徴書洞裏看沈羲新拜侍郎官文星喜氣連台曜聖主方知四海安寄三十三四舍人幾年汶上約同遊擬為蓮峰别置樓今日鳯凰池畔客五千仞雪不回頭綸閣有感風濤曾阻化鱗來誰料蓬瀛路却開欲去遲遲還自笑狂才應不是仙才寄薛起居小域新銜賀聖朝亦知蹇分巧難抛麤才自合無岐路不破工夫漫觧嘲古宫怨王建亂烏啞啞飛復啼宫頭晨夕宫中棲吳王别殿繞江水後宫不開美人死祝鵲神鵲神鵲好言語行人早回多利􅀈我今庭中栽好樹與汝作巢當報汝海人謡海人無家海裏住採珠殺象為歲賦惡波横天山塞路未央宫中常滿庫兩頭纎纎兩頭纎纎青玉玦半白半黑頭上髪腷腷膊膊春冰裂磊磊落落桃花結看碁彼此抽先局勢平傍人道死的還生兩邉對坐無言語盡日時聞下子聲設酒寄獨孤少府自看和釀一依方縁看松花色較黄不分君家新酒熟好詩収得被回將新授戒尼師新短方裙疊作稜聽鐘洗鉢繞青蠅自知戒相分明後先出壇塲禮大僧于宅看花小葉稠枝粉壓摧暖風吹動鶴翎開若無别事為留難抛却貧家宿看來元太守同遊七泉寺盤磴廻廊古塔深紫芝紅藥入雲尋晚吹簫管秋山裏引得獮猴出象林望定州寺回看佛閣青山半三四年前到上頭省得老僧留不住重尋可更有因由道中寄杜書記西南東北暮天斜巴字江邉楚樹花珍重荆州杜書記閒時多在廣師家聽琴無事此身離白雲松風溪水不曾聞至心聽着仙翁引今看青山圍繞君贈陳評事識君雖向歌鐘㑹説事不離雲水間春夜酒醒長起坐燈前一紙洞庭山寄畫松僧天香寺裏古松僧不畫枯松落石層最愛臨江兩三樹水禽棲處觧無藤花褐裘對織芭蕉雪毳新長縫雙袖窄裁身到頭湏向邉城着消殺秋風稱獵塵夜看美人宫棊宫棊布局不依經黒白分明子數停廵拾玉沙天漢曉猶殘織女兩三星上田僕射一方新地隔河煙曾接諸生聽管弦却憶去年寒食會看花猶在水堂前樓前天寳年前勤政樓每年三日作韆鞦飛龍老馬曾教舞聞着音聲忽舉頭聽雨半夏思家睡裏愁雨聲落落屋簷頭照泥星出依前黒淹爛庭花不肯休冬至後招于秀才日近山紅暖氣新一陽先入御溝春聞閒立馬重來此沐浴明年稱意身送人歸丹陽江城柳色海門煙欲到茅山始下船知道君家當瀑布菖蒲潭在草堂前春早聞鶯侵黒行飛一兩聲春寒囀小未分明若教更觧諸餘語應向宫花不惜情題石甕寺天宫連内繞丹巖塵盖雲間落數帆遥指上皇飜曲處百官題字滿西嵌寄張博士春明門外作卑官病友經年不得看莫道長安近于日升天却易到城難太和公主和蕃塞黒雲黄欲渡河風沙昧眼雪相和琵琶淚濕行聲小斷得人腸不在多舊宫人先帝舊宫宫女在亂絲猶挿鳯凰釵霓裳法曲渾抛却獨自花間掃玉階新晴後夏夜新晴星較少雨收殘水入天河簷前着熱衣裳坐風冷渾無撲火蛾寄薛濤校書萬里橋邉女校書琵琶花裏寄閒居掃眉才子無多少管領春風總不如長門燭秋夜牀前蠟燭微銅壺滴盡曉鐘遲殘光欲滅還吹着年少宫人不睡時樂府辭二十五首伊州歌五首蓋嘉運秋風明月獨離居蕩子從戎十載餘征人去日殷勤囑歸雁來時數寄書彤闈曉闢萬鞍回玉輅春遊薄晚開渭北清光揺草樹南洲佳景入樓臺千門今夜曉初晴萬里天河徹帝京燦燦繁星駕秋色稜稜霜氣韻鐘聲長安二月柳依依西出流沙路漸微閼氏山上春光少相府邉廷驛使稀三秋大漠冷溪山八月嚴霜變草顔捲斾風行宵渡磧銜枚電掃曉應還捉拍睦州西去輪臺萬里餘故鄉音耗日應踈隴山鸚鵡能言語為報閨人數寄書水調歌七首平沙落日大荒西隴上明星高復低孤山幾處看烽火壯士連營候鼓鼙猛將闗西意氣多能騎駿馬弄琱戈金鞍寳鋏精神出倚笛新飜水調歌隴頭一斷氣長秋舉目蕭條總是愁秪為征人多下淚年年添作斷腸流細草河邉一雁飛黄龍闗裏掛戎衣為受明王恩寵甚從事經年不復歸昨夜邀歡出建章今朝徴賞度昭陽傳聲莫閉黄金屋為報先開白玉堂日晚笳聲咽戍樓隴雲漫漫水東流行人萬里向西去滿目闗山空自愁千年一遇聖明朝願對君王舞細腰乍可當熊任生死誰能伴鳯上雲霄涼州歌四首漢家宫裏柳如絲上苑桃花連碧池聖夀已傳千載酒天文更賞百僚詩朔風吹葉雁門秋萬里煙塵昏戍樓征馬長思青海北鳴笳夜聽隴山頭三秋陌上早霜飛羽獵平田淺草齊錦背蒼鷹初出按五花騘馬餵來肥鴛鴦殿裏笙歌起翡翠樓前出舞人喚上紫微三五夕聖明萬夀一千春突厥三臺雁門山上雁初飛馬邑欄中馬正肥日昨山西逢驛使殷勤南北送征衣蓋羅縫二首秦時明月漢時闗萬里征人尚未還但使龍庭飛將在不教戎馬度隂山音書杜絶白狼西桃李無顔黄鳥啼寒雁春深歸去盡出門腸斷草淒淒雙帶子私言切切誰人㑹海燕雙飛繞畫梁君學秋胡不相識妾亦無心去採桑渭州亭亭孤月照行舟寂寂長河萬里流鄉國不知何處是雲山漠漠使人愁水鼓子雕弓白羽獵初回薄夜牛羊復下來夢水河邉秋草合黒山峰外陣雲開鍾西二首天邉物色更無春秪有牛羊與馬羣誰家營裏吹羌笛哀怨教人不忍聞歲去年來拜聖朝更無山闕對溪橋九門楊柳渾無半猶自千條與萬條雜詩無名氏青天無雲月如燭露泣梨花白如玉子規一夜啼到明美人獨在空房宿空賜羅衣不賜恩一燻香後一消魂雖然舞袖何時舞長對春風挹淚㾗不洗殘䊋並繡牀却嫌鸚鵡繡鴛鴦回針刺到雙飛處憶着征人淚數行眼想心思夢裏驚無人知我此時情不如池上鴛鴦鳥雙宿雙飛過一生一去遼陽繫夢魂忽傳征騎到中門紗忩不肯施紅粉徒遣蕭郎問淚㾗鶯啼露冷酒初醒罨畫樓西曉角鳴翠羽帳中人夢覺寳釵斜墜枕函聲滿目笙歌一叚空萬般離恨總隨風多情為謝殘陽意與展晴霞片片紅兩心不語暗知情燈下裁縫月下行行到堦前知未睡夜深聞放剪刀聲近寒食雨草萋萋着麥苖風柳映堤一是有家歸未得杜鵑休向耳邉啼洛陽才子鄰簫恨湘水佳人錦瑟愁今昔兩成惆悵事臨卭春盡暮江流浙江輕浪古悠悠望海樓吹望海愁莫怪鄉心隨魄斷十年為客在他州數日相隨兩不忘郎心如妾妾如郎出門便是東西路把取紅牋各斷腸無定河邉暮笛聲赫連臺畔旅人情函闗歸路千餘里一夕秋風白髪生舊山雖在不闗身且向長安過暮春一樹梨花一溪月不知今夜屬何人花落長川草色青暮山重疊雨溟溟逢春便覺飄蓬苦今日分離一涕零萬首唐人絶句巻五十八
