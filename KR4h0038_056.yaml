body:
  text: 萬首唐人絶句卷五十六宋洪邁編七言有感司空圖國事皆須救未然漢家髙閣漫凌煙功臣盡遣詞人贊不省滄洲畫魯連歌處處亭臺只壞牆軍營人學內人妝太平故事因君唱馬上曾聽隔教坊偈人若憎時我亦憎逃名最要是無能後生乞汝殘風月自作深林不語僧鸝不是流鶯獨占春林門綵翠四時新應知擬上屏風畫偏坐橫枝亦向人白菊雜書四首黃昏寒立更披襟露浥清香悅道心却笑誰家扄繡户正薰龍麝暖鴛衾四面雲屏一帶天是非斷得自翛然此生只是償詩債白菊開時最不眠狂才不足自英雄僕妾驅令學販春侯印幾人封萬户儂家只辦買孤峰黃鸝囀處誰同聽白菊開時且剩過漫道南朝足流品由來叔寶不宜多漫題經亂年年厭别離歌聲喜似太平時詞臣更有中興頌磨取蓮峰便作碑率題宦路前銜間不記醉鄉佳境興方濃一林髙竹長遮日四壁寒山更閏冬澗户澗户芳煙接水村亂來歸得道仍存數竿新竹當軒上不羡侯家立戟門故鄉杏花寄花寄酒喜新開左把花枝右把杯欲問花枝與杯酒故人何得不同來華下二首故國春歸未有涯小欄髙檻别人家五更惆悵回孤枕猶自殘燈照落花關外風昏欲雨天薺花耕倒枕河壖村南寂寞時回望一隻鴛鴦下渡船夢中幾多親愛在人間上徹霞梯會却還須是蓬瀛長買得一家同占作家山榜下三十功名志未伸初將文字競通津春風漫折一枝桂煙閣英雄笑殺人涔陽渡楚田人立帶殘暉驛逈村幽客路微兩岸蘆花正蕭颯渚煙深處白牛歸偶作索得身歸未保間亂來道在辱來頑留侯萬户雖無分病骨應消一片山寓居有感三首亦知世路薄忠貞不忍殘年負聖明只待東封沾慶賜碑隂别刻老臣名不放殘年却到家銜杯懶更問生涯河堤往往人相送一曲晴川隔蓼花黑鬚寄在白鬚生一度秋風減幾莖客處不堪頻送别無多情緒更傷情淮西鼇冠三山安海浪龍盤九鼎鎮皇都莫誇十萬兵威盛消箇忠良效順無河湟有感一自蕭關起戰塵河湟隔斷異鄉春漢兒盡作蕃兒語却向城頭罵漢人自鄖鄉北歸巴煙羃羃久縈恨楚栁綿綿今送歸回避江邉同去雁莫教驚起錯南飛青龍師安上人災曜偏臨許國人雨中衰菊病中身清香一炷知師意應為昭陵惜老臣山中凡鳥愛喧人靜處間雲似妬月明時世間萬事非吾事只愧秋來未有詩有感二首自古經綸足是非隂謀最忌奪天機留侯却粒商翁去甲第何人意氣歸古來賢俊共悲辛長是豪家拒要津從此當歌唯痛飲不須經世為間人間夜二首道侣難留為虐碁鄰家聞説厭吟詩前峰月照分明見夜合香中露卧時此身間得易為家業是吟詩與看花若使他生拋筆硯更應無事老煙霞雨中維摩居士陶居士盡説髙情未足誇簷外蓮峰階下菊碧蓮黃菊是吾家送道者二首洞天真侣昔曾逢西嶽今居第幾峰峰頂他時教我認相招須把碧芙蓉殷勤不為學燒金道侣惟應識此心雪裏千山訪君易微微鹿迹入深林重陽阻雨重陽阻雨獨銜杯移得家山菊未開猶勝登髙間望斷孤煙殘照馬嘶回省試粉闈深鎖唱同人正是終南雪霽春間繫長安千匹馬今朝似減六街塵有贈有詩有酒有髙歌春色年年奈我何試問羲和能駐否不勞頻借魯陽戈證因亭峰北幽亭願證因他生此地却容身上方僧在時應到笑認前銜記寫真頃年陪恩地赴甘棠之召感動留題去時憔悴青襟在歸路淒涼綘帳空無限酬恩心未展又將孤劒别從公九月八日已是人間寂寞花解憐寂寞傍貧家老來不得登髙看更甚殘春惜嵗華敷溪橋院有感昔嵗攀遊景物同藥爐今在鶴歸空青山滿眼淚堪碧絳帳無人花自紅寺閣昔嵗登臨未衰颯不知何事愛傷情今來攬鏡翻堪喜亂後霜鬚長幾莖武陵路橘岸舟間罾網挂茶坡日暖鷓鴣啼女郎指點行人笑知向花間路已迷南北史感遇十首雨淋麟閣名臣畫雪卧龍庭猛將碑不用黃金鑄侯印盡輸公子買蛾眉漢世頻封萬户侯雲臺空峻謝風流江南不有名儒相齒冷中原笑未休天風斡海怒長鯨永固南來百萬兵若向滄洲猶笑傲江山虛有石頭城花迷公子玉樓恩鏡弄佳人紅粉春不信關山勞逺戍綺羅香外任行塵兵圍梁殿金甌破火發陳宫玉樹摧姦佞豈能慚誤國空令懷古更裴佪行樂最宜連夜景太平方覺有春風千金盡把酬歌舞猶勝三邉賞戰功桃芳李艷年年發羌管蠻弦處處多海上應無三島路人間惟有一聲歌佳人自折一枝紅把唱新詞曲未終惟向眼前憐易落不如拋擲任春風景陽樓下花鈿鏡玄武湖邊錦繡旗昔日繁華今日恨雉媒聲晚草芳時亂後人間盡不平秦川花木最傷情無窮紅艷紅塵裏驟馬分香散入營狂題二首草堂舊隱猶招我煙閣英才不見君惆悵故山歸未得酒狂呌斷暮天雲須知世亂身難保莫喜天晴菊併開長短此身長是客黃花更助白頭催紅茶花景物詩人見即誇豈憐髙韻説紅茶牡丹枉用三春力開得方知不是花秋燕從撲香塵拂面飛憐渠只為解相依經冬好近深爐暖何必千巖萬水歸見後鴈有感笑爾窮通亦似人髙飛偶滯莫悲辛却緣風雪頻相阻只向關中待得春移桃栽獨臨官路易傷摧從遣春風恣意開禪客笑移山上看流鶯直到檻前來憶中條燕辭旅舍人空在螢出踈籬菊正芳堪恨昔年聫句地念經僧掃過重陽樂府五更窗下簇妝臺已怕堂前阿母催滿鴨香薰鸚鵡睡隔簾燈照牡丹開放龜二首却為多知自不靈今朝教汝卜長生若求深處無深處只有依人會有情世外猶迷不死庭人間莫恃自無營本期滄海堪投迹却向朱門待放生燈花三首蜀栁絲絲羃畫樓窗塵滿鏡不梳頭幾時金鴈傳歸信剪斷香魂一縷愁姊姊教人且抱兒逐他女伴缷頭遲明朝鬬草多應喜剪得燈花自掃眉閏前小雪過經旬猶自依依向主人開盡菊花憐強舞與教弟子待新春偶題三首浮世悠悠旋一空多情偏解挫英雄風光只在歌聲裏不必樓前萬樹紅小池隨事有風荷燒酹傾壺一曲歌欲待秋塘擎露看自憐生意已無多遼陽音信近來稀縱有虛傳逼節歸永日無人新睡覺小窗晴暖螖蟲飛華下對菊清香裛露對髙齋泛酒偏能浣旅懷不似春風逞紅艷鏡前空墜玉人叉與都統參謀書有感驚鸞迸鷺盡歸林弱羽低垂分獨沈帶病深山猶草檄昭陵應識老臣心漫題無宦無名拘逸興有歌有酒任他鄉看看萬里休征戍莫向新詞寄斷腸商山二首清溪一路照羸身不似雲臺畫像人國史數行猶有志只將談笑繼英塵馬上搜竒已數篇籍中猶愧是頑仙關頭傳説開元事指點多疑孟浩然與伏牛長老偈二首不算菩提與闡提惟應執著便生迷無端指箇清涼地凍殺西僧雪嶺西長繩不見繫空虛半偈傳心亦未疏推倒我山無一事莫將文字縛真如客中重九楚老相逢淚滿衣片名薄宦已知非他鄉不似人間路應共東流更不歸栁二首誰家按舞傍池塘已見繁枝嫩眼黃漫説早梅先得意不知春力暗分張似擬凌寒妬早梅無端弄色傍髙臺折來未有新枝長莫遣佳人更折來光啓丁未别山草堂琴畫已判燒猶託鄰僧護燕巢此去不緣名利去若逢逋客莫相嘲石楠客處偷間未是間石楠雖好懶頻攀如何風葉西歸路吹斷寒雲見故山力疾上馬走筆釀黍長添不盡杯只憂花盡客空回垂楊且為晴遮日留遇重陽即放開華隂縣樓丹霄能有幾層梯懶更揚鞭聳翠霓偶憑危欄且南望不勞髙掌欲相攜南至四日今冬臘後無殘日故國燒來有幾家却恨早梅添旅思強偷春力報年華花時不是偏愁我好事應難總取他已被詩魔長役思眼中莫厭早梅多年華亂後偏堪惜世路拋來已自生猶有玉真長命縷樽前時唱緩羇情一任喧闐繞四鄰間忙皆是自由身人來客去還須議莫遣他人作主人蓮峯前軒人間上夀若能添只向人間也不嫌看著四鄰花競發髙樓從此莫垂簾步虛阿母親教學步虛三元長遣下蓬壺雲韶韻俗停瑶瑟鸞鶴飛低拂寶罏劍器樓下公孫昔擅場空教女子愛軍裝潼關一敗蕃兒喜簇馬驪山看御湯乙丑人日自怪扶持七十身歸來又見故鄉春今朝人日逢人喜不料偷生作老人攜仙籙九日嶽北秋空渭北川晴雲漸薄薄如煙坐來還見微風起吹散殘陽一片蟬一半晴空一半雲逺籠仙掌日初曛洞天有路不知處絶頂異香難更聞決事還須更事酬清談妙理一時休漁翁亦被機心誤眼暗汀邉結釣鈎迹不趨時分不侯功名身外最悠悠聽君總畫麒麟閣還我間眠舴艋舟仙凡路阻兩難留煙樹人間一片秋若道隂功能濟活且將方寸自焚修若有隂功救未然玉皇品籍亦搜賢應知談笑還髙謝别就滄洲贊上仙英名何用苦搜竒不朽才銷一句詩却賴風波阻三島老臣猶得戀明時剪取紅雲剩寫詩年年髙會趂花時水精樓閣分明見只欠霞漿别著旗此生得作太平人只向塵中便出塵移取碧桃花萬樹年年自樂故鄉春浪淘沙不必長漂玉洞花曲中偏愛浪淘沙黃河却勝天河水萬里縈紆入漢家萬首唐人絶句卷五十六
