body:
  text: 萬首唐人絶句巻二十六宋洪邁編七言詠襪杜牧鈿尺裁量減四分纎纎玉笋裹輕雲五陵年少欺他醉笑把花前出畫裙宫詞二首蟬翼輕綃傅體紅玉膚如醉向春風深宫鎻閉猶疑惑更取丹沙試辟宫監宫引出暫開門隨例須朝不是恩銀鑰却收金鎻合月明花落又黄昏月三十六宫秋夜深昭陽歌斷信沉沉唯應獨伴陳皇后照見長門望幸心入闗東西南北數衢通曽取江西徑過東今日更尋南去路未秋應有北歸鴻及第後寄長安故人東都放牓未花開三十三人走馬回秦地少年多辦酒已將春色入闗來偶作才子風流詠曉霞倚樓吟住日初斜驚殺東鄰繡牀女錯將黄暈壓檀花贈終南僧北闕南山是故鄉兩枝仙桂一時芳休公都不知名姓始覺禪門氣味長遣懐落魄江南載酒行楚腰腸㫁掌中輕十年一覺揚州夢占得青樓薄倖名春日途中田園不事來遊宦故國誰教爾别離獨倚闗亭還把酒一年春盡送春時秋感金風萬里思何盡玉樹一䆫秋影寒獨掩此門明月下淚流香袂倚欄干贈漁父蘆花深澤靜垂綸月夕煙朝幾十春自說孤舟寒水畔不曽逢着獨醒人歎花自恨尋芳到已遲徃年曽見未開時如今風擺花狼籍緑葉成隂子滿枝山行逺上寒山石徑斜白雲生處有人家停車坐愛楓林晚霜月紅於二月花書懐滿眼青山未得過鏡中無那鬢絲何秪言旋老轉無事欲到中年事更多紫微花曉迎秋露一枝新不占園中最上春桃李無言又何在向風偏笑豔陽人醉後呈崔大夫謝傅秋涼閱管絃徒教賤子侍華筵溪頭正雨歸不得辜負南䆫一覺眠方響數條秋水挂琅玕玉手丁當怕夜寒曲盡連敲三四下恐驚珠淚落金盤題真上人院清羸已近百年身古寺風煙又一春寰海自成戎馬地唯師曽是太平人對花不飲花前雖病亦提壺數調持觴興有無盡日臨風羡人醉雪香空伴白髭鬚桃花園桃滿西園淑景催幾多紅豔淺深開此花不逐溪流出晉客無因入洞來送杜十三煙鴻上漢聲聲逺逸驥尋雲步步髙應笑内兄年六十郡城閒坐養霜毛後池泛舟送王十二首相送西郊暮景和青蒼竹外遶寒波為君醮甲十分飲應見離心一倍多分袂還應立馬看向來離思始知難鴈飛不見行塵滅景下山遥極目寒洛陽秋夕泠泠寒水帶霜風更在天橋夜景中清禁漏閒煙樹寂月輪移在上陽宫獵騎已落雙鵰血尚新鳴鞭走馬又翻身憑君莫射南來雁恐有家書寄逺人懐吳中馮秀才長洲苑外草蕭蕭却筭遊程嵗月遙唯有别時今不忘暮煙秋雨過楓橋寄東塔僧初月微明漏白煙碧松梢外挂青天西風靜起傳深業應送愁吟入夜蟬秋夕紅燭秋光冷畫屏輕羅小扇撲流螢瑤階夜色涼如水坐看牽牛織女星瑤瑟玉仙瑤瑟夜珊珊月過樓西桂燭殘風景人間不如此動搖湘水徹明寒送人歸山三清洞裹無端别又拂塵衣欲臥雲看著挂冠迷處所北山蘿月在移文聞角曉樓煙檻出雲霄景下林塘已寂寥城角為秋悲更逺護霜雲破海天遙發谷口曉澗青青桂色孤楚人隨玉上天衢水辭谷口山寒少今日風頭校暖無賞蕙草尋常詩思巧如春又喜幽亭蕙草新本是馨香比君子遶欄今更為何人偶題道在人間或可傳小還輕變已多年今來海上昇髙望不到蓬萊不是仙三川驛覧座主舍人留題舊跡依然已十秋雪山當面照銀鈎懐恩淚盡霜天曉一片餘霞映驛樓醉贈裴四同年淒風洛下同羈思遲日棠陰得醉歌自笑與君三嵗别頭銜依舊鬢絲多破鏡佳人失手鏡初分何日團圓再㑹君今朝萬里秋風起山北山南一片雲長安雪後秦陵漢苑參差雪北闕南山次第春車馬滿城原上去豈知惆愴有閒人華清宫零葉翻紅萬樹霜玉蓮閒蘂暖泉香行雲不下朝元閣一曲淋鈴淚數行冬日題寺北樓滿懐多少是恩酬未見功名已白頭不為尋山試筋力豈能寒上背雲樓别王十後附書重闗曉度宿雲寒羸馬縁知步步難此信的應中路見亂山何處拆書看李蘄州問㫁酒因寄有客南來話所思故人遙枉醉中詩暫因微疾須防酒不是歡情減舊時望少華三首身隨白日看將老心與青雲自有期今對晴峰無十里世縁多累暗生悲文字波中去不還物情初與是非闗時名竟是無端事羞對靈山道愛山眼看雲鶴不相隨何況塵中事作為好伴羽人深洞去月前秋聴玉參差登澧州驛樓寄韋尹一話涔陽舊使君郡人回首望青雲政聲長與江聲在自到津樓日夜聞長安晴望翠屏山對鳳城開碧落搖光霽後來回識六龍廵幸處飛煙閒繞望春臺嵗旦朝回星河猶在整朝衣逺望天門再拜歸笑向東風初五十敢言知命且知非宫人冢盡是離宫院中女苑牆城外冢纍纍少年入内教歌舞不識君王到死時寄杜子二首不識長楊事北都且教紅袖醉來扶狂風烈焰雖千尺豁得平生俊氣無武牢闗吏應相笑箇厎年年徃復來若問使君何處去為言相憶首長回有感宛溪垂柳最長枝曽被春風盡日吹不堪攀折猶堪看陌上少年來自遲江南送左師江南為客正悲秋更送吾師古渡頭惆悵不同塵土别水雲蹤跡去悠悠郡樓有宴病不起十二層樓敞畫簷連雲歌盡草纎纎空堂病怯階前月燕子嗔垂一桁簾隋苑紅霞一抹廣陵春定子當筵睡臉新却笑丘墟隋煬帝破家亡國為誰人汴水舟行荅張祜千萬長河共使船聴君詩句倍悽然春風野㟁名花發一道㠶檣畫御煙寓言暖風遲日柳初含顧影看身又自慙何事明朝獨惆悵杏花時節在江南猿月白煙青水暗流孤猿銜恨呌中秋三聲欲斷疑腸斷饒是少年須白頭懐歸塵埃終日滿䆫前水態雲容思浩然爭得便歸湘浦去却持竿上釣魚船邊上晚秋黒山南面更無州馬放平沙夜不收風送孤城臨晚角一聲聲入客心愁悼吹簫妓玉簫聲㫁没流年滿目春愁隴樹煙艶質已隨雲雨散鳳樓空鎻月明天訪許顔門近寒溪䆫近山枕山流水日潺潺長嫌世上浮雲客老向塵中不解顔春日古道傍作萬古榮華旦暮齊樓臺春盡草萋萋君看陌上何人墓旋化紅塵送馬蹄青冢青冢前頭隴水流燕支山上墓雲秋蛾眉一墜窮泉路夜夜孤魂月下愁大夢上人自廬峰回行脚尋常到寺稀一枝蔾杖一襌衣開門滿院空秋色新向廬峰過夏歸洛中二首柳動晴風拂路塵年年宫闕鎻濃春一從翠輦無廵幸老却蛾眉幾許人風吹柳帶搖晴緑蝶遶花枝戀暖香多把芳菲泛春酒直教愁色對愁腸邊上聞鳴笳三首何處吹笳薄暮天塞垣髙鳥沒狼煙遊人一聴頭堪白蘇武爭禁十九年海路無塵邊草新榮枯不見緑楊春白沙日暮愁雲起獨感離鄉萬里人羣雛吹笛上髙臺寒鴈驚飛去不回盡日春風吹不散只應分付客愁來閒題男兒所在即為家百鎰黄金一朶花借問春風何處好緑楊深巷馬頭斜金谷園繁華事散逐香塵流水無情草自春日暮東風怨啼鳥落花猶似墮樓人重登科星漢離離月出輪滿街含笑綺羅春花前每被青娥問何事重來只一人遊邊黄沙連海路無塵邊草長枯不見春日暮拂雲堆下過馬前逢着射鵰人隋宫春龍舟東下事成空蔓草萋萋滿故宫亡國亡家為顔色露桃猶自恨春風寓題把酒直須判酩酊逢花莫惜暫淹留假如三萬六千日半是悲哀半是愁送趙十二省事却因多事力無心翻似有心來秋風郡閣殘花在别後何人更一杯呈鄭先輩不語亭亭儼薄粧畫裙雙鳳鬱金香西京才子旁看取何似喬家那窈娘偶見朔風髙緊掠河樓白鼻騧郎白罽裘有箇當壚明似月馬鞭斜揖笑回頭醉倒日晴空樂下仙雲俱在涼亭送使君莫辭一盞即相請還是三年更不聞兵部尚書席上作華堂今日綺筵開誰召分司御史來偶發狂言驚滿坐三重粉面一時回和州絶句江湖醉度十年春牛渚山邊六問津厯陽前事知虚實髙位紛紛見陷人仙女詞楊衡玉笄初侍紫皇君金縷鴛鴦滿絳裙仙宫一閉無消息遙結芳心向碧雲春夢落庭日照花如錦紅粧美人當晝寝傍人不知夢中事唯見玉釵時墜枕宿青牛谷隨雲步入青牛谷青牛道士留我宿可憐夜乆月明中唯有壇邊一枝竹寄徹公北風吹霜霜月明荷葉枯盡越水清别來幾度龍宫宿雪山童子應相逐九日黄花紫菊傍籬落摘菊泛酒愛芳新不堪今日望鄉意强挿茱茰隨衆人春日宋邕輕花細葉滿林端昨夜春風晚色寒黄鳥不堪愁裏聴緑楊冝向雨中看社日村居張演鵝湖山下稻梁肥㹠栅雞棲對掩扉桑柘影斜春社散家家扶得醉人歸贈李十二崔成甫我是瀟湘放逐臣君辭明主漢江濵天外常求太白老金陵捉得酒仙人過上人蘭若綦毋潜山頭襌室挂僧衣窻外無人溪鳥飛黄昏半在山下路却聽鐘聲連翠微早發上東門十五能行西入秦三十無家作路人時命不將明主荅素衣空染洛陽塵侍宴桃花園徐彦伯源水叢花無數開丹跗紅萼間青梅從今結子三千歳預喜仙游復摘來上已祓禊晴風麗日滿芳洲雲幕春筵祓錦流皆言曲侍璜溪宴暫似乗槎天漢游夜燕安樂公主宅鳳樓開闔引明光花醑連添醉益香欲知帝女熏天貴金柯玉柱夜成行小雪日戲題張登甲子徒推小雪天刺桐猶緑槿花然陽和長養無時歇却是炎洲雨露偏歸燕下第後獻主司章孝標舊累危巢泥已落今年故向社前歸連天大厦無棲處更傍誰家門户飛及第後寄淮南李相公及第全勝十政官金湯渡了出長安馬頭漸入揚州路為報時人洗眼看春雪獻李相公六出飛花處處飄黏窻拂砌上寒條朱門到曉難盈尺盡是三軍喜氣銷萬首唐人絶句巻二十六
