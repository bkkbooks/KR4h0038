body:
  text: 萬首唐人絶句卷七十宋洪邁編七言感月白居易存亡感月一潸然月色今宵似往年何處曾經同望月櫻桃樹下後堂前酬錢員外雪中重寄雪山偈問答殷勤四句中本立空名緣破妄若能無妄亦無空夜惜禁中桃花因懷員外前日歸時花正紅今夜宿時枝半空坐惜殘芳君不見風吹狼藉月明中和元九答山驛夢入君旅夢來千里閉我幽魂欲二年莫忘平生行坐處後堂階下竹叢前寄新蜀茶蜀茶寄到但驚新渭水煎來始覺珍滿甌似乳堪持玩况是春深酒渴人病中作病來城裏諸親故厚薄親踈心總知唯有蔚章於我分深於同在翰林時感化寺見元劉題名微之謫去千餘里太白無來十一年今日見名如見靣塵埃壁上破窗前發商州商州館裏停三日待得妻孥相逐行若比李三猶自勝兒啼婦哭不聞聲紅鸚鵡安南逺進紅鸚鵡色似桃花語似人文章辨慧皆如此籠檻何年出得身羅藥自學坐禪休服藥從他時服病沉沉此身不要全强健强健多生人我心讀莊子去國辭家謫異方中心自怪少憂傷為尋莊子知歸處認得無何是本鄉夢中贈曇禪師五年不入慈恩寺今日尋師始一來欲知火宅焚燒苦方寸如今化作灰三月三日懷微之良時光景常虛擲壯嵗風情已暗銷忽憶同為校書日每年同醉是今朝戲贈户部李判官好去民曹李判官少貪公事且謀歡男兒未死爭能料莫作中州刺史看送高侍御因寄楊八明月峽邊逢制使黃茅岸上是忠州到城莫說忠州惡無益虛教楊八愁棣華驛見楊八題夢兄弟詩遙聞旅宿夢兄弟應有郵亭名棣華名作棣華來早晚自題詩後屬楊家赴杭州重宿驛感題往恨今愁應不殊題詩梁下又踟蹰羡君猶夢見兄弟我到天明睡亦無慈恩寺有感自問有何惆悵事寺門臨入却遲回李家哭泣元家病柿葉紅時獨自來惜園花曉來紅蕚凋零盡始見空枝四五株前日狂風昨夜雨殘芳更合得存無樟亭雙櫻南館西軒兩樹櫻春條長足夏隂成素華朱實今雖盡碧葉風來别有情問楊瓊古人唱歌兼唱情今日唱歌惟唱聲欲說向君君不㑹試將此語問楊瓊思子臺有感二首曾家機上聞投杼尹氏園中見掇蜂但以恩情生隙罅何人不解作江充暗生魑魅蠧生蟲何異讒生疑阻中但使武皇心似燭江充不敢作江充和郭使君枸杞山陽太守政嚴明吏靜人安無犬驚不知靈藥根成狗怪得時聞吠夜聲元相挽歌詞三首銘旌官重威儀盛騎吹聲繁鹵簿長後魏帝孫唐宰相六年七月葬咸陽墓門已閉笳簫去惟有夫人哭不休蒼蒼露草咸陽壠此是千秋第一秋送葬萬人皆慘淡反虞駟馬亦悲鳴琴書劒佩誰收拾三歲遺孤新學行病免後喜除賔客臥在漳濵滿十旬起為商客伴三人從今且莫嫌身病不病何由索得身勸病鶴右翅低垂左脛傷可憐風貌甚昻藏亦知白日青天好未要高飛且養瘡醉中重留夢得劉郎劉郎莫先起蘇臺蘇臺隔雲水酒盞來從一百分馬頭去便三千里送崔駙馬赴兖州戚里誇為賢駙馬儒家認作好詩人魯侯不得辜風景沂水年年有暮春送僧遊江南忽辭洛下緣何事擬向江南住幾時每過船頭應問法無妨菩薩是船師往年喪白馬題詩㕔壁感懷路傍埋骨蒿草合壁上題詩塵蘚生馬死七年猶悵望自知無乃太多情二月二日二月二日新雨晴草芽菜甲一時生輕衫細雨春年少十字津頭一字行戲答思黯征夫與我世相忘故態些些亦不妨縱酒放歌聊自樂接輿爭解教人狂醉後聽唱桂華曲桂華詞意苦丁寧唱到嫦娥醉便醒此是世間腸斷曲莫教不得意人聽答閒上人問風病一牀方丈向陽開勞動文殊問疾來欲界凡夫何足道四禪天始免風災罷灸灸病身佛說將何喻變滅須臾豈不聞莫遣淨名和我笑休將火艾灸浮雲强起迎春杖䇿人扶廢病身情和强起一迎春他時蹇跛縱行得笑殺平原樓上人夜涼露白風清庭户涼老人先著夾衣裳舞腰歌䄂拋何處唯對無絃琴一張寄潮州楊繼之相府潮陽俱夢中夢中何者是窮通他時事過方應悟不獨榮空辱亦空贈思黯為憐清淺愛潺湲一日三回到水邊若道歸仁灘更好主人何故别三年離别難詞緑楊陌上送行人馬去車回一望塵不覺别時紅淚盡歸來無可更沾巾池上寓興濠梁莊惠漫相爭未必人情知物情獺捕魚來魚躍出此非魚樂是魚驚灘聲碧玉斑斑沙歷歷清流决决響泠泠自從造得灘聲後玉管朱絃可要聽題石泉殷勤傍石繞前行不說何人知我情漸恐耳聾兼眼暗聽泉看石不分明招山僧能入城中乞食否莫辭塵土汚袈裟欲知住處東城下繞竹泉聲是白家池鶴八絶句雞贈鶴一聲警露君能薄五德司晨我用多不㑹悠悠時俗士重君輕我意如何鶴答雞爾爭伉儷泥中鬬吾整威儀松上棲不可遣他天下眼却輕野鶴重家雞烏贈鶴與君白黑太分明縱不相親莫見輕我每夜啼君怨别玉徽琴裏忝同聲鶴答烏吾愛棲雲上華表汝多攫肉下田中吾音中羽汝聲角琴曲雖同調不同鳶贈鶴君誇名鶴我名鳶君呌聞天我戾天更有與君相似處飢來一種啄腥羶鶴答鳶無妨自是莫相非清濁高低各有歸鸞鶴羣中彩雲裏幾時曾見喘鳶飛鵝贈鶴君因風送入青雲我被人驅向鴨羣雪頸霜毛紅網掌請看何處不如君鶴答鵝右軍殁後欲何依只合隨雞逐鴨飛未必犧牲及吾輩大都我瘦勝君肥禽蟲八章燕違戊巳鵲避歲兹事因何羽族知疑有鳯王頒鳥歷一時一日不參差江魚羣從稱妻妾塞雁聮行號弟兄但恐世間真眷屬親踈亦是强為名阿閣鵷鸞田舍烏妍蚩貴賤兩懸殊如何閉向深籠裏一種摧頽觸四隅有所感也獸中刀鎗多怒吼鳥遭羅弋盡哀鳴羔羊口在緣何事暗死屠門無一聲有所悲也蟭螟殺敵蚊巢上蠻觸交爭蝸角中應似諸天觀下界一微塵內鬪英雄自照也蠨蛸網上罥蜉蝣反覆相持死始休何異浮生臨老日一彈指頃報恩讎蟻王化飯為臣妾蜾母偷蟲作子孫彼此假名非本物其間何怨復何恩鵝乳養雛遺在水魚心想子變成鱗細微幽隱何窮事知者唯應是聖人李賈二大諫拜命後寄楊八劉禹錫諫省新登二直臣萬方驚喜捧絲綸則知天子明如日肯放淮陽高臥人洛中春末從杜録事尊前花下長相見明日忽為千里人君過午橋回首望洛城猶自有殘春米嘉榮與前篇不同一别嘉榮三十載忽聞舊曲尚依然如今世俗輕前輩好染髭鬚事少年上崔殼延福里筆精能令音信通千里解致蛟龍運八行惆悵江生不相賞應緣自負好文章寄弟洎蜀箋韓浦十樣蠻箋出益州寄來新自浣溪頭老兄得此全無用助爾添修五鳯樓哭林傑鄭宣才高未許賈生年何事孤魂逐逝川螢聚帳中人已去鶴離臺上月初懸雪席口占高崇文崇文崇武不崇文提戈出塞舊從軍有似蕃兒射雁落白毛空裏亂紛紛迎孫刺史池州門子朱元昔日郎君今刺史朱元依舊守朱門今朝竹馬諸童子君是當時竹馬孫祕色越器陸龜䝉九秋風露越塞開奪得千峯翠色來好向中宵盛沆瀣共稽中散鬬遺杯舊識銀工邀食薛昭緯一楪氊根數十皴盤中猶更有紅鱗早知文字多辛苦悔不當初學煆銀熱戲樂張祐熱戲爭心劇火燒銅捶暗熱不相饒上皇失喜寧王笑百尺幢竿果動搖玉環琵琶宫樓一曲琵琶聲滿眼雲山是去程回顧段師非汝意玉環休把恨分明題酸棗驛前碑蒼苔古澀自雕踈誰道中郎筆力餘長愛當時遇王粲每來碑下不關書題朱兵曹山居朱氏西齊萬卷書水門山閣自高疏我來穿穴非無意願向君家作壁魚贈畫僧二首骨峭情高彼岸人一杯長泛海為津僧儀又入清流品却恐前生是許詢瘦頸隆肩碧眼生翰林親讃虎頭能終年不語看如意似證禪心入大乘送走馬使新樣花文配蜀羅同心雙帶蹙金蛾慣將喉舌傳君好馬跡鈴聲遍兩河題御溝萬樹垂楊拂御溝溶溶漾漾繞神州都緣濟物心無阻從此恩波處處流題青龍寺二十年沉滄海間一游京國也應然人人盡到求名處獨向青龍寺看山硫黃一粒硫黃入貴門寢堂深處問𤣥言時人盡說韋山甫昨日餘干弔子孫散花樓錦江城外錦城頭回望秦川上軫憂正值血魂來夢裏杜鵑聲在散花樓王家五絃五條絃出萬端情撚撥間關漫態生唯羡風流田太守小金鈴子耳邊鳴聽薛陽陶吹蘆管紫清人下薛陽陶末曲新笳調更高無奈一聲天外絶百年已死斷腸刀聽簡上人吹蘆管蜀國僧吹蘆一枝隴西游客淚先垂至今留得新聲在却為中原人不知過汾水關千里南來背日行關門無事一侯嬴山根百尺路前去十夜耳中汾水聲櫻桃石榴未拆梅猶小愛此山花四五株斜日庭前風裊裊碧油千片漏紅珠酬凌秀才惠枕八寸黃楊惠不輕虎頭光照簟文清空心想此緣成夢拔劒燈前一夜行送溫飛卿赴方城方城新尉曉衙參却是傍人意不甘盡夜與君思賈誼瀟湘猶隔洞庭南感春申君薄俗何心議感恩諂容卑迹賴君門春深還道三千客寂寞無人殺李園送張參及第還家錢起太學三千聞琢玉東堂一舉早成名借問還家何處好中人含笑下機迎送符别駕還錢塘驥足駸駸吳越間屏星復與紫書還知君從事元無事城上愁看海上山晚歸嚴明府題門降士林霑蕙草寒空驚翰苑失鵷鸞秋中回首君門阻馬上應歌行路難僧壁畫山水連山盡出映禪扉粉壁香筵滿翠微坐來爐氣縈空徹共指晴雲向嶺歸校獵曲長楊殺氣連雲飛漢主秋畋正掩圍重門日晏紅塵出數騎畋人獵獸歸桃花潭别汪倫李白李白登舟欲逺行忽聞江上踏歌聲桃花潭水深千尺不及汪倫送我情哭殷遙王維送君返葬石樓山松柏蒼蒼賔馭還埋骨白雲長已矣空餘流水向人間李龜年所歌清風朗月苦相思蕩子從戎十載餘征人去日殷勤祝歸鴈來時數附書萬首唐人絶句卷七十
